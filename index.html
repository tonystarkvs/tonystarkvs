<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Master Automation Hub</title>
    <!-- Modern Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- All styles in one external file -->
    <link rel="stylesheet" href="src/css/style.css" />
  </head>

  <body>
    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar">
      <div class="sidebar-header" id="sidebarHeader">
        <h1>Master Library</h1>
        <p>Automation & Development Hub</p>
      </div>
      <!-- Menu items are injected here by JS -->
      <nav class="nav-menu" id="navMenu" aria-label="Course Navigation"></nav>
    </div>

    <!-- Overlay for mobile sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content" id="mainArea">
      <div class="top-bar">
        <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle menu">
          <svg viewBox="0 0 24 24"><path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/></svg>
        </button>
        <span class="status-dot" aria-hidden="true"></span>
        <span id="moduleTitle">Welcome to the Hub</span>
        <!-- Global Search Container -->
        <div class="search-nav-container">
          <input type="text" id="globalSearchInput" placeholder="Search page content..." title="Type to search all pages. Press Enter for next match.">
          <span id="searchResultCount" class="search-result-count"></span>
          <button id="prevSearchBtn" class="search-nav-btn" title="Previous match" disabled>
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
          </button>
          <button id="nextSearchBtn" class="search-nav-btn" title="Next match" disabled>
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </button>
        </div>

        <button class="home-btn" id="homeBtn" aria-label="Go to home dashboard" title="Go to Dashboard">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
        </button>
      </div>

      <div class="iframe-wrapper">
        <!-- Loading spinner (shown/hidden via CSS class) -->
        <div class="loader-container" aria-live="polite">
          <div class="spinner" role="status">
            <span class="sr-only">Loading...</span>
          </div>
          <div class="loader-text">LOADING...</div>
        </div>

        <!-- Content loads here -->
        <div class="iframe-container" id="iframeContainer">
          <div class="welcome-screen">
            <h2>Select a module from the sidebar</h2>
            <p>Your interactive learning sessions will load here.</p>
          </div>
        </div>
      </div>
    </main>

    <!-- JS files: config first, then app logic -->
    <script src="src/js/config.js"></script>
    <script src="src/js/app.js"></script>
  </body>
</html>
