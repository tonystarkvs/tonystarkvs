.session-panel { display: none; }
.session-panel.active { display: block; }

.section-tabs button {
  padding: 5px 14px; border-radius: 6px; border: none;
  background: transparent; color: #666; font-size: 12px; cursor: pointer;

.section-tabs button:hover { background: #1e1e1e; color: #aaa; }
.section-tabs button.active { background: #1e1e1e; color: #e8e6df; font-weight: 600; }

/* SECTION PANELS */
.section-panel { display: none; }
.section-panel.active { display: block; }

/* CARDS */
.card { background: #161616; border: 1px solid #222; border-radius: 10px; padding: 1rem 1.2rem; margin-bottom: 1rem; }
.card h3 { font-size: 14px; font-weight: 600; margin-bottom: .8rem; color: #AFA9EC; }

.ov-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.ov-box { background: #1c1c1c; border-radius: 8px; padding: 10px; }
.ov-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: #555; margin-bottom: 4px; }
.ov-text { font-size: 12px; color: #bbb; line-height: 1.55; }

/* GLOSSARY TABLE */
.kw-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.kw-table th { text-align: left; padding: 6px 8px; border-bottom: 1px solid #222; color: #555; font-size: 11px; }
.kw-table td { padding: 7px 8px; border-bottom: 1px solid #1a1a1a; vertical-align: top; line-height: 1.5; color: #bbb; }
.kw-table tr:last-child td { border-bottom: none; }
.kw { display: inline-block; font-family: monospace; background: #1e1e2e; color: #AFA9EC; padding: 2px 7px; border-radius: 4px; font-size: 11px; }

/* ONE-LINERS */
.ol-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid #1e1e1e; align-items: flex-start; }
.ol-item:last-child { border-bottom: none; }
.ol-num { min-width: 22px; height: 22px; background: #2a2250; color: #AFA9EC; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
.ol-text { font-size: 12px; color: #ccc; line-height: 1.6; }

/* FLOW */
.flow { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 6px; padding: 1rem; background: #1a1a1a; border-radius: 8px; margin-bottom: 1rem; }
.flow-node { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.fn-purple { background: #2a2250; color: #AFA9EC; }
.fn-teal   { background: #0d2e26; color: #5DCAA5; }
.fn-amber  { background: #2e2010; color: #FAC775; }
.fn-coral  { background: #2e1010; color: #F0997B; }
.fn-blue   { background: #0d1f2e; color: #85B7EB; }
.flow-arrow { color: #444; font-size: 14px; }

.bp-item { display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid #1a1a1a; font-size: 12px; color: #bbb; line-height: 1.5; }
.bp-item:last-child { border-bottom: none; }
.bp-check { color: #5DCAA5; font-size: 15px; flex-shrink: 0; margin-top: 1px; }

/* QA */
.qa-item { margin-bottom: 1rem; }
.qa-q { font-size: 12px; font-weight: 600; color: #e8e6df; margin-bottom: 5px; }
.qa-a { font-size: 12px; color: #999; line-height: 1.6; padding-left: 10px; border-left: 2px solid #534AB7; }

.code-tabs { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 0; }
.code-tabs button {

.code-tabs button:hover { color: #aaa; }
.code-tabs button.active { background: #1e1e2e; color: #e8e6df; border-color: #333; }

.code-block { display: none; background: #1e1e2e; border: 1px solid #2a2a2a; border-radius: 0 6px 6px 6px; }
.code-block.active { display: block; }
.code-filename { display: block; padding: 5px 1rem; background: #161620; border-bottom: 1px solid #2a2a2a; font-size: 10px; color: #555; font-family: monospace; }
.code-block pre { padding: 1rem; font-size: 12px; line-height: 1.8; font-family: 'Courier New', monospace; overflow-x: auto; max-height: 320px; overflow-y: auto; }

</style>

{
  label: "S8: Opt/Default/Rest",
  title: "Session 8 — Optional, Default & Rest Parameters",
  overview: {
    what: "Three powerful parameter features: optional (?), default (= value), and rest (...) — making functions flexible and caller-friendly.",
    why:  "Makes functions flexible and caller-friendly — callers only pass what they need, functions handle the rest gracefully.",
    when: "Optional: search filters, profile APIs. Default: email templates, notifications. Rest: cart totals, batch processing.",
    how:  "Optional: param? — Default: param = value — Rest: ...param: type[]"

  glossary: [
    ["param?: type","Optional parameter — can be omitted by the caller. Type becomes type | undefined"],
    ["param = value","Default parameter — used when caller passes undefined or omits the argument"],
    ["...param: type[]","Rest parameter — collects all remaining arguments into a typed array"],
    ["undefined","Explicitly passing undefined to a defaulted parameter triggers the default value"],
    ["spread operator","... at the call site — spreads an array as individual arguments (opposite of rest)"]
  ],
  oneliners: [

    "Passing undefined explicitly to a default parameter triggers the default — passing null does NOT.",
    "Rest parameters (...args) must be the LAST parameter — no parameters can follow a rest.",
    "Rest and spread both use ... — rest COLLECTS into an array; spread EXPANDS an array. Inverse operations.",
    "Default parameters make APIs user-friendly — callers only pass values they want to customize."
  ],
  bestpractices: [
    "Put optional and default parameters at the END — required params first",

    ["How do rest parameters differ from the arguments object?",

<span class="kw2">function</span> <span class="fn2">first</span>&lt;T&gt;(arr: T[]): T { <span class="kw2">return</span> arr[<span class="num2">0</span>]; }

<span class="kw2">let</span> n = <span class="fn2">first</span>([<span class="num2">1</span>, <span class="num2">2</span>, <span class="num2">3</span>]);     <span class="cmt2">// inferred: number</span>
<span class="kw2">let</span> s = <span class="fn2">first</span>([<span class="str2">"a"</span>, <span class="str2">"b"</span>]);   <span class="cmt2">// inferred: string</span>

console.<span class="fn2">log</span>(n.<span class="fn2">toFixed</span>(<span class="num2">2</span>));    <span class="cmt2">// ✅ 1.00</span>
console.<span class="fn2">log</span>(s.<span class="fn2">toUpperCase</span>()); <span class="cmt2">// ✅ A</span>`},
    {name:"05_returning_fn.ts", body:`<span class="cmt2">// Functions that RETURN functions</span>
<span class="kw2">function</span> <span class="fn2">makeMultiplier</span>(factor: <span class="type2">number</span>): (n: <span class="type2">number</span>) =&gt; <span class="type2">number</span> {
  <span class="kw2">return</span> (n: <span class="type2">number</span>) =&gt; n * factor;
}

<span class="kw2">const</span> double = <span class="fn2">makeMultiplier</span>(<span class="num2">2</span>);
<span class="kw2">const</span> triple = <span class="fn2">makeMultiplier</span>(<span class="num2">3</span>);

console.<span class="fn2">log</span>(<span class="fn2">double</span>(<span class="num2">5</span>));  <span class="cmt2">// 10</span>
console.<span class="fn2">log</span>(<span class="fn2">triple</span>(<span class="num2">5</span>)); <span class="cmt2">// 15</span>

<span class="cmt2">// SDET: URL factory pattern</span>
<span class="kw2">const</span> makeUrl = (base: <span class="type2">string</span>) =&gt; (path: <span class="type2">string</span>) =&gt; <span class="str2">\`\${base}\${path}\`</span>;
<span class="kw2">const</span> testUrl  = <span class="fn2">makeUrl</span>(<span class="str2">"https://api.test.com"</span>);
console.<span class="fn2">log</span>(<span class="fn2">testUrl</span>(<span class="str2">"/users"</span>)); <span class="cmt2">// https://api.test.com/users</span>`},
    {name:"06_typed_callback.ts", body:`<span class="kw2">type</span> <span class="type2">ClickHandler</span> = (event: { x: <span class="type2">number</span>; y: <span class="type2">number</span> }) =&gt; <span class="type2">void</span>;

<span class="kw2">function</span> <span class="fn2">onClick</span>(handler: <span class="type2">ClickHandler</span>): <span class="type2">void</span> {
  <span class="fn2">handler</span>({ x: <span class="num2">100</span>, y: <span class="num2">200</span> }); <span class="cmt2">// simulated event</span>
}

<span class="fn2">onClick</span>(({ x, y }) =&gt; {
  console.<span class="fn2">log</span>(<span class="str2">\`Clicked at \${x},\${y}\`</span>);
  <span class="cmt2">// Clicked at 100,200</span>
});`},
    {name:"07_pipe_utility.ts", body:`<span class="cmt2">// pipe — run value through multiple functions</span>
<span class="kw2">function</span> <span class="fn2">pipe</span>&lt;T&gt;(value: T, ...fns: Array&lt;(v: T) =&gt; T&gt;): T {
  <span class="kw2">return</span> fns.<span class="fn2">reduce</span>((v, fn) =&gt; <span class="fn2">fn</span>(v), value);
}

<span class="kw2">const</span> result = <span class="fn2">pipe</span>(
  <span class="str2">"  hello world  "</span>,
  s =&gt; s.<span class="fn2">trim</span>(),
  s =&gt; s.<span class="fn2">toUpperCase</span>(),
  s =&gt; s.<span class="fn2">replace</span>(/ /g, <span class="str2">"-"</span>)
);
console.<span class="fn2">log</span>(result); <span class="cmt2">// HELLO-WORLD</span>`},
    {name:"08_sdet_utility.ts", body:`<span class="cmt2">// Complete SDET utility — all sessions combined</span>
<span class="kw2">type</span> <span class="type2">TestResult</span> = { name: <span class="type2">string</span>; passed: <span class="type2">boolean</span>; time: <span class="type2">number</span> };

<span class="kw2">function</span> <span class="fn2">runTest</span>(name: <span class="type2">string</span>, fn: () =&gt; <span class="type2">boolean</span>): <span class="type2">TestResult</span> {
  <span class="kw2">const</span> start  = Date.<span class="fn2">now</span>();
  <span class="kw2">const</span> passed = <span class="fn2">fn</span>();
  <span class="kw2">return</span> { name, passed, time: Date.<span class="fn2">now</span>() - start };
}

<span class="kw2">function</span> <span class="fn2">printReport</span>(...results: <span class="type2">TestResult</span>[]): <span class="type2">void</span> {
  results.<span class="fn2">forEach</span>(r =&gt; {

}

<span class="fn2">printReport</span>(
  <span class="fn2">runTest</span>(<span class="str2">"Login Test"</span>,  () =&gt; <span class="bool2">true</span>),
  <span class="fn2">runTest</span>(<span class="str2">"Search Test"</span>, () =&gt; <span class="bool2">false</span>),
  <span class="fn2">runTest</span>(<span class="str2">"Cart Test"</span>,   () =&gt; <span class="bool2">true</span>)
);`}
  ]

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const tabBar   = document.getElementById('sessionTabs');
  const panels   = document.getElementById('sessionPanels');
  const SECS     = ['Overview','Glossary','One-liners','Concepts','Best Practices','Interview Prep','Code'];

  DATA.forEach((sess, si) => {
    // Session tab
    const tb = document.createElement('button');
    tb.textContent = sess.label;
    tb.className = si === 0 ? 'active' : '';
    tb.setAttribute('data-si', si);
    tabBar.appendChild(tb);

    // Session panel
    const panel = document.createElement('div');
    panel.className = 'session-panel' + (si === 0 ? ' active' : '');
    panel.id = 'sp_' + si;

    // Section tab bar
    const secBar = document.createElement('div');
    secBar.className = 'section-tabs';
    SECS.forEach((s, idx) => {
      const b = document.createElement('button');
      b.textContent = s;
      b.className = idx === 0 ? 'active' : '';
      b.setAttribute('data-si', si);
      b.setAttribute('data-idx', idx);
      secBar.appendChild(b);
    });
    panel.appendChild(secBar);

    // Section panels
    const sections = [
      buildOverview(sess),
      buildGlossary(sess),
      buildOneliners(sess),
      buildConcepts(sess),
      buildBP(sess),
      buildQA(sess),
      buildCode(sess, si)
    ];
    sections.forEach((html, idx) => {
      const div = document.createElement('div');
      div.className = 'section-panel' + (idx === 0 ? ' active' : '');
      div.id = 'sec_' + si + '_' + idx;
      div.innerHTML = html;
      panel.appendChild(div);
    });

    panels.appendChild(panel);
  });

  // Event delegation for all buttons
  document.addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;

    // Session tab
    if (btn.parentElement.id === 'sessionTabs') {
      const si = parseInt(btn.getAttribute('data-si'));
      document.querySelectorAll('.session-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('#sessionTabs button').forEach(b => b.classList.remove('active'));
      document.getElementById('sp_' + si).classList.add('active');
      btn.classList.add('active');
      return;
    }

    // Section tab
    if (btn.parentElement.classList.contains('section-tabs')) {
      const si  = parseInt(btn.getAttribute('data-si'));
      const idx = parseInt(btn.getAttribute('data-idx'));
      document.querySelectorAll('#sp_' + si + ' .section-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('#sp_' + si + ' .section-tabs button').forEach(b => b.classList.remove('active'));
      document.getElementById('sec_' + si + '_' + idx).classList.add('active');
      btn.classList.add('active');
      return;
    }

    // Code tab
    if (btn.parentElement.classList.contains('code-tabs')) {
      const ci = parseInt(btn.getAttribute('data-ci'));
      const si = parseInt(btn.getAttribute('data-si'));
      const container = btn.closest('.section-panel');
      container.querySelectorAll('.code-block').forEach(b => b.classList.remove('active'));
      container.querySelectorAll('.code-tabs button').forEach(b => b.classList.remove('active'));
      container.querySelector('#cb_' + si + '_' + ci).classList.add('active');
      btn.classList.add('active');
    }
  });
}

function buildOverview(sess) {
  return `<div class="card"><h3>${sess.title}</h3>
  <div class="ov-grid">
    <div class="ov-box"><div class="ov-label">What</div><div class="ov-text">${sess.overview.what}</div></div>
    <div class="ov-box"><div class="ov-label">Why</div><div class="ov-text">${sess.overview.why}</div></div>
    <div class="ov-box"><div class="ov-label">When</div><div class="ov-text">${sess.overview.when}</div></div>
    <div class="ov-box"><div class="ov-label">How</div><div class="ov-text">${sess.overview.how}</div></div>
  </div></div>
  <div class="flow">${sess.flow.map(f => f.a ? `<span class="flow-arrow">${f.a}</span>` : `<span class="flow-node ${f.c}">${f.t}</span>`).join('')}</div>`;
}

function buildGlossary(sess) {
  return `<div class="card"><h3>Keyword Glossary</h3>
  <table class="kw-table">
    <tr><th>Keyword / Term</th><th>Explanation</th></tr>
    ${sess.glossary.map(([k,v]) => `<tr><td><span class="kw">${k}</span></td><td>${v}</td></tr>`).join('')}
  </table></div>`;
}

function buildOneliners(sess) {
  return `<div class="card"><h3>Interview One-liners</h3>
  ${sess.oneliners.map((l,i) => `<div class="ol-item"><div class="ol-num">${i+1}</div><div class="ol-text">${l}</div></div>`).join('')}
  </div>`;
}

function buildConcepts(sess) {
  return `<div class="card"><h3>Concepts</h3>
  <div class="flow">${sess.flow.map(f => f.a ? `<span class="flow-arrow" style="font-size:16px">${f.a}</span>` : `<span class="flow-node ${f.c}">${f.t}</span>`).join('')}</div>
  <p style="margin-top:.8rem">Each concept in this session builds on the previous — master the fundamentals before moving to advanced patterns.</p>
  </div>`;
}

function buildBP(sess) {
  return `<div class="card"><h3>Best Practices</h3>
  ${sess.bestpractices.map(b => `<div class="bp-item"><span class="bp-check">✓</span><div>${b}</div></div>`).join('')}
  </div>`;
}

function buildQA(sess) {
  return `<div class="card"><h3>Interview Prep — SDET Style</h3>
  ${sess.qa.map(([q,a],i) => `<div class="qa-item"><div class="qa-q">Q${i+1}. ${q}</div><div class="qa-a">${a}</div></div>`).join('')}
  </div>`;
}

function buildCode(sess, si) {
  const tabs = sess.code.map((c,ci) =>
    `<button data-si="${si}" data-ci="${ci}" class="${ci===0?'active':''}">${c.name}</button>`
  ).join('');
  const blocks = sess.code.map((c,ci) =>
    `<div class="code-block ${ci===0?'active':''}" id="cb_${si}_${ci}">
      <span class="code-filename">${c.name}</span>
      <pre>${c.body}</pre>
    </div>`
  ).join('');
  return `<div class="card" style="padding-bottom:0"><h3 style="margin-bottom:.75rem">Code Examples — 8 Files</h3>
    <div class="code-tabs">${tabs}</div>
  </div>${blocks}`;
}

render();
</script>
