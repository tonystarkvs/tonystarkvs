bp:["Never use page.waitForTimeout() — it creates slow brittle tests; use event-based waits","Agree data-testid conventions with your dev team and enforce in PR reviews","Use stored authentication state to avoid logging in before every test","Write test names that describe failure clearly: '@smoke Login fails shows error message'","Keep test files focused — one file per feature, one describe per scenario","Run 'npx playwright codegen URL' to record interactions as a starting point (not final code)","Review Playwright release notes monthly — major features are added every quarter"],
qa:[{q:"Q1. What makes a test flaky and how do you prevent it?",a:"A flaky test sometimes passes and sometimes fails without code changes. Causes: hardcoded sleeps (use event-based waits), shared state between tests (use isolated data), timing dependencies (increase expect timeouts), environment inconsistency. Prevention: strict test isolation, data-testid selectors, proper async/await usage, and Playwright's built-in auto-waiting."},
{q:"Q2. How do you handle authentication in a large Playwright test suite?",a:"Use Playwright's storageState. Create a setup project that logs in once and saves cookies/localStorage to .auth/user.json. All test projects set 'use: { storageState: .auth/user.json }' to start every test already authenticated. Saves 2-5 seconds per test — for 100 tests that's 5-8 minutes of pipeline time saved."},
{q:"Q3. How do you test error states without breaking the real API?",a:"Use page.route() to intercept requests and return custom responses — simulate 500 errors, empty responses, slow responses, and network failures. Gives full control over edge cases hard to reproduce with real data, and tests run faster because they don't make real network calls."},
{q:"Q4. What would you improve first in a slow unreliable CI pipeline?",a:"First: identify flaky tests by looking at high retry rates in the report — fix root causes. Second: measure which jobs take longest and optimise the slowest. Third: add stored auth state to skip repeated logins. Fourth: review the matrix — are all combinations justified? Fifth: check workers setting for parallelism. Sixth: cache node_modules with actions/setup-node cache."},
{q:"Q5. How would you introduce Playwright CI to a team with no existing automation?",a:"Start with a proof of concept: 3-5 smoke tests for critical user journeys. Set up GitHub Actions with a simple push trigger. Show the team the HTML report after a run. Gradually add sanity tests as confidence grows. Add browser matrix after smoke+sanity are stable. Introduce schedule triggers and environment gates last. Key: start small, show value early, expand incrementally."}]
}
];

let cur = 0;

function buildTabs(){
  const grid = document.getElementById('tabGrid');
  if(!grid) return;
  grid.innerHTML = D.map((s,i)=>`
    <button class="tb ${i===cur?'act':''} ${s.ph==='f'?'ph-f-tab':'ph-i-tab'}" onclick="go(${i})">
      <div style="font-size:10px;color:var(--color-text-tertiary);margin-bottom:2px">${s.ph==='f'?'S'+(i+1)+' Fund.':'S'+(i+1)+' Inter.'}</div>
      ${s.t.split('—')[0].trim().substring(0,22)}
    </button>
  `).join('');
}

function buildProg(){
  const pct=Math.round(((cur+1)/D.length)*100);
  const progBar = document.getElementById('progBar');
  if(progBar) progBar.style.width=pct+'%';
  const progLabel = document.getElementById('progLabel');
  if(progLabel) progLabel.textContent='S'+(cur+1)+' / '+D.length;
  const progPct = document.getElementById('progPct');
  if(progPct) progPct.textContent=pct+'%';
}

window.toggle = function(id){
  const el=document.getElementById('qa'+cur+'_'+id);
  if(el) el.classList.toggle('op');
};

function go(i){
  if(i<0 || i>=D.length) return;
  cur=i;
  buildTabs();
  buildProg();
  buildPanel();
}

function buildPanel(){
  const s=D[cur];
  const ph=s.ph==='f'?'<span class="bdg bdg-f">Phase 1: Fundamentals</span>':'<span class="bdg bdg-i">Phase 2: Intermediate</span>';
  const panel = document.getElementById('panel');
  if(!panel) return;
  panel.innerHTML=`
    <div class="sh">
      ${ph}
      <div class="st">${s.t}</div>
      <div class="ss">${s.sub}</div>
    </div>

    <div class="sec">
      <div class="sl">Overview — What / Why / When / How</div>
      <div class="card">${s.ov}</div>
    </div>

    <div class="sec">
      <div class="sl g">Interview One-Liners — memorise these</div>
      <div class="ol-list">${s.ol.map((l,i)=>`<div class="ol-item"><span class="ol-n">${i+1}</span><span>${l}</span></div>`).join('')}</div>
    </div>

    <div class="sec">
      <div class="sl a">Architecture / Flow Diagram</div>
      <div class="diag">${s.diag}</div>
    </div>

    <div class="sec">
      <div class="sl p">Code Examples — ${s.codes.length} commented runnable examples</div>
      ${s.codes.map((c,i)=>`<div class="cl">${c.l}</div><div class="cb">${c.c.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`).join('')}
    </div>

    <div class="sec">
      <div class="sl g">Best Practices — industry checklist</div>
      <ul class="bp-ul">${s.bp.map(b=>`<li>${b}</li>`).join('')}</ul>
    </div>

    <div class="sec">
      <div class="sl c">Interview Q&A — SDET style</div>
      ${s.qa.map((q,i)=>`
        <div class="qa-wrap">
          <div class="qa-q" onclick="toggle(${i})">${q.q} <i class="ti ti-chevron-down" aria-hidden="true" style="font-size:13px;flex-shrink:0">▼</i></div>
          <div class="qa-a" id="qa${cur}_${i}">${q.a}</div>
        </div>`).join('')}
    </div>

    <div class="nav">
      ${cur>0?`<button class="nbtn" onclick="go(${cur-1})">Previous</button>`:''}
      ${cur<D.length-1?`<button class="nbtn" onclick="go(${cur+1})">Next Session</button>`:'<div class="done">Course complete! All 10 sessions covered. You have mastered GitHub Actions CI/CD with Playwright TypeScript.</div>'}
    </div>`;
}

// Ensure default functions exist
window.go = go;

buildTabs();
buildProg();
buildPanel();
</script>

    <!-- PRISM DYNAMIC HIGHLIGHT FIX -->
    <script>
    if (window.Prism) {
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new MutationObserver((mutations) => {
                let needsHighlight = false;
                mutations.forEach(m => {
                    if (m.addedNodes.length) {
                        m.addedNodes.forEach(n => {
                            if (n.nodeName === 'PRE' || n.nodeName === 'CODE') needsHighlight = true;
                            if (n.querySelector && n.querySelector('pre')) needsHighlight = true;
                        });
                    }
                });
                if (needsHighlight) {
                    Prism.highlightAll();
                }
            });
            observer.observe(document.body, { childList: true, subtree: true });
        });
    }
    </script>
