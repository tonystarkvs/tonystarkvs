    <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

      --border-color: #e2e8f0;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --success-color: #16a34a;
      
      /* Light IDE Editor Colors */
      --code-bg: #ffffff;

    }

    h2.sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;

    /* Premium Session Navigation Pills */
    .session-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
    }
    
    .stab {
      padding: 6px 14px;
      font-size: 11.5px;
      font-weight: 500;
      font-family: var(--font-sans);
      border: 1px solid var(--border-color);
      border-radius: 30px;
      background: var(--bg-card);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
    }
    
    .stab:hover {
      border-color: var(--primary-color);
      color: var(--primary-color);
      background: var(--primary-light);

    .stab.active {
      background: var(--primary-color);
      border-color: var(--primary-color);
      color: #ffffff !important;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
      transform: translateY(-1px);
    }

    /* Content Panels Layout */
    .content-panel {
      display: none;
      animation: tabFadeIn 0.35s ease;
    }
    
    .content-panel.active {
      display: block;
    }
    
    @keyframes tabFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }

    .s-head {

      border-radius: 12px;
      padding: 1.6rem 2rem;
      margin-bottom: 1.5rem;
      color: #ffffff;
      box-shadow: 0 4px 20px rgba(108, 92, 231, 0.12);
      position: relative;
      overflow: hidden;
    }
    
    .s-head::before {
      content: '';
      position: absolute;
      top: -50px;
      right: -50px;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      pointer-events: none;
    }
    
    .s-head .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: rgba(255, 255, 255, 0.2);
      color: #ffffff;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 8px;

    .s-title {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;

    .s-sub {
      font-size: 12.5px;
      color: rgba(255, 255, 255, 0.85);
      margin-top: 5px;
      line-height: 1.5;

      margin: 1.2rem 0;

      border: 1px solid var(--code-border);

      padding: 8px 16px !important;
      font-size: 11px !important;
      font-weight: 600 !important;

      background: #f6f8fa !important;

      color: #1f2328 !important;
      background: #e9ecef !important;

    .ctabs-wrap .ctab.on {

      font-weight: 700 !important;

      font-size: 11.5px !important;
      font-weight: 600 !important;
      color: #656d76 !important;
      display: inline-flex !important;
      align-items: center !important;

    .cblocks {

      display: none !important;

      display: none !important;

    @keyframes codeFadeIn {
      from { opacity: 0; }

    .cblocks pre,

      background: #ffffff !important;
      border: none !important;
      border-radius: 0 !important;
      margin: 0 !important;

      box-shadow: none !important;
      overflow-x: auto !important;
    }
    
    .cblocks pre[class*="language-"] > code[class*="language-"],
    .cblocks code,
    .cblocks code[class*="language-"] {
      background: #ffffff !important;
      color: #24292e !important;
      font-family: var(--font-mono) !important;
      font-size: 13px !important; /* Increased font-size for better readability */
      line-height: 1.65 !important;
      text-shadow: none !important;
    }

    /* High-contrast Light Code Syntax Highlighting colors for token classes */
    .cblocks .token.comment { color: #6a737d !important; font-style: italic !important; }
    .cblocks .token.punctuation { color: #24292e !important; }
    .cblocks .token.keyword { color: #0969da !important; font-weight: 700 !important; } /* Vibrant blue */
    .cblocks .token.string { color: #1a7f37 !important; } /* Vibrant green */
    .cblocks .token.number { color: #0550ae !important; }
    .cblocks .token.class-name, .cblocks .token.class { color: #953800 !important; font-weight: 700 !important; }
    .cblocks .token.function { color: #cf222e !important; font-weight: 700 !important; } /* Pink/red functions */
    .cblocks .token.operator { color: #cf222e !important; }
    .cblocks .token.annotation { color: #116329 !important; font-weight: 700 !important; }

    /* Light Code Line Numbers overrides */
    .cblocks .line-numbers .line-numbers-rows {
      border-right: 1px solid #d0d7de !important;
      background: #f6f8fa !important; /* Subtle gray background panel */
      padding-top: 1.2rem !important;
      padding-bottom: 1.2rem !important;
    }
    
    .cblocks .line-numbers-rows > span:before {
      color: #57606a !important; /* Higher contrast line numbers */
    }

    /* Q&A Accordion transition */
    .qa-q i {
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .qa-a {
      display: none;
      padding: 12px 16px;
      font-size: 12px;
      color: var(--text-main);
      line-height: 1.65;
      background: #ffffff;
      border-top: 1px solid var(--border-color);
      animation: accordionSlide 0.25s ease;
    }
    
    .qa-a.open {
      display: block;
    }
    
    @keyframes accordionSlide {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Navigation Bar */
    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 2rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--border-color);
    }
    
    .nbtn {
      padding: 7px 18px;
      font-size: 11.5px;
      font-weight: 600;
      font-family: var(--font-sans);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: #ffffff;
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }
    
    .nbtn:hover:not(:disabled) {
      border-color: var(--primary-color);
      color: var(--primary-color);
      background: var(--primary-light);
      transform: translateY(-1px);
    }
    
    .nbtn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      box-shadow: none;
    }

    .nav-progress-text {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--text-muted);
    }

    /* Fallback highlight span compatibility with higher specificity */
    .code-tab-content .kw { color: #0969da !important; font-weight: 700 !important; }
    .code-tab-content .kw2 { color: #0969da !important; }
    .code-tab-content .str { color: #1a7f37 !important; }
    .code-tab-content .cm { color: #6a737d !important; font-style: italic !important; }

    .code-tab-content .ann { color: #116329 !important; font-weight: 700 !important; }
    .code-tab-content .num { color: #0550ae !important; }
    </style>

qa:[{q:'What is the Selenium WebDriver protocol?',a:'WebDriver uses W3C standard HTTP API — Selenium client sends JSON commands to browser driver (ChromeDriver) over HTTP; driver translates to native browser calls.'},{q:'Difference between driver.close() and driver.quit()?',a:'close() closes the current tab/window only. quit() closes ALL windows AND kills the browser driver process. Always use quit() in test teardown.'},{q:'Can Selenium automate desktop apps?',a:'No. Selenium is web-browser-only. For desktop use Appium, SikuliX, or WinAppDriver. For mobile use Appium.'},{q:'What are the 4 Selenium components?',a:'1) IDE — record/replay extension. 2) WebDriver — browser automation API. 3) RC — legacy deprecated. 4) Grid — parallel/distributed execution.'},{q:'Why declare as WebDriver interface not ChromeDriver?',a:'Interface declaration enables polymorphism — swap to FirefoxDriver with one line change. All helper methods remain browser-agnostic.'}]

<span class="cm">// Step 4 — ChromeDriver calls Chrome DevTools Protocol</span>
<span class="cm">// Chrome executes click → returns 200 OK</span>`},

best:['Always declare WebDriver driver — not ChromeDriver — for browser-agnostic code','driver.quit() sends DELETE /session — kills browser + frees port','RemoteWebDriver is the only concrete WebDriver impl — all drivers extend it','W3C compliance means same HTTP API across all browsers — predictable behavior','JSON Wire Protocol (Sel3) replaced by W3C standard (Sel4) — more stable'],
qa:[{q:'What is RemoteWebDriver?',a:'RemoteWebDriver is the concrete class that implements WebDriver interface and handles all HTTP communication with the browser driver. ChromeDriver, FirefoxDriver extend it.'},{q:'Why declare as WebDriver not ChromeDriver?',a:'WebDriver is the interface contract — declaring as it enables polymorphism. Swap ChromeDriver to FirefoxDriver with one line, zero other changes.'},{q:'What port does ChromeDriver use?',a:'Random available port by default. Use ChromeDriverService.Builder().usingPort(9515) to fix it. Selenium sends all commands to this port.'},{q:'What is W3C WebDriver standard?',a:'International standard defining the HTTP REST API for browser automation. Selenium 4 is fully compliant — replaced the Selenium-custom JSON Wire Protocol.'},{q:'What happens on driver.quit()?',a:'Selenium sends DELETE /session to ChromeDriver. ChromeDriver closes all browser windows, kills the Chrome process, and terminates itself. ThreadLocal.remove() should follow.'}]
},

qa:[{q:'What is Selenium Manager?',a:'Built-in CLI tool in Selenium 4.6+ that detects browser version and auto-downloads matching driver. Eliminates manual System.setProperty("webdriver.chrome.driver",path) calls.'},{q:'Why does Chrome crash in Docker without --no-sandbox?',a:'Docker runs as root. Chrome refuses root for security. --no-sandbox disables Chrome sandbox (which requires non-root), allowing it to run in Docker/CI environments.'},{q:'What does --disable-dev-shm-usage do?',a:'Docker limits /dev/shm to 64MB. Chrome uses it heavily and crashes without this flag, which forces Chrome to use /tmp for shared memory instead.'},{q:'Which Java version does Selenium 4 require?',a:'Java 8 minimum. Java 11 LTS recommended. Java 17 LTS is the current enterprise standard. Selenium 4 uses Java 8+ features internally.'},{q:'How do you run Firefox headlessly?',a:'FirefoxOptions ff = new FirefoxOptions(); ff.addArguments("--headless"); WebDriver driver = new FirefoxDriver(ff); — works on Linux CI without display.'}]
},
{id:4,ph:'f',title:'Locator Strategies',sub:'By.id · By.css · By.xpath · By.name · By.tagName · priority order',
spoken:['A locator is the address Selenium uses to find a DOM element — like GPS coordinates for an HTML element.','I always prefer By.id first — direct hash map lookup, O(1) speed, and W3C HTML spec guarantees uniqueness.','CSS selectors are faster than XPath and more readable — I use attribute selectors like input[type="submit"] regularly.','XPath is my last resort — powerful for axes navigation but slower due to full DOM traversal.','I verify all locators in Chrome DevTools console before writing code: $$("#id") for CSS, $x("//input") for XPath.'],
codes:[
{t:'All locator types',c:`<span class="cm">// By.id — fastest, most reliable</span>
driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"loginBtn"</span>));

<span class="cm">// By.name — HTML name attribute</span>
driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">name</span>(<span class="str">"username"</span>));

<span class="cm">// By.className — SINGLE class only (compound throws exception)</span>
driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">className</span>(<span class="str">"primary-btn"</span>));

<span class="cm">// By.tagName — returns all of that element type</span>
List&lt;WebElement&gt; links = driver.<span class="fn">findElements</span>(<span class="cl">By</span>.<span class="fn">tagName</span>(<span class="str">"a"</span>));

<span class="cm">// By.linkText and By.partialLinkText</span>
driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">linkText</span>(<span class="str">"Sign In"</span>));
driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">partialLinkText</span>(<span class="str">"Sign"</span>));`},
{t:'CSS selectors',c:`<span class="cm">// CSS selector reference — faster than XPath</span>
<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"#loginBtn"</span>)            <span class="cm">// id = #</span>
<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">".primary-btn"</span>)        <span class="cm">// class = .</span>
<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"input[type='submit']"</span>)  <span class="cm">// attribute exact</span>
<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"input[id*='user']"</span>)    <span class="cm">// *=  contains</span>
<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"input[id^='log']"</span>)     <span class="cm">// ^=  starts with</span>
<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"input[id$='name']"</span>)    <span class="cm">// $=  ends with</span>
<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"div.form > input"</span>)     <span class="cm">// direct child</span>
<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"p + span"</span>)              <span class="cm">// adjacent sibling</span>
<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"li:nth-child(2)"</span>)       <span class="cm">// 2nd list item</span>
<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">".btn.active.primary"</span>)   <span class="cm">// multiple classes</span>`},
{t:'XPath patterns',c:`<span class="cm">// ALWAYS use relative XPath — starts with //</span>
<span class="cm">// NEVER use absolute XPath — /html/body/div[1]/... (brittle)</span>

<span class="cl">By</span>.<span class="fn">xpath</span>(<span class="str">"//*[@id='loginBtn']"</span>)             <span class="cm">// any tag, by id</span>
<span class="cl">By</span>.<span class="fn">xpath</span>(<span class="str">"//input[@type='submit']"</span>)          <span class="cm">// tag + attribute</span>
<span class="cl">By</span>.<span class="fn">xpath</span>(<span class="str">"//button[text()='Login']"</span>)          <span class="cm">// exact text</span>
<span class="cl">By</span>.<span class="fn">xpath</span>(<span class="str">"//button[contains(text(),'Log')]"</span>)  <span class="cm">// partial text</span>
<span class="cl">By</span>.<span class="fn">xpath</span>(<span class="str">"//button[normalize-space()='Login']"</span>)<span class="cm">// trim whitespace</span>

<span class="cm">// XPath axes — DOM relationship navigation:</span>
<span class="cl">By</span>.<span class="fn">xpath</span>(<span class="str">"//label[text()='Email']/following-sibling::input"</span>)
<span class="cl">By</span>.<span class="fn">xpath</span>(<span class="str">"//input[@id='email']/parent::div"</span>)
<span class="cl">By</span>.<span class="fn">xpath</span>(<span class="str">"//table/tbody/tr[2]/td[3]"</span>)        <span class="cm">// row 2, col 3</span>`},
{t:'findElement vs findElements',c:`<span class="cm">// findElement — single element, throws NoSuchElementException if 0</span>
WebElement btn = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"submit"</span>));

<span class="cm">// findElements — List, returns EMPTY LIST if 0 (no exception!)</span>
List&lt;WebElement&gt; rows = driver.<span class="fn">findElements</span>(<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"table tr"</span>));
System.out.<span class="fn">println</span>(<span class="str">"Row count: "</span> + rows.size());

<span class="cm">// Safe existence check — no try-catch needed:</span>
<span class="kw">boolean</span> hasError = !driver.<span class="fn">findElements</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"errorMsg"</span>)).isEmpty();

<span class="cm">// Iterate all links on page:</span>
driver.<span class="fn">findElements</span>(<span class="cl">By</span>.<span class="fn">tagName</span>(<span class="str">"a"</span>))
      .<span class="fn">forEach</span>(a -&gt; System.out.<span class="fn">println</span>(a.<span class="fn">getText</span>() + <span class="str">" → "</span> + a.<span class="fn">getAttribute</span>(<span class="str">"href"</span>)));`},
{t:'Dynamic & data-testid',c:`<span class="cm">// data-testid — most stable locator in React/Vue/Angular apps</span>
<span class="cm">// Add to HTML: &lt;button data-testid="login-btn"&gt;Login&lt;/button&gt;</span>
driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"[data-testid='login-btn']"</span>));

<span class="cm">// Dynamic id (changes each load) — avoid, use class or data attr:</span>
<span class="cm">// BAD:  By.id("j_idt_123")  — changes every page load</span>
<span class="cm">// GOOD: By.cssSelector("[data-testid='form-submit']")</span>
<span class="cm">// GOOD: By.xpath("//button[text()='Submit']")</span>

<span class="cm">// Verify locators in DevTools console BEFORE coding:</span>
<span class="cm">// CSS:   $$("[data-testid='login-btn']")  → should return 1 element</span>
<span class="cm">// XPath: $x("//button[text()='Submit']")  → should return 1 element</span>`}
],
best:['Verify XPath/CSS in DevTools console before writing code: $$("") or $x("")','Never use absolute XPath — brittle, breaks on any DOM structure change','By.className("btn active") throws InvalidSelectorException — use cssSelector(".btn.active")','data-testid attributes are the most stable locators — advocate adding them with devs','Store locators as By fields in Page classes, never as inline literals in test methods'],
qa:[{q:'Which locator is fastest?',a:'By.id() — browser does a direct hash map lookup. By.cssSelector() is next. By.xpath() is slowest — requires full DOM tree traversal.'},{q:'Absolute vs relative XPath?',a:'Absolute: /html/body/div[1]/input — very brittle. Relative: //input[@id="email"] — robust, starts with // to search anywhere in DOM. Always use relative.'},{q:'Why does By.className fail with multiple classes?',a:'Selenium\'s By.className treats the argument as a single class name. "btn active" (with space) is treated as one class name. Use By.cssSelector(".btn.active") for compound classes.'},{q:'When would you use By.tagName?',a:'For collecting all elements of a type: all links By.tagName("a"), all rows By.tagName("tr"), all inputs. Rarely used for finding a single specific element.'},{q:'What does findElements return when nothing matches?',a:'An empty List<WebElement> — no exception. This makes findElements().isEmpty() the cleanest way to safely check element existence without try-catch.'}]
},
{id:5,ph:'i',title:'WebElement API',sub:'click · sendKeys · getText · getAttribute · isDisplayed · Select',
spoken:['WebElement is the Selenium interface representing a single DOM element — all interactions go through its methods.','getText() returns visible text content between tags; getAttribute("value") returns the form input value — completely different purposes.','I use isDisplayed() before visual assertions and elementToBeClickable() wait before all click operations.','The Select class wraps native HTML select dropdowns — selectByVisibleText, selectByValue, selectByIndex are the three methods.','getCssValue() verifies computed CSS — I use it to assert colors, font sizes, and display states in visual regression tests.'],
codes:[
{t:'Core interactions',c:`<span class="cm">// Always clear before sendKeys to avoid appending to existing text</span>
WebElement email = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"email"</span>));
email.<span class="fn">clear</span>();                         <span class="cm">// clear existing text first</span>
email.<span class="fn">sendKeys</span>(<span class="str">"user@test.com"</span>);      <span class="cm">// type text</span>
email.<span class="fn">sendKeys</span>(<span class="cl">Keys</span>.TAB);              <span class="cm">// press Tab key</span>
email.<span class="fn">sendKeys</span>(<span class="cl">Keys</span>.CONTROL, <span class="str">"a"</span>);   <span class="cm">// Ctrl+A select all</span>
email.<span class="fn">sendKeys</span>(<span class="cl">Keys</span>.ENTER);            <span class="cm">// press Enter</span>

driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"submit"</span>)).<span class="fn">click</span>();   <span class="cm">// click</span>
driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"email"</span>)).<span class="fn">submit</span>();   <span class="cm">// submit form</span>`},
{t:'State checks',c:`<span class="cm">// State checking methods — all return boolean</span>
WebElement btn = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"submit"</span>));
WebElement chk = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"agree"</span>));

<span class="kw">boolean</span> visible  = btn.<span class="fn">isDisplayed</span>(); <span class="cm">// visible on screen (not hidden)</span>
<span class="kw">boolean</span> enabled  = btn.<span class="fn">isEnabled</span>();  <span class="cm">// not disabled="disabled"</span>
<span class="kw">boolean</span> selected = chk.<span class="fn">isSelected</span>(); <span class="cm">// checkbox/radio/option checked</span>

<span class="cm">// Assertions in test:</span>
<span class="kw">if</span> (!btn.<span class="fn">isEnabled</span>())
  System.out.<span class="fn">println</span>(<span class="str">"FAIL: Submit button is disabled"</span>);
<span class="kw">if</span> (!btn.<span class="fn">isDisplayed</span>())
  System.out.<span class="fn">println</span>(<span class="str">"FAIL: Button not visible on screen"</span>);`},
{t:'Property reads',c:`<span class="cm">// Reading element properties</span>
WebElement h1   = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">tagName</span>(<span class="str">"h1"</span>));
WebElement link = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"a.nav"</span>));
WebElement inp  = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"email"</span>));

String text        = h1.<span class="fn">getText</span>();                    <span class="cm">// visible inner text</span>
String href        = link.<span class="fn">getAttribute</span>(<span class="str">"href"</span>);        <span class="cm">// URL attribute</span>
String placeholder = inp.<span class="fn">getAttribute</span>(<span class="str">"placeholder"</span>);  <span class="cm">// placeholder text</span>
String typedValue  = inp.<span class="fn">getAttribute</span>(<span class="str">"value"</span>);        <span class="cm">// typed content</span>

],
best:['Always clear() before sendKeys() — prevents appending to existing input content','getText() returns empty string for hidden elements — use getAttribute("textContent") instead','Use Select class for native <select> only — custom dropdowns need click + findElement','isDisplayed() = visible on screen; isEnabled() = not disabled — both needed before click assertions','getCssValue("color") returns computed rgba — normalize before comparing colors in assertions'],
qa:[{q:'Difference between getText() and getAttribute("value")?',a:'getText() returns visible inner text between HTML tags. getAttribute("value") returns the value attribute — required for reading what user has typed into input fields.'},{q:'What does isDisplayed() return for a hidden element?',a:'false — isDisplayed() checks both DOM presence AND CSS visibility (display, visibility, opacity, size). Returns true only when element is visible on screen.'},{q:'How do you handle multi-select dropdowns?',a:'Select drop = new Select(el); drop.selectByVisibleText("A"); drop.selectByVisibleText("B"); Multiple calls select multiple options. Use getAllSelectedOptions() to verify.'},{q:'What exception does Select throw for non-select elements?',a:'UnexpectedTagNameException — thrown when you wrap a non-<select> element with Select class. Always verify the element is a native HTML <select> tag first.'},{q:'What is getRect() in Selenium 4?',a:'Returns a Rectangle object containing x, y position and width, height in one call — combining getLocation() and getSize(). Added in Selenium 4 for convenience.'}]
},
{id:6,ph:'i',title:'Waits & Synchronization',sub:'Implicit · Explicit · FluentWait · ExpectedConditions · Duration API',
spoken:['Missing waits cause 80% of flaky tests — synchronization is the most critical Selenium skill to master.','I never use Thread.sleep — explicit wait polls adaptively and returns as soon as the condition is met.','Implicit wait is a global setting; explicit wait targets one specific element condition — never mix them in the same suite.','WebDriverWait polls every 500ms; FluentWait lets me customize polling interval and exceptions to ignore.','My rule: always use elementToBeClickable before any click — it checks both visibility and enabledness simultaneously.'],
codes:[
{t:'Implicit wait',c:`<span class="cm">// Implicit wait — set ONCE, applies to ALL findElement calls</span>
WebDriver driver = <span class="kw">new</span> <span class="cl">ChromeDriver</span>();
driver.<span class="fn">manage</span>().<span class="fn">timeouts</span>()
      .<span class="fn">implicitlyWait</span>(Duration.<span class="fn">ofSeconds</span>(<span class="num">10</span>)); <span class="cm">// Selenium 4 Duration API</span>

<span class="cm">// Now ALL findElement calls wait up to 10s before throwing:</span>
WebElement btn = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"submit"</span>)); <span class="cm">// waits up to 10s</span>

<span class="cm">// Other timeouts:</span>
driver.<span class="fn">manage</span>().<span class="fn">timeouts</span>().<span class="fn">pageLoadTimeout</span>(Duration.<span class="fn">ofSeconds</span>(<span class="num">30</span>));
driver.<span class="fn">manage</span>().<span class="fn">timeouts</span>().<span class="fn">scriptTimeout</span>(Duration.<span class="fn">ofSeconds</span>(<span class="num">30</span>));

<span class="cm">// WARNING: NEVER mix implicit + explicit waits in same framework</span>`},
{t:'Explicit wait',c:`<span class="kw">import</span> org.openqa.selenium.support.ui.WebDriverWait;
<span class="kw">import</span> org.openqa.selenium.support.ui.ExpectedConditions;

<span class="cm">// Selenium 4 — MUST use Duration (int constructor removed)</span>
WebDriverWait wait = <span class="kw">new</span> <span class="cl">WebDriverWait</span>(driver, Duration.<span class="fn">ofSeconds</span>(<span class="num">10</span>));

<span class="cm">// Custom polling (Selenium 4):</span>
WebDriverWait wait2 = <span class="kw">new</span> <span class="cl">WebDriverWait</span>(driver,
    Duration.<span class="fn">ofSeconds</span>(<span class="num">15</span>),   <span class="cm">// max timeout</span>
    Duration.<span class="fn">ofMillis</span>(<span class="num">300</span>)); <span class="cm">// poll every 300ms</span>

<span class="cm">// Most used conditions:</span>
wait.<span class="fn">until</span>(EC.<span class="fn">elementToBeClickable</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"btn"</span>))).<span class="fn">click</span>();
wait.<span class="fn">until</span>(EC.<span class="fn">visibilityOfElementLocated</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"msg"</span>)));
wait.<span class="fn">until</span>(EC.<span class="fn">invisibilityOfElementLocated</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"spinner"</span>)));
wait.<span class="fn">until</span>(EC.<span class="fn">urlContains</span>(<span class="str">"dashboard"</span>));`},
{t:'FluentWait',c:`Wait&lt;WebDriver&gt; fw = <span class="kw">new</span> <span class="cl">FluentWait</span>&lt;&gt;(driver)
    .<span class="fn">withTimeout</span>(Duration.<span class="fn">ofSeconds</span>(<span class="num">30</span>))      <span class="cm">// max wait</span>
    .<span class="fn">pollingEvery</span>(Duration.<span class="fn">ofSeconds</span>(<span class="num">2</span>))       <span class="cm">// check every 2s</span>
    .<span class="fn">ignoring</span>(<span class="cl">NoSuchElementException</span>.<span class="kw">class</span>)   <span class="cm">// retry if not found</span>
    .<span class="fn">ignoring</span>(<span class="cl">StaleElementReferenceException</span>.<span class="kw">class</span>) <span class="cm">// retry if stale</span>
    .<span class="fn">withMessage</span>(<span class="str">"Element not found after 30 seconds"</span>);

<span class="cm">// Lambda — return null to retry, non-null to complete:</span>
fw.<span class="fn">until</span>(d -&gt; {
    List&lt;WebElement&gt; rows = d.<span class="fn">findElements</span>(<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"tr.data"</span>));
    <span class="kw">return</span> rows.size() &gt;= <span class="num">5</span> ? rows : <span class="kw">null</span>; <span class="cm">// null = keep polling</span>
});`},
{t:'All EC conditions',c:`<span class="cm">// Presence vs Visibility:</span>
EC.<span class="fn">presenceOfElementLocated</span>(by)         <span class="cm">// in DOM, may be hidden</span>
EC.<span class="fn">visibilityOfElementLocated</span>(by)        <span class="cm">// in DOM AND visible</span>
EC.<span class="fn">invisibilityOfElementLocated</span>(by)      <span class="cm">// hidden or removed</span>
EC.<span class="fn">visibilityOfAllElementsLocatedBy</span>(by)  <span class="cm">// ALL visible</span>

<span class="cm">// State:</span>
EC.<span class="fn">elementToBeClickable</span>(by)              <span class="cm">// visible + enabled</span>
EC.<span class="fn">stalenessOf</span>(webElement)               <span class="cm">// DOM detached</span>
EC.<span class="fn">elementToBeSelected</span>(webElement)       <span class="cm">// checkbox checked</span>

<span class="cm">// Text/URL/Title:</span>
EC.<span class="fn">textToBePresentInElement</span>(el, <span class="str">"text"</span>)  <span class="cm">// text in element</span>
EC.<span class="fn">urlContains</span>(<span class="str">"dashboard"</span>)              <span class="cm">// URL partial match</span>
EC.<span class="fn">titleIs</span>(<span class="str">"My App"</span>)                     <span class="cm">// exact title</span>
EC.<span class="fn">alertIsPresent</span>()                      <span class="cm">// alert visible</span>
EC.<span class="fn">numberOfWindowsToBe</span>(<span class="num">2</span>)               <span class="cm">// 2 windows open</span>`},
{t:'Compound conditions',c:`<span class="cm">// AND — ALL conditions must pass simultaneously:</span>
wait.<span class="fn">until</span>(EC.<span class="fn">and</span>(
    EC.<span class="fn">visibilityOfElementLocated</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"header"</span>)),
    EC.<span class="fn">visibilityOfElementLocated</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"content"</span>)),
    EC.<span class="fn">elementToBeClickable</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"submit"</span>))
));

<span class="cm">// OR — any ONE passes:</span>
wait.<span class="fn">until</span>(EC.<span class="fn">or</span>(
    EC.<span class="fn">visibilityOfElementLocated</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"successMsg"</span>)),
    EC.<span class="fn">visibilityOfElementLocated</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"errorMsg"</span>))
));

<span class="cm">// NOT — condition must be FALSE:</span>
wait.<span class="fn">until</span>(EC.<span class="fn">not</span>(EC.<span class="fn">visibilityOfElementLocated</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"spinner"</span>))));

<span class="cm">// Custom lambda:</span>
wait.<span class="fn">until</span>(d -&gt; js.<span class="fn">executeScript</span>(<span class="str">"return document.readyState"</span>).<span class="fn">equals</span>(<span class="str">"complete"</span>));`}
],
best:['Duration.ofSeconds() is mandatory in Selenium 4 — int constructor was removed','Never mix implicit + explicit waits — they interact and cause unpredictable timeouts','elementToBeClickable is the safest condition before any click action','Return null (not false) from FluentWait lambda to continue polling','withMessage() on FluentWait saves hours of debugging — always set a meaningful failure description'],
qa:[{q:'Difference between implicit and explicit wait?',a:'Implicit: global setting, applies to all findElement calls, set once. Explicit: targeted, applies to specific condition on specific element per call. Never mix them.'},{q:'Why is Thread.sleep bad?',a:'It always waits the full fixed duration regardless of element state. Explicit wait returns immediately when condition is met — faster tests, same reliability.'},{q:'What is the new Duration API in Selenium 4?',a:'java.time.Duration replaces TimeUnit. new WebDriverWait(driver, Duration.ofSeconds(10)). The old new WebDriverWait(driver, 10) int constructor was removed in Selenium 4.'},{q:'What does FluentWait.ignoring() do?',a:'Tells FluentWait to catch and suppress specified exceptions during polling instead of throwing immediately. Allows retrying through NoSuchElementException and StaleElementReferenceException.'},{q:'When does FluentWait throw TimeoutException?',a:'When the maximum timeout duration expires without the lambda returning a non-null value. The withMessage() text appears in the TimeoutException for debugging.'}]
},
{id:7,ph:'i',title:'Advanced Interactions',sub:'Actions class · iFrames · Alerts · Multiple windows · JS Executor',
spoken:['The Actions class builds complex mouse+keyboard gesture chains that element.click() simply cannot handle.','iFrame handling requires switchTo().frame() before any element interaction inside it — then defaultContent() to return.','Browser alerts block all Selenium commands until handled — always use alertIsPresent() wait before switchTo().alert().','JavascriptExecutor is my escape hatch for hidden elements, readonly inputs, custom events, and localStorage access.','Selenium 4 added native scroll methods to Actions — scrollToElement and scrollByAmount are W3C compliant and reliable.'],
codes:[
{t:'Actions mouse',c:`<span class="cl">Actions</span> a = <span class="kw">new</span> <span class="cl">Actions</span>(driver);

<span class="cm">// Hover to reveal dropdown:</span>
a.<span class="fn">moveToElement</span>(driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"navMenu"</span>))).<span class="fn">perform</span>();

<span class="cm">// Right-click (context menu):</span>
a.<span class="fn">contextClick</span>(element).<span class="fn">perform</span>();

<span class="cm">// Double-click:</span>
a.<span class="fn">doubleClick</span>(element).<span class="fn">perform</span>();

<span class="cm">// Drag and drop:</span>
a.<span class="fn">dragAndDrop</span>(source, target).<span class="fn">perform</span>();

<span class="cm">// Slow drag (stubborn apps — add pause):</span>
a.<span class="fn">clickAndHold</span>(source)
 .<span class="fn">pause</span>(Duration.<span class="fn">ofMillis</span>(<span class="num">500</span>)) <span class="cm">// Selenium 4 pause</span>
 .<span class="fn">moveToElement</span>(target)
 .<span class="fn">release</span>().<span class="fn">perform</span>();`},
{t:'Keyboard combos',c:`<span class="cl">Actions</span> a = <span class="kw">new</span> <span class="cl">Actions</span>(driver);

<span class="cm">// Select all text in input:</span>
a.<span class="fn">click</span>(input)
 .<span class="fn">keyDown</span>(<span class="cl">Keys</span>.CONTROL).<span class="fn">sendKeys</span>(<span class="str">"a"</span>).<span class="fn">keyUp</span>(<span class="cl">Keys</span>.CONTROL)
 .<span class="fn">perform</span>();

<span class="cm">// Ctrl+C then Ctrl+V:</span>
a.<span class="fn">keyDown</span>(<span class="cl">Keys</span>.CONTROL).<span class="fn">sendKeys</span>(<span class="str">"c"</span>).<span class="fn">keyUp</span>(<span class="cl">Keys</span>.CONTROL)
 .<span class="fn">click</span>(otherInput)
 .<span class="fn">keyDown</span>(<span class="cl">Keys</span>.CONTROL).<span class="fn">sendKeys</span>(<span class="str">"v"</span>).<span class="fn">keyUp</span>(<span class="cl">Keys</span>.CONTROL)
 .<span class="fn">perform</span>();

<span class="cm">// Shift+Click range select:</span>
a.<span class="fn">click</span>(firstRow)
 .<span class="fn">keyDown</span>(<span class="cl">Keys</span>.SHIFT).<span class="fn">click</span>(lastRow)
 .<span class="fn">keyUp</span>(<span class="cl">Keys</span>.SHIFT).<span class="fn">perform</span>();`},
{t:'iFrames + Alerts',c:`<span class="cm">// iFrame — switch context, interact, return</span>
driver.<span class="fn">switchTo</span>().<span class="fn">frame</span>(<span class="str">"frameName"</span>);      <span class="cm">// by name attr</span>
driver.<span class="fn">switchTo</span>().<span class="fn">frame</span>(<span class="num">0</span>);               <span class="cm">// by 0-based index</span>
driver.<span class="fn">switchTo</span>().<span class="fn">frame</span>(iframeElement);  <span class="cm">// by WebElement</span>
<span class="cm">// Interact with elements inside frame here</span>
driver.<span class="fn">switchTo</span>().<span class="fn">defaultContent</span>();      <span class="cm">// back to main page</span>
driver.<span class="fn">switchTo</span>().<span class="fn">parentFrame</span>();         <span class="cm">// up one level (nested)</span>

<span class="cm">// Alerts:</span>
wait.<span class="fn">until</span>(EC.<span class="fn">alertIsPresent</span>());
<span class="cl">Alert</span> alert = driver.<span class="fn">switchTo</span>().<span class="fn">alert</span>();
String msg = alert.<span class="fn">getText</span>();            <span class="cm">// read message</span>
alert.<span class="fn">accept</span>();                           <span class="cm">// click OK</span>
<span class="cm">// alert.dismiss() = Cancel</span>
<span class="cm">// alert.sendKeys("text") = prompt input</span>`},
{t:'JS Executor',c:`<span class="cl">JavascriptExecutor</span> js = (<span class="cl">JavascriptExecutor</span>) driver;

<span class="cm">// Scroll to bottom of page:</span>
js.<span class="fn">executeScript</span>(<span class="str">"window.scrollTo(0, document.body.scrollHeight)"</span>);

<span class="cm">// Click element that is hidden from Selenium:</span>
js.<span class="fn">executeScript</span>(<span class="str">"arguments[0].click();"</span>, element);

<span class="cm">// Set value on readonly date picker:</span>
js.<span class="fn">executeScript</span>(<span class="str">"arguments[0].value='2024-01-01';"</span>, datePicker);

<span class="cm">// Read localStorage token:</span>
String token = (String) js.<span class="fn">executeScript</span>(<span class="str">"return localStorage.getItem('authToken')"</span>);

<span class="cm">// Wait for page to fully load:</span>
wait.<span class="fn">until</span>(d -&gt; js.<span class="fn">executeScript</span>(<span class="str">"return document.readyState"</span>).<span class="fn">equals</span>(<span class="str">"complete"</span>));`},
{t:'Scroll (Selenium 4)',c:`<span class="kw">import</span> org.openqa.selenium.interactions.WheelInput.ScrollOrigin;
<span class="cl">Actions</span> a = <span class="kw">new</span> <span class="cl">Actions</span>(driver);

<span class="cm">// Scroll element into viewport (W3C, Selenium 4):</span>
a.<span class="fn">scrollToElement</span>(element).<span class="fn">perform</span>();

<span class="cm">// Scroll by pixel amount from current position:</span>
a.<span class="fn">scrollByAmount</span>(<span class="num">0</span>, <span class="num">500</span>).<span class="fn">perform</span>();    <span class="cm">// down 500px</span>
a.<span class="fn">scrollByAmount</span>(<span class="num">0</span>, -<span class="num">300</span>).<span class="fn">perform</span>();  <span class="cm">// up 300px</span>
a.<span class="fn">scrollByAmount</span>(<span class="num">200</span>, <span class="num">0</span>).<span class="fn">perform</span>();   <span class="cm">// right 200px</span>

<span class="cm">// Scroll from element origin:</span>
ScrollOrigin origin = ScrollOrigin.<span class="fn">fromElement</span>(element);
a.<span class="fn">scrollFromOrigin</span>(origin, <span class="num">0</span>, <span class="num">200</span>).<span class="fn">perform</span>(); <span class="cm">// 200px down from el</span>`}
],
best:['Always call .perform() — action chain is silently discarded without it','switchTo().defaultContent() after every iFrame interaction — context stays in frame otherwise','Use alertIsPresent() wait before switchTo().alert() — NoAlertPresentException otherwise','JS click is last resort only — bypasses visibility checks and is less user-realistic','scrollToElement() (Selenium 4) is W3C compliant — prefer over JS scrollIntoView'],
qa:[{q:'What happens if you forget to call perform()?',a:'Nothing executes. The Actions class builds a queue of actions internally — perform() is what sends them to the browser. Omitting it silently discards the entire chain.'},{q:'Why must you switch back after iFrame interaction?',a:'Selenium context remains inside the iFrame. All subsequent findElement calls fail with NoSuchElementException because they still look inside the frame, not the main document.'},{q:'How do you handle nested iFrames?',a:'Switch to outer frame first, then inner: driver.switchTo().frame("outer"); driver.switchTo().frame("inner"). Use parentFrame() to go up one level without going all the way to defaultContent().'},{q:'When would you use JS click vs element.click()?',a:'JS click only when element.click() throws ElementNotInteractableException or ElementClickInterceptedException and you cannot resolve the root cause. JS bypasses all Selenium event model.'},{q:'What is scrollToElement() in Selenium 4?',a:'New W3C WebDriver Actions method that sends a wheel scroll to bring an element into the viewport. More reliable than JS scrollIntoView and part of the W3C spec.'}]
},
{id:8,ph:'i',title:'Selenium Exceptions',sub:'NoSuchElement · StaleElement · Timeout · ClickIntercepted — all types & fixes',
spoken:['All Selenium exceptions extend WebDriverException — knowing the hierarchy lets me catch the right exception at the right level.','StaleElementReferenceException means my DOM was rebuilt — I fix it by storing By not WebElement, and using stalenessOf() wait.','ElementNotInteractableException means the element is in DOM but covered, hidden, or animating — I wait for elementToBeClickable.','ElementClickInterceptedException is usually a cookie banner or modal overlay — I dismiss it first and retry the original click.','I always take a screenshot before catching exceptions — once driver.quit() is called the browser state is lost forever.'],
codes:[
{t:'NoSuchElement fix',c:`<span class="cm">// NoSuchElementException — causes & fixes</span>
<span class="cm">// Causes: wrong locator, not yet loaded, inside iframe, wrong tab</span>

<span class="cm">// Fix 1: Add explicit wait</span>
WebElement el = wait.<span class="fn">until</span>(EC.<span class="fn">presenceOfElementLocated</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"data"</span>)));

<span class="cm">// Fix 2: Safe existence check (no exception)</span>
<span class="kw">boolean</span> exists = !driver.<span class="fn">findElements</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"errorMsg"</span>)).isEmpty();

<span class="cm">// Fix 3: Check if inside iFrame</span>
driver.<span class="fn">switchTo</span>().<span class="fn">frame</span>(<span class="str">"content"</span>);
driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"innerEl"</span>));

<span class="cm">// Fix 4: Verify locator in DevTools console:</span>
<span class="cm">// $$('#data')          → CSS</span>
<span class="cm">// $x('//input[@id]')  → XPath</span>`},
{t:'StaleElement fix',c:`<span class="cm">// StaleElementReferenceException — DOM was rebuilt after capture</span>
<span class="cm">// Cause: AJAX update, page refresh, navigation, DOM rebuild</span>

<span class="cm">// Fix 1: Wait for staleness then re-find</span>
driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"refresh"</span>)).<span class="fn">click</span>();
wait.<span class="fn">until</span>(EC.<span class="fn">stalenessOf</span>(oldElement));           <span class="cm">// wait for death</span>
WebElement fresh = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"result"</span>)); <span class="cm">// fresh find</span>

<span class="cm">// Fix 2: Store By not WebElement (always fresh)</span>
By btnLocator = <span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"submit"</span>);              <span class="cm">// store the locator</span>
driver.<span class="fn">findElement</span>(btnLocator).<span class="fn">click</span>();        <span class="cm">// fresh each time</span>

<span class="cm">// Fix 3: FluentWait ignoring stale</span>
fw.<span class="fn">until</span>(d -&gt; { d.<span class="fn">findElement</span>(btnLocator).<span class="fn">click</span>(); <span class="kw">return true</span>; });`},
{t:'Click exceptions',c:`<span class="cm">// ElementNotInteractableException</span>
<span class="cm">// — element hidden, covered, animating, or in off-screen area</span>
wait.<span class="fn">until</span>(EC.<span class="fn">elementToBeClickable</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"btn"</span>))).<span class="fn">click</span>();

<span class="cm">// ElementClickInterceptedException</span>
<span class="cm">// — cookie banner / modal is covering the target element</span>
<span class="kw">try</span> {
    element.<span class="fn">click</span>();
} <span class="kw">catch</span> (<span class="cl">ElementClickInterceptedException</span> e) {
    driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"cookieBanner"</span>)).<span class="fn">click</span>(); <span class="cm">// dismiss</span>
    element.<span class="fn">click</span>(); <span class="cm">// retry</span>
}
<span class="cm">// Last resort — JS click:</span>
((<span class="cl">JavascriptExecutor</span>)driver).<span class="fn">executeScript</span>(<span class="str">"arguments[0].click()"</span>, element);`},
{t:'Alert & window exceptions',c:`<span class="cm">// UnhandledAlertException — alert appeared during other action</span>
<span class="kw">try</span> {
    driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"save"</span>)).<span class="fn">click</span>();
} <span class="kw">catch</span> (<span class="cl">UnhandledAlertException</span> e) {
    System.out.<span class="fn">println</span>(<span class="str">"Alert text: "</span> + e.<span class="fn">getAlertText</span>());
    driver.<span class="fn">switchTo</span>().<span class="fn">alert</span>().<span class="fn">accept</span>(); <span class="cm">// handle it</span>
}

<span class="cm">// NoAlertPresentException — guard with explicit wait:</span>
wait.<span class="fn">until</span>(EC.<span class="fn">alertIsPresent</span>());      <span class="cm">// wait first</span>
driver.<span class="fn">switchTo</span>().<span class="fn">alert</span>().<span class="fn">accept</span>();  <span class="cm">// then interact</span>

<span class="cm">// NoSuchWindowException — after close() without switchTo():</span>
driver.<span class="fn">close</span>();
driver.<span class="fn">switchTo</span>().<span class="fn">window</span>(mainHandle); <span class="cm">// MANDATORY after close()</span>`},
{t:'Timeout & selector exceptions',c:`<span class="cm">// TimeoutException — explicit wait max duration exceeded</span>
<span class="kw">try</span> {
    wait.<span class="fn">until</span>(EC.<span class="fn">visibilityOfElementLocated</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"slowEl"</span>)));
} <span class="kw">catch</span> (<span class="cl">TimeoutException</span> e) {
    <span class="cl">ScreenshotUtil</span>.<span class="fn">capture</span>(driver, <span class="str">"timeout_failure"</span>); <span class="cm">// screenshot!</span>
    System.out.<span class="fn">println</span>(<span class="str">"URL at failure: "</span> + driver.<span class="fn">getCurrentUrl</span>());
}

<span class="cm">// InvalidSelectorException — bad XPath/CSS syntax</span>
<span class="cm">// WRONG: By.xpath("//div[@class=active]")  ← missing quotes</span>
<span class="cm">// RIGHT: By.xpath("//div[@class='active']")</span>

<span class="cm">// SessionNotCreatedException — driver/browser version mismatch</span>
<span class="cm">// Fix: Use Selenium Manager (4.6+) — auto-matches versions</span>`}
],
best:['Store By locators not WebElement references — prevents StaleElementReference on reuse','Always screenshot before driver.quit() in catch blocks — browser state is gone after quit','Catch specific exceptions not broad WebDriverException — handle each appropriately','ElementClickInterceptedException → find overlay, dismiss it, then retry the original click','SessionNotCreatedException → driver/browser version mismatch — let Selenium Manager fix it'],
qa:[{q:'What causes StaleElementReferenceException?',a:'DOM modified after WebElement was captured — AJAX update, page refresh, navigation, or dynamic DOM rebuild. Fix: store By not WebElement, re-find each time, or use FluentWait ignoring stale.'},{q:'Difference between NoSuchElementException and TimeoutException?',a:'NoSuchElement fires immediately when findElement cannot locate. TimeoutException fires after explicit wait maximum duration expires without condition becoming true.'},{q:'How to check element exists without try-catch?',a:'boolean exists = !driver.findElements(By.id("el")).isEmpty() — findElements returns empty List (never throws), making isEmpty() check clean and exception-free.'},{q:'What causes InvalidSelectorException?',a:'Malformed XPath or CSS syntax. Example: //div[@class=active] missing quotes around value. Always test locators in DevTools console before coding them.'},{q:'When is UnhandledAlertException thrown?',a:'When Selenium performs any WebDriver command while a browser alert is open. Fix: detect alerts proactively with EC.alertIsPresent() wait and handle before continuing.'}]
},
{id:9,ph:'a',title:'Selenium 4 Setup & Options',sub:'W3C compliance · ChromeOptions · FirefoxOptions · SafariOptions · EdgeOptions',
spoken:['Selenium 4 is fully W3C compliant — it uses browser-native HTTP APIs and replaced the old Selenium-custom JSON Wire Protocol.','I use ChromeOptions not DesiredCapabilities — Options classes are W3C-standard, type-safe, and IDE-autocomplete friendly.','Selenium Manager in 4.6+ auto-downloads the correct browser driver — I removed all System.setProperty calls from my framework.','PageLoadStrategy.EAGER speeds up tests on heavy pages by returning after DOMContentLoaded instead of waiting for all assets.','excludeSwitches + useAutomationExtension=false removes the automation banner — important for screenshot-based visual tests.'],
codes:[
{t:'ChromeOptions full config',c:`<span class="cl">ChromeOptions</span> opts = <span class="kw">new</span> <span class="cl">ChromeOptions</span>();

<span class="cm">// === HEADLESS (Linux CI) ===</span>
opts.<span class="fn">addArguments</span>(<span class="str">"--headless=new"</span>);        <span class="cm">// new headless Chrome 112+</span>
opts.<span class="fn">addArguments</span>(<span class="str">"--no-sandbox"</span>);           <span class="cm">// Docker/root required</span>
opts.<span class="fn">addArguments</span>(<span class="str">"--disable-dev-shm-usage"</span>); <span class="cm">// memory fix</span>
opts.<span class="fn">addArguments</span>(<span class="str">"--disable-gpu"</span>);

<span class="cm">// === W3C CAPABILITIES ===</span>
opts.<span class="fn">setAcceptInsecureCerts</span>(<span class="kw">true</span>);
opts.<span class="fn">setPageLoadStrategy</span>(<span class="cl">PageLoadStrategy</span>.EAGER);
opts.<span class="fn">setPlatformName</span>(<span class="str">"linux"</span>);

<span class="cm">// === WINDOW ===</span>
opts.<span class="fn">addArguments</span>(<span class="str">"--start-maximized"</span>);
opts.<span class="fn">addArguments</span>(<span class="str">"--window-size=1920,1080"</span>);

WebDriver driver = <span class="kw">new</span> <span class="cl">ChromeDriver</span>(opts);`},
{t:'Prefs + experimental',c:`<span class="cl">ChromeOptions</span> opts = <span class="kw">new</span> <span class="cl">ChromeOptions</span>();

<span class="cm">// Remove "Chrome is controlled by automated software" bar:</span>
opts.<span class="fn">setExperimentalOption</span>(<span class="str">"excludeSwitches"</span>,
    Arrays.<span class="fn">asList</span>(<span class="str">"enable-automation"</span>));
opts.<span class="fn">setExperimentalOption</span>(<span class="str">"useAutomationExtension"</span>, <span class="kw">false</span>);

<span class="cm">// Download settings (no dialog):</span>
Map&lt;String,Object&gt; prefs = <span class="kw">new</span> HashMap&lt;&gt;();
prefs.<span class="fn">put</span>(<span class="str">"download.default_directory"</span>, <span class="str">"/home/user/downloads"</span>);
prefs.<span class="fn">put</span>(<span class="str">"download.prompt_for_download"</span>, <span class="kw">false</span>);
prefs.<span class="fn">put</span>(<span class="str">"profile.default_content_setting_values.notifications"</span>, <span class="num">2</span>);
prefs.<span class="fn">put</span>(<span class="str">"profile.default_content_setting_values.geolocation"</span>, <span class="num">2</span>);
opts.<span class="fn">setExperimentalOption</span>(<span class="str">"prefs"</span>, prefs);`},
{t:'FirefoxOptions',c:`<span class="cl">FirefoxOptions</span> ff = <span class="kw">new</span> <span class="cl">FirefoxOptions</span>();

<span class="cm">// Headless Firefox:</span>
ff.<span class="fn">addArguments</span>(<span class="str">"--headless"</span>);
ff.<span class="fn">addArguments</span>(<span class="str">"--width=1920"</span>);
ff.<span class="fn">addArguments</span>(<span class="str">"--height=1080"</span>);

<span class="cm">// W3C caps:</span>
ff.<span class="fn">setAcceptInsecureCerts</span>(<span class="kw">true</span>);
ff.<span class="fn">setPageLoadStrategy</span>(<span class="cl">PageLoadStrategy</span>.EAGER);

<span class="cm">// Firefox preferences directly:</span>
ff.<span class="fn">addPreference</span>(<span class="str">"browser.download.folderList"</span>, <span class="num">2</span>);
ff.<span class="fn">addPreference</span>(<span class="str">"browser.download.dir"</span>, <span class="str">"/downloads"</span>);
ff.<span class="fn">addPreference</span>(<span class="str">"browser.helperApps.neverAsk.saveToDisk"</span>, <span class="str">"application/pdf"</span>);
ff.<span class="fn">addPreference</span>(<span class="str">"dom.webnotifications.enabled"</span>, <span class="kw">false</span>);

WebDriver driver = <span class="kw">new</span> <span class="cl">FirefoxDriver</span>(ff);`},
{t:'EdgeOptions + SafariOptions',c:`<span class="cm">// EdgeOptions — Chromium-based, most Chrome args work:</span>
<span class="cl">EdgeOptions</span> edge = <span class="kw">new</span> <span class="cl">EdgeOptions</span>();
edge.<span class="fn">addArguments</span>(<span class="str">"--headless=new"</span>);
edge.<span class="fn">addArguments</span>(<span class="str">"--no-sandbox"</span>);
edge.<span class="fn">setAcceptInsecureCerts</span>(<span class="kw">true</span>);
WebDriver edgeDriver = <span class="kw">new</span> <span class="cl">EdgeDriver</span>(edge);

<span class="cm">// SafariOptions — macOS ONLY, no headless:</span>
<span class="cm">// 1. Enable: Safari → Develop → Allow Remote Automation</span>
<span class="cm">// 2. Terminal: safaridriver --enable</span>
<span class="cl">SafariOptions</span> safari = <span class="kw">new</span> <span class="cl">SafariOptions</span>();
safari.<span class="fn">setUseTechnologyPreview</span>(<span class="kw">false</span>);
safari.<span class="fn">setAutomaticInspection</span>(<span class="kw">false</span>);
WebDriver safariDriver = <span class="kw">new</span> <span class="cl">SafariDriver</span>(safari);`},
{t:'Mobile emulation',c:`<span class="cm">// Chrome mobile device emulation:</span>
<span class="cl">ChromeOptions</span> opts = <span class="kw">new</span> <span class="cl">ChromeOptions</span>();

<span class="cm">// By device name (from Chrome DevTools device list):</span>
Map&lt;String,String&gt; mobile = <span class="kw">new</span> HashMap&lt;&gt;();
mobile.<span class="fn">put</span>(<span class="str">"deviceName"</span>, <span class="str">"Pixel 5"</span>);
opts.<span class="fn">setExperimentalOption</span>(<span class="str">"mobileEmulation"</span>, mobile);

<span class="cm">// Or by custom dimensions:</span>
Map&lt;String,Object&gt; metrics = <span class="kw">new</span> HashMap&lt;&gt;();
metrics.<span class="fn">put</span>(<span class="str">"width"</span>, <span class="num">390</span>); metrics.<span class="fn">put</span>(<span class="str">"height"</span>, <span class="num">844</span>);
metrics.<span class="fn">put</span>(<span class="str">"pixelRatio"</span>, 3.0); metrics.<span class="fn">put</span>(<span class="str">"touch"</span>, <span class="kw">true</span>);
Map&lt;String,Object&gt; emu = <span class="kw">new</span> HashMap&lt;&gt;();
emu.<span class="fn">put</span>(<span class="str">"deviceMetrics"</span>, metrics);
emu.<span class="fn">put</span>(<span class="str">"userAgent"</span>, <span class="str">"Mozilla/5.0 (iPhone; CPU iPhone OS 15_0)"</span>);
opts.<span class="fn">setExperimentalOption</span>(<span class="str">"mobileEmulation"</span>, emu);`}
],
best:['Use ChromeOptions — DesiredCapabilities is deprecated in Selenium 4 and will be removed','--headless=new uses GPU compositor matching headed Chrome — better than legacy --headless','All prefs go inside setExperimentalOption("prefs", map) — not as individual arguments','Safari: no headless support, macOS only, one session at a time — plan test distribution','EdgeOptions inherits most ChromeOptions args — Edge is Chromium-based'],
qa:[{q:'Why is DesiredCapabilities deprecated in Selenium 4?',a:'DesiredCapabilities was a Selenium-custom protocol layer not aligned with W3C. Browser-specific Options classes (ChromeOptions etc.) are W3C-compliant, type-safe, and IDE-friendly.'},{q:'What is PageLoadStrategy.EAGER?',a:'Selenium returns control after DOMContentLoaded fires — before images/stylesheets finish loading. Faster for tests that only interact with text and buttons, not images.'},{q:'How do you suppress file download dialog in Chrome?',a:'prefs.put("download.prompt_for_download", false); prefs.put("download.default_directory", "/path"); wrapped in setExperimentalOption("prefs", prefs) in ChromeOptions.'},{q:'What does excludeSwitches("enable-automation") do?',a:'Removes the "Chrome is being controlled by automated test software" infobar. Combine with setExperimentalOption("useAutomationExtension", false) for clean screenshots.'},{q:'How does SafariDriver differ from ChromeDriver?',a:'SafariDriver is built into macOS — no binary to download. Supports only one session at a time. No headless mode. Must enable "Allow Remote Automation" in Safari Develop menu.'}]
},
{id:10,ph:'a',title:'Relative Locators & CDP',sub:'above · below · near · toLeftOf · toRightOf · Chrome DevTools Protocol',
spoken:['Relative Locators find elements by pixel-based spatial position relative to another element — not DOM tree relationship.','I use Relative Locators for unlabeled inputs in legacy forms — find the input visually to the right of a label element.','CDP gives me direct browser internals access — network interception, geolocation mocking, console logs, Basic Auth.','HasAuthentication.register() handles Basic Auth dialogs automatically — no Alert.accept() workaround needed.','CDP version import must match Chrome major version — I use HasCdp.executeCdpCommand() to avoid version coupling.'],
codes:[
{t:'Relative Locators',c:`<span class="kw">import static</span> org.openqa.selenium.support.locators.<span class="cl">RelativeLocator</span>.with;

<span class="cm">// Find input to the right of the Email label:</span>
WebElement emailLabel = driver.<span class="fn">findElement</span>(
    <span class="cl">By</span>.<span class="fn">xpath</span>(<span class="str">"//label[text()='Email']"</span>));
WebElement emailInput = driver.<span class="fn">findElement</span>(
    <span class="fn">with</span>(<span class="cl">By</span>.<span class="fn">tagName</span>(<span class="str">"input"</span>)).<span class="fn">toRightOf</span>(emailLabel));
emailInput.<span class="fn">sendKeys</span>(<span class="str">"user@test.com"</span>);

<span class="cm">// Find password field above submit button:</span>
WebElement submit = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"submit"</span>));
WebElement pwd = driver.<span class="fn">findElement</span>(
    <span class="fn">with</span>(<span class="cl">By</span>.<span class="fn">tagName</span>(<span class="str">"input"</span>)).<span class="fn">above</span>(submit));
pwd.<span class="fn">sendKeys</span>(<span class="str">"Secret123"</span>);`},
{t:'Relative Locator chaining',c:`<span class="cm">// above() below() toLeftOf() toRightOf() near()</span>

<span class="cm">// near() — within 50px in any direction:</span>
WebElement editBtn = driver.<span class="fn">findElement</span>(
    <span class="fn">with</span>(<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"button.edit"</span>)).<span class="fn">near</span>(johnRowLabel));

<span class="cm">// Chain multiple conditions (both must be true):</span>
WebElement precise = driver.<span class="fn">findElement</span>(
    <span class="fn">with</span>(<span class="cl">By</span>.<span class="fn">tagName</span>(<span class="str">"input"</span>))
        .<span class="fn">above</span>(submitBtn)
        .<span class="fn">toRightOf</span>(sideLabel));

<span class="cm">// Table: find delete button in same row as John's cell:</span>
WebElement johnCell = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">xpath</span>(<span class="str">"//td[text()='John']"</span>));
WebElement del = driver.<span class="fn">findElement</span>(
    <span class="fn">with</span>(<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"button.delete"</span>)).<span class="fn">toRightOf</span>(johnCell));`},
{t:'CDP setup',c:`<span class="kw">import</span> org.openqa.selenium.devtools.DevTools;

<span class="cl">ChromeDriver</span> driver = <span class="kw">new</span> <span class="cl">ChromeDriver</span>();
DevTools devTools = driver.<span class="fn">getDevTools</span>();
devTools.<span class="fn">createSession</span>(); <span class="cm">// REQUIRED before any send()</span>

<span class="cm">// Simple CDP via HasCdp (version-agnostic):</span>
<span class="cl">HasCdp</span> cdp = (<span class="cl">HasCdp</span>) driver;
Map&lt;String,Object&gt; res = cdp.<span class="fn">executeCdpCommand</span>(
    <span class="str">"Network.enable"</span>, Map.<span class="fn">of</span>());

<span class="cm">// Basic Auth — no popup needed:</span>
((<span class="cl">HasAuthentication</span>)driver).<span class="fn">register</span>(
    uri -&gt; uri.<span class="fn">getHost</span>().<span class="fn">contains</span>(<span class="str">"myapp.com"</span>),
    <span class="cl">UsernameAndPassword</span>.<span class="fn">of</span>(<span class="str">"admin"</span>, <span class="str">"pass"</span>));`},
{t:'CDP network + console',c:`<span class="kw">import</span> org.openqa.selenium.devtools.v120.*;

devTools.<span class="fn">send</span>(<span class="cl">Network</span>.<span class="fn">enable</span>(empty,empty,empty));

<span class="cm">// Listen to all network requests:</span>
devTools.<span class="fn">addListener</span>(<span class="cl">Network</span>.<span class="fn">requestWillBeSent</span>(), req -&gt;
    System.out.<span class="fn">println</span>(<span class="str">"→ "</span> + req.<span class="fn">getRequest</span>().<span class="fn">getUrl</span>()));

<span class="cm">// Block images (speed up tests):</span>
devTools.<span class="fn">send</span>(<span class="cl">Network</span>.<span class="fn">setBlockedURLs</span>(List.<span class="fn">of</span>(<span class="str">"*.png"</span>,<span class="str">"*.jpg"</span>,<span class="str">"*.gif"</span>)));

<span class="cm">// Console log capture:</span>
devTools.<span class="fn">send</span>(<span class="cl">Log</span>.<span class="fn">enable</span>());
List&lt;String&gt; logs = <span class="kw">new</span> ArrayList&lt;&gt;();
devTools.<span class="fn">addListener</span>(<span class="cl">Log</span>.<span class="fn">entryAdded</span>(), e -&gt;
    logs.<span class="fn">add</span>(e.<span class="fn">getLevel</span>() + <span class="str">": "</span> + e.<span class="fn">getText</span>()));`},
{t:'CDP geolocation + performance',c:`<span class="kw">import</span> org.openqa.selenium.devtools.v120.emulation.Emulation;
<span class="kw">import</span> org.openqa.selenium.devtools.v120.performance.Performance;

<span class="cm">// Mock geolocation to Mumbai:</span>
devTools.<span class="fn">send</span>(<span class="cl">Emulation</span>.<span class="fn">setGeolocationOverride</span>(
    Optional.<span class="fn">of</span>(<span class="num">19.076</span>),  <span class="cm">// latitude</span>
    Optional.<span class="fn">of</span>(<span class="num">72.877</span>),  <span class="cm">// longitude</span>
    Optional.<span class="fn">of</span>(<span class="num">1.0</span>)      <span class="cm">// accuracy meters</span>
));

<span class="cm">// Performance metrics:</span>
devTools.<span class="fn">send</span>(<span class="cl">Performance</span>.<span class="fn">enable</span>(Optional.empty()));
driver.<span class="fn">get</span>(<span class="str">"https://app.com"</span>);
devTools.<span class="fn">send</span>(<span class="cl">Performance</span>.<span class="fn">getMetrics</span>())
       .<span class="fn">forEach</span>(m -&gt; System.out.<span class="fn">println</span>(m.<span class="fn">getName</span>()+<span class="str">": "</span>+m.<span class="fn">getValue</span>()));`}
],
best:['Static import RelativeLocator.with for clean with(By.tagName("input")).above(el) syntax','near() radius is fixed at 50px — use directional locators for precision','Always createSession() before any DevTools send() — NullPointerException otherwise','CDP v120 import must match Chrome major version — use HasCdp for version-agnostic calls','HasAuthentication.register() eliminates all Basic Auth popup handling code'],
qa:[{q:'What are Relative Locators in Selenium 4?',a:'Find elements by spatial/visual position relative to another element using bounding box pixel positions — above(), below(), toLeftOf(), toRightOf(), near(). Not DOM-tree based.'},{q:'What is the near() radius?',a:'50 pixels in any direction. Fixed, cannot be customized. Use directional locators (toRightOf, above) when near() matches too many elements.'},{q:'What interface provides CDP in Selenium 4?',a:'ChromeDriver implements HasDevTools providing getDevTools(). Also HasCdp for executeCdpCommand(). Both are Chromium-only — not available on FirefoxDriver.'},{q:'How does HasAuthentication work?',a:'((HasAuthentication)driver).register(uriPredicate, UsernameAndPassword.of("user","pass")) — Selenium intercepts matching requests and adds Basic Auth header automatically, no alert needed.'},{q:'Why does CDP import version matter?',a:'CDP API versions change with Chrome releases. org.openqa.selenium.devtools.v120 must match Chrome major version. Use HasCdp.executeCdpCommand() for version-agnostic one-off calls.'}]
},
{id:11,ph:'a',title:'newWindow() & newTab()',sub:'WindowType.TAB · WindowType.WINDOW · multi-tab workflows · handle management',
spoken:['Selenium 4 added driver.switchTo().newWindow(WindowType.TAB) — opening new tabs without JavaScript workarounds.','After newWindow() Selenium automatically switches to the new tab — no manual handle detection needed unlike Selenium 3.','I always store the original window handle BEFORE calling newWindow() — it is the only reliable way to switch back.','After driver.close() I immediately switchTo() a remaining handle — context is lost and any command throws NoSuchWindowException.','driver.quit() closes ALL tabs and kills the driver — only call it in @AfterMethod teardown, never mid-test.'],
codes:[
{t:'newWindow TAB',c:`<span class="kw">import</span> org.openqa.selenium.WindowType;

<span class="cm">// Store original tab handle BEFORE opening new one</span>
String original = driver.<span class="fn">getWindowHandle</span>();
driver.<span class="fn">get</span>(<span class="str">"https://app.com"</span>);

<span class="cm">// Open new TAB — Selenium auto-switches to it:</span>
driver.<span class="fn">switchTo</span>().<span class="fn">newWindow</span>(<span class="cl">WindowType</span>.TAB);
driver.<span class="fn">get</span>(<span class="str">"https://app.com/admin"</span>);
System.out.<span class="fn">println</span>(<span class="str">"New tab: "</span> + driver.<span class="fn">getTitle</span>());

<span class="cm">// Switch back to original tab:</span>
driver.<span class="fn">switchTo</span>().<span class="fn">window</span>(original);
System.out.<span class="fn">println</span>(<span class="str">"Back: "</span> + driver.<span class="fn">getTitle</span>());`},
{t:'newWindow WINDOW',c:`<span class="cm">// Open new BROWSER WINDOW (separate OS window):</span>
String mainWindow = driver.<span class="fn">getWindowHandle</span>();

driver.<span class="fn">switchTo</span>().<span class="fn">newWindow</span>(<span class="cl">WindowType</span>.WINDOW);
driver.<span class="fn">get</span>(<span class="str">"https://admin.app.com"</span>);
driver.<span class="fn">manage</span>().<span class="fn">window</span>().<span class="fn">maximize</span>();

String data = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"report"</span>)).<span class="fn">getText</span>();

<span class="cm">// Close new window — MUST switchTo after close():</span>
driver.<span class="fn">close</span>();                          <span class="cm">// close current window</span>
driver.<span class="fn">switchTo</span>().<span class="fn">window</span>(mainWindow);   <span class="cm">// MANDATORY immediately after</span>`},
{t:'Selenium 3 vs 4',c:`<span class="cm">// SELENIUM 3 — open new tab via JS (workaround):</span>
((<span class="cl">JavascriptExecutor</span>)driver).<span class="fn">executeScript</span>(<span class="str">"window.open()"</span>);
Set&lt;String&gt; handles = driver.<span class="fn">getWindowHandles</span>();
String newTab = handles.stream()
    .<span class="fn">filter</span>(h -&gt; !h.<span class="fn">equals</span>(original))
    .<span class="fn">findFirst</span>().<span class="fn">orElse</span>(<span class="str">""</span>);
driver.<span class="fn">switchTo</span>().<span class="fn">window</span>(newTab); <span class="cm">// manual detection</span>

<span class="cm">// SELENIUM 4 — clean built-in API:</span>
driver.<span class="fn">switchTo</span>().<span class="fn">newWindow</span>(<span class="cl">WindowType</span>.TAB); <span class="cm">// auto-switches</span>
driver.<span class="fn">get</span>(<span class="str">"https://newpage.com"</span>);            <span class="cm">// already in new tab</span>`},
{t:'Multi-tab workflow',c:`<span class="cm">// Price comparison across 3 tabs:</span>
String tab1 = driver.<span class="fn">getWindowHandle</span>();
driver.<span class="fn">get</span>(<span class="str">"https://shop1.com/product"</span>);
String p1 = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"price"</span>)).<span class="fn">getText</span>();

qa:[{q:'What is new about tab/window API in Selenium 4?',a:'driver.switchTo().newWindow(WindowType.TAB/WINDOW) — opens and auto-switches. In Selenium 3 this required JS window.open() plus manual getWindowHandles() iteration to find the new handle.'},{q:'Does newWindow() return the new handle?',a:'No — it switches context but does not return a handle. Call driver.getWindowHandle() after newWindow() if you need to store the new tab\'s handle.'},{q:'What happens if you forget switchTo() after close()?',a:'NoSuchWindowException on any subsequent command. The browser still has open tabs but Selenium\'s context points to the closed window. Always switchTo() immediately after close().'},{q:'How do you close all extra tabs?',a:'Iterate driver.getWindowHandles(), switchTo() each handle that is not mainHandle, call close(), then switchTo(mainHandle) to restore context after the loop.'},{q:'Difference between WindowType.TAB and WindowType.WINDOW?',a:'TAB opens in the same browser window as a new tab. WINDOW opens a separate OS-level browser window. Both auto-switch Selenium context to the new page — behavioral difference is visual only.'}]
