{id:12,ph:'a',title:'Page Object Model',sub:'POM pattern · BasePage · PageFactory · @FindBy · framework design',
spoken:['POM is a design pattern where each web page has a dedicated Java class containing its locators and interaction methods.','When UI changes I update only the Page class — not every test — reducing maintenance effort at scale dramatically.','I always pass driver from the test into the Page constructor — the Page never creates the driver, tests control lifecycle.','PageFactory @FindBy annotations create lazy proxy WebElements initialized by initElements() in the BasePage constructor.','BasePage holds shared driver, WebDriverWait, and utility methods — all page classes extend it for shared infrastructure.'],
codes:[
{t:'LoginPage POM',c:`<span class="kw">public class</span> <span class="cl">LoginPage</span> {
  <span class="kw">private</span> WebDriver driver;

  <span class="cm">// Locators as By fields — stored once, reused everywhere</span>
  <span class="kw">private</span> By usernameField = <span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"username"</span>);
  <span class="kw">private</span> By passwordField = <span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"password"</span>);
  <span class="kw">private</span> By loginBtn     = <span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"loginBtn"</span>);
  <span class="kw">private</span> By errorMsg     = <span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">".error-message"</span>);

  <span class="kw">public</span> <span class="fn">LoginPage</span>(WebDriver driver) { <span class="kw">this</span>.driver = driver; }

  <span class="kw">public</span> <span class="cl">HomePage</span> <span class="fn">login</span>(String user, String pass) {
    driver.<span class="fn">findElement</span>(usernameField).<span class="fn">sendKeys</span>(user);
    driver.<span class="fn">findElement</span>(passwordField).<span class="fn">sendKeys</span>(pass);
    driver.<span class="fn">findElement</span>(loginBtn).<span class="fn">click</span>();
    <span class="kw">return new</span> <span class="cl">HomePage</span>(driver); <span class="cm">// return next page</span>
  }

  <span class="kw">public</span> String <span class="fn">getErrorMessage</span>() {
    <span class="kw">return</span> driver.<span class="fn">findElement</span>(errorMsg).<span class="fn">getText</span>();
  }
}`},
{t:'PageFactory @FindBy',c:`<span class="kw">import</span> org.openqa.selenium.support.FindBy;
<span class="kw">import</span> org.openqa.selenium.support.PageFactory;

<span class="kw">public class</span> <span class="cl">LoginPage</span> {
  <span class="cm">// @FindBy creates lazy proxy — initializes on first use</span>
  <span class="ann">@FindBy</span>(id = <span class="str">"username"</span>)        <span class="kw">private</span> WebElement usernameField;
  <span class="ann">@FindBy</span>(id = <span class="str">"password"</span>)        <span class="kw">private</span> WebElement passwordField;
  <span class="ann">@FindBy</span>(id = <span class="str">"loginBtn"</span>)        <span class="kw">private</span> WebElement loginBtn;
  <span class="ann">@FindBy</span>(css = <span class="str">".error-message"</span>) <span class="kw">private</span> WebElement errorMsg;

  <span class="kw">public</span> <span class="fn">LoginPage</span>(WebDriver driver) {
    <span class="cl">PageFactory</span>.<span class="fn">initElements</span>(driver, <span class="kw">this</span>); <span class="cm">// initialize proxies</span>
  }

  <span class="kw">public void</span> <span class="fn">login</span>(String user, String pass) {
    usernameField.<span class="fn">sendKeys</span>(user);
    passwordField.<span class="fn">sendKeys</span>(pass);
    loginBtn.<span class="fn">click</span>();
  }
}`},
{t:'BasePage',c:`<span class="kw">public abstract class</span> <span class="cl">BasePage</span> {
  <span class="kw">protected</span> WebDriver driver;
  <span class="kw">protected</span> WebDriverWait wait;

  <span class="kw">public</span> <span class="fn">BasePage</span>(WebDriver driver) {
    <span class="kw">this</span>.driver = driver;
    <span class="kw">this</span>.wait   = <span class="kw">new</span> <span class="cl">WebDriverWait</span>(driver, Duration.<span class="fn">ofSeconds</span>(<span class="num">15</span>));
    <span class="cl">PageFactory</span>.<span class="fn">initElements</span>(driver, <span class="kw">this</span>); <span class="cm">// init @FindBy fields</span>
  }

  <span class="kw">protected</span> WebElement <span class="fn">waitVisible</span>(<span class="cl">By</span> by) {
    <span class="kw">return</span> wait.<span class="fn">until</span>(EC.<span class="fn">visibilityOfElementLocated</span>(by));
  }
  <span class="kw">protected void</span> <span class="fn">click</span>(<span class="cl">By</span> by) {
    wait.<span class="fn">until</span>(EC.<span class="fn">elementToBeClickable</span>(by)).<span class="fn">click</span>();
  }
  <span class="kw">protected void</span> <span class="fn">type</span>(<span class="cl">By</span> by, String text) {
    WebElement el = <span class="fn">waitVisible</span>(by); el.<span class="fn">clear</span>(); el.<span class="fn">sendKeys</span>(text);
  }
}`},
{t:'Test using POM',c:`<span class="kw">public class</span> <span class="cl">LoginTest</span> <span class="kw">extends</span> <span class="cl">BaseTest</span> {

  <span class="ann">@Test</span>
  <span class="kw">public void</span> <span class="fn">successfulLoginTest</span>() {
    <span class="cm">// Test reads like a user story — no raw Selenium</span>
    <span class="cl">LoginPage</span> loginPage = <span class="kw">new</span> <span class="cl">LoginPage</span>(driver);
    <span class="cl">HomePage</span>  homePage  = loginPage.<span class="fn">login</span>(<span class="str">"admin@test.com"</span>, <span class="str">"Pass123"</span>);

    assert driver.<span class="fn">getTitle</span>().<span class="fn">contains</span>(<span class="str">"Dashboard"</span>) : <span class="str">"Title mismatch"</span>;
  }

  <span class="ann">@Test</span>
  <span class="kw">public void</span> <span class="fn">invalidLoginTest</span>() {
    <span class="cl">LoginPage</span> loginPage = <span class="kw">new</span> <span class="cl">LoginPage</span>(driver);
    loginPage.<span class="fn">login</span>(<span class="str">"wrong@test.com"</span>, <span class="str">"badpass"</span>);

    String error = loginPage.<span class="fn">getErrorMessage</span>();
    assert error.<span class="fn">contains</span>(<span class="str">"Invalid credentials"</span>) : <span class="str">"Error: "</span> + error;
  }
}`},
{t:'DriverFactory + BaseTest',c:`<span class="kw">public class</span> <span class="cl">DriverFactory</span> {
  <span class="kw">private static</span> ThreadLocal&lt;WebDriver&gt; tl = <span class="kw">new</span> ThreadLocal&lt;&gt;();

  <span class="kw">public static</span> WebDriver <span class="fn">init</span>(String browser) {
    <span class="kw">switch</span>(browser) {
      <span class="kw">case</span> <span class="str">"chrome"</span>:  tl.<span class="fn">set</span>(<span class="kw">new</span> <span class="cl">ChromeDriver</span>()); <span class="kw">break</span>;
      <span class="kw">case</span> <span class="str">"firefox"</span>: tl.<span class="fn">set</span>(<span class="kw">new</span> <span class="cl">FirefoxDriver</span>()); <span class="kw">break</span>;
    }
    <span class="fn">get</span>().<span class="fn">manage</span>().<span class="fn">window</span>().<span class="fn">maximize</span>();
    <span class="kw">return</span> <span class="fn">get</span>();
  }
  <span class="kw">public static</span> WebDriver <span class="fn">get</span>()  { <span class="kw">return</span> tl.<span class="fn">get</span>(); }
  <span class="kw">public static void</span>    <span class="fn">quit</span>() { tl.<span class="fn">get</span>().<span class="fn">quit</span>(); tl.<span class="fn">remove</span>(); }
}

<span class="kw">public class</span> <span class="cl">BaseTest</span> {
  <span class="kw">protected</span> WebDriver driver;
  <span class="ann">@BeforeMethod</span> <span class="kw">public void</span> <span class="fn">setUp</span>()   { driver = <span class="cl">DriverFactory</span>.<span class="fn">init</span>(<span class="cl">ConfigReader</span>.<span class="fn">get</span>(<span class="str">"browser"</span>)); }
  <span class="ann">@AfterMethod</span>  <span class="kw">public void</span> <span class="fn">tearDown</span>() { <span class="cl">DriverFactory</span>.<span class="fn">quit</span>(); }
}`}

qa:[{q:'What is the Page Object Model?',a:'Design pattern where each web page has a dedicated Java class with its element locators and interaction methods. Tests call page methods; pages manage all WebDriver interactions.'},{q:'What is PageFactory.initElements()?',a:'Creates lazy WebElement proxy objects for @FindBy annotated fields. The proxy calls driver.findElement() only when the field is first accessed — not at construction time.'},{q:'Why should tests have no raw Selenium code?',a:'When UI changes, you update one Page class not every test. Tests reading loginPage.login(user, pass) are readable and maintainable; tests with raw By.id("username") are not.'},{q:'What is the difference between POM and PageFactory?',a:'POM is the design pattern concept. PageFactory is Selenium\'s built-in tool for implementing POM using @FindBy annotations. You can implement POM without PageFactory using By fields.'},{q:'Why use ThreadLocal<WebDriver> in DriverFactory?',a:'Each parallel thread needs its own driver. ThreadLocal ensures thread-A\'s get() always returns thread-A\'s driver. Without it parallel tests crash with concurrent browser interactions.'}]

let cur=0;

function build(){
  const bar=document.getElementById('tabs');
  const panels=document.getElementById('panels');
  DATA.forEach((s,i)=>{
    const ph=PH[s.ph];
    const btn=document.createElement('button');
    btn.className='stab'+(i===0?' active':'');
    btn.textContent='S'+s.id;
    btn.title=s.title;
    btn.onclick=()=>go(i);
    btn.style.borderLeft = `3.5px solid ${ph.col}`;
    bar.appendChild(btn);

    const div=document.createElement('div');
    div.className='content-panel'+(i===0?' active':'');
    div.id=`session-${s.id}`;
    div.innerHTML=render(s,i);
    panels.appendChild(div);
  });
}

function render(s,i){
  const ph=PH[s.ph];
  const spoken=s.spoken.map((l,idx)=>`
    <div class="oneliner">
      <div class="vr-ol-label">Interview One-liner #${idx + 1}</div>
      <p>${l}</p>
    </div>`).join('');
  const ctabs=s.codes.map((c,j)=>`
    <button class="ctab${j===0?' on':''}" onclick="switchC(this,${i},${j})">
      <span class="fxt">.java</span>${c.t}
    </button>`).join('');
  const cblocks=s.codes.map((c,j)=>{
    const filename = c.t.toLowerCase().replace(/\s+/g, '_') + '.java';
    return `
    <div class="code-tab-content${j===0?' on':''}">
      <div class="ide-header">
        <div class="ide-title"><span class="ide-dot"></span>${filename}</div>
        <button class="cpbtn" onclick="copyCode(this)">Copy</button>
      </div>
      <pre class="line-numbers"><code class="language-java">${c.c}</code></pre>
    </div>`;
  }).join('');
  const checks=`<ul class="bp-list">` + s.best.map(b=>`<li><span class="vr-bp-icon">✓</span><span>${b}</span></li>`).join('') + `</ul>`;
  const qas=s.qa.map(q=>`<div class="qa-item"><div class="qa-q" onclick="toggleQ(this)">${q.q}<i class="ti ti-chevron-down" style="font-size:12px;" aria-hidden="true"></i></div><div class="qa-a">${q.a}</div></div>`).join('');
  return `
<div class="s-head">
  <span class="badge" style="background:${ph.bg};color:${ph.col}">${ph.label} · S${s.id} of ${DATA.length}</span>
  <div class="s-title">${s.title}</div>
  <div class="s-sub">${s.sub}</div>
</div>
<div class="section-label"><i class="ti ti-message-circle" aria-hidden="true"></i>Spoken interview one-liners</div>
${spoken}
<div class="section-label"><i class="ti ti-code" aria-hidden="true"></i>Code examples — click tabs below to switch code context</div>
<div class="ctabs-wrap">
  <div class="ctab-bar">${ctabs}</div>
  <div class="cblocks">${cblocks}</div>
</div>
<div class="section-label"><i class="ti ti-checklist" aria-hidden="true"></i>Best practices</div>
${checks}
<div class="section-label"><i class="ti ti-help-circle" aria-hidden="true"></i>Interview Q&A (click to expand)</div>
${qas}
<div class="nav-bar">
  <button class="nbtn" onclick="go(${i-1})" ${i===0?'disabled':''}>← Prev</button>
  <span class="nav-progress-text">Session ${i+1} / ${DATA.length}</span>
  <button class="nbtn" onclick="go(${i+1})" ${i===DATA.length-1?'disabled':''}>Next →</button>
</div>`;
}

function copyCode(btn) {
  const panel = btn.closest('.code-tab-content');
  const codeEl = panel.querySelector('code');
  if (codeEl) {
    navigator.clipboard.writeText(codeEl.textContent || codeEl.innerText).then(() => {
      btn.textContent = 'Copied!';
      btn.style.borderColor = '#16a34a';
      btn.style.color = '#16a34a';
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.style.borderColor = '';
        btn.style.color = '';
      }, 2000);
    }).catch(err => {
      console.error('Failed to copy: ', err);
    });
  }
}

function go(idx){
  if(idx<0||idx>=DATA.length)return;
  document.querySelectorAll('.content-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  document.querySelectorAll('.stab').forEach((b,i)=>b.classList.toggle('active',i===idx));
  cur=idx;

  // Highlight visible code block dynamically to solve hidden container line-number issue
  const activePanel = document.querySelectorAll('.content-panel')[idx];
  if (activePanel) {
    const activeCode = activePanel.querySelector('.code-tab-content.on code');
    if (activeCode && window.Prism) {
      Prism.highlightElement(activeCode);
    }
  }
}

function switchC(btn,panelIdx,codeIdx){
  const panel=document.querySelectorAll('.content-panel')[panelIdx];
  panel.querySelectorAll('.ctab').forEach(b=>b.classList.remove('on'));
  panel.querySelectorAll('.code-tab-content').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const activeBlock = panel.querySelectorAll('.code-tab-content')[codeIdx];
  activeBlock.classList.add('on');

  // Trigger Prism on the block that just became visible
  const codeEl = activeBlock.querySelector('code');
  if (codeEl && window.Prism) {
    Prism.highlightElement(codeEl);
  }
}

function toggleQ(btn){
  const a=btn.nextElementSibling;
  const open=a.classList.toggle('open');
  const icon=btn.querySelector('i');
  if(icon)icon.style.transform=open?'rotate(180deg)':'rotate(0)';
}

build();

// Initial highlighting setup on load
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    const activeCode = document.querySelector('.content-panel.active .code-tab-content.on code');
    if (activeCode && window.Prism) {
      Prism.highlightElement(activeCode);
    }
  }, 100);
});
</script>
