concepts:[
{title:"ChromeOptions — addArguments complete reference",body:`<pre>ChromeOptions opts = <span class="kw">new</span> ChromeOptions();

<span class="cm">// === HEADLESS ===</span>
opts.addArguments(<span class="str">"--headless=new"</span>);      <span class="cm">// new headless (Chrome 112+)</span>

<span class="cm">// === REQUIRED FOR LINUX CI ===</span>
opts.addArguments(<span class="str">"--no-sandbox"</span>);         <span class="cm">// required in Docker/root</span>
opts.addArguments(<span class="str">"--disable-dev-shm-usage"</span>); <span class="cm">// /dev/shm too small</span>
opts.addArguments(<span class="str">"--disable-gpu"</span>);         <span class="cm">// needed in headless</span>

<span class="cm">// === WINDOW ===</span>
opts.addArguments(<span class="str">"--start-maximized"</span>);     <span class="cm">// maximize on start</span>
opts.addArguments(<span class="str">"--window-size=1920,1080"</span>); <span class="cm">// specific size</span>

<span class="cm">// === SECURITY / CERTS ===</span>
opts.addArguments(<span class="str">"--ignore-certificate-errors"</span>); <span class="cm">// ignore SSL errors</span>
opts.addArguments(<span class="str">"--allow-insecure-localhost"</span>);  <span class="cm">// allow http localhost</span>

<span class="cm">// === BROWSER MODE ===</span>
opts.addArguments(<span class="str">"--incognito"</span>);           <span class="cm">// private browsing</span>
opts.addArguments(<span class="str">"--disable-extensions"</span>);  <span class="cm">// no extensions</span>
opts.addArguments(<span class="str">"--disable-popup-blocking"</span>); <span class="cm">// allow popups</span>

<span class="cm">// === PROXY ===</span>
opts.addArguments(<span class="str">"--proxy-server=http://proxy:8080"</span>);</pre>`},
{title:"Experimental options — excludeSwitches, prefs",body:`<pre>ChromeOptions opts = <span class="kw">new</span> ChromeOptions();

<span class="cm">// Remove "Chrome is being controlled by automated test software" bar:</span>
opts.setExperimentalOption(<span class="str">"excludeSwitches"</span>,
    Arrays.asList(<span class="str">"enable-automation"</span>));
opts.setExperimentalOption(<span class="str">"useAutomationExtension"</span>, <span class="kw">false</span>);

<span class="cm">// User preferences (prefs) — Map of Chrome profile settings:</span>
Map&lt;String, Object&gt; prefs = <span class="kw">new</span> HashMap&lt;&gt;();

<span class="cm">// Download settings:</span>
prefs.put(<span class="str">"download.default_directory"</span>, <span class="str">"/home/user/downloads"</span>);
prefs.put(<span class="str">"download.prompt_for_download"</span>, <span class="kw">false</span>); <span class="cm">// no save dialog</span>
prefs.put(<span class="str">"download.directory_upgrade"</span>, <span class="kw">true</span>);

<span class="cm">// Disable notifications popup:</span>
prefs.put(<span class="str">"profile.default_content_setting_values.notifications"</span>, 2);

<span class="cm">// Disable geolocation prompts:</span>
prefs.put(<span class="str">"profile.default_content_setting_values.geolocation"</span>, 2);

opts.setExperimentalOption(<span class="str">"prefs"</span>, prefs);
WebDriver driver = <span class="kw">new</span> ChromeDriver(opts);</pre>`},
{title:"W3C capabilities and Page Load Strategy",body:`<pre>ChromeOptions opts = <span class="kw">new</span> ChromeOptions();

<span class="cm">// Accept untrusted SSL certs:</span>
opts.setAcceptInsecureCerts(<span class="kw">true</span>);

<span class="cm">// Page Load Strategy:</span>
<span class="cm">// NORMAL — wait for full page load (default)</span>
opts.setPageLoadStrategy(PageLoadStrategy.NORMAL);
<span class="cm">// EAGER — wait for DOMContentLoaded only (faster)</span>
opts.setPageLoadStrategy(PageLoadStrategy.EAGER);
<span class="cm">// NONE — don't wait at all (fastest, manual waits needed)</span>
opts.setPageLoadStrategy(PageLoadStrategy.NONE);

<span class="cm">// Platform name (for Grid):</span>
opts.setPlatformName(<span class="str">"linux"</span>);

<span class="cm">// Browser version (for Grid to select correct node):</span>
opts.setBrowserVersion(<span class="str">"stable"</span>); <span class="cm">// or "115", "latest"</span>

<span class="cm">// Set timeout via Options (Selenium 4):</span>
opts.setImplicitWaitTimeout(Duration.ofSeconds(10));
opts.setPageLoadTimeout(Duration.ofSeconds(30));
opts.setScriptTimeout(Duration.ofSeconds(30));</pre>`},
{title:"Mobile emulation with ChromeOptions",body:`<pre>ChromeOptions opts = <span class="kw">new</span> ChromeOptions();

<span class="cm">// Emulate a device by name (Chrome DevTools device list):</span>
Map&lt;String, String&gt; mobileEmulation = <span class="kw">new</span> HashMap&lt;&gt;();
mobileEmulation.put(<span class="str">"deviceName"</span>, <span class="str">"Pixel 5"</span>);
opts.setExperimentalOption(<span class="str">"mobileEmulation"</span>, mobileEmulation);

<span class="cm">// Or emulate by custom dimensions:</span>
Map&lt;String, Object&gt; deviceMetrics = <span class="kw">new</span> HashMap&lt;&gt;();
deviceMetrics.put(<span class="str">"width"</span>, 390);
deviceMetrics.put(<span class="str">"height"</span>, 844);
deviceMetrics.put(<span class="str">"pixelRatio"</span>, 3.0);
deviceMetrics.put(<span class="str">"touch"</span>, <span class="kw">true</span>);

Map&lt;String, Object&gt; mobileEmu = <span class="kw">new</span> HashMap&lt;&gt;();
mobileEmu.put(<span class="str">"deviceMetrics"</span>, deviceMetrics);
mobileEmu.put(<span class="str">"userAgent"</span>, <span class="str">"Mozilla/5.0 (iPhone; CPU iPhone OS 15_0)"</span>);
opts.setExperimentalOption(<span class="str">"mobileEmulation"</span>, mobileEmu);

WebDriver driver = <span class="kw">new</span> ChromeDriver(opts);</pre>`},
{title:"Loading extensions and user profiles",body:`<pre>ChromeOptions opts = <span class="kw">new</span> ChromeOptions();

<span class="cm">// Load Chrome extension (.crx file):</span>
opts.addExtensions(<span class="kw">new</span> File(<span class="str">"/path/to/extension.crx"</span>));

<span class="cm">// Add extension from unpacked folder (developer mode):</span>
opts.addArguments(<span class="str">"--load-extension=/path/to/extension/folder"</span>);

<span class="cm">// Use existing Chrome user profile (with saved logins):</span>
opts.addArguments(<span class="str">"--user-data-dir=/home/user/.config/google-chrome"</span>);
opts.addArguments(<span class="str">"--profile-directory=Default"</span>);

<span class="cm">// Binary location (non-standard Chrome install):</span>
opts.setBinary(<span class="str">"/opt/google/chrome-beta/chrome"</span>);

<span class="cm">// Remote debugging port (for CDP connection):</span>
opts.addArguments(<span class="str">"--remote-debugging-port=9222"</span>);

WebDriver driver = <span class="kw">new</span> ChromeDriver(opts);</pre>`}
],
mistakes:[
{bad:"Using --headless (old flag) instead of --headless=new in Chrome 112+",good:"Use --headless=new which uses the GPU process and matches headed Chrome rendering. The old --headless uses a different rendering path and causes layout differences"},
{bad:"Setting prefs without setExperimentalOption('prefs', map) wrapper",good:"All Chrome user preferences must go inside a Map passed to setExperimentalOption('prefs', prefsMap) — they cannot be set as individual arguments"}
],
checklist:["--no-sandbox + --disable-dev-shm-usage are mandatory for Linux Docker/CI","excludeSwitches + useAutomationExtension=false removes automation banner","PageLoadStrategy.EAGER speeds up tests on content-heavy pages","prefs map controls download folder, notification suppression, geolocation handling","setBinary() allows testing Chrome Beta/Canary/Chromium alongside stable"]
},

{title:"Firefox binary and extension loading",body:`<pre><span class="kw">import</span> org.openqa.selenium.firefox.FirefoxBinary;

FirefoxOptions opts = <span class="kw">new</span> FirefoxOptions();

<span class="cm">// Custom Firefox binary path (Firefox Beta/Developer Edition):</span>

<span class="cm">// Load Firefox extension (.xpi file):</span>
FirefoxProfile profile = <span class="kw">new</span> FirefoxProfile();
profile.addExtension(<span class="kw">new</span> File(<span class="str">"/path/to/extension.xpi"</span>));
opts.setProfile(profile);

{title:"SafariOptions — macOS setup",body:`<pre><span class="kw">import</span> org.openqa.selenium.safari.SafariOptions;

<span class="cm">// Safari setup — macOS only, no driver download needed</span>
<span class="cm">// REQUIRED: Safari → Develop → Allow Remote Automation</span>
<span class="cm">// Also run once in terminal: safaridriver --enable</span>

SafariOptions opts = <span class="kw">new</span> SafariOptions();

<span class="cm">// Use Safari Technology Preview:</span>
opts.setUseTechnologyPreview(<span class="kw">false</span>); <span class="cm">// true = STP binary</span>

opts.setAutomaticInspection(<span class="kw">false</span>);

{title:"EdgeOptions — Chromium-based, similar to Chrome",body:`<pre><span class="kw">import</span> org.openqa.selenium.edge.EdgeOptions;

EdgeOptions opts = <span class="kw">new</span> EdgeOptions();

<span class="cm">// Edge is Chromium-based — most ChromeOptions work!</span>

<span class="cm">// Edge-specific: use existing user profile:</span>
opts.addArguments(<span class="str">"--user-data-dir=C:\\Users\\user\\AppData\\Local\\Microsoft\\Edge\\User Data"</span>);

function buildWidget(){
  const bar=document.getElementById('tabBar2');
  const cont=document.getElementById('sessions2');
  S.forEach((s,i)=>{
    const btn=document.createElement('button');
    btn.className='tab-btn'+(i===0?' active':'');
    btn.textContent=`S${s.id}`;
    btn.title=s.title;
    btn.onclick=()=>activate(i);
    bar.appendChild(btn);
    const div=document.createElement('div');
    div.className='session'+(i===0?' active':'');
    div.innerHTML=buildSession(s,i);
    cont.appendChild(div);
  });
}

function activate(idx){
  document.querySelectorAll('#tabBar2 .tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.querySelectorAll('#sessions2 .session').forEach((s,i)=>s.classList.toggle('active',i===idx));
}

function buildSession(s,i){
  const pills=s.flow.map(f=>`<span class="pill">${f}</span>`).join('');
  const ols=s.oneliners.map(o=>`<div class="oneliner"><strong>Q: ${o.q}</strong><br>${o.a}</div>`).join('');
  const concepts=s.concepts.map(c=>`<div class="card"><div class="card-title"><i class="ti ti-code" aria-hidden="true"></i>${c.title}</div>${c.body}</div>`).join('');
  const mistakes=s.mistakes.map(m=>`<div class="err-row"><div class="err-box bad"><p>Common mistake</p>${m.bad}</div><div class="err-box good"><p>Correct approach</p>${m.good}</div></div>`).join('');
  const checks=s.checklist.map(c=>`<div class="check-item"><i class="ti ti-circle-check" aria-hidden="true"></i><span>${c}</span></div>`).join('');
  return `
    <div class="s-header">
      <span class="badge ${s.bClass}">${s.badge}</span>
      <div class="s-title">Session ${s.id}: ${s.title}</div>
      <div class="s-sub">${s.sub}</div>
    </div>
    <div class="flow-pills">${pills}</div>
    <div class="card"><div class="card-title"><i class="ti ti-message-circle" aria-hidden="true"></i>Interview one-liners</div>${ols}</div>
    <div style="margin:1rem 0">${s.diagram}</div>
    <div class="card-title" style="margin:.5rem 0;font-size:14px"><i class="ti ti-books" aria-hidden="true"></i>&nbsp;Hands-on examples</div>
    ${concepts}
    <div class="card"><div class="card-title"><i class="ti ti-alert-triangle" aria-hidden="true"></i>Mistakes &amp; fixes</div>${mistakes}</div>
    <div class="card"><div class="card-title"><i class="ti ti-checklist" aria-hidden="true"></i>Best practices checklist</div>${checks}</div>
    <div class="nav-bar">
      <button class="nav-btn" onclick="activate(Math.max(0,${i}-1))" ${i===0?'disabled':''}>← Previous</button>
      <span class="prog">${i+1} / ${S.length}</span>
      <button class="nav-btn" onclick="activate(Math.min(${S.length-1},${i}+1))" ${i===S.length-1?'disabled':''}>Next →</button>
    </div>`;
}

buildWidget();
</script>
