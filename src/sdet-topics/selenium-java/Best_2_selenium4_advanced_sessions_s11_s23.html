{q:"Why is DesiredCapabilities deprecated in Selenium 4?",a:"DesiredCapabilities was a Selenium-custom protocol layer that no longer maps cleanly to W3C. In Selenium 4, you use browser-specific Options classes (ChromeOptions, FirefoxOptions) which are W3C-compliant and type-safe."},
{q:"What are the key new features in Selenium 4?",a:"Selenium 4 brings: full W3C compliance, native CDP (Chrome DevTools Protocol) support, Relative Locators, improved Selenium Grid 4 (Docker-ready), newWindow()/newTab() API, and browser-specific Options replacing DesiredCapabilities."}

{q:"What is explicit wait and when should you use it?",a:"Explicit wait waits for a specific condition on a specific element for a maximum duration, polling every 500ms. Use it when elements appear asynchronously — after AJAX calls, animations, or dynamic page loads."},
{q:"How does WebDriverWait work internally?",a:"WebDriverWait extends FluentWait. It polls the given ExpectedCondition every 500ms until it returns a non-null/non-false result or the timeout expires, at which point it throws TimeoutException."},
{q:"What is the new Duration API in Selenium 4 for waits?",a:"Selenium 4 uses java.time.Duration instead of TimeUnit. The constructor is new WebDriverWait(driver, Duration.ofSeconds(10)) — cleaner and more readable than the old (driver, 10, TimeUnit.SECONDS) syntax."}

{title:"Visibility conditions — 4 variants explained",body:`<pre><span class="cm">// 1. presenceOfElementLocated — in DOM, may not be visible</span>

    .presenceOfElementLocated(By.id(<span class="str">"hiddenEl"</span>)));

<span class="cm">// 2. visibilityOfElementLocated — in DOM AND visible</span>

    .visibilityOfElementLocated(By.id(<span class="str">"toast"</span>)));

<span class="cm">// 3. visibilityOf — already have the WebElement reference</span>

wait.until(ExpectedConditions.visibilityOf(existingEl));

<span class="cm">// 4. visibilityOfAllElementsLocatedBy — ALL must be visible</span>

<span class="cm">// invisibilityOfElementLocated — wait for spinner to vanish</span>

<span class="cm">// textToBePresentInElement — wait for dynamic text</span>

driver.findElement(By.id(<span class="str">"refresh"</span>)).click();

{bad:"Using visibilityOfElementLocated when element is never in DOM",good:"Use presenceOfElementLocated first to confirm DOM presence, then visibilityOf for visibility check — or stalenessOf after page refresh"}

checklist:["Always use Duration.ofSeconds() in Selenium 4 — int constructor is removed","elementToBeClickable is the safest precondition before any click()","Use invisibilityOf to wait for spinners/loaders to disappear before acting","stalenessOf is critical after table/list refresh — prevents StaleElementReferenceException","Lambda custom conditions handle any scenario EC doesn't cover out of the box"]
},

{id:13,badge:"FluentWait",bClass:"b1",
title:"FluentWait — All Scenarios & Methods",
sub:"Polling · Ignored exceptions · Custom conditions · Real-world usage",
flow:["What","Why","When","How","Where"],
oneliners:[
{q:"How is FluentWait different from WebDriverWait?",a:"WebDriverWait is a preconfigured FluentWait with 500ms polling and ignoring NotFoundException. FluentWait lets you configure everything: max time, polling frequency, exceptions to ignore, and custom error messages."},
{q:"When would you use FluentWait over WebDriverWait?",a:"Use FluentWait for: elements with irregular load times (poll every 2s for up to 60s), scenarios where NoSuchElementException should be ignored, or when you need a custom failure message for debugging."},
{q:"What does ignoring(NoSuchElementException.class) do in FluentWait?",a:"It tells FluentWait not to throw immediately if the element isn't found during polling — instead it quietly retries until the timeout. Without this, the first NoSuchElementException would end the wait immediately."}
],

<text class="ts" x="340" y="220" text-anchor="middle">WebDriverWait = FluentWait with defaults (500ms poll, NotFoundException ignored)</text>
</svg>`,
concepts:[
{title:"FluentWait — full configuration",body:`<pre><span class="kw">import</span> org.openqa.selenium.support.ui.FluentWait;
<span class="kw">import</span> java.time.Duration;
<span class="kw">import</span> java.util.function.Function;

Wait&lt;WebDriver&gt; fluent = <span class="kw">new</span> FluentWait&lt;&gt;(driver)
    .withTimeout(Duration.ofSeconds(30))        <span class="cm">// max 30s total</span>
    .pollingEvery(Duration.ofSeconds(2))        <span class="cm">// check every 2s</span>
    .ignoring(NoSuchElementException.class)     <span class="cm">// skip not-found</span>
    .ignoring(StaleElementReferenceException.class) <span class="cm">// skip stale</span>
    .withMessage(<span class="str">"Element not found after 30s — check locator"</span>);

<span class="cm">// Use it with lambda:</span>
WebElement el = fluent.until(d -&gt;
    d.findElement(By.id(<span class="str">"dynamicResult"</span>)));

<span class="cm">// Or with ExpectedConditions:</span>
fluent.until(ExpectedConditions
    .visibilityOfElementLocated(By.id(<span class="str">"data"</span>)));</pre>`},
{title:"FluentWait for slow-loading data tables",body:`<pre><span class="cm">// Real scenario: data table loads over 20+ seconds (large dataset)</span>
Wait&lt;WebDriver&gt; tableWait = <span class="kw">new</span> FluentWait&lt;&gt;(driver)
    .withTimeout(Duration.ofSeconds(60))
    .pollingEvery(Duration.ofSeconds(3))
    .ignoring(NoSuchElementException.class);

<span class="cm">// Wait until table has at least 10 rows:</span>
tableWait.until(d -&gt; {
    List&lt;WebElement&gt; rows = d.findElements(
        By.cssSelector(<span class="str">"table#results tbody tr"</span>));
    <span class="kw">return</span> rows.size() &gt;= 10 ? rows : <span class="kw">null</span>;
<span class="cm">// returning null continues polling; non-null returns the value</span>
});</pre>`},
{title:"FluentWait ignoring multiple exception types",body:`<pre><span class="cm">// Chain multiple .ignoring() calls for resilient waits</span>
Wait&lt;WebDriver&gt; resilient = <span class="kw">new</span> FluentWait&lt;&gt;(driver)
    .withTimeout(Duration.ofSeconds(20))
    .pollingEvery(Duration.ofMillis(500))
    .ignoring(NoSuchElementException.class)
    .ignoring(StaleElementReferenceException.class)
    .ignoring(ElementNotInteractableException.class);

<span class="cm">// Now safe against: DOM rebuilds, animations, element detach</span>
resilient.until(d -&gt; {
    WebElement btn = d.findElement(By.id(<span class="str">"submit"</span>));
    btn.click(); <span class="cm">// retries if stale or not interactable</span>
    <span class="kw">return true</span>;
});</pre>`},
{title:"FluentWait for file download scenario",body:`<pre><span class="cm">// Wait for downloaded file to appear on disk</span>
<span class="cm">// FluentWait isn't WebDriver-specific — it works on anything</span>
FluentWait&lt;File&gt; fileWait = <span class="kw">new</span> FluentWait&lt;&gt;(<span class="kw">new</span> File(<span class="str">"/downloads"</span>))
    .withTimeout(Duration.ofSeconds(60))
    .pollingEvery(Duration.ofSeconds(2))
    .withMessage(<span class="str">"Download did not complete in 60 seconds"</span>);

fileWait.until(downloadDir -&gt; {
    File[] files = downloadDir.listFiles(
        f -&gt; f.getName().endsWith(<span class="str">".pdf"</span>));
    <span class="kw">return</span> files != <span class="kw">null</span> &amp;&amp; files.length &gt; 0;
});</pre>`},
{title:"Custom reusable wait utility class",body:`<pre><span class="kw">public class</span> WaitUtils {
    <span class="kw">private</span> WebDriver driver;

    <span class="kw">public</span> WaitUtils(WebDriver driver) { <span class="kw">this</span>.driver = driver; }

    <span class="kw">public</span> WebElement waitForVisible(By locator, <span class="kw">int</span> seconds) {
        <span class="kw">return new</span> FluentWait&lt;&gt;(driver)
            .withTimeout(Duration.ofSeconds(seconds))
            .pollingEvery(Duration.ofMillis(500))
            .ignoring(NoSuchElementException.class)
            .until(ExpectedConditions.visibilityOfElementLocated(locator));
    }

    <span class="kw">public boolean</span> waitForTextInElement(By locator, String text) {
        <span class="kw">return new</span> FluentWait&lt;&gt;(driver)
            .withTimeout(Duration.ofSeconds(10))
            .pollingEvery(Duration.ofMillis(300))
            .ignoring(NoSuchElementException.class)
            .until(ExpectedConditions
                .textToBePresentInElementLocated(locator, text));
    }
}</pre>`}
],
mistakes:[
{bad:"Returning false from FluentWait lambda — thinking it will retry",good:"Return null (not false) from FluentWait lambda to indicate 'not ready yet'. Returning false is a valid result and FluentWait returns it immediately without retrying"},
{bad:"Using the same FluentWait instance for waits with different timeouts",good:"Create a new FluentWait instance per wait scenario, or use a WaitUtils factory method. Reusing the same instance can cause stale configuration"}
],
checklist:["Return null (not false) from lambda to continue polling","Chain multiple .ignoring() for resilient waits against DOM rebuilds","pollingEvery should be 1/20th of withTimeout for efficient polling","FluentWait works with any type T — not just WebDriver (e.g., File, API response)","withMessage() saves hours of debugging — always set a meaningful failure message"]
},

{id:14,badge:"ExpectedConditions",bClass:"b2",
title:"All ExpectedConditions — Complete Reference",
sub:"Visibility · Clickability · Text · URL · Frame · Alert · Custom",
flow:["What","Why","When","How","Where"],
oneliners:[
{q:"How many categories of ExpectedConditions are there?",a:"Approximately 7 categories: element presence/visibility, element state (clickable/selected/enabled), text content, URL/title conditions, frame/window conditions, alert conditions, and list-based conditions."},
{q:"What is the difference between presenceOf and visibilityOf?",a:"presenceOfElementLocated only requires the element to be in the DOM — it could be hidden (display:none). visibilityOfElementLocated requires the element to be both in the DOM AND visible on screen (non-zero size, not hidden)."},
{q:"Can you use AND/OR logic with ExpectedConditions?",a:"Yes — use ExpectedConditions.and() to combine multiple conditions with AND logic. For OR logic, use a custom lambda that checks multiple conditions. Example: wait.until(EC.and(EC.visibilityOf(el1), EC.elementToBeClickable(el2)))"}
],
diagram:`<svg width="100%" viewBox="0 0 680 300" role="img"><title>ExpectedConditions categories overview</title><desc>Seven categories of ExpectedConditions grouped by type</desc><defs></defs>
<text class="th" x="340" y="24" text-anchor="middle">ExpectedConditions — 7 categories</text>

<g class="c-teal"><rect x="245" y="40" width="190" height="52" rx="8" stroke-width="0.5"/><text class="th" x="340" y="60" text-anchor="middle" dominant-baseline="central">Element state</text><text class="ts" x="340" y="78" text-anchor="middle" dominant-baseline="central">clickable, selected, enabled</text></g>
<g class="c-teal"><rect x="470" y="40" width="190" height="52" rx="8" stroke-width="0.5"/><text class="th" x="565" y="60" text-anchor="middle" dominant-baseline="central">Text content</text><text class="ts" x="565" y="78" text-anchor="middle" dominant-baseline="central">textToBe, attributeContains</text></g>
<g class="c-amber"><rect x="20" y="115" width="190" height="52" rx="8" stroke-width="0.5"/><text class="th" x="115" y="135" text-anchor="middle" dominant-baseline="central">URL / Title</text><text class="ts" x="115" y="153" text-anchor="middle" dominant-baseline="central">urlContains, titleIs</text></g>
<g class="c-amber"><rect x="245" y="115" width="190" height="52" rx="8" stroke-width="0.5"/><text class="th" x="340" y="135" text-anchor="middle" dominant-baseline="central">Frame / Window</text><text class="ts" x="340" y="153" text-anchor="middle" dominant-baseline="central">frameToBeAvailable</text></g>
<g class="c-amber"><rect x="470" y="115" width="190" height="52" rx="8" stroke-width="0.5"/><text class="th" x="565" y="135" text-anchor="middle" dominant-baseline="central">Alert</text><text class="ts" x="565" y="153" text-anchor="middle" dominant-baseline="central">alertIsPresent</text></g>
<g class="c-purple"><rect x="130" y="190" width="420" height="52" rx="8" stroke-width="0.5"/><text class="th" x="340" y="210" text-anchor="middle" dominant-baseline="central">Compound conditions</text><text class="ts" x="340" y="228" text-anchor="middle" dominant-baseline="central">EC.and(), EC.or(), EC.not() + custom lambda</text></g>
</svg>`,
concepts:[
{title:"Presence and visibility conditions — complete set",body:`<pre><span class="cm">// 1. In DOM (may be hidden):</span>
EC.presenceOfElementLocated(By.id(<span class="str">"el"</span>))
EC.presenceOfAllElementsLocatedBy(By.cssSelector(<span class="str">".item"</span>))

<span class="cm">// 2. In DOM + visible:</span>
EC.visibilityOfElementLocated(By.id(<span class="str">"el"</span>))
EC.visibilityOf(webElement)                    <span class="cm">// already have reference</span>
EC.visibilityOfAllElementsLocatedBy(By.cssSelector(<span class="str">".row"</span>))
EC.visibilityOfAllElements(listOfElements)

<span class="cm">// 3. Invisible (hidden or removed):</span>
EC.invisibilityOfElementLocated(By.id(<span class="str">"spinner"</span>))
EC.invisibilityOf(webElement)
EC.invisibilityOfElementWithText(By.id(<span class="str">"msg"</span>), <span class="str">"Error"</span>)

<span class="cm">// 4. Number of elements:</span>
EC.numberOfElementsToBe(By.cssSelector(<span class="str">".row"</span>), 5)
EC.numberOfElementsToBeMoreThan(By.cssSelector(<span class="str">".row"</span>), 3)
EC.numberOfElementsToBeLessThan(By.cssSelector(<span class="str">".row"</span>), 10)</pre>`},
{title:"State conditions — clickable, selected, stale",body:`<pre><span class="cm">// Clickable — visible AND enabled (best before click):</span>
EC.elementToBeClickable(By.id(<span class="str">"btn"</span>))
EC.elementToBeClickable(webElement)

<span class="cm">// Selection state — checkboxes, radio, dropdowns:</span>
EC.elementToBeSelected(webElement)
EC.elementSelectionStateToBe(webElement, <span class="kw">true</span>)   <span class="cm">// must be checked</span>
EC.elementSelectionStateToBe(webElement, <span class="kw">false</span>)  <span class="cm">// must be unchecked</span>
EC.elementToBeSelectedByLocator(By.id(<span class="str">"chk"</span>))    <span class="cm">// locator variant</span>

<span class="cm">// Staleness — wait for element to be removed from DOM:</span>
EC.stalenessOf(webElement)

<span class="cm">// Attribute checks:</span>
EC.attributeContains(By.id(<span class="str">"el"</span>), <span class="str">"class"</span>, <span class="str">"active"</span>)
EC.attributeToBe(By.id(<span class="str">"input"</span>), <span class="str">"value"</span>, <span class="str">"hello"</span>)
EC.attributeToBeNotEmpty(webElement, <span class="str">"value"</span>)</pre>`},
{title:"Text and URL conditions",body:`<pre><span class="cm">// Text in element:</span>
EC.textToBePresentInElement(webElement, <span class="str">"Success"</span>)
EC.textToBePresentInElementLocated(By.id(<span class="str">"msg"</span>), <span class="str">"OK"</span>)
EC.textToBePresentInElementValue(By.id(<span class="str">"input"</span>), <span class="str">"hello"</span>)
EC.textMatches(By.id(<span class="str">"el"</span>), Pattern.compile(<span class="str">"Order #\\d+"</span>))

<span class="cm">// URL conditions:</span>
EC.urlContains(<span class="str">"dashboard"</span>)
EC.urlToBe(<span class="str">"https://app.com/home"</span>)
EC.urlMatches(<span class="str">"https://app\\.com/order/\\d+"</span>)

<span class="cm">// Title conditions:</span>
EC.titleIs(<span class="str">"My Dashboard"</span>)
EC.titleContains(<span class="str">"Dashboard"</span>)

<span class="cm">// Frame conditions:</span>
EC.frameToBeAvailableAndSwitchToIt(<span class="str">"frameName"</span>)
EC.frameToBeAvailableAndSwitchToIt(By.id(<span class="str">"myFrame"</span>))
EC.frameToBeAvailableAndSwitchToIt(0) <span class="cm">// by index</span></pre>`},
{title:"Alert and window conditions",body:`<pre><span class="cm">// Alert conditions:</span>
EC.alertIsPresent()

<span class="cm">// Window conditions:</span>
EC.numberOfWindowsToBe(2)

<span class="cm">// Real scenario — click triggers popup, wait, switch:</span>
driver.findElement(By.id(<span class="str">"openPopup"</span>)).click();
wait.until(EC.numberOfWindowsToBe(2));
String mainHandle = driver.getWindowHandle();
driver.getWindowHandles().forEach(h -&gt; {
    <span class="kw">if</span> (!h.equals(mainHandle)) driver.switchTo().window(h);
});
wait.until(EC.titleContains(<span class="str">"Popup"</span>));

<span class="cm">// Real scenario — login triggers alert:</span>
wait.until(EC.alertIsPresent());
driver.switchTo().alert().accept();</pre>`},
{title:"Compound conditions — AND, OR, NOT",body:`<pre><span class="cm">// AND — all conditions must pass simultaneously:</span>
wait.until(EC.and(
    EC.visibilityOfElementLocated(By.id(<span class="str">"header"</span>)),
    EC.visibilityOfElementLocated(By.id(<span class="str">"content"</span>)),
    EC.elementToBeClickable(By.id(<span class="str">"submitBtn"</span>))
));

<span class="cm">// OR — any one condition passes:</span>
wait.until(EC.or(
    EC.visibilityOfElementLocated(By.id(<span class="str">"successMsg"</span>)),
    EC.visibilityOfElementLocated(By.id(<span class="str">"errorMsg"</span>))
));

<span class="cm">// NOT — condition must be FALSE:</span>
wait.until(EC.not(
    EC.visibilityOfElementLocated(By.id(<span class="str">"spinner"</span>))
));

<span class="cm">// NOT is equivalent to invisibilityOf for spinners:</span>
wait.until(EC.not(EC.elementToBeClickable(By.id(<span class="str">"disabledBtn"</span>))));</pre>`}
],
mistakes:[
{bad:"EC.visibilityOf() on a freshly-found element that could go stale",good:"Prefer EC.visibilityOfElementLocated(By...) — it re-finds the element each poll cycle, preventing StaleElementReferenceException during wait"},
{bad:"EC.frameToBeAvailableAndSwitchToIt() — forgetting to switch back after",good:"Always call driver.switchTo().defaultContent() after interacting with iframe content — every element lookup after this still targets the frame context"}
],
checklist:["Use EC.and() when multiple elements must all be ready before proceeding","EC.textMatches() with regex is powerful for dynamic text like 'Order #12345'","EC.attributeContains() is perfect for CSS class-based state checks (e.g. 'active')","EC.frameToBeAvailableAndSwitchToIt() combines the wait and switch in one call","EC.not() is clean for 'wait until spinner is gone' scenarios"]
},

{id:15,badge:"Actions Class",bClass:"b2",
title:"Actions Class — All Scenarios & Methods",
sub:"Mouse · Keyboard · Drag-drop · Scroll · Multi-action chains",
flow:["What","Why","When","How","Where"],
oneliners:[
{q:"What is the Actions class used for in Selenium 4?",a:"Actions simulates complex user gestures that can't be done with simple element.click() — hover, drag-and-drop, right-click, double-click, keyboard combinations, and scroll operations. In Selenium 4, it was enhanced with new scroll methods."},
{q:"What is the difference between click() and Actions.click()?",a:"element.click() is a direct WebDriver command. Actions.click(element) builds an action chain — useful when you need to combine gestures (e.g., hover then click) or when dealing with elements requiring mouse positioning first."},
{q:"What new scroll methods were added in Selenium 4 Actions?",a:"Selenium 4 added: scrollToElement(element), scrollByAmount(deltaX, deltaY), scrollFromOrigin(scrollOrigin, deltaX, deltaY) — all W3C WebDriver compliant and more reliable than JavaScript scrollIntoView."}
],
diagram:`<svg width="100%" viewBox="0 0 680 270" role="img"><title>Actions class method groups</title><desc>Groups showing mouse actions keyboard actions scroll actions and chain pattern</desc><defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-teal"><rect x="20" y="20" width="150" height="100" rx="8" stroke-width="0.5"/><text class="th" x="95" y="44" text-anchor="middle" dominant-baseline="central">Mouse actions</text><text class="ts" x="95" y="64" text-anchor="middle">click / doubleClick</text><text class="ts" x="95" y="82" text-anchor="middle">contextClick / hover</text><text class="ts" x="95" y="100" text-anchor="middle">dragAndDrop</text></g>
<g class="c-teal"><rect x="195" y="20" width="150" height="100" rx="8" stroke-width="0.5"/><text class="th" x="270" y="44" text-anchor="middle" dominant-baseline="central">Keyboard</text><text class="ts" x="270" y="64" text-anchor="middle">sendKeys / keyDown</text><text class="ts" x="270" y="82" text-anchor="middle">keyUp / keyPress</text><text class="ts" x="270" y="100" text-anchor="middle">Ctrl+A, Ctrl+C</text></g>
<g class="c-amber"><rect x="370" y="20" width="150" height="100" rx="8" stroke-width="0.5"/><text class="th" x="445" y="44" text-anchor="middle" dominant-baseline="central">Scroll (Sel 4)</text><text class="ts" x="445" y="64" text-anchor="middle">scrollToElement()</text><text class="ts" x="445" y="82" text-anchor="middle">scrollByAmount()</text><text class="ts" x="445" y="100" text-anchor="middle">scrollFromOrigin()</text></g>
<g class="c-purple"><rect x="545" y="20" width="115" height="100" rx="8" stroke-width="0.5"/><text class="th" x="602" y="44" text-anchor="middle" dominant-baseline="central">Chain pattern</text><text class="ts" x="602" y="64" text-anchor="middle">build()</text><text class="ts" x="602" y="82" text-anchor="middle">perform()</text><text class="ts" x="602" y="100" text-anchor="middle">release()</text></g>
<g class="c-gray"><rect x="20" y="150" width="640" height="44" rx="6" stroke-width="0.5"/><text class="ts" x="340" y="166" text-anchor="middle" dominant-baseline="central">Action chain pattern:</text><text class="ts" x="340" y="184" text-anchor="middle" dominant-baseline="central">new Actions(driver).moveToElement(el).click().sendKeys("text").perform()</text></g>
</svg>`,
concepts:[
{title:"Mouse interactions — click, double, right-click, hover",body:`<pre>Actions actions = <span class="kw">new</span> Actions(driver);

<span class="cm">// Simple click (with positioning):</span>
actions.click(driver.findElement(By.id(<span class="str">"btn"</span>))).perform();

<span class="cm">// Double-click (open file, select word):</span>
actions.doubleClick(driver.findElement(By.id(<span class="str">"editBtn"</span>))).perform();

<span class="cm">// Right-click (context menu):</span>
WebElement el = driver.findElement(By.id(<span class="str">"listItem"</span>));
actions.contextClick(el).perform();
<span class="cm">// Now click menu option:</span>
wait.until(EC.visibilityOfElementLocated(By.id(<span class="str">"deleteOption"</span>)));
driver.findElement(By.id(<span class="str">"deleteOption"</span>)).click();

<span class="cm">// Hover (mouseover — triggers dropdown/tooltip):</span>
WebElement nav = driver.findElement(By.id(<span class="str">"navMenu"</span>));
actions.moveToElement(nav).perform();
<span class="cm">// Submenu is now visible:</span>
wait.until(EC.visibilityOfElementLocated(By.id(<span class="str">"subMenu"</span>)));
driver.findElement(By.id(<span class="str">"subMenu"</span>)).click();</pre>`},
{title:"Drag and drop — 3 methods",body:`<pre><span class="cm">// Method 1: dragAndDrop(source, target)</span>
WebElement source = driver.findElement(By.id(<span class="str">"draggable"</span>));
WebElement target = driver.findElement(By.id(<span class="str">"droppable"</span>));
actions.dragAndDrop(source, target).perform();

<span class="cm">// Method 2: dragAndDropBy(source, xOffset, yOffset)</span>
actions.dragAndDropBy(source, 200, 0).perform(); <span class="cm">// move 200px right</span>

<span class="cm">// Method 3: manual click-hold-move-release (most reliable)</span>
actions.clickAndHold(source)
       .moveToElement(target)
       .release()
       .perform();

<span class="cm">// Slow drag (some apps need this — use pause between steps):</span>
actions.clickAndHold(source)
       .pause(Duration.ofMillis(500))   <span class="cm">// Selenium 4 pause</span>
       .moveToElement(target)
       .pause(Duration.ofMillis(300))
       .release()
       .perform();</pre>`},
{title:"Keyboard shortcuts — Ctrl, Shift, Alt combinations",body:`<pre><span class="cm">// Select all text in input (Ctrl+A):</span>
WebElement input = driver.findElement(By.id(<span class="str">"searchBox"</span>));
actions.click(input)
       .keyDown(Keys.CONTROL).sendKeys(<span class="str">"a"</span>).keyUp(Keys.CONTROL)
       .perform();

<span class="cm">// Copy selected text (Ctrl+C) then paste (Ctrl+V):</span>
actions.keyDown(Keys.CONTROL).sendKeys(<span class="str">"c"</span>).keyUp(Keys.CONTROL)
       .click(otherInput)
       .keyDown(Keys.CONTROL).sendKeys(<span class="str">"v"</span>).keyUp(Keys.CONTROL)
       .perform();

<span class="cm">// Multi-select list items (Ctrl+Click each):</span>
actions.click(item1)
       .keyDown(Keys.CONTROL).click(item2).click(item3)
       .keyUp(Keys.CONTROL)
       .perform();

<span class="cm">// Shift+Click range select:</span>
actions.click(firstRow)
       .keyDown(Keys.SHIFT).click(lastRow)
       .keyUp(Keys.SHIFT).perform();</pre>`},
{title:"Scroll actions — Selenium 4 new API",body:`<pre><span class="kw">import</span> org.openqa.selenium.interactions.WheelInput.ScrollOrigin;

<span class="cm">// Scroll to element (new in Selenium 4 — W3C compliant):</span>
WebElement element = driver.findElement(By.id(<span class="str">"footer"</span>));
actions.scrollToElement(element).perform();

<span class="cm">// Scroll by pixel amount from current viewport position:</span>
actions.scrollByAmount(0, 500).perform();  <span class="cm">// scroll down 500px</span>
actions.scrollByAmount(0, -300).perform(); <span class="cm">// scroll up 300px</span>
actions.scrollByAmount(200, 0).perform();  <span class="cm">// scroll right 200px</span>

<span class="cm">// ScrollFromOrigin — scroll from element position:</span>
ScrollOrigin origin = ScrollOrigin.fromElement(element);
actions.scrollFromOrigin(origin, 0, 200).perform();

<span class="cm">// ScrollFromOrigin with offset from element:</span>
ScrollOrigin withOffset = ScrollOrigin.fromElement(element, 0, -50);
actions.scrollFromOrigin(withOffset, 0, 300).perform();</pre>`},
{title:"Complex action chains — real-world scenarios",body:`<pre><span class="cm">// Tooltip test: hover → wait → read tooltip text</span>
WebElement helpIcon = driver.findElement(By.id(<span class="str">"helpIcon"</span>));
actions.moveToElement(helpIcon).perform();
wait.until(EC.visibilityOfElementLocated(By.cssSelector(<span class="str">".tooltip"</span>)));
String tip = driver.findElement(By.cssSelector(<span class="str">".tooltip"</span>)).getText();

<span class="cm">// Slider: drag to specific position</span>
WebElement slider = driver.findElement(By.id(<span class="str">"priceSlider"</span>));
<span class="kw">int</span> sliderWidth = slider.getSize().getWidth();
actions.clickAndHold(slider)
       .moveByOffset(sliderWidth / 2, 0) <span class="cm">// move to 50%</span>
       .release().perform();

<span class="cm">// Canvas drawing: draw a line</span>
WebElement canvas = driver.findElement(By.id(<span class="str">"drawCanvas"</span>));
actions.moveToElement(canvas, 100, 100)
       .clickAndHold()
       .moveByOffset(200, 0)
       .moveByOffset(0, 200)
       .release().perform();</pre>`}
],
mistakes:[
{bad:"actions.dragAndDrop(source, target) fails on some apps",good:"Use clickAndHold → pause → moveToElement → release pattern for stubborn drag-drop. Some frameworks require the slow approach with pauses between steps"},
{bad:"actions.moveToElement() not scrolling element into view",good:"Use actions.scrollToElement(element).perform() first in Selenium 4, then moveToElement. Scrolling and moving are separate operations"}
],
checklist:["Always call .perform() at the end — without it, nothing executes","Use pause(Duration) between action steps for animations that need settling time","scrollToElement() is the Selenium 4 W3C way — avoid JS scrollIntoView for actions chains","keyDown/keyUp must be balanced — unclosed keyDown keeps modifier held down","For drag-drop failures: try clickAndHold + pause(500ms) + move + pause + release"]
},

oneliners:[
{q:"What is JavascriptExecutor and why do we use it?",a:"JavascriptExecutor is a Selenium interface that runs arbitrary JavaScript in the browser context. We use it when Selenium's WebDriver API can't reach something: hidden elements, custom scroll, reading JS variables, triggering custom events, or bypassing Selenium's element interaction restrictions."},
{q:"What is the difference between executeScript and executeAsyncScript?",a:"executeScript runs synchronous JS and returns immediately. executeAsyncScript runs async JS — Selenium waits for you to call the injected callback(result) function to signal completion, with a timeout set by driver.manage().timeouts().scriptTimeout()."},
{q:"When would executeScript fail silently?",a:"If the JS throws an exception, Selenium wraps it in JavascriptException. If the JS returns undefined, Selenium returns null. If you return a WebElement from JS, Selenium wraps it as a WebElement — test these return types carefully."}
],

concepts:[
{title:"executeScript — basic patterns and return types",body:`<pre>JavascriptExecutor js = (JavascriptExecutor) driver;

<span class="cm">// Returns String:</span>
String url = (String) js.executeScript(<span class="str">"return window.location.href"</span>);

<span class="cm">// Returns Long (numbers):</span>
Long scrollY = (Long) js.executeScript(<span class="str">"return window.scrollY"</span>);

<span class="cm">// Returns Boolean:</span>
Boolean loaded = (Boolean) js.executeScript(
    <span class="str">"return document.readyState === 'complete'"</span>);

<span class="cm">// Returns WebElement:</span>
WebElement active = (WebElement) js.executeScript(
    <span class="str">"return document.activeElement"</span>);

<span class="cm">// Passing WebElement AS argument (arguments[0]):</span>
js.executeScript(<span class="str">"arguments[0].click();"</span>, element);
js.executeScript(<span class="str">"arguments[0].style.border='3px solid red';"</span>, element);</pre>`},
{title:"Scroll scenarios — 5 patterns",body:`<pre>JavascriptExecutor js = (JavascriptExecutor) driver;

<span class="cm">// Scroll to bottom of page:</span>
js.executeScript(<span class="str">"window.scrollTo(0, document.body.scrollHeight)"</span>);

<span class="cm">// Scroll to top:</span>
js.executeScript(<span class="str">"window.scrollTo(0, 0)"</span>);

<span class="cm">// Scroll by relative amount:</span>
js.executeScript(<span class="str">"window.scrollBy(0, 500)"</span>);  <span class="cm">// down 500px</span>

<span class="cm">// Scroll element into view (center):</span>
js.executeScript(<span class="str">"arguments[0].scrollIntoView({block:'center'})"</span>, element);

<span class="cm">// Scroll inside an overflow div (not window):</span>
WebElement scrollDiv = driver.findElement(By.id(<span class="str">"scrollableDiv"</span>));
js.executeScript(<span class="str">"arguments[0].scrollTop += 300"</span>, scrollDiv);

<span class="cm">// PREFER Selenium 4 Actions scrollToElement() over JS for W3C compliance</span></pre>`},
{title:"DOM manipulation and value setting",body:`<pre>JavascriptExecutor js = (JavascriptExecutor) driver;
WebElement dateInput = driver.findElement(By.id(<span class="str">"datePicker"</span>));

<span class="cm">// Set value on read-only or custom inputs:</span>
js.executeScript(<span class="str">"arguments[0].value = '2024-12-25';"</span>, dateInput);

<span class="cm">// Remove readonly attribute:</span>
js.executeScript(
    <span class="str">"arguments[0].removeAttribute('readonly')"</span>, dateInput);

<span class="cm">// Set attribute:</span>
js.executeScript(
    <span class="str">"arguments[0].setAttribute('value', '999')"</span>, element);

<span class="cm">// Make hidden element visible:</span>
js.executeScript(
    <span class="str">"arguments[0].style.display='block'"</span>, hiddenEl);

<span class="cm">// Highlight element for debugging:</span>
js.executeScript(
    <span class="str">"arguments[0].style.outline='3px solid orange'"</span>, element);

<span class="cm">// Trigger custom event (React/Vue apps):</span>
js.executeScript(
    <span class="str">"arguments[0].dispatchEvent(new Event('change'))"</span>, input);</pre>`},
{title:"Reading JS state — page ready, custom vars",body:`<pre>JavascriptExecutor js = (JavascriptExecutor) driver;

<span class="cm">// Check page load complete:</span>
wait.until(d -&gt; js.executeScript(
    <span class="str">"return document.readyState"</span>).equals(<span class="str">"complete"</span>));

<span class="cm">// Check jQuery AJAX idle (if app uses jQuery):</span>
wait.until(d -&gt; (Boolean) js.executeScript(
    <span class="str">"return jQuery.active === 0"</span>));

<span class="cm">// Read custom JS variable set by app:</span>
String token = (String) js.executeScript(
    <span class="str">"return window.authToken"</span>);

<span class="cm">// Get all local storage keys:</span>
String allKeys = (String) js.executeScript(
    <span class="str">"return Object.keys(localStorage).toString()"</span>);

<span class="cm">// Read localStorage value:</span>
String userData = (String) js.executeScript(
    <span class="str">"return localStorage.getItem('user')"</span>);</pre>`},
{title:"executeAsyncScript — AJAX and animation waits",body:`<pre><span class="cm">// Set script timeout FIRST:</span>
driver.manage().timeouts().scriptTimeout(Duration.ofSeconds(30));

JavascriptExecutor js = (JavascriptExecutor) driver;

<span class="cm">// Wait for an animation to complete using async script:</span>
js.executeAsyncScript(
    <span class="str">"var callback = arguments[arguments.length - 1];"</span> +
    <span class="str">"setTimeout(callback, 2000);"</span>  <span class="cm">// wait 2s then signal done</span>
);

<span class="cm">// Wait for fetch/AJAX to resolve:</span>
js.executeAsyncScript(
    <span class="str">"var done = arguments[arguments.length - 1];"</span> +
    <span class="str">"fetch('/api/data').then(r => r.json()).then(data => done(data))"</span>
);

<span class="cm">// The last argument is always the callback in executeAsyncScript</span>
<span class="cm">// Call it to signal Selenium that async work is complete</span></pre>`}
],
mistakes:[
{bad:"Using JS click (arguments[0].click()) as default approach for all clicks",good:"Use JS click only as a last resort when Selenium click fails (overlapping elements, hidden elements). Normal clicks should use element.click() for realistic user simulation"},
{bad:"Not setting scriptTimeout before executeAsyncScript",good:"Always set driver.manage().timeouts().scriptTimeout(Duration.ofSeconds(30)) before any executeAsyncScript call — without it, the default is 0 and will timeout immediately"}
],
checklist:["Cast driver to JavascriptExecutor before use: (JavascriptExecutor) driver","arguments[0] in JS script = first Java argument after the script string","executeAsyncScript: always call the last argument as callback to signal completion","Set scriptTimeout before all executeAsyncScript calls","Prefer Actions.scrollToElement() over JS scroll for Selenium 4 W3C compliance"]
},

{q:"What is Robot class and how is it different from Selenium Actions?",a:"Robot class (java.awt.Robot) automates at the OS/native level — it controls the physical keyboard and mouse regardless of browser. Selenium Actions works within the browser context. Use Robot for: file upload dialogs, OS popups, and anything outside the browser DOM."},
{q:"When would you use Robot class in a Selenium test?",a:"Use Robot for: native OS file upload dialogs (the Windows/Linux file picker), clipboard operations (copy/paste system-wide), keyboard shortcuts that browsers intercept before Selenium can handle them, and taking OS-level screenshots."},
{q:"What are the limitations of Robot class in CI/CD?",a:"Robot requires a physical display — it fails in headless mode and on headless Linux servers. In CI/CD, use browser-based file upload workarounds (sendKeys to file input) or virtual display (Xvfb on Linux) instead of Robot for file dialogs."}
],

concepts:[
{title:"Robot class — setup and keyboard",body:`<pre><span class="kw">import</span> java.awt.Robot;
<span class="kw">import</span> java.awt.event.KeyEvent;
<span class="kw">import</span> java.awt.Toolkit;
<span class="kw">import</span> java.awt.datatransfer.StringSelection;

Robot robot = <span class="kw">new</span> Robot();

<span class="cm">// Press Enter key:</span>
robot.keyPress(KeyEvent.VK_ENTER);
robot.keyRelease(KeyEvent.VK_ENTER);

<span class="cm">// Press Tab:</span>
robot.keyPress(KeyEvent.VK_TAB);
robot.keyRelease(KeyEvent.VK_TAB);

<span class="cm">// Press Escape (dismiss dialog):</span>
robot.keyPress(KeyEvent.VK_ESCAPE);
robot.keyRelease(KeyEvent.VK_ESCAPE);

<span class="cm">// Press Ctrl+A (select all) then Ctrl+C (copy):</span>
robot.keyPress(KeyEvent.VK_CONTROL);
robot.keyPress(KeyEvent.VK_A);
robot.keyRelease(KeyEvent.VK_A);
robot.keyRelease(KeyEvent.VK_CONTROL);</pre>`},
{title:"File upload dialog — most common Robot use case",body:`<pre><span class="cm">// ⚠ PREFERRED: Use sendKeys directly on file input (no Robot needed):</span>
driver.findElement(By.id(<span class="str">"fileInput"</span>)).sendKeys(<span class="str">"/home/user/doc.pdf"</span>);

<span class="cm">// ROBOT approach — only when file input is not accessible via Selenium:</span>
<span class="cm">// 1. Click the upload button to open OS dialog</span>
driver.findElement(By.id(<span class="str">"uploadBtn"</span>)).click();
Thread.sleep(1500); <span class="cm">// wait for OS dialog to open</span>

<span class="cm">// 2. Type file path into the dialog using clipboard (most reliable):</span>
Robot robot = <span class="kw">new</span> Robot();
StringSelection filePath = <span class="kw">new</span> StringSelection(<span class="str">"/home/user/file.pdf"</span>);
Toolkit.getDefaultToolkit().getSystemClipboard().setContents(filePath, <span class="kw">null</span>);

<span class="cm">// 3. Paste the path (Ctrl+V):</span>
robot.keyPress(KeyEvent.VK_CONTROL); robot.keyPress(KeyEvent.VK_V);
robot.keyRelease(KeyEvent.VK_V); robot.keyRelease(KeyEvent.VK_CONTROL);

<span class="cm">// 4. Confirm with Enter:</span>
robot.keyPress(KeyEvent.VK_ENTER); robot.keyRelease(KeyEvent.VK_ENTER);</pre>`},
{title:"Mouse control — move, click, scroll",body:`<pre>Robot robot = <span class="kw">new</span> Robot();

<span class="cm">// Move mouse to absolute screen coordinates:</span>
robot.mouseMove(500, 300);  <span class="cm">// x=500, y=300 on screen</span>

<span class="cm">// Left click:</span>
robot.mousePress(InputEvent.BUTTON1_DOWN_MASK);
robot.mouseRelease(InputEvent.BUTTON1_DOWN_MASK);

<span class="cm">// Right click:</span>
robot.mousePress(InputEvent.BUTTON3_DOWN_MASK);
robot.mouseRelease(InputEvent.BUTTON3_DOWN_MASK);

<span class="cm">// Double click:</span>
robot.mousePress(InputEvent.BUTTON1_DOWN_MASK);
robot.mouseRelease(InputEvent.BUTTON1_DOWN_MASK);
robot.mousePress(InputEvent.BUTTON1_DOWN_MASK);
robot.mouseRelease(InputEvent.BUTTON1_DOWN_MASK);

<span class="cm">// Mouse wheel scroll:</span>
robot.mouseWheel(3);  <span class="cm">// scroll down 3 notches</span>
robot.mouseWheel(-3); <span class="cm">// scroll up 3 notches</span></pre>`},
{title:"Clipboard — copy and paste between fields",body:`<pre><span class="kw">import</span> java.awt.Toolkit;
<span class="kw">import</span> java.awt.datatransfer.*;

<span class="cm">// Set clipboard content (type text into OS dialog):</span>
<span class="kw">void</span> setClipboard(String text) <span class="kw">throws</span> Exception {
    StringSelection sel = <span class="kw">new</span> StringSelection(text);
    Toolkit.getDefaultToolkit()
           .getSystemClipboard().setContents(sel, <span class="kw">null</span>);
}

<span class="cm">// Read clipboard content:</span>
String readClipboard() <span class="kw">throws</span> Exception {
    Transferable contents = Toolkit.getDefaultToolkit()
        .getSystemClipboard().getContents(<span class="kw">null</span>);
    <span class="kw">if</span> (contents != <span class="kw">null</span> &amp;&amp; contents.isDataFlavorSupported(
            DataFlavor.stringFlavor)) {
        <span class="kw">return</span> (String) contents.getTransferData(DataFlavor.stringFlavor);
    }
    <span class="kw">return null</span>;
}

<span class="cm">// Usage: verify copied text matches expected</span>
String copied = readClipboard();
assert copied.equals(<span class="str">"Expected text"</span>) : <span class="str">"Clipboard mismatch"</span>;</pre>`},
{title:"Screenshot with Robot — full screen capture",body:`<pre><span class="kw">import</span> java.awt.Rectangle;
<span class="kw">import</span> java.awt.image.BufferedImage;
<span class="kw">import</span> javax.imageio.ImageIO;

<span class="cm">// Capture full OS screen (including browser chrome, taskbar):</span>
Robot robot = <span class="kw">new</span> Robot();
Rectangle screen = <span class="kw">new</span> Rectangle(
    Toolkit.getDefaultToolkit().getScreenSize());
BufferedImage screenshot = robot.createScreenCapture(screen);

<span class="cm">// Save to file:</span>
ImageIO.write(screenshot, <span class="str">"PNG"</span>,
    <span class="kw">new</span> File(<span class="str">"screenshots/full_screen.png"</span>));

<span class="cm">// Capture specific area (x, y, width, height):</span>
Rectangle area = <span class="kw">new</span> Rectangle(0, 0, 800, 600);
BufferedImage partial = robot.createScreenCapture(area);
ImageIO.write(partial, <span class="str">"PNG"</span>, <span class="kw">new</span> File(<span class="str">"partial.png"</span>));

<span class="cm">// Note: Selenium's TakesScreenshot is better for browser-only tests</span></pre>`}
],
mistakes:[
{bad:"Using Robot for file upload in CI/CD headless environments",good:"Use sendKeys() directly on the file input element — it works headlessly. Robot requires a display. Fall back to AutoIT or PyAutoGUI for CI file dialog automation on non-headless"},
{bad:"robot.keyPress without robot.keyRelease — key stays held down",good:"Always pair every keyPress with keyRelease. Held modifier keys (Ctrl, Shift) corrupt subsequent keyboard actions until released"}
],

},

{q:"What is StaleElementReferenceException and how do you fix it?",a:"Thrown when a WebElement reference is no longer valid — the DOM was rebuilt (after page refresh, AJAX update, navigation). Fix: re-find the element after the DOM change, or use ExpectedConditions.stalenessOf() to wait for the old element to detach."},
{q:"What is the difference between NoSuchElementException and TimeoutException?",a:"NoSuchElementException fires immediately when findElement can't locate the element (with no implicit wait set). TimeoutException fires when an explicit wait's maximum duration is exceeded — the condition never became true."},
{q:"What causes ElementNotInteractableException?",a:"Element is in the DOM but not interactable — it could be hidden (display:none/visibility:hidden), covered by an overlay, outside viewport, disabled, or still animating into position. Fix: wait for elementToBeClickable, scroll into view, or close the overlay."}
],

concepts:[
{title:"NoSuchElementException — causes and fixes",body:`<pre><span class="cm">// Caused by: wrong locator, element not yet loaded, inside iframe</span>

<span class="cm">// Fix 1: Add explicit wait</span>
WebElement el = wait.until(EC
    .presenceOfElementLocated(By.id(<span class="str">"dynamicEl"</span>)));

<span class="cm">// Fix 2: Verify locator in DevTools (F12 → Console):</span>
<span class="cm">// document.querySelector('#dynamicEl') → check if returns null</span>

<span class="cm">// Fix 3: Check if inside an iFrame:</span>
driver.switchTo().frame(<span class="str">"myFrame"</span>);
WebElement el = driver.findElement(By.id(<span class="str">"innerEl"</span>));

<span class="cm">// Fix 4: Safe find (no exception — returns boolean):</span>
<span class="kw">boolean</span> exists = !driver.findElements(By.id(<span class="str">"el"</span>)).isEmpty();

<span class="cm">// Fix 5: Try-catch and retry logic:</span>
<span class="kw">try</span> {
    driver.findElement(By.id(<span class="str">"btn"</span>)).click();
} <span class="kw">catch</span> (NoSuchElementException e) {
    System.out.println(<span class="str">"Element not found: "</span> + e.getMessage());
}</pre>`},
{title:"StaleElementReferenceException — causes and fixes",body:`<pre><span class="cm">// Caused by: DOM rebuilt after AJAX, page refresh, navigation</span>
<span class="cm">// Old WebElement reference becomes invalid</span>

<span class="cm">// Fix 1: Re-find element after DOM change:</span>
driver.findElement(By.id(<span class="str">"refresh"</span>)).click();
wait.until(EC.stalenessOf(oldElement)); <span class="cm">// wait for old to die</span>
WebElement fresh = driver.findElement(By.id(<span class="str">"result"</span>)); <span class="cm">// re-find</span>

<span class="cm">// Fix 2: FluentWait ignoring stale:</span>
Wait&lt;WebDriver&gt; w = <span class="kw">new</span> FluentWait&lt;&gt;(driver)
    .withTimeout(Duration.ofSeconds(10))
    .ignoring(StaleElementReferenceException.class);
w.until(d -&gt; { d.findElement(By.id(<span class="str">"el"</span>)).click(); <span class="kw">return true</span>; });

<span class="cm">// Fix 3: Store locator, not element — re-find when needed:</span>
By btnLocator = By.id(<span class="str">"submit"</span>); <span class="cm">// store By, not WebElement</span>
driver.findElement(btnLocator).click(); <span class="cm">// always fresh</span></pre>`},
{title:"ElementNotInteractableException — causes and fixes",body:`<pre><span class="cm">// Caused by: element hidden, covered by overlay, animating, disabled</span>

<span class="cm">// Fix 1: Wait for clickable (visible + enabled):</span>
wait.until(EC.elementToBeClickable(By.id(<span class="str">"btn"</span>))).click();

<span class="cm">// Fix 2: Scroll element into view first:</span>
actions.scrollToElement(element).perform(); <span class="cm">// Selenium 4</span>
element.click();

<span class="cm">// Fix 3: Close overlay blocking element:</span>
driver.findElement(By.id(<span class="str">"cookieBanner"</span>)).click(); <span class="cm">// dismiss</span>
wait.until(EC.elementToBeClickable(By.id(<span class="str">"btn"</span>))).click();

<span class="cm">// Fix 4: JS click as last resort (bypasses visibility check):</span>
JavascriptExecutor js = (JavascriptExecutor) driver;
js.executeScript(<span class="str">"arguments[0].click()"</span>, element);

<span class="cm">// Fix 5: Wait for animation to finish before clicking:</span>
Thread.sleep(500); <span class="cm">// only as last resort — prefer explicit wait</span></pre>`},
{title:"UnhandledAlertException & NoAlertPresentException",body:`<pre><span class="cm">// UnhandledAlertException — unexpected alert appeared during action</span>
<span class="kw">try</span> {
    driver.findElement(By.id(<span class="str">"save"</span>)).click();
} <span class="kw">catch</span> (UnhandledAlertException e) {
    <span class="cm">// Alert appeared! Handle it then continue:</span>
    driver.switchTo().alert().accept();
    System.out.println(<span class="str">"Alert text: "</span> + e.getAlertText());
}

<span class="cm">// NoAlertPresentException — trying to switch to alert that isn't there</span>
<span class="kw">try</span> {
    driver.switchTo().alert().accept();
} <span class="kw">catch</span> (NoAlertPresentException e) {
    System.out.println(<span class="str">"No alert present — skipping"</span>);
}

<span class="cm">// BEST: Use explicit wait before alert interaction:</span>
wait.until(EC.alertIsPresent());
driver.switchTo().alert().accept();</pre>`},
{title:"TimeoutException, InvalidSelector, SessionNotCreated",body:`<pre><span class="cm">// TimeoutException — explicit wait condition not met in time</span>
<span class="kw">try</span> {
    wait.until(EC.visibilityOfElementLocated(By.id(<span class="str">"slowEl"</span>)));
} <span class="kw">catch</span> (TimeoutException e) {
    ScreenshotUtil.capture(driver, <span class="str">"timeout_failure"</span>);
    System.out.println(<span class="str">"Page state: "</span> + driver.getPageSource());
}

<span class="cm">// InvalidSelectorException — bad XPath/CSS syntax</span>
<span class="cm">// WRONG: By.xpath("//div[@class=active]") — missing quotes</span>
<span class="cm">// RIGHT: By.xpath("//div[@class='active']")</span>

<span class="cm">// SessionNotCreatedException — driver/browser version mismatch</span>
<span class="cm">// Fix: Update ChromeDriver to match Chrome browser version</span>
<span class="cm">// Or: Let Selenium Manager handle it (Selenium 4.6+)</span>

<span class="cm">// ElementClickInterceptedException — click blocked by overlay</span>
<span class="kw">try</span> {
    element.click();
} <span class="kw">catch</span> (ElementClickInterceptedException e) {
    js.executeScript(<span class="str">"arguments[0].click()"</span>, element); <span class="cm">// JS click</span>
}</pre>`}
],
mistakes:[
{bad:"Catching WebDriverException broadly and silently ignoring it",good:"Catch specific exception types (NoSuchElementException, StaleElementReferenceException) — handle each appropriately. Always log exception message and take a screenshot"},
{bad:"Not taking a screenshot before catching exceptions in test teardown",good:"In your exception handler or @AfterMethod, always take screenshot BEFORE calling driver.quit() — once quit() is called you lose the browser state forever"}
],
checklist:["Store By locators not WebElements to avoid StaleElementReference on reuse","NoSuchElementException → check locator in DevTools console first","ElementClickInterceptedException → dismiss overlay, scroll to element, then try again","Always screenshot on TimeoutException — it captures the failing page state","SessionNotCreatedException → version mismatch — let Selenium Manager fix automatically"]
},

{id:19,badge:"Relative Locators",bClass:"b3",
title:"Relative Locators — Selenium 4 Feature",
sub:"above · below · toLeftOf · toRightOf · near · chaining",
flow:["What","Why","When","How","Where"],
oneliners:[
{q:"What are Relative Locators in Selenium 4?",a:"Relative Locators (also called Friendly Locators) allow you to find elements based on their spatial position relative to another element — above, below, toLeftOf, toRightOf, near. They use the W3C WebDriver BiDi protocol under the hood."},
{q:"How does the 'near' relative locator work?",a:"near(element) finds elements within 50px of the specified element in any direction. It's useful for finding unlabeled elements (like inputs without id/name) that are visually close to a labeled element."},
{q:"Can you chain relative locators in Selenium 4?",a:"Yes — relative locators can be chained. Example: withTagName('input').above(submitBtn).toRightOf(label) — find an input that is both above the submit button AND to the right of a label element."}
],
diagram:`<svg width="100%" viewBox="0 0 680 300" role="img"><title>Relative locator spatial directions</title><desc>Shows a center reference element with above below toLeftOf toRightOf and near directions</desc><defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="ts" x="340" y="286" text-anchor="middle">near() = within 50px in any direction</text>

concepts:[
{title:"Relative Locators — syntax and import",body:`<pre><span class="kw">import static</span> org.openqa.selenium.support.locators.RelativeLocator.with;

<span class="cm">// Basic structure:</span>
<span class="cm">// with(tagName).direction(referenceElement)</span>

<span class="cm">// Example HTML:</span>
<span class="cm">// &lt;label&gt;Email&lt;/label&gt;  &lt;input type="email" /&gt;</span>
<span class="cm">// &lt;label&gt;Password&lt;/label&gt;  &lt;input type="password" /&gt;</span>
<span class="cm">// &lt;button id="submit"&gt;Login&lt;/button&gt;</span>

WebElement emailLabel = driver.findElement(By.xpath(<span class="str">"//label[text()='Email']"</span>));

<span class="cm">// Find the input to the right of 'Email' label:</span>
WebElement emailInput = driver.findElement(
    with(By.tagName(<span class="str">"input"</span>)).toRightOf(emailLabel));

emailInput.sendKeys(<span class="str">"user@test.com"</span>);</pre>`},
{title:"above() and below() — vertical positioning",body:`<pre>WebElement submitBtn = driver.findElement(By.id(<span class="str">"submit"</span>));

<span class="cm">// Find password input that is ABOVE the submit button:</span>
WebElement passwordField = driver.findElement(
    with(By.tagName(<span class="str">"input"</span>)).above(submitBtn));
passwordField.sendKeys(<span class="str">"Secret123"</span>);

<span class="cm">// Find element BELOW a specific element:</span>
WebElement header = driver.findElement(By.tagName(<span class="str">"h2"</span>));
WebElement firstParagraph = driver.findElement(
    with(By.tagName(<span class="str">"p"</span>)).below(header));

<span class="cm">// Real scenario: form without ids — find inputs by label position</span>
WebElement nameLabel = driver.findElement(
    By.xpath(<span class="str">"//label[text()='Full Name']"</span>));
WebElement nameInput = driver.findElement(
    with(By.tagName(<span class="str">"input"</span>)).toRightOf(nameLabel));
nameInput.sendKeys(<span class="str">"John Doe"</span>);</pre>`},
{title:"near() — proximity-based finding",body:`<pre><span class="cm">// near() finds elements within 50px of the reference element</span>
WebElement emailLabel = driver.findElement(
    By.xpath(<span class="str">"//label[text()='Email']"</span>));

<span class="cm">// Find any input near the email label:</span>
WebElement nearInput = driver.findElement(
    with(By.tagName(<span class="str">"input"</span>)).near(emailLabel));

<span class="cm">// near() is useful for:</span>
<span class="cm">// - Icon buttons next to text (edit/delete icons in table rows)</span>
<span class="cm">// - Inputs that don't have id/name but are next to labeled text</span>
<span class="cm">// - Checkboxes next to their label text</span>

WebElement editIcon = driver.findElement(By.id(<span class="str">"john-row-label"</span>));
WebElement editBtn = driver.findElement(
    with(By.cssSelector(<span class="str">"button.edit-btn"</span>)).near(editIcon));
editBtn.click();</pre>`},
{title:"Chaining relative locators",body:`<pre><span class="cm">// Chain multiple relative locators for precision:</span>
WebElement submitBtn = driver.findElement(By.id(<span class="str">"submit"</span>));
WebElement sideLabel = driver.findElement(By.id(<span class="str">"sideLabel"</span>));

<span class="cm">// Find input that is above submit AND to right of sideLabel:</span>
WebElement preciseInput = driver.findElement(
    with(By.tagName(<span class="str">"input"</span>))
        .above(submitBtn)
        .toRightOf(sideLabel));

<span class="cm">// Real scenario: table row operations</span>
<span class="cm">// Find the delete button in the same row as 'John Doe' cell</span>
WebElement johnCell = driver.findElement(
    By.xpath(<span class="str">"//td[text()='John Doe']"</span>));
WebElement deleteBtn = driver.findElement(
    with(By.cssSelector(<span class="str">"button.delete"</span>))
        .toRightOf(johnCell));
deleteBtn.click();</pre>`},
{title:"Relative locators vs XPath axes — when to use each",body:`<pre><span class="cm">// XPath axes — use for DOM-relationship traversal:</span>
<span class="cm">// Find input that is next sibling of label:</span>
driver.findElement(By.xpath(
    <span class="str">"//label[text()='Email']/following-sibling::input"</span>));

<span class="cm">// Relative Locators — use for VISUAL/SPATIAL positioning:</span>
<span class="cm">// Find input visually to the right of email label:</span>
driver.findElement(
    with(By.tagName(<span class="str">"input"</span>)).toRightOf(emailLabel));

<span class="cm">// Use XPath axes when: elements are DOM siblings/parent/child</span>
<span class="cm">// Use Relative Locators when: elements are visually close but</span>
<span class="cm">// NOT necessarily DOM siblings (e.g. in separate divs/tables)</span>

<span class="cm">// Relative locators use bounding box positions — not DOM tree</span></pre>`}
],
mistakes:[
{bad:"Using near() expecting it to find the closest element — it finds ANY element within 50px",good:"near() finds all elements within 50px and returns the first — if multiple match, specify more constraints. Prefer toRightOf/above with specific tag names"},
{bad:"Relative locators for elements far apart on the page",good:"Relative locators use pixel-based bounding box — elements far apart on the page won't be found by near(). Use standard locators for elements not spatially adjacent"}
],
checklist:["Import: import static RelativeLocator.with — the static import is required","Chain relative locators for precision: with(By.tagName('input')).above(el).toRightOf(label2)","Relative locators are position-based (pixels) not DOM-relationship-based","near() default radius is 50px — cannot be customized in current Selenium 4","Use Relative Locators for unlabeled inputs near labeled text — great for legacy forms"]
},

{id:20,badge:"CDP Support",bClass:"b4",
title:"Native Chrome DevTools Protocol (CDP)",
sub:"Network · Console · Geolocation · Auth · Performance",
flow:["What","Why","When","How","Where"],
oneliners:[
{q:"What is CDP in Selenium 4?",a:"CDP (Chrome DevTools Protocol) is Chrome's low-level debugging API. Selenium 4 provides direct access to CDP via HasDevTools, allowing tests to intercept network requests, mock geolocation, emulate device, capture console logs, and inject credentials — all without browser extensions."},
{q:"Which Selenium 4 interface gives access to CDP?",a:"ChromeDriver implements HasDevTools which provides driver.getDevTools() — returning a DevTools instance. You open a session with devTools.createSession() then call send(Commands.of(...)) to execute CDP commands."},
{q:"Is CDP support only for Chrome in Selenium 4?",a:"CDP is natively Chrome/Chromium-based. Selenium 4 also supports it for Edge (Chromium-based). Firefox has its own BiDi protocol — not CDP. For cross-browser tests, abstract CDP usage behind a feature flag."}
],

<g class="c-purple"><rect x="240" y="20" width="200" height="44" rx="8" stroke-width="1"/><text class="th" x="340" y="46" text-anchor="middle" dominant-baseline="central">Chrome DevTools Protocol</text></g>

<g class="c-teal"><rect x="155" y="100" width="110" height="52" rx="8" stroke-width="0.5"/><text class="th" x="210" y="120" text-anchor="middle" dominant-baseline="central">Console</text><text class="ts" x="210" y="138" text-anchor="middle" dominant-baseline="central">log capture</text></g>

<g class="c-teal"><rect x="415" y="100" width="110" height="52" rx="8" stroke-width="0.5"/><text class="th" x="470" y="120" text-anchor="middle" dominant-baseline="central">Auth</text><text class="ts" x="470" y="138" text-anchor="middle" dominant-baseline="central">basic auth</text></g>

<text class="ts" x="340" y="200" text-anchor="middle">All via: driver.getDevTools().send(Command)</text>
<text class="ts" x="340" y="220" text-anchor="middle">Requires: ChromeDriver or EdgeDriver (Chromium-based)</text>
</svg>`,
concepts:[
{title:"CDP setup — DevTools session",body:`<pre><span class="kw">import</span> org.openqa.selenium.chromium.HasCdp;
<span class="kw">import</span> org.openqa.selenium.devtools.DevTools;
<span class="kw">import</span> org.openqa.selenium.devtools.v120.*; <span class="cm">// use version matching Chrome</span>

ChromeDriver driver = <span class="kw">new</span> ChromeDriver();
DevTools devTools = driver.getDevTools();
devTools.createSession();

<span class="cm">// Alternative using HasCdp (Selenium 4 high-level API):</span>
<span class="cm">// Less version-coupling than direct DevTools commands:</span>
HasCdp cdpDriver = (HasCdp) driver;
Map&lt;String, Object&gt; result = cdpDriver.executeCdpCommand(
    <span class="str">"Network.enable"</span>, Map.of());

<span class="cm">// executeCdpCommand is simpler for one-off CDP calls</span>
<span class="cm">// DevTools.send is better for subscribing to events</span></pre>`},
{title:"Network interception — block/mock requests",body:`<pre>DevTools devTools = ((ChromeDriver)driver).getDevTools();
devTools.createSession();

<span class="cm">// Enable network domain:</span>
devTools.send(Network.enable(Optional.empty(), Optional.empty(), Optional.empty()));

<span class="cm">// Listen for all network requests:</span>
devTools.addListener(Network.requestWillBeSent(), req -&gt; {
    System.out.println(<span class="str">"Request: "</span> + req.getRequest().getUrl());
});

<span class="cm">// Block images to speed up tests:</span>
devTools.send(Network.setBlockedURLs(List.of(<span class="str">"*.png"</span>, <span class="str">"*.jpg"</span>, <span class="str">"*.gif"</span>)));

<span class="cm">// Set custom request headers (e.g. auth token):</span>
devTools.send(Network.setExtraHTTPHeaders(
    new Headers(Map.of(<span class="str">"Authorization"</span>, <span class="str">"Bearer mytoken123"</span>))));</pre>`},
{title:"Geolocation mocking",body:`<pre><span class="kw">import</span> org.openqa.selenium.devtools.v120.emulation.Emulation;

DevTools devTools = ((ChromeDriver)driver).getDevTools();
devTools.createSession();

<span class="cm">// Mock user geolocation to Mumbai, India:</span>
devTools.send(Emulation.setGeolocationOverride(
    Optional.of(19.076),   <span class="cm">// latitude</span>
    Optional.of(72.877),   <span class="cm">// longitude</span>
    Optional.of(1.0)       <span class="cm">// accuracy in meters</span>
));

driver.get(<span class="str">"https://maps.google.com"</span>);
<span class="cm">// Map will show Mumbai location</span>

<span class="cm">// Clear geolocation override:</span>
devTools.send(Emulation.clearGeolocationOverride());</pre>`},
{title:"Console log capture and Basic Auth",body:`<pre><span class="cm">// Capture browser console logs via CDP:</span>
DevTools devTools = ((ChromeDriver)driver).getDevTools();
devTools.createSession();
devTools.send(Log.enable());

List&lt;String&gt; consoleLogs = <span class="kw">new</span> ArrayList&lt;&gt;();
devTools.addListener(Log.entryAdded(), entry -&gt; {
    consoleLogs.add(entry.getLevel() + <span class="str">": "</span> + entry.getText());
    System.out.println(<span class="str">"Console: "</span> + entry.getText());
});

driver.get(<span class="str">"https://app.com"</span>);
System.out.println(<span class="str">"All logs: "</span> + consoleLogs);

<span class="cm">// Basic Authentication via CDP (no popup handling needed):</span>
Predicate&lt;URI&gt; uriPredicate = uri -&gt;
    uri.getHost().contains(<span class="str">"app.com"</span>);
((HasAuthentication) driver).register(uriPredicate,
    UsernameAndPassword.of(<span class="str">"admin"</span>, <span class="str">"password123"</span>));</pre>`},
{title:"Performance metrics capture",body:`<pre><span class="kw">import</span> org.openqa.selenium.devtools.v120.performance.Performance;

DevTools devTools = ((ChromeDriver)driver).getDevTools();
devTools.createSession();
devTools.send(Performance.enable(Optional.empty()));

driver.get(<span class="str">"https://app.com"</span>);

<span class="cm">// Get performance metrics:</span>
List&lt;Metric&gt; metrics = devTools.send(Performance.getMetrics());
metrics.forEach(metric -&gt;
    System.out.println(metric.getName() + <span class="str">": "</span> + metric.getValue()));

<span class="cm">// Key metrics to watch:</span>
<span class="cm">// TaskDuration — total CPU time for tasks</span>
<span class="cm">// JSHeapUsedSize — memory used by JS heap</span>
<span class="cm">// Nodes — number of DOM nodes</span>
<span class="cm">// Documents — number of documents in page</span></pre>`}
],
mistakes:[
{bad:"Hardcoding devtools.v120 version number in imports",good:"CDP API version must match your Chrome version. Use Version.fromString(((ChromeDriver)driver).getCapabilities().getBrowserVersion()) to get the right version programmatically"},
{bad:"Using CDP for things standard Selenium API already handles",good:"Use CDP only for what WebDriver can't do: network interception, geolocation mock, console logs, performance metrics, auth headers. Don't use CDP just because it exists"}
],

oneliners:[
{q:"What is new about window/tab handling in Selenium 4?",a:"Selenium 4 added driver.switchTo().newWindow(WindowType.TAB) and newWindow(WindowType.WINDOW) — allowing you to programmatically open new tabs and windows without clicking links. Previous Selenium had no built-in API for this."},
{q:"How is newWindow() different from opening a URL in the same tab?",a:"newWindow() opens a completely new browser context (tab or window) and automatically switches to it. The original tab/window remains open. This is essential for testing multi-tab workflows, popup windows, and comparing content across tabs."},
{q:"What is the WindowType enum in Selenium 4?",a:"WindowType is a Selenium 4 enum with two values: WindowType.TAB (opens in new tab, same browser window) and WindowType.WINDOW (opens in a new separate browser window). Both return the new handle after switching."}
],

</svg>`,
concepts:[
{title:"newWindow(WindowType.TAB) — open new tab",body:`<pre><span class="kw">import</span> org.openqa.selenium.WindowType;

<span class="cm">// Store original window handle before opening new tab</span>
String originalHandle = driver.getWindowHandle();
System.out.println(<span class="str">"Original: "</span> + originalHandle);

driver.get(<span class="str">"https://app.com"</span>);

<span class="cm">// Open NEW TAB and auto-switch to it:</span>
driver.switchTo().newWindow(WindowType.TAB);

<span class="cm">// Now in new tab — navigate to different URL:</span>
driver.get(<span class="str">"https://app.com/admin"</span>);
System.out.println(<span class="str">"New tab title: "</span> + driver.getTitle());

<span class="cm">// Switch back to original tab:</span>
driver.switchTo().window(originalHandle);
System.out.println(<span class="str">"Back to: "</span> + driver.getTitle());</pre>`},
{title:"newWindow(WindowType.WINDOW) — open new browser window",body:`<pre><span class="cm">// Store current handle</span>
String mainWindow = driver.getWindowHandle();

<span class="cm">// Open NEW BROWSER WINDOW (separate window, not tab):</span>
driver.switchTo().newWindow(WindowType.WINDOW);

<span class="cm">// New window is opened and focused automatically</span>
driver.get(<span class="str">"https://admin.app.com"</span>);
driver.manage().window().maximize();

<span class="cm">// Do work in new window...</span>
String adminData = driver.findElement(By.id(<span class="str">"report"</span>)).getText();

<span class="cm">// Close new window and switch back:</span>
driver.close();                          <span class="cm">// close new window</span>
driver.switchTo().window(mainWindow);    <span class="cm">// go back to main</span>
System.out.println(<span class="str">"Back in main: "</span> + driver.getTitle());</pre>`},
{title:"Multi-tab workflow — full scenario",body:`<pre><span class="cm">// Real scenario: compare prices across 3 tabs</span>
String tab1 = driver.getWindowHandle();
driver.get(<span class="str">"https://shop1.com/product/123"</span>);
String price1 = driver.findElement(By.id(<span class="str">"price"</span>)).getText();

<span class="cm">// Open tab 2:</span>
driver.switchTo().newWindow(WindowType.TAB);
String tab2 = driver.getWindowHandle();
driver.get(<span class="str">"https://shop2.com/product/123"</span>);
String price2 = driver.findElement(By.id(<span class="str">"price"</span>)).getText();

<span class="cm">// Open tab 3:</span>
driver.switchTo().newWindow(WindowType.TAB);
driver.get(<span class="str">"https://shop3.com/product/123"</span>);
String price3 = driver.findElement(By.id(<span class="str">"price"</span>)).getText();

System.out.println(<span class="str">"Shop1: "</span>+price1+<span class="str">" | Shop2: "</span>+price2+<span class="str">" | Shop3: "</span>+price3);

<span class="cm">// Switch back to tab 1:</span>
driver.switchTo().window(tab1);</pre>`},
{title:"Selenium 3 vs 4 — window tab comparison",body:`<pre><span class="cm">// SELENIUM 3 — open new tab via JavaScript (workaround):</span>
((JavascriptExecutor) driver).executeScript(<span class="str">"window.open()"</span>);
Set&lt;String&gt; handles = driver.getWindowHandles();
String newTab = handles.stream()
    .filter(h -&gt; !h.equals(originalHandle))
    .findFirst().orElse(<span class="str">""</span>);
driver.switchTo().window(newTab);

<span class="cm">// SELENIUM 4 — built-in, clean API:</span>
driver.switchTo().newWindow(WindowType.TAB);  <span class="cm">// auto-switches</span>
driver.get(<span class="str">"https://newpage.com"</span>);

<span class="cm">// Selenium 4 also supports getting ALL handles:</span>
Set&lt;String&gt; allHandles = driver.getWindowHandles();
allHandles.forEach(h -&gt; System.out.println(<span class="str">"Handle: "</span> + h));</pre>`},
{title:"Close specific tab and cleanup all",body:`<pre><span class="cm">// Clean up — close all tabs except main:</span>
String mainHandle = driver.getWindowHandle();

<span class="cm">// Get handles before opening new ones:</span>
driver.switchTo().newWindow(WindowType.TAB);
driver.get(<span class="str">"https://extra.com"</span>);

<span class="cm">// Close current tab (extra.com):</span>
driver.close();                         <span class="cm">// closes current tab only</span>
driver.switchTo().window(mainHandle);   <span class="cm">// must switch after close!</span>

<span class="cm">// Close ALL tabs and quit browser (test teardown):</span>
driver.quit(); <span class="cm">// always use quit() in teardown — never close() alone</span>

<span class="cm">// Pattern: close tab → switch → continue</span>
<span class="cm">// Without switchTo() after close() → NoSuchWindowException</span></pre>`}
],
mistakes:[
{bad:"Calling driver.close() and continuing without driver.switchTo().window(handle)",good:"After close(), driver context is lost — always immediately switchTo() a valid window handle. Test for NoSuchWindowException by wrapping in try-catch if unsure which handle is valid"},
{bad:"Using JS window.open() for new tabs in Selenium 4",good:"Use driver.switchTo().newWindow(WindowType.TAB) — it opens the tab AND auto-switches. JS window.open() requires manual handle detection afterward"}
],
checklist:["newWindow() auto-switches to the new tab/window — no manual switchTo needed","Store original window handle BEFORE calling newWindow()","After driver.close(), ALWAYS switchTo() a remaining valid handle","driver.quit() closes ALL tabs/windows — use only in @After teardown","WindowType.TAB vs WindowType.WINDOW — same content isolation, different UI presentation"]
},

{q:"What is ChromeOptions and what can it configure?",a:"ChromeOptions is the Selenium 4 class for configuring Chrome browser sessions. It supports: command-line arguments (--headless, --window-size), experimental options (excludeSwitches, useAutomationExtension), user preferences (download directory, notifications), and W3C capabilities."},
{q:"How do you run Chrome in headless mode in Selenium 4?",a:"Use options.addArguments('--headless=new') — the new headless mode in Chrome 112+ is more stable and matches headed Chrome behavior. The old --headless flag uses the legacy headless which has rendering differences."},
{q:"What is the difference between addArguments and setExperimentalOption?",a:"addArguments() passes Chrome command-line flags (like --disable-gpu). setExperimentalOption() sets Chrome-specific options not in W3C spec (like 'prefs' for user profile settings and 'excludeSwitches' for disabling Chrome features)."}
],
