}

  body{font-family:var(--font-sans)}

  .card-title i{font-size:16px;color:var(--color-text-secondary)}

  ul.list{padding-left:1.2rem;font-size:13px;color:var(--color-text-secondary);line-height:1.8}
  ul.list li{margin-bottom:2px}

  .diagram-wrap{margin:1rem 0}
  .nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:1rem;padding-top:1rem;border-top:0.5px solid var(--color-border-tertiary)}

  .prog{font-size:12px;color:var(--color-text-secondary)}

<span class="cm">// Uses W3C WebDriver protocol (from Selenium 3.8+)</span>
<span class="cm">// Driver setup: manual DesiredCapabilities or System.setProperty</span>
WebDriver driver = <span class="kw">new</span> ChromeDriver();

<span class="cm">// Selenium 4 adds: Relative Locators, CDP, new DevTools API</span>

{

  diagram:`<svg width="100%" viewBox="0 0 680 380" role="img"><title>Selenium WebDriver architecture</title><desc>4-layer architecture: Java test code to Selenium client library to browser driver to browser</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  </svg>`,
  concepts:[
    {title:"Architecture layers — code view", body:`<pre><span class="cm">// Layer 1: Your test code (uses WebDriver interface)</span>
WebDriver driver = <span class="kw">new</span> ChromeDriver(); <span class="cm">// Layer 2: Client lib creates driver</span>

<span class="cm">// Layer 3: Behind the scenes — selenium sends HTTP to ChromeDriver:</span>
<span class="cm">// POST http://localhost:9515/session</span>
<span class="cm">// {"capabilities": {"browserName": "chrome"}}</span>

<span class="cm">// Layer 4: ChromeDriver starts Chrome and returns session ID</span>
driver.get(<span class="str">"https://google.com"</span>);
<span class="cm">// POST http://localhost:9515/session/{id}/url</span>

driver = <span class="kw">new</span> FirefoxDriver(); <span class="cm">// no other code changes needed!</span></pre>`},

<span class="cm">// SafariDriver  → Apple Safari    (built-in on macOS)</span>
<span class="cm">// IEDriver      → Internet Explorer (deprecated)</span>

<span class="cm">// Important: Driver version MUST match browser version!</span>

<span class="cm">                                <span class="cm">// → Node 2 (Firefox on Linux)</span>
<span class="cm">                                <span class="cm">// → Node 3 (Safari on macOS)</span>

<span class="cm">// Hub is the master that distributes tests to Nodes</span>
<span class="cm">// Node registers its capabilities with the Hub</span>
<span class="cm">// Use RemoteWebDriver to target Grid:</span>
WebDriver driver = <span class="kw">new</span> RemoteWebDriver(hubUrl, capabilities);</pre>`}

  concepts:[
    {title:"pom.xml — essential Selenium 3 dependency", body:`<pre><span class="cm">&lt;!-- Add to pom.xml --&gt;</span>
&lt;dependencies&gt;
  &lt;dependency&gt;
    &lt;groupId&gt;org.seleniumhq.selenium&lt;/groupId&gt;
    &lt;artifactId&gt;selenium-java&lt;/artifactId&gt;
    &lt;version&gt;<span class="str">3.141.59</span>&lt;/version&gt; <span class="cm">&lt;!-- latest Selenium 3 --&gt;</span>
  &lt;/dependency&gt;
&lt;/dependencies&gt;

<span class="cm">// selenium-java pulls in ALL browser drivers + support libs</span>
<span class="cm">// Single dependency = everything you need for Selenium 3</span></pre>`},
    {title:"Driver setup — Windows / Linux / macOS", body:`<pre><span class="cm">// OPTION A: System.setProperty (explicit path, works everywhere)</span>

<span class="cm">// Windows:</span>
System.setProperty(<span class="str">"webdriver.chrome.driver"</span>, <span class="str">"C:\\drivers\\chromedriver.exe"</span>);

<span class="cm">// Linux / macOS:</span>
System.setProperty(<span class="str">"webdriver.chrome.driver"</span>, <span class="str">"/usr/local/bin/chromedriver"</span>);

<span class="cm">// OPTION B: Add driver to system PATH (no code change needed)</span>
<span class="cm">// Windows: Edit Environment Variables → PATH → add C:\drivers\</span>
<span class="cm">// Linux/Mac: export PATH=$PATH:/usr/local/bin in ~/.bashrc</span>

WebDriver driver = <span class="kw">new</span> ChromeDriver();</pre>`},
    {title:"Firefox / Edge / Safari setup", body:`<pre><span class="cm">// Firefox — needs GeckoDriver</span>
System.setProperty(<span class="str">"webdriver.gecko.driver"</span>, <span class="str">"/path/to/geckodriver"</span>);
WebDriver driver = <span class="kw">new</span> FirefoxDriver();

<span class="cm">// Edge — needs EdgeDriver (matches Edge browser version)</span>
System.setProperty(<span class="str">"webdriver.edge.driver"</span>, <span class="str">"path/to/msedgedriver.exe"</span>);
WebDriver driver = <span class="kw">new</span> EdgeDriver();

<span class="cm">// Safari — built-in driver on macOS (enable in Safari → Preferences)</span>
<span class="cm">// Safari → Develop → Allow Remote Automation</span>
WebDriver driver = <span class="kw">new</span> SafariDriver(); <span class="cm">// no setProperty needed</span></pre>`},
    {title:"Linux headless setup (CI/CD)", body:`<pre><span class="cm">// Linux servers have no display — run Chrome headless</span>
ChromeOptions options = <span class="kw">new</span> ChromeOptions();
options.addArguments(<span class="str">"--headless"</span>);
options.addArguments(<span class="str">"--no-sandbox"</span>);         <span class="cm">// required in Docker</span>
options.addArguments(<span class="str">"--disable-dev-shm-usage"</span>); <span class="cm">// prevents crashes</span>
options.addArguments(<span class="str">"--window-size=1920,1080"</span>); <span class="cm">// set viewport</span>

WebDriver driver = <span class="kw">new</span> ChromeDriver(options);

<span class="cm">// Firefox headless:</span>
FirefoxOptions ffOpts = <span class="kw">new</span> FirefoxOptions();
ffOpts.setHeadless(<span class="kw">true</span>);
WebDriver driver = <span class="kw">new</span> FirefoxDriver(ffOpts);</pre>`}
  ],
  mistakes:[
    {bad:"Hardcoding Windows path (C:\\drivers\\) in code pushed to Linux CI server",good:"Use environment variable or relative path: System.getenv(\"CHROME_DRIVER\") so the same code runs on all OS"},
    {bad:"Driver version mismatch: Chrome 115 + ChromeDriver 112",good:"Always download ChromeDriver version that matches your Chrome browser exactly — check chrome://version first"}
  ],
  checklist:["selenium-java 3.141.59 is the final Selenium 3 release — use it","Always match ChromeDriver version to installed Chrome version","Use --headless --no-sandbox --disable-dev-shm-usage for Linux CI","Store driver path in config file or env var, never hardcode OS path","Download drivers from: chromedriver.chromium.org / github.com/mozilla/geckodriver"]
},
{
  id:4, badge:"WebDriver API", bClass:"b2",
  title:"WebDriver Hierarchy & Core API",
  sub:"WebDriver interface · RemoteWebDriver · Browser drivers",
  flow:["What","Why","When","How","Where"],
  oneliners:[
    {q:"What is the WebDriver class hierarchy?", a:"WebDriver is an interface. RemoteWebDriver implements it. ChromeDriver, FirefoxDriver, EdgeDriver all extend RemoteWebDriver — so they inherit both WebDriver behavior and remote communication capabilities."},
    {q:"Why does ChromeDriver extend RemoteWebDriver?", a:"RemoteWebDriver handles all the HTTP communication with the browser driver server. Extending it means ChromeDriver gets that infrastructure for free and only needs to define Chrome-specific configurations."},
    {q:"What is the difference between WebDriver and RemoteWebDriver?", a:"WebDriver is a pure interface (contract). RemoteWebDriver is its concrete implementation that handles the actual JSON Wire Protocol communication — all browser-specific drivers extend RemoteWebDriver."}
  ],
  diagram:`<svg width="100%" viewBox="0 0 680 400" role="img"><title>WebDriver class hierarchy</title><desc>Shows WebDriver interface at top, SearchContext parent interface, RemoteWebDriver implementation, then ChromeDriver FirefoxDriver EdgeDriver SafariDriver as leaf classes</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <g class="c-purple"><rect x="240" y="20" width="200" height="52" rx="8" stroke-width="0.5"/><text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">«interface»</text><text class="th" x="340" y="58" text-anchor="middle" dominant-baseline="central">SearchContext</text></g>
  <line x1="340" y1="72" x2="340" y2="100" class="arr" marker-end="url(#arrow)" stroke="var(--color-text-tertiary)"/>
  <g class="c-purple"><rect x="240" y="100" width="200" height="52" rx="8" stroke-width="1"/><text class="th" x="340" y="120" text-anchor="middle" dominant-baseline="central">«interface»</text><text class="th" x="340" y="138" text-anchor="middle" dominant-baseline="central">WebDriver</text></g>
  <text class="ts" x="460" y="126" text-anchor="start">extends SearchContext</text>
  <line x1="340" y1="152" x2="340" y2="180" class="arr" marker-end="url(#arrow)" stroke="var(--color-text-tertiary)"/>
  <g class="c-teal"><rect x="240" y="180" width="200" height="52" rx="8" stroke-width="0.5"/><text class="th" x="340" y="200" text-anchor="middle" dominant-baseline="central">RemoteWebDriver</text><text class="ts" x="340" y="218" text-anchor="middle" dominant-baseline="central">implements WebDriver</text></g>
  <line x1="200" y1="232" x2="100" y2="300" class="arr" marker-end="url(#arrow)" stroke="var(--color-text-tertiary)"/>
  <line x1="280" y1="232" x2="220" y2="300" class="arr" marker-end="url(#arrow)" stroke="var(--color-text-tertiary)"/>
  <line x1="400" y1="232" x2="400" y2="300" class="arr" marker-end="url(#arrow)" stroke="var(--color-text-tertiary)"/>
  <line x1="480" y1="232" x2="570" y2="300" class="arr" marker-end="url(#arrow)" stroke="var(--color-text-tertiary)"/>
  <g class="c-amber"><rect x="30" y="300" width="140" height="52" rx="8" stroke-width="0.5"/><text class="th" x="100" y="320" text-anchor="middle" dominant-baseline="central">ChromeDriver</text><text class="ts" x="100" y="338" text-anchor="middle" dominant-baseline="central">Chrome browser</text></g>
  <g class="c-amber"><rect x="185" y="300" width="140" height="52" rx="8" stroke-width="0.5"/><text class="th" x="255" y="320" text-anchor="middle" dominant-baseline="central">FirefoxDriver</text><text class="ts" x="255" y="338" text-anchor="middle" dominant-baseline="central">Firefox browser</text></g>
  <g class="c-amber"><rect x="335" y="300" width="140" height="52" rx="8" stroke-width="0.5"/><text class="th" x="405" y="320" text-anchor="middle" dominant-baseline="central">EdgeDriver</text><text class="ts" x="405" y="338" text-anchor="middle" dominant-baseline="central">Edge browser</text></g>
  <g class="c-amber"><rect x="490" y="300" width="140" height="52" rx="8" stroke-width="0.5"/><text class="th" x="560" y="320" text-anchor="middle" dominant-baseline="central">SafariDriver</text><text class="ts" x="560" y="338" text-anchor="middle" dominant-baseline="central">Safari (macOS)</text></g>
  </svg>`,
  concepts:[
    {title:"WebDriver interface — all available methods", body:`<pre><span class="cm">// WebDriver interface defines these core methods:</span>
driver.get(String url)           <span class="cm">// navigate to URL</span>
driver.getCurrentUrl()           <span class="cm">// get current URL string</span>
driver.getTitle()                <span class="cm">// get page &lt;title&gt;</span>
driver.findElement(By by)        <span class="cm">// find single element</span>
driver.findElements(By by)       <span class="cm">// find list of elements</span>
driver.getPageSource()           <span class="cm">// get HTML of page</span>
driver.close()                   <span class="cm">// close current tab</span>
driver.quit()                    <span class="cm">// close ALL windows + kill driver</span>
driver.getWindowHandle()         <span class="cm">// current window handle</span>
driver.getWindowHandles()        <span class="cm">// all open window handles</span>
driver.switchTo()                <span class="cm">// switch to frame/alert/window</span>
driver.navigate()                <span class="cm">// browser back/forward/refresh</span>
driver.manage()                  <span class="cm">// timeouts, cookies, window size</span></pre>`},
    {title:"WebDriver sub-interfaces inside driver", body:`<pre><span class="cm">// driver.navigate() returns WebDriver.Navigation:</span>
driver.navigate().to(<span class="str">"https://example.com"</span>);
driver.navigate().back();
driver.navigate().forward();
driver.navigate().refresh();

<span class="cm">// driver.manage() returns WebDriver.Options:</span>
driver.manage().window().maximize();
driver.manage().timeouts().implicitlyWait(10, TimeUnit.SECONDS);
driver.manage().deleteAllCookies();
driver.manage().getCookies();

<span class="cm">// driver.switchTo() returns WebDriver.TargetLocator:</span>
driver.switchTo().frame(<span class="str">"frameName"</span>);
driver.switchTo().alert().accept();
driver.switchTo().window(handle);</pre>`},
    {title:"Casting to browser-specific driver", body:`<pre><span class="cm">// Sometimes you need browser-specific features</span>
<span class="cm">// Cast WebDriver to ChromeDriver for Chrome-specific API:</span>
WebDriver driver = <span class="kw">new</span> ChromeDriver();

<span class="cm">// ChromeDriver has extra capabilities from HasCapabilities:</span>
ChromeDriver chrome = (ChromeDriver) driver;
chrome.executeCdpCommand(<span class="str">"Network.enable"</span>, params); <span class="cm">// Chrome DevTools</span>

<span class="cm">// JavascriptExecutor — cast to run JS in browser:</span>
JavascriptExecutor js = (JavascriptExecutor) driver;
js.executeScript(<span class="str">"window.scrollTo(0, document.body.scrollHeight)"</span>);
js.executeScript(<span class="str">"arguments[0].click();"</span>, element); <span class="cm">// JS click</span></pre>`},
    {title:"RemoteWebDriver — for Selenium Grid", body:`<pre><span class="cm">// RemoteWebDriver connects to a remote Grid Hub</span>
URL hubUrl = <span class="kw">new</span> URL(<span class="str">"http://hub-server:4444/wd/hub"</span>);

DesiredCapabilities caps = <span class="kw">new</span> DesiredCapabilities();
caps.setBrowserName(<span class="str">"chrome"</span>);
caps.setPlatform(Platform.LINUX);

WebDriver driver = <span class="kw">new</span> RemoteWebDriver(hubUrl, caps);

<span class="cm">// Or with ChromeOptions (more modern approach in Selenium 3):</span>
ChromeOptions opts = <span class="kw">new</span> ChromeOptions();
opts.setCapability(<span class="str">"platformName"</span>, <span class="str">"linux"</span>);
WebDriver driver = <span class="kw">new</span> RemoteWebDriver(hubUrl, opts);</pre>`}
  ],
  mistakes:[
    {bad:"WebDriver driver = new ChromeDriver(); — declaring as concrete type everywhere",good:"Always declare as WebDriver driver; for browser-agnostic code. Cast only when you specifically need browser-specific APIs"},
    {bad:"Calling driver.close() at end of test and assuming cleanup is done",good:"Use driver.quit() to kill the entire browser process. driver.close() only closes the current tab — leaving background ChromeDriver processes running"}
  ],
  checklist:["WebDriver is an interface — always declare variables as WebDriver type","RemoteWebDriver is the concrete implementation all browser drivers extend","driver.quit() kills ALL windows + the driver process — use in @After/teardown","driver.close() only closes current window — use carefully in multi-tab tests","Cast to JavascriptExecutor when you need to run JS in the browser"]
},
{
  id:5, badge:"Locators", bClass:"b2",
  title:"Locator Strategies — Finding Elements",
  sub:"By.id · By.name · By.xpath · By.cssSelector · By.linkText · By.tagName",
  flow:["What","Why","When","How","Where"],
  oneliners:[
    {q:"What is a locator in Selenium?", a:"A locator is a strategy used by Selenium to uniquely identify a web element in the DOM — similar to giving GPS coordinates to find a specific building in a city."},
    {q:"Which locator is the fastest and most reliable?", a:"By.id is the fastest (direct DOM lookup, O(1)). By.cssSelector is next best for performance and readability. By.xpath is the most powerful but slowest — use it only when CSS can't cover the use case."},
    {q:"What is XPath? Give 2 types.", a:"XPath is a query language for XML/HTML. Absolute XPath starts from root (/html/body/div...) — brittle. Relative XPath starts with // and searches anywhere in DOM (//*[@id='btn']) — use this always."}
  ],
  diagram:`<svg width="100%" viewBox="0 0 680 310" role="img"><title>Selenium locator priority guide</title><desc>Shows locator strategies ranked by reliability and speed from most preferred to least preferred</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <text class="th" x="340" y="30" text-anchor="middle">Locator priority — use top first, fall back downward</text>
  <g class="c-teal"><rect x="200" y="50" width="280" height="40" rx="6" stroke-width="0.5"/><text class="th" x="340" y="75" text-anchor="middle" dominant-baseline="central">① By.id — fastest, most unique</text></g>
  <g class="c-teal"><rect x="175" y="100" width="330" height="40" rx="6" stroke-width="0.5"/><text class="th" x="340" y="125" text-anchor="middle" dominant-baseline="central">② By.name — good if unique in form</text></g>
  <g class="c-teal"><rect x="150" y="150" width="380" height="40" rx="6" stroke-width="0.5"/><text class="th" x="340" y="175" text-anchor="middle" dominant-baseline="central">③ By.cssSelector — fast, readable</text></g>
  <g class="c-amber"><rect x="125" y="200" width="430" height="40" rx="6" stroke-width="0.5"/><text class="th" x="340" y="225" text-anchor="middle" dominant-baseline="central">④ By.linkText / partialLinkText — links only</text></g>
  <g class="c-coral"><rect x="100" y="250" width="480" height="40" rx="6" stroke-width="0.5"/><text class="th" x="340" y="275" text-anchor="middle" dominant-baseline="central">⑤ By.xpath — most powerful, use as last resort</text></g>
  <text class="ts" x="86" y="70" text-anchor="end" fill="var(--color-text-success)">Best ↑</text>
  <text class="ts" x="86" y="275" text-anchor="end" fill="var(--color-text-danger)">↓ Slow</text>
  </svg>`,
  concepts:[
    {title:"All locator types — syntax reference", body:`<pre><span class="cm">// By.id — use when element has unique id attribute</span>
driver.findElement(By.id(<span class="str">"loginBtn"</span>));

<span class="cm">// By.name — HTML name attribute</span>
driver.findElement(By.name(<span class="str">"username"</span>));

<span class="cm">// By.className — use single class, not compound</span>
driver.findElement(By.className(<span class="str">"primary-btn"</span>));

<span class="cm">// By.tagName — use to get all elements of a type</span>
driver.findElements(By.tagName(<span class="str">"a"</span>)); <span class="cm">// all links</span>

<span class="cm">// By.linkText — exact text match of anchor tag</span>
driver.findElement(By.linkText(<span class="str">"Sign In"</span>));

<span class="cm">// By.partialLinkText — partial text match</span>
driver.findElement(By.partialLinkText(<span class="str">"Sign"</span>));</pre>`},
    {title:"By.cssSelector — full syntax guide", body:`<pre><span class="cm">// Tag selector</span>
By.cssSelector(<span class="str">"input"</span>)

<span class="cm">// ID selector (# prefix)</span>
By.cssSelector(<span class="str">"#loginBtn"</span>)

<span class="cm">// Class selector (. prefix)</span>
By.cssSelector(<span class="str">".primary-btn"</span>)

<span class="cm">// Attribute selector</span>
By.cssSelector(<span class="str">"input[type='submit']"</span>)
By.cssSelector(<span class="str">"input[placeholder='Enter email']"</span>)

<span class="cm">// Partial attribute match</span>
By.cssSelector(<span class="str">"input[id*='user']"</span>)  <span class="cm">// contains 'user'</span>
By.cssSelector(<span class="str">"input[id^='log']"</span>)   <span class="cm">// starts with 'log'</span>
By.cssSelector(<span class="str">"input[id$='name']"</span>)  <span class="cm">// ends with 'name'</span>

<span class="cm">// Parent → child</span>
By.cssSelector(<span class="str">"div.form > input#email"</span>)</pre>`},
    {title:"By.xpath — relative xpath patterns", body:`<pre><span class="cm">// ALWAYS use relative XPath (starts with //)</span>
<span class="cm">// NEVER use absolute XPath (/html/body/div[1]/input)</span>

<span class="cm">// Attribute match</span>
By.xpath(<span class="str">"//*[@id='loginBtn']"</span>)
By.xpath(<span class="str">"//input[@type='submit']"</span>)

<span class="cm">// Text match</span>
By.xpath(<span class="str">"//button[text()='Sign In']"</span>)
By.xpath(<span class="str">"//button[contains(text(),'Sign')]"</span>)

<span class="cm">// Parent-child navigation</span>
By.xpath(<span class="str">"//div[@class='form']//input[@name='email']"</span>)

<span class="cm">// XPath axes — navigate DOM relations</span>
By.xpath(<span class="str">"//label[text()='Email']/following-sibling::input"</span>)
By.xpath(<span class="str">"//input[@id='email']/parent::div"</span>)
By.xpath(<span class="str">"//table/tbody/tr[2]/td[3]"</span>) <span class="cm">// row 2, col 3</span></pre>`},
    {title:"findElement vs findElements", body:`<pre><span class="cm">// findElement — returns SINGLE WebElement, throws NoSuchElementException if not found</span>
WebElement loginBtn = driver.findElement(By.id(<span class="str">"loginBtn"</span>));

<span class="cm">// findElements — returns List&lt;WebElement&gt;, returns EMPTY LIST if not found (no exception)</span>
List&lt;WebElement&gt; allLinks = driver.findElements(By.tagName(<span class="str">"a"</span>));
System.out.println(<span class="str">"Total links: "</span> + allLinks.size());

<span class="cm">// Best practice: use findElements to CHECK if element exists:</span>
<span class="kw">boolean</span> isPresent = !driver.findElements(By.id(<span class="str">"errorMsg"</span>)).isEmpty();

<span class="cm">// Iterate all matching elements:</span>
<span class="kw">for</span> (WebElement link : allLinks) {
    System.out.println(link.getText());
}</pre>`}
  ],
  mistakes:[
    {bad:"//div[1]/form/input[2] — absolute or positional XPath",good:"Use attribute-based XPath: //input[@id='email'] — positional XPaths break when UI changes"},
    {bad:"By.className(\"btn primary active\") — multiple classes",good:"Multiple classes throw InvalidSelectorException. Use cssSelector: By.cssSelector(\".btn.primary.active\") or XPath contains()"}
  ],
  checklist:["Prefer id > name > cssSelector > xpath in that order","Never use absolute XPath — always use relative XPath starting with //","findElements() never throws exception — returns empty list if nothing found","CSS attribute selectors: *= contains, ^= starts-with, $= ends-with","Verify your XPath/CSS in browser DevTools console: $x('//input') or $$('.btn')"]
},
{
  id:6, badge:"WebElement", bClass:"b3",
  title:"WebElement API — Interactions",
  sub:"click · sendKeys · getText · getAttribute · isDisplayed",
  flow:["What","Why","When","How","Where"],
  oneliners:[
    {q:"What is a WebElement?", a:"WebElement is a Selenium interface representing a single HTML element in the DOM — like a button, input field, or link. It provides methods to interact with or read properties of that element."},
    {q:"What is the difference between getText() and getAttribute()?", a:"getText() returns the visible text content between tags (like the label on a button). getAttribute(name) returns the value of an HTML attribute (like value, placeholder, class, href) — including hidden attributes not visible on screen."},
    {q:"When would you use isDisplayed() vs isEnabled() vs isSelected()?", a:"isDisplayed() checks if element is visible (not hidden by CSS). isEnabled() checks if it can be interacted with (not disabled). isSelected() checks if a checkbox/radio/option is currently selected."}
  ],
  diagram:`<svg width="100%" viewBox="0 0 680 300" role="img"><title>WebElement API method groups</title><desc>Shows WebElement methods grouped into Actions, State checks, and Property reads</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <g class="c-gray"><rect x="40" y="60" width="180" height="28" rx="4" stroke-width="0.5"/><text class="ts" x="130" y="78" text-anchor="middle" dominant-baseline="central">.click()</text></g>
  <g class="c-gray"><rect x="40" y="96" width="180" height="28" rx="4" stroke-width="0.5"/><text class="ts" x="130" y="114" text-anchor="middle" dominant-baseline="central">.sendKeys(text)</text></g>
  <g class="c-gray"><rect x="40" y="132" width="180" height="28" rx="4" stroke-width="0.5"/><text class="ts" x="130" y="150" text-anchor="middle" dominant-baseline="central">.clear()</text></g>
  <g class="c-gray"><rect x="40" y="168" width="180" height="28" rx="4" stroke-width="0.5"/><text class="ts" x="130" y="186" text-anchor="middle" dominant-baseline="central">.submit()</text></g>

    {title:"Core interactions — click, type, clear", body:`<pre>WebElement username = driver.findElement(By.id(<span class="str">"username"</span>));

<span class="cm">// Send special keys (Tab, Enter, Ctrl+A etc.)</span>

<span class="cm">// Click button</span>

<span class="cm">// Or submit the form containing the element</span>

    {title:"State verification — assertions in tests", body:`<pre>WebElement submitBtn = driver.findElement(By.id(<span class="str">"submit"</span>));

<span class="cm">// Check element is visible on screen</span>
<span class="kw">boolean</span> visible  = submitBtn.isDisplayed(); <span class="cm">// true/false</span>

<span class="cm">// Check button is clickable (not disabled)</span>
<span class="kw">boolean</span> enabled  = submitBtn.isEnabled();   <span class="cm">// false if disabled=""</span>

<span class="cm">// Check checkbox/radio is checked</span>
<span class="kw">boolean</span> selected = agreeBox.isSelected();   <span class="cm">// true if checked</span>

<span class="cm">// Common assertion pattern:</span>
<span class="kw">if</span> (!submitBtn.isEnabled()) {
    System.out.println(<span class="str">"FAIL: Submit button is disabled!"</span>);
}</pre>`},
    {title:"Reading text and attributes", body:`<pre>WebElement heading = driver.findElement(By.tagName(<span class="str">"h1"</span>));
WebElement inputEl = driver.findElement(By.id(<span class="str">"email"</span>));
WebElement anchor  = driver.findElement(By.linkText(<span class="str">"Home"</span>));

<span class="cm">// getText() — visible text content between tags</span>
String pageTitle = heading.getText(); <span class="cm">// "Welcome to Dashboard"</span>

<span class="cm">// getAttribute() — HTML attribute value</span>
String placeholder = inputEl.getAttribute(<span class="str">"placeholder"</span>); <span class="cm">// "Enter email"</span>
String currentVal  = inputEl.getAttribute(<span class="str">"value"</span>);       <span class="cm">// typed value</span>
String href        = anchor.getAttribute(<span class="str">"href"</span>);          <span class="cm">// URL</span>
String classes     = inputEl.getAttribute(<span class="str">"class"</span>);        <span class="cm">// CSS classes</span>

<span class="cm">// getCssValue() — computed CSS property</span>
String color  = heading.getCssValue(<span class="str">"color"</span>);        <span class="cm">// rgba(0, 0, 0, 1)</span>
String display = inputEl.getCssValue(<span class="str">"display"</span>);     <span class="cm">// block/none/inline</span></pre>`},
    {title:"Working with dropdowns — Select class", body:`<pre><span class="cm">// For native HTML &lt;select&gt; dropdowns, use the Select helper class</span>
<span class="kw">import</span> org.openqa.selenium.support.ui.Select;

WebElement dropdownEl = driver.findElement(By.id(<span class="str">"country"</span>));
Select dropdown = <span class="kw">new</span> Select(dropdownEl);

<span class="cm">// Three ways to choose an option:</span>
dropdown.selectByVisibleText(<span class="str">"India"</span>);   <span class="cm">// by display text</span>
dropdown.selectByValue(<span class="str">"IN"</span>);             <span class="cm">// by value attribute</span>
dropdown.selectByIndex(2);                  <span class="cm">// by 0-based index</span>

<span class="cm">// Read currently selected:</span>
String selected = dropdown.getFirstSelectedOption().getText();

<span class="cm">// Multi-select dropdown:</span>
dropdown.selectByVisibleText(<span class="str">"Java"</span>);
dropdown.selectByVisibleText(<span class="str">"Python"</span>);
List&lt;WebElement&gt; selections = dropdown.getAllSelectedOptions();</pre>`}

  mistakes:[
    {bad:"element.sendKeys(\"text\") without element.clear() first — appending to existing content",good:"Always call clear() before sendKeys() unless you intentionally want to append text"},

{
  id:7, badge:"Waits", bClass:"b3",
  title:"Synchronization — Waits & Timeouts",
  sub:"Implicit Wait · Explicit Wait · FluentWait · Thread.sleep (avoid)",
  flow:["What","Why","When","How","Where"],
  oneliners:[
    {q:"What is the difference between implicit and explicit wait?", a:"Implicit wait is a global setting that makes all findElement calls wait up to N seconds — set once, applies everywhere. Explicit wait is targeted — it waits for a SPECIFIC condition on a SPECIFIC element, only when you call it."},
    {q:"Why is Thread.sleep bad in Selenium tests?", a:"Thread.sleep is a fixed wait — it always waits the full N milliseconds regardless of whether the element appeared in 0.5 seconds. This makes tests slower than needed and still brittle if the page takes longer than expected."},
    {q:"What is FluentWait?", a:"FluentWait is the most customizable wait — you can set max wait time, polling frequency (how often to check), and exceptions to ignore during polling. WebDriverWait is built on top of FluentWait with default settings."}
  ],
  diagram:`<svg width="100%" viewBox="0 0 680 320" role="img"><title>Selenium wait types comparison</title><desc>Shows three wait strategies: Thread.sleep fixed, implicit wait global, explicit wait conditional</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <g class="c-coral"><rect x="20" y="30" width="190" height="100" rx="8" stroke-width="0.5"/><text class="th" x="115" y="58" text-anchor="middle" dominant-baseline="central">Thread.sleep</text><text class="ts" x="115" y="80" text-anchor="middle" dominant-baseline="central">Fixed wait — AVOID</text><text class="ts" x="115" y="100" text-anchor="middle" dominant-baseline="central">Always full duration</text><text class="ts" x="115" y="118" text-anchor="middle" dominant-baseline="central">Makes tests slow</text></g>
  <g class="c-amber"><rect x="245" y="30" width="190" height="100" rx="8" stroke-width="0.5"/><text class="th" x="340" y="58" text-anchor="middle" dominant-baseline="central">Implicit Wait</text><text class="ts" x="340" y="80" text-anchor="middle" dominant-baseline="central">Global setting</text><text class="ts" x="340" y="100" text-anchor="middle" dominant-baseline="central">Applies to all finds</text><text class="ts" x="340" y="118" text-anchor="middle" dominant-baseline="central">OK for stable apps</text></g>
  <g class="c-teal"><rect x="470" y="30" width="190" height="100" rx="8" stroke-width="1"/><text class="th" x="565" y="58" text-anchor="middle" dominant-baseline="central">Explicit Wait</text><text class="ts" x="565" y="80" text-anchor="middle" dominant-baseline="central">Targeted condition</text><text class="ts" x="565" y="100" text-anchor="middle" dominant-baseline="central">Polls until true</text><text class="ts" x="565" y="118" text-anchor="middle" dominant-baseline="central">Best practice ✓</text></g>
  <text class="ts" x="340" y="165" text-anchor="middle">Explicit wait polling timeline</text>
  <rect x="40" y="175" width="600" height="40" rx="4" fill="none" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
  <rect x="40" y="175" width="150" height="40" rx="4" class="c-gray" stroke-width="0.5"/>
  <rect x="200" y="175" width="150" height="40" rx="4" class="c-gray" stroke-width="0.5"/>
  <rect x="360" y="175" width="150" height="40" rx="4" class="c-teal" stroke-width="0.5"/>
  <text class="ts" x="115" y="200" text-anchor="middle" dominant-baseline="central">poll 0.5s — no</text>
  <text class="ts" x="275" y="200" text-anchor="middle" dominant-baseline="central">poll 0.5s — no</text>
  <text class="th" x="435" y="200" text-anchor="middle" dominant-baseline="central">found! return</text>
  <text class="ts" x="40" y="240" text-anchor="start">↑ Start (t=0)</text>
  <text class="ts" x="510" y="240" text-anchor="start">↑ Done (t=1.5s)</text>
  <text class="ts" x="640" y="240" text-anchor="end">Max=10s</text>
  </svg>`,
  concepts:[
    {title:"Implicit Wait — global setting", body:`<pre><span class="cm">// Set ONCE after driver creation — applies to ALL findElement calls</span>
WebDriver driver = <span class="kw">new</span> ChromeDriver();
driver.manage().timeouts().implicitlyWait(10, TimeUnit.SECONDS);

<span class="cm">// Now every findElement will poll for up to 10 seconds before throwing</span>
WebElement btn = driver.findElement(By.id(<span class="str">"submit"</span>));
<span class="cm">// If not found immediately → waits → retries → eventually throws</span>

<span class="cm">// WARNING: Do NOT mix implicit + explicit wait in same script</span>
<span class="cm">// They interact unexpectedly and cause random test failures</span>
<span class="cm">// Rule: Use ONE type per project</span></pre>`},
    {title:"Explicit Wait — WebDriverWait + ExpectedConditions", body:`<pre><span class="kw">import</span> org.openqa.selenium.support.ui.WebDriverWait;
<span class="kw">import</span> org.openqa.selenium.support.ui.ExpectedConditions;

WebDriverWait wait = <span class="kw">new</span> WebDriverWait(driver, 10); <span class="cm">// max 10s</span>

<span class="cm">// Wait for element to be visible on screen:</span>
WebElement el = wait.until(
    ExpectedConditions.visibilityOfElementLocated(By.id(<span class="str">"message"</span>))
);

<span class="cm">// Wait for element to be clickable (visible + enabled):</span>
WebElement btn = wait.until(
    ExpectedConditions.elementToBeClickable(By.id(<span class="str">"submit"</span>))
);

<span class="cm">// Wait for text to appear in element:</span>
wait.until(ExpectedConditions.textToBePresentInElement(el, <span class="str">"Success"</span>));

<span class="cm">// Wait for URL to contain a string:</span>
wait.until(ExpectedConditions.urlContains(<span class="str">"dashboard"</span>));</pre>`},
    {title:"FluentWait — maximum control", body:`<pre><span class="kw">import</span> org.openqa.selenium.support.ui.FluentWait;
<span class="kw">import</span> java.time.Duration;

<span class="cm">// FluentWait: set max time + poll frequency + ignored exceptions</span>
Wait&lt;WebDriver&gt; fluentWait = <span class="kw">new</span> FluentWait&lt;&gt;(driver)
    .withTimeout(Duration.ofSeconds(30))       <span class="cm">// max wait</span>
    .pollingEvery(Duration.ofMillis(500))      <span class="cm">// check every 500ms</span>
    .ignoring(NoSuchElementException.class);   <span class="cm">// don't fail if not found yet</span>

WebElement element = fluentWait.until(d -&gt;
    d.findElement(By.id(<span class="str">"dynamicContent"</span>))
);

<span class="cm">// Use FluentWait for: slow-loading elements, AJAX-heavy pages,</span>
<span class="cm">// or when you need custom polling logic</span></pre>`},
    {title:"Common ExpectedConditions — cheat sheet", body:`<pre><span class="cm">// Presence — element is in DOM (may not be visible)</span>
ExpectedConditions.presenceOfElementLocated(By.id(<span class="str">"el"</span>))

<span class="cm">// Visibility — element in DOM AND visible on screen</span>
ExpectedConditions.visibilityOfElementLocated(By.id(<span class="str">"el"</span>))

<span class="cm">// Clickable — visible + not disabled</span>
ExpectedConditions.elementToBeClickable(By.id(<span class="str">"btn"</span>))

<span class="cm">// Invisibility — wait for element to disappear (e.g. spinner)</span>
ExpectedConditions.invisibilityOfElementLocated(By.id(<span class="str">"spinner"</span>))

<span class="cm">// Alert is present</span>
ExpectedConditions.alertIsPresent()

<span class="cm">// Number of windows</span>
ExpectedConditions.numberOfWindowsToBe(2)

<span class="cm">// Page title</span>
ExpectedConditions.titleContains(<span class="str">"Dashboard"</span>)</pre>`}
  ],
  mistakes:[
    {bad:"Thread.sleep(5000) everywhere to handle page loads",good:"Use explicit wait with ExpectedConditions.visibilityOfElementLocated — tests run faster and adapt to actual load time"},
    {bad:"Mixing implicit wait AND explicit wait in the same test",good:"Never mix both — use only explicit waits (WebDriverWait) in your framework for predictable, controllable behavior"}
  ],
  checklist:["Never use Thread.sleep — use explicit waits","Set implicit wait ONCE after driver init if you choose to use it","Don't mix implicit + explicit waits in same framework","FluentWait gives most control: polling interval + exception ignoring","Always use elementToBeClickable before clicking — not just visibilityOf"]
},

  id:8, badge:"Advanced", bClass:"b4",

  flow:["What","Why","When","How","Where"],
  oneliners:[
    {q:"What is the Actions class in Selenium?", a:"Actions is Selenium's class for simulating complex user gestures — mouse hover, drag-and-drop, right-click, double-click, keyboard shortcuts — that cannot be done with simple element.click()."},
    {q:"How do you handle iFrames in Selenium?", a:"By default Selenium interacts with the main document. To interact with elements inside an iFrame, switch into it using driver.switchTo().frame(). After you're done, switch back using driver.switchTo().defaultContent()."},
    {q:"How do you handle browser alerts?", a:"Use driver.switchTo().alert() to get the Alert object. Then call accept() to click OK, dismiss() to click Cancel, getText() to read the message, or sendKeys() to type into a prompt dialog."}
  ],
  diagram:`<svg width="100%" viewBox="0 0 680 280" role="img"><title>Advanced Selenium interaction types</title><desc>Shows five advanced interaction categories: Actions mouse, iFrames, browser alerts, multiple windows, JavaScript executor</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <g class="c-purple"><rect x="20" y="30" width="120" height="90" rx="8" stroke-width="0.5"/><text class="th" x="80" y="58" text-anchor="middle" dominant-baseline="central">Actions</text><text class="ts" x="80" y="80" text-anchor="middle" dominant-baseline="central">hover, drag</text><text class="ts" x="80" y="98" text-anchor="middle" dominant-baseline="central">right-click</text></g>

  <g class="c-amber"><rect x="290" y="30" width="120" height="90" rx="8" stroke-width="0.5"/><text class="th" x="350" y="58" text-anchor="middle" dominant-baseline="central">Alerts</text><text class="ts" x="350" y="80" text-anchor="middle" dominant-baseline="central">accept()</text><text class="ts" x="350" y="98" text-anchor="middle" dominant-baseline="central">dismiss()</text></g>
  <g class="c-coral"><rect x="425" y="30" width="120" height="90" rx="8" stroke-width="0.5"/><text class="th" x="485" y="58" text-anchor="middle" dominant-baseline="central">Windows</text><text class="ts" x="485" y="80" text-anchor="middle" dominant-baseline="central">getHandles()</text><text class="ts" x="485" y="98" text-anchor="middle" dominant-baseline="central">switchTo()</text></g>
  <g class="c-blue"><rect x="560" y="30" width="100" height="90" rx="8" stroke-width="0.5"/><text class="th" x="610" y="52" text-anchor="middle" dominant-baseline="central">JS</text><text class="th" x="610" y="70" text-anchor="middle" dominant-baseline="central">Executor</text><text class="ts" x="610" y="92" text-anchor="middle" dominant-baseline="central">executeScript</text></g>

  <line x1="400" y1="210" x2="460" y2="210" class="arr" marker-end="url(#arrow)" stroke="var(--color-text-tertiary)"/>
  <text class="ts" x="430" y="200" text-anchor="middle">back</text>
  <g class="c-gray"><rect x="460" y="180" width="180" height="60" rx="6" stroke-width="0.5"/><text class="th" x="550" y="205" text-anchor="middle" dominant-baseline="central">defaultContent()</text><text class="ts" x="550" y="225" text-anchor="middle" dominant-baseline="central">back to main page</text></g>
  </svg>`,
  concepts:[
    {title:"Actions class — hover, drag, double-click", body:`<pre><span class="kw">import</span> org.openqa.selenium.interactions.Actions;
Actions actions = <span class="kw">new</span> Actions(driver);

<span class="cm">// Hover (mouse over) — triggers CSS :hover effects, dropdown menus</span>
WebElement menu = driver.findElement(By.id(<span class="str">"navMenu"</span>));
actions.moveToElement(menu).perform();

<span class="cm">// Right-click (context click)</span>
actions.contextClick(menu).perform();

<span class="cm">// Double-click</span>
actions.doubleClick(driver.findElement(By.id(<span class="str">"editBtn"</span>))).perform();

<span class="cm">// Drag and drop</span>
WebElement source = driver.findElement(By.id(<span class="str">"draggable"</span>));
WebElement target = driver.findElement(By.id(<span class="str">"droppable"</span>));
actions.dragAndDrop(source, target).perform();

<span class="cm">// Keyboard shortcut — Ctrl+A, Ctrl+C</span>
actions.keyDown(Keys.CONTROL).sendKeys(<span class="str">"a"</span>).keyUp(Keys.CONTROL).perform();</pre>`},
    {title:"iFrames — switching in and out", body:`<pre><span class="cm">// Switch by name or id attribute of iframe tag</span>
driver.switchTo().frame(<span class="str">"myFrameName"</span>);

<span class="cm">// Switch by index (0-based)</span>
driver.switchTo().frame(0);

<span class="cm">// Switch by WebElement reference</span>
WebElement iframeEl = driver.findElement(By.tagName(<span class="str">"iframe"</span>));
driver.switchTo().frame(iframeEl);

<span class="cm">// Now interact with elements INSIDE the iFrame:</span>
driver.findElement(By.id(<span class="str">"iframeInput"</span>)).sendKeys(<span class="str">"hello"</span>);

<span class="cm">// Switch back to main page:</span>
driver.switchTo().defaultContent();

<span class="cm">// Nested iframes — switch to parent frame (one level up):</span>
driver.switchTo().parentFrame();</pre>`},
    {title:"Browser alerts — confirm, prompt, simple", body:`<pre><span class="kw">import</span> org.openqa.selenium.Alert;

<span class="cm">// Wait for alert to appear, then switch:</span>
WebDriverWait wait = <span class="kw">new</span> WebDriverWait(driver, 5);
wait.until(ExpectedConditions.alertIsPresent());

Alert alert = driver.switchTo().alert();

<span class="cm">// Read alert message text:</span>
String msg = alert.getText(); <span class="cm">// "Are you sure?"</span>

<span class="cm">// Accept alert (click OK):</span>
alert.accept();

<span class="cm">// Dismiss alert (click Cancel):</span>
alert.dismiss();

<span class="cm">// Send text into prompt dialog then accept:</span>
alert.sendKeys(<span class="str">"My input text"</span>);
alert.accept();</pre>`},
    {title:"Multiple windows / tabs — switch between", body:`<pre><span class="cm">// Get current window handle (before clicking link that opens new tab)</span>
String mainWindow = driver.getWindowHandle();

<span class="cm">// Click something that opens a new window/tab</span>
driver.findElement(By.linkText(<span class="str">"Open New Tab"</span>)).click();

<span class="cm">// Get all open window handles</span>
Set&lt;String&gt; allWindows = driver.getWindowHandles();

<span class="cm">// Switch to the new window:</span>
<span class="kw">for</span> (String handle : allWindows) {
    <span class="kw">if</span> (!handle.equals(mainWindow)) {
        driver.switchTo().window(handle);
        <span class="kw">break</span>;
    }
}
System.out.println(<span class="str">"New tab title: "</span> + driver.getTitle());

<span class="cm">// Switch back to main window:</span>
driver.switchTo().window(mainWindow);</pre>`}
  ],
  mistakes:[
    {bad:"Trying to interact with an iFrame element without switching into it first",good:"Always driver.switchTo().frame() before touching iframe elements. After done, driver.switchTo().defaultContent() to return to main page"},
    {bad:"Not waiting for alert before switchTo().alert() — UnhandledAlertException",good:"Use WebDriverWait with ExpectedConditions.alertIsPresent() before attempting to interact with the alert"}
  ],
  checklist:["Always switchTo().defaultContent() after working with iframes","Use ExpectedConditions.alertIsPresent() before alert interactions","Actions.perform() is mandatory — without it, the action chain doesn't execute","Store mainWindow handle BEFORE triggering the new window open","For scroll into view: use JavascriptExecutor — actions.moveToElement() doesn't always scroll"]
},
{
  id:9, badge:"Framework", bClass:"b4",

    {title:"Page Object class — LoginPage example", body:`<pre><span class="kw">public class</span> LoginPage {
    <span class="kw">private</span> WebDriver driver;

    <span class="cm">// Locators defined ONCE in the Page class</span>
    <span class="kw">private</span> By usernameField = By.id(<span class="str">"username"</span>);
    <span class="kw">private</span> By passwordField = By.id(<span class="str">"password"</span>);
    <span class="kw">private</span> By loginButton   = By.id(<span class="str">"loginBtn"</span>);
    <span class="kw">private</span> By errorMessage  = By.id(<span class="str">"error"</span>);

    <span class="cm">// Constructor — receives driver from test</span>
    <span class="kw">public</span> LoginPage(WebDriver driver) {
        <span class="kw">this</span>.driver = driver;
    }

    <span class="cm">// Action methods — readable, reusable</span>
    <span class="kw">public</span> HomePage login(String user, String pass) {
        driver.findElement(usernameField).sendKeys(user);
        driver.findElement(passwordField).sendKeys(pass);
        driver.findElement(loginButton).click();
        <span class="kw">return new</span> HomePage(driver); <span class="cm">// returns next page object</span>
    }

    <span class="kw">public</span> String getErrorMessage() {
        <span class="kw">return</span> driver.findElement(errorMessage).getText();
    }
}</pre>`},
    {title:"PageFactory — cleaner locator syntax", body:`<pre><span class="kw">import</span> org.openqa.selenium.support.PageFactory;
<span class="kw">import</span> org.openqa.selenium.support.FindBy;

<span class="kw">public class</span> LoginPage {
    <span class="kw">private</span> WebDriver driver;

    <span class="cm">// @FindBy annotation replaces By.id / By.xpath declarations</span>
    @FindBy(id = <span class="str">"username"</span>)
    <span class="kw">private</span> WebElement usernameField;

    @FindBy(id = <span class="str">"password"</span>)
    <span class="kw">private</span> WebElement passwordField;

    @FindBy(xpath = <span class="str">"//button[text()='Login']"</span>)
    <span class="kw">private</span> WebElement loginButton;

    <span class="kw">public</span> LoginPage(WebDriver driver) {
        <span class="kw">this</span>.driver = driver;
        PageFactory.initElements(driver, <span class="kw">this</span>); <span class="cm">// initializes @FindBy fields</span>
    }

    <span class="kw">public void</span> login(String user, String pass) {
        usernameField.sendKeys(user);
        passwordField.sendKeys(pass);
        loginButton.click();
    }
}</pre>`},

<span class="kw">public class</span> BasePage {
    <span class="kw">protected</span> WebDriver driver;
    <span class="kw">protected</span> WebDriverWait wait;

    <span class="kw">public</span> BasePage(WebDriver driver) {
        <span class="kw">this</span>.driver = driver;
        <span class="kw">this</span>.wait = <span class="kw">new</span> WebDriverWait(driver, 10);
    }

    <span class="kw">protected</span> WebElement waitAndFind(By locator) {
        <span class="kw">return</span> wait.until(
            ExpectedConditions.visibilityOfElementLocated(locator));
    }

    <span class="kw">protected void</span> click(By locator) { waitAndFind(locator).click(); }
    <span class="kw">protected void</span> type(By locator, String text) {
        WebElement el = waitAndFind(locator);
        el.clear(); el.sendKeys(text);
    }
}
<span class="cm">// LoginPage extends BasePage → inherits all utilities</span>
<span class="kw">public class</span> LoginPage <span class="kw">extends</span> BasePage { ... }</pre>`}

    {title:"DriverFactory — multi-browser support", body:`<pre><span class="kw">public class</span> DriverFactory {
    <span class="kw">private static</span> ThreadLocal&lt;WebDriver&gt; driver = <span class="kw">new</span> ThreadLocal&lt;&gt;();

    <span class="kw">public static</span> WebDriver initDriver(String browser) {
        <span class="kw">switch</span> (browser.toLowerCase()) {
            <span class="kw">case</span> <span class="str">"chrome"</span>:
                System.setProperty(<span class="str">"webdriver.chrome.driver"</span>,
                    ConfigReader.get(<span class="str">"chrome.driver.path"</span>));
                driver.set(<span class="kw">new</span> ChromeDriver());
                <span class="kw">break</span>;
            <span class="kw">case</span> <span class="str">"firefox"</span>:
                System.setProperty(<span class="str">"webdriver.gecko.driver"</span>,
                    ConfigReader.get(<span class="str">"gecko.driver.path"</span>));
                driver.set(<span class="kw">new</span> FirefoxDriver());
                <span class="kw">break</span>;
            <span class="kw">case</span> <span class="str">"edge"</span>:
                driver.set(<span class="kw">new</span> EdgeDriver());
                <span class="kw">break</span>;
        }
        getDriver().manage().window().maximize();
        <span class="kw">return</span> getDriver();
    }
    <span class="kw">public static</span> WebDriver getDriver() { <span class="kw">return</span> driver.get(); }
    <span class="kw">public static void</span> quitDriver() { driver.get().quit(); driver.remove(); }
}</pre>`},
    {title:"ConfigReader — no hardcoded values", body:`<pre><span class="cm">// config.properties file:</span>
<span class="cm">// base.url=https://staging.myapp.com</span>
<span class="cm">// browser=chrome</span>
<span class="cm">// chrome.driver.path=/usr/local/bin/chromedriver</span>
<span class="cm">// implicit.wait=10</span>

<span class="kw">public class</span> ConfigReader {
    <span class="kw">private static</span> Properties props = <span class="kw">new</span> Properties();

    <span class="kw">static</span> {
        <span class="kw">try</span> (FileInputStream fis = <span class="kw">new</span> FileInputStream(
                <span class="str">"src/test/resources/config.properties"</span>)) {
            props.load(fis);
        } <span class="kw">catch</span> (IOException e) {
            <span class="kw">throw new</span> RuntimeException(<span class="str">"Config file not found"</span>, e);
        }
    }

    <span class="kw">public static</span> String get(String key) { <span class="kw">return</span> props.getProperty(key); }
}</pre>`},

<span class="kw">import</span> org.openqa.selenium.OutputType;

<span class="kw">public class</span> ScreenshotUtil {
    <span class="kw">public static</span> String captureScreen(WebDriver driver, String name) {
        TakesScreenshot ts = (TakesScreenshot) driver;
        File src = ts.getScreenshotAs(OutputType.FILE);

        String path = <span class="str">"screenshots/"</span> + name + <span class="str">"_"</span>
            + LocalDateTime.now().format(DateTimeFormatter.ofPattern(<span class="str">"yyyyMMdd_HHmmss"</span>))
            + <span class="str">".png"</span>;

        <span class="kw">try</span> {
            FileUtils.copyFile(src, <span class="kw">new</span> File(path));
            System.out.println(<span class="str">"Screenshot saved: "</span> + path);
        } <span class="kw">catch</span> (IOException e) {
            System.err.println(<span class="str">"Screenshot failed: "</span> + e.getMessage());
        }
        <span class="kw">return</span> path;
    }
}</pre>`},

function buildTabs() {
  const bar = document.getElementById('tabBar');
  const cont = document.getElementById('sessions');
  sessions.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i===0?' active':'');
    btn.textContent = `S${s.id}`;
    btn.title = s.title;
    btn.onclick = () => activateTab(i);
    bar.appendChild(btn);
    cont.innerHTML += buildSession(s, i);
  });
  document.querySelector('.session').classList.add('active');
}

function activateTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.querySelectorAll('.session').forEach((s,i) => s.classList.toggle('active', i===idx));
}

function buildSession(s, idx) {
  const pills = s.flow.map(f=>`<span class="pill">${f}</span>`).join('');
  const oneliners = s.oneliners.map(o=>`
    <div class="oneliner"><strong>Q: ${o.q}</strong><br>${o.a}</div>`).join('');
  const concepts = s.concepts.map(c=>`
    <div class="card"><div class="card-title"><i class="ti ti-code" aria-hidden="true"></i>${c.title}</div>${c.body}</div>`).join('');
  const mistakes = s.mistakes.map(m=>`
    <div class="err-row">
      <div class="err-box bad"><p>❌ Common mistake</p>${m.bad}</div>
      <div class="err-box good"><p>✅ Correct approach</p>${m.good}</div>
    </div>`).join('');
  const checks = s.checklist.map(c=>`
    <div class="check-item"><i class="ti ti-circle-check" aria-hidden="true"></i><span>${c}</span></div>`).join('');

  return `<div class="session" data-idx="${idx}">
    <div class="s-header">
      <span class="badge ${s.bClass}">${s.badge}</span>
      <div class="s-title">Session ${s.id}: ${s.title}</div>
      <div class="s-sub">${s.sub}</div>
    </div>
    <div class="flow-pills">${pills}</div>
    <div class="card"><div class="card-title"><i class="ti ti-message-circle" aria-hidden="true"></i>Interview one-liners</div>${oneliners}</div>
    <div class="diagram-wrap">${s.diagram}</div>
    <div class="card-title" style="margin:1rem 0 .5rem;font-size:14px"><i class="ti ti-books" aria-hidden="true"></i>&nbsp;Hands-on code examples</div>
    ${concepts}
    <div class="card"><div class="card-title"><i class="ti ti-alert-triangle" aria-hidden="true"></i>Common mistakes & fixes</div>${mistakes}</div>
    <div class="card"><div class="card-title"><i class="ti ti-checklist" aria-hidden="true"></i>Best practices checklist</div>${checks}</div>
    <div class="nav-bar">
      <button class="nav-btn" onclick="activateTab(Math.max(0,${idx}-1))" ${idx===0?'disabled':''}>← Previous</button>
      <span class="prog">${idx+1} / ${sessions.length}</span>
      <button class="nav-btn" onclick="activateTab(Math.min(${sessions.length-1},${idx}+1))" ${idx===sessions.length-1?'disabled':''}>Next →</button>
    </div>
  </div>`;
}

buildTabs();
</script>
