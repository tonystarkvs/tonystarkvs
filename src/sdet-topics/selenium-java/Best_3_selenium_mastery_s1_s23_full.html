<g class="c-amber"><rect x="470" y="20" width="200" height="110" rx="8" stroke-width="0.5"/><text class="th" x="570" y="44" text-anchor="middle" dominant-baseline="central">Scroll (Sel 4)</text><text class="ts" x="570" y="64" text-anchor="middle">scrollToElement(el)</text><text class="ts" x="570" y="82" text-anchor="middle">scrollByAmount(x, y)</text><text class="ts" x="570" y="100" text-anchor="middle">scrollFromOrigin(src,x,y)</text></g></svg>`,
codes:[
{label:'Mouse gestures',code:`<span class="cl">Actions</span> a = <span class="kw">new</span> <span class="cl">Actions</span>(driver);

a.<span class="fn">moveToElement</span>(navMenu).<span class="fn">perform</span>();          <span class="cm">// hover</span>
a.<span class="fn">contextClick</span>(element).<span class="fn">perform</span>();          <span class="cm">// right-click</span>
a.<span class="fn">doubleClick</span>(element).<span class="fn">perform</span>();          <span class="cm">// double-click</span>
a.<span class="fn">dragAndDrop</span>(source, target).<span class="fn">perform</span>();  <span class="cm">// drag and drop</span>

<span class="cm">// Slow drag (stubborn apps):</span>
a.<span class="fn">clickAndHold</span>(source)
 .<span class="fn">pause</span>(Duration.<span class="fn">ofMillis</span>(<span class="num">500</span>))
 .<span class="fn">moveToElement</span>(target)
 .<span class="fn">pause</span>(Duration.<span class="fn">ofMillis</span>(<span class="num">300</span>))
 .<span class="fn">release</span>()
 .<span class="fn">perform</span>();`},
{label:'Keyboard combos',code:`<span class="cl">Actions</span> a = <span class="kw">new</span> <span class="cl">Actions</span>(driver);

<span class="cm">// Select all + copy:</span>
a.<span class="fn">click</span>(input)
 .<span class="fn">keyDown</span>(<span class="cl">Keys</span>.CONTROL).<span class="fn">sendKeys</span>(<span class="str">"a"</span>).<span class="fn">keyUp</span>(<span class="cl">Keys</span>.CONTROL)
 .<span class="fn">keyDown</span>(<span class="cl">Keys</span>.CONTROL).<span class="fn">sendKeys</span>(<span class="str">"c"</span>).<span class="fn">keyUp</span>(<span class="cl">Keys</span>.CONTROL)
 .<span class="fn">perform</span>();

<span class="cm">// Multi-select (Ctrl+Click):</span>
a.<span class="fn">click</span>(item1)
 .<span class="fn">keyDown</span>(<span class="cl">Keys</span>.CONTROL).<span class="fn">click</span>(item2).<span class="fn">click</span>(item3)
 .<span class="fn">keyUp</span>(<span class="cl">Keys</span>.CONTROL).<span class="fn">perform</span>();

<span class="cm">// Range select (Shift+Click):</span>
a.<span class="fn">click</span>(first).<span class="fn">keyDown</span>(<span class="cl">Keys</span>.SHIFT).<span class="fn">click</span>(last).<span class="fn">keyUp</span>(<span class="cl">Keys</span>.SHIFT).<span class="fn">perform</span>();`},
{label:'Scroll (Selenium 4)',code:`<span class="kw">import</span> org.openqa.selenium.interactions.WheelInput.ScrollOrigin;
<span class="cl">Actions</span> a = <span class="kw">new</span> <span class="cl">Actions</span>(driver);

<span class="cm">// Scroll element into view (W3C):</span>
a.<span class="fn">scrollToElement</span>(element).<span class="fn">perform</span>();

<span class="cm">// Scroll by pixels from current viewport:</span>
a.<span class="fn">scrollByAmount</span>(<span class="num">0</span>, <span class="num">500</span>).<span class="fn">perform</span>();  <span class="cm">// down 500px</span>
a.<span class="fn">scrollByAmount</span>(<span class="num">0</span>, -<span class="num">300</span>).<span class="fn">perform</span>(); <span class="cm">// up 300px</span>

<span class="cm">// Scroll from element origin:</span>
ScrollOrigin origin = ScrollOrigin.<span class="fn">fromElement</span>(element);
a.<span class="fn">scrollFromOrigin</span>(origin, <span class="num">0</span>, <span class="num">200</span>).<span class="fn">perform</span>();`}
],
best:['Always call .perform() — forgetting it means the entire action chain is silently discarded','Pair every keyDown with keyUp — unclosed modifier keys corrupt subsequent keyboard actions','Use pause(Duration) between gesture steps for animations that need time to respond','Actions.scrollToElement() is W3C compliant in Selenium 4 — prefer over JS scrollIntoView','For drag-drop failures: add 500ms pause between clickAndHold and moveToElement'],
qa:[{q:'What is the difference between moveToElement() and scrollToElement()?',a:'moveToElement() positions the mouse at the element center — does not guarantee scrolling. scrollToElement() (Selenium 4) performs a W3C wheel scroll to bring the element into viewport.'},{q:'Why does dragAndDrop sometimes fail on HTML5 apps?',a:'HTML5 drag events need more time. Use clickAndHold + pause(500ms) + moveToElement + pause(300ms) + release to simulate the gesture slowly enough for event listeners to fire.'},{q:'How do you draw on a canvas element?',a:'actions.moveToElement(canvas, 100, 100).clickAndHold().moveByOffset(200, 0).moveByOffset(0, 100).release().perform() — uses relative offsets from canvas center.'},{q:'What does pause(Duration) do in an Actions chain?',a:'Inserts a delay within the chain at that point. Useful when an animation must complete before the next gesture. It is a W3C-standard action in Selenium 4.'},{q:'How do you hover and then click a submenu item?',a:'actions.moveToElement(menuParent).perform(); then wait until submenu is visible, then find and click the submenu item. Hover and click must be separate — perform() resets the chain.'}]
},

{id:14,ph:'a',title:'JavascriptExecutor deep-dive',sub:'executeScript · executeAsync · DOM manipulation · localStorage · page state',
wwwwh:['What','Why','When','How','Where'],
spoken:['JavascriptExecutor runs arbitrary JavaScript in the browser context — it is my escape hatch for what WebDriver cannot reach natively.','I use executeScript for: hidden elements, custom events, reading window variables, setting readonly input values, and performance checks.','arguments[0] in the JS script maps to the first Java argument after the script string — this is how you pass WebElements to JS.','executeAsyncScript requires calling the last injected argument as a callback — without it, Selenium waits until scriptTimeout expires.','I always set scriptTimeout before executeAsyncScript: driver.manage().timeouts().scriptTimeout(Duration.ofSeconds(30)).'],
arch:`<svg width="100%" viewBox="0 0 680 140" role="img"><title>JS Executor return types</title><desc>Shows sync vs async execution and return type mapping</desc>
<g class="c-teal"><rect x="10" y="20" width="305" height="110" rx="8" stroke-width="0.5"/><text class="th" x="162" y="44" text-anchor="middle" dominant-baseline="central">executeScript (sync)</text><text class="ts" x="162" y="64" text-anchor="middle">returns: String, Long, Boolean</text><text class="ts" x="162" y="82" text-anchor="middle">WebElement, List, null</text><text class="ts" x="162" y="100" text-anchor="middle">arguments[0..n] = Java args</text></g>
<g class="c-amber"><rect x="365" y="20" width="305" height="110" rx="8" stroke-width="0.5"/><text class="th" x="517" y="44" text-anchor="middle" dominant-baseline="central">executeAsyncScript</text><text class="ts" x="517" y="64" text-anchor="middle">last arg = callback function</text><text class="ts" x="517" y="82" text-anchor="middle">call callback(result) to finish</text><text class="ts" x="517" y="100" text-anchor="middle">set scriptTimeout first!</text></g></svg>`,
codes:[
{label:'Core patterns',code:`<span class="cl">JavascriptExecutor</span> js = (<span class="cl">JavascriptExecutor</span>) driver;

<span class="cm">// Return types from JS:</span>
String url     = (String)  js.<span class="fn">executeScript</span>(<span class="str">"return window.location.href"</span>);
Long   scrollY = (Long)    js.<span class="fn">executeScript</span>(<span class="str">"return window.scrollY"</span>);
Boolean ready  = (Boolean) js.<span class="fn">executeScript</span>(<span class="str">"return document.readyState==='complete'"</span>);

<span class="cm">// Pass WebElement as argument:</span>
js.<span class="fn">executeScript</span>(<span class="str">"arguments[0].click();"</span>, element);
js.<span class="fn">executeScript</span>(<span class="str">"arguments[0].value='2024-12-25';"</span>, datePicker);
js.<span class="fn">executeScript</span>(<span class="str">"arguments[0].style.border='3px solid red'"</span>, el);<span class="cm"> // debug highlight</span>`},
{label:'Scroll + DOM',code:`<span class="cl">JavascriptExecutor</span> js = (<span class="cl">JavascriptExecutor</span>) driver;

<span class="cm">// Scroll patterns:</span>
js.<span class="fn">executeScript</span>(<span class="str">"window.scrollTo(0, document.body.scrollHeight)"</span>); <span class="cm">// bottom</span>
js.<span class="fn">executeScript</span>(<span class="str">"window.scrollTo(0, 0)"</span>);               <span class="cm">// top</span>
js.<span class="fn">executeScript</span>(<span class="str">"arguments[0].scrollIntoView({block:'center'})"</span>, el);

<span class="cm">// DOM manipulation:</span>
js.<span class="fn">executeScript</span>(<span class="str">"arguments[0].removeAttribute('readonly')"</span>, input);
js.<span class="fn">executeScript</span>(<span class="str">"arguments[0].style.display='block'"</span>, hiddenEl);
js.<span class="fn">executeScript</span>(<span class="str">"arguments[0].dispatchEvent(new Event('change'))"</span>, input);

<span class="cm">// Read localStorage:</span>
String token = (String) js.<span class="fn">executeScript</span>(<span class="str">"return localStorage.getItem('token')"</span>);`},
{label:'Async script + page state',code:`<span class="cm">// Set timeout FIRST:</span>
driver.<span class="fn">manage</span>().<span class="fn">timeouts</span>().<span class="fn">scriptTimeout</span>(Duration.<span class="fn">ofSeconds</span>(<span class="num">30</span>));

<span class="cl">JavascriptExecutor</span> js = (<span class="cl">JavascriptExecutor</span>) driver;

<span class="cm">// Async — wait for AJAX + callback:</span>
js.<span class="fn">executeAsyncScript</span>(
    <span class="str">"var done = arguments[arguments.length-1];"</span> +
    <span class="str">"fetch('/api/data').then(r=&gt;r.json()).then(done)"</span>
);

<span class="cm">// Wait for page load via JS:</span>
wait.<span class="fn">until</span>(d -&gt; js.<span class="fn">executeScript</span>(<span class="str">"return document.readyState"</span>).<span class="fn">equals</span>(<span class="str">"complete"</span>));

<span class="cm">// jQuery AJAX idle:</span>
wait.<span class="fn">until</span>(d -&gt; (Boolean)js.<span class="fn">executeScript</span>(<span class="str">"return jQuery.active===0"</span>));`}
],
best:['Cast driver to JavascriptExecutor once and store — avoids repeated casting','JS click should be last resort — it bypasses visibility/interactability checks','Set scriptTimeout before every executeAsyncScript call or default 0ms timeout fires','Highlight elements with JS border style during debugging — remove before commit','Use Actions.scrollToElement() in Selenium 4 instead of JS scrollIntoView when possible'],
qa:[{q:'What return types does executeScript support?',a:'String, Long (integers return as Long), Double, Boolean, WebElement, List<Object>, and null for void JS returns. Always cast the returned Object to the expected type.'},{q:'How does the callback work in executeAsyncScript?',a:'Selenium injects a callback function as the last argument. Your JS must call arguments[arguments.length-1](result) to signal completion. Without calling it, execution blocks until scriptTimeout.'},{q:'When should you use JS click instead of element.click()?',a:'Only as last resort when element.click() throws ElementNotInteractableException or ElementClickInterceptedException and you cannot resolve the root cause. JS click bypasses all Selenium checks.'},{q:'How do you trigger a React/Vue onChange event via Selenium?',a:'Use JS: js.executeScript("arguments[0].dispatchEvent(new Event(\'input\', {bubbles:true}))", element) — React listens for input events with bubbles, not just native change events.'},{q:'How do you set a value on a readonly date picker?',a:'js.executeScript("arguments[0].removeAttribute(\'readonly\')", el); then el.sendKeys("2024-01-01"); Or: js.executeScript("arguments[0].value=\'2024-01-01\'", el) and dispatch a change event.'}]
},

{id:15,ph:'a',title:'Robot class all scenarios',sub:'OS-level keyboard · mouse · file upload · clipboard · screenshots',
wwwwh:['What','Why','When','How','Where'],
spoken:['Robot class (java.awt.Robot) automates at the OS level — it simulates physical keyboard and mouse input regardless of the browser context.','I use Robot only for native OS file upload dialogs — Selenium cannot interact with OS-level dialogs outside the browser DOM.','The most reliable approach for file upload dialog path entry is clipboard paste — set StringSelection, Ctrl+V, then Enter.','Robot requires a physical display — in Linux CI I either avoid Robot (use sendKeys on file input) or set up Xvfb virtual display.','Every keyPress must be followed by keyRelease — forgetting keyRelease leaves the modifier held down, breaking all subsequent input.'],
arch:`<svg width="100%" viewBox="0 0 680 140" role="img"><title>Robot vs Selenium scope</title><desc>Shows Robot at OS level above browser, Selenium inside browser DOM</desc>
<g class="c-gray"><rect x="10" y="10" width="660" height="120" rx="10" stroke-width="0.5"/><text class="th" x="340" y="32" text-anchor="middle" dominant-baseline="central">Operating system layer</text></g>
<g class="c-purple"><rect x="30" y="48" width="270" height="68" rx="8" stroke-width="1"/><text class="th" x="165" y="72" text-anchor="middle" dominant-baseline="central">Robot class (java.awt)</text><text class="ts" x="165" y="90" text-anchor="middle">OS keyboard + mouse + clipboard</text><text class="ts" x="165" y="106" text-anchor="middle">File dialogs, OS popups</text></g>
<g class="c-teal"><rect x="380" y="48" width="270" height="68" rx="8" stroke-width="0.5"/><text class="th" x="515" y="72" text-anchor="middle" dominant-baseline="central">Selenium WebDriver</text><text class="ts" x="515" y="90" text-anchor="middle">Browser DOM interactions</text><text class="ts" x="515" y="106" text-anchor="middle">Cannot reach OS dialogs</text></g></svg>`,
codes:[
{label:'File upload (preferred)',code:`<span class="cm">// PREFERRED: sendKeys directly on file input (no Robot needed)</span>
<span class="cm">// Works headlessly in CI without any Robot setup!</span>
driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"fileInput"</span>))
      .<span class="fn">sendKeys</span>(<span class="str">"/absolute/path/to/file.pdf"</span>);

<span class="cm">// Windows path:</span>
driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"input[type='file']"</span>))
      .<span class="fn">sendKeys</span>(<span class="str">"C:\\Users\\user\\Documents\\file.pdf"</span>);`},
{label:'Robot keyboard',code:`<span class="kw">import</span> java.awt.Robot;
<span class="kw">import</span> java.awt.event.KeyEvent;

<span class="cl">Robot</span> robot = <span class="kw">new</span> <span class="cl">Robot</span>();

robot.<span class="fn">keyPress</span>(<span class="cl">KeyEvent</span>.VK_ENTER);    robot.<span class="fn">keyRelease</span>(<span class="cl">KeyEvent</span>.VK_ENTER);
robot.<span class="fn">keyPress</span>(<span class="cl">KeyEvent</span>.VK_TAB);      robot.<span class="fn">keyRelease</span>(<span class="cl">KeyEvent</span>.VK_TAB);
robot.<span class="fn">keyPress</span>(<span class="cl">KeyEvent</span>.VK_ESCAPE);   robot.<span class="fn">keyRelease</span>(<span class="cl">KeyEvent</span>.VK_ESCAPE);

<span class="cm">// Ctrl+V paste (upload dialog path):</span>
robot.<span class="fn">keyPress</span>(<span class="cl">KeyEvent</span>.VK_CONTROL);
robot.<span class="fn">keyPress</span>(<span class="cl">KeyEvent</span>.VK_V);
robot.<span class="fn">keyRelease</span>(<span class="cl">KeyEvent</span>.VK_V);
robot.<span class="fn">keyRelease</span>(<span class="cl">KeyEvent</span>.VK_CONTROL);`},
{label:'Clipboard paste',code:`<span class="kw">import</span> java.awt.Toolkit;
<span class="kw">import</span> java.awt.datatransfer.StringSelection;

<span class="cm">// Set clipboard content:</span>
StringSelection sel = <span class="kw">new</span> <span class="cl">StringSelection</span>(<span class="str">"/path/to/file.pdf"</span>);
Toolkit.<span class="fn">getDefaultToolkit</span>()
       .<span class="fn">getSystemClipboard</span>()
       .<span class="fn">setContents</span>(sel, <span class="kw">null</span>);

<span class="cm">// Then paste with Robot Ctrl+V:</span>
<span class="cl">Robot</span> robot = <span class="kw">new</span> <span class="cl">Robot</span>();
robot.<span class="fn">keyPress</span>(<span class="cl">KeyEvent</span>.VK_CONTROL);
robot.<span class="fn">keyPress</span>(<span class="cl">KeyEvent</span>.VK_V);
robot.<span class="fn">keyRelease</span>(<span class="cl">KeyEvent</span>.VK_V);
robot.<span class="fn">keyRelease</span>(<span class="cl">KeyEvent</span>.VK_CONTROL);
robot.<span class="fn">keyPress</span>(<span class="cl">KeyEvent</span>.VK_ENTER);
robot.<span class="fn">keyRelease</span>(<span class="cl">KeyEvent</span>.VK_ENTER);`}
],
best:['Always prefer sendKeys on file input over Robot — it works headlessly and is simpler','Every keyPress must be balanced with keyRelease — held modifiers break subsequent input','Robot requires a display — in Linux CI use Xvfb or avoid Robot entirely','Use clipboard StringSelection for paths — avoids per-character keyPress/release loops','Robot mouse coordinates are absolute screen coordinates — fragile across different resolutions'],
qa:[{q:'When must you use Robot class instead of Selenium?',a:'For native OS file upload dialogs (the Windows/Linux file picker), OS-level keyboard shortcuts that Chrome intercepts before Selenium can handle, and system clipboard verification.'},{q:'Why is sendKeys preferred over Robot for file upload?',a:'sendKeys on input[type=file] works headlessly on any OS without a display. Robot requires a physical or virtual display and has OS-specific coordinate issues.'},{q:'How do you set clipboard content programmatically in Java?',a:'StringSelection sel = new StringSelection("text"); Toolkit.getDefaultToolkit().getSystemClipboard().setContents(sel, null); Then paste via Robot Ctrl+V.'},{q:'What is robot.delay(ms) used for?',a:'Inserts a fixed wait between Robot actions. Use sparingly — prefer explicit waits. Typical use: robot.delay(1000) after opening a dialog to let the OS render it before typing.'},{q:'Does Robot work in Docker containers?',a:'No — Docker containers have no display by default. Robot throws AWTException. Fix: set up Xvfb (X virtual framebuffer) before running tests, or avoid Robot and use sendKeys instead.'}]
},

{id:16,ph:'a',title:'Relative locators (Sel 4)',sub:'above · below · toLeftOf · toRightOf · near · chaining',
wwwwh:['What','Why','When','How','Where'],
spoken:['Relative Locators in Selenium 4 find elements by their visual/spatial position relative to another element — above, below, left, right, near.','I use Relative Locators for unlabeled inputs in legacy forms — find the input that is visually to the right of the label element.','near() finds any element within 50px in any direction — useful for icon buttons next to table rows where no unique id exists.','Relative Locators are pixel-based (bounding box positions), not DOM-tree-based — siblings in the DOM may be distant visually.','I chain relative locators for precision: with(By.tagName("input")).above(submitBtn).toRightOf(label) — both conditions must match.'],

{label:'Relative locator syntax',code:`<span class="kw">import static</span> org.openqa.selenium.support.locators.<span class="cl">RelativeLocator</span>.with;

<span class="cm">// Find input to the right of the Email label:</span>
WebElement emailLabel = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">xpath</span>(<span class="str">"//label[text()='Email']"</span>));

    <span class="fn">with</span>(<span class="cl">By</span>.<span class="fn">tagName</span>(<span class="str">"input"</span>)).<span class="fn">toRightOf</span>(emailLabel));
emailInput.<span class="fn">sendKeys</span>(<span class="str">"user@test.com"</span>);

<span class="cm">// Find password input above submit button:</span>
WebElement submit = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"submit"</span>));
WebElement pwd = driver.<span class="fn">findElement</span>(
    <span class="fn">with</span>(<span class="cl">By</span>.<span class="fn">tagName</span>(<span class="str">"input"</span>)).<span class="fn">above</span>(submit));
pwd.<span class="fn">sendKeys</span>(<span class="str">"Secret123"</span>);`},
{label:'near() + chaining',code:`<span class="cm">// near() — within 50px any direction</span>
WebElement helpIcon = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"helpIcon"</span>));
WebElement tooltip  = driver.<span class="fn">findElement</span>(
    <span class="fn">with</span>(<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">".tooltip"</span>)).<span class="fn">near</span>(helpIcon));

<span class="cm">// Chaining multiple conditions:</span>
WebElement preciseInput = driver.<span class="fn">findElement</span>(
    <span class="fn">with</span>(<span class="cl">By</span>.<span class="fn">tagName</span>(<span class="str">"input"</span>))
        .<span class="fn">above</span>(submit)
        .<span class="fn">toRightOf</span>(sideLabel));

<span class="cm">// Table row: delete button for specific row</span>
WebElement johnCell = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">xpath</span>(<span class="str">"//td[text()='John']"</span>));
WebElement deleteBtn = driver.<span class="fn">findElement</span>(
    <span class="fn">with</span>(<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"button.delete"</span>)).<span class="fn">toRightOf</span>(johnCell));`},
{label:'Relative vs XPath axes',code:`<span class="cm">// XPath axes — DOM-tree navigation (siblings, parent, child):</span>
driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">xpath</span>(<span class="str">"//label[text()='Email']/following-sibling::input"</span>));

<span class="cm">// Relative Locators — VISUAL spatial position:</span>
driver.<span class="fn">findElement</span>(<span class="fn">with</span>(<span class="cl">By</span>.<span class="fn">tagName</span>(<span class="str">"input"</span>)).<span class="fn">toRightOf</span>(emailLabel));

<span class="cm">// Use XPath when: elements are DOM siblings/parent/child</span>
<span class="cm">// Use Relative Locators when: elements are visual neighbors</span>
<span class="cm">// but NOT necessarily adjacent in the DOM tree</span>
<span class="cm">// (e.g., label in one div, input in another div)</span>`}
],
best:['Static import RelativeLocator.with for cleaner syntax: with(By.tagName("input")).above(el)','near() radius is fixed at 50px — cannot be customized; use directional locators for precision','Relative Locators use bounding box positions — elements far apart on the page won\'t match near()','Chain relative locators for precise targeting when multiple elements could match a single direction','Prefer toRightOf + specific tag over near() when the spatial relationship is clear and consistent'],
qa:[{q:'What package contains RelativeLocator in Selenium 4?',a:'org.openqa.selenium.support.locators.RelativeLocator — import static RelativeLocator.with for the clean with(By...).above(el) syntax.'},{q:'What is the radius for near() in Selenium 4?',a:'50 pixels in any direction. This value is fixed and cannot be customized in the current Selenium 4 API.'},{q:'Are Relative Locators based on DOM tree or pixel position?',a:'Pixel position (bounding box). They use the computed screen coordinates of elements, not DOM parent-child or sibling relationships. Visually adjacent elements in separate DOM branches are found correctly.'},{q:'When should you NOT use Relative Locators?',a:'When elements are far apart on the page, when the page uses absolute positioning (locators based on relative position are unreliable), or when a standard id/css/xpath locator is available and stable.'},{q:'Can you chain multiple relative conditions?',a:'Yes: with(By.tagName("input")).above(submit).toRightOf(label) — both conditions must be satisfied simultaneously. All chained conditions are ANDed together.'}]
},

{id:17,ph:'a',title:'Native CDP support',sub:'Network interception · geolocation mock · console logs · basic auth · performance',

spoken:['CDP (Chrome DevTools Protocol) lets me access Chrome internals directly from Selenium 4 — network, console, performance, device emulation.','I use CDP to intercept network requests and verify API calls made by the frontend — more precise than checking UI state alone.','HasAuthentication.register() handles Basic Auth dialogs automatically — no Alert.accept() dance needed for protected pages.','Geolocation mocking via CDP lets me test location-based features without physically moving or using browser extensions.','CDP version numbers must match Chrome major version — I use Selenium 4\'s HasCdp.executeCdpCommand() to avoid version coupling.'],

codes:[
{label:'CDP session setup',code:`<span class="kw">import</span> org.openqa.selenium.devtools.DevTools;
<span class="kw">import</span> org.openqa.selenium.devtools.v120.*; <span class="cm">// match Chrome version</span>

<span class="cl">ChromeDriver</span> driver = <span class="kw">new</span> <span class="cl">ChromeDriver</span>();
DevTools devTools = driver.<span class="fn">getDevTools</span>();
devTools.<span class="fn">createSession</span>();

<span class="cm">// Or use HasCdp (version-agnostic, simpler):</span>
<span class="cl">HasCdp</span> cdp = (<span class="cl">HasCdp</span>) driver;
Map&lt;String,Object&gt; result = cdp.<span class="fn">executeCdpCommand</span>(
    <span class="str">"Network.enable"</span>, Map.<span class="fn">of</span>());`},
{label:'Network + Auth',code:`<span class="cm">// Listen to all requests:</span>
devTools.<span class="fn">send</span>(<span class="cl">Network</span>.<span class="fn">enable</span>(empty,empty,empty));
devTools.<span class="fn">addListener</span>(<span class="cl">Network</span>.<span class="fn">requestWillBeSent</span>(), req -&gt;
    System.out.<span class="fn">println</span>(<span class="str">"URL: "</span> + req.<span class="fn">getRequest</span>().<span class="fn">getUrl</span>()));

<span class="cm">// Block images (speed up tests):</span>
devTools.<span class="fn">send</span>(<span class="cl">Network</span>.<span class="fn">setBlockedURLs</span>(List.<span class="fn">of</span>(<span class="str">"*.png"</span>,<span class="str">"*.jpg"</span>)));

<span class="cm">// Basic Auth without popup:</span>
((<span class="cl">HasAuthentication</span>)driver).<span class="fn">register</span>(
    uri -&gt; uri.<span class="fn">getHost</span>().<span class="fn">contains</span>(<span class="str">"myapp.com"</span>),
    <span class="cl">UsernameAndPassword</span>.<span class="fn">of</span>(<span class="str">"admin"</span>, <span class="str">"password"</span>));`},
{label:'Geolocation + console logs',code:`<span class="cm">// Mock geolocation to Mumbai:</span>
devTools.<span class="fn">send</span>(<span class="cl">Emulation</span>.<span class="fn">setGeolocationOverride</span>(
    Optional.<span class="fn">of</span>(<span class="num">19.076</span>),  <span class="cm">// latitude</span>
    Optional.<span class="fn">of</span>(<span class="num">72.877</span>),  <span class="cm">// longitude</span>
    Optional.<span class="fn">of</span>(<span class="num">1.0</span>)      <span class="cm">// accuracy</span>
));

<span class="cm">// Capture console logs:</span>
devTools.<span class="fn">send</span>(<span class="cl">Log</span>.<span class="fn">enable</span>());
List&lt;String&gt; logs = <span class="kw">new</span> ArrayList&lt;&gt;();
devTools.<span class="fn">addListener</span>(<span class="cl">Log</span>.<span class="fn">entryAdded</span>(), entry -&gt;
    logs.<span class="fn">add</span>(entry.<span class="fn">getLevel</span>() + <span class="str">": "</span> + entry.<span class="fn">getText</span>()));
driver.<span class="fn">get</span>(<span class="str">"https://app.com"</span>);
System.out.<span class="fn">println</span>(<span class="str">"Console: "</span> + logs);`}
],
best:['Always call devTools.createSession() before any send() call','CDP version (v120) must match Chrome major version — check chrome://version','Use HasCdp.executeCdpCommand() for simple one-off CDP calls without event listeners','HasAuthentication eliminates Basic Auth popup handling — register before driver.get()','addListener() events accumulate — clear or remove listeners between test cases'],
qa:[{q:'What interface provides CDP access in Selenium 4?',a:'ChromeDriver implements HasDevTools which provides getDevTools(). Also HasCdp for executeCdpCommand(). Both are Chromium-only — FirefoxDriver does not support CDP.'},{q:'How do you handle Basic Authentication with Selenium 4 CDP?',a:'((HasAuthentication)driver).register(uri -> uri.getHost().contains("app.com"), UsernameAndPassword.of("user","pass")) — registered before driver.get(), no alert needed.'},{q:'What is the difference between HasCdp and DevTools?',a:'HasCdp.executeCdpCommand() is simpler for one-off commands and version-agnostic. DevTools provides typed command objects and event listener subscriptions — use for streaming events.'},{q:'Why does the CDP import version number matter?',a:'CDP API versions change between Chrome releases. org.openqa.selenium.devtools.v120 must match your Chrome major version or you get ClassNotFound/method signature errors.'},{q:'Can you use CDP with Firefox in Selenium 4?',a:'No. CDP is Chrome/Chromium only. Firefox uses its own BiDi (WebDriver BiDirectional Protocol). Selenium 4 supports BiDi for Firefox through a separate API.'}]
},

{id:18,ph:'a',title:'newWindow() and newTab()',sub:'WindowType.TAB · WindowType.WINDOW · switch · multi-tab workflows',
wwwwh:['What','Why','When','How','Where'],
spoken:['Selenium 4 added driver.switchTo().newWindow(WindowType.TAB) — opening new tabs programmatically without JavaScript workarounds.','After newWindow() Selenium automatically switches to the new tab — I don\'t need to detect handles and switchTo manually.','I store the original window handle BEFORE opening a new tab — it\'s the only way to switch back reliably after new tab work.','driver.close() closes only the current tab/window — always switchTo() a remaining handle immediately after to avoid NoSuchWindowException.','For multi-tab price comparison tests I open N tabs with newWindow(), navigate each, collect data, and close all but the main.'],

codes:[
{label:'newWindow TAB',code:`<span class="kw">import</span> org.openqa.selenium.WindowType;

<span class="cm">// Store original before opening new tab</span>
String original = driver.<span class="fn">getWindowHandle</span>();
driver.<span class="fn">get</span>(<span class="str">"https://app.com"</span>);

<span class="cm">// Open new TAB — automatically switches to it:</span>
driver.<span class="fn">switchTo</span>().<span class="fn">newWindow</span>(<span class="cl">WindowType</span>.TAB);
driver.<span class="fn">get</span>(<span class="str">"https://app.com/admin"</span>);
System.out.<span class="fn">println</span>(<span class="str">"New tab: "</span> + driver.<span class="fn">getTitle</span>());

<span class="cm">// Switch back to original:</span>
driver.<span class="fn">switchTo</span>().<span class="fn">window</span>(original);
System.out.<span class="fn">println</span>(<span class="str">"Original: "</span> + driver.<span class="fn">getTitle</span>());`},
{label:'newWindow WINDOW',code:`<span class="cm">// Open new browser WINDOW (separate OS window):</span>
String mainWindow = driver.<span class="fn">getWindowHandle</span>();

driver.<span class="fn">switchTo</span>().<span class="fn">newWindow</span>(<span class="cl">WindowType</span>.WINDOW);
driver.<span class="fn">get</span>(<span class="str">"https://admin.app.com"</span>);
driver.<span class="fn">manage</span>().<span class="fn">window</span>().<span class="fn">maximize</span>();

String report = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"report"</span>)).<span class="fn">getText</span>();
System.out.<span class="fn">println</span>(<span class="str">"Report: "</span> + report);

<span class="cm">// Close this window, go back to main:</span>
driver.<span class="fn">close</span>();
driver.<span class="fn">switchTo</span>().<span class="fn">window</span>(mainWindow); <span class="cm">// mandatory after close()</span>`},
{label:'Multi-tab comparison',code:`<span class="cm">// Open 3 tabs for price comparison:</span>
String tab1 = driver.<span class="fn">getWindowHandle</span>();
driver.<span class="fn">get</span>(<span class="str">"https://shop1.com/product"</span>);
String p1 = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"price"</span>)).<span class="fn">getText</span>();

driver.<span class="fn">switchTo</span>().<span class="fn">newWindow</span>(<span class="cl">WindowType</span>.TAB);
driver.<span class="fn">get</span>(<span class="str">"https://shop2.com/product"</span>);
String p2 = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"price"</span>)).<span class="fn">getText</span>();

driver.<span class="fn">switchTo</span>().<span class="fn">newWindow</span>(<span class="cl">WindowType</span>.TAB);
driver.<span class="fn">get</span>(<span class="str">"https://shop3.com/product"</span>);
String p3 = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"price"</span>)).<span class="fn">getText</span>();

System.out.<span class="fn">println</span>(p1 + <span class="str">" | "</span> + p2 + <span class="str">" | "</span> + p3);</span>
driver.<span class="fn">switchTo</span>().<span class="fn">window</span>(tab1);</span> <span class="cm">// back to first</span>`}
],
best:['Store the original handle BEFORE calling newWindow() — you cannot retrieve it after switching','After driver.close() immediately switchTo() a valid handle — driver context is lost','driver.quit() closes ALL tabs — only call it in @After teardown','WindowType.TAB vs WINDOW: same content isolation, different browser UI presentation','Use driver.getWindowHandles() to iterate all open tabs/windows for cleanup'],
qa:[{q:'What is new about window/tab API in Selenium 4?',a:'driver.switchTo().newWindow(WindowType.TAB) and newWindow(WindowType.WINDOW) — open new tabs/windows programmatically. Selenium auto-switches to the new context. In Selenium 3 this required JS window.open() and manual handle detection.'},{q:'Does newWindow() return the new handle?',a:'No — newWindow() switches context but doesn\'t return a handle. Call driver.getWindowHandle() after newWindow() to get the new tab\'s handle if you need to store it.'},{q:'What happens if you call driver.close() without switchTo() afterward?',a:'NoSuchWindowException on any subsequent command — the browser still has open tabs but Selenium\'s current context points to the closed window. Always switchTo() immediately after close().'},{q:'How is newWindow(WindowType.TAB) different from JS window.open()?',a:'newWindow() is a W3C WebDriver command that auto-switches. JS window.open() opens the tab but Selenium context stays in the original — you must manually detect and switch to the new handle.'},{q:'How do you close all extra tabs and keep just the main one?',a:'Iterate driver.getWindowHandles(), close every handle that is not the main handle, then driver.switchTo().window(mainHandle) to restore context.'}]
},

{id:19,ph:'a',title:'Page Object Model',sub:'POM pattern · BasePage · PageFactory · @FindBy · separation of concerns',
wwwwh:['What','Why','When','How','Where'],
spoken:['POM is a design pattern where each web page has a dedicated Java class containing its element locators and interaction methods.','When UI changes I update only the Page class — not every test — making maintenance dramatically faster at scale.','I always pass driver into the Page constructor from the test — the Page never creates the driver, the test controls its lifecycle.','PageFactory @FindBy annotations replace repetitive driver.findElement() calls with clean field declarations and initElements().','BasePage is my shared utility parent — it holds the driver, WebDriverWait, and common methods like click, type, waitForVisible.'],

codes:[
{label:'LoginPage POM',code:`<span class="kw">public class</span> <span class="cl">LoginPage</span> {
  <span class="kw">private</span> WebDriver driver;
  <span class="kw">private</span> By usernameField = <span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"username"</span>);
  <span class="kw">private</span> By passwordField = <span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"password"</span>);
  <span class="kw">private</span> By loginBtn     = <span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"loginBtn"</span>);
  <span class="kw">private</span> By errorMsg     = <span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"error"</span>);

  <span class="kw">public</span> <span class="fn">LoginPage</span>(WebDriver driver) { <span class="kw">this</span>.driver = driver; }

  <span class="kw">public</span> <span class="cl">HomePage</span> <span class="fn">login</span>(String user, String pass) {
    driver.<span class="fn">findElement</span>(usernameField).<span class="fn">sendKeys</span>(user);
    driver.<span class="fn">findElement</span>(passwordField).<span class="fn">sendKeys</span>(pass);
    driver.<span class="fn">findElement</span>(loginBtn).<span class="fn">click</span>();
    <span class="kw">return new</span> <span class="cl">HomePage</span>(driver); <span class="cm">// return next page</span>
  }
  <span class="kw">public</span> String <span class="fn">getError</span>() { <span class="kw">return</span> driver.<span class="fn">findElement</span>(errorMsg).<span class="fn">getText</span>(); }
}`},
{label:'PageFactory @FindBy',code:`<span class="kw">import</span> org.openqa.selenium.support.PageFactory;
<span class="kw">import</span> org.openqa.selenium.support.FindBy;

<span class="kw">public class</span> <span class="cl">LoginPage</span> {
  <span class="ann">@FindBy</span>(id = <span class="str">"username"</span>)   <span class="kw">private</span> WebElement usernameField;
  <span class="ann">@FindBy</span>(id = <span class="str">"password"</span>)   <span class="kw">private</span> WebElement passwordField;
  <span class="ann">@FindBy</span>(id = <span class="str">"loginBtn"</span>)   <span class="kw">private</span> WebElement loginBtn;

  <span class="kw">public</span> <span class="fn">LoginPage</span>(WebDriver driver) {
    <span class="cl">PageFactory</span>.<span class="fn">initElements</span>(driver, <span class="kw">this</span>); <span class="cm">// initializes @FindBy</span>
  }

  <span class="kw">public void</span> <span class="fn">login</span>(String user, String pass) {
    usernameField.<span class="fn">sendKeys</span>(user);
    passwordField.<span class="fn">sendKeys</span>(pass);
    loginBtn.<span class="fn">click</span>();
  }
}`},
{label:'BasePage + Test',code:`<span class="kw">public abstract class</span> <span class="cl">BasePage</span> {
  <span class="kw">protected</span> WebDriver driver;
  <span class="kw">protected</span> WebDriverWait wait;

  <span class="kw">public</span> <span class="fn">BasePage</span>(WebDriver driver) {
    <span class="kw">this</span>.driver = driver;
    <span class="kw">this</span>.wait = <span class="kw">new</span> <span class="cl">WebDriverWait</span>(driver, Duration.<span class="fn">ofSeconds</span>(<span class="num">15</span>));
    <span class="cl">PageFactory</span>.<span class="fn">initElements</span>(driver, <span class="kw">this</span>);
  }

  <span class="kw">protected</span> WebElement <span class="fn">waitForVisible</span>(<span class="cl">By</span> by) {
    <span class="kw">return</span> wait.<span class="fn">until</span>(<span class="cl">EC</span>.<span class="fn">visibilityOfElementLocated</span>(by));
  }
}

<span class="cm">// Test uses Page Objects:</span>
<span class="cl">LoginPage</span> login = <span class="kw">new</span> <span class="cl">LoginPage</span>(driver);
<span class="cl">HomePage</span> home = login.<span class="fn">login</span>(<span class="str">"admin"</span>, <span class="str">"pass"</span>);

qa:[{q:'What is the Page Object Model (POM)?',a:'POM is a design pattern where each web page has a dedicated Java class containing its element locators and interaction methods. Tests call page methods; pages manage WebDriver interactions.'},{q:'What is PageFactory and when should you use it?',a:'PageFactory is Selenium\'s built-in POM implementation. @FindBy annotations declare locators; PageFactory.initElements() initializes them lazily. Use it for cleaner code; regular By fields are equally valid.'},{q:'Why should locators not be in test classes?',a:'When UI changes, you update one Page class instead of every test. Tests calling loginPage.login() are readable; tests with raw By.id("username") are not maintainable at scale.'},{q:'What does PageFactory.initElements() do?',a:'It reflects on the class fields annotated with @FindBy and creates WebElement proxy objects. These proxies call findElement() lazily — only when the element is first interacted with, not at construction time.'},{q:'What is the difference between POM and Page Factory?',a:'POM is the design pattern concept (each page = one class). PageFactory is a Selenium implementation tool for POM using @FindBy annotations. You can implement POM without PageFactory using regular By fields.'}]
},

{label:'DriverFactory',code:`<span class="kw">public class</span> <span class="cl">DriverFactory</span> {
  <span class="kw">private static</span> ThreadLocal&lt;WebDriver&gt; driver = <span class="kw">new</span> ThreadLocal&lt;&gt;();

  <span class="kw">public static</span> WebDriver <span class="fn">initDriver</span>(String browser) {
    <span class="kw">switch</span> (browser.<span class="fn">toLowerCase</span>()) {
      <span class="kw">case</span> <span class="str">"chrome"</span>:
        <span class="cl">ChromeOptions</span> opts = <span class="kw">new</span> <span class="cl">ChromeOptions</span>();
        opts.<span class="fn">addArguments</span>(<span class="str">"--headless=new"</span>, <span class="str">"--no-sandbox"</span>);
        driver.<span class="fn">set</span>(<span class="kw">new</span> <span class="cl">ChromeDriver</span>(opts)); <span class="kw">break</span>;
      <span class="kw">case</span> <span class="str">"firefox"</span>:
        driver.<span class="fn">set</span>(<span class="kw">new</span> <span class="cl">FirefoxDriver</span>()); <span class="kw">break</span>;
      <span class="kw">default</span>: <span class="kw">throw new</span> IllegalArgumentException(<span class="str">"Unknown: "</span>+browser);
    }
    <span class="fn">getDriver</span>().<span class="fn">manage</span>().<span class="fn">window</span>().<span class="fn">maximize</span>();
    <span class="kw">return</span> <span class="fn">getDriver</span>();
  }
  <span class="kw">public static</span> WebDriver <span class="fn">getDriver</span>() { <span class="kw">return</span> driver.<span class="fn">get</span>(); }
  <span class="kw">public static void</span> <span class="fn">quitDriver</span>() { driver.<span class="fn">get</span>().<span class="fn">quit</span>(); driver.<span class="fn">remove</span>(); }
}`},

<span class="cm">// base.url=https://staging.app.com</span>

<span class="kw">public class</span> <span class="cl">ConfigReader</span> {

{label:'ScreenshotUtil',code:`<span class="kw">import</span> org.openqa.selenium.TakesScreenshot;
<span class="kw">import</span> org.openqa.selenium.OutputType;

<span class="kw">public class</span> <span class="cl">ScreenshotUtil</span> {

    <span class="cl">TakesScreenshot</span> ts = (<span class="cl">TakesScreenshot</span>) driver;

best:['ThreadLocal<WebDriver> is mandatory for parallel test execution — never use static WebDriver','ConfigReader loads config.properties at startup — zero hardcoded values in test/page classes','Always call driver.remove() after driver.quit() to clean ThreadLocal reference and prevent memory leaks','Screenshot must be taken BEFORE driver.quit() — you lose browser state the moment quit() is called','Use Maven Surefire parallel="methods" threadCount="4" + DriverFactory for parallel execution'],
qa:[{q:'Why do we use ThreadLocal<WebDriver> in a framework?',a:'Each parallel test thread needs its own driver instance. ThreadLocal ensures thread-A\'s driver.get() returns thread-A\'s driver and never thread-B\'s. Without it parallel tests crash with concurrent browser interactions.'},{q:'What is the project package structure for a production Selenium framework?',a:'tests/ (test classes), pages/ (Page Objects), utils/ (DriverFactory, ConfigReader, ScreenshotUtil), config/ (ConfigReader), resources/ (config.properties). Each concern in its own package.'},{q:'Why must screenshot be taken before driver.quit()?',a:'driver.quit() closes the browser and kills the driver process. Any screenshot attempt after quit() throws SessionNotFoundException. Always capture screenshot in @AfterMethod before quit().'},{q:'How do you make the framework run the same tests on different browsers without code changes?',a:'Read browser from ConfigReader.get("browser") in DriverFactory — change config.properties value from "chrome" to "firefox" and the entire suite runs on Firefox with zero code change.'},{q:'What is the purpose of driver.remove() after driver.quit()?',a:'ThreadLocal.remove() cleans the thread-local slot, preventing memory leaks in long-running test sessions and thread pools. Without it, GC cannot collect the old WebDriver reference held in the thread.'}]
},

qa:[{q:'Why use @BeforeMethod for driver init instead of @BeforeClass?',a:'@BeforeClass shares one driver across all methods in the class — browser state bleeds between tests. @BeforeMethod gives each test its own fresh browser, ensuring test isolation.'},{q:'How does @DataProvider work?',a:'@DataProvider annotated method returns Object[][] — each inner array is one test run\'s parameter set. @Test(dataProvider="name") runs the method once per row with the row values as method arguments.'},{q:'What is the difference between @BeforeMethod and @BeforeClass?',a:'@BeforeClass runs once before all methods in the class. @BeforeMethod runs before EACH test method. For driver setup use @BeforeMethod to ensure fresh browser per test.'},{q:'How do TestNG groups work?',a:'@Test(groups={"smoke"}) tags the test. testng.xml <include name="smoke"/> runs only smoke-tagged tests. This lets you run smoke vs full regression without separate test files.'},{q:'What is the purpose of ITestListener in TestNG?',a:'ITestListener callbacks (onTestFailure, onTestSuccess) run automatically for every test. Use it to take screenshots on failure, log results, and send notifications without modifying test classes.'}]

let current=0;
function buildWidget(){
  const bar=document.getElementById('masterTabs');
  const panels=document.getElementById('masterPanels');
  DATA.forEach((s,i)=>{
    const p=PH[s.ph];
    const btn=document.createElement('button');
    btn.className=`stab ${p.cls}${i===0?' act':''}`;
    btn.textContent=`S${s.id}`;
    btn.title=s.title;
    btn.onclick=()=>go(i);
    bar.appendChild(btn);
    const div=document.createElement('div');
    div.className=`panel${i===0?' act':''}`;
    div.innerHTML=renderPanel(s,i);
    panels.appendChild(div);
  });
}

function renderPanel(s,i){
  const p=PH[s.ph];
  const pills=s.wwwwh.map(w=>`<span class="pill">${w}</span>`).join('');
  const spoken=s.spoken.map(l=>`<div class="ol-card">${l}</div>`).join('');
  const ctabs=s.codes.map((c,j)=>`<button class="ctab${j===0?' cact':''}" onclick="switchCode(this,${i})">${c.label}</button>`).join('');
  const cblocks=s.codes.map((c,j)=>`<div class="code-block${j===0?' cact':''}"><pre>${c.code}</pre></div>`).join('');
  const checks=s.best.map(b=>`<div class="check-item"><i class="ti ti-circle-check" aria-hidden="true"></i><span>${b}</span></div>`).join('');
  const qa=s.qa.map((q,j)=>`<div class="qa-item"><div class="qa-q" onclick="toggleQA(this)">${q.q}<i class="ti ti-chevron-down" style="font-size:14px;transition:transform .2s" aria-hidden="true"></i></div><div class="qa-a">${q.a}</div></div>`).join('');
  return `
<div class="s-head">
  <span class="s-badge" style="background:${p.bg};color:${p.col}"><i class="ti ti-books" aria-hidden="true"></i>${p.badge} · Session ${s.id} of ${DATA.length}</span>
  <div class="s-title">${s.title}</div>
  <div class="s-def">${s.sub}</div>
  <div class="wwwwh">${pills}</div>
</div>
<div class="section">
  <div class="sec-title"><i class="ti ti-message-circle" aria-hidden="true"></i>Spoken interview one-liners</div>
  ${spoken}
</div>
<div class="section">
  <div class="sec-title"><i class="ti ti-topology-star" aria-hidden="true"></i>Architecture / concept diagram</div>
  <div class="arch-box">${s.arch}</div>
</div>
<div class="section">
  <div class="sec-title"><i class="ti ti-code" aria-hidden="true"></i>Code examples</div>
  <div class="code-tabs">${ctabs}</div>
  ${cblocks}
</div>
<div class="section">
  <div class="sec-title"><i class="ti ti-checklist" aria-hidden="true"></i>Best practices</div>
  ${checks}
</div>
<div class="section">
  <div class="sec-title"><i class="ti ti-help-circle" aria-hidden="true"></i>Interview prep — Q&A</div>
  ${qa}
</div>
<div class="nav-bar">
  <button class="nbtn" onclick="go(${i-1})" ${i===0?'disabled':''}>← Previous</button>
  <span class="prog-txt">S${s.id} of ${DATA.length} · ${PH[s.ph].badge}</span>
  <button class="nbtn" onclick="go(${i+1})" ${i===DATA.length-1?'disabled':''}>Next →</button>
</div>`;
}

function go(idx){
  if(idx<0||idx>=DATA.length)return;
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('act',i===idx));
  document.querySelectorAll('.stab').forEach((b,i)=>b.classList.toggle('act',i===idx));
  document.getElementById('progFill').style.width=Math.round((idx+1)/DATA.length*100)+'%';
  current=idx;
}

function switchCode(btn,panelIdx){
  const panel=document.querySelectorAll('.panel')[panelIdx];
  panel.querySelectorAll('.ctab').forEach(b=>b.classList.remove('cact'));
  panel.querySelectorAll('.code-block').forEach(b=>b.classList.remove('cact'));
  const idx=Array.from(btn.parentNode.children).indexOf(btn);
  btn.classList.add('cact');
  panel.querySelectorAll('.code-block')[idx].classList.add('cact');
}

function toggleQA(btn){
  const ans=btn.nextElementSibling;
  const icon=btn.querySelector('i');
  const open=ans.classList.toggle('open');
  if(icon)icon.style.transform=open?'rotate(180deg)':'';
}

buildWidget();
</script>
