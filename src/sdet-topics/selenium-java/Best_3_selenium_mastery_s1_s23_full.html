<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{

  --color-text-tertiary:#8e90a6;
  --color-text-success:#1D9E75;
  --color-text-danger:#DC3545;
  --color-background-primary:#ffffff;
  --color-background-secondary:#f4f4f8;
  --color-border-primary:#534AB7;
  --color-border-secondary:#d1d1db;
  --color-border-tertiary:#e4e4eb;
  --border-radius-md:8px;

h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.hub{font-family:var(--font-sans);padding:0 0 2rem}
.phase-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;padding:4px 0}
.phase-label{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;cursor:default;white-space:nowrap}
.ph-fund{background:#EEEDFE;color:#3C3489}
.ph-inter{background:#E1F5EE;color:#085041}
.ph-adv{background:#FAEEDA;color:#633806}
.ph-fw{background:#FAECE7;color:#712B13}
.session-tabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:1rem;border-bottom:0.5px solid var(--color-border-tertiary);padding-bottom:8px}
.stab{padding:5px 10px;font-size:11px;font-weight:500;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);cursor:pointer;transition:all .15s;white-space:nowrap}
.stab:hover{background:var(--color-background-secondary)}
.stab.act{background:var(--color-background-secondary);border-color:var(--color-border-primary);color:var(--color-text-primary)}
.stab.ph-f{border-left:3px solid #7F77DD}
.stab.ph-i{border-left:3px solid #1D9E75}
.stab.ph-a{border-left:3px solid #BA7517}
.stab.ph-fw2{border-left:3px solid #D85A30}
.panel{display:none}
.panel.act{display:block}
.prog-bar{height:3px;background:var(--color-border-tertiary);border-radius:2px;margin-bottom:1rem;overflow:hidden}
.prog-fill{height:100%;background:#7F77DD;border-radius:2px;transition:width .3s}
.s-head{border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1rem 1.25rem;margin-bottom:1rem;background:var(--color-background-secondary)}
.s-badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;margin-bottom:8px}
.s-title{font-size:17px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.s-def{font-size:13px;color:var(--color-text-secondary);line-height:1.6}
.wwwwh{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}

.pill{font-size:11px;padding:3px 10px;border-radius:20px;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);background:var(--color-background-secondary)}
.wpill{font-size:11px;padding:3px 10px;border-radius:20px;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary)}
.section{margin-bottom:1rem}
.sec-title{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sec-title i{font-size:15px;color:var(--color-text-secondary)}
.ol-card{background:var(--color-background-secondary);border-left:3px solid #7F77DD;border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;padding:7px 12px;margin-bottom:6px;font-size:12px;color:var(--color-text-secondary);line-height:1.5}
.ol-card span{color:var(--color-text-primary);font-weight:500}
.code-tabs{display:flex;gap:3px;margin-bottom:0;border-bottom:0 solid transparent}
.ctab{padding:5px 12px;font-size:11px;font-weight:500;background:#1a1a2e;color:#6c6c8a;border:0.5px solid #2a2a3e;border-bottom:none;border-radius:6px 6px 0 0;cursor:pointer;transition:all .15s}
.ctab.cact{background:#0d0d1a;color:#a6a6d4;border-bottom:0.5px solid #0d0d1a}
.code-block{color:#c9d1d9;background:#0d0d1a;border:0.5px solid #2a2a3e;border-radius:0 6px 6px 6px;padding:1rem 1.25rem;font-size:12px;font-family:var(--font-mono);line-height:1.75;overflow-x:auto;margin-bottom:0.8rem;display:none}
.code-block.cact{display:block}
.code-block pre{margin:0;padding:0;white-space:pre-wrap;word-wrap:break-word;font:inherit;color:inherit;line-height:inherit}
.kw{color:#79b8ff}
.kw2{color:#f97583}
.str{color:#9ecbff}
.cm{color:#6a737d}
.fn{color:#b392f0}
.cl{color:#ffab70}
.ann{color:#85e89d}
.num{color:#f8c555}
.op{color:#79b8ff}
.check-item{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--color-text-secondary);margin-bottom:5px;line-height:1.5}
.check-item i{color:var(--color-text-success);font-size:14px;flex-shrink:0;margin-top:1px}
.qa-item{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:6px;overflow:hidden}
.qa-q{padding:8px 12px;font-size:12px;font-weight:500;color:var(--color-text-primary);cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--color-background-secondary)}
.qa-a{padding:8px 12px 10px;font-size:12px;color:var(--color-text-secondary);line-height:1.6;border-top:0.5px solid var(--color-border-tertiary);display:none}
.qa-a.open{display:block}
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:1.2rem;padding-top:1rem;border-top:0.5px solid var(--color-border-tertiary)}
.nbtn{padding:6px 16px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);cursor:pointer}
.nbtn:hover{background:var(--color-background-secondary)}
.nbtn:disabled{opacity:.3;cursor:default}
.prog-txt{font-size:11px;color:var(--color-text-secondary)}
.arch-box{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem;margin-bottom:.8rem;background:var(--color-background-primary)}

/* SVG diagram element classes */

.c-teal rect{fill:#E1F5EE;stroke:#5DCAA5;stroke-width:1.5}

spoken:['Selenium is the industry-standard open-source tool for automating web browser interactions using the WebDriver protocol.','I use Selenium because it supports all major browsers, is language-agnostic, and integrates seamlessly into any CI/CD pipeline.','Selenium is best used when you need end-to-end UI regression testing across real browsers in production-like environments.','Selenium WebDriver speaks directly to the browser driver — no intermediary server needed, unlike the older Selenium RC.','At its core, Selenium sends HTTP JSON commands to a browser driver, which translates them into native browser actions.'],

codes:[
{label:'Basic Setup',code:`<span class="cm">// Basic Selenium setup — Java + ChromeDriver</span>
<span class="kw">import</span> org.openqa.selenium.WebDriver;
<span class="kw">import</span> org.openqa.selenium.chrome.ChromeDriver;

<span class="kw">public class</span> <span class="cl">FirstTest</span> {
  <span class="kw">public static void</span> <span class="fn">main</span>(String[] args) {
    <span class="cm">// Selenium 4.6+: Selenium Manager auto-downloads driver</span>
    WebDriver driver = <span class="kw">new</span> <span class="cl">ChromeDriver</span>();

    driver.<span class="fn">get</span>(<span class="str">"https://www.google.com"</span>); <span class="cm">// open URL</span>
    System.out.<span class="fn">println</span>(driver.<span class="fn">getTitle</span>()); <span class="cm">// print title</span>
    driver.<span class="fn">quit</span>();                          <span class="cm">// close browser</span>
  }
}`},
{label:'Browser nav',code:`<span class="cm">// Browser navigation methods</span>

best:['Use driver.quit() in teardown — not close() — to kill the entire browser process','Always declare driver as the WebDriver interface type, never the concrete class','Selenium 4.6+ Selenium Manager eliminates manual driver path setup','Web UI tests are slowest in the test pyramid — keep them focused on critical flows','Version-match ChromeDriver to Chrome browser major version when not using Selenium Manager'],
qa:[{q:'What is the Selenium WebDriver protocol?',a:'WebDriver communicates via HTTP using the W3C WebDriver standard — test code sends JSON commands to a browser driver (e.g. ChromeDriver) which translates them to native browser calls.'},{q:'What is the difference between driver.close() and driver.quit()?',a:'close() closes only the current tab/window. quit() closes ALL windows and kills the browser driver process. Always use quit() in test teardown.'},{q:'Can Selenium automate desktop apps?',a:'No. Selenium is web-only. For desktop automation use Appium (mobile/desktop), Sikuli, or WinAppDriver.'},{q:'What are the 4 Selenium components?',a:'1) IDE — record/replay browser extension, 2) WebDriver — core API for browser control, 3) RC — legacy deprecated component, 4) Grid — parallel/distributed execution.'},{q:'Why is Selenium preferred over other tools?',a:'Open-source, multi-browser, multi-language, large community, CI/CD integration, W3C standard compliance, and no licensing cost.'}]
},

{id:2,ph:'f',title:'WebDriver Architecture',sub:'4-layer communication: Java code → Selenium client → Browser driver → Browser',
wwwwh:['What','Why','When','How','Where'],
spoken:['WebDriver architecture has 4 layers: your Java test code, the Selenium client library, the browser driver binary, and the actual browser.','Every driver.click() call becomes an HTTP POST request sent to ChromeDriver, which translates it into a Chrome DevTools Protocol command.','Understanding the architecture helps me debug connection failures — I know whether the issue is in my code, the driver, or the browser.','The W3C WebDriver standard is the contract between Selenium client and browser drivers — it guarantees cross-browser compatibility.','ChromeDriver, GeckoDriver, and EdgeDriver are standalone servers that listen for Selenium HTTP commands on a local port.'],

{label:'WebDriver hierarchy',code:`<span class="cm">// WebDriver interface hierarchy</span>
<span class="cm">// SearchContext (interface)</span>
<span class="cm">//   └─ WebDriver (interface) extends SearchContext</span>
<span class="cm">//       └─ RemoteWebDriver (class) implements WebDriver</span>
<span class="cm">//           ├─ ChromeDriver</span>
<span class="cm">//           ├─ FirefoxDriver</span>
<span class="cm">//           ├─ EdgeDriver</span>
<span class="cm">//           └─ SafariDriver</span>

<span class="cm">// Always declare as interface — polymorphism!</span>
WebDriver driver = <span class="kw">new</span> <span class="cl">ChromeDriver</span>(); <span class="cm">// switch browsers = 1 line</span>
WebDriver driver2 = <span class="kw">new</span> <span class="cl">FirefoxDriver</span>();

best:['Declare WebDriver as interface type for browser-agnostic code','driver.quit() is mandatory in @After — orphaned ChromeDriver processes crash CI','RemoteWebDriver is used for Grid — same API, different constructor','Match browser driver version to browser version (Selenium Manager does this auto in 4.6+)','JSON Wire Protocol (Selenium 3) → W3C WebDriver Standard (Selenium 4)'],
qa:[{q:'What is RemoteWebDriver?',a:'RemoteWebDriver is the concrete class that implements WebDriver and handles HTTP communication with browser drivers. All browser-specific drivers (ChromeDriver, FirefoxDriver) extend it.'},{q:'Why declare WebDriver driver; not ChromeDriver driver;?',a:'Declaring as the interface enables polymorphism — you can swap browsers with a single line change and write browser-agnostic helper methods.'},{q:'What port does ChromeDriver listen on?',a:'ChromeDriver picks a random available port by default. You can specify a port via ChromeDriverService: new ChromeDriverService.Builder().usingPort(9515).build().'},{q:'What is the W3C WebDriver standard?',a:'W3C WebDriver is an international standard that defines the HTTP API for browser automation. Selenium 4 is fully W3C compliant, replacing the old JSON Wire Protocol.'},{q:'What happens if ChromeDriver version mismatches Chrome?',a:'SessionNotCreatedException is thrown. Fix: update ChromeDriver to match Chrome major version, or use Selenium Manager (4.6+) which auto-downloads the correct version.'}]
},

{id:3,ph:'f',title:'Environment setup',sub:'JDK + Maven + selenium-java + Browser drivers — all platforms',

best:['Use selenium-java 4.21+ for latest Selenium Manager support','--no-sandbox --disable-dev-shm-usage are mandatory for Linux/Docker CI','Store driver path in config.properties — never hardcode OS paths in test code','Use environment variables for CI/CD driver configuration','Run safaridriver --enable once in terminal before first Safari test'],
qa:[{q:'What is Selenium Manager?',a:'Selenium Manager (introduced in 4.6) is a built-in CLI tool that automatically detects your installed browser version and downloads the matching driver binary — eliminating manual System.setProperty setup.'},{q:'Why does Chrome crash in Docker without --no-sandbox?',a:'Docker runs as root by default. Chrome refuses to run as root for security reasons. --no-sandbox disables the Chrome sandbox which requires a non-root user.'},{q:'What is --disable-dev-shm-usage for?',a:'Docker limits /dev/shm (shared memory) to 64MB by default. Chrome uses it heavily and crashes without --disable-dev-shm-usage which forces it to use /tmp instead.'},{q:'How do you run Firefox headlessly?',a:'FirefoxOptions opts = new FirefoxOptions(); opts.addArguments("--headless"); WebDriver driver = new FirefoxDriver(opts);'},{q:'Which Java version is required for Selenium 4?',a:'Selenium 4 requires Java 8 minimum. Java 11+ is recommended for modern features and long-term support. Java 17 LTS is the current enterprise standard.'}]
},

{id:4,ph:'f',title:'Locator strategies',sub:'By.id · By.css · By.xpath · By.name · By.tagName · Locator priority',
wwwwh:['What','Why','When','How','Where'],
spoken:['A locator is the address Selenium uses to find a specific element in the DOM — like GPS coordinates for an HTML element.','I always prefer By.id first because it is the fastest DOM lookup and guaranteed unique per W3C HTML spec.','XPath is my last resort — powerful but slow and brittle; relative XPath starting with // is always safer than absolute paths.','CSS selectors are faster than XPath and more readable — I use attribute selectors like input[type="submit"] regularly.','In real projects I validate locators in Chrome DevTools console: $$("#myId") for CSS and $x("//input") for XPath.'],
arch:`<svg width="100%" viewBox="0 0 680 210" role="img"><title>Locator priority ladder</title><desc>Priority from best to last: id, name, cssSelector, linkText, tagName, xpath</desc>
<text class="ts" x="50" y="30" fill="var(--color-text-success)">Best</text>
<g class="c-teal"><rect x="200" y="20" width="280" height="34" rx="6" stroke-width="0.5"/><text class="th" x="340" y="41" text-anchor="middle" dominant-baseline="central">1. By.id — fastest, most unique</text></g>
<g class="c-teal"><rect x="180" y="62" width="320" height="34" rx="6" stroke-width="0.5"/><text class="th" x="340" y="83" text-anchor="middle" dominant-baseline="central">2. By.name — good in forms</text></g>
<g class="c-teal"><rect x="160" y="104" width="360" height="34" rx="6" stroke-width="0.5"/><text class="th" x="340" y="125" text-anchor="middle" dominant-baseline="central">3. By.cssSelector — fast and readable</text></g>
<g class="c-amber"><rect x="140" y="146" width="400" height="34" rx="6" stroke-width="0.5"/><text class="th" x="340" y="167" text-anchor="middle" dominant-baseline="central">4. By.linkText / partialLinkText</text></g>
<g class="c-coral"><rect x="120" y="188" width="440" height="34" rx="6" stroke-width="0.5"/><text class="th" x="340" y="209" text-anchor="middle" dominant-baseline="central">5. By.xpath — last resort</text></g>
<text class="ts" x="50" y="210" fill="var(--color-text-danger)">Slow</text></svg>`,
codes:[
{label:'All locators',code:`<span class="cm">// By.id — best performer</span>
driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"loginBtn"</span>));

<span class="cm">// By.name</span>
driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">name</span>(<span class="str">"username"</span>));

<span class="cm">// By.className — single class only!</span>
driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">className</span>(<span class="str">"primary-btn"</span>));

<span class="cm">// By.tagName — for lists</span>
List&lt;WebElement&gt; links = driver.<span class="fn">findElements</span>(<span class="cl">By</span>.<span class="fn">tagName</span>(<span class="str">"a"</span>));

<span class="cm">// By.linkText and partialLinkText</span>
driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">linkText</span>(<span class="str">"Sign In"</span>));
driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">partialLinkText</span>(<span class="str">"Sign"</span>));`},
{label:'CSS selectors',code:`<span class="cm">// CSS selector reference</span>
<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"#loginBtn"</span>)          <span class="cm">// id</span>
<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">".primary-btn"</span>)      <span class="cm">// class</span>
<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"input[type='submit']"</span>) <span class="cm">// attribute</span>
<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"input[id*='user']"</span>)   <span class="cm">// contains</span>
<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"input[id^='log']"</span>)    <span class="cm">// starts with</span>
<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"input[id$='name']"</span>)   <span class="cm">// ends with</span>
<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"div.form > input"</span>)    <span class="cm">// parent > child</span>
<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"p + span"</span>)            <span class="cm">// adjacent sibling</span>
<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"li:nth-child(2)"</span>)     <span class="cm">// nth child</span>`},
{label:'XPath patterns',code:`<span class="cm">// Relative XPath — ALWAYS start with //</span>
<span class="cl">By</span>.<span class="fn">xpath</span>(<span class="str">"//*[@id='loginBtn']"</span>)       <span class="cm">// any tag, id</span>
<span class="cl">By</span>.<span class="fn">xpath</span>(<span class="str">"//input[@type='submit']"</span>)   <span class="cm">// tag + attr</span>
<span class="cl">By</span>.<span class="fn">xpath</span>(<span class="str">"//button[text()='Login']"</span>)   <span class="cm">// exact text</span>
<span class="cl">By</span>.<span class="fn">xpath</span>(<span class="str">"//button[contains(text(),'Log')]"</span>) <span class="cm">// partial</span>
<span class="cl">By</span>.<span class="fn">xpath</span>(<span class="str">"//label[text()='Email']/following-sibling::input"</span>) <span class="cm">// axis</span>
<span class="cl">By</span>.<span class="fn">xpath</span>(<span class="str">"//table/tbody/tr[2]/td[3]"</span>) <span class="cm">// row/col</span>
<span class="cm">// NEVER: /html/body/div[1]/form/input[2] — absolute XPath</span>`},
{label:'findElement vs findElements',code:`<span class="cm">// findElement — single, throws NoSuchElementException</span>
WebElement btn = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"submit"</span>));

<span class="cm">// findElements — list, returns empty list (no exception)</span>
List&lt;WebElement&gt; rows = driver.<span class="fn">findElements</span>(<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"tr"</span>));
System.out.<span class="fn">println</span>(<span class="str">"Rows: "</span> + rows.size());

<span class="cm">// Safe existence check (no exception):</span>
<span class="kw">boolean</span> exists = !driver.<span class="fn">findElements</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"error"</span>)).isEmpty();

<span class="cm">// Iterate all matching elements:</span>
driver.<span class="fn">findElements</span>(<span class="cl">By</span>.<span class="fn">tagName</span>(<span class="str">"a"</span>))
      .<span class="fn">forEach</span>(e -&gt; System.out.<span class="fn">println</span>(e.<span class="fn">getText</span>()));`}
],
best:['Verify XPath/CSS in DevTools console before putting in code: $x("//input") or $$(".btn")','Never use absolute XPath — brittle, breaks on any DOM structure change','By.className("btn active") throws InvalidSelectorException — use cssSelector(".btn.active")','Store locators as By fields in Page classes, not inline in test methods','Prefer CSS over XPath for speed — CSS is parsed natively by the browser'],
qa:[{q:'Which locator is the fastest in Selenium?',a:'By.id() is fastest — browsers do a direct hash map lookup by ID. By.cssSelector() is next. By.xpath() is slowest as it requires full DOM traversal.'},{q:'What is the difference between absolute and relative XPath?',a:'Absolute XPath starts from root: /html/body/div[1]/input — very brittle. Relative XPath starts with //: //input[@id="email"] — robust and recommended.'},{q:'Why does By.className fail with multiple classes?',a:'Selenium\'s By.className uses a space-separated list as a single class name. Use By.cssSelector(".class1.class2") for compound class matching.'},{q:'When would you use By.tagName?',a:'For collecting all elements of a type: all links (a), all rows (tr), all inputs. Rarely used for finding a specific single element due to poor uniqueness.'},{q:'What CSS attribute selector finds elements whose id contains "user"?',a:'By.cssSelector("input[id*=\'user\']") — * means contains. ^= means starts-with, $= means ends-with.'}]
},

{id:5,ph:'i',title:'WebElement API',sub:'click · sendKeys · getText · getAttribute · isDisplayed · Select',
wwwwh:['What','Why','When','How','Where'],
spoken:['WebElement is the Selenium interface representing a single DOM element — every interaction goes through it.','getText() returns visible text between tags; getAttribute("value") returns form input content — they serve different purposes.','I use isDisplayed() before assertions and elementToBeClickable() wait before clicks to prevent flaky tests.','The Select class wraps native HTML select dropdowns and provides selectByVisibleText(), selectByValue(), and selectByIndex().','getCssValue() is essential for visual regression — I verify computed color, font-size, and display values in assertion checks.'],
arch:`<svg width="100%" viewBox="0 0 680 180" role="img"><title>WebElement method groups</title><desc>Three groups: actions, state checks, property reads</desc>
<g class="c-teal"><rect x="20" y="20" width="195" height="130" rx="8" stroke-width="0.5"/><text class="th" x="117" y="44" text-anchor="middle" dominant-baseline="central">Actions</text><text class="ts" x="117" y="66" text-anchor="middle">.click()</text><text class="ts" x="117" y="84" text-anchor="middle">.sendKeys(text)</text><text class="ts" x="117" y="102" text-anchor="middle">.clear()</text><text class="ts" x="117" y="120" text-anchor="middle">.submit()</text></g>
<g class="c-purple"><rect x="240" y="20" width="195" height="130" rx="8" stroke-width="0.5"/><text class="th" x="337" y="44" text-anchor="middle" dominant-baseline="central">State checks</text><text class="ts" x="337" y="66" text-anchor="middle">.isDisplayed()</text><text class="ts" x="337" y="84" text-anchor="middle">.isEnabled()</text><text class="ts" x="337" y="102" text-anchor="middle">.isSelected()</text></g>
<g class="c-amber"><rect x="460" y="20" width="200" height="130" rx="8" stroke-width="0.5"/><text class="th" x="560" y="44" text-anchor="middle" dominant-baseline="central">Property reads</text><text class="ts" x="560" y="66" text-anchor="middle">.getText()</text><text class="ts" x="560" y="84" text-anchor="middle">.getAttribute()</text><text class="ts" x="560" y="102" text-anchor="middle">.getCssValue()</text><text class="ts" x="560" y="120" text-anchor="middle">.getTagName()</text></g></svg>`,
codes:[
{label:'Core interactions',code:`<span class="cm">// Always clear before sendKeys to avoid appending</span>
WebElement email = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"email"</span>));
email.<span class="fn">clear</span>();                        <span class="cm">// clear existing text</span>
email.<span class="fn">sendKeys</span>(<span class="str">"user@test.com"</span>);     <span class="cm">// type text</span>
email.<span class="fn">sendKeys</span>(<span class="cl">Keys</span>.TAB);             <span class="cm">// press Tab key</span>
email.<span class="fn">sendKeys</span>(<span class="cl">Keys</span>.CONTROL, <span class="str">"a"</span>);  <span class="cm">// Ctrl+A</span>

<span class="cm">// Click and submit</span>
driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"submit"</span>)).<span class="fn">click</span>();
driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"email"</span>)).<span class="fn">submit</span>(); <span class="cm">// submit form</span>`},
{label:'State + property',code:`<span class="cm">// State checks — return boolean</span>
WebElement btn = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"submit"</span>));
<span class="kw">boolean</span> visible  = btn.<span class="fn">isDisplayed</span>(); <span class="cm">// visible on screen</span>
<span class="kw">boolean</span> enabled  = btn.<span class="fn">isEnabled</span>();  <span class="cm">// not disabled</span>
<span class="kw">boolean</span> selected = btn.<span class="fn">isSelected</span>(); <span class="cm">// checkbox/radio state</span>

<span class="cm">// Property reads</span>
WebElement heading = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">tagName</span>(<span class="str">"h1"</span>));
String text    = heading.<span class="fn">getText</span>();              <span class="cm">// visible text</span>
String href    = heading.<span class="fn">getAttribute</span>(<span class="str">"href"</span>);   <span class="cm">// attribute</span>
String color   = heading.<span class="fn">getCssValue</span>(<span class="str">"color"</span>);  <span class="cm">// computed CSS</span>
String tag     = heading.<span class="fn">getTagName</span>();           <span class="cm">// "h1"</span>`},
{label:'Select dropdown',code:`<span class="kw">import</span> org.openqa.selenium.support.ui.Select;

<span class="cm">// Native HTML &lt;select&gt; dropdown</span>
WebElement dropEl = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"country"</span>));
Select drop = <span class="kw">new</span> <span class="cl">Select</span>(dropEl);

drop.<span class="fn">selectByVisibleText</span>(<span class="str">"India"</span>);   <span class="cm">// by display text</span>
drop.<span class="fn">selectByValue</span>(<span class="str">"IN"</span>);            <span class="cm">// by value attr</span>
drop.<span class="fn">selectByIndex</span>(<span class="num">2</span>);               <span class="cm">// by 0-based index</span>

String selected = drop.<span class="fn">getFirstSelectedOption</span>().<span class="fn">getText</span>();
List&lt;WebElement&gt; all = drop.<span class="fn">getOptions</span>(); <span class="cm">// all options</span>`}
],
best:['Always clear() input fields before sendKeys() — avoid appending to existing content','getText() returns empty string for hidden elements — use getAttribute("textContent") instead','Use Select class for native <select> elements; for custom dropdowns use click + findElement','isDisplayed() checks visibility; isEnabled() checks interactability — both needed for reliable clicks','getCssValue() returns computed RGB values — parse them for color assertion comparisons'],
qa:[{q:'What is the difference between getText() and getAttribute("value")?',a:'getText() returns visible inner text content between HTML tags. getAttribute("value") returns the value attribute — use it for input fields to get what the user has typed.'},{q:'What does isDisplayed() return for a hidden element?',a:'false — isDisplayed() returns true only when the element has non-zero size AND is not hidden by CSS (display, visibility, opacity). Always check this before assertions.'},{q:'How do you handle a multi-select dropdown?',a:'Select drop = new Select(el); drop.selectByVisibleText("A"); drop.selectByVisibleText("B"); — chained calls select multiple options. Use drop.getAllSelectedOptions() to verify.'},{q:'What exception is thrown if the element does not support Select?',a:'UnexpectedTagNameException — thrown when you wrap a non-select element with the Select class. Always verify the element is a native HTML <select>.'},{q:'When would you use element.submit() vs button.click()?',a:'submit() triggers the form\'s submit event on any element inside the form. click() directly fires a click on the element. For login forms, both work; submit() is more semantically correct.'}]
},

{id:6,ph:'i',title:'Waits & synchronization',sub:'Implicit · Explicit · FluentWait · ExpectedConditions — never Thread.sleep',
wwwwh:['What','Why','When','How','Where'],
spoken:['Synchronization is the art of making Selenium wait for the right moment — a missing wait causes 80% of flaky tests.','I never use Thread.sleep because it always waits the full duration regardless of element state — explicit wait is adaptive.','Implicit wait is set once and applies globally; explicit wait targets one specific condition — never mix both in the same test.','WebDriverWait polls every 500ms; FluentWait lets me customize polling interval and ignored exceptions for stubborn elements.','My rule: wait for elementToBeClickable before every click — it checks both visibility and enabledness simultaneously.'],
arch:`<svg width="100%" viewBox="0 0 680 160" role="img"><title>Wait strategy comparison</title><desc>Three wait types side by side: Thread.sleep bad, implicit global, explicit targeted</desc>
<g class="c-coral"><rect x="20" y="20" width="190" height="90" rx="8" stroke-width="0.5"/><text class="th" x="115" y="44" text-anchor="middle" dominant-baseline="central">Thread.sleep(5000)</text><text class="ts" x="115" y="64" text-anchor="middle">Fixed duration</text><text class="ts" x="115" y="82" text-anchor="middle">Always waits full time</text><text class="ts" x="115" y="98" text-anchor="middle">AVOID — never use</text></g>
<g class="c-amber"><rect x="240" y="20" width="190" height="90" rx="8" stroke-width="0.5"/><text class="th" x="335" y="44" text-anchor="middle" dominant-baseline="central">Implicit Wait</text><text class="ts" x="335" y="64" text-anchor="middle">Global setting</text><text class="ts" x="335" y="82" text-anchor="middle">All findElement calls</text><text class="ts" x="335" y="98" text-anchor="middle">Set once, applies always</text></g>
<g class="c-teal"><rect x="460" y="20" width="200" height="90" rx="8" stroke-width="1"/><text class="th" x="560" y="44" text-anchor="middle" dominant-baseline="central">Explicit Wait</text><text class="ts" x="560" y="64" text-anchor="middle">Targeted condition</text><text class="ts" x="560" y="82" text-anchor="middle">Polls until true</text><text class="ts" x="560" y="98" text-anchor="middle">Best practice</text></g>
<text class="ts" x="340" y="145" text-anchor="middle">Explicit + FluentWait are the production-grade approach</text></svg>`,
codes:[
{label:'Implicit wait',code:`<span class="cm">// Set implicit wait ONCE after driver creation</span>
WebDriver driver = <span class="kw">new</span> <span class="cl">ChromeDriver</span>();
driver.<span class="fn">manage</span>().<span class="fn">timeouts</span>()
      .<span class="fn">implicitlyWait</span>(Duration.<span class="fn">ofSeconds</span>(<span class="num">10</span>));

<span class="cm">// Now all findElement calls wait up to 10s</span>
WebElement btn = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"submit"</span>));

<span class="cm">// WARNING: Never mix implicit + explicit waits</span>
<span class="cm">// They interact and cause unpredictable timeouts</span>`},
{label:'Explicit wait',code:`<span class="kw">import</span> org.openqa.selenium.support.ui.WebDriverWait;
<span class="kw">import</span> org.openqa.selenium.support.ui.ExpectedConditions;

WebDriverWait wait = <span class="kw">new</span> <span class="cl">WebDriverWait</span>(driver, Duration.<span class="fn">ofSeconds</span>(<span class="num">10</span>));

<span class="cm">// Clickable — visible AND enabled:</span>
wait.<span class="fn">until</span>(<span class="cl">EC</span>.<span class="fn">elementToBeClickable</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"btn"</span>))).<span class="fn">click</span>();

<span class="cm">// Visibility — in DOM and visible on screen:</span>
WebElement msg = wait.<span class="fn">until</span>(<span class="cl">EC</span>.<span class="fn">visibilityOfElementLocated</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"toast"</span>)));

<span class="cm">// Text presence:</span>
wait.<span class="fn">until</span>(<span class="cl">EC</span>.<span class="fn">textToBePresentInElement</span>(msg, <span class="str">"Saved"</span>));

<span class="cm">// Spinner disappears:</span>
wait.<span class="fn">until</span>(<span class="cl">EC</span>.<span class="fn">invisibilityOfElementLocated</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"spinner"</span>)));`},
{label:'FluentWait',code:`<span class="kw">import</span> org.openqa.selenium.support.ui.FluentWait;

Wait&lt;WebDriver&gt; fluent = <span class="kw">new</span> <span class="cl">FluentWait</span>&lt;&gt;(driver)
    .<span class="fn">withTimeout</span>(Duration.<span class="fn">ofSeconds</span>(<span class="num">30</span>))
    .<span class="fn">pollingEvery</span>(Duration.<span class="fn">ofSeconds</span>(<span class="num">2</span>))
    .<span class="fn">ignoring</span>(<span class="cl">NoSuchElementException</span>.<span class="kw">class</span>)
    .<span class="fn">ignoring</span>(<span class="cl">StaleElementReferenceException</span>.<span class="kw">class</span>)
    .<span class="fn">withMessage</span>(<span class="str">"Element not found after 30s"</span>);

<span class="cm">// Custom lambda condition:</span>
fluent.<span class="fn">until</span>(d -&gt; {
    List&lt;WebElement&gt; rows = d.<span class="fn">findElements</span>(<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"tr"</span>));
    <span class="kw">return</span> rows.size() &gt;= <span class="num">5</span> ? rows : <span class="kw">null</span>; <span class="cm">// null = retry</span>
});`}
],
best:['Never use Thread.sleep — it makes tests slow and still fragile','Never mix implicit and explicit waits in the same test suite','elementToBeClickable is the safest condition before any click action','Return null (not false) from FluentWait lambda to continue polling','Set withMessage() on FluentWait for meaningful timeout error messages'],
qa:[{q:'What is the default polling interval for WebDriverWait?',a:'500 milliseconds. WebDriverWait polls the condition every 500ms until the timeout expires. Use FluentWait to customize the polling interval.'},{q:'How do you wait for a spinner to disappear?',a:'wait.until(ExpectedConditions.invisibilityOfElementLocated(By.id("spinner"))) — invisibilityOf waits for the element to become hidden or be removed from DOM.'},{q:'What is the difference between presenceOf and visibilityOf?',a:'presenceOfElementLocated: element is in the DOM (may be hidden). visibilityOfElementLocated: element is in DOM AND visible on screen with non-zero dimensions.'},{q:'When does FluentWait retry vs stop?',a:'It retries when the condition function returns null or throws an ignored exception. It stops and returns the value when the function returns a non-null result, or throws TimeoutException when max time exceeded.'},{q:'What exception does WebDriverWait throw on timeout?',a:'TimeoutException — you should catch it in test teardown to take a screenshot before the browser state is lost.'}]
},

{id:7,ph:'i',title:'Advanced interactions',sub:'Actions class · iFrames · Alerts · Multiple windows · JS Executor',
wwwwh:['What','Why','When','How','Where'],
spoken:['The Actions class builds complex gesture chains — hover, drag-and-drop, right-click — that WebDriver\'s simple click() cannot handle.','iFrame handling requires driver.switchTo().frame() before interacting with elements inside it, then defaultContent() to return.','Browser alerts (confirm/prompt/simple) must be handled via driver.switchTo().alert() — Selenium blocks all commands until alert is dismissed.','JavascriptExecutor is my escape hatch when Selenium API cannot reach an element — hidden inputs, custom events, readonly fields.','I use Actions.scrollToElement() in Selenium 4 instead of JS scrollIntoView — it is W3C compliant and more reliable.'],
arch:`<svg width="100%" viewBox="0 0 680 160" role="img"><title>Advanced interaction types</title><desc>Five areas: Actions mouse, iframes, alerts, windows, JS executor</desc>
<g class="c-purple"><rect x="10" y="20" width="120" height="80" rx="6" stroke-width="0.5"/><text class="th" x="70" y="48" text-anchor="middle" dominant-baseline="central">Actions</text><text class="ts" x="70" y="68" text-anchor="middle">hover/drag</text><text class="ts" x="70" y="84" text-anchor="middle">right-click</text></g>
<g class="c-teal"><rect x="145" y="20" width="120" height="80" rx="6" stroke-width="0.5"/><text class="th" x="205" y="48" text-anchor="middle" dominant-baseline="central">iFrames</text><text class="ts" x="205" y="68" text-anchor="middle">switchTo</text><text class="ts" x="205" y="84" text-anchor="middle">.frame()</text></g>
<g class="c-amber"><rect x="280" y="20" width="120" height="80" rx="6" stroke-width="0.5"/><text class="th" x="340" y="48" text-anchor="middle" dominant-baseline="central">Alerts</text><text class="ts" x="340" y="68" text-anchor="middle">accept()</text><text class="ts" x="340" y="84" text-anchor="middle">dismiss()</text></g>
<g class="c-coral"><rect x="415" y="20" width="125" height="80" rx="6" stroke-width="0.5"/><text class="th" x="477" y="48" text-anchor="middle" dominant-baseline="central">Windows</text><text class="ts" x="477" y="68" text-anchor="middle">getHandles()</text><text class="ts" x="477" y="84" text-anchor="middle">switchTo()</text></g>
<g class="c-purple"><rect x="555" y="20" width="115" height="80" rx="6" stroke-width="0.5"/><text class="th" x="612" y="48" text-anchor="middle" dominant-baseline="central">JS Executor</text><text class="ts" x="612" y="68" text-anchor="middle">executeScript</text><text class="ts" x="612" y="84" text-anchor="middle">executeAsync</text></g>
<text class="ts" x="340" y="148" text-anchor="middle">Always call actions.perform() — without it nothing executes</text></svg>`,
codes:[
{label:'Actions class',code:`<span class="cl">Actions</span> actions = <span class="kw">new</span> <span class="cl">Actions</span>(driver);

<span class="cm">// Hover over menu to reveal dropdown:</span>
actions.<span class="fn">moveToElement</span>(driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"nav"</span>))).<span class="fn">perform</span>();

<span class="cm">// Right-click (context menu):</span>
actions.<span class="fn">contextClick</span>(element).<span class="fn">perform</span>();

<span class="cm">// Double-click:</span>
actions.<span class="fn">doubleClick</span>(element).<span class="fn">perform</span>();

<span class="cm">// Drag and drop:</span>
actions.<span class="fn">dragAndDrop</span>(source, target).<span class="fn">perform</span>();

<span class="cm">// Keyboard shortcut Ctrl+A:</span>
actions.<span class="fn">keyDown</span>(<span class="cl">Keys</span>.CONTROL).<span class="fn">sendKeys</span>(<span class="str">"a"</span>).<span class="fn">keyUp</span>(<span class="cl">Keys</span>.CONTROL).<span class="fn">perform</span>();`},
{label:'iFrames + Alerts',code:`<span class="cm">// iFrame — switch in, interact, switch out</span>
driver.<span class="fn">switchTo</span>().<span class="fn">frame</span>(<span class="str">"myFrame"</span>);         <span class="cm">// by name</span>
driver.<span class="fn">switchTo</span>().<span class="fn">frame</span>(<span class="num">0</span>);                <span class="cm">// by index</span>
driver.<span class="fn">switchTo</span>().<span class="fn">frame</span>(iframeElement);    <span class="cm">// by WebElement</span>
<span class="cm">// ... interact with elements inside frame ...</span>
driver.<span class="fn">switchTo</span>().<span class="fn">defaultContent</span>();       <span class="cm">// back to main page</span>

<span class="cm">// Alerts</span>
wait.<span class="fn">until</span>(<span class="cl">EC</span>.<span class="fn">alertIsPresent</span>());
<span class="cl">Alert</span> alert = driver.<span class="fn">switchTo</span>().<span class="fn">alert</span>();
String msg = alert.<span class="fn">getText</span>();
alert.<span class="fn">accept</span>();   <span class="cm">// click OK</span>
<span class="cm">// alert.dismiss() → Cancel | alert.sendKeys("txt") → prompt</span>`},
{label:'JS Executor',code:`<span class="cl">JavascriptExecutor</span> js = (<span class="cl">JavascriptExecutor</span>) driver;

<span class="cm">// Scroll to bottom:</span>
js.<span class="fn">executeScript</span>(<span class="str">"window.scrollTo(0, document.body.scrollHeight)"</span>);

<span class="cm">// Click hidden element:</span>
js.<span class="fn">executeScript</span>(<span class="str">"arguments[0].click();"</span>, element);

<span class="cm">// Set value on readonly input:</span>
js.<span class="fn">executeScript</span>(<span class="str">"arguments[0].value='2024-01-01';"</span>, datePicker);

<span class="cm">// Check page load complete:</span>
wait.<span class="fn">until</span>(d -&gt; js.<span class="fn">executeScript</span>(<span class="str">"return document.readyState"</span>).<span class="fn">equals</span>(<span class="str">"complete"</span>));

<span class="cm">// Read localStorage:</span>
String token = (String) js.<span class="fn">executeScript</span>(<span class="str">"return localStorage.getItem('token')"</span>);`}
],
best:['Always call actions.perform() — forgetting it means nothing executes','Switch to defaultContent() after every iFrame interaction to avoid NoSuchElement','Use alertIsPresent() explicit wait before switchTo().alert() to prevent NoAlertPresentException','Use JS click only as last resort — it bypasses visibility checks and is less realistic','keyDown without keyUp leaves modifier held — always balance them'],
qa:[{q:'What happens if you don\'t call driver.switchTo().defaultContent() after an iFrame?',a:'All subsequent findElement calls fail with NoSuchElementException because Selenium still looks inside the iFrame context, not the main page.'},{q:'How do you handle a nested iFrame?',a:'Switch to outer frame first: driver.switchTo().frame("outer"), then switch to inner: driver.switchTo().frame("inner"). Use parentFrame() to go up one level.'},{q:'What is the difference between Actions.click() and element.click()?',a:'element.click() is a direct WebDriver command. Actions.click(element) builds a gesture chain with mouse positioning — useful when combining with hover or keyboard.'},{q:'When would you use JavascriptExecutor.executeAsyncScript?',a:'For async operations: AJAX calls, animation completion, custom promises. Set scriptTimeout first; call the injected callback argument to signal completion.'},{q:'How do you switch between two open browser windows?',a:'Store original handle: String main = driver.getWindowHandle(); open new window; iterate driver.getWindowHandles() and switchTo() the new handle. After done, switchTo(main).'}]
},

{id:8,ph:'i',title:'Selenium exceptions',sub:'NoSuchElement · StaleElement · Timeout · ElementNotInteractable — all types',
wwwwh:['What','Why','When','How','Where'],
spoken:['All Selenium exceptions extend WebDriverException — knowing the hierarchy helps me catch the right exception at the right level.','StaleElementReferenceException tells me the DOM was rebuilt after I held the WebElement reference — I store By, not WebElement.','ElementNotInteractableException means the element is in the DOM but covered, hidden, or still animating — I wait for clickable first.','ElementClickInterceptedException is usually a cookie banner or modal overlay — I dismiss it and retry the click.','In every catch block I take a screenshot before calling driver.quit() — losing the browser state is the biggest debugging challenge.'],

codes:[
{label:'NoSuchElement fix',code:`<span class="cm">// NoSuchElementException — wrong locator or not yet loaded</span>

<span class="cm">// Fix 1: Add explicit wait</span>
WebElement el = wait.<span class="fn">until</span>(<span class="cl">EC</span>.<span class="fn">presenceOfElementLocated</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"data"</span>)));

<span class="cm">// Fix 2: Safe check (no exception thrown)</span>
<span class="kw">boolean</span> exists = !driver.<span class="fn">findElements</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"error"</span>)).isEmpty();

<span class="cm">// Fix 3: Check inside iframe</span>
driver.<span class="fn">switchTo</span>().<span class="fn">frame</span>(<span class="str">"content"</span>);
driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"inner"</span>));

<span class="cm">// Fix 4: Verify locator in DevTools console:</span>
<span class="cm">// $$('#data') — CSS | $x('//input') — XPath</span>`},
{label:'StaleElement fix',code:`<span class="cm">// StaleElementReferenceException — DOM was rebuilt</span>

<span class="cm">// Fix 1: Re-find after DOM change</span>
driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"refresh"</span>)).<span class="fn">click</span>();
wait.<span class="fn">until</span>(<span class="cl">EC</span>.<span class="fn">stalenessOf</span>(oldElement)); <span class="cm">// wait for old to die</span>
WebElement fresh = driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"result"</span>));

<span class="cm">// Fix 2: Store By, not WebElement</span>
By locator = <span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"submit"</span>); <span class="cm">// always re-find when needed</span>
driver.<span class="fn">findElement</span>(locator).<span class="fn">click</span>(); <span class="cm">// fresh every time</span>

<span class="cm">// Fix 3: FluentWait ignoring stale</span>
fluent.<span class="fn">until</span>(d -&gt; { d.<span class="fn">findElement</span>(locator).<span class="fn">click</span>(); <span class="kw">return true</span>; });`},
{label:'Click exceptions',code:`<span class="cm">// ElementNotInteractableException</span>
<span class="cm">// — element hidden, covered, or animating</span>
wait.<span class="fn">until</span>(<span class="cl">EC</span>.<span class="fn">elementToBeClickable</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"btn"</span>))).<span class="fn">click</span>();

<span class="cm">// ElementClickInterceptedException</span>
<span class="cm">// — element blocked by cookie banner / modal</span>
<span class="kw">try</span> {
    element.<span class="fn">click</span>();
} <span class="kw">catch</span> (<span class="cl">ElementClickInterceptedException</span> e) {
    driver.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"cookieOK"</span>)).<span class="fn">click</span>(); <span class="cm">// dismiss</span>
    element.<span class="fn">click</span>(); <span class="cm">// retry</span>
}

<span class="cm">// JS click as last resort:</span>
((<span class="cl">JavascriptExecutor</span>)driver).<span class="fn">executeScript</span>(<span class="str">"arguments[0].click()"</span>, element);`}
],
best:['Store By locators not WebElement references — prevents StaleElementReferenceException on reuse','Always screenshot on exception before driver.quit() — you lose browser state forever after quit','Catch specific exceptions (NoSuchElementException) not broad WebDriverException','ElementClickInterceptedException → find and dismiss the overlay element, then retry','SessionNotCreatedException → update ChromeDriver or let Selenium Manager handle it'],
qa:[{q:'What causes StaleElementReferenceException?',a:'The DOM was modified after you captured the WebElement reference — AJAX update, page navigation, or DOM rebuild. Fix: re-find the element fresh each time it\'s needed.'},{q:'What is the difference between NoSuchElementException and TimeoutException?',a:'NoSuchElementException fires immediately when findElement cannot locate the element. TimeoutException fires after the explicit wait maximum duration expires.'},{q:'How do you safely check if an element exists without try-catch?',a:'boolean exists = !driver.findElements(By.id("el")).isEmpty() — findElements returns an empty list (not exception) when nothing is found.'},{q:'What causes InvalidSelectorException?',a:'Malformed XPath or CSS selector syntax. Example: //div[@class=active] missing quotes. Fix: //div[@class=\'active\']. Test in DevTools console first.'},{q:'When is UnhandledAlertException thrown?',a:'When Selenium tries to perform an action while a browser alert is open. Fix: detect and handle the alert before continuing, or use ExpectedConditions.alertIsPresent() proactively.'}]
},

{id:9,ph:'i',title:'Selenium 4 setup & Sel Manager',sub:'W3C compliance · Options classes · Selenium Manager · Sel4 vs Sel3',
wwwwh:['What','Why','When','How','Where'],
spoken:['Selenium 4 is fully W3C WebDriver compliant — it dropped the legacy JSON Wire Protocol and uses browser-native HTTP APIs.','Selenium Manager auto-downloads the correct browser driver — no more manual System.setProperty or version mismatch frustration.','I switched from DesiredCapabilities to ChromeOptions because Options classes are type-safe and W3C-standard compliant.','New in Selenium 4: CDP support, Relative Locators, newWindow()/newTab(), and a rewritten Selenium Grid 4 with Docker support.','For my team I always start new projects on Selenium 4.21+ with Java 11 — it covers everything Selenium 3 did and more.'],
arch:`<svg width="100%" viewBox="0 0 680 180" role="img"><title>Selenium 3 vs 4 differences</title><desc>Side by side comparison of key changes between versions</desc>
<g class="c-gray"><rect x="20" y="20" width="295" height="140" rx="8" stroke-width="0.5"/><text class="th" x="167" y="44" text-anchor="middle" dominant-baseline="central">Selenium 3</text><text class="ts" x="167" y="66" text-anchor="middle">JSON Wire Protocol</text><text class="ts" x="167" y="84" text-anchor="middle">DesiredCapabilities (legacy)</text><text class="ts" x="167" y="102" text-anchor="middle">Manual driver setup</text><text class="ts" x="167" y="120" text-anchor="middle">No CDP, no newTab()</text><text class="ts" x="167" y="138" text-anchor="middle">Grid 3 (Hub/Node XML)</text></g>
<g class="c-teal"><rect x="365" y="20" width="295" height="140" rx="8" stroke-width="1"/><text class="th" x="512" y="44" text-anchor="middle" dominant-baseline="central">Selenium 4</text><text class="ts" x="512" y="66" text-anchor="middle">W3C WebDriver standard</text><text class="ts" x="512" y="84" text-anchor="middle">Browser Options classes</text><text class="ts" x="512" y="102" text-anchor="middle">Selenium Manager auto-driver</text><text class="ts" x="512" y="120" text-anchor="middle">CDP + newTab() + RelativeLocators</text><text class="ts" x="512" y="138" text-anchor="middle">Grid 4 (Docker/K8s ready)</text></g></svg>`,
codes:[
{label:'Selenium 4 pom + setup',code:`<span class="cm">&lt;!-- pom.xml --&gt;</span>
&lt;dependency&gt;
  &lt;groupId&gt;org.seleniumhq.selenium&lt;/groupId&gt;
  &lt;artifactId&gt;selenium-java&lt;/artifactId&gt;
  &lt;version&gt;<span class="str">4.21.0</span>&lt;/version&gt;
&lt;/dependency&gt;

<span class="cm">// No System.setProperty needed (Selenium 4.6+):</span>
WebDriver driver = <span class="kw">new</span> <span class="cl">ChromeDriver</span>();   <span class="cm">// just works!</span>
WebDriver driver = <span class="kw">new</span> <span class="cl">FirefoxDriver</span>(); <span class="cm">// auto-managed</span>
WebDriver driver = <span class="kw">new</span> <span class="cl">EdgeDriver</span>();    <span class="cm">// auto-managed</span>`},
{label:'Options vs DesiredCapabilities',code:`<span class="cm">// Selenium 3 — DesiredCapabilities (deprecated):</span>
<span class="cl">DesiredCapabilities</span> caps = <span class="kw">new</span> <span class="cl">DesiredCapabilities</span>();
caps.<span class="fn">setBrowserName</span>(<span class="str">"chrome"</span>);
caps.<span class="fn">setCapability</span>(<span class="str">"acceptInsecureCerts"</span>, <span class="kw">true</span>);

<span class="cm">// Selenium 4 — ChromeOptions (W3C, type-safe):</span>
<span class="cl">ChromeOptions</span> opts = <span class="kw">new</span> <span class="cl">ChromeOptions</span>();
opts.<span class="fn">setAcceptInsecureCerts</span>(<span class="kw">true</span>);          <span class="cm">// W3C method</span>
opts.<span class="fn">setPageLoadStrategy</span>(<span class="cl">PageLoadStrategy</span>.EAGER);
opts.<span class="fn">addArguments</span>(<span class="str">"--start-maximized"</span>);
WebDriver driver = <span class="kw">new</span> <span class="cl">ChromeDriver</span>(opts);`},
{label:'W3C capabilities',code:`<span class="cl">ChromeOptions</span> opts = <span class="kw">new</span> <span class="cl">ChromeOptions</span>();

<span class="cm">// W3C standard capabilities:</span>

opts.<span class="fn">setPlatformName</span>(<span class="str">"linux"</span>);

],
best:['Use ChromeOptions/FirefoxOptions — DesiredCapabilities is deprecated in Selenium 4','Selenium Manager is enabled by default in 4.6+ — no configuration needed','PageLoadStrategy.EAGER speeds up tests on heavy pages by not waiting for images','setBrowserVersion("stable") tells Grid to use the latest stable browser on each node','Remove all System.setProperty driver path calls when upgrading to Selenium 4.6+'],
qa:[{q:'What is the key architectural change in Selenium 4?',a:'Full W3C WebDriver protocol compliance, replacing the legacy JSON Wire Protocol. This enables native CDP access and removes dependency on DesiredCapabilities.'},{q:'What is Selenium Manager?',a:'Built-in binary (introduced 4.6) that automatically detects installed browser version and downloads matching driver. Eliminates manual System.setProperty calls.'},{q:'What is PageLoadStrategy?',a:'NORMAL: waits for full page load (default). EAGER: waits for DOMContentLoaded only. NONE: returns immediately after navigation. Use EAGER to speed up heavy pages.'},{q:'How does Selenium 4 Grid differ from Grid 3?',a:'Grid 4 supports Standalone/Hub+Node/Distributed modes, Docker-ready with no XML config, auto-registers nodes, and provides a modern web UI dashboard.'},{q:'What happens if you still use DesiredCapabilities in Selenium 4?',a:'It still works but is deprecated and will be removed. It maps internally to Options classes. Migrate to browser-specific Options for type safety and future compatibility.'}]
},

{id:10,ph:'i',title:'ChromeOptions & browser configs',sub:'addArguments · prefs · experimental · mobile emulation · headless',
wwwwh:['What','Why','When','How','Where'],
spoken:['ChromeOptions is the W3C-compliant way to configure Chrome sessions — addArguments for CLI flags, setExperimentalOption for prefs.','I always add --no-sandbox --disable-dev-shm-usage in every headless CI configuration to prevent Chrome crashes in Docker.','The prefs map inside setExperimentalOption("prefs") controls Chrome profile settings like download directory and notification suppression.','Mobile emulation in ChromeOptions lets me test responsive layouts without needing a real device or Appium setup.','excludeSwitches(["enable-automation"]) removes the "Chrome is controlled by automated software" banner — useful for screenshot-based tests.'],

codes:[

best:['--headless=new (Chrome 112+) matches headed rendering — use instead of legacy --headless','All user preferences go inside a Map passed to setExperimentalOption("prefs", map)','SafariOptions: no headless support — Safari only runs with display on macOS','EdgeOptions inherits most ChromeOptions args — Edge is Chromium-based','Never put sensitive data (passwords) in ChromeOptions args — they appear in process list'],
qa:[{q:'What is --headless=new vs --headless?',a:'--headless=new uses the GPU compositor process, matching headed Chrome rendering. Legacy --headless has different rendering and is deprecated. Always use =new for Chrome 112+.'},{q:'How do you suppress the file download dialog in Chrome?',a:'Set prefs: download.prompt_for_download=false, download.default_directory="/path", inside setExperimentalOption("prefs", prefsMap) in ChromeOptions.'},{q:'How do you run Safari tests?',a:'SafariOptions opts = new SafariOptions(); WebDriver driver = new SafariDriver(opts); — macOS only. Enable: Safari → Develop → Allow Remote Automation. Run: safaridriver --enable once.'},{q:'How do you load a Chrome extension in tests?',a:'opts.addExtensions(new File("/path/to/extension.crx")) — use for testing extension-dependent workflows. Or opts.addArguments("--load-extension=/unpacked/dir").'},{q:'What is PageLoadStrategy.EAGER?',a:'Selenium returns control after DOMContentLoaded fires — before images/stylesheets finish loading. Speeds up tests on heavy pages where you only interact with text/button elements.'}]
},

{id:11,ph:'a',title:'Explicit wait deep-dive',sub:'All ExpectedConditions · compound · URL · text · attribute · custom lambda',
wwwwh:['What','Why','When','How','Where'],
spoken:['Explicit wait is targeted — it applies a specific condition to a specific element for a maximum duration, polling every 500ms.','WebDriverWait in Selenium 4 requires Duration API: Duration.ofSeconds(10) — the int constructor was removed.','I use EC.and() when multiple elements must all be ready simultaneously before proceeding to the next step.','EC.textMatches() with a regex Pattern is my go-to for dynamic text like "Order #12345" where the number changes.','Custom lambda conditions cover everything EC doesn\'t — I return null to retry and non-null to complete the wait.'],
arch:`<svg width="100%" viewBox="0 0 680 160" role="img"><title>ExpectedConditions categories</title><desc>Six category boxes for EC types</desc>
<g class="c-teal"><rect x="10" y="20" width="155" height="60" rx="6" stroke-width="0.5"/><text class="th" x="87" y="44" text-anchor="middle" dominant-baseline="central">Visibility</text><text class="ts" x="87" y="62" text-anchor="middle">presenceOf, visibilityOf</text></g>
<g class="c-teal"><rect x="180" y="20" width="145" height="60" rx="6" stroke-width="0.5"/><text class="th" x="252" y="44" text-anchor="middle" dominant-baseline="central">State</text><text class="ts" x="252" y="62" text-anchor="middle">clickable, selected</text></g>
<g class="c-teal"><rect x="340" y="20" width="145" height="60" rx="6" stroke-width="0.5"/><text class="th" x="412" y="44" text-anchor="middle" dominant-baseline="central">Text</text><text class="ts" x="412" y="62" text-anchor="middle">textToBe, matches</text></g>
<g class="c-amber"><rect x="10" y="95" width="155" height="55" rx="6" stroke-width="0.5"/><text class="th" x="87" y="118" text-anchor="middle" dominant-baseline="central">URL / Title</text><text class="ts" x="87" y="136" text-anchor="middle">urlContains, titleIs</text></g>

<g class="c-purple"><rect x="340" y="95" width="330" height="55" rx="6" stroke-width="0.5"/><text class="th" x="505" y="118" text-anchor="middle" dominant-baseline="central">Compound</text><text class="ts" x="505" y="136" text-anchor="middle">EC.and() · EC.or() · EC.not()</text></g></svg>`,
codes:[
{label:'Visibility ECs',code:`WebDriverWait wait = <span class="kw">new</span> <span class="cl">WebDriverWait</span>(driver, Duration.<span class="fn">ofSeconds</span>(<span class="num">10</span>));

<span class="cm">// presence — in DOM (may be hidden):</span>
wait.<span class="fn">until</span>(<span class="cl">EC</span>.<span class="fn">presenceOfElementLocated</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"el"</span>)));

<span class="cm">// visibility — in DOM AND visible:</span>
wait.<span class="fn">until</span>(<span class="cl">EC</span>.<span class="fn">visibilityOfElementLocated</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"el"</span>)));

<span class="cm">// All elements visible:</span>
wait.<span class="fn">until</span>(<span class="cl">EC</span>.<span class="fn">visibilityOfAllElementsLocatedBy</span>(<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">".row"</span>)));

<span class="cm">// Invisibility (spinner gone):</span>
wait.<span class="fn">until</span>(<span class="cl">EC</span>.<span class="fn">invisibilityOfElementLocated</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"spinner"</span>)));

<span class="cm">// Exact count:</span>
wait.<span class="fn">until</span>(<span class="cl">EC</span>.<span class="fn">numberOfElementsToBe</span>(<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">".item"</span>), <span class="num">5</span>));`},
{label:'State + text ECs',code:`<span class="cm">// Clickable — visible AND enabled:</span>
wait.<span class="fn">until</span>(<span class="cl">EC</span>.<span class="fn">elementToBeClickable</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"submit"</span>))).<span class="fn">click</span>();

<span class="cm">// Staleness — DOM rebuilt after AJAX:</span>
wait.<span class="fn">until</span>(<span class="cl">EC</span>.<span class="fn">stalenessOf</span>(oldTableElement));

<span class="cm">// Text match:</span>
wait.<span class="fn">until</span>(<span class="cl">EC</span>.<span class="fn">textToBePresentInElement</span>(el, <span class="str">"Success"</span>));

<span class="cm">// Regex text match:</span>
wait.<span class="fn">until</span>(<span class="cl">EC</span>.<span class="fn">textMatches</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"order"</span>), Pattern.<span class="fn">compile</span>(<span class="str">"Order #\\d+"</span>)));

<span class="cm">// Attribute contains:</span>
wait.<span class="fn">until</span>(<span class="cl">EC</span>.<span class="fn">attributeContains</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"btn"</span>), <span class="str">"class"</span>, <span class="str">"active"</span>));`},
{label:'Compound + custom',code:`<span class="cm">// AND — all conditions pass together:</span>
wait.<span class="fn">until</span>(<span class="cl">EC</span>.<span class="fn">and</span>(
    <span class="cl">EC</span>.<span class="fn">visibilityOfElementLocated</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"header"</span>)),
    <span class="cl">EC</span>.<span class="fn">elementToBeClickable</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"submit"</span>))
));

<span class="cm">// OR — either condition passes:</span>
wait.<span class="fn">until</span>(<span class="cl">EC</span>.<span class="fn">or</span>(
    <span class="cl">EC</span>.<span class="fn">visibilityOfElementLocated</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"success"</span>)),
    <span class="cl">EC</span>.<span class="fn">visibilityOfElementLocated</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"error"</span>))
));

<span class="cm">// Custom lambda — return null to retry:</span>
wait.<span class="fn">until</span>(d -&gt; {
    List&lt;WebElement&gt; rows = d.<span class="fn">findElements</span>(<span class="cl">By</span>.<span class="fn">cssSelector</span>(<span class="str">"tr"</span>));
    <span class="kw">return</span> rows.size() &gt;= <span class="num">10</span> ? rows : <span class="kw">null</span>;
});`}
],
best:['Duration.ofSeconds() is mandatory in Selenium 4 — the int constructor is removed','elementToBeClickable is the safest precondition before any click — combines visible + enabled','EC.textMatches() with regex handles dynamic text like order numbers and timestamps','EC.not(EC.visibilityOf(spinner)) is equivalent to invisibilityOf — choose the most readable','frameToBeAvailableAndSwitchToIt combines wait and switch in one call'],
qa:[{q:'What is the new WebDriverWait constructor in Selenium 4?',a:'new WebDriverWait(driver, Duration.ofSeconds(10)) — uses java.time.Duration. Optional third arg: Duration.ofMillis(500) for custom polling interval.'},{q:'How do EC.and() and EC.or() work?',a:'EC.and() returns true only when ALL conditions are true. EC.or() returns true when ANY condition is true. Both accept varargs ExpectedCondition arguments.'},{q:'What does EC.textMatches() do differently from textToBePresentInElement?',a:'textToBePresentInElement does a substring match. textMatches() uses a java.util.regex.Pattern for full regex matching — useful for dynamic content like "Order #\\d+".'},{q:'When should you use EC.stalenessOf?',a:'After triggering a page refresh or AJAX table reload. stalenessOf waits for the OLD element reference to detach from DOM, then you re-find the fresh element.'},{q:'What is EC.frameToBeAvailableAndSwitchToIt?',a:'It waits until the iFrame is present in DOM and automatically switches into it — combining the wait and switchTo().frame() into a single call.'}]
},

{id:12,ph:'a',title:'FluentWait all scenarios',sub:'Polling · ignoring exceptions · custom conditions · file download wait',
wwwwh:['What','Why','When','How','Where'],
spoken:['FluentWait is the parent class of WebDriverWait — it exposes every knob: timeout, polling interval, ignored exceptions, and failure message.','I use FluentWait when elements have long or irregular load times — poll every 3s for 60s instead of every 500ms for 10s.','Returning null from the FluentWait lambda continues polling; returning any non-null value completes the wait and returns it.','FluentWait works with any type T — I use FluentWait<File> to wait for a downloaded file to appear on disk.','withMessage() on FluentWait saves hours of debugging — it appears in the TimeoutException message along with the stack trace.'],
arch:`<svg width="100%" viewBox="0 0 680 140" role="img"><title>FluentWait configuration options</title><desc>Four config axes: timeout, polling, ignored exceptions, message</desc><defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-purple"><rect x="240" y="10" width="200" height="36" rx="8" stroke-width="0.5"/><text class="th" x="340" y="32" text-anchor="middle" dominant-baseline="central">FluentWait configuration</text></g>
<line x1="260" y1="46" x2="100" y2="90" stroke="var(--color-text-tertiary)" stroke-width="0.5" marker-end="url(#ar)"/>
<line x1="310" y1="46" x2="255" y2="90" stroke="var(--color-text-tertiary)" stroke-width="0.5" marker-end="url(#ar)"/>
<line x1="390" y1="46" x2="445" y2="90" stroke="var(--color-text-tertiary)" stroke-width="0.5" marker-end="url(#ar)"/>
<line x1="440" y1="46" x2="590" y2="90" stroke="var(--color-text-tertiary)" stroke-width="0.5" marker-end="url(#ar)"/>
<g class="c-teal"><rect x="20" y="90" width="160" height="36" rx="6" stroke-width="0.5"/><text class="ts" x="100" y="112" text-anchor="middle" dominant-baseline="central">.withTimeout(Duration)</text></g>
<g class="c-teal"><rect x="190" y="90" width="140" height="36" rx="6" stroke-width="0.5"/><text class="ts" x="260" y="112" text-anchor="middle" dominant-baseline="central">.pollingEvery(Duration)</text></g>
<g class="c-amber"><rect x="340" y="90" width="130" height="36" rx="6" stroke-width="0.5"/><text class="ts" x="405" y="112" text-anchor="middle" dominant-baseline="central">.ignoring(Exception)</text></g>
<g class="c-amber"><rect x="480" y="90" width="180" height="36" rx="6" stroke-width="0.5"/><text class="ts" x="570" y="112" text-anchor="middle" dominant-baseline="central">.withMessage(String)</text></g></svg>`,
codes:[
{label:'Full FluentWait config',code:`Wait&lt;WebDriver&gt; fw = <span class="kw">new</span> <span class="cl">FluentWait</span>&lt;&gt;(driver)
    .<span class="fn">withTimeout</span>(Duration.<span class="fn">ofSeconds</span>(<span class="num">30</span>))
    .<span class="fn">pollingEvery</span>(Duration.<span class="fn">ofSeconds</span>(<span class="num">2</span>))
    .<span class="fn">ignoring</span>(<span class="cl">NoSuchElementException</span>.<span class="kw">class</span>)
    .<span class="fn">ignoring</span>(<span class="cl">StaleElementReferenceException</span>.<span class="kw">class</span>)
    .<span class="fn">withMessage</span>(<span class="str">"Element not found after 30 seconds"</span>);

WebElement el = fw.<span class="fn">until</span>(d -&gt;
    d.<span class="fn">findElement</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"dynResult"</span>)));

<span class="cm">// Or use with ExpectedConditions:</span>
fw.<span class="fn">until</span>(<span class="cl">EC</span>.<span class="fn">elementToBeClickable</span>(<span class="cl">By</span>.<span class="fn">id</span>(<span class="str">"submit"</span>)));`},
{label:'File download wait',code:`<span class="cm">// FluentWait works with ANY type T, not just WebDriver</span>
<span class="cl">FluentWait</span>&lt;File&gt; fileWait = <span class="kw">new</span> <span class="cl">FluentWait</span>&lt;&gt;(<span class="kw">new</span> <span class="cl">File</span>(<span class="str">"/downloads"</span>))
    .<span class="fn">withTimeout</span>(Duration.<span class="fn">ofSeconds</span>(<span class="num">60</span>))
    .<span class="fn">pollingEvery</span>(Duration.<span class="fn">ofSeconds</span>(<span class="num">3</span>))
    .<span class="fn">withMessage</span>(<span class="str">"PDF not downloaded in 60s"</span>);

fileWait.<span class="fn">until</span>(dir -&gt; {
    File[] pdfs = dir.<span class="fn">listFiles</span>(f -&gt; f.<span class="fn">getName</span>().<span class="fn">endsWith</span>(<span class="str">".pdf"</span>));
    <span class="kw">return</span> pdfs != <span class="kw">null</span> &amp;&amp; pdfs.length &gt; <span class="num">0</span>;
});`},
{label:'Resilient click utility',code:`<span class="cm">// Utility: resilient click that retries through DOM rebuilds</span>
<span class="kw">public void</span> <span class="fn">resilientClick</span>(By locator) {
    <span class="kw">new</span> <span class="cl">FluentWait</span>&lt;&gt;(driver)
        .<span class="fn">withTimeout</span>(Duration.<span class="fn">ofSeconds</span>(<span class="num">20</span>))
        .<span class="fn">pollingEvery</span>(Duration.<span class="fn">ofMillis</span>(<span class="num">500</span>))
        .<span class="fn">ignoring</span>(<span class="cl">NoSuchElementException</span>.<span class="kw">class</span>)
        .<span class="fn">ignoring</span>(<span class="cl">StaleElementReferenceException</span>.<span class="kw">class</span>)
        .<span class="fn">ignoring</span>(<span class="cl">ElementNotInteractableException</span>.<span class="kw">class</span>)
        .<span class="fn">until</span>(d -&gt; {
            d.<span class="fn">findElement</span>(locator).<span class="fn">click</span>();
            <span class="kw">return true</span>; <span class="cm">// non-null = done</span>
        });
}`}
],
best:['Return null (not false) from lambda to continue polling — false is a valid non-null result','pollingEvery should be roughly 1/10th of withTimeout for efficient polling','Chain multiple .ignoring() calls for maximum resilience against DOM rebuilds','withMessage() is non-optional in production — always set a meaningful failure description','FluentWait<T> works for any T — use for API polling, file system, database row checks'],
qa:[{q:'What is the inheritance relationship between FluentWait and WebDriverWait?',a:'WebDriverWait extends FluentWait<WebDriver>. It preconfigures 500ms polling and ignores NotFoundException. FluentWait is the general-purpose configurable base.'},{q:'What happens when FluentWait lambda returns null?',a:'Polling continues. FluentWait retries the lambda after the polling interval. Only a non-null return value or a TimeoutException ends the wait.'},{q:'How is FluentWait different from WebDriverWait in polling?',a:'WebDriverWait polls every 500ms. FluentWait allows any polling interval via pollingEvery(Duration). Use FluentWait when 500ms polling is too aggressive or too slow.'},{q:'Can FluentWait wait for a non-Selenium condition?',a:'Yes — FluentWait<T> is generic. FluentWait<File> waits for a file, FluentWait<String> for an API response. The type parameter can be anything.'},{q:'What is the default polling interval for FluentWait?',a:'500 milliseconds — same as WebDriverWait since WebDriverWait extends FluentWait. Always explicitly set pollingEvery() when creating FluentWait directly.'}]
},

{id:13,ph:'a',title:'Actions class deep-dive',sub:'Scroll (Sel 4) · drag-drop · keyboard combos · canvas drawing · sliders',
wwwwh:['What','Why','When','How','Where'],
spoken:['The Actions class builds composite gesture chains — mouse + keyboard + scroll — that execute atomically via perform().','Selenium 4 added native scroll methods to Actions: scrollToElement, scrollByAmount, scrollFromOrigin — all W3C compliant.','For drag-and-drop failures I use clickAndHold + pause(500ms) + moveToElement + release — the pause gives the app time to register the drag.','Multiple modifier keys work by chaining keyDown calls: keyDown(CTRL) + keyDown(SHIFT) + click() for multi-select.','I draw on canvas elements using clickAndHold, moveByOffset chains — useful for testing drawing/whiteboard applications.'],
arch:`<svg width="100%" viewBox="0 0 680 140" role="img"><title>Actions method groups</title><desc>Three columns: mouse, keyboard, scroll</desc>
<g class="c-teal"><rect x="10" y="20" width="200" height="110" rx="8" stroke-width="0.5"/><text class="th" x="110" y="44" text-anchor="middle" dominant-baseline="central">Mouse actions</text><text class="ts" x="110" y="64" text-anchor="middle">click / doubleClick / contextClick</text><text class="ts" x="110" y="82" text-anchor="middle">moveToElement / clickAndHold</text><text class="ts" x="110" y="100" text-anchor="middle">dragAndDrop / release</text></g>
