  concepts:[
    {title:"Selenium 3 vs 4 — What changes?", body:`<pre><code class="language-java">// Selenium 3 — what we use in this course
// Uses W3C WebDriver protocol (from Selenium 3.8+)
// Driver setup: manual DesiredCapabilities or System.setProperty
WebDriver driver = new ChromeDriver();

// Selenium 4 adds: Relative Locators, CDP, new DevTools API
// Selenium 3 is still widely used in enterprise projects</code></pre>`},
    {title:"The 4 Selenium components — quick map", body:`<pre><code class="language-java">// 1. IDE  — browser extension for quick record/replay (NOT for framework)
// 2. RC   — legacy, uses JavaScript injection (AVOID, deprecated)
// 3. WebDriver — direct browser control via native OS calls (USE THIS)
// 4. Grid — Hub + Nodes for running tests on multiple machines

// Interview tip: WebDriver communicates via JSON Wire Protocol (Sel3)</code></pre>`},
    {title:"What can Selenium automate?", body:`<pre><code class="language-java">// Selenium can automate:
driver.get("https://example.com");              // Navigate to URL
driver.findElement(By.id("username")).sendKeys("admin"); // Type text
driver.findElement(By.id("submit")).click();       // Click button
driver.getTitle();                               // Get page title
driver.getCurrentUrl();                          // Get current URL
// Selenium CANNOT automate: desktop apps, CAPTCHAs, file uploads (OS-level)</code></pre>`},
    {title:"Who uses Selenium in real projects?", body:`<pre><code class="language-java">// Selenium fits into QA workflow as:
// ┌─────────────────────────────────────────────┐
// │  Test Design → Selenium Script → Browser    │
// │  Results  ←  Reporting ←  Test Runner       │
// └─────────────────────────────────────────────┘
// Real companies: Amazon, Google, Netflix, banks all use Selenium
// Role: SDET / QA Automation Engineer writes + maintains Selenium tests</code></pre>`}

},
{

    {q:"How does Selenium WebDriver work internally?", a:"Your Java code calls the Selenium Client Library, which sends HTTP requests (JSON Wire Protocol) to the Browser Driver (e.g. ChromeDriver), which translates them into native browser commands."},

  </svg>`,
  concepts:[
    {title:"Architecture layers — code view", body:`<pre><code class="language-java">// Layer 1: Your test code (uses WebDriver interface)
WebDriver driver = new ChromeDriver(); // Layer 2: Client lib creates driver

// Layer 3: Behind the scenes — selenium sends HTTP to ChromeDriver:

// {"capabilities": {"browserName": "chrome"}}

// Layer 4: ChromeDriver starts Chrome and returns session ID

// POST http://localhost:9515/session/{id}/url
// {"url": "https://google.com"}</code></pre>`},
    {title:"WebDriver interface — the contract", body:`<pre><code class="language-java">// WebDriver is a Java interface — the design pattern is:
// Interface: WebDriver (defines the contract/API)
// Implementations: ChromeDriver, FirefoxDriver, EdgeDriver, SafariDriver

WebDriver driver;           // declare as interface type (BEST PRACTICE)
driver = new ChromeDriver(); // assign concrete implementation

// Why? Switching browsers = change only 1 line:
driver = new FirefoxDriver(); // no other code changes needed!</code></pre>`},

// IEDriver      → Internet Explorer (deprecated)

    {title:"Selenium Grid architecture (bonus)", body:`<pre><code class="language-java">// Selenium Grid adds a Hub + Nodes layer on top of WebDriver:
// Your Test → Hub (central router) → Node 1 (Chrome on Windows)
                                // → Node 2 (Firefox on Linux)
                                // → Node 3 (Safari on macOS)

// Hub is the master that distributes tests to Nodes
// Node registers its capabilities with the Hub
// Use RemoteWebDriver to target Grid:
WebDriver driver = new RemoteWebDriver(hubUrl, capabilities);</code></pre>`}

  ],

    {title:"pom.xml — essential Selenium 3 dependency", body:`<pre><code class="language-java">&lt;!-- Add to pom.xml --&gt;
&lt;dependencies&gt;
  &lt;dependency&gt;
    &lt;groupId&gt;org.seleniumhq.selenium&lt;/groupId&gt;
    &lt;artifactId&gt;selenium-java&lt;/artifactId&gt;
    &lt;version&gt;3.141.59&lt;/version&gt; &lt;!-- latest Selenium 3 --&gt;
  &lt;/dependency&gt;
&lt;/dependencies&gt;

// selenium-java pulls in ALL browser drivers + support libs
// Single dependency = everything you need for Selenium 3</code></pre>`},
    {title:"Driver setup — Windows / Linux / macOS", body:`<pre><code class="language-java">// OPTION A: System.setProperty (explicit path, works everywhere)

// Windows:
System.setProperty("webdriver.chrome.driver", "C:\\drivers\\chromedriver.exe");

// Linux / macOS:
System.setProperty("webdriver.chrome.driver", "/usr/local/bin/chromedriver");

// OPTION B: Add driver to system PATH (no code change needed)
// Windows: Edit Environment Variables → PATH → add C:\drivers\
// Linux/Mac: export PATH=$PATH:/usr/local/bin in ~/.bashrc

WebDriver driver = new ChromeDriver();</code></pre>`},
    {title:"Firefox / Edge / Safari setup", body:`<pre><code class="language-java">// Firefox — needs GeckoDriver
System.setProperty("webdriver.gecko.driver", "/path/to/geckodriver");
WebDriver driver = new FirefoxDriver();

// Edge — needs EdgeDriver (matches Edge browser version)
System.setProperty("webdriver.edge.driver", "path/to/msedgedriver.exe");
WebDriver driver = new EdgeDriver();

// Safari — built-in driver on macOS (enable in Safari → Preferences)
// Safari → Develop → Allow Remote Automation
WebDriver driver = new SafariDriver(); // no setProperty needed</code></pre>`},
    {title:"Linux headless setup (CI/CD)", body:`<pre><code class="language-java">// Linux servers have no display — run Chrome headless
ChromeOptions options = new ChromeOptions();
options.addArguments("--headless");
options.addArguments("--no-sandbox");         // required in Docker
options.addArguments("--disable-dev-shm-usage"); // prevents crashes
options.addArguments("--window-size=1920,1080"); // set viewport

WebDriver driver = new ChromeDriver(options);

// Firefox headless:
FirefoxOptions ffOpts = new FirefoxOptions();
ffOpts.setHeadless(true);
WebDriver driver = new FirefoxDriver(ffOpts);</code></pre>`}

    {q:"What is the WebDriver class hierarchy?", a:"WebDriver is an interface. RemoteWebDriver implements it. ChromeDriver, FirefoxDriver, EdgeDriver all extend RemoteWebDriver — so they inherit both WebDriver behavior and remote communication capabilities."},
    {q:"Why does ChromeDriver extend RemoteWebDriver?", a:"RemoteWebDriver handles all the HTTP communication with the browser driver server. Extending it means ChromeDriver gets that infrastructure for free and only needs to define Chrome-specific configurations."},
    {q:"What is the difference between WebDriver and RemoteWebDriver?", a:"WebDriver is a pure interface (contract). RemoteWebDriver is its concrete implementation that handles the actual JSON Wire Protocol communication — all browser-specific drivers extend RemoteWebDriver."}

  concepts:[
    {title:"WebDriver interface — all available methods", body:`<pre><code class="language-java">// WebDriver interface defines these core methods:
driver.get(String url)           // navigate to URL
driver.getCurrentUrl()           // get current URL string
driver.getTitle()                // get page &lt;title&gt;
driver.findElement(By by)        // find single element
driver.findElements(By by)       // find list of elements
driver.getPageSource()           // get HTML of page
driver.close()                   // close current tab
driver.quit()                    // close ALL windows + kill driver
driver.getWindowHandle()         // current window handle
driver.getWindowHandles()        // all open window handles
driver.switchTo()                // switch to frame/alert/window
driver.navigate()                // browser back/forward/refresh
driver.manage()                  // timeouts, cookies, window size</code></pre>`},
    {title:"WebDriver sub-interfaces inside driver", body:`<pre><code class="language-java">// driver.navigate() returns WebDriver.Navigation:
driver.navigate().to("https://example.com");
driver.navigate().back();
driver.navigate().forward();
driver.navigate().refresh();

// driver.manage() returns WebDriver.Options:
driver.manage().window().maximize();
driver.manage().timeouts().implicitlyWait(10, TimeUnit.SECONDS);
driver.manage().deleteAllCookies();
driver.manage().getCookies();

// driver.switchTo() returns WebDriver.TargetLocator:
driver.switchTo().frame("frameName");
driver.switchTo().alert().accept();
driver.switchTo().window(handle);</code></pre>`},
    {title:"Casting to browser-specific driver", body:`<pre><code class="language-java">// Sometimes you need browser-specific features
// Cast WebDriver to ChromeDriver for Chrome-specific API:
WebDriver driver = new ChromeDriver();

// ChromeDriver has extra capabilities from HasCapabilities:
ChromeDriver chrome = (ChromeDriver) driver;
chrome.executeCdpCommand("Network.enable", params); // Chrome DevTools

// JavascriptExecutor — cast to run JS in browser:
JavascriptExecutor js = (JavascriptExecutor) driver;
js.executeScript("window.scrollTo(0, document.body.scrollHeight)");
js.executeScript("arguments[0].click();", element); // JS click</code></pre>`},
    {title:"RemoteWebDriver — for Selenium Grid", body:`<pre><code class="language-java">// RemoteWebDriver connects to a remote Grid Hub
URL hubUrl = new URL("http://hub-server:4444/wd/hub");

DesiredCapabilities caps = new DesiredCapabilities();
caps.setBrowserName("chrome");
caps.setPlatform(Platform.LINUX);

WebDriver driver = new RemoteWebDriver(hubUrl, caps);

// Or with ChromeOptions (more modern approach in Selenium 3):
ChromeOptions opts = new ChromeOptions();
opts.setCapability("platformName", "linux");
WebDriver driver = new RemoteWebDriver(hubUrl, opts);</code></pre>`}
  ],
  mistakes:[
    {bad:"WebDriver driver = new ChromeDriver(); — declaring as concrete type everywhere",good:"Always declare as WebDriver driver; for browser-agnostic code. Cast only when you specifically need browser-specific APIs"},
    {bad:"Calling driver.close() at end of test and assuming cleanup is done",good:"Use driver.quit() to kill the entire browser process. driver.close() only closes the current tab — leaving background ChromeDriver processes running"}

  oneliners:[
    {q:"What is a locator in Selenium?", a:"A locator is a strategy used by Selenium to uniquely identify a web element in the DOM — similar to giving GPS coordinates to find a specific building in a city."},
    {q:"Which locator is the fastest and most reliable?", a:"By.id is the fastest (direct DOM lookup, O(1)). By.cssSelector is next best for performance and readability. By.xpath is the most powerful but slowest — use it only when CSS can't cover the use case."},
    {q:"What is XPath? Give 2 types.", a:"XPath is a query language for XML/HTML. Absolute XPath starts from root (/html/body/div...) — brittle. Relative XPath starts with // and searches anywhere in DOM (//*[@id='btn']) — use this always."}
  ],
  diagram:`<svg width="100%" viewBox="0 0 680 310" role="img"><title>Selenium locator priority guide</title><desc>Shows locator strategies ranked by reliability and speed from most preferred to least preferred</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  </svg>`,
  concepts:[
    {title:"All locator types — syntax reference", body:`<pre><code class="language-java">// By.id — use when element has unique id attribute
driver.findElement(By.id("loginBtn"));

// By.name — HTML name attribute
driver.findElement(By.name("username"));

// By.className — use single class, not compound
driver.findElement(By.className("primary-btn"));

// By.tagName — use to get all elements of a type
driver.findElements(By.tagName("a")); // all links

// By.linkText — exact text match of anchor tag
driver.findElement(By.linkText("Sign In"));

// By.partialLinkText — partial text match
driver.findElement(By.partialLinkText("Sign"));</code></pre>`},
    {title:"By.cssSelector — full syntax guide", body:`<pre><code class="language-java">// Tag selector
By.cssSelector("input")

// ID selector (# prefix)
By.cssSelector("#loginBtn")

// Class selector (. prefix)
By.cssSelector(".primary-btn")

// Attribute selector
By.cssSelector("input[type='submit']")
By.cssSelector("input[placeholder='Enter email']")

// Partial attribute match
By.cssSelector("input[id*='user']")  // contains 'user'
By.cssSelector("input[id^='log']")   // starts with 'log'
By.cssSelector("input[id$='name']")  // ends with 'name'

// Parent → child
By.cssSelector("div.form > input#email")</code></pre>`},
    {title:"By.xpath — relative xpath patterns", body:`<pre><code class="language-java">// ALWAYS use relative XPath (starts with //)
// NEVER use absolute XPath (/html/body/div[1]/input)

// Attribute match
By.xpath("//*[@id='loginBtn']")
By.xpath("//input[@type='submit']")

// Text match
By.xpath("//button[text()='Sign In']")
By.xpath("//button[contains(text(),'Sign')]")

// Parent-child navigation
By.xpath("//div[@class='form']//input[@name='email']")

// XPath axes — navigate DOM relations
By.xpath("//label[text()='Email']/following-sibling::input")
By.xpath("//input[@id='email']/parent::div")
By.xpath("//table/tbody/tr[2]/td[3]") // row 2, col 3</code></pre>`},
    {title:"findElement vs findElements", body:`<pre><code class="language-java">// findElement — returns SINGLE WebElement, throws NoSuchElementException if not found
WebElement loginBtn = driver.findElement(By.id("loginBtn"));

// findElements — returns List&lt;WebElement&gt;, returns EMPTY LIST if not found (no exception)
List&lt;WebElement&gt; allLinks = driver.findElements(By.tagName("a"));
System.out.println("Total links: " + allLinks.size());

// Best practice: use findElements to CHECK if element exists:
boolean isPresent = !driver.findElements(By.id("errorMsg")).isEmpty();

// Iterate all matching elements:
for (WebElement link : allLinks) {
    System.out.println(link.getText());
}</code></pre>`}
  ],
  mistakes:[
    {bad:"//div[1]/form/input[2] — absolute or positional XPath",good:"Use attribute-based XPath: //input[@id='email'] — positional XPaths break when UI changes"},
    {bad:"By.className(\"btn primary active\") — multiple classes",good:"Multiple classes throw InvalidSelectorException. Use cssSelector: By.cssSelector(\".btn.primary.active\") or XPath contains()"}
  ],
  checklist:["Prefer id > name > cssSelector > xpath in that order","Never use absolute XPath — always use relative XPath starting with //","findElements() never throws exception — returns empty list if nothing found","CSS attribute selectors: *= contains, ^= starts-with, $= ends-with","Verify your XPath/CSS in browser DevTools console: $x('//input') or $$('.btn')"]
},

  id:6, badge:"WebElement", bClass:"b3",

    {q:"What is a WebElement?", a:"WebElement is a Selenium interface representing a single HTML element in the DOM — like a button, input field, or link. It provides methods to interact with or read properties of that element."},

  concepts:[
    {title:"Core interactions — click, type, clear", body:`<pre><code class="language-java">WebElement username = driver.findElement(By.id("username"));
WebElement password = driver.findElement(By.id("password"));
WebElement loginBtn = driver.findElement(By.id("loginBtn"));

// Type into input field (clear first to avoid appending)
username.clear();
username.sendKeys("admin@test.com");

// Send special keys (Tab, Enter, Ctrl+A etc.)
username.sendKeys(Keys.TAB);         // move to next field
username.sendKeys(Keys.CONTROL, "a"); // select all text

password.clear();
password.sendKeys("Secret123");

// Click button
loginBtn.click();

// Or submit the form containing the element
username.submit();</code></pre>`},
    {title:"State verification — assertions in tests", body:`<pre><code class="language-java">WebElement submitBtn = driver.findElement(By.id("submit"));
WebElement errorMsg  = driver.findElement(By.id("error"));
WebElement agreeBox  = driver.findElement(By.id("agree"));

// Check element is visible on screen
boolean visible  = submitBtn.isDisplayed(); // true/false

// Check button is clickable (not disabled)
boolean enabled  = submitBtn.isEnabled();   // false if disabled=""

// Check checkbox/radio is checked
boolean selected = agreeBox.isSelected();   // true if checked

// Common assertion pattern:
if (!submitBtn.isEnabled()) {
    System.out.println("FAIL: Submit button is disabled!");
}</code></pre>`},
    {title:"Reading text and attributes", body:`<pre><code class="language-java">WebElement heading = driver.findElement(By.tagName("h1"));
WebElement inputEl = driver.findElement(By.id("email"));
WebElement anchor  = driver.findElement(By.linkText("Home"));

// getText() — visible text content between tags
String pageTitle = heading.getText(); // "Welcome to Dashboard"

// getAttribute() — HTML attribute value
String placeholder = inputEl.getAttribute("placeholder"); // "Enter email"
String currentVal  = inputEl.getAttribute("value");       // typed value
String href        = anchor.getAttribute("href");          // URL
String classes     = inputEl.getAttribute("class");        // CSS classes

// getCssValue() — computed CSS property
String color  = heading.getCssValue("color");        // rgba(0, 0, 0, 1)
String display = inputEl.getCssValue("display");     // block/none/inline</code></pre>`},
    {title:"Working with dropdowns — Select class", body:`<pre><code class="language-java">// For native HTML &lt;select&gt; dropdowns, use the Select helper class

  oneliners:[
    {q:"What is the difference between implicit and explicit wait?", a:"Implicit wait is a global setting that makes all findElement calls wait up to N seconds — set once, applies everywhere. Explicit wait is targeted — it waits for a SPECIFIC condition on a SPECIFIC element, only when you call it."},
    {q:"Why is Thread.sleep bad in Selenium tests?", a:"Thread.sleep is a fixed wait — it always waits the full N milliseconds regardless of whether the element appeared in 0.5 seconds. This makes tests slower than needed and still brittle if the page takes longer than expected."},
    {q:"What is FluentWait?", a:"FluentWait is the most customizable wait — you can set max wait time, polling frequency (how often to check), and exceptions to ignore during polling. WebDriverWait is built on top of FluentWait with default settings."}
  ],

  concepts:[
    {title:"Implicit Wait — global setting", body:`<pre><code class="language-java">// Set ONCE after driver creation — applies to ALL findElement calls
WebDriver driver = new ChromeDriver();
driver.manage().timeouts().implicitlyWait(10, TimeUnit.SECONDS);

// Now every findElement will poll for up to 10 seconds before throwing
WebElement btn = driver.findElement(By.id("submit"));
// If not found immediately → waits → retries → eventually throws

// WARNING: Do NOT mix implicit + explicit wait in same script
// They interact unexpectedly and cause random test failures
// Rule: Use ONE type per project</code></pre>`},
    {title:"Explicit Wait — WebDriverWait + ExpectedConditions", body:`<pre><code class="language-java">import org.openqa.selenium.support.ui.WebDriverWait;
import org.openqa.selenium.support.ui.ExpectedConditions;

WebDriverWait wait = new WebDriverWait(driver, 10); // max 10s

// Wait for element to be visible on screen:
WebElement el = wait.until(
    ExpectedConditions.visibilityOfElementLocated(By.id("message"))
);

// Wait for element to be clickable (visible + enabled):
WebElement btn = wait.until(
    ExpectedConditions.elementToBeClickable(By.id("submit"))
);

// Wait for text to appear in element:
wait.until(ExpectedConditions.textToBePresentInElement(el, "Success"));

// Wait for URL to contain a string:
wait.until(ExpectedConditions.urlContains("dashboard"));</code></pre>`},
    {title:"FluentWait — maximum control", body:`<pre><code class="language-java">import org.openqa.selenium.support.ui.FluentWait;
import java.time.Duration;

// FluentWait: set max time + poll frequency + ignored exceptions
Wait&lt;WebDriver&gt; fluentWait = new FluentWait&lt;&gt;(driver)
    .withTimeout(Duration.ofSeconds(30))       // max wait
    .pollingEvery(Duration.ofMillis(500))      // check every 500ms
    .ignoring(NoSuchElementException.class);   // don't fail if not found yet

WebElement element = fluentWait.until(d -&gt;
    d.findElement(By.id("dynamicContent"))
);

// Use FluentWait for: slow-loading elements, AJAX-heavy pages,
// or when you need custom polling logic</code></pre>`},
    {title:"Common ExpectedConditions — cheat sheet", body:`<pre><code class="language-java">// Presence — element is in DOM (may not be visible)
ExpectedConditions.presenceOfElementLocated(By.id("el"))

// Visibility — element in DOM AND visible on screen
ExpectedConditions.visibilityOfElementLocated(By.id("el"))

// Clickable — visible + not disabled
ExpectedConditions.elementToBeClickable(By.id("btn"))

// Invisibility — wait for element to disappear (e.g. spinner)
ExpectedConditions.invisibilityOfElementLocated(By.id("spinner"))

// Alert is present
ExpectedConditions.alertIsPresent()

// Number of windows
ExpectedConditions.numberOfWindowsToBe(2)

// Page title
ExpectedConditions.titleContains("Dashboard")</code></pre>`}
  ],
  mistakes:[
    {bad:"Thread.sleep(5000) everywhere to handle page loads",good:"Use explicit wait with ExpectedConditions.visibilityOfElementLocated — tests run faster and adapt to actual load time"},
    {bad:"Mixing implicit wait AND explicit wait in the same test",good:"Never mix both — use only explicit waits (WebDriverWait) in your framework for predictable, controllable behavior"}
  ],
  checklist:["Never use Thread.sleep — use explicit waits","Set implicit wait ONCE after driver init if you choose to use it","Don't mix implicit + explicit waits in same framework","FluentWait gives most control: polling interval + exception ignoring","Always use elementToBeClickable before clicking — not just visibilityOf"]

  concepts:[
    {title:"Actions class — hover, drag, double-click", body:`<pre><code class="language-java">import org.openqa.selenium.interactions.Actions;
Actions actions = new Actions(driver);

// Hover (mouse over) — triggers CSS :hover effects, dropdown menus
WebElement menu = driver.findElement(By.id("navMenu"));
actions.moveToElement(menu).perform();

// Right-click (context click)
actions.contextClick(menu).perform();

// Double-click
actions.doubleClick(driver.findElement(By.id("editBtn"))).perform();

// Drag and drop
WebElement source = driver.findElement(By.id("draggable"));
WebElement target = driver.findElement(By.id("droppable"));
actions.dragAndDrop(source, target).perform();

// Keyboard shortcut — Ctrl+A, Ctrl+C
actions.keyDown(Keys.CONTROL).sendKeys("a").keyUp(Keys.CONTROL).perform();</code></pre>`},
    {title:"iFrames — switching in and out", body:`<pre><code class="language-java">// Switch by name or id attribute of iframe tag
driver.switchTo().frame("myFrameName");

// Switch by index (0-based)
driver.switchTo().frame(0);

// Switch by WebElement reference
WebElement iframeEl = driver.findElement(By.tagName("iframe"));
driver.switchTo().frame(iframeEl);

// Now interact with elements INSIDE the iFrame:
driver.findElement(By.id("iframeInput")).sendKeys("hello");

// Switch back to main page:
driver.switchTo().defaultContent();

// Nested iframes — switch to parent frame (one level up):
driver.switchTo().parentFrame();</code></pre>`},
    {title:"Browser alerts — confirm, prompt, simple", body:`<pre><code class="language-java">import org.openqa.selenium.Alert;

// Wait for alert to appear, then switch:
WebDriverWait wait = new WebDriverWait(driver, 5);
wait.until(ExpectedConditions.alertIsPresent());

Alert alert = driver.switchTo().alert();

// Read alert message text:
String msg = alert.getText(); // "Are you sure?"

// Accept alert (click OK):
alert.accept();

// Dismiss alert (click Cancel):
alert.dismiss();

// Send text into prompt dialog then accept:
alert.sendKeys("My input text");
alert.accept();</code></pre>`},
    {title:"Multiple windows / tabs — switch between", body:`<pre><code class="language-java">// Get current window handle (before clicking link that opens new tab)
String mainWindow = driver.getWindowHandle();

// Click something that opens a new window/tab
driver.findElement(By.linkText("Open New Tab")).click();

// Get all open window handles
Set&lt;String&gt; allWindows = driver.getWindowHandles();

// Switch to the new window:
for (String handle : allWindows) {
    if (!handle.equals(mainWindow)) {
        driver.switchTo().window(handle);
        break;
    }
}
System.out.println("New tab title: " + driver.getTitle());

// Switch back to main window:
driver.switchTo().window(mainWindow);</code></pre>`}

    {q:"What is the Page Object Model?", a:"POM is a design pattern where each web page has a dedicated Java class that stores its element locators and action methods — separating test logic from UI interaction code for better maintainability and reusability."},

  concepts:[
    {title:"Page Object class — LoginPage example", body:`<pre><code class="language-java">public class LoginPage {
    private WebDriver driver;

    // Locators defined ONCE in the Page class
    private By usernameField = By.id("username");
    private By passwordField = By.id("password");
    private By loginButton   = By.id("loginBtn");
    private By errorMessage  = By.id("error");

    // Constructor — receives driver from test
    public LoginPage(WebDriver driver) {
        this.driver = driver;
    }

    // Action methods — readable, reusable
    public HomePage login(String user, String pass) {
        driver.findElement(usernameField).sendKeys(user);
        driver.findElement(passwordField).sendKeys(pass);
        driver.findElement(loginButton).click();
        return new HomePage(driver); // returns next page object
    }

    public String getErrorMessage() {
        return driver.findElement(errorMessage).getText();
    }
}</code></pre>`},
    {title:"PageFactory — cleaner locator syntax", body:`<pre><code class="language-java">import org.openqa.selenium.support.PageFactory;
import org.openqa.selenium.support.FindBy;

public class LoginPage {
    private WebDriver driver;

    // @FindBy annotation replaces By.id / By.xpath declarations
    @FindBy(id = "username")
    private WebElement usernameField;

    @FindBy(id = "password")
    private WebElement passwordField;

    @FindBy(xpath = "//button[text()='Login']")
    private WebElement loginButton;

    public LoginPage(WebDriver driver) {
        this.driver = driver;
        PageFactory.initElements(driver, this); // initializes @FindBy fields
    }

    public void login(String user, String pass) {
        usernameField.sendKeys(user);
        passwordField.sendKeys(pass);
        loginButton.click();
    }
}</code></pre>`},

    private LoginPage loginPage;

        WebDriver driver = new ChromeDriver();
        driver.manage().window().maximize();
        driver.get("https://example.com/login");

        // Create page object — pass driver to it
        LoginPage loginPage = new LoginPage(driver);

        // Clean, readable test scenario using page methods:
        HomePage home = loginPage.login("admin@test.com", "Pass123");
        System.out.println("Title: " + driver.getTitle());

        driver.quit();
    }
}</code></pre>`},
    {title:"BasePage — shared utilities for all pages", body:`<pre><code class="language-java">// BasePage — parent class with common methods all pages share
public class BasePage {
    protected WebDriver driver;
    protected WebDriverWait wait;

    public BasePage(WebDriver driver) {
        this.driver = driver;
        this.wait = new WebDriverWait(driver, 10);
    }

    protected WebElement waitAndFind(By locator) {
        return wait.until(
            ExpectedConditions.visibilityOfElementLocated(locator));
    }

    protected void click(By locator) { waitAndFind(locator).click(); }
    protected void type(By locator, String text) {
        WebElement el = waitAndFind(locator);
        el.clear(); el.sendKeys(text);
    }
}
// LoginPage extends BasePage → inherits all utilities
public class LoginPage extends BasePage { ... }</code></pre>`}

    {title:"DriverFactory — multi-browser support", body:`<pre><code class="language-java">public class DriverFactory {
    private static ThreadLocal&lt;WebDriver&gt; driver = new ThreadLocal&lt;&gt;();

    public static WebDriver initDriver(String browser) {
        switch (browser.toLowerCase()) {
            case "chrome":
                System.setProperty("webdriver.chrome.driver",
                    ConfigReader.get("chrome.driver.path"));
                driver.set(new ChromeDriver());
                break;
            case "firefox":
                System.setProperty("webdriver.gecko.driver",
                    ConfigReader.get("gecko.driver.path"));
                driver.set(new FirefoxDriver());
                break;
            case "edge":
                driver.set(new EdgeDriver());
                break;
        }
        getDriver().manage().window().maximize();
        return getDriver();
    }
    public static WebDriver getDriver() { return driver.get(); }
    public static void quitDriver() { driver.get().quit(); driver.remove(); }
}</code></pre>`},
    {title:"ConfigReader — no hardcoded values", body:`<pre><code class="language-java">// config.properties file:
// base.url=https://staging.myapp.com
// browser=chrome
// chrome.driver.path=/usr/local/bin/chromedriver
// implicit.wait=10

public class ConfigReader {
    private static Properties props = new Properties();

    static {
        try (FileInputStream fis = new FileInputStream(
                "src/test/resources/config.properties")) {
            props.load(fis);
        } catch (IOException e) {
            throw new RuntimeException("Config file not found", e);
        }
    }

    public static String get(String key) { return props.getProperty(key); }
}</code></pre>`},
    {title:"Screenshot utility — capture on failure", body:`<pre><code class="language-java">import org.openqa.selenium.TakesScreenshot;
import org.openqa.selenium.OutputType;

public class ScreenshotUtil {
    public static String captureScreen(WebDriver driver, String name) {
        TakesScreenshot ts = (TakesScreenshot) driver;
        File src = ts.getScreenshotAs(OutputType.FILE);

        String path = "screenshots/" + name + "_"
            + LocalDateTime.now().format(DateTimeFormatter.ofPattern("yyyyMMdd_HHmmss"))
            + ".png";

        try {
            FileUtils.copyFile(src, new File(path));
            System.out.println("Screenshot saved: " + path);
        } catch (IOException e) {
            System.err.println("Screenshot failed: " + e.getMessage());
        }
        return path;
    }
}</code></pre>`},

        String browser = ConfigReader.get("browser");
        String url     = ConfigReader.get("base.url");

        // 2. Init driver from factory
        driver = DriverFactory.initDriver(browser);
        driver.get(url + "/login");

        LoginPage loginPage = new LoginPage(driver);
        HomePage  homePage  = loginPage.login("admin", "pass");

        if (driver.getTitle().contains("Dashboard")) {

        }
    }

    public void tearDown() { DriverFactory.quitDriver(); }
}</code></pre>`}

function buildTabs() {
  const bar = document.getElementById('tabBar');
  const cont = document.getElementById('sessions');
  sessions.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i===0?' active':'');
    btn.textContent = `S${s.id}`;
    btn.title = s.title;
    btn.onclick = () => activateTab(i);
    bar.appendChild(btn);
    cont.innerHTML += buildSession(s, i);
  });
  document.querySelector('.session').classList.add('active');
}

function activateTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.querySelectorAll('.session').forEach((s,i) => s.classList.toggle('active', i===idx));
}

function buildSession(s, idx) {
  const pills = s.flow.map(f=>`<span class="pill">${f}</span>`).join('');
  const oneliners = s.oneliners.map(o=>`
    <div class="oneliner"><strong>Q: ${o.q}</strong><br>${o.a}</div>`).join('');
  const concepts = s.concepts.map(c=>`
    <div class="card"><div class="card-title"><i class="ti ti-code" aria-hidden="true"></i>${c.title}</div>${c.body}</div>`).join('');
  const mistakes = s.mistakes.map(m=>`
    <div class="err-row">
      <div class="err-box bad"><p>❌ Common mistake</p>${m.bad}</div>
      <div class="err-box good"><p>✅ Correct approach</p>${m.good}</div>
    </div>`).join('');
  const checks = s.checklist.map(c=>`
    <div class="check-item"><i class="ti ti-circle-check" aria-hidden="true"></i><span>${c}</span></div>`).join('');

  return `<div class="session" data-idx="${idx}">
    <div class="s-header">
      <span class="badge ${s.bClass}">${s.badge}</span>
      <div class="s-title">Session ${s.id}: ${s.title}</div>
      <div class="s-sub">${s.sub}</div>
    </div>
    <div class="flow-pills">${pills}</div>
    <div class="card"><div class="card-title"><i class="ti ti-message-circle" aria-hidden="true"></i>Interview one-liners</div>${oneliners}</div>
    <div class="diagram-wrap">${s.diagram}</div>
    <div class="card-title" style="margin:1rem 0 .5rem;font-size:14px"><i class="ti ti-books" aria-hidden="true"></i>&nbsp;Hands-on code examples</div>
    ${concepts}
    <div class="card"><div class="card-title"><i class="ti ti-alert-triangle" aria-hidden="true"></i>Common mistakes & fixes</div>${mistakes}</div>
    <div class="card"><div class="card-title"><i class="ti ti-checklist" aria-hidden="true"></i>Best practices checklist</div>${checks}</div>
    <div class="nav-bar">
      <button class="nav-btn" onclick="activateTab(Math.max(0,${idx}-1))" ${idx===0?'disabled':''}>← Previous</button>
      <span class="prog">${idx+1} / ${sessions.length}</span>
      <button class="nav-btn" onclick="activateTab(Math.min(${sessions.length-1},${idx}+1))" ${idx===sessions.length-1?'disabled':''}>Next →</button>
    </div>
  </div>`;
}

buildTabs();
</script>

    <!-- PRISM DYNAMIC HIGHLIGHT FIX -->
    <script>
    if (window.Prism) {
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new MutationObserver((mutations) => {
                let needsHighlight = false;
                mutations.forEach(m => {
                    if (m.addedNodes.length) {
                        m.addedNodes.forEach(n => {
                            if (n.nodeName === 'PRE' || n.nodeName === 'CODE') needsHighlight = true;
                            if (n.querySelector && n.querySelector('pre')) needsHighlight = true;
                        });
                    }
                });
                if (needsHighlight) {
                    Prism.highlightAll();
                }
            });
            observer.observe(document.body, { childList: true, subtree: true });
        });
    }
    </script>
