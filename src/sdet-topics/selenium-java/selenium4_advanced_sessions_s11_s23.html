{q:"What is the biggest architectural change in Selenium 4?",a:"Selenium 4 is fully W3C WebDriver standard compliant. It dropped the JSON Wire Protocol and uses pure W3C protocol — removing the need for DesiredCapabilities in most cases and replacing them with browser-specific Options classes."},
{q:"Why is DesiredCapabilities deprecated in Selenium 4?",a:"DesiredCapabilities was a Selenium-custom protocol layer that no longer maps cleanly to W3C. In Selenium 4, you use browser-specific Options classes (ChromeOptions, FirefoxOptions) which are W3C-compliant and type-safe."},
{q:"What are the key new features in Selenium 4?",a:"Selenium 4 brings: full W3C compliance, native CDP (Chrome DevTools Protocol) support, Relative Locators, improved Selenium Grid 4 (Docker-ready), newWindow()/newTab() API, and browser-specific Options replacing DesiredCapabilities."}

// Selenium 4 — use Duration.of* (java.time API)
WebDriverWait wait = new WebDriverWait(driver, Duration.ofSeconds(10));

// With custom polling interval (Selenium 4):
WebDriverWait wait2 = new WebDriverWait(driver,
    Duration.ofSeconds(15),          // max timeout
    Duration.ofMillis(300));          // poll every 300ms

wait.until(ExpectedConditions
    .elementToBeClickable(By.id("submitBtn"))).click();

{title:"Visibility conditions — 4 variants explained",body:`<pre><code class="language-java">// 1. presenceOfElementLocated — in DOM, may not be visible
wait.until(ExpectedConditions
    .presenceOfElementLocated(By.id("hiddenEl")));

// 2. visibilityOfElementLocated — in DOM AND visible
WebElement el = wait.until(ExpectedConditions
    .visibilityOfElementLocated(By.id("toast")));

// 3. visibilityOf — already have the WebElement reference
WebElement existingEl = driver.findElement(By.id("msg"));
wait.until(ExpectedConditions.visibilityOf(existingEl));

// 4. visibilityOfAllElementsLocatedBy — ALL must be visible
List&lt;WebElement&gt; items = wait.until(ExpectedConditions
    .visibilityOfAllElementsLocatedBy(By.cssSelector(".list-item")));
System.out.println("Items loaded: " + items.size());</code></pre>`},
{title:"Clickability, staleness, text conditions",body:`<pre><code class="language-java">// elementToBeClickable — visible + enabled (safest before click)

    .elementToBeClickable(By.id("addToCart"))).click();

wait.until(ExpectedConditions
    .invisibilityOfElementLocated(By.id("loadingSpinner")));

// textToBePresentInElement — wait for dynamic text
WebElement status = driver.findElement(By.id("status"));
wait.until(ExpectedConditions
    .textToBePresentInElement(status, "Order Confirmed"));

// stalenessOf — wait for old element to detach from DOM
WebElement oldTable = driver.findElement(By.id("dataTable"));
driver.findElement(By.id("refresh")).click();
wait.until(ExpectedConditions.stalenessOf(oldTable));

wait.until(ExpectedConditions
    .urlToBe("https://app.com/dashboard"));

// titleContains — page title partial match
wait.until(ExpectedConditions.titleContains("My Dashboard"));

// titleIs — exact title match
wait.until(ExpectedConditions
    .titleIs("My Dashboard — MyApp"));

// numberOfWindowsToBe — wait for popup to open
driver.findElement(By.id("openPopup")).click();

concepts:[
{title:"FluentWait — full configuration",body:`<pre><code class="language-java">import org.openqa.selenium.support.ui.FluentWait;
import java.time.Duration;
import java.util.function.Function;

Wait&lt;WebDriver&gt; fluent = new FluentWait&lt;&gt;(driver)
    .withTimeout(Duration.ofSeconds(30))        // max 30s total
    .pollingEvery(Duration.ofSeconds(2))        // check every 2s
    .ignoring(NoSuchElementException.class)     // skip not-found
    .ignoring(StaleElementReferenceException.class) // skip stale
    .withMessage("Element not found after 30s — check locator");

// Use it with lambda:
WebElement el = fluent.until(d -&gt;
    d.findElement(By.id("dynamicResult")));

// Or with ExpectedConditions:
fluent.until(ExpectedConditions
    .visibilityOfElementLocated(By.id("data")));</code></pre>`},
{title:"FluentWait for slow-loading data tables",body:`<pre><code class="language-java">// Real scenario: data table loads over 20+ seconds (large dataset)
Wait&lt;WebDriver&gt; tableWait = new FluentWait&lt;&gt;(driver)
    .withTimeout(Duration.ofSeconds(60))
    .pollingEvery(Duration.ofSeconds(3))
    .ignoring(NoSuchElementException.class);

// Wait until table has at least 10 rows:
tableWait.until(d -&gt; {
    List&lt;WebElement&gt; rows = d.findElements(
        By.cssSelector("table#results tbody tr"));
    return rows.size() &gt;= 10 ? rows : null;
// returning null continues polling; non-null returns the value
});</code></pre>`},
{title:"FluentWait ignoring multiple exception types",body:`<pre><code class="language-java">// Chain multiple .ignoring() calls for resilient waits
Wait&lt;WebDriver&gt; resilient = new FluentWait&lt;&gt;(driver)
    .withTimeout(Duration.ofSeconds(20))
    .pollingEvery(Duration.ofMillis(500))
    .ignoring(NoSuchElementException.class)
    .ignoring(StaleElementReferenceException.class)
    .ignoring(ElementNotInteractableException.class);

// Now safe against: DOM rebuilds, animations, element detach
resilient.until(d -&gt; {
    WebElement btn = d.findElement(By.id("submit"));
    btn.click(); // retries if stale or not interactable
    return true;
});</code></pre>`},
{title:"FluentWait for file download scenario",body:`<pre><code class="language-java">// Wait for downloaded file to appear on disk
// FluentWait isn't WebDriver-specific — it works on anything
FluentWait&lt;File&gt; fileWait = new FluentWait&lt;&gt;(new File("/downloads"))
    .withTimeout(Duration.ofSeconds(60))
    .pollingEvery(Duration.ofSeconds(2))
    .withMessage("Download did not complete in 60 seconds");

fileWait.until(downloadDir -&gt; {
    File[] files = downloadDir.listFiles(
        f -&gt; f.getName().endsWith(".pdf"));
    return files != null &amp;&amp; files.length &gt; 0;
});</code></pre>`},
{title:"Custom reusable wait utility class",body:`<pre><code class="language-java">public class WaitUtils {
    private WebDriver driver;

    public WaitUtils(WebDriver driver) { this.driver = driver; }

    public WebElement waitForVisible(By locator, int seconds) {
        return new FluentWait&lt;&gt;(driver)
            .withTimeout(Duration.ofSeconds(seconds))
            .pollingEvery(Duration.ofMillis(500))
            .ignoring(NoSuchElementException.class)
            .until(ExpectedConditions.visibilityOfElementLocated(locator));
    }

    public boolean waitForTextInElement(By locator, String text) {
        return new FluentWait&lt;&gt;(driver)
            .withTimeout(Duration.ofSeconds(10))
            .pollingEvery(Duration.ofMillis(300))
            .ignoring(NoSuchElementException.class)
            .until(ExpectedConditions
                .textToBePresentInElementLocated(locator, text));
    }
}</code></pre>`}
],
mistakes:[
{bad:"Returning false from FluentWait lambda — thinking it will retry",good:"Return null (not false) from FluentWait lambda to indicate 'not ready yet'. Returning false is a valid result and FluentWait returns it immediately without retrying"},
{bad:"Using the same FluentWait instance for waits with different timeouts",good:"Create a new FluentWait instance per wait scenario, or use a WaitUtils factory method. Reusing the same instance can cause stale configuration"}
],
checklist:["Return null (not false) from lambda to continue polling","Chain multiple .ignoring() for resilient waits against DOM rebuilds","pollingEvery should be 1/20th of withTimeout for efficient polling","FluentWait works with any type T — not just WebDriver (e.g., File, API response)","withMessage() saves hours of debugging — always set a meaningful failure message"]
},

title:"All ExpectedConditions — Complete Reference",
sub:"Visibility · Clickability · Text · URL · Frame · Alert · Custom",

oneliners:[
{q:"How many categories of ExpectedConditions are there?",a:"Approximately 7 categories: element presence/visibility, element state (clickable/selected/enabled), text content, URL/title conditions, frame/window conditions, alert conditions, and list-based conditions."},
{q:"What is the difference between presenceOf and visibilityOf?",a:"presenceOfElementLocated only requires the element to be in the DOM — it could be hidden (display:none). visibilityOfElementLocated requires the element to be both in the DOM AND visible on screen (non-zero size, not hidden)."},
{q:"Can you use AND/OR logic with ExpectedConditions?",a:"Yes — use ExpectedConditions.and() to combine multiple conditions with AND logic. For OR logic, use a custom lambda that checks multiple conditions. Example: wait.until(EC.and(EC.visibilityOf(el1), EC.elementToBeClickable(el2)))"}
],
diagram:`<svg width="100%" viewBox="0 0 680 300" role="img"><title>ExpectedConditions categories overview</title><desc>Seven categories of ExpectedConditions grouped by type</desc><defs></defs>

<g class="c-purple"><rect x="130" y="190" width="420" height="52" rx="8" stroke-width="0.5"/><text class="th" x="340" y="210" text-anchor="middle" dominant-baseline="central">Compound conditions</text><text class="ts" x="340" y="228" text-anchor="middle" dominant-baseline="central">EC.and(), EC.or(), EC.not() + custom lambda</text></g>
</svg>`,
concepts:[
{title:"Presence and visibility conditions — complete set",body:`<pre><code class="language-java">// 1. In DOM (may be hidden):
EC.presenceOfElementLocated(By.id("el"))
EC.presenceOfAllElementsLocatedBy(By.cssSelector(".item"))

// 2. In DOM + visible:
EC.visibilityOfElementLocated(By.id("el"))
EC.visibilityOf(webElement)                    // already have reference
EC.visibilityOfAllElementsLocatedBy(By.cssSelector(".row"))
EC.visibilityOfAllElements(listOfElements)

// 3. Invisible (hidden or removed):
EC.invisibilityOfElementLocated(By.id("spinner"))
EC.invisibilityOf(webElement)
EC.invisibilityOfElementWithText(By.id("msg"), "Error")

// 4. Number of elements:
EC.numberOfElementsToBe(By.cssSelector(".row"), 5)
EC.numberOfElementsToBeMoreThan(By.cssSelector(".row"), 3)
EC.numberOfElementsToBeLessThan(By.cssSelector(".row"), 10)</code></pre>`},
{title:"State conditions — clickable, selected, stale",body:`<pre><code class="language-java">// Clickable — visible AND enabled (best before click):
EC.elementToBeClickable(By.id("btn"))
EC.elementToBeClickable(webElement)

// Selection state — checkboxes, radio, dropdowns:
EC.elementToBeSelected(webElement)
EC.elementSelectionStateToBe(webElement, true)   // must be checked
EC.elementSelectionStateToBe(webElement, false)  // must be unchecked
EC.elementToBeSelectedByLocator(By.id("chk"))    // locator variant

// Staleness — wait for element to be removed from DOM:
EC.stalenessOf(webElement)

// Attribute checks:
EC.attributeContains(By.id("el"), "class", "active")
EC.attributeToBe(By.id("input"), "value", "hello")
EC.attributeToBeNotEmpty(webElement, "value")</code></pre>`},
{title:"Text and URL conditions",body:`<pre><code class="language-java">// Text in element:
EC.textToBePresentInElement(webElement, "Success")
EC.textToBePresentInElementLocated(By.id("msg"), "OK")
EC.textToBePresentInElementValue(By.id("input"), "hello")
EC.textMatches(By.id("el"), Pattern.compile("Order #\\d+"))

// URL conditions:
EC.urlContains("dashboard")
EC.urlToBe("https://app.com/home")
EC.urlMatches("https://app\\.com/order/\\d+")

// Title conditions:
EC.titleIs("My Dashboard")
EC.titleContains("Dashboard")

// Frame conditions:
EC.frameToBeAvailableAndSwitchToIt("frameName")
EC.frameToBeAvailableAndSwitchToIt(By.id("myFrame"))
EC.frameToBeAvailableAndSwitchToIt(0) // by index</code></pre>`},
{title:"Alert and window conditions",body:`<pre><code class="language-java">// Alert conditions:
EC.alertIsPresent()

// Window conditions:
EC.numberOfWindowsToBe(2)

// Real scenario — click triggers popup, wait, switch:
driver.findElement(By.id("openPopup")).click();
wait.until(EC.numberOfWindowsToBe(2));
String mainHandle = driver.getWindowHandle();
driver.getWindowHandles().forEach(h -&gt; {
    if (!h.equals(mainHandle)) driver.switchTo().window(h);
});
wait.until(EC.titleContains("Popup"));

// Real scenario — login triggers alert:
wait.until(EC.alertIsPresent());
driver.switchTo().alert().accept();</code></pre>`},
{title:"Compound conditions — AND, OR, NOT",body:`<pre><code class="language-java">// AND — all conditions must pass simultaneously:
wait.until(EC.and(
    EC.visibilityOfElementLocated(By.id("header")),
    EC.visibilityOfElementLocated(By.id("content")),
    EC.elementToBeClickable(By.id("submitBtn"))
));

// OR — any one condition passes:
wait.until(EC.or(
    EC.visibilityOfElementLocated(By.id("successMsg")),
    EC.visibilityOfElementLocated(By.id("errorMsg"))
));

// NOT — condition must be FALSE:
wait.until(EC.not(
    EC.visibilityOfElementLocated(By.id("spinner"))
));

// NOT is equivalent to invisibilityOf for spinners:
wait.until(EC.not(EC.elementToBeClickable(By.id("disabledBtn"))));</code></pre>`}
],
mistakes:[
{bad:"EC.visibilityOf() on a freshly-found element that could go stale",good:"Prefer EC.visibilityOfElementLocated(By...) — it re-finds the element each poll cycle, preventing StaleElementReferenceException during wait"},
{bad:"EC.frameToBeAvailableAndSwitchToIt() — forgetting to switch back after",good:"Always call driver.switchTo().defaultContent() after interacting with iframe content — every element lookup after this still targets the frame context"}
],
checklist:["Use EC.and() when multiple elements must all be ready before proceeding","EC.textMatches() with regex is powerful for dynamic text like 'Order #12345'","EC.attributeContains() is perfect for CSS class-based state checks (e.g. 'active')","EC.frameToBeAvailableAndSwitchToIt() combines the wait and switch in one call","EC.not() is clean for 'wait until spinner is gone' scenarios"]
},

{q:"What is the Actions class used for in Selenium 4?",a:"Actions simulates complex user gestures that can't be done with simple element.click() — hover, drag-and-drop, right-click, double-click, keyboard combinations, and scroll operations. In Selenium 4, it was enhanced with new scroll methods."},
{q:"What is the difference between click() and Actions.click()?",a:"element.click() is a direct WebDriver command. Actions.click(element) builds an action chain — useful when you need to combine gestures (e.g., hover then click) or when dealing with elements requiring mouse positioning first."},
{q:"What new scroll methods were added in Selenium 4 Actions?",a:"Selenium 4 added: scrollToElement(element), scrollByAmount(deltaX, deltaY), scrollFromOrigin(scrollOrigin, deltaX, deltaY) — all W3C WebDriver compliant and more reliable than JavaScript scrollIntoView."}
],

concepts:[
{title:"Mouse interactions — click, double, right-click, hover",body:`<pre><code class="language-java">Actions actions = new Actions(driver);

// Simple click (with positioning):
actions.click(driver.findElement(By.id("btn"))).perform();

// Double-click (open file, select word):
actions.doubleClick(driver.findElement(By.id("editBtn"))).perform();

// Right-click (context menu):
WebElement el = driver.findElement(By.id("listItem"));
actions.contextClick(el).perform();
// Now click menu option:
wait.until(EC.visibilityOfElementLocated(By.id("deleteOption")));
driver.findElement(By.id("deleteOption")).click();

// Hover (mouseover — triggers dropdown/tooltip):
WebElement nav = driver.findElement(By.id("navMenu"));
actions.moveToElement(nav).perform();
// Submenu is now visible:
wait.until(EC.visibilityOfElementLocated(By.id("subMenu")));
driver.findElement(By.id("subMenu")).click();</code></pre>`},
{title:"Drag and drop — 3 methods",body:`<pre><code class="language-java">// Method 1: dragAndDrop(source, target)
WebElement source = driver.findElement(By.id("draggable"));
WebElement target = driver.findElement(By.id("droppable"));
actions.dragAndDrop(source, target).perform();

// Method 2: dragAndDropBy(source, xOffset, yOffset)
actions.dragAndDropBy(source, 200, 0).perform(); // move 200px right

// Method 3: manual click-hold-move-release (most reliable)
actions.clickAndHold(source)
       .moveToElement(target)
       .release()
       .perform();

// Slow drag (some apps need this — use pause between steps):
actions.clickAndHold(source)
       .pause(Duration.ofMillis(500))   // Selenium 4 pause
       .moveToElement(target)
       .pause(Duration.ofMillis(300))
       .release()
       .perform();</code></pre>`},
{title:"Keyboard shortcuts — Ctrl, Shift, Alt combinations",body:`<pre><code class="language-java">// Select all text in input (Ctrl+A):
WebElement input = driver.findElement(By.id("searchBox"));
actions.click(input)
       .keyDown(Keys.CONTROL).sendKeys("a").keyUp(Keys.CONTROL)
       .perform();

// Copy selected text (Ctrl+C) then paste (Ctrl+V):
actions.keyDown(Keys.CONTROL).sendKeys("c").keyUp(Keys.CONTROL)
       .click(otherInput)
       .keyDown(Keys.CONTROL).sendKeys("v").keyUp(Keys.CONTROL)
       .perform();

// Multi-select list items (Ctrl+Click each):
actions.click(item1)
       .keyDown(Keys.CONTROL).click(item2).click(item3)
       .keyUp(Keys.CONTROL)
       .perform();

// Shift+Click range select:
actions.click(firstRow)
       .keyDown(Keys.SHIFT).click(lastRow)
       .keyUp(Keys.SHIFT).perform();</code></pre>`},
{title:"Scroll actions — Selenium 4 new API",body:`<pre><code class="language-java">import org.openqa.selenium.interactions.WheelInput.ScrollOrigin;

// Scroll to element (new in Selenium 4 — W3C compliant):
WebElement element = driver.findElement(By.id("footer"));
actions.scrollToElement(element).perform();

// Scroll by pixel amount from current viewport position:
actions.scrollByAmount(0, 500).perform();  // scroll down 500px
actions.scrollByAmount(0, -300).perform(); // scroll up 300px
actions.scrollByAmount(200, 0).perform();  // scroll right 200px

// ScrollFromOrigin — scroll from element position:
ScrollOrigin origin = ScrollOrigin.fromElement(element);
actions.scrollFromOrigin(origin, 0, 200).perform();

// ScrollFromOrigin with offset from element:
ScrollOrigin withOffset = ScrollOrigin.fromElement(element, 0, -50);
actions.scrollFromOrigin(withOffset, 0, 300).perform();</code></pre>`},
{title:"Complex action chains — real-world scenarios",body:`<pre><code class="language-java">// Tooltip test: hover → wait → read tooltip text
WebElement helpIcon = driver.findElement(By.id("helpIcon"));
actions.moveToElement(helpIcon).perform();
wait.until(EC.visibilityOfElementLocated(By.cssSelector(".tooltip")));
String tip = driver.findElement(By.cssSelector(".tooltip")).getText();

// Slider: drag to specific position
WebElement slider = driver.findElement(By.id("priceSlider"));
int sliderWidth = slider.getSize().getWidth();
actions.clickAndHold(slider)
       .moveByOffset(sliderWidth / 2, 0) // move to 50%
       .release().perform();

// Canvas drawing: draw a line
WebElement canvas = driver.findElement(By.id("drawCanvas"));
actions.moveToElement(canvas, 100, 100)
       .clickAndHold()
       .moveByOffset(200, 0)
       .moveByOffset(0, 200)
       .release().perform();</code></pre>`}
],
mistakes:[
{bad:"actions.dragAndDrop(source, target) fails on some apps",good:"Use clickAndHold → pause → moveToElement → release pattern for stubborn drag-drop. Some frameworks require the slow approach with pauses between steps"},
{bad:"actions.moveToElement() not scrolling element into view",good:"Use actions.scrollToElement(element).perform() first in Selenium 4, then moveToElement. Scrolling and moving are separate operations"}
],
checklist:["Always call .perform() at the end — without it, nothing executes","Use pause(Duration) between action steps for animations that need settling time","scrollToElement() is the Selenium 4 W3C way — avoid JS scrollIntoView for actions chains","keyDown/keyUp must be balanced — unclosed keyDown keeps modifier held down","For drag-drop failures: try clickAndHold + pause(500ms) + move + pause + release"]
},

{id:16,badge:"JS Executor",bClass:"b2",

oneliners:[
{q:"What is JavascriptExecutor and why do we use it?",a:"JavascriptExecutor is a Selenium interface that runs arbitrary JavaScript in the browser context. We use it when Selenium's WebDriver API can't reach something: hidden elements, custom scroll, reading JS variables, triggering custom events, or bypassing Selenium's element interaction restrictions."},
{q:"What is the difference between executeScript and executeAsyncScript?",a:"executeScript runs synchronous JS and returns immediately. executeAsyncScript runs async JS — Selenium waits for you to call the injected callback(result) function to signal completion, with a timeout set by driver.manage().timeouts().scriptTimeout()."},
{q:"When would executeScript fail silently?",a:"If the JS throws an exception, Selenium wraps it in JavascriptException. If the JS returns undefined, Selenium returns null. If you return a WebElement from JS, Selenium wraps it as a WebElement — test these return types carefully."}
],

{title:"executeScript — basic patterns and return types",body:`<pre><code class="language-java">JavascriptExecutor js = (JavascriptExecutor) driver;

// Returns String:
String url = (String) js.executeScript("return window.location.href");

// Returns Long (numbers):
Long scrollY = (Long) js.executeScript("return window.scrollY");

// Returns Boolean:
Boolean loaded = (Boolean) js.executeScript(
    "return document.readyState === 'complete'");

// Returns WebElement:
WebElement active = (WebElement) js.executeScript(
    "return document.activeElement");

// Passing WebElement AS argument (arguments[0]):
js.executeScript("arguments[0].click();", element);
js.executeScript("arguments[0].style.border='3px solid red';", element);</code></pre>`},
{title:"Scroll scenarios — 5 patterns",body:`<pre><code class="language-java">JavascriptExecutor js = (JavascriptExecutor) driver;

// Scroll to bottom of page:
js.executeScript("window.scrollTo(0, document.body.scrollHeight)");

// Scroll to top:
js.executeScript("window.scrollTo(0, 0)");

// Scroll by relative amount:
js.executeScript("window.scrollBy(0, 500)");  // down 500px

// Scroll element into view (center):
js.executeScript("arguments[0].scrollIntoView({block:'center'})", element);

// Scroll inside an overflow div (not window):
WebElement scrollDiv = driver.findElement(By.id("scrollableDiv"));
js.executeScript("arguments[0].scrollTop += 300", scrollDiv);

// PREFER Selenium 4 Actions scrollToElement() over JS for W3C compliance</code></pre>`},
{title:"DOM manipulation and value setting",body:`<pre><code class="language-java">JavascriptExecutor js = (JavascriptExecutor) driver;
WebElement dateInput = driver.findElement(By.id("datePicker"));

// Set value on read-only or custom inputs:
js.executeScript("arguments[0].value = '2024-12-25';", dateInput);

// Remove readonly attribute:
js.executeScript(
    "arguments[0].removeAttribute('readonly')", dateInput);

// Set attribute:
js.executeScript(
    "arguments[0].setAttribute('value', '999')", element);

// Make hidden element visible:
js.executeScript(
    "arguments[0].style.display='block'", hiddenEl);

// Highlight element for debugging:
js.executeScript(
    "arguments[0].style.outline='3px solid orange'", element);

// Trigger custom event (React/Vue apps):
js.executeScript(
    "arguments[0].dispatchEvent(new Event('change'))", input);</code></pre>`},
{title:"Reading JS state — page ready, custom vars",body:`<pre><code class="language-java">JavascriptExecutor js = (JavascriptExecutor) driver;

// Check page load complete:
wait.until(d -&gt; js.executeScript(
    "return document.readyState").equals("complete"));

// Check jQuery AJAX idle (if app uses jQuery):
wait.until(d -&gt; (Boolean) js.executeScript(
    "return jQuery.active === 0"));

// Read custom JS variable set by app:
String token = (String) js.executeScript(
    "return window.authToken");

// Get all local storage keys:
String allKeys = (String) js.executeScript(
    "return Object.keys(localStorage).toString()");

// Read localStorage value:
String userData = (String) js.executeScript(
    "return localStorage.getItem('user')");</code></pre>`},
{title:"executeAsyncScript — AJAX and animation waits",body:`<pre><code class="language-java">// Set script timeout FIRST:
driver.manage().timeouts().scriptTimeout(Duration.ofSeconds(30));

JavascriptExecutor js = (JavascriptExecutor) driver;

// Wait for an animation to complete using async script:
js.executeAsyncScript(
    "var callback = arguments[arguments.length - 1];" +
    "setTimeout(callback, 2000);"  // wait 2s then signal done
);

// Wait for fetch/AJAX to resolve:
js.executeAsyncScript(
    "var done = arguments[arguments.length - 1];" +
    "fetch('/api/data').then(r => r.json()).then(data => done(data))"
);

// The last argument is always the callback in executeAsyncScript
// Call it to signal Selenium that async work is complete</code></pre>`}
],

{bad:"Using JS click (arguments[0].click()) as default approach for all clicks",good:"Use JS click only as a last resort when Selenium click fails (overlapping elements, hidden elements). Normal clicks should use element.click() for realistic user simulation"},
{bad:"Not setting scriptTimeout before executeAsyncScript",good:"Always set driver.manage().timeouts().scriptTimeout(Duration.ofSeconds(30)) before any executeAsyncScript call — without it, the default is 0 and will timeout immediately"}
],

{q:"What is Robot class and how is it different from Selenium Actions?",a:"Robot class (java.awt.Robot) automates at the OS/native level — it controls the physical keyboard and mouse regardless of browser. Selenium Actions works within the browser context. Use Robot for: file upload dialogs, OS popups, and anything outside the browser DOM."},
{q:"When would you use Robot class in a Selenium test?",a:"Use Robot for: native OS file upload dialogs (the Windows/Linux file picker), clipboard operations (copy/paste system-wide), keyboard shortcuts that browsers intercept before Selenium can handle them, and taking OS-level screenshots."},
{q:"What are the limitations of Robot class in CI/CD?",a:"Robot requires a physical display — it fails in headless mode and on headless Linux servers. In CI/CD, use browser-based file upload workarounds (sendKeys to file input) or virtual display (Xvfb on Linux) instead of Robot for file dialogs."}
],

concepts:[
{title:"Robot class — setup and keyboard",body:`<pre><code class="language-java">import java.awt.Robot;
import java.awt.event.KeyEvent;
import java.awt.Toolkit;
import java.awt.datatransfer.StringSelection;

Robot robot = new Robot();

// Press Enter key:
robot.keyPress(KeyEvent.VK_ENTER);
robot.keyRelease(KeyEvent.VK_ENTER);

// Press Tab:
robot.keyPress(KeyEvent.VK_TAB);
robot.keyRelease(KeyEvent.VK_TAB);

// Press Escape (dismiss dialog):
robot.keyPress(KeyEvent.VK_ESCAPE);
robot.keyRelease(KeyEvent.VK_ESCAPE);

// Press Ctrl+A (select all) then Ctrl+C (copy):
robot.keyPress(KeyEvent.VK_CONTROL);
robot.keyPress(KeyEvent.VK_A);
robot.keyRelease(KeyEvent.VK_A);
robot.keyRelease(KeyEvent.VK_CONTROL);</code></pre>`},
{title:"File upload dialog — most common Robot use case",body:`<pre><code class="language-java">// ⚠ PREFERRED: Use sendKeys directly on file input (no Robot needed):
driver.findElement(By.id("fileInput")).sendKeys("/home/user/doc.pdf");

// ROBOT approach — only when file input is not accessible via Selenium:
// 1. Click the upload button to open OS dialog
driver.findElement(By.id("uploadBtn")).click();
Thread.sleep(1500); // wait for OS dialog to open

// 2. Type file path into the dialog using clipboard (most reliable):
Robot robot = new Robot();
StringSelection filePath = new StringSelection("/home/user/file.pdf");
Toolkit.getDefaultToolkit().getSystemClipboard().setContents(filePath, null);

// 3. Paste the path (Ctrl+V):
robot.keyPress(KeyEvent.VK_CONTROL); robot.keyPress(KeyEvent.VK_V);
robot.keyRelease(KeyEvent.VK_V); robot.keyRelease(KeyEvent.VK_CONTROL);

// 4. Confirm with Enter:
robot.keyPress(KeyEvent.VK_ENTER); robot.keyRelease(KeyEvent.VK_ENTER);</code></pre>`},
{title:"Mouse control — move, click, scroll",body:`<pre><code class="language-java">Robot robot = new Robot();

// Move mouse to absolute screen coordinates:
robot.mouseMove(500, 300);  // x=500, y=300 on screen

// Left click:
robot.mousePress(InputEvent.BUTTON1_DOWN_MASK);
robot.mouseRelease(InputEvent.BUTTON1_DOWN_MASK);

// Right click:
robot.mousePress(InputEvent.BUTTON3_DOWN_MASK);
robot.mouseRelease(InputEvent.BUTTON3_DOWN_MASK);

// Double click:
robot.mousePress(InputEvent.BUTTON1_DOWN_MASK);
robot.mouseRelease(InputEvent.BUTTON1_DOWN_MASK);
robot.mousePress(InputEvent.BUTTON1_DOWN_MASK);
robot.mouseRelease(InputEvent.BUTTON1_DOWN_MASK);

// Mouse wheel scroll:
robot.mouseWheel(3);  // scroll down 3 notches
robot.mouseWheel(-3); // scroll up 3 notches</code></pre>`},
{title:"Clipboard — copy and paste between fields",body:`<pre><code class="language-java">import java.awt.Toolkit;
import java.awt.datatransfer.*;

// Set clipboard content (type text into OS dialog):
void setClipboard(String text) throws Exception {
    StringSelection sel = new StringSelection(text);
    Toolkit.getDefaultToolkit()
           .getSystemClipboard().setContents(sel, null);
}

// Read clipboard content:
String readClipboard() throws Exception {
    Transferable contents = Toolkit.getDefaultToolkit()
        .getSystemClipboard().getContents(null);
    if (contents != null &amp;&amp; contents.isDataFlavorSupported(
            DataFlavor.stringFlavor)) {
        return (String) contents.getTransferData(DataFlavor.stringFlavor);
    }
    return null;
}

// Usage: verify copied text matches expected
String copied = readClipboard();
assert copied.equals("Expected text") : "Clipboard mismatch";</code></pre>`},
{title:"Screenshot with Robot — full screen capture",body:`<pre><code class="language-java">import java.awt.Rectangle;
import java.awt.image.BufferedImage;
import javax.imageio.ImageIO;

// Capture full OS screen (including browser chrome, taskbar):
Robot robot = new Robot();
Rectangle screen = new Rectangle(
    Toolkit.getDefaultToolkit().getScreenSize());
BufferedImage screenshot = robot.createScreenCapture(screen);

// Save to file:
ImageIO.write(screenshot, "PNG",
    new File("screenshots/full_screen.png"));

// Capture specific area (x, y, width, height):
Rectangle area = new Rectangle(0, 0, 800, 600);
BufferedImage partial = robot.createScreenCapture(area);
ImageIO.write(partial, "PNG", new File("partial.png"));

// Note: Selenium's TakesScreenshot is better for browser-only tests</code></pre>`}
],

{bad:"Using Robot for file upload in CI/CD headless environments",good:"Use sendKeys() directly on the file input element — it works headlessly. Robot requires a display. Fall back to AutoIT or PyAutoGUI for CI file dialog automation on non-headless"},

{q:"What is StaleElementReferenceException and how do you fix it?",a:"Thrown when a WebElement reference is no longer valid — the DOM was rebuilt (after page refresh, AJAX update, navigation). Fix: re-find the element after the DOM change, or use ExpectedConditions.stalenessOf() to wait for the old element to detach."},
{q:"What is the difference between NoSuchElementException and TimeoutException?",a:"NoSuchElementException fires immediately when findElement can't locate the element (with no implicit wait set). TimeoutException fires when an explicit wait's maximum duration is exceeded — the condition never became true."},
{q:"What causes ElementNotInteractableException?",a:"Element is in the DOM but not interactable — it could be hidden (display:none/visibility:hidden), covered by an overlay, outside viewport, disabled, or still animating into position. Fix: wait for elementToBeClickable, scroll into view, or close the overlay."}
],

concepts:[
{title:"NoSuchElementException — causes and fixes",body:`<pre><code class="language-java">// Caused by: wrong locator, element not yet loaded, inside iframe

// Fix 1: Add explicit wait
WebElement el = wait.until(EC
    .presenceOfElementLocated(By.id("dynamicEl")));

// Fix 2: Verify locator in DevTools (F12 → Console):
// document.querySelector('#dynamicEl') → check if returns null

// Fix 3: Check if inside an iFrame:
driver.switchTo().frame("myFrame");
WebElement el = driver.findElement(By.id("innerEl"));

// Fix 4: Safe find (no exception — returns boolean):
boolean exists = !driver.findElements(By.id("el")).isEmpty();

// Fix 5: Try-catch and retry logic:
try {
    driver.findElement(By.id("btn")).click();
} catch (NoSuchElementException e) {
    System.out.println("Element not found: " + e.getMessage());
}</code></pre>`},
{title:"StaleElementReferenceException — causes and fixes",body:`<pre><code class="language-java">// Caused by: DOM rebuilt after AJAX, page refresh, navigation
// Old WebElement reference becomes invalid

// Fix 1: Re-find element after DOM change:
driver.findElement(By.id("refresh")).click();
wait.until(EC.stalenessOf(oldElement)); // wait for old to die
WebElement fresh = driver.findElement(By.id("result")); // re-find

// Fix 2: FluentWait ignoring stale:
Wait&lt;WebDriver&gt; w = new FluentWait&lt;&gt;(driver)
    .withTimeout(Duration.ofSeconds(10))
    .ignoring(StaleElementReferenceException.class);
w.until(d -&gt; { d.findElement(By.id("el")).click(); return true; });

// Fix 3: Store locator, not element — re-find when needed:
By btnLocator = By.id("submit"); // store By, not WebElement
driver.findElement(btnLocator).click(); // always fresh</code></pre>`},
{title:"ElementNotInteractableException — causes and fixes",body:`<pre><code class="language-java">// Caused by: element hidden, covered by overlay, animating, disabled

// Fix 1: Wait for clickable (visible + enabled):
wait.until(EC.elementToBeClickable(By.id("btn"))).click();

// Fix 2: Scroll element into view first:
actions.scrollToElement(element).perform(); // Selenium 4
element.click();

// Fix 3: Close overlay blocking element:
driver.findElement(By.id("cookieBanner")).click(); // dismiss
wait.until(EC.elementToBeClickable(By.id("btn"))).click();

// Fix 4: JS click as last resort (bypasses visibility check):
JavascriptExecutor js = (JavascriptExecutor) driver;
js.executeScript("arguments[0].click()", element);

// Fix 5: Wait for animation to finish before clicking:
Thread.sleep(500); // only as last resort — prefer explicit wait</code></pre>`},
{title:"UnhandledAlertException & NoAlertPresentException",body:`<pre><code class="language-java">// UnhandledAlertException — unexpected alert appeared during action
try {
    driver.findElement(By.id("save")).click();
} catch (UnhandledAlertException e) {
    // Alert appeared! Handle it then continue:
    driver.switchTo().alert().accept();
    System.out.println("Alert text: " + e.getAlertText());
}

// NoAlertPresentException — trying to switch to alert that isn't there
try {
    driver.switchTo().alert().accept();
} catch (NoAlertPresentException e) {
    System.out.println("No alert present — skipping");
}

// BEST: Use explicit wait before alert interaction:
wait.until(EC.alertIsPresent());
driver.switchTo().alert().accept();</code></pre>`},
{title:"TimeoutException, InvalidSelector, SessionNotCreated",body:`<pre><code class="language-java">// TimeoutException — explicit wait condition not met in time
try {
    wait.until(EC.visibilityOfElementLocated(By.id("slowEl")));
} catch (TimeoutException e) {
    ScreenshotUtil.capture(driver, "timeout_failure");
    System.out.println("Page state: " + driver.getPageSource());
}

// InvalidSelectorException — bad XPath/CSS syntax
// WRONG: By.xpath("//div[@class=active]") — missing quotes
// RIGHT: By.xpath("//div[@class='active']")

// SessionNotCreatedException — driver/browser version mismatch
// Fix: Update ChromeDriver to match Chrome browser version
// Or: Let Selenium Manager handle it (Selenium 4.6+)

// ElementClickInterceptedException — click blocked by overlay
try {
    element.click();
} catch (ElementClickInterceptedException e) {
    js.executeScript("arguments[0].click()", element); // JS click
}</code></pre>`}
],
mistakes:[
{bad:"Catching WebDriverException broadly and silently ignoring it",good:"Catch specific exception types (NoSuchElementException, StaleElementReferenceException) — handle each appropriately. Always log exception message and take a screenshot"},
{bad:"Not taking a screenshot before catching exceptions in test teardown",good:"In your exception handler or @AfterMethod, always take screenshot BEFORE calling driver.quit() — once quit() is called you lose the browser state forever"}
],
checklist:["Store By locators not WebElements to avoid StaleElementReference on reuse","NoSuchElementException → check locator in DevTools console first","ElementClickInterceptedException → dismiss overlay, scroll to element, then try again","Always screenshot on TimeoutException — it captures the failing page state","SessionNotCreatedException → version mismatch — let Selenium Manager fix automatically"]

{q:"What are Relative Locators in Selenium 4?",a:"Relative Locators (also called Friendly Locators) allow you to find elements based on their spatial position relative to another element — above, below, toLeftOf, toRightOf, near. They use the W3C WebDriver BiDi protocol under the hood."},
{q:"How does the 'near' relative locator work?",a:"near(element) finds elements within 50px of the specified element in any direction. It's useful for finding unlabeled elements (like inputs without id/name) that are visually close to a labeled element."},
{q:"Can you chain relative locators in Selenium 4?",a:"Yes — relative locators can be chained. Example: withTagName('input').above(submitBtn).toRightOf(label) — find an input that is both above the submit button AND to the right of a label element."}
],

concepts:[
{title:"Relative Locators — syntax and import",body:`<pre><code class="language-java">import static org.openqa.selenium.support.locators.RelativeLocator.with;

// Basic structure:
// with(tagName).direction(referenceElement)

// Example HTML:
// &lt;label&gt;Email&lt;/label&gt;  &lt;input type="email" /&gt;
// &lt;label&gt;Password&lt;/label&gt;  &lt;input type="password" /&gt;
// &lt;button id="submit"&gt;Login&lt;/button&gt;

WebElement emailLabel = driver.findElement(By.xpath("//label[text()='Email']"));

// Find the input to the right of 'Email' label:
WebElement emailInput = driver.findElement(
    with(By.tagName("input")).toRightOf(emailLabel));

emailInput.sendKeys("user@test.com");</code></pre>`},
{title:"above() and below() — vertical positioning",body:`<pre><code class="language-java">WebElement submitBtn = driver.findElement(By.id("submit"));

// Find password input that is ABOVE the submit button:
WebElement passwordField = driver.findElement(
    with(By.tagName("input")).above(submitBtn));
passwordField.sendKeys("Secret123");

// Find element BELOW a specific element:
WebElement header = driver.findElement(By.tagName("h2"));
WebElement firstParagraph = driver.findElement(
    with(By.tagName("p")).below(header));

// Real scenario: form without ids — find inputs by label position
WebElement nameLabel = driver.findElement(
    By.xpath("//label[text()='Full Name']"));
WebElement nameInput = driver.findElement(
    with(By.tagName("input")).toRightOf(nameLabel));
nameInput.sendKeys("John Doe");</code></pre>`},
{title:"near() — proximity-based finding",body:`<pre><code class="language-java">// near() finds elements within 50px of the reference element
WebElement emailLabel = driver.findElement(
    By.xpath("//label[text()='Email']"));

// Find any input near the email label:
WebElement nearInput = driver.findElement(
    with(By.tagName("input")).near(emailLabel));

// near() is useful for:
// - Icon buttons next to text (edit/delete icons in table rows)
// - Inputs that don't have id/name but are next to labeled text
// - Checkboxes next to their label text

WebElement editIcon = driver.findElement(By.id("john-row-label"));
WebElement editBtn = driver.findElement(
    with(By.cssSelector("button.edit-btn")).near(editIcon));
editBtn.click();</code></pre>`},
{title:"Chaining relative locators",body:`<pre><code class="language-java">// Chain multiple relative locators for precision:
WebElement submitBtn = driver.findElement(By.id("submit"));
WebElement sideLabel = driver.findElement(By.id("sideLabel"));

// Find input that is above submit AND to right of sideLabel:
WebElement preciseInput = driver.findElement(
    with(By.tagName("input"))
        .above(submitBtn)
        .toRightOf(sideLabel));

// Real scenario: table row operations
// Find the delete button in the same row as 'John Doe' cell
WebElement johnCell = driver.findElement(
    By.xpath("//td[text()='John Doe']"));
WebElement deleteBtn = driver.findElement(
    with(By.cssSelector("button.delete"))
        .toRightOf(johnCell));
deleteBtn.click();</code></pre>`},
{title:"Relative locators vs XPath axes — when to use each",body:`<pre><code class="language-java">// XPath axes — use for DOM-relationship traversal:
// Find input that is next sibling of label:
driver.findElement(By.xpath(
    "//label[text()='Email']/following-sibling::input"));

// Relative Locators — use for VISUAL/SPATIAL positioning:
// Find input visually to the right of email label:
driver.findElement(
    with(By.tagName("input")).toRightOf(emailLabel));

// Use XPath axes when: elements are DOM siblings/parent/child
// Use Relative Locators when: elements are visually close but
// NOT necessarily DOM siblings (e.g. in separate divs/tables)

// Relative locators use bounding box positions — not DOM tree</code></pre>`}
],
mistakes:[
{bad:"Using near() expecting it to find the closest element — it finds ANY element within 50px",good:"near() finds all elements within 50px and returns the first — if multiple match, specify more constraints. Prefer toRightOf/above with specific tag names"},
{bad:"Relative locators for elements far apart on the page",good:"Relative locators use pixel-based bounding box — elements far apart on the page won't be found by near(). Use standard locators for elements not spatially adjacent"}
],
checklist:["Import: import static RelativeLocator.with — the static import is required","Chain relative locators for precision: with(By.tagName('input')).above(el).toRightOf(label2)","Relative locators are position-based (pixels) not DOM-relationship-based","near() default radius is 50px — cannot be customized in current Selenium 4","Use Relative Locators for unlabeled inputs near labeled text — great for legacy forms"]
},

{q:"What is CDP in Selenium 4?",a:"CDP (Chrome DevTools Protocol) is Chrome's low-level debugging API. Selenium 4 provides direct access to CDP via HasDevTools, allowing tests to intercept network requests, mock geolocation, emulate device, capture console logs, and inject credentials — all without browser extensions."},
{q:"Which Selenium 4 interface gives access to CDP?",a:"ChromeDriver implements HasDevTools which provides driver.getDevTools() — returning a DevTools instance. You open a session with devTools.createSession() then call send(Commands.of(...)) to execute CDP commands."},
{q:"Is CDP support only for Chrome in Selenium 4?",a:"CDP is natively Chrome/Chromium-based. Selenium 4 also supports it for Edge (Chromium-based). Firefox has its own BiDi protocol — not CDP. For cross-browser tests, abstract CDP usage behind a feature flag."}
],

concepts:[
{title:"CDP setup — DevTools session",body:`<pre><code class="language-java">import org.openqa.selenium.chromium.HasCdp;
import org.openqa.selenium.devtools.DevTools;
import org.openqa.selenium.devtools.v120.*; // use version matching Chrome

ChromeDriver driver = new ChromeDriver();
DevTools devTools = driver.getDevTools();
devTools.createSession();

// Alternative using HasCdp (Selenium 4 high-level API):
// Less version-coupling than direct DevTools commands:
HasCdp cdpDriver = (HasCdp) driver;
Map&lt;String, Object&gt; result = cdpDriver.executeCdpCommand(
    "Network.enable", Map.of());

// executeCdpCommand is simpler for one-off CDP calls
// DevTools.send is better for subscribing to events</code></pre>`},
{title:"Network interception — block/mock requests",body:`<pre><code class="language-java">DevTools devTools = ((ChromeDriver)driver).getDevTools();
devTools.createSession();

// Enable network domain:
devTools.send(Network.enable(Optional.empty(), Optional.empty(), Optional.empty()));

// Listen for all network requests:
devTools.addListener(Network.requestWillBeSent(), req -&gt; {
    System.out.println("Request: " + req.getRequest().getUrl());
});

// Block images to speed up tests:
devTools.send(Network.setBlockedURLs(List.of("*.png", "*.jpg", "*.gif")));

// Set custom request headers (e.g. auth token):
devTools.send(Network.setExtraHTTPHeaders(
    new Headers(Map.of("Authorization", "Bearer mytoken123"))));</code></pre>`},
{title:"Geolocation mocking",body:`<pre><code class="language-java">import org.openqa.selenium.devtools.v120.emulation.Emulation;

DevTools devTools = ((ChromeDriver)driver).getDevTools();
devTools.createSession();

// Mock user geolocation to Mumbai, India:
devTools.send(Emulation.setGeolocationOverride(
    Optional.of(19.076),   // latitude
    Optional.of(72.877),   // longitude
    Optional.of(1.0)       // accuracy in meters
));

driver.get("https://maps.google.com");
// Map will show Mumbai location

// Clear geolocation override:
devTools.send(Emulation.clearGeolocationOverride());</code></pre>`},
{title:"Console log capture and Basic Auth",body:`<pre><code class="language-java">// Capture browser console logs via CDP:
DevTools devTools = ((ChromeDriver)driver).getDevTools();
devTools.createSession();
devTools.send(Log.enable());

List&lt;String&gt; consoleLogs = new ArrayList&lt;&gt;();
devTools.addListener(Log.entryAdded(), entry -&gt; {
    consoleLogs.add(entry.getLevel() + ": " + entry.getText());
    System.out.println("Console: " + entry.getText());
});

driver.get("https://app.com");
System.out.println("All logs: " + consoleLogs);

// Basic Authentication via CDP (no popup handling needed):
Predicate&lt;URI&gt; uriPredicate = uri -&gt;
    uri.getHost().contains("app.com");
((HasAuthentication) driver).register(uriPredicate,
    UsernameAndPassword.of("admin", "password123"));</code></pre>`},
{title:"Performance metrics capture",body:`<pre><code class="language-java">import org.openqa.selenium.devtools.v120.performance.Performance;

DevTools devTools = ((ChromeDriver)driver).getDevTools();
devTools.createSession();
devTools.send(Performance.enable(Optional.empty()));

driver.get("https://app.com");

// Get performance metrics:
List&lt;Metric&gt; metrics = devTools.send(Performance.getMetrics());
metrics.forEach(metric -&gt;
    System.out.println(metric.getName() + ": " + metric.getValue()));

// Key metrics to watch:
// TaskDuration — total CPU time for tasks
// JSHeapUsedSize — memory used by JS heap
// Nodes — number of DOM nodes
// Documents — number of documents in page</code></pre>`}
],
mistakes:[
{bad:"Hardcoding devtools.v120 version number in imports",good:"CDP API version must match your Chrome version. Use Version.fromString(((ChromeDriver)driver).getCapabilities().getBrowserVersion()) to get the right version programmatically"},
{bad:"Using CDP for things standard Selenium API already handles",good:"Use CDP only for what WebDriver can't do: network interception, geolocation mock, console logs, performance metrics, auth headers. Don't use CDP just because it exists"}
],
checklist:["Always call devTools.createSession() before any send() call","CDP version number (v120) must match Chrome major version","addListener() subscribes to CDP events — don't forget to remove listeners after test","HasAuthentication.register() handles Basic Auth dialogs — no Alert.accept() needed","executeCdpCommand() on HasCdp interface is simpler for one-off commands without events"]
},

oneliners:[
{q:"What is new about window/tab handling in Selenium 4?",a:"Selenium 4 added driver.switchTo().newWindow(WindowType.TAB) and newWindow(WindowType.WINDOW) — allowing you to programmatically open new tabs and windows without clicking links. Previous Selenium had no built-in API for this."},
{q:"How is newWindow() different from opening a URL in the same tab?",a:"newWindow() opens a completely new browser context (tab or window) and automatically switches to it. The original tab/window remains open. This is essential for testing multi-tab workflows, popup windows, and comparing content across tabs."},
{q:"What is the WindowType enum in Selenium 4?",a:"WindowType is a Selenium 4 enum with two values: WindowType.TAB (opens in new tab, same browser window) and WindowType.WINDOW (opens in a new separate browser window). Both return the new handle after switching."}
],

concepts:[
{title:"newWindow(WindowType.TAB) — open new tab",body:`<pre><code class="language-java">import org.openqa.selenium.WindowType;

// Store original window handle before opening new tab
String originalHandle = driver.getWindowHandle();
System.out.println("Original: " + originalHandle);

driver.get("https://app.com");

// Open NEW TAB and auto-switch to it:
driver.switchTo().newWindow(WindowType.TAB);

// Now in new tab — navigate to different URL:
driver.get("https://app.com/admin");
System.out.println("New tab title: " + driver.getTitle());

// Switch back to original tab:
driver.switchTo().window(originalHandle);
System.out.println("Back to: " + driver.getTitle());</code></pre>`},
{title:"newWindow(WindowType.WINDOW) — open new browser window",body:`<pre><code class="language-java">// Store current handle
String mainWindow = driver.getWindowHandle();

// Open NEW BROWSER WINDOW (separate window, not tab):
driver.switchTo().newWindow(WindowType.WINDOW);

// New window is opened and focused automatically
driver.get("https://admin.app.com");
driver.manage().window().maximize();

// Do work in new window...
String adminData = driver.findElement(By.id("report")).getText();

// Close new window and switch back:
driver.close();                          // close new window
driver.switchTo().window(mainWindow);    // go back to main
System.out.println("Back in main: " + driver.getTitle());</code></pre>`},
{title:"Multi-tab workflow — full scenario",body:`<pre><code class="language-java">// Real scenario: compare prices across 3 tabs
String tab1 = driver.getWindowHandle();
driver.get("https://shop1.com/product/123");
String price1 = driver.findElement(By.id("price")).getText();

// Open tab 2:
driver.switchTo().newWindow(WindowType.TAB);
String tab2 = driver.getWindowHandle();
driver.get("https://shop2.com/product/123");
String price2 = driver.findElement(By.id("price")).getText();

// Open tab 3:
driver.switchTo().newWindow(WindowType.TAB);
driver.get("https://shop3.com/product/123");
String price3 = driver.findElement(By.id("price")).getText();

System.out.println("Shop1: "+price1+" | Shop2: "+price2+" | Shop3: "+price3);

// Switch back to tab 1:
driver.switchTo().window(tab1);</code></pre>`},
{title:"Selenium 3 vs 4 — window tab comparison",body:`<pre><code class="language-java">// SELENIUM 3 — open new tab via JavaScript (workaround):
((JavascriptExecutor) driver).executeScript("window.open()");
Set&lt;String&gt; handles = driver.getWindowHandles();
String newTab = handles.stream()
    .filter(h -&gt; !h.equals(originalHandle))
    .findFirst().orElse("");
driver.switchTo().window(newTab);

// SELENIUM 4 — built-in, clean API:
driver.switchTo().newWindow(WindowType.TAB);  // auto-switches
driver.get("https://newpage.com");

// Selenium 4 also supports getting ALL handles:
Set&lt;String&gt; allHandles = driver.getWindowHandles();
allHandles.forEach(h -&gt; System.out.println("Handle: " + h));</code></pre>`},
{title:"Close specific tab and cleanup all",body:`<pre><code class="language-java">// Clean up — close all tabs except main:
String mainHandle = driver.getWindowHandle();

// Get handles before opening new ones:
driver.switchTo().newWindow(WindowType.TAB);
driver.get("https://extra.com");

// Close current tab (extra.com):
driver.close();                         // closes current tab only
driver.switchTo().window(mainHandle);   // must switch after close!

// Close ALL tabs and quit browser (test teardown):
driver.quit(); // always use quit() in teardown — never close() alone

// Pattern: close tab → switch → continue
// Without switchTo() after close() → NoSuchWindowException</code></pre>`}
],
mistakes:[
{bad:"Calling driver.close() and continuing without driver.switchTo().window(handle)",good:"After close(), driver context is lost — always immediately switchTo() a valid window handle. Test for NoSuchWindowException by wrapping in try-catch if unsure which handle is valid"},
{bad:"Using JS window.open() for new tabs in Selenium 4",good:"Use driver.switchTo().newWindow(WindowType.TAB) — it opens the tab AND auto-switches. JS window.open() requires manual handle detection afterward"}
],
checklist:["newWindow() auto-switches to the new tab/window — no manual switchTo needed","Store original window handle BEFORE calling newWindow()","After driver.close(), ALWAYS switchTo() a remaining valid handle","driver.quit() closes ALL tabs/windows — use only in @After teardown","WindowType.TAB vs WindowType.WINDOW — same content isolation, different UI presentation"]
},

{q:"What is ChromeOptions and what can it configure?",a:"ChromeOptions is the Selenium 4 class for configuring Chrome browser sessions. It supports: command-line arguments (--headless, --window-size), experimental options (excludeSwitches, useAutomationExtension), user preferences (download directory, notifications), and W3C capabilities."},
{q:"How do you run Chrome in headless mode in Selenium 4?",a:"Use options.addArguments('--headless=new') — the new headless mode in Chrome 112+ is more stable and matches headed Chrome behavior. The old --headless flag uses the legacy headless which has rendering differences."},
{q:"What is the difference between addArguments and setExperimentalOption?",a:"addArguments() passes Chrome command-line flags (like --disable-gpu). setExperimentalOption() sets Chrome-specific options not in W3C spec (like 'prefs' for user profile settings and 'excludeSwitches' for disabling Chrome features)."}
],

concepts:[
{title:"ChromeOptions — addArguments complete reference",body:`<pre><code class="language-java">ChromeOptions opts = new ChromeOptions();

// === HEADLESS ===
opts.addArguments("--headless=new");      // new headless (Chrome 112+)

// === REQUIRED FOR LINUX CI ===
opts.addArguments("--no-sandbox");         // required in Docker/root
opts.addArguments("--disable-dev-shm-usage"); // /dev/shm too small
opts.addArguments("--disable-gpu");         // needed in headless

// === WINDOW ===
opts.addArguments("--start-maximized");     // maximize on start
opts.addArguments("--window-size=1920,1080"); // specific size

// === SECURITY / CERTS ===
opts.addArguments("--ignore-certificate-errors"); // ignore SSL errors
opts.addArguments("--allow-insecure-localhost");  // allow http localhost

// === BROWSER MODE ===

{title:"Loading extensions and user profiles",body:`<pre><code class="language-java">ChromeOptions opts = new ChromeOptions();

function buildWidget(){
  const bar=document.getElementById('tabBar2');
  const cont=document.getElementById('sessions2');
  S.forEach((s,i)=>{
    const btn=document.createElement('button');
    btn.className='tab-btn'+(i===0?' active':'');
    btn.textContent=`S${s.id}`;
    btn.title=s.title;
    btn.onclick=()=>activate(i);
    bar.appendChild(btn);
    const div=document.createElement('div');
    div.className='session'+(i===0?' active':'');
    div.innerHTML=buildSession(s,i);
    cont.appendChild(div);
  });
}

function activate(idx){
  document.querySelectorAll('#tabBar2 .tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.querySelectorAll('#sessions2 .session').forEach((s,i)=>s.classList.toggle('active',i===idx));
}

function buildSession(s,i){
  const pills=s.flow.map(f=>`<span class="pill">${f}</span>`).join('');
  const ols=s.oneliners.map(o=>`<div class="oneliner"><strong>Q: ${o.q}</strong><br>${o.a}</div>`).join('');
  const concepts=s.concepts.map(c=>`<div class="card"><div class="card-title"><i class="ti ti-code" aria-hidden="true"></i>${c.title}</div>${c.body}</div>`).join('');
  const mistakes=s.mistakes.map(m=>`<div class="err-row"><div class="err-box bad"><p>Common mistake</p>${m.bad}</div><div class="err-box good"><p>Correct approach</p>${m.good}</div></div>`).join('');
  const checks=s.checklist.map(c=>`<div class="check-item"><i class="ti ti-circle-check" aria-hidden="true"></i><span>${c}</span></div>`).join('');
  return `
    <div class="s-header">
      <span class="badge ${s.bClass}">${s.badge}</span>
      <div class="s-title">Session ${s.id}: ${s.title}</div>
      <div class="s-sub">${s.sub}</div>
    </div>
    <div class="flow-pills">${pills}</div>
    <div class="card"><div class="card-title"><i class="ti ti-message-circle" aria-hidden="true"></i>Interview one-liners</div>${ols}</div>
    <div style="margin:1rem 0">${s.diagram}</div>
    <div class="card-title" style="margin:.5rem 0;font-size:14px"><i class="ti ti-books" aria-hidden="true"></i>&nbsp;Hands-on examples</div>
    ${concepts}
    <div class="card"><div class="card-title"><i class="ti ti-alert-triangle" aria-hidden="true"></i>Mistakes &amp; fixes</div>${mistakes}</div>
    <div class="card"><div class="card-title"><i class="ti ti-checklist" aria-hidden="true"></i>Best practices checklist</div>${checks}</div>
    <div class="nav-bar">
      <button class="nav-btn" onclick="activate(Math.max(0,${i}-1))" ${i===0?'disabled':''}>← Previous</button>
      <span class="prog">${i+1} / ${S.length}</span>
      <button class="nav-btn" onclick="activate(Math.min(${S.length-1},${i}+1))" ${i===S.length-1?'disabled':''}>Next →</button>
    </div>`;
}

buildWidget();
</script>

    <script>
    if (window.Prism) {
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new MutationObserver((mutations) => {
                let needsHighlight = false;
                mutations.forEach(m => {
                    if (m.addedNodes.length) {
                        m.addedNodes.forEach(n => {
                            if (n.nodeName === 'PRE' || n.nodeName === 'CODE') needsHighlight = true;
                            if (n.querySelector && n.querySelector('pre')) needsHighlight = true;
                        });
                    }
                });
                if (needsHighlight) {
                    Prism.highlightAll();
                }
            });
            observer.observe(document.body, { childList: true, subtree: true });
        });
    }
    </script>
