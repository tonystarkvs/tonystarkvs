<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rest-Assured Session 1: CRUD and HTTP Fundamentals — tabbed learning interface</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:transparent}
.prog-bar{display:flex;align-items:center;gap:8px;padding:1rem 0 0.5rem}
.dot{width:10px;height:10px;border-radius:50%;background:var(--color-border-secondary)}
.dot.active{background:#534AB7}
.prog-label{font-size:12px;color:var(--color-text-secondary)}
.tab-row{display:flex;flex-wrap:wrap;gap:6px;padding:0.75rem 0}
.tab-btn{padding:7px 14px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);font-size:13px;cursor:pointer;transition:all 0.15s}
.tab-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.tab-btn.active{background:#534AB7;color:#fff;border-color:#534AB7;font-weight:500}
.tab-btn.intro-btn{background:var(--color-background-secondary);color:var(--color-text-primary)}
.content-area{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.5rem;min-height:420px}
.session-badge{display:inline-block;padding:3px 10px;border-radius:var(--border-radius-md);background:#EEEDFE;color:#3C3489;font-size:12px;font-weight:500;margin-bottom:12px}
.section-title{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px}
.section-sub{font-size:14px;color:var(--color-text-secondary);margin-bottom:1rem;line-height:1.6}
.kc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin:1rem 0}
.kc-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px;border-left:3px solid #534AB7}
.kc-card .label{font-size:12px;color:#534AB7;font-weight:500;margin-bottom:4px}
.kc-card .val{font-size:13px;color:var(--color-text-primary);line-height:1.5}
.code-block{background:#1e1e2e;border-radius:var(--border-radius-md);padding:1rem 1.25rem;font-family:var(--font-mono);font-size:12.5px;line-height:1.7;color:#cdd6f4;overflow-x:auto;margin:12px 0;white-space:pre}
.kw{color:#cba6f7}.str{color:#a6e3a1}.cm{color:#6c7086;font-style:italic}.ann{color:#fab387}.num{color:#f38ba8}.method{color:#89dceb}.cls{color:#f9e2af}
.pill{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:500;margin:2px}
.pill.green{background:#EAF3DE;color:#3B6D11}
.pill.red{background:#FCEBEB;color:#A32D2D}
.pill.blue{background:#E6F1FB;color:#185FA5}
.pill.amber{background:#FAEEDA;color:#854F0B}
.tip-box{background:#FAEEDA;border-left:3px solid #EF9F27;border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;padding:10px 14px;font-size:13px;color:#633806;margin:10px 0;line-height:1.6}
.err-box{background:#FCEBEB;border-left:3px solid #E24B4A;border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;padding:10px 14px;font-size:13px;color:#791F1F;margin:10px 0;line-height:1.6}
.good-box{background:#EAF3DE;border-left:3px solid #639922;border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;padding:10px 14px;font-size:13px;color:#27500A;margin:10px 0;line-height:1.6}
.interview-box{background:#EEEDFE;border-radius:var(--border-radius-md);padding:14px 16px;margin:10px 0}
.interview-box .iq{font-size:13px;color:#3C3489;line-height:1.6;margin-bottom:8px;padding-left:12px;border-left:2px solid #7F77DD}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem;padding-top:1rem;border-top:0.5px solid var(--color-border-tertiary)}
.nav-btn{padding:7px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;cursor:pointer}
.nav-btn.primary{background:#534AB7;color:#fff;border-color:#534AB7}
.nav-btn:disabled{opacity:0.3;cursor:default}
.tab-counter{font-size:12px;color:var(--color-text-secondary)}
.hidden{display:none}
</style>
</head>
<body>
  <h2 class="sr-only">Rest-Assured Session 1: CRUD and HTTP Fundamentals — tabbed learning interface</h2>

<div class="prog-bar">
  <div class="dot active"></div><div class="dot active"></div><div class="dot active"></div><div class="dot active"></div><div class="dot active"></div><div class="dot active"></div>
  <span class="prog-label">Session 1 — CRUD + HTTP Fundamentals</span>
</div>

<div class="tab-row">
  <button class="tab-btn intro-btn" onclick="showTab(0)">Intro</button>
  <button class="tab-btn" onclick="showTab(1)">Session 1</button>
  <button class="tab-btn" onclick="showTab(2)">Session 2</button>
  <button class="tab-btn" onclick="showTab(3)">Session 3</button>
  <button class="tab-btn" onclick="showTab(4)">Session 4</button>
  <button class="tab-btn active" onclick="showTab(5)">Session 5</button>
  <button class="tab-btn" onclick="showTab(6)">Session 6</button>
  <button class="tab-btn" onclick="showTab(7)">Session 7</button>
</div>

<div class="content-area" id="content-area"></div>

<script>
const tabs = [
  {
    label:"Intro",
    badge:"Part 0",
    title:"Introduction & Foundations",
    sub:"REST basics, Maven setup, project structure, and what makes a good API test.",
    keys:[
      {label:"REST Basics",val:"Request/Response anatomy, headers, body, status codes"},
      {label:"API vs UI",val:"Speed, flakiness, cost — why API tests win"},
      {label:"Maven Setup",val:"pom.xml, folder structure, BaseTest class"},
      {label:"Good Test",val:"Status + body + schema + headers + response time"}
    ],
    code:`<span class="cm">// Your first Rest-Assured test</span>
<span class="kw">given</span>()
  .baseUri(<span class="str">"https://reqres.in"</span>)
  .basePath(<span class="str">"/api"</span>)
.<span class="kw">when</span>()
  .get(<span class="str">"/users/2"</span>)
.<span class="kw">then</span>()
  .statusCode(<span class="num">200</span>)
  .body(<span class="str">"data.id"</span>, equalTo(<span class="num">2</span>))
  .body(<span class="str">"data.email"</span>, notNullValue());`,
    tip:"given() = request setup | when() = action | then() = assert. This is BDD style.",
    interview:[
      "🗣 given-when-then maps to arrange-act-assert in BDD style testing.",
      "🗣 API tests sit in the middle of the test pyramid — fast, reliable, high coverage."
    ]
  },
  {
    label:"Session 1",
    badge:"Session 1",
    title:"CRUD + HTTP Methods",
    sub:"Master GET, POST, PUT, DELETE, HEAD, OPTIONS, TRACE, CONNECT with real examples and full validations.",
    keys:[
      {label:"GET",val:"Fetch data — no side effects, idempotent"},
      {label:"POST",val:"Create resource — not idempotent"},
      {label:"PUT",val:"Replace full resource — idempotent"},
      {label:"DELETE",val:"Remove resource — idempotent"},
      {label:"HEAD",val:"Like GET but no body — check metadata"},
      {label:"OPTIONS",val:"Ask server what methods are allowed"},
      {label:"TRACE/CONNECT",val:"Debug echo / HTTPS tunnel (rarely tested)"}
    ],
    code:`<span class="cm">// GET — fetch a user, validate fields + time</span>
<span class="kw">given</span>().spec(requestSpec)
.<span class="kw">when</span>().get(<span class="str">"/users/2"</span>)
.<span class="kw">then</span>()
  .statusCode(<span class="num">200</span>)
  .body(<span class="str">"data.first_name"</span>, equalTo(<span class="str">"Janet"</span>))
  .body(<span class="str">"data.email"</span>, containsString(<span class="str">"@"</span>))
  .time(lessThan(<span class="num">3000L</span>));

<span class="cm">// POST — create user, assert 201 + returned id</span>
<span class="kw">given</span>().spec(requestSpec)
  .body(<span class="str">"{\"name\":\"Neo\",\"job\":\"QA\"}"</span>)
.<span class="kw">when</span>().post(<span class="str">"/users"</span>)
.<span class="kw">then</span>()
  .statusCode(<span class="num">201</span>)
  .body(<span class="str">"id"</span>, notNullValue())
  .body(<span class="str">"name"</span>, equalTo(<span class="str">"Neo"</span>));`,
    tip:"Always assert 201 for POST (not 200). PUT returns 200, DELETE returns 200 or 204.",
    interview:[
      "🗣 PUT replaces the full resource; PATCH updates only specified fields — key difference.",
      "🗣 HEAD is like GET but the server returns only headers — used to check if a resource exists without downloading the body.",
      "🗣 DELETE should return 204 No Content on success, or 200 with a body — both are valid."
    ]
  },
  {
    label:"Session 2",
    badge:"Session 2",
    title:"Params + Headers + JSON Filtering",
    sub:"Query params, path params, multi-value params, dynamic params, and filtering JSON arrays at runtime.",
    keys:[
      {label:"Query Params",val:"?page=2&size=5 — filter/paginate results"},
      {label:"Path Params",val:"/users/{id} — dynamic URL segments"},
      {label:"Multi-value Params",val:"Same key, multiple values"},
      {label:"Dynamic Params",val:"Build params at runtime from maps/variables"},
      {label:"JsonPath",val:"Extract + filter response fields via dot notation"},
      {label:"Filtering",val:"Filter arrays by range (e.g., id 100–300)"}
    ],
    code:`<span class="cm">// Query params — page 2 of users</span>
<span class="kw">given</span>().spec(requestSpec)
  .queryParam(<span class="str">"page"</span>, <span class="num">2</span>)
  .queryParam(<span class="str">"per_page"</span>, <span class="num">3</span>)
.<span class="kw">when</span>().get(<span class="str">"/users"</span>)
.<span class="kw">then</span>()
  .body(<span class="str">"page"</span>, equalTo(<span class="num">2</span>))
  .body(<span class="str">"data.size()"</span>, equalTo(<span class="num">3</span>));

<span class="cm">// Path params — dynamic URL</span>
<span class="kw">given</span>().spec(requestSpec)
  .pathParam(<span class="str">"userId"</span>, <span class="num">3</span>)
.<span class="kw">when</span>().get(<span class="str">"/users/{userId}"</span>)
.<span class="kw">then</span>()
  .body(<span class="str">"data.id"</span>, equalTo(<span class="num">3</span>));

<span class="cm">// JSON filtering — extract IDs in range 1-3</span>
<span class="cls">List</span>&lt;<span class="cls">Integer</span>&gt; ids = <span class="kw">given</span>().spec(requestSpec)
  .<span class="kw">when</span>().get(<span class="str">"/users?page=1"</span>)
  .<span class="kw">then</span>().extract()
  .jsonPath().getList(<span class="str">"data.findAll{it.id<=3}.id"</span>);`,
    tip:"JsonPath Groovy closures like findAll{} let you filter arrays — no need to write manual loops.",
    interview:[
      "🗣 queryParam() appends ?key=value to URL; pathParam() replaces {placeholder} in path.",
      "🗣 JsonPath uses GPath (Groovy) syntax — findAll, find, collect all work like Java streams."
    ]
  },
  {
    label:"Session 3",
    badge:"Session 3",
    title:"Builder Pattern + POJO Serialization",
    sub:"Clean request bodies with Builder pattern, POJO → JSON serialization, JSON → POJO deserialization.",
    keys:[
      {label:"POJO",val:"Plain Old Java Object — maps 1:1 to JSON structure"},
      {label:"Serialization",val:"Java object → JSON string (for request body)"},
      {label:"Deserialization",val:"JSON response → Java object (for assertions)"},
      {label:"Builder Pattern",val:"Fluent, readable way to build request objects"},
      {label:"Lombok",val:"@Builder, @Data — removes boilerplate code"},
      {label:"When to use",val:"POJO for complex, reusable; Map for quick/simple; JsonPath for extraction"}
    ],
    code:`<span class="ann">@Data</span> <span class="ann">@Builder</span>
<span class="kw">public class</span> <span class="cls">UserRequest</span> {
  <span class="kw">private</span> <span class="cls">String</span> name;
  <span class="kw">private</span> <span class="cls">String</span> job;
}

<span class="cm">// Serialization: POJO → JSON body</span>
<span class="cls">UserRequest</span> user = <span class="cls">UserRequest</span>.builder()
  .name(<span class="str">"Trinity"</span>)
  .job(<span class="str">"SDET"</span>)
  .build();

<span class="cls">UserResponse</span> resp = <span class="kw">given</span>().spec(requestSpec)
  .body(user)
.<span class="kw">when</span>().post(<span class="str">"/users"</span>)
.<span class="kw">then</span>()
  .statusCode(<span class="num">201</span>)
  .extract().as(<span class="cls">UserResponse</span>.<span class="kw">class</span>);

<span class="cm">// Deserialization: JSON → POJO</span>
assertThat(resp.getName()).isEqualTo(<span class="str">"Trinity"</span>);`,
    tip:"Use @JsonIgnoreProperties(ignoreUnknown=true) on POJOs — APIs often add new fields that would break your deserialization.",
    interview:[
      "🗣 Serialization = Java → JSON. Deserialization = JSON → Java. Jackson handles both via ObjectMapper.",
      "🗣 Builder pattern prevents telescoping constructors and makes test data setup readable."
    ]
  },
  {
    label:"Session 4",
    badge:"Session 4",
    title:"JSON Schema Validation",
    sub:"Validate the structure and types of API responses — not just values. Essential for contract stability.",
    keys:[
      {label:"JSON Schema",val:"Defines expected structure: fields, types, required keys"},
      {label:"Schema file",val:"Stored in src/test/resources/schemas/"},
      {label:"matchesJsonSchema",val:"Rest-Assured matcher that validates response vs schema"},
      {label:"When to use",val:"After every POST/GET to catch breaking API changes early"},
      {label:"Draft version",val:"Use Draft-07 — best support in Rest-Assured validator"},
      {label:"Maintenance",val:"Version schema files alongside API version changes"}
    ],
    code:`<span class="cm">// user-schema.json (in resources/schemas/)</span>
{
  <span class="str">"$schema"</span>: <span class="str">"http://json-schema.org/draft-07/schema"</span>,
  <span class="str">"type"</span>: <span class="str">"object"</span>,
  <span class="str">"required"</span>: [<span class="str">"data"</span>, <span class="str">"support"</span>],
  <span class="str">"properties"</span>: {
    <span class="str">"data"</span>: {
      <span class="str">"type"</span>: <span class="str">"object"</span>,
      <span class="str">"required"</span>: [<span class="str">"id"</span>, <span class="str">"email"</span>],
      <span class="str">"properties"</span>: {
        <span class="str">"id"</span>: { <span class="str">"type"</span>: <span class="str">"integer"</span> },
        <span class="str">"email"</span>: { <span class="str">"type"</span>: <span class="str">"string"</span>, <span class="str">"format"</span>: <span class="str">"email"</span> }
      }
    }
  }
}

<span class="cm">// In test: validate schema</span>
.<span class="kw">then</span>()
  .body(matchesJsonSchemaInClasspath(
    <span class="str">"schemas/user-schema.json"</span>));`,
    tip:"Schema validation catches type changes (int → string) that value assertions miss. Always include it for critical endpoints.",
    interview:[
      "🗣 JSON Schema validates structure and types; JsonPath validates specific values — use both together.",
      "🗣 Schema validation is the automated equivalent of an API contract review."
    ]
  },
  {
    label:"Session 5",
    badge:"Session 5",
    title:"RequestSpec / ResponseSpec + All Assertions",
    sub:"Build reusable specs, master every assertion type: status, headers, body, time, schema, content-type.",
    keys:[
      {label:"RequestSpecBuilder",val:"Centralize base URL, headers, content-type, auth"},
      {label:"ResponseSpecBuilder",val:"Centralize expected status codes + common assertions"},
      {label:"extract()",val:"Pull out values from response for use in next calls"},
      {label:"Hamcrest Matchers",val:"equalTo, containsString, hasItem, lessThan, not, notNullValue"},
      {label:"Header Assertions",val:"Validate Content-Type, Cache-Control, custom headers"},
      {label:"Response Time",val:".time(lessThan(3000L)) — performance guardrail"}
    ],
    code:`<span class="cm">// Reusable RequestSpec</span>
<span class="cls">RequestSpecification</span> reqSpec =
  <span class="kw">new</span> <span class="cls">RequestSpecBuilder</span>()
    .setBaseUri(<span class="str">"https://reqres.in"</span>)
    .setBasePath(<span class="str">"/api"</span>)
    .setContentType(<span class="cls">ContentType</span>.JSON)
    .addFilter(<span class="kw">new</span> <span class="cls">RequestLoggingFilter</span>())
    .build();

<span class="cm">// Reusable ResponseSpec</span>
<span class="cls">ResponseSpecification</span> resSpec =
  <span class="kw">new</span> <span class="cls">ResponseSpecBuilder</span>()
    .expectStatusCode(<span class="num">200</span>)
    .expectContentType(<span class="cls">ContentType</span>.JSON)
    .expectResponseTime(lessThan(<span class="num">3000L</span>))
    .build();

<span class="cm">// Use both in test</span>
<span class="kw">given</span>().spec(reqSpec)
.<span class="kw">when</span>().get(<span class="str">"/users/2"</span>)
.<span class="kw">then</span>().spec(resSpec)
  .body(<span class="str">"data.id"</span>, equalTo(<span class="num">2</span>))
  .header(<span class="str">"Content-Type"</span>,
    containsString(<span class="str">"application/json"</span>));`,
    tip:"Put common 200+ContentType+time checks in ResponseSpec so every test gets them for free — no copy-paste.",
    interview:[
      "🗣 RequestSpecification centralizes all request setup; ResponseSpecification centralizes all common assertions — DRY principle.",
      "🗣 extract().path('id') pulls a value out of the response to use as input for the next API call in a chain."
    ]
  },
  {
    label:"Session 6",
    badge:"Session 6",
    title:"Contract Testing + Authentication",
    sub:"Schema-based contract testing, Basic Auth, Bearer token extraction and reuse, OAuth2 flow overview.",
    keys:[
      {label:"Contract Testing",val:"Consumer verifies API response matches agreed schema"},
      {label:"Basic Auth",val:"Base64 encoded username:password in Authorization header"},
      {label:"Bearer Token",val:"Extract token from login → inject into next calls"},
      {label:"OAuth2",val:"Client Credentials or Auth Code flow — token from /token endpoint"},
      {label:"preemptive()",val:"Send auth header upfront — don't wait for 401 challenge"},
      {label:"Token reuse",val:"Store token in @BeforeClass, inject via requestSpec"}
    ],
    code:`<span class="cm">// Basic Auth</span>
<span class="kw">given</span>().spec(reqSpec)
  .auth().preemptive()
  .basic(<span class="str">"user"</span>, <span class="str">"pass"</span>)
.<span class="kw">when</span>().get(<span class="str">"/secure/endpoint"</span>)
.<span class="kw">then</span>().statusCode(<span class="num">200</span>);

<span class="cm">// Bearer: extract token from login</span>
<span class="cls">String</span> token = <span class="kw">given</span>().spec(reqSpec)
  .body(<span class="str">"{\"email\":\"eve@reqres.in\",\"password\":\"cityslicka\"}"</span>)
.<span class="kw">when</span>().post(<span class="str">"/login"</span>)
.<span class="kw">then</span>().statusCode(<span class="num">200</span>)
  .extract().path(<span class="str">"token"</span>);

<span class="cm">// Reuse token in next call</span>
<span class="kw">given</span>().spec(reqSpec)
  .header(<span class="str">"Authorization"</span>, <span class="str">"Bearer "</span> + token)
.<span class="kw">when</span>().get(<span class="str">"/users/2"</span>)
.<span class="kw">then</span>().statusCode(<span class="num">200</span>);`,
    tip:"Use preemptive() for Basic Auth — without it, Rest-Assured waits for a 401 challenge first, adding an unnecessary round-trip.",
    interview:[
      "🗣 Bearer token auth: extract token from login response, store it, inject via Authorization header — never hardcode tokens in tests.",
      "🗣 OAuth2 client credentials flow: POST client_id+secret to /token → get access_token → use as Bearer."
    ]
  },
  {
    label:"Session 7",
    badge:"Session 7",
    title:"Reporting + Flaky Tests + CI/CD",
    sub:"Allure reports, test reliability, parallel execution, environment configs, and CI pipeline integration.",
    keys:[
      {label:"Allure Reports",val:"Rich HTML reports with request/response logs per test"},
      {label:"Flaky Tests",val:"Root causes: hardcoded data, timing, shared state, order dependency"},
      {label:"Test Isolation",val:"Each test owns its setup and teardown — no shared mutable state"},
      {label:"Parallel Execution",val:"TestNG parallel='methods' + thread-safe RequestSpec"},
      {label:"Environment Config",val:"Externalize base URLs via .properties or env variables"},
      {label:"CI Pipeline",val:"mvn test → publish Allure report → gate on failure threshold"}
    ],
    code:`<span class="cm">// Allure: attach request/response to report</span>
<span class="ann">@Attachment</span>(value = <span class="str">"Response Body"</span>,
           type = <span class="str">"text/plain"</span>)
<span class="kw">public</span> <span class="cls">String</span> attachResponse(<span class="cls">Response</span> res) {
  <span class="kw">return</span> res.prettyPrint();
}

<span class="cm">// Environment config — no hardcoding</span>
<span class="kw">public class</span> <span class="cls">ConfigManager</span> {
  <span class="kw">private static final</span> <span class="cls">Properties</span> props;
  <span class="kw">static</span> {
    props = <span class="kw">new</span> <span class="cls">Properties</span>();
    props.load(<span class="cls">ClassLoader</span>
      .getSystemResourceAsStream(
        <span class="cls">System</span>.getProperty(<span class="str">"env"</span>,<span class="str">"dev"</span>)
        + <span class="str">".properties"</span>));
  }
  <span class="kw">public static</span> <span class="cls">String</span> get(<span class="cls">String</span> key){
    <span class="kw">return</span> props.getProperty(key);
  }
}`,
    tip:"Run mvn test -Denv=staging to switch environments without changing any test code.",
    interview:[
      "🗣 Flaky tests are caused by hardcoded data, test order dependency, or timing — fix by isolating test data and using proper setup/teardown.",
      "🗣 Allure reports give per-test request/response logs — makes debugging CI failures 10x faster."
    ]
  }
];

let current = 5;

function showTab(idx) {
  current = idx;
  const t = tabs[idx];
  const btns = document.querySelectorAll('.tab-btn');
  btns.forEach((b,i) => {
    b.classList.toggle('active', i === idx);
    if(i===0) b.classList.toggle('intro-btn', i!==idx);
  });
  const kc = t.keys.map(k =>
    `<div class="kc-card"><div class="label">${k.label}</div><div class="val">${k.val}</div></div>`
  ).join('');
  const iq = t.interview.map(q =>
    `<div class="iq">${q}</div>`
  ).join('');
  document.getElementById('content-area').innerHTML = `
    <div class="session-badge">${t.badge}</div>
    <div class="section-title">${t.title}</div>
    <div class="section-sub">${t.sub}</div>
    <div class="kc-grid">${kc}</div>
    <div class="code-block">${t.code}</div>
    <div class="tip-box"><strong>💡 Key insight:</strong> ${t.tip}</div>
    <div class="interview-box">${iq}</div>
    <div class="nav-row">
      <button class="nav-btn" onclick="showTab(${idx-1})" ${idx===0?'disabled':''}>← Previous</button>
      <span class="tab-counter">${idx+1} / ${tabs.length}</span>
      <button class="nav-btn primary" onclick="showTab(${idx+1})" ${idx===tabs.length-1?'disabled':''}>Next →</button>
    </div>
  `;
}

showTab(5);
</script>
</body>
</html>
