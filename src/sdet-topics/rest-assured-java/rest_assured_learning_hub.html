<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --font-sans:'Segoe UI',system-ui,-apple-system,sans-serif;
  --font-mono:'Cascadia Code','Fira Code','Consolas',monospace;
  --color-text-primary:#1a1a2e;
  --color-text-secondary:#555770;
  --color-text-tertiary:#8e90a6;
  --color-text-info:#3B82F6;
  --color-background-primary:#ffffff;
  --color-background-secondary:#f4f4f8;
  --color-background-info:#EFF6FF;
  --color-border-secondary:#d1d1db;
  --color-border-tertiary:#e4e4eb;
  --border-radius-md:8px;
  --border-radius-lg:12px
}

body{font-family:var(--font-sans);background:transparent;color:var(--color-text-primary)}
.hub{max-width:680px;margin:0 auto;padding:1rem 0}

/* Progress bar */
.progress-bar{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:1.5rem}
.progress-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-title{font-size:13px;font-weight:500;color:var(--color-text-secondary)}
.phase-badge{font-size:11px;padding:3px 10px;border-radius:999px;background:var(--color-background-info);color:var(--color-text-info)}
.prog-track{height:6px;background:var(--color-border-tertiary);border-radius:3px;overflow:hidden;margin-bottom:10px}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#534AB7,#1D9E75);transition:width .4s}
.session-dots{display:flex;gap:6px;flex-wrap:wrap}
.dot{width:22px;height:22px;border-radius:50%;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);font-size:10px;font-weight:500;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:var(--color-text-secondary)}
.dot.done{background:#534AB7;border-color:#534AB7;color:#fff}
.dot.active{background:#1D9E75;border-color:#1D9E75;color:#fff;transform:scale(1.15)}

/* Tab nav */
.tab-nav{display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;margin-bottom:1.5rem;scrollbar-width:none}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:6px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-secondary);font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
.tab-btn:hover{background:var(--color-background-primary);color:var(--color-text-primary)}
.tab-btn.active{background:#534AB7;border-color:#534AB7;color:#fff;font-weight:500}
.tab-btn.p2{background:var(--color-background-secondary)}
.tab-btn.p2.active{background:#1D9E75;border-color:#1D9E75}

/* Content cards */
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.session-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.s-p1{background:#EEEDFE;color:#534AB7}
.s-p2{background:#E1F5EE;color:#0F6E56}
.card-title{font-size:16px;font-weight:500}
.card-subtitle{font-size:12px;color:var(--color-text-secondary);margin-top:2px}

/* Section headings */
.sec{margin-bottom:1rem}
.sec-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sec-title i{font-size:14px}

/* Overview */
.overview-text{font-size:14px;line-height:1.7;color:var(--color-text-primary)}
.what-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.what-item{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px;font-size:12px}
.what-item strong{display:block;font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}

/* Interview one-liners */
.oneliner-list{display:flex;flex-direction:column;gap:6px}
.oneliner{background:var(--color-background-secondary);border-left:2px solid #534AB7;border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;padding:8px 12px;font-size:13px;line-height:1.5}

/* Diagram */
.diagram-wrap{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;overflow:hidden}

/* Code blocks */
.code-block{background:#1a1a2e;border-radius:var(--border-radius-md);margin-bottom:10px;overflow:hidden}
.code-header{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#16162a;border-bottom:0.5px solid rgba(255,255,255,.08)}
.code-label{font-size:11px;color:#8888aa;font-family:var(--font-mono)}
.code-badge{font-size:10px;padding:2px 8px;background:rgba(83,74,183,.3);color:#AFA9EC;border-radius:4px}
pre{padding:12px;font-size:11.5px;font-family:var(--font-mono);line-height:1.6;overflow-x:auto;color:#e0e0f0;white-space:pre}
.c-kw{color:#AFA9EC}
.c-str{color:#9FE1CB}
.c-cm{color:#6666aa;font-style:italic}
.c-cls{color:#FAC775}
.c-met{color:#5DCAA5}
.c-num{color:#F0997B}
.c-ann{color:#F4C0D1}

/* Best practices */
.bp-list{display:flex;flex-direction:column;gap:6px}
.bp-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;line-height:1.5;padding:6px 10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md)}
.bp-icon{font-size:14px;color:#1D9E75;flex-shrink:0;margin-top:1px}

/* Q&A */
.qa-list{display:flex;flex-direction:column;gap:8px}
.qa-item{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden}
.qa-q{padding:8px 12px;background:var(--color-background-secondary);font-size:13px;font-weight:500;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px}
.qa-a{padding:8px 12px;font-size:13px;line-height:1.6;color:var(--color-text-secondary);border-top:0.5px solid var(--color-border-tertiary);display:none}
.qa-a.open{display:block}

/* Nav buttons */
.nav-row{display:flex;justify-content:space-between;margin-top:1rem}
button{font-family:var(--font-sans);cursor:pointer;padding:8px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px;transition:all .2s}
button:hover{background:var(--color-background-primary)}
button.primary{background:#534AB7;border-color:#534AB7;color:#fff}
button.primary:hover{background:#3C3489}
button.primary.p2{background:#1D9E75;border-color:#1D9E75}
button.primary.p2:hover{background:#0F6E56}
button:disabled{opacity:.4;cursor:not-allowed}

/* Phase separator */
.phase-sep{text-align:center;padding:8px 0;font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:4px}

.c-purple rect{fill:#EEEDFE;stroke:#AFA9EC;stroke-width:1.5}
.c-teal rect{fill:#E1F5EE;stroke:#5DCAA5;stroke-width:1.5}
.c-amber rect{fill:#FAEEDA;stroke:#EF9F27;stroke-width:1.5}
.c-coral rect{fill:#FAECE7;stroke:#F0997B;stroke-width:1.5}
.c-gray rect{fill:#f4f4f8;stroke:#d1d1db;stroke-width:1.5}
.c-green rect{fill:#EAF3DE;stroke:#97C459;stroke-width:1.5}
svg .th{font-weight:600;fill:var(--color-text-primary);font-family:var(--font-sans);font-size:13px}
svg .ts{font-size:11px;fill:var(--color-text-secondary);font-family:var(--font-sans)}
</style>

<div class="hub">
  <h2 class="sr-only" style="position:absolute;left:-9999px">REST Assured Learning Hub</h2>

  <div class="progress-bar">
    <div class="progress-label">
      <span class="progress-title" id="prog-label">Session 1 of 10 — Phase 1: Fundamentals</span>
      <span class="phase-badge" id="phase-badge">Phase 1</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:10%"></div></div>
    <div class="session-dots" id="dots"></div>
  </div>

  <div class="tab-nav" id="tab-nav"></div>

  <div id="content"></div>

  <div class="nav-row">
    <button id="btn-prev" onclick="navigate(-1)" disabled>← Previous</button>
    <button id="btn-next" class="primary" onclick="navigate(1)">Next session →</button>
  </div>
</div>

<script>
const sessions = [
{
  id:1, phase:1,
  title:"Introduction to APIs & REST",
  subtitle:"What is an API? REST principles, HTTP methods",
  overview:`An <strong>API (Application Programming Interface)</strong> is a set of rules that allows two software applications to talk to each other. Think of it like a waiter in a restaurant — you (client) tell the waiter (API) what you want, the waiter goes to the kitchen (server), and brings back your food (response).<br><br><strong>REST (Representational State Transfer)</strong> is an architectural style for designing networked applications. It uses HTTP protocol and is the most popular way to build web services today.`,
  whatwhy:[
    {k:"What",v:"A standardized way for software systems to communicate over HTTP"},
    {k:"Why",v:"Enables integration between different systems, platforms, and apps"},
    {k:"When",v:"Whenever two systems need to share data or trigger actions"},
    {k:"How",v:"Client sends HTTP request → Server processes → Returns HTTP response"}
  ],
  oneliners:[
    "REST API is a web service that uses HTTP methods like GET, POST, PUT, DELETE to perform CRUD operations.",
    "An API endpoint is a specific URL where an API can be accessed by a client application.",
    "REST is stateless — each request contains all information needed; server stores no session.",
    "HTTP status code 200 means success, 404 means not found, and 500 means server error.",
    "JSON (JavaScript Object Notation) is the most common data format used in REST API responses.",
    "A request has 4 parts: URL, HTTP method, headers, and optionally a body."
  ],
  diagram:`<svg width="100%" viewBox="0 0 680 260" role="img">
    <title>REST API Request-Response Cycle</title>
    <desc>Client sends HTTP request to Server which returns HTTP response</desc>
    <defs><marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
    <g class="c-purple"><rect x="40" y="100" width="140" height="60" rx="8" stroke-width="0.5"/><text class="th" x="110" y="127" text-anchor="middle" dominant-baseline="central">Client</text><text class="ts" x="110" y="147" text-anchor="middle" dominant-baseline="central">Your Test / App</text></g>
    <g class="c-teal"><rect x="270" y="80" width="140" height="100" rx="8" stroke-width="0.5"/><text class="th" x="340" y="117" text-anchor="middle" dominant-baseline="central">REST API</text><text class="ts" x="340" y="137" text-anchor="middle" dominant-baseline="central">Endpoint + Method</text><text class="ts" x="340" y="153" text-anchor="middle" dominant-baseline="central">Headers + Body</text></g>
    <g class="c-amber"><rect x="500" y="100" width="140" height="60" rx="8" stroke-width="0.5"/><text class="th" x="570" y="127" text-anchor="middle" dominant-baseline="central">Server</text><text class="ts" x="570" y="147" text-anchor="middle" dominant-baseline="central">Process + DB</text></g>
    <line x1="180" y1="120" x2="268" y2="120" stroke="var(--color-text-tertiary)" stroke-width="1.5" marker-end="url(#a1)"/>
    <text class="ts" x="224" y="112" text-anchor="middle">HTTP Request</text>
    <line x1="412" y1="145" x2="498" y2="145" stroke="var(--color-text-tertiary)" stroke-width="1.5" marker-end="url(#a1)"/>
    <line x1="498" y1="165" x2="412" y2="165" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#a1)"/>
    <text class="ts" x="224" y="178" text-anchor="middle" fill="#1D9E75">HTTP Response (JSON)</text>
    <line x1="268" y1="165" x2="182" y2="165" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#a1)"/>
    <g class="c-gray"><rect x="40" y="190" width="60" height="24" rx="4" stroke-width="0.5"/><text class="ts" x="70" y="202" text-anchor="middle" dominant-baseline="central">GET</text></g>
    <g class="c-green"><rect x="112" y="190" width="60" height="24" rx="4" stroke-width="0.5"/><text class="ts" x="142" y="202" text-anchor="middle" dominant-baseline="central">POST</text></g>
    <g class="c-amber"><rect x="184" y="190" width="60" height="24" rx="4" stroke-width="0.5"/><text class="ts" x="214" y="202" text-anchor="middle" dominant-baseline="central">PUT</text></g>
    <g class="c-coral"><rect x="256" y="190" width="70" height="24" rx="4" stroke-width="0.5"/><text class="ts" x="291" y="202" text-anchor="middle" dominant-baseline="central">DELETE</text></g>
    <g class="c-purple"><rect x="338" y="190" width="70" height="24" rx="4" stroke-width="0.5"/><text class="ts" x="373" y="202" text-anchor="middle" dominant-baseline="central">PATCH</text></g>
    <text class="ts" x="340" y="240" text-anchor="middle">HTTP Methods — the verbs of REST</text>
  </svg>`,
  codes:[
    {label:"HTTP methods at a glance",badge:"Concept",code:`// ===== HTTP METHODS EXPLAINED =====

// GET  — Retrieve/Read data (no body sent)
// POST — Create new data (body required)  
// PUT  — Update/Replace entire resource
// PATCH — Update part of a resource
// DELETE — Remove a resource

// ===== STATUS CODES YOU MUST KNOW =====
// 200 OK           - Request succeeded
// 201 Created      - New resource created (POST)
// 400 Bad Request  - Client sent invalid data
// 401 Unauthorized - Authentication required
// 403 Forbidden    - Authenticated but no permission
// 404 Not Found    - Resource doesn't exist
// 500 Server Error - Server-side problem`},
    {label:"Sample REST API URL structure",badge:"Concept",code:`// ===== ANATOMY OF A REST API URL =====

// https://api.example.com/v1/users/123/orders?status=active

// https://           — Protocol (always HTTPS in prod)
// api.example.com    — Base URL (domain of the server)
// /v1                — API Version (best practice: version your APIs)
// /users             — Resource name (always plural nouns)
// /123               — Path Parameter (specific user ID)
// /orders            — Sub-resource (orders belonging to user 123)
// ?status=active     — Query Parameter (filter/search)

// KEY RULE: Use NOUNS not VERBS in URLs
// WRONG:  /getUsers   /createUser   /deleteUser
// RIGHT:  GET /users  POST /users   DELETE /users/1`},
    {label:"Understanding JSON — API response format",badge:"Concept",code:`// ===== JSON (JavaScript Object Notation) =====
// JSON is the standard format for REST API data exchange.
// Lightweight, human-readable, language-independent.

// A typical API response looks like this:
{
  "status": "success",           // String value
  "code": 200,                   // Number value  
  "data": {                      // Nested object
    "id": 1,
    "name": "Ravi Kumar",        // Key-value pairs
    "email": "ravi@test.com",
    "isActive": true,            // Boolean value
    "tags": ["qa", "automation"],// Array of strings
    "address": null              // Null value
  }
}

// JSON Data Types: String, Number, Boolean, Object, Array, Null`},
    {label:"HTTP Request structure breakdown",badge:"Concept",code:`// ===== A COMPLETE HTTP REQUEST HAS 4 PARTS =====

// PART 1: Request Line
// Method + URL + HTTP Version
// POST https://api.reqres.in/api/users HTTP/1.1

// PART 2: Request Headers (metadata about the request)
// Content-Type: application/json   — tells server we're sending JSON
// Accept: application/json         — tells server we want JSON back
// Authorization: Bearer <token>    — authentication token
// X-API-Key: your-api-key          — custom API key

// PART 3: Request Body (only for POST, PUT, PATCH)
// {
//   "name": "Ravi",
//   "job": "QA Engineer"
// }

// PART 4: Query Parameters (appended to URL)
// ?page=1&per_page=5&sort=asc
// Used for filtering, pagination, sorting`},
    {label:"HTTP Response structure",badge:"Concept",code:`// ===== HTTP RESPONSE STRUCTURE =====

// PART 1: Status Line
// HTTP/1.1 201 Created   — version + code + text

// PART 2: Response Headers
// Content-Type: application/json
// Content-Length: 148
// X-RateLimit-Remaining: 99

// PART 3: Response Body (what we validate in tests!)
// {
//   "id": 741,
//   "name": "Ravi",
//   "job": "QA Engineer",
//   "createdAt": "2024-01-15T10:30:00Z"  — ISO 8601 timestamp
// }

// AS QA, WE ALWAYS VALIDATE:
// 1. Status code is correct (201 for create)
// 2. Response body contains expected data
// 3. Response time is within acceptable limits (<2000ms)
// 4. Response headers are correct`},
    {label:"REST constraints you must know for interview",badge:"Theory",code:`// ===== 6 CONSTRAINTS OF REST ARCHITECTURE =====

// 1. CLIENT-SERVER SEPARATION
//    UI/client and server are independent — can evolve separately

// 2. STATELESS
//    Server stores NO session — every request is self-contained
//    Good for: scalability, reliability, visibility

// 3. CACHEABLE
//    Responses can be cached to improve performance
//    GET responses are usually cacheable

// 4. UNIFORM INTERFACE
//    Standardized way of communication
//    Use of HTTP methods + standard status codes

// 5. LAYERED SYSTEM  
//    Client can't tell if it's talking to actual server
//    or load balancer/proxy/cache in between

// 6. CODE ON DEMAND (optional)
//    Server can send executable code (like JavaScript) to client`}
  ],
  bestpractices:[
    "Always use HTTPS — never test against HTTP in production environments",
    "Validate status codes before asserting on response body fields",
    "Use meaningful endpoint naming: plural nouns, no verbs (e.g. /users not /getUsers)",
    "Always check Content-Type header — confirms server returned JSON not HTML error page",
    "Version your APIs (/v1/users) to avoid breaking existing test suites",
    "Keep test data isolated — don't depend on data created by other test cases"
  ],
  qa:[
    {q:"Q1: What is the difference between REST and SOAP?",a:"REST is an architectural style using HTTP and JSON/XML. It is lightweight, stateless, and widely used for web APIs. SOAP is a protocol with strict XML messaging, built-in security (WS-Security), and is used in enterprise/banking systems. REST is preferred for modern APIs due to simplicity and speed."},
    {q:"Q2: What does 'stateless' mean in REST?",a:"Stateless means the server does NOT remember any information about previous requests. Every single HTTP request must contain all the information needed to understand and process it — authentication token, parameters, body — everything. This makes REST APIs highly scalable."},
    {q:"Q3: What is the difference between PUT and PATCH?",a:"PUT replaces the ENTIRE resource with the new data you send. If you omit a field, it gets removed. PATCH updates only the SPECIFIC fields you send, leaving other fields unchanged. Use PUT for full updates, PATCH for partial updates."},
    {q:"Q4: What is the difference between path parameter and query parameter?",a:"Path parameter is part of the URL path and identifies a specific resource: /users/123 (123 is path param). Query parameter is appended after ? and used for filtering/sorting: /users?role=admin&page=2. Path params identify WHAT, query params filter/modify HOW."},
    {q:"Q5: What HTTP status code do you expect when creating a resource?",a:"201 Created — this tells the client that a new resource was successfully created on the server. The response body usually contains the created resource with its server-generated ID. Some APIs return 200 OK for all successes — always check the API documentation."}
  ]
},

    <g class="c-gray"><rect x="20" y="20" width="120" height="44" rx="6" stroke-width="0.5"/><text class="th" x="80" y="38" text-anchor="middle" dominant-baseline="central">pom.xml</text><text class="ts" x="80" y="54" text-anchor="middle" dominant-baseline="central">Dependencies</text></g>

    {label:"First Rest Assured test — GET request",badge:"Beginner",code:`// Import statements — these bring in Rest Assured classes
import io.restassured.RestAssured;                    // Main class
import static io.restassured.RestAssured.*;           // For given/when/then
import static org.hamcrest.Matchers.*;                // For assertions like equalTo()
import org.testng.annotations.Test;                   // TestNG @Test annotation

public class FirstApiTest {

    @Test  // This annotation marks this method as a test case
    public void testGetSingleUser() {
        
        given()                               // PRECONDITIONS — set up request
            .baseUri("https://reqres.in")     // Base URL of the API
            .basePath("/api/users/2")         // Specific endpoint path
        
        .when()                               // ACTUAL ACTION — send request
            .get()                            // HTTP GET method
        
        .then()                               // ASSERTIONS — verify response
            .statusCode(200)                  // Assert status is 200 OK
            .body("data.id", equalTo(2))      // Assert id in response = 2
            .body("data.first_name",          // Assert first_name value
                  equalTo("Janet"));           
    }
}`},
    {label:"Base URI setup — best practice",badge:"Setup",code:`// BEST PRACTICE: Set Base URI once in a Base class
// All test classes inherit from this — DRY principle (Don't Repeat Yourself)

import io.restassured.RestAssured;
import org.testng.annotations.BeforeClass;

public class BaseTest {

    @BeforeClass  // Runs ONCE before all tests in this class
    public void setUp() {
        
        // RestAssured.baseURI = sets the base URL for ALL requests
        RestAssured.baseURI = "https://reqres.in";
        
        // RestAssured.basePath = sets a common path prefix
        // Now "/api" is added automatically to all requests
        RestAssured.basePath = "/api";
        
        // RestAssured.port = set if not using default 80/443
        // RestAssured.port = 8080;
    }
}

// Now your test class just extends BaseTest:
// public class UserTest extends BaseTest { ... }`},
    {label:"GET request with query parameters",badge:"Beginner",code:`// Query parameters are filters like ?page=2
// They are added using .queryParam() in Rest Assured

import static io.restassured.RestAssured.*;
import static org.hamcrest.Matchers.*;
import org.testng.annotations.Test;

public class UserListTest extends BaseTest {  // extends our BaseTest

    @Test
    public void testGetUserListPage2() {
        
        given()
            .queryParam("page", 2)         // Adds ?page=2 to the URL
            // Full URL becomes: /api/users?page=2
        
        .when()
            .get("/users")                  // GET /api/users?page=2
        
        .then()
            .statusCode(200)
            .body("page", equalTo(2))       // Verify page number
            .body("data.size()", equalTo(6)); // Verify 6 users returned
            // .size() is a GPath expression — counts array elements
    }
}`},

// Useful when you need to use response values outside of then() chain

import io.restassured.response.Response;  // Import Response class
import static io.restassured.RestAssured.*;
import org.testng.annotations.Test;

public class ResponseObjectTest extends BaseTest {

    @Test
    public void testExtractResponse() {
        
        // Store the response in a Response object
        Response response = given()
            .log().all()
        .when()
            .get("/users/2")
        .then()
            .extract().response();   // .extract().response() stores full response

        String body = response.getBody().asString();    // full JSON as String
        String contentType = response.getContentType(); // "application/json"
        long responseTime = response.getTime();         // time in milliseconds
        
        // Print to console (useful for debugging)

}`}

  qa:[
    {q:"Q1: What is the difference between Rest Assured and Postman?",a:"Postman is a GUI tool for manual API testing — exploratory, quick checks. Rest Assured is a Java library for automated, programmatic API testing integrated into CI/CD pipelines. Postman collections can be exported but are hard to maintain at scale. Rest Assured tests are code — version-controlled, reviewable, and maintainable."},
    {q:"Q2: What is the given/when/then pattern?",a:"It mirrors BDD (Behavior-Driven Development). 'given()' sets up preconditions (headers, auth, body). 'when()' performs the action (GET, POST). 'then()' asserts the outcome (status code, body fields). This structure makes tests readable as plain English specifications."},
    {q:"Q3: What is Maven and why do we use it for Rest Assured?",a:"Maven is a Java build tool that manages project dependencies automatically. Instead of manually downloading jar files, you add a dependency in pom.xml and Maven downloads it from the Maven Central repository. It also compiles code, runs tests, and packages applications."},
    {q:"Q4: What is RestAssured.baseURI?",a:"It is a static variable in the RestAssured class that sets the default base URL for all HTTP requests in your test session. Setting it once in a @BeforeClass method means every request automatically uses that URL — you only specify the endpoint path. It follows the DRY principle."},
    {q:"Q5: How do you run Rest Assured tests?",a:"Rest Assured tests are run using TestNG or JUnit as the test runner — either via IDE (right-click → Run), Maven command (mvn test), or CI pipeline (Jenkins/GitHub Actions triggers mvn test). Rest Assured itself doesn't run tests; it only makes HTTP calls and assertions."}
  ]
},

    {label:"Status code and header assertions",badge:"Core",code:`import static io.restassured.RestAssured.*;
import static org.hamcrest.Matchers.*;
import org.testng.annotations.Test;

public class AssertionTest extends BaseTest {

    @Test
    public void testStatusAndHeaderAssertions() {
        
        given().log().all()
        .when()
            .get("/users/2")
        .then()
            // STATUS CODE assertions
            .statusCode(200)                  // exact match
            .statusCode(not(404))             // NOT 404
            
            // HEADER assertions
            .header("Content-Type",           // header name
                    containsString("application/json"))  // header value check
            .header("Content-Type", notNullValue()) // must not be null
            
            // RESPONSE TIME assertion
            .time(lessThan(3000L));   // response < 3000 milliseconds
            // L after number = Java long type (required for .time())
    }
}`},

import static io.restassured.RestAssured.*;

public class BodyAssertionTest extends BaseTest {

    @Test

                  equalTo("janet.weaver@reqres.in"))

    {label:"Array assertions — hasItems, size",badge:"Core",code:`// JSON array example:
// { "data": [ {"id":1,"email":"a@b.com"}, {"id":2,"email":"c@d.com"} ] }

import static io.restassured.RestAssured.*;
import static org.hamcrest.Matchers.*;

public class ArrayAssertionTest extends BaseTest {

    @Test
    public void testArrayAssertions() {
        
        given().queryParam("page", 1)
        .when()
            .get("/users")
        .then()
            .statusCode(200)
            
            // SIZE assertions on arrays
            .body("data", hasSize(6))              // array has exactly 6 items
            .body("data.size()", equalTo(6))        // alternative syntax
            
            // CHECK specific value exists in array
            .body("data.id",                       // get all 'id' values as list
                  hasItems(1, 2, 3))               // list contains 1, 2, AND 3
            
            // CHECK first element
            .body("data[0].id", equalTo(1))        // [0] = first element (0-indexed)
            .body("data[0].email",
                  equalTo("george.bluth@reqres.in"))
            
            // NOT empty assertion
            .body("data", not(empty()));            // array must not be empty
    }
}`},
    {label:"Numeric comparisons — greaterThan, lessThan",badge:"Core",code:`// Numeric matchers for IDs, counts, response times

import static io.restassured.RestAssured.*;
import static org.hamcrest.Matchers.*;

public class NumericAssertionTest extends BaseTest {

    @Test
    public void testNumericAssertions() {
        
        given().when().get("/users")
        .then()
            .statusCode(200)
            
            // NUMERIC comparisons on response values
            .body("total",       greaterThan(0))       // total > 0
            .body("total",       lessThan(100))        // total < 100
            .body("total_pages", greaterThanOrEqualTo(1)) // >= 1
            .body("per_page",    equalTo(6))           // exact = 6
            
            // RANGE check
            .body("page", allOf(
                greaterThanOrEqualTo(1),    // allOf = AND condition
                lessThanOrEqualTo(10)       // page >= 1 AND page <= 10
            ))
            
            // RESPONSE TIME in milliseconds
            .time(lessThan(5000L));         // must respond within 5 seconds
    }
}`},
    {label:"Multiple assertions in one test",badge:"Intermediate",code:`// Real-world test: assert multiple aspects in one test

import static io.restassured.RestAssured.*;
import static org.hamcrest.Matchers.*;
import org.testng.annotations.Test;

public class ComprehensiveAssertionTest extends BaseTest {

    @Test
    public void testCompleteUserValidation() {
        
        given()
            .log().ifValidationFails()   // only log if test fails
        .when()
            .get("/users/2")
        .then()
            // STATUS
            .statusCode(200)
            
            // HEADER validation
            .contentType("application/json; charset=utf-8")
            
            // BODY — field existence (not null means field exists)
            .body("data.id",          notNullValue())
            .body("data.email",       notNullValue())
            .body("data.first_name",  notNullValue())
            .body("data.avatar",      notNullValue())
            
            // BODY — exact values
            .body("data.id",          equalTo(2))
            .body("data.first_name",  equalTo("Janet"))
            
            // BODY — string patterns
            .body("data.email",       containsString("@"))  // valid email has @
            .body("data.avatar",      startsWith("https")); // avatar is HTTPS URL
    }
}`},
    {label:"Soft assertions with TestNG",badge:"Advanced",code:`// PROBLEM with hard assertions: test stops at FIRST failure
// SOLUTION: Soft assertions collect ALL failures, report at end

import io.restassured.response.Response;
import static io.restassured.RestAssured.*;
import org.testng.annotations.Test;
import org.testng.asserts.SoftAssert;  // TestNG SoftAssert class

public class SoftAssertionTest extends BaseTest {

    @Test
    public void testWithSoftAssertions() {
        
        // Extract response to a Response object
        Response response = when().get("/users/2")
                                  .then().extract().response();
        
        SoftAssert softAssert = new SoftAssert(); // create SoftAssert instance
        
        // These WON'T stop the test on failure — all execute
        softAssert.assertEquals(response.statusCode(), 200,
                "Status code mismatch");
        
        softAssert.assertEquals(response.jsonPath().getString("data.first_name"),
                "Janet", "First name mismatch");
        
        softAssert.assertNotNull(response.jsonPath().getString("data.email"),
                "Email should not be null");
        
        softAssert.assertTrue(response.time() < 3000,
                "Response too slow: " + response.time() + "ms");
        
        softAssert.assertAll(); // MUST CALL: reports ALL failures at once
    }
}`}

  qa:[
    {q:"Q1: What is the difference between equalTo() and containsString()?",a:"equalTo() performs an exact full-string match — the value must be identical. containsString() checks if the string CONTAINS the given substring anywhere within it. Use equalTo for IDs and exact values, containsString for URLs, messages, or partial validation."},
    {q:"Q2: What is GPath in Rest Assured?",a:"GPath (Groovy Path) is the expression language used in Rest Assured's .body() method to navigate JSON structure. It uses dot notation for objects (data.id) and bracket notation for arrays (data[0].name). It's similar to JSONPath but is Groovy-native and built into Rest Assured."},
    {q:"Q3: What is the difference between hard assertion and soft assertion?",a:"Hard assertion (default) stops test execution immediately on first failure. Soft assertion (SoftAssert) continues executing all assertions and reports ALL failures at the end. Use soft assertions when validating multiple independent fields — you get a complete picture of what failed."},
    {q:"Q4: How do you validate that a field exists in the JSON response?",a:"Use notNullValue() matcher: .body('data.id', notNullValue()). This checks that the field is present AND not null. Alternatively, use hasKey() from Hamcrest or extract the value and check in code. Simply not being null indicates the field was present in the JSON."},
    {q:"Q5: How do you assert a JSON array is not empty?",a:"Use not(empty()): .body('data', not(empty())). This asserts the array has at least one element. For exact size, use hasSize(n). For minimum size, use hasSize(greaterThan(0)). Always validate both that data exists and contains expected values."}
  ]
},
{
  id:4, phase:1,
  title:"POST, PUT, DELETE Requests",

  overview:`While GET retrieves data, <strong>POST, PUT, PATCH, and DELETE</strong> modify data on the server. These are the create, update, and delete operations in <strong>CRUD (Create, Read, Update, Delete)</strong>.<br><br>For these requests, you send a <strong>request body</strong> — typically JSON — along with your request. Rest Assured provides <code>.body()</code> in the <code>given()</code> block to attach the request body.`,

    {k:"What",v:"HTTP methods that modify server-side resources — create, update, delete"},
    {k:"Why",v:"Most real applications need CRUD — testing only GET is incomplete API coverage"},
    {k:"When",v:"POST for new resources, PUT/PATCH for updates, DELETE for removal"},
    {k:"How",v:"Set Content-Type header, pass JSON body using .body() in given() block"}
  ],
  oneliners:[
    "POST request creates a new resource — server returns 201 Created with the new resource's ID.",
    "PUT replaces the entire resource, PATCH updates only specified fields — both return 200 OK.",
    "DELETE request removes a resource — server returns 204 No Content (empty body).",
    "The Content-Type header tells the server what format the request body is in (application/json).",
    "We use .contentType(ContentType.JSON) in Rest Assured to set the Content-Type header automatically.",
    "The request body is attached using .body(jsonString) or .body(pojoObject) in the given() block."

import io.restassured.http.ContentType;
import io.restassured.response.Response;
import static io.restassured.RestAssured.*;
import static org.hamcrest.Matchers.*;
import org.testng.annotations.Test;

public class CrudFlowTest extends BaseTest {

    @Test
    public void testCompleteUserCrudFlow() {
        
        // STEP 1: CREATE
        Response createResponse = given()
            .contentType(ContentType.JSON)
            .body("{\\"name\\":\\"Test User\\",\\"job\\":\\"Tester\\"}")
        .when()
            .post("/users")
        .then()
            .statusCode(201)
            .extract().response();          // extract to use ID for next steps
        
        String userId = createResponse.jsonPath().getString("id");
        System.out.println("Created user with ID: " + userId);
        
        // STEP 2: UPDATE (using ID from create response)
        given()
            .contentType(ContentType.JSON)
            .body("{\\"name\\":\\"Updated User\\",\\"job\\":\\"Sr Tester\\"}")
        .when()
            .put("/users/" + userId)        // use dynamic ID
        .then()
            .statusCode(200)
            .body("name", equalTo("Updated User"));
        
        // STEP 3: DELETE
        when().delete("/users/" + userId)
              .then().statusCode(204);
        
        System.out.println("CRUD flow completed successfully!");
    }
}`}

  qa:[
    {q:"Q1: What is the difference between 200 and 201 status codes?",a:"200 OK means the request succeeded and a response body is returned (typically for GET, PUT, PATCH). 201 Created specifically means a new resource was created on the server (POST), and the response usually contains the new resource. Returning 200 for POST is technically incorrect per HTTP standards, though some APIs do it."},
    {q:"Q2: How do you send a JSON request body in Rest Assured?",a:"Use .body() in the given() block combined with .contentType(ContentType.JSON). The body can be a JSON string, a Java HashMap (auto-serialized), or a POJO object (with Jackson/Gson library). ContentType.JSON automatically sets the Content-Type: application/json header."},
    {q:"Q3: Why does DELETE return 204 and not 200?",a:"204 No Content means the request succeeded but there is intentionally nothing to return in the response body — the resource was deleted so there's nothing to show. 200 would imply a response body. 204 is the correct HTTP semantic for successful deletion."},
    {q:"Q4: What is the difference between PUT and PATCH?",a:"PUT replaces the entire resource — you must send all fields. Missing fields are removed or reset. PATCH is a partial update — you only send the fields you want to change, other fields remain intact. PUT is idempotent (same result every time), PATCH may or may not be."},
    {q:"Q5: How do you chain multiple API calls in one test?",a:"Extract the Response object from the first call (.then().extract().response()), use response.jsonPath().getString('id') to get values, then pass them as path parameters or body fields in the next API call. This creates dependent test flows like Create → Update → Delete."}

    {label:"Basic Authentication",badge:"Auth",code:`// BASIC AUTH — simplest form
// Encodes "username:password" as Base64 and sends in Authorization header
// Format: Authorization: Basic dXNlcjpwYXNz

import static io.restassured.RestAssured.*;
import static org.hamcrest.Matchers.*;
import io.restassured.authentication.BasicAuthScheme;

public class BasicAuthTest extends BaseTest {

    @Test
    public void testWithBasicAuth() {
        
        given()
            // METHOD 1: .auth().basic() — Rest Assured handles Base64 encoding
            .auth().basic("username", "password")   // auto-encodes credentials
            // This adds: Authorization: Basic dXNlcm5hbWU6cGFzc3dvcmQ=
        
        .when()
            .get("/protected-resource")
        
        .then()
            .statusCode(200);   // Should NOT be 401 anymore
    }
    
    @Test
    public void testWithPreemptiveBasicAuth() {
        given()
            // Preemptive: sends auth on FIRST request (don't wait for 401 challenge)
            .auth().preemptive().basic("username", "password")
        .when()
            .get("/protected-resource")
        .then()
            .statusCode(200);
    }
}`},

import static io.restassured.RestAssured.*;
import static org.hamcrest.Matchers.*;

public class BearerTokenTest extends BaseTest {

    @Test
    public void testWithBearerToken_Method1() {
        given()
            // METHOD 1: .auth().oauth2() — Rest Assured adds "Bearer " prefix
            .auth().oauth2(token)   // adds: Authorization: Bearer <token>
        
        .when()
            .get("/api/secure/data")
        .then()
            .statusCode(200);
    }
    
    @Test
    public void testWithBearerToken_Method2() {
        given()
            // METHOD 2: Manual header — more explicit control
            .header("Authorization", "Bearer " + token)
            // You manually prefix "Bearer " before the token
        
        .when()
            .get("/api/secure/data")
        .then()
            .statusCode(200);
    }
}`},

    {label:"Get token from login API — OAuth 2.0 flow",badge:"Advanced",code:`// REAL WORLD: First call login API → get token → use in subsequent calls
// This is the standard OAuth 2.0 flow you'll see in real projects

import io.restassured.response.Response;
import static io.restassured.RestAssured.*;
import static org.hamcrest.Matchers.*;
import org.testng.annotations.BeforeClass;
import org.testng.annotations.Test;

public class OAuthFlowTest extends BaseTest {

    private String authToken;  // Store token for all tests in this class
    
    @BeforeClass  // Runs before all tests — log in once, reuse token
    public void getAuthToken() {
        
        Response loginResponse = given()
            .contentType("application/json")
            .body("{\\"email\\":\\"eve.holt@reqres.in\\",\\"password\\":\\"cityslicka\\"}")
        .when()
            .post("/login")          // Call the login/token endpoint
        .then()
            .statusCode(200)
            .extract().response();   // Extract to get token
        
        // Extract token from login response
        authToken = loginResponse.jsonPath().getString("token");
        // jsonPath().getString("token") — reads "token" field from response JSON
        System.out.println("Got auth token: " + authToken);
    }
    
    @Test
    public void testProtectedEndpointWithToken() {
        given()
            .header("Authorization", "Bearer " + authToken)  // use stored token
        .when()
            .get("/users")          // Now accessing protected resource
        .then()
            .statusCode(200);
    }
}`},

// Avoids repeating auth + headers in every single test

import io.restassured.builder.RequestSpecBuilder;    // Builder pattern
import io.restassured.specification.RequestSpecification;
import io.restassured.http.ContentType;
import static io.restassured.RestAssured.*;
import org.testng.annotations.BeforeClass;
import org.testng.annotations.Test;

public class RequestSpecTest {

    private RequestSpecification requestSpec;  // shared spec object
    
    @BeforeClass
    public void buildRequestSpec() {
        // Build a reusable specification with all common settings
        requestSpec = new RequestSpecBuilder()
            .setBaseUri("https://reqres.in")    // base URL
            .setBasePath("/api")                // base path
            .setContentType(ContentType.JSON)   // default content type
            .addHeader("Authorization",         // default auth header
                       "Bearer my-token")
            .addHeader("Accept", "application/json")
            .build();                           // build() creates the spec
    }
    
    @Test
    public void testGetUsersWithSpec() {
        given()
            .spec(requestSpec)      // apply the spec — all settings applied!
            // No need to repeat auth/headers here
        .when()
            .get("/users")
        .then()
            .statusCode(200);
    }
}`},

  qa:[
    {q:"Q1: What is the difference between 401 and 403 status codes?",a:"401 Unauthorized means authentication failed or is missing — you haven't proven who you are yet. 403 Forbidden means you are authenticated (the server knows who you are) but you don't have permission to access that specific resource. Test both scenarios in security testing."},
    {q:"Q2: How does Bearer Token authentication work?",a:"You first call a login/token endpoint with credentials, which returns a JWT (JSON Web Token). You then include this token in every subsequent request's Authorization header as 'Authorization: Bearer <token>'. The server validates the token signature to authenticate you without needing credentials again."},
    {q:"Q3: What is a JWT token?",a:"JWT (JSON Web Token) is a compact, self-contained token with three Base64-encoded parts: Header (algorithm type), Payload (user data/claims like user ID, role, expiry), and Signature (for verification). It's stateless — the server can validate it without database lookup, which makes it ideal for scalable APIs."},
    {q:"Q4: What is a RequestSpecification in Rest Assured?",a:"RequestSpecification is a reusable specification object built using RequestSpecBuilder. It contains common settings like base URI, base path, headers, auth, and content type. You build it once in @BeforeClass and apply it using .given().spec(requestSpec) in every test, avoiding repetition."},
    {q:"Q5: How do you handle token expiry in automated tests?",a:"Best approach: implement token refresh logic in a utility class. Check if the stored token is expired (JWT has an 'exp' claim) before each test, and request a new one if needed. For test suites, get a fresh token in @BeforeSuite. Never hardcode tokens — they expire and will break tests silently."}

    {label:"Basic JsonPath extraction",badge:"Core",code:`import io.restassured.response.Response;
import io.restassured.path.json.JsonPath; // JsonPath class
import static io.restassured.RestAssured.*;
import org.testng.annotations.Test;

public class JsonPathExtractionTest extends BaseTest {

    @Test
    public void testBasicExtraction() {
        
        // METHOD 1: Extract during the chain using .extract().path()
        String email = given()
            .when().get("/users/2")
            .then().statusCode(200)
            .extract().path("data.email");  // directly extract one field
        
        System.out.println("Extracted email: " + email);
        
        // METHOD 2: Extract full Response, then use jsonPath()
        Response response = when().get("/users/2")
                                  .then().extract().response();
        
        JsonPath jsonPath = response.jsonPath(); // create JsonPath object once
        
        // Now extract multiple fields efficiently
        int id            = jsonPath.getInt("data.id");          // Integer
        String firstName  = jsonPath.getString("data.first_name"); // String
        String lastName   = jsonPath.getString("data.last_name");
        String avatar     = jsonPath.getString("data.avatar");
        
        System.out.println("ID: " + id + ", Name: " + firstName + " " + lastName);
        System.out.println("Avatar: " + avatar);
    }
}`},

    {label:"Filtering with findAll and find",badge:"Intermediate",code:`import io.restassured.response.Response;
import io.restassured.path.json.JsonPath;
import java.util.List;
import static io.restassured.RestAssured.*;

public class FilterExtractionTest extends BaseTest {

    @Test
    public void testFilterWithFindAll() {
        
        Response response = when().get("/users").then().extract().response();
        JsonPath jp = response.jsonPath();
        
        // findAll{} — Groovy closure to filter array elements
        // Returns all users where id > 3
        List<String> filteredEmails = jp.getList(
            "data.findAll{it.id > 3}.email"
            // it = each element in the array (Groovy convention)
            // Returns emails of users where id > 3
        );
        System.out.println("Emails of users with id > 3: " + filteredEmails);
        
        // find{} — returns FIRST matching element
        String firstEmail = jp.getString(
            "data.find{it.id == 2}.email"  // find user where id equals 2
        );
        System.out.println("Email of user with id=2: " + firstEmail);
        
        // Nested field filter
        List<Integer> ids = jp.getList(
            "data.findAll{it.email.contains('@reqres')}.id"
        );
        System.out.println("IDs with reqres email: " + ids);
    }
}`},

import io.restassured.response.Response;

import org.testng.annotations.Test;

public class ExtractAndReuseTest extends BaseTest {

    @Test
    public void testCreateThenGetUser() {
        
        // STEP 1: Create a user, extract the generated ID
        String requestBody = "{\\"name\\":\\"Ankit Test\\",\\"job\\":\\"SDET\\"}";
        
        Response createResponse = given()
            .contentType("application/json")
            .body(requestBody)
        .when()
            .post("/users")
        .then()
            .statusCode(201)
            .extract().response();
        
        // Extract ID from create response
        String createdId = createResponse.jsonPath().getString("id");
        System.out.println("Created User ID: " + createdId);
        
        // STEP 2: Use extracted ID to verify (GET the created user)
        // NOTE: reqres.in is a mock API so it won't actually store it
        // In real APIs, you'd do:
        given()
        .when()
            .get("/users/" + createdId)    // use extracted ID
        .then()
            .log().ifValidationFails();
            // In real API: .statusCode(200).body("id", equalTo(createdId))

    }

    {q:"Q1: What is the difference between .extract().path() and .extract().response().jsonPath()?",a:".extract().path('field') is a shortcut to extract ONE specific field directly. .extract().response() gets the full Response object, then .jsonPath() lets you extract MULTIPLE fields efficiently. For single field, use path(). For multiple fields or reuse, use response().jsonPath()."},
    {q:"Q2: How do you extract a value from a JSON array?",a:"Use bracket index notation: jsonPath.getString('data[0].email') gets the first element's email. For all values, use jsonPath.getList('data.email') which returns a List<String>. For filtering, use findAll{}: jsonPath.getList('data.findAll{it.id > 2}.email')."},
    {q:"Q3: What is a POJO and why use it for extraction?",a:"POJO (Plain Old Java Object) is a simple Java class with fields matching JSON keys and getters/setters. Instead of navigating with string paths (error-prone), you map JSON directly to a Java object. Benefits: compile-time type checking, IDE autocomplete, easier to refactor when API changes."},
    {q:"Q4: How do you extract and use values across multiple test steps?",a:"Store extracted values in instance variables (private String token) or local variables within the test method. In @BeforeClass, extract auth tokens. Within a test, extract the ID from a POST response and pass it to a subsequent GET/DELETE call: get('/users/' + extractedId)."},
    {q:"Q5: What is the difference between getList() and getMap() in JsonPath?",a:"getList('path') returns a Java List of array elements — use when the JsonPath points to a JSON array. getMap('path') returns a Java Map (key-value pairs) — use when the path points to a JSON object. Using the wrong one throws a ClassCastException."}

    {label:"BaseTest class — foundation of the framework",badge:"Framework",code:`// BaseTest.java — the parent class ALL test classes extend
// Centralizes setup, teardown, and configuration

import io.restassured.RestAssured;
import io.restassured.builder.RequestSpecBuilder;
import io.restassured.builder.ResponseSpecBuilder;
import io.restassured.specification.RequestSpecification;
import io.restassured.specification.ResponseSpecification;
import io.restassured.http.ContentType;
import org.testng.annotations.*;

public class BaseTest {
    
    // Shared specifications — built once, used everywhere
    protected static RequestSpecification requestSpec;
    protected static ResponseSpecification responseSpec;
    
    @BeforeSuite  // Runs ONCE at the start of the entire test suite
    public void globalSetup() {
        System.out.println("=== Test Suite Starting ===");
    }
    
    @BeforeClass  // Runs once before each test class
    public void setup() {
        // Build the reusable request spec
        requestSpec = new RequestSpecBuilder()
            .setBaseUri("https://reqres.in")
            .setBasePath("/api")
            .setContentType(ContentType.JSON)
            .addHeader("Accept", "application/json")
            .build();
        
        // Build the reusable response spec (common assertions)
        responseSpec = new ResponseSpecBuilder()
            .expectResponseTime(lessThan(3000L))  // all responses < 3s
            .expectContentType(ContentType.JSON)   // all responses JSON
            .build();
    }
    
    @AfterMethod  // Runs after EACH test method
    public void cleanup() {
        RestAssured.reset();  // reset any test-specific config
    }
}`},
    {label:"Data Provider — Data Driven Testing",badge:"DDT",code:`// @DataProvider feeds multiple datasets to one @Test method
// Same test logic runs with different inputs — efficient and clean

import org.testng.annotations.DataProvider;
import org.testng.annotations.Test;
import static io.restassured.RestAssured.*;
import static org.hamcrest.Matchers.*;

public class DataDrivenTest extends BaseTest {
    
    // @DataProvider method returns Object[][] (2D array)
    // Each inner array = one set of test data (one test run)
    @DataProvider(name = "validUserIds")
    public Object[][] validUserIds() {
        return new Object[][] {
            {1},   // test with user id = 1
            {2},   // test with user id = 2
            {3},   // test with user id = 3
            {4},   // test with user id = 4
            {5},   // test with user id = 5
            {6}    // test with user id = 6
            // This test will run 6 times automatically
        };
    }
    
    // dataProvider = "validUserIds" — connects test to the data provider
    @Test(dataProvider = "validUserIds")
    public void testGetUserById(int userId) {  // param matches data type
        
        given().spec(requestSpec)
        .when()
            .get("/users/" + userId)     // userId changes each run
        .then()
            .statusCode(200)
            .body("data.id", equalTo(userId));  // id in response should match
    }
}`},

    {label:"Test Groups — smoke, regression, sanity",badge:"Organization",code:`// @Test groups let you selectively run tests in CI
// Run only 'smoke' for quick validation, 'regression' for full suite

import org.testng.annotations.Test;
import static io.restassured.RestAssured.*;
import static org.hamcrest.Matchers.*;

public class GroupedTests extends BaseTest {
    
    // SMOKE tests: quick, critical path tests
    // Run after every deployment to verify basic functionality
    @Test(groups = {"smoke", "regression"},
          description = "Verify user list endpoint is reachable")
    public void testGetUserListIsReachable() {
        given().spec(requestSpec)
        .when().get("/users")
        .then().statusCode(200);
    }
    
    // REGRESSION tests: comprehensive tests, run daily or on release
    @Test(groups = {"regression"},
          description = "Verify all fields in user response")
    public void testUserResponseStructure() {
        given().spec(requestSpec)
        .when().get("/users/1")
        .then()
            .statusCode(200)
            .body("data.id",          notNullValue())
            .body("data.email",       notNullValue())
            .body("data.first_name",  notNullValue());
    }
    
    // NEGATIVE tests: validate error handling
    @Test(groups = {"regression", "negative"},
          description = "Verify 404 for non-existent user")
    public void testGetNonExistentUser() {
        given().spec(requestSpec)
        .when().get("/users/9999")    // ID that doesn't exist
        .then().statusCode(404);
    }
}`},
    {label:"TestNG XML config — run specific groups",badge:"Config",code:`<!--  testng.xml — controls which tests/groups to run  -->
<!--  Place in: src/test/resources/testng.xml          -->

<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE suite SYSTEM "http://testng.org/testng-1.0.dtd">

<suite name="API Regression Suite" verbose="2" parallel="false">
    
    <test name="Smoke Tests">
        <!-- Run only tests belonging to 'smoke' group -->
        <groups>
            <run>
                <include name="smoke"/>  <!-- include smoke group -->
            </run>
        </groups>
        <classes>
            <class name="tests.GroupedTests"/>
            <class name="tests.UserTest"/>
        </classes>
    </test>
    
    <test name="Full Regression">
        <groups>
            <run>
                <include name="regression"/>
                <exclude name="skip"/>   <!-- exclude tests marked as skip -->
            </run>

    {label:"JSON Schema file — define the contract",badge:"Setup",code:`// File: src/test/resources/schemas/user-schema.json
// This file defines what the API response MUST look like

/*
{
  "$schema": "http://json-schema.org/draft-07/schema#",
  "title": "User Response Schema",
  "type": "object",                    — root must be an object
  "required": ["data", "support"],     — these fields MUST exist
  "properties": {
    "data": {
      "type": "object",
      "required": ["id", "email", "first_name", "last_name", "avatar"],
      "properties": {
        "id":         { "type": "integer", "minimum": 1 },
        "email":      { "type": "string",  "format": "email" },
        "first_name": { "type": "string",  "minLength": 1 },
        "last_name":  { "type": "string",  "minLength": 1 },
        "avatar":     { "type": "string",  "pattern": "^https://" }
      }
    },
    "support": {
      "type": "object",
      "required": ["url", "text"],
      "properties": {
        "url":  { "type": "string" },
        "text": { "type": "string" }
      }
    }
  }
}
*/
// Key schema keywords:
// type — string, integer, number, boolean, array, object, null
// required — array of field names that must be present
// minimum/maximum — numeric constraints
// minLength/maxLength — string length constraints
// pattern — regex pattern the string must match

public class ResponseSpecTest extends BaseTest {

    private ResponseSpecification commonResponseSpec;
    
    @BeforeClass
    public void buildResponseSpec() {
        commonResponseSpec = new ResponseSpecBuilder()
            // These assertions apply to EVERY response that uses this spec
            .expectStatusCode(200)                    // must be 200
            .expectContentType(ContentType.JSON)       // must be JSON
            .expectResponseTime(lessThan(3000L))       // must be < 3s
            .expectHeader("Content-Type",              // must have this header
                          containsString("application/json"))
            .build();
    }
    
    @Test
    public void testWithResponseSpec() {
        given().spec(requestSpec)
        .when()
            .get("/users/1")
        .then()
            .spec(commonResponseSpec)              // apply common spec
            .body("data.id", equalTo(1));          // additional specific assertion
    }
}`},

import io.restassured.http.ContentType;
import static io.restassured.RestAssured.*;
import static org.hamcrest.Matchers.*;

public class FormParamTest extends BaseTest {

    @Test
    public void testLoginWithFormParams() {
        // reqres.in login accepts JSON, but here's how form params work:
        
        given()
            .baseUri("https://reqres.in")
            .basePath("/api")
            .contentType(ContentType.URLENC)   // x-www-form-urlencoded
            // DO NOT use ContentType.JSON for form params
            
            .formParam("email",    "eve.holt@reqres.in")  // form field
            .formParam("password", "cityslicka")           // form field
            // Body becomes: email=eve.holt%40reqres.in&password=cityslicka
        
        .when()
            .post("/login")
        
        .then()
            .log().all();
    }
    
    @Test
    public void testOAuthTokenEndpoint() {
        // REAL OAuth 2.0 token request uses form params:
        given()
            .formParam("grant_type",    "client_credentials")
            .formParam("client_id",     "my-client-id")
            .formParam("client_secret", "my-client-secret")
            .formParam("scope",         "read:users")
        .when()
            .post("https://auth-server.com/oauth/token")
        .then()
            .statusCode(200)
            .body("access_token", notNullValue())
            .body("token_type", equalTo("Bearer"));
    }

    @Test
    public void testSetAndReadCookies() {
        
        // SENDING cookies to server

            .baseUri("https://httpbin.org")
            .cookie("session_id", "abc123")      // set one cookie
            .cookie("user_pref", "dark_mode")    // set another cookie
        .when()
            .get("/cookies")                      // endpoint shows received cookies
        .then()
            .statusCode(200)
            .body("cookies.session_id", equalTo("abc123"))
            .log().body();
    }
    
    @Test
    public void testExtractCookiesFromResponse() {
        
        // RECEIVING cookies from server (after login)
        Response response = given()
            .baseUri("https://httpbin.org")
        .when()
            .get("/cookies/set?session=my-session-value")  // server sets cookie
        .then()
            .extract().response();

        System.out.println("Session cookie: " + sessionCookie);

    {label:"Filters — global interceptors",badge:"Advanced",code:`// Filters are global interceptors that run on EVERY request/response
// Use for: logging, token injection, request modification

import io.restassured.filter.Filter;
import io.restassured.filter.FilterContext;
import io.restassured.response.Response;
import io.restassured.specification.FilterableRequestSpecification;
import io.restassured.specification.FilterableResponseSpecification;
import static io.restassured.RestAssured.*;

// CUSTOM FILTER: adds Authorization header to every request
public class AuthFilter implements Filter {
    
    private String token;
    
    public AuthFilter(String token) {
        this.token = token;  // inject token via constructor
    }
    
    // override filter() — runs for EVERY request
    @Override
    public Response filter(FilterableRequestSpecification reqSpec,
                           FilterableResponseSpecification resSpec,
                           FilterContext ctx) {
        
        // Add auth header to every request automatically
        reqSpec.header("Authorization", "Bearer " + token);
        
        // Continue with the request (must call this!)
        return ctx.next(reqSpec, resSpec);
    }
}

// USAGE in BaseTest:
// String token = getAuthToken(); // your token method
// RestAssured.filters(new AuthFilter(token)); // applies to ALL requests`},

let currentSession = 0;
const totalSessions = 10;
const openQa = {};

function render() {
  renderDots();
  renderTabs();
  renderContent();
  renderProgress();
  document.getElementById('btn-prev').disabled = currentSession === 0;
  document.getElementById('btn-next').disabled = currentSession === totalSessions - 1;
  const btn = document.getElementById('btn-next');
  const isP2 = sessions[currentSession].phase === 2;
  btn.className = 'primary' + (isP2 ? ' p2' : '');
}

function renderDots() {
  const container = document.getElementById('dots');
  container.innerHTML = sessions.map((s, i) =>
    `<div class="dot${i < currentSession ? ' done' : ''}${i === currentSession ? ' active' : ''}" 
      onclick="goTo(${i})" title="Session ${i+1}: ${s.title}">${i+1}</div>`
  ).join('');
}

function renderTabs() {
  const nav = document.getElementById('tab-nav');
  nav.innerHTML = sessions.map((s, i) => {
    const isP2 = s.phase === 2;
    const active = i === currentSession;
    return `<button class="tab-btn ${isP2 ? 'p2' : ''} ${active ? 'active' : ''}" 
      onclick="goTo(${i})">S${i+1}: ${s.title}</button>`;
  }).join('');
  setTimeout(() => {
    const activeBtn = nav.querySelectorAll('.tab-btn')[currentSession];
    if (activeBtn) activeBtn.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  }, 50);
}

function renderProgress() {
  const s = sessions[currentSession];
  const pct = Math.round((currentSession + 1) / totalSessions * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent =
    `Session ${s.id} of ${totalSessions} — Phase ${s.phase}: ${s.phase === 1 ? 'Fundamentals' : 'Intermediate'}`;
  document.getElementById('phase-badge').textContent = 'Phase ' + s.phase;
}

function renderContent() {

      </div>
    </div>

    <div class="card">
      <div class="sec-title"><i class="ti ti-message-circle" aria-hidden="true"></i> Interview one-liners — say these with confidence</div>

        ${s.oneliners.map((l, i) => `<div class="oneliner">${l}</div>`).join('')}
      </div>
    </div>

    <div class="card">
      <div class="sec-title"><i class="ti ti-chart-dots" aria-hidden="true"></i> Architecture visual</div>
      <div class="diagram-wrap">${s.diagram}</div>
    </div>

      </div>
    </div>
  `;
}

function toggleQa(i) {
  const el = document.getElementById('qa-' + i);

function goTo(i) {
  currentSession = i;
  render();
  window.scrollTo({top: 0, behavior:'smooth'});
}

function navigate(dir) {
  currentSession = Math.max(0, Math.min(totalSessions - 1, currentSession + dir));
  render();
  window.scrollTo({top: 0, behavior:'smooth'});
}

render();

    <!-- PRISM DYNAMIC HIGHLIGHT FIX -->
    <script>
    if (window.Prism) {
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new MutationObserver((mutations) => {
                let needsHighlight = false;
                mutations.forEach(m => {
                    if (m.addedNodes.length) {
                        m.addedNodes.forEach(n => {
                            if (n.nodeName === 'PRE' || n.nodeName === 'CODE') needsHighlight = true;
                            if (n.querySelector && n.querySelector('pre')) needsHighlight = true;
                        });
                    }
                });
                if (needsHighlight) {
                    Prism.highlightAll();
                }
            });
            observer.observe(document.body, { childList: true, subtree: true });
        });
    }
    </script>
