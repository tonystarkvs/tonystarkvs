const SESSIONS = [
{
  id:0, label:"S1: What is Lambda?", phase:"fund", dot:"#534AB7",
  title:"Session 1 — What is a Lambda Expression?",
  overview:{
    what:"An anonymous function (no name, no class) that you can pass around as a value.",
    why:"Removes boilerplate. No need to write a whole class or anonymous inner class.",
    when:"Whenever you need a short, single-use function — sorting, filtering, threading.",
    where:"Anywhere a Functional Interface is expected.",
    how:"( parameters ) -> { body } — the arrow operator separates input from output."
  },
  oneliners:[
    "A lambda is simply a block of code you can pass around like a variable.",
    "Lambda expressions implement a functional interface without writing a class.",
    "The arrow operator (->) separates the parameter list from the method body.",
    "Lambdas enable functional-style programming in Java 8 for the first time.",
    "A lambda with no name, no return type, and no access modifier — pure behavior.",
    "Lambda expressions are the foundation of the Stream API and method references."
  ],
  concept:`Lambda syntax has 3 parts:
  (parameters) → expression/block

  Zero params  :  () → System.out.println("hi")
  One param    :  x → x * x
  Multi params :  (a, b) → a + b
  Block body   :  (a, b) → { int r = a+b; return r; }

  Rules:
  • Type inference — compiler infers parameter types
  • Single expression needs no {} or return
  • Multi-statement needs {} and explicit return
  • Lambda must match the abstract method signature of the Functional Interface`,
  codes:[
{lbl:"Example 1 — Hello Lambda (replaces anonymous class)",code:
`// Old way: Anonymous Inner Class
Runnable r1 = new Runnable() {
    @Override
    public void run() {
        System.out.println("Old: Hello!");
    }
};

// New way: Lambda Expression
Runnable r2 = () -> System.out.println("New: Hello Lambda!");

r1.run(); // Old: Hello!
r2.run(); // New: Hello Lambda!

// KEY INSIGHT: Both do the same thing.
// Lambda saves 4 lines of boilerplate!`},
{lbl:"Example 2 — Lambda Syntax Variations",code:
`// No parameters
Runnable noParam = () -> System.out.println("No params");

// One parameter — parentheses optional
// (but good practice to include them)
java.util.function.Consumer<String> oneParam =
    name -> System.out.println("Hello " + name);

// Multiple parameters
java.util.function.BiFunction<Integer, Integer, Integer> add =
    (a, b) -> a + b;

// Block body with return
java.util.function.BiFunction<Integer,Integer,Integer> max =
    (a, b) -> {
        if (a > b) return a; // explicit return needed in block
        else return b;
    };

oneParam.accept("Arjun");     // Hello Arjun
System.out.println(add.apply(3, 7));  // 10
System.out.println(max.apply(8, 5));  // 8`},
{lbl:"Example 3 — Lambda with Comparator (List Sorting)",code:
`import java.util.*;

List<String> names = Arrays.asList("Zara","Arjun","Meera","Bala");

// Old way: Anonymous class
Collections.sort(names, new Comparator<String>() {
    @Override
    public int compare(String a, String b) {
        return a.compareTo(b); // alphabetical
    }
});

// New way: Lambda
Collections.sort(names, (a, b) -> a.compareTo(b));

// Even shorter with method reference:
names.sort(String::compareTo);

System.out.println(names); // [Arjun, Bala, Meera, Zara]`},
{lbl:"Example 4 — Lambda as a Variable (passing behavior)",code:
`import java.util.function.Function;

// Lambda stored in a variable
Function<String, Integer> strLen = s -> s.length();

// Pass lambda to a method
static void printResult(String word,
                        Function<String,Integer> fn) {
    System.out.println(word + " -> " + fn.apply(word));
}

printResult("Lambda", strLen);     // Lambda -> 6
printResult("Java8",  s -> s.length()); // inline  -> 5

// CONCEPT: Lambdas are first-class citizens —
// store them, pass them, return them!`},
{lbl:"Example 5 — Lambda with Thread (Runnable)",code:
`// Old way
Thread t1 = new Thread(new Runnable() {
    public void run() {
        System.out.println("Thread OLD way");
    }
});

// Lambda way
Thread t2 = new Thread(() -> System.out.println("Thread LAMBDA way"));

t1.start(); // Thread OLD way
t2.start(); // Thread LAMBDA way

// One liner thread creation — clean and readable!`},
{lbl:"Example 6 — Type Inference in Lambdas",code:
`import java.util.*;

List<Integer> numbers = Arrays.asList(5, 2, 9, 1, 7);

// Compiler infers types of x and y as Integer
// because list is List<Integer>
numbers.sort((x, y) -> x - y);  // ascending

System.out.println(numbers); // [1, 2, 5, 7, 9]

// Explicit types also allowed (optional)
numbers.sort((Integer x, Integer y) -> x - y);

// RULE: You can omit or include types — Java infers them
// from the Functional Interface's generic type parameter.`}
  ],
  bestpractices:[
    "Prefer lambda over anonymous class — always. It's cleaner and more readable.",
    "Keep lambda body short (1–3 lines). Extract complex logic into a named method.",
    "Let the compiler infer parameter types — avoid redundant type declarations.",
    "Use parentheses around single parameters for clarity: (x) -> x*x vs x -> x*x.",
    "Avoid side effects inside lambdas — treat them as pure functions when possible.",
    "Don't use lambdas where a method reference is cleaner: String::toUpperCase."
  ],
  qa:[
    {q:"Q1: What is a lambda expression in Java 8?",a:"A lambda is an anonymous function that provides a clear and concise way to implement a functional interface using the syntax: (parameters) -> body. It removes the need to write anonymous inner classes for single-method interfaces."},
    {q:"Q2: What is the syntax of a lambda expression?",a:"The syntax is: (parameter-list) -> { body }. Three parts: parameters (can be empty), arrow operator (->), and body (can be an expression or a block with curly braces)."},
    {q:"Q3: Can a lambda expression be assigned to a variable?",a:"Yes. A lambda can be assigned to any variable of a functional interface type, e.g., Runnable r = () -> System.out.println('Hi'); This makes behavior first-class — it can be stored, passed, and returned."},
    {q:"Q4: What is type inference in lambda expressions?",a:"The Java compiler automatically determines the parameter types of a lambda based on the functional interface's generic type. For example, if the interface expects Function<String, Integer>, you write s -> s.length() — no need to write (String s)."},
    {q:"Q5: How is a lambda different from an anonymous inner class?",a:"A lambda is syntactically compact and has no 'this' reference (it captures the enclosing class's 'this'). An anonymous class is a full class definition with its own 'this'. Lambdas can only implement functional interfaces (single abstract method), not interfaces with multiple methods."}
  ]
},
{
  id:1, label:"S2: Functional Interface", phase:"fund", dot:"#1D9E75",
  title:"Session 2 — Functional Interfaces (@FunctionalInterface)",
  overview:{
    what:"An interface with exactly ONE abstract method (SAM — Single Abstract Method).",
    why:"It is the TYPE of a lambda. Without a functional interface, a lambda has no type.",
    when:"Every time you write a lambda, it implements a functional interface.",
    where:"java.util.function package has 43+ built-in ones. You can create your own.",
    how:"Annotate your interface with @FunctionalInterface to enforce the SAM rule."
  },
  oneliners:[
    "A functional interface is just an interface with a single abstract method — that's the contract a lambda fulfills.",
    "The @FunctionalInterface annotation is optional but a best practice — it makes the compiler enforce SAM.",
    "Every lambda expression is an instance of a functional interface.",
    "Runnable, Callable, Comparator — these were already functional interfaces before Java 8.",
    "java.util.function has 4 core FIs: Function, Predicate, Consumer, and Supplier.",
    "Default and static methods in an interface do NOT break the functional interface rule."
  ],
  concept:`4 Core Built-in Functional Interfaces:

  ┌─────────────┬────────────────────┬──────────────────────────────┐
  │ Interface   │ Signature          │ Use case                     │
  ├─────────────┼────────────────────┼──────────────────────────────┤
  │ Function<T,R>│ T → R             │ Transform input to output    │
  │ Predicate<T> │ T → boolean       │ Test a condition             │
  │ Consumer<T>  │ T → void          │ Process without returning    │
  │ Supplier<T>  │ () → T            │ Produce a value              │
  └─────────────┴────────────────────┴──────────────────────────────┘

  Also important:
  • BiFunction<T,U,R>   — takes TWO inputs, returns one output
  • BiPredicate<T,U>    — takes TWO inputs, returns boolean
  • UnaryOperator<T>    — Function<T,T> specialized (same type in/out)
  • BinaryOperator<T>   — BiFunction<T,T,T> specialized`,
  codes:[
{lbl:"Example 1 — Custom @FunctionalInterface",code:
`@FunctionalInterface // Compiler enforces exactly 1 abstract method
interface Greeter {
    String greet(String name); // the ONE abstract method

    // Default methods are ALLOWED — not counted as abstract
    default void sayBye() {
        System.out.println("Goodbye!");
    }
}

// Implement via lambda
Greeter g = name -> "Hello, " + name + "!";

System.out.println(g.greet("Arjun")); // Hello, Arjun!
g.sayBye();                           // Goodbye!

// If you try to add another abstract method, compiler
// will throw: "Invalid '@FunctionalInterface' annotation"`},
{lbl:"Example 2 — Function<T,R> (transform input)",code:
`import java.util.function.Function;

// Function<InputType, OutputType>
Function<String, Integer> getLength = s -> s.length();
Function<Integer, Integer> square   = n -> n * n;

System.out.println(getLength.apply("Lambda")); // 6
System.out.println(square.apply(5));           // 25

// Chaining with andThen()
// getLength THEN square = length of string, then square it
Function<String, Integer> lengthSquared =
    getLength.andThen(square);

System.out.println(lengthSquared.apply("Java")); // 4 -> 16`},
{lbl:"Example 3 — Predicate<T> (test condition)",code:
`import java.util.function.Predicate;

Predicate<Integer> isEven    = n -> n % 2 == 0;
Predicate<Integer> isPositive= n -> n > 0;
Predicate<String>  isLong    = s -> s.length() > 5;

System.out.println(isEven.test(4));       // true
System.out.println(isPositive.test(-3));  // false

// Combine predicates with and(), or(), negate()
Predicate<Integer> isEvenAndPositive = isEven.and(isPositive);
System.out.println(isEvenAndPositive.test(6));  // true
System.out.println(isEvenAndPositive.test(-4)); // false

Predicate<Integer> notEven = isEven.negate();
System.out.println(notEven.test(3)); // true (3 is NOT even)`},
{lbl:"Example 4 — Consumer<T> and Supplier<T>",code:
`import java.util.function.*;

// Consumer — takes input, returns nothing (void)
Consumer<String> printer  = s -> System.out.println(">> " + s);
Consumer<String> upper    = s -> System.out.println(s.toUpperCase());

printer.accept("hello");  // >> hello
upper.accept("hello");    // HELLO

// Chain consumers with andThen()
Consumer<String> both = printer.andThen(upper);
both.accept("lambda");
// >> lambda
// LAMBDA

// Supplier — takes nothing, returns a value
Supplier<String>  greeting = () -> "Good Morning!";
Supplier<Double>  randNum  = () -> Math.random();

System.out.println(greeting.get());  // Good Morning!
System.out.println(randNum.get());   // e.g. 0.7342...`},
{lbl:"Example 5 — BiFunction and UnaryOperator",code:
`import java.util.function.*;

// BiFunction — TWO inputs, ONE output
BiFunction<String,Integer,String> repeat =
    (str, n) -> str.repeat(n);

System.out.println(repeat.apply("ha", 3)); // hahaha

// UnaryOperator — same type in and out (extends Function<T,T>)
UnaryOperator<String> shout = s -> s.toUpperCase() + "!";
UnaryOperator<Integer> doubleIt = n -> n * 2;

System.out.println(shout.apply("hello"));  // HELLO!
System.out.println(doubleIt.apply(7));     // 14

// BinaryOperator — TWO same-type inputs, ONE same-type output
BinaryOperator<Integer> sum = (a, b) -> a + b;
System.out.println(sum.apply(10, 20)); // 30`},
{lbl:"Example 6 — Storing and Passing Functional Interfaces",code:
`import java.util.function.*;
import java.util.*;

// Store lambdas as variables
Predicate<String> notEmpty = s -> !s.isEmpty();
Function<String, String> trim = s -> s.trim();

List<String> data = Arrays.asList(" hello ", "", " java ", "  ");

// Pass lambda to helper method
static void processAll(List<String> list,
                        Predicate<String> filter,
                        Function<String,String> transform) {
    for (String s : list) {
        if (filter.test(s)) {
            System.out.println(transform.apply(s));
        }
    }
}

processAll(data, notEmpty, trim);
// hello
// java
// (blank strings skipped by predicate filter)`}
  ],
  bestpractices:[
    "Always use @FunctionalInterface annotation — acts as documentation + compile-time guard.",
    "Prefer built-in java.util.function interfaces over creating custom ones when possible.",
    "Use Predicate for boolean conditions, Function for transformations, Consumer for actions.",
    "Name your lambda variables clearly — isAdult, printName, getAge — like tiny method names.",
    "Use andThen/compose (Function) and and/or/negate (Predicate) instead of nested logic.",
    "Never use functional interfaces for interfaces that need state — use a full class instead."
  ],
  qa:[
    {q:"Q1: What is a functional interface? Give examples.",a:"A functional interface has exactly one abstract method. Examples: Runnable (run()), Callable (call()), Comparator (compare()), and all java.util.function interfaces like Function, Predicate, Consumer, Supplier."},
    {q:"Q2: Can a functional interface have more than one method?",a:"Yes — it can have multiple default or static methods, but must have exactly ONE abstract method. The @FunctionalInterface annotation ensures this contract."},
    {q:"Q3: What is the difference between Function and Predicate?",a:"Function<T,R> transforms a value of type T to type R — input → output. Predicate<T> tests a condition and returns boolean — input → true/false. Use Function to transform data, use Predicate to filter data."},
    {q:"Q4: What does Consumer do differently from Function?",a:"Consumer<T> takes an input and performs an action but returns nothing (void). Function<T,R> takes an input and returns a result. Consumer is used for side-effect operations like printing or saving to DB."},
    {q:"Q5: When would you create a custom functional interface?",a:"When the built-in interfaces don't match your semantic need. For example, a Validator<T> or Transformer<T,R> that communicates domain intent clearly. Custom interfaces make code self-documenting in domain-specific scenarios."}
  ]
},
{
  id:2, label:"S3: Variable Capture", phase:"fund", dot:"#0F6E56",
  title:"Session 3 — Variable Capture & Effectively Final",
  overview:{
    what:"A lambda can 'capture' (use) variables from the enclosing scope — but only if they're effectively final.",
    why:"Lambdas may be executed later (async, different thread) — mutable variables would cause race conditions.",
    when:"Whenever your lambda body references a local variable from the outer method/class.",
    where:"Applies to local variables, method parameters, and instance fields (different rules).",
    how:"Java checks: is this variable ever reassigned after its declaration? If yes → compile error."
  },
  oneliners:[
    "A lambda can use local variables only if they are final or effectively final — never reassigned after declaration.",
    "Effectively final means you don't need to write the 'final' keyword — the compiler checks for reassignment.",
    "Instance variables (this.x) and static variables can be freely read and written inside lambdas.",
    "Lambdas capture the VALUE of a local variable, not a reference — so changes after capture don't reflect.",
    "The 'this' keyword inside a lambda refers to the enclosing class — unlike anonymous inner classes.",
    "Variable capture rules exist to ensure thread safety when lambdas execute asynchronously."
  ],
  concept:`Three types of variables in lambda scope:

  1. LOCAL VARIABLES (from enclosing method)
     → Must be final or effectively final
     → Lambda captures the value at the time of creation
     → ANY reassignment = compile error

  2. INSTANCE VARIABLES (this.fieldName)
     → Freely readable and writable inside lambda
     → Lambda holds reference to enclosing object
     → 'this' inside lambda = enclosing class instance

  3. STATIC VARIABLES (ClassName.field)
     → Freely readable and writable
     → No capture needed — shared global state

  EFFECTIVELY FINAL = never reassigned after first assignment.
  You don't need to write 'final' — compiler infers it.`,
  codes:[
{lbl:"Example 1 — Effectively Final (the rule)",code:
`public static void main(String[] args) {
    int x = 10; // effectively final — never reassigned

    Runnable r = () -> System.out.println("x = " + x);
    r.run(); // x = 10

    // x = 20; // ← UNCOMMENT = COMPILE ERROR!
    // "Local variable x defined in an enclosing scope must
    //  be final or effectively final"

    // WHY? Lambda might run LATER on another thread.
    // If x changes, the lambda sees stale value → bugs.
    // Java prevents this at compile time.
}`},
{lbl:"Example 2 — Capturing method parameters",code:
`// Method parameters are also effectively final
static Runnable makeRunner(String message) {
    // 'message' is the method param — effectively final
    return () -> System.out.println("Running: " + message);
    // message = "other"; // ← COMPILE ERROR if uncommented
}

public static void main(String[] args) {
    Runnable r1 = makeRunner("Hello");
    Runnable r2 = makeRunner("World");

    r1.run(); // Running: Hello
    r2.run(); // Running: World
    // Each lambda captures its OWN copy of 'message'
}`},
{lbl:"Example 3 — Instance variable (no restriction)",code:
`class Counter {
    private int count = 0; // INSTANCE variable — no restriction

    public Runnable getIncrementer() {
        // Lambda CAN read AND write instance variables
        return () -> {
            count++;  // modifying instance field — ALLOWED
            System.out.println("Count: " + count);
        };
    }
}

Counter c = new Counter();
Runnable inc = c.getIncrementer();

  qa:[
    {q:"Q1: What does 'effectively final' mean?",a:"A local variable is effectively final if it is never reassigned after its first assignment. You don't need to write the 'final' keyword — the compiler checks automatically. This is a Java 8 improvement; before Java 8, you had to explicitly write 'final'."},
    {q:"Q2: Why can't lambdas access mutable local variables?",a:"Lambdas may be passed to a different thread and executed later. Local variables live on the method's stack and are destroyed when the method returns. If the lambda could modify them, it would face stale or corrupted values. Java prevents this at compile time for safety."},
    {q:"Q3: What is the difference between 'this' in a lambda vs anonymous class?",a:"In a lambda, 'this' refers to the enclosing class instance. In an anonymous inner class, 'this' refers to the anonymous class itself. This is a key behavioral difference — lambda 'this' is more intuitive for object-oriented code."},
    {q:"Q4: How can you mutate a variable inside a lambda?",a:"Use a workaround: a single-element array (int[] count = {0}; count[0]++), or a wrapper like AtomicInteger, or an ArrayList. These are reference types — the reference is final, but the contents can change."},
    {q:"Q5: Can lambdas access instance fields?",a:"Yes, freely. Instance fields (this.field) can be read and written inside a lambda without any effectively-final restriction. The lambda captures a reference to the enclosing object, so changes are reflected immediately."}
  ]

    {q:"Q1: What is a method reference and when do you use it?",a:"A method reference (ClassName::method) is a compact way to write a lambda that only calls a single existing method. Use it when the lambda body contains no extra logic — just a method call. It improves readability and is considered idiomatic Java 8."},
    {q:"Q2: What are the 4 types of method references?",a:"1) Static: Integer::parseInt (2) Unbound instance: String::toUpperCase — object is the parameter (3) Bound instance: System.out::println — specific object is captured (4) Constructor: ArrayList::new — creates a new instance."},

  concept:`Stream Pipeline = Source + Intermediate Ops + Terminal Op

  SOURCE: list.stream(), Set.stream(), Stream.of(...)

  INTERMEDIATE (lazy, return Stream):
  ├── filter(Predicate)     → keep matching elements
  ├── map(Function)         → transform each element
  ├── sorted()              → natural or custom order
  ├── distinct()            → remove duplicates
  ├── limit(n)              → first n elements
  └── peek(Consumer)        → inspect without changing

  TERMINAL (triggers execution, returns non-Stream):
  ├── forEach(Consumer)     → process each element
  ├── collect(Collector)    → gather into List/Set/Map
  ├── count()               → number of elements
  ├── reduce(...)           → aggregate to single value
  ├── findFirst()           → Optional of first element
  ├── anyMatch/allMatch     → boolean checks
  └── min/max               → Optional extremes`,

  qa:[
    {q:"Q1: What is the Stream API and how does it work?",a:"Stream API (java.util.stream) enables declarative data processing through pipelines. A stream has 3 parts: a source (collection), zero or more intermediate operations (filter, map, sorted — lazy), and a terminal operation (collect, forEach, count — triggers execution)."},
    {q:"Q2: What is the difference between map() and filter()?",a:"filter() keeps or removes elements based on a Predicate — it doesn't change the element, just decides inclusion. map() transforms each element using a Function — it changes the value or type. Filter reduces the number of elements; map changes them."},
    {q:"Q3: What does lazy evaluation mean in streams?",a:"Intermediate operations (filter, map, sorted) don't execute when called — they build a description of the pipeline. Execution only happens when a terminal operation (collect, forEach, count) is invoked. This enables optimization like short-circuit evaluation."},
    {q:"Q4: What is the difference between forEach() and collect()?",a:"forEach() is a terminal operation that processes elements for side effects (printing, writing) and returns void. collect() gathers the stream elements into a collection (List, Set, Map) and returns that collection. Use collect() when you need the result data."},

  concept:`Function Composition:

  f.andThen(g)   → x → g(f(x))    [f THEN g — pipeline order]
  f.compose(g)   → x → f(g(x))    [g THEN f — math order]

  Example:
  double = x → x*2
  addTen = x → x+10

  double.andThen(addTen).apply(5) → double(5)=10, addTen(10)=20
  double.compose(addTen).apply(5) → addTen(5)=15, double(15)=30

  Predicate Combination:

  p1.and(p2)   → x → p1(x) && p2(x)
  p1.or(p2)    → x → p1(x) || p2(x)
  p1.negate()  → x → !p1(x)

  Consumer Chaining:

  c1.andThen(c2) → runs c1(x), then c2(x), returns void`,
  codes:[
{lbl:"Example 1 — Function.andThen() chain",code:
`import java.util.function.Function;

Function<Integer, Integer> times2  = x -> x * 2;
Function<Integer, Integer> plus10  = x -> x + 10;
Function<Integer, String>  toStr   = x -> "Result: " + x;

// andThen: apply times2, THEN plus10, THEN toStr
Function<Integer, String> pipeline =
    times2.andThen(plus10).andThen(toStr);

System.out.println(pipeline.apply(5));
// times2(5) = 10 → plus10(10) = 20 → "Result: 20"
// Output: Result: 20

System.out.println(pipeline.apply(3));
// times2(3) = 6 → plus10(6) = 16 → "Result: 16"
// Output: Result: 16

// INSIGHT: build complex logic from small reusable pieces!`},
{lbl:"Example 2 — Function.compose() (reverse order)",code:
`import java.util.function.Function;

Function<Integer, Integer> times2 = x -> x * 2;
Function<Integer, Integer> plus10 = x -> x + 10;

// andThen: times2 THEN plus10
System.out.println(times2.andThen(plus10).apply(5));
// (5*2) + 10 = 20

// compose: plus10 THEN times2 (REVERSED)
System.out.println(times2.compose(plus10).apply(5));
// (5+10) * 2 = 30

// Memory trick:
// f.andThen(g) = pipeline: f → g  (like reading left to right)
// f.compose(g) = math:     f(g(x)) (inner first, outer second)

Function<String,String> trim  = String::trim;
Function<String,String> upper = String::toUpperCase;
Function<String,String> clean = upper.compose(trim);
// trim first, THEN upper — compose reads outer first
System.out.println(clean.apply("  hello  ")); // HELLO`},
{lbl:"Example 3 — Predicate.and(), or(), negate()",code:
`import java.util.function.Predicate;
import java.util.*;
import java.util.stream.*;

Predicate<Integer> isEven     = n -> n % 2 == 0;
Predicate<Integer> isPositive = n -> n > 0;
Predicate<Integer> isLarge    = n -> n > 100;

// AND: both conditions must be true
Predicate<Integer> evenAndPos = isEven.and(isPositive);
System.out.println(evenAndPos.test(4));   // true  (even & pos)
System.out.println(evenAndPos.test(-4));  // false (even but neg)

// OR: at least one condition true
Predicate<Integer> evenOrLarge = isEven.or(isLarge);
System.out.println(evenOrLarge.test(3));   // false
System.out.println(evenOrLarge.test(150)); // true (large)

// NEGATE: flip the result
Predicate<Integer> isOdd = isEven.negate();
List<Integer> nums = Arrays.asList(1,2,3,4,5,6);
nums.stream().filter(isOdd).forEach(System.out::print); // 135`},
{lbl:"Example 4 — Consumer.andThen() chaining",code:
`import java.util.function.Consumer;

Consumer<String> print  = s -> System.out.println("LOG: " + s);
Consumer<String> audit  = s -> System.out.println("AUDIT: saved " + s);
Consumer<String> notify = s -> System.out.println("EMAIL: sent for " + s);

// Chain consumers — all run in sequence on the SAME input
Consumer<String> pipeline = print.andThen(audit).andThen(notify);

pipeline.accept("ORDER_001");
// LOG: ORDER_001
// AUDIT: saved ORDER_001
// EMAIL: sent for ORDER_001

// Practical use: logging pipeline, event processing
// Each consumer is independent and reusable
// Order matters — runs in left-to-right order`},
{lbl:"Example 5 — Combining Predicates for complex filters",code:
`import java.util.*;
import java.util.function.*;
import java.util.stream.*;

class Product {
    String name; double price; boolean inStock;
    Product(String n, double p, boolean s){name=n;price=p;inStock=s;}
    public String toString(){return name+"("+price+","+inStock+")";}
}

List<Product> products = Arrays.asList(
    new Product("Laptop",  50000, true),
    new Product("Phone",   20000, false),
    new Product("Tablet",  30000, true),
    new Product("Watch",    5000, true)
);

Predicate<Product> expensive   = p -> p.price > 15000;
Predicate<Product> available   = p -> p.inStock;
Predicate<Product> bestBuy     = expensive.and(available);

products.stream()
    .filter(bestBuy)
    .map(p -> p.name)
    .forEach(System.out::println);
// Laptop
// Tablet`},
{lbl:"Example 6 — Building a Validation Pipeline",code:
`import java.util.function.*;

// Small focused validators
Predicate<String> notNull     = s -> s != null;
Predicate<String> notEmpty    = s -> !s.trim().isEmpty();
Predicate<String> minLength   = s -> s.length() >= 3;
Predicate<String> noSpaces    = s -> !s.contains(" ");

// Compose a full validation rule
Predicate<String> validUsername =
    notNull.and(notEmpty).and(minLength).and(noSpaces);

// Test
String[] testInputs = {"arjun","ar","arjun bala",null,""," "};
for (String input : testInputs) {
    boolean valid = input != null && validUsername.test(input);
    System.out.println("'" + input + "' -> " + (valid ? "VALID" : "INVALID"));
}
// 'arjun' -> VALID
// 'ar' -> INVALID   (too short)
// 'arjun bala' -> INVALID  (has space)
// 'null' -> INVALID, '' -> INVALID, ' ' -> INVALID`}
  ],
  bestpractices:[
    "Prefer andThen() over nested functions — it reads like a natural left-to-right pipeline.",
    "Build small, single-purpose predicates and compose them — maximizes reusability.",
    "Name your composed functions clearly: validUsername, expensiveAndAvailable, etc.",
    "Use Predicate.not() (Java 11+) for clean negation of method references.",
    "Consumer.andThen() is perfect for logging/auditing chains — non-intrusive additions.",
    "Test each individual lambda before composing — easier to debug small units."
  ],
  qa:[
    {q:"Q1: What is the difference between andThen() and compose() in Function?",a:"Both chain two functions. andThen(g) applies 'this' first, then 'g': f.andThen(g) = g(f(x)). compose(g) applies 'g' first, then 'this': f.compose(g) = f(g(x)). andThen follows pipeline order (left to right); compose follows math notation (inside out)."},
    {q:"Q2: How do you combine multiple Predicates in Java?",a:"Use and() for logical AND, or() for logical OR, and negate() for NOT. e.g. isAdult.and(hasID) returns true only if both are true. These methods are defined in the Predicate interface and produce a new Predicate."},
    {q:"Q3: Can Consumer be chained? How?",a:"Yes, using Consumer.andThen(). c1.andThen(c2).accept(x) runs c1.accept(x) first, then c2.accept(x). Both consumers receive the same input. This is useful for building logging/audit/notification chains without modifying individual consumers."},
    {q:"Q4: Why is function composition important in Java 8?",a:"It enables building complex logic from small, tested, single-purpose lambdas. Instead of one large method with nested conditions, you compose a pipeline of focused operations. This improves testability (each piece is independent), readability, and reusability."},
    {q:"Q5: What is Predicate.not() and when was it introduced?",a:"Predicate.not(predicate) is a static method introduced in Java 11 that wraps any Predicate in a negation. It's especially useful with method references: Predicate.not(String::isEmpty) is much cleaner than s -> !s.isEmpty(). Note: Java 8 doesn't have Predicate.not() — use .negate() instead."}
  ]
},

  CLOSURE: Lambda + captured variable = a closure
  → The lambda remembers the variable even after the
    enclosing method has returned.

  CURRYING: f(a, b) → g(a) returns h(b)
  Function<Integer, Function<Integer, Integer>> add =
      a -> b -> a + b;
  add.apply(3).apply(4) = 7

  LAZY EVALUATION: Supplier<T> defers computation
  → new Supplier<>(() -> expensiveComputation())
  → .get() is called ONLY when needed

  CHECKED EXCEPTION WRAPPER:
  Lambdas can't throw checked exceptions.
  Wrap in a helper: wrapChecked(fn) catches and

{lbl:"Example 1 — Closures (lambda captures outer scope)",code:
`// A closure = lambda + its captured environment
static java.util.function.IntSupplier makeCounter() {
    int[] count = {0}; // captured state (array trick)
    return () -> ++count[0]; // lambda IS the closure
}

java.util.function.IntSupplier c1 = makeCounter();
java.util.function.IntSupplier c2 = makeCounter();

System.out.println(c1.getAsInt()); // 1
System.out.println(c1.getAsInt()); // 2
System.out.println(c1.getAsInt()); // 3
System.out.println(c2.getAsInt()); // 1 ← independent!

// KEY: each call to makeCounter() creates a fresh [count]
// c1 and c2 have SEPARATE captured environments
// This is a closure — function + its closed-over data`},
{lbl:"Example 2 — Currying with nested lambdas",code:
`import java.util.function.*;

// Currying: instead of f(a,b) → write f(a).apply(b)
// Transforms BiFunction into two chained Functions

Function<Integer, Function<Integer, Integer>> add =
    a -> b -> a + b; // a returns another lambda

System.out.println(add.apply(3).apply(4)); // 7
System.out.println(add.apply(10).apply(20)); // 30

// PRACTICAL USE: partial application (fix one argument)
Function<Integer, Integer> add5 = add.apply(5); // fix a=5
System.out.println(add5.apply(1)); // 6
System.out.println(add5.apply(9)); // 14

// Tax calculator with currying
Function<Double, Function<Double, Double>> taxCalc =
    rate -> price -> price + (price * rate / 100);

Function<Double, Double> gst18 = taxCalc.apply(18.0);
System.out.println(gst18.apply(1000.0)); // 1180.0
System.out.println(gst18.apply(500.0));  // 590.0`},
{lbl:"Example 3 — Lazy Evaluation with Supplier",code:
`import java.util.function.Supplier;

// Expensive operation: simulate DB call
static String fetchFromDB() {
    System.out.println(">>> DB CALLED (expensive!)");
    return "USER_DATA";
}

// EAGER: always computes, even if not needed
static String getEager() {
    String data = fetchFromDB(); // called immediately!
    return data;
}

// LAZY: only computes when .get() is called
static Supplier<String> getLazy() {
    return () -> fetchFromDB(); // NOT called yet
}

// Usage
Supplier<String> lazy = getLazy(); // no DB call yet
System.out.println("Lazy created, no DB call.");

if (false) { // condition is false
    System.out.println(lazy.get()); // DB call SKIPPED!
}
System.out.println("Done — DB never called!");
// INSIGHT: Use Supplier for expensive init, config loading,
// optional computations — defer until actually needed`},
{lbl:"Example 4 — Checked Exception Wrapper",code:
`import java.util.function.*;
import java.util.*;
import java.util.stream.*;

// Problem: lambda can't throw checked exceptions
// List<String> urls = ...
// urls.stream().map(url -> new URL(url)) // COMPILE ERROR!
// URL constructor throws MalformedURLException (checked)

// Solution: wrap in a helper that converts to RuntimeException
@FunctionalInterface
interface ThrowingFunction<T, R> {
    R apply(T t) throws Exception;
}

static <T, R> Function<T, R> wrap(ThrowingFunction<T, R> fn) {
    return t -> {
        try {
            return fn.apply(t);
        } catch (Exception e) {
            throw new RuntimeException(e); // convert to unchecked
        }
    };
}

// Now use in stream:
List<String> paths = Arrays.asList("/home/a.txt","/home/b.txt");
paths.stream()
    .map(wrap(p -> new java.io.File(p).getCanonicalPath()))
    .forEach(System.out::println);`},
{lbl:"Example 5 — Strategy Pattern with Lambdas",code:
`import java.util.*;
import java.util.function.*;

// Strategy = functional interface (the contract)
@FunctionalInterface
interface DiscountStrategy {
    double apply(double originalPrice);
}

// Concrete strategies are just lambdas
DiscountStrategy noDiscount    = price -> price;
DiscountStrategy tenPercent    = price -> price * 0.90;
DiscountStrategy flatDiscount  = price -> price - 100;
DiscountStrategy halfOff       = price -> price * 0.50;

// Context: Shopping Cart
class ShoppingCart {
    private double total;
    ShoppingCart(double total) { this.total = total; }

    double checkout(DiscountStrategy strategy) {
        return strategy.apply(total);
    }
}

ShoppingCart cart = new ShoppingCart(1000.0);
System.out.println(cart.checkout(noDiscount));   // 1000.0
System.out.println(cart.checkout(tenPercent));   // 900.0
System.out.println(cart.checkout(halfOff));      // 500.0

// Pass different behavior without if/else chains!`},
{lbl:"Example 6 — Optional + Lambda (null-safe pipelines)",code:
`import java.util.*;

// Optional replaces null checks with lambda pipelines
Optional<String> name = Optional.of("  Arjun Sharma  ");

// Chain operations — each step handles empty case
String result = name
    .map(String::trim)              // remove whitespace
    .filter(s -> s.length() > 3)   // only if length > 3
    .map(String::toUpperCase)       // convert to upper
    .orElse("UNKNOWN");             // default if empty

System.out.println(result); // ARJUN SHARMA

// Empty Optional example
Optional<String> empty = Optional.empty();
String safe = empty
    .map(String::toUpperCase)
    .orElse("DEFAULT");
System.out.println(safe); // DEFAULT

// orElseGet (lazy): uses Supplier — only computes if needed
String lazy = empty.orElseGet(() -> "Generated: " + System.currentTimeMillis());
System.out.println(lazy);`}
  ],
  bestpractices:[
    "Use Supplier<T> for lazy initialization — avoid eager computation of expensive resources.",
    "Wrap checked exceptions at the boundary using a helper — keep stream pipelines clean.",
    "Use the Strategy pattern via lambdas — eliminates if/else/switch for behavior selection.",
    "Currying is powerful for partial application — pre-configure lambdas with fixed parameters.",
    "Use Optional.map/flatMap/orElse — never call .get() without .isPresent() check.",
    "Document closures carefully — captured state makes lambdas stateful and harder to test."
  ],
  qa:[
    {q:"Q1: What is a closure in Java?",a:"A closure is a lambda expression that captures variables from its enclosing scope. The lambda 'closes over' those variables and retains access to them even after the enclosing method returns. In Java, captured local variables must be effectively final."},
    {q:"Q2: What is currying and how do you implement it?",a:"Currying transforms a multi-argument function into a chain of single-argument functions. In Java 8: Function<A, Function<B, C>> curried = a -> b -> f(a, b). This enables partial application — fixing one argument and getting back a new function for the rest."},
    {q:"Q3: Why can't lambdas throw checked exceptions?",a:"Functional interfaces in java.util.function don't declare checked exceptions in their abstract method. So any lambda implementing them can't throw checked exceptions. The workaround is to create a ThrowingFunction wrapper that catches checked exceptions and rethrows as RuntimeException."},
    {q:"Q4: How does the Strategy pattern use lambdas?",a:"The Strategy pattern defines a family of algorithms, each as a lambda implementation of a @FunctionalInterface. Instead of concrete strategy classes, you just write different lambdas. This eliminates boilerplate class files and makes the code much more concise and readable."},
    {q:"Q5: What is the difference between orElse() and orElseGet() in Optional?",a:"orElse(value) evaluates the default value EAGERLY — it's always computed even if the Optional has a value. orElseGet(Supplier) is LAZY — the supplier is only called if the Optional is empty. For expensive defaults (DB calls, computations), always use orElseGet() to avoid unnecessary work."}
  ]
}
];

function buildTabs() {

function colorize(code) {
  return code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(\/\/[^\n]*)/g,'<span class="cm">$1</span>')
    .replace(/\b(import|class|interface|extends|implements|public|private|static|void|return|new|final|null|true|false|if|else|for|while|this|throw|throws|try|catch)\b/g,'<span class="kw">$1</span>')
    .replace(/(\"[^\"]*\")/g,'<span class="str">$1</span>')
    .replace(/\b(\d+\.?\d*)\b/g,'<span class="num">$1</span>')
    .replace(/\b(String|Integer|List|Map|Optional|Runnable|Function|Predicate|Consumer|Supplier|BiFunction|UnaryOperator|BinaryOperator|Arrays|System|Thread|ArrayList|Collectors|Optional|AtomicInteger|StringBuilder|Employee|Product|Counter|AppConfig|ShoppingCart|DiscountStrategy|Greeter|ThrowingFunction)\b/g,'<span class="cls">$1</span>')
    .replace(/(@\w+)/g,'<span class="ann">$1</span>');
}

function toggleQA(el) {
  const ans = el.nextElementSibling;
  ans.classList.toggle('open');
}

function completeMark() {
  completedTabs.add(currentTab);
  buildTabs();
  if (currentTab < SESSIONS.length-1) {
    setTimeout(()=>switchTab(currentTab+1), 300);
  }
}
