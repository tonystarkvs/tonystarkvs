<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>java learning hub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
:root{--accent:#5048c8;--accent-light:#eeedfe;--accent-mid:#7f77dd;--ok:#1d9e75;--ok-light:#e1f5ee;--warn:#ba7517;--warn-light:#faeeda;--danger:#a32d2d;--danger-light:#fcebeb;--code-bg:rgba(0,0,0,0.04)}

.hub{padding:1rem 0}
.phase-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.phase-pill{font-size:11px;padding:3px 10px;border-radius:20px;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);background:var(--color-background-secondary)}
.phase-pill.active{background:var(--accent-light);border-color:var(--accent-mid);color:var(--accent)}

.tab-bar{display:flex;gap:4px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;flex-wrap:nowrap}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;font-size:12px;padding:6px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn:hover{background:var(--color-background-primary);border-color:var(--color-border-secondary)}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tab-btn.done::after{content:" ✓";opacity:.7}

.progress-track{height:3px;background:var(--color-background-secondary);border-radius:2px;margin:10px 0 18px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}

.session{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.section{margin-bottom:24px}
.section-label{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.section-label i{font-size:14px}

.overview-card{background:var(--accent-light);border:0.5px solid var(--accent-mid);border-radius:var(--border-radius-lg);padding:14px 16px}
.overview-card .title{font-size:16px;font-weight:500;color:var(--accent);margin-bottom:6px}
.overview-card p{font-size:13px;color:#534ab7;line-height:1.6}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.meta-item{background:rgba(255,255,255,0.6);border-radius:var(--border-radius-md);padding:8px 10px;font-size:12px}
.meta-item strong{display:block;color:var(--accent);font-weight:500;margin-bottom:2px;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.meta-item span{color:#534ab7}

.oneliner-list{display:flex;flex-direction:column;gap:6px}
.oneliner{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-left:3px solid var(--accent-mid);border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;padding:8px 12px;font-size:13px;color:var(--color-text-secondary);line-height:1.5}
.oneliner strong{color:var(--color-text-primary);font-weight:500}

.concept-block{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;margin-bottom:10px}
.concept-block h4{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.concept-block p{font-size:13px;color:var(--color-text-secondary);line-height:1.6}

.arch-box{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px;margin-top:8px;font-size:12px;font-family:var(--font-mono);color:var(--color-text-secondary);line-height:1.8;overflow-x:auto}
.arch-box .kw{color:var(--accent);font-weight:500}
.arch-box .cm{color:var(--ok);opacity:.8}
.arch-box .cls{color:#D85A30}
.arch-box .str{color:var(--warn)}

.code-block{background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;margin-bottom:10px;overflow-x:auto}
.code-block .code-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.code-block pre{font-size:12px;font-family:var(--font-mono);color:var(--color-text-primary);line-height:1.7;white-space:pre}
.code-block .kw{color:var(--accent);font-weight:500}
.code-block .cm{color:#0F6E56;font-style:italic}
.code-block .str{color:#854F0B}
.code-block .cls{color:#D85A30}
.code-block .num{color:var(--accent)}
.code-block .ann{color:#993556}

.bp-list{display:flex;flex-direction:column;gap:6px}
.bp-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--color-text-secondary);line-height:1.5}
.bp-icon{width:18px;height:18px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;margin-top:1px}
.bp-icon.ok{background:var(--ok-light);color:var(--ok)}
.bp-icon.warn{background:var(--warn-light);color:var(--warn)}

.qa-list{display:flex;flex-direction:column;gap:8px}
.qa-item{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.qa-q{padding:10px 14px;font-size:13px;font-weight:500;color:var(--color-text-primary);background:var(--color-background-secondary);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px}
.qa-a{padding:10px 14px;font-size:13px;color:var(--color-text-secondary);line-height:1.6;display:none;border-top:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary)}
.qa-a.open{display:block}

.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;margin-right:4px}
.badge.fund{background:var(--ok-light);color:var(--ok)}
.badge.inter{background:var(--warn-light);color:var(--warn)}
.badge.adv{background:var(--danger-light);color:var(--danger)}

.nav-row{display:flex;justify-content:space-between;margin-top:16px}
.nav-btn{font-size:13px;padding:7px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;display:flex;align-items:center;gap:6px}
.nav-btn:hover{background:var(--color-background-secondary)}
.nav-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.nav-btn.primary:hover{opacity:.9}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}

.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.tag{font-size:11px;padding:3px 9px;border-radius:10px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary)}
</style>
</head>
<body>
  <div class="hub">

</div>

      def:"The static keyword in Java means 'belongs to the class, not to any object'. Static members are shared across all instances.",

      when:"When a field should be common to all objects (e.g., a counter), or a method doesn't depend on instance state.",

    }
}`},
      {title:"Example 2 — Static method (utility)",code:`<span class='kw'>class</span> <span class='cls'>MathUtils</span> {

    <span class='kw'>public static void</span> main(<span class='kw'>String</span>[] args) {

      {title:"Example 4 — Static vs Instance method difference",code:`<span class='kw'>class</span> <span class='cls'>Demo</span> {
    <span class='kw'>int</span> x = <span class='num'>10</span>;          <span class='cm'>// instance variable</span>

    <span class='kw'>void</span> instanceMethod() {

}`},

    qa:[
      {q:"Q1. Can we override a static method in Java?",a:"No. Static methods are resolved at compile time (early binding), not runtime. You can redeclare it in a subclass (method hiding), but that is NOT overriding. Polymorphism doesn't apply to static methods."},
      {q:"Q2. Why is main() method static?",a:"JVM calls main() before any object is created. If it weren't static, the JVM would need to instantiate the class first — but it wouldn't know which constructor to use. Static allows JVM to call it directly via ClassName.main()."},
      {q:"Q3. What is static import in Java?",a:"static import lets you use static members of a class without the class name prefix. Example: import static java.lang.Math.PI; Then you can write PI instead of Math.PI."},

      "<strong>Default constructor</strong> — Provided by JVM only if you write zero constructors.",
      "<strong>Constructor overloading</strong> — Multiple constructors with different parameter lists.",
      "<strong>this()</strong> — Calls another constructor of the same class; must be the first statement.",

    concepts:[

    ],
    codes:[
      {title:"Example 1 — Default vs Parameterized constructor",code:`<span class='kw'>class</span> <span class='cls'>Student</span> {
    <span class='kw'>String</span> name;
    <span class='kw'>int</span> age;

    <span class='cm'>// Default constructor</span>
    <span class='cls'>Student</span>() {
        name = <span class='str'>"Unknown"</span>;
        age = <span class='num'>0</span>;
    }

    <span class='cm'>// Parameterized constructor</span>
    <span class='cls'>Student</span>(<span class='kw'>String</span> name, <span class='kw'>int</span> age) {

      {q:"Q1. What is the difference between constructor and method?",a:"Constructor has same name as class, no return type, and is called automatically on new. A method has a different name (usually), has a return type (even void), and is called explicitly. Constructors initialize objects; methods define behavior."},

const phases = ["Fundamentals","Intermediate","Advanced"];
let current = 0;
const seen = new Set();

function phaseOf(s){ return s.phase; }
function badgeClass(s){ return s.badge; }

function renderPhaseBar(){
  const bar = document.getElementById('phaseBar');
  bar.innerHTML = phases.map(p=>{
    const inPhase = sessions.some(s=>s.phase===p && s.id===current);
    return `<span class="phase-pill ${inPhase?'active':''}">${p}</span>`;
  }).join('');
}

function renderTabs(){
  const bar = document.getElementById('tabBar');
  bar.innerHTML = sessions.map(s=>`
    <button class="tab-btn ${s.id===current?'active':''} ${seen.has(s.id)&&s.id!==current?'done':''}"
      onclick="goTo(${s.id})">
      S${s.id+1}. ${s.title}
    </button>`).join('');
  bar.children[current].scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
}

function renderProgress(){
  const fill = document.getElementById('progFill');
  fill.style.width = (((seen.size)/(sessions.length))*100)+'%';
}

function renderSession(s){
  const o = s.overview;
  return `
<div class="session">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
    <span class="badge ${badgeClass(s)}">${s.phase}</span>
    <h2 style="font-size:18px;font-weight:500;color:var(--color-text-primary)">Session ${s.id+1}: ${s.title}</h2>
  </div>
  <div class="tag-row">${s.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>

  <div class="section">
    <div class="section-label"><i class="ti ti-info-circle" aria-hidden="true"></i> Overview</div>
    <div class="overview-card">
      <div class="title">${s.title}</div>
      <p>${o.def}</p>
      <div class="meta-grid">
        <div class="meta-item"><strong>What</strong><span>${o.what}</span></div>
        <div class="meta-item"><strong>Why</strong><span>${o.why}</span></div>
        <div class="meta-item"><strong>When</strong><span>${o.when}</span></div>
        <div class="meta-item"><strong>How</strong><span>${o.how}</span></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label"><i class="ti ti-message-2" aria-hidden="true"></i> Interview one-liners</div>
    <div class="oneliner-list">
      ${s.oneliners.map(l=>`<div class="oneliner">${l}</div>`).join('')}
    </div>
  </div>

  <div class="section">
    <div class="section-label"><i class="ti ti-topology-star" aria-hidden="true"></i> Concepts & architecture</div>
    ${s.concepts.map(c=>`
      <div class="concept-block">
        <h4><i class="ti ti-bulb" aria-hidden="true"></i> ${c.title}</h4>
        ${c.body?`<p>${c.body}</p>`:''}
        ${c.arch?`<div class="arch-box"><pre>${c.arch}</pre></div>`:''}
      </div>`).join('')}
  </div>

  <div class="section">
    <div class="section-label"><i class="ti ti-code" aria-hidden="true"></i> Code examples</div>
    ${s.codes.map((c,i)=>`
      <div class="code-block">
        <div class="code-title"><i class="ti ti-file-code" aria-hidden="true"></i> ${c.title}</div>
        <pre>${c.code}</pre>
      </div>`).join('')}
  </div>

  <div class="section">
    <div class="section-label"><i class="ti ti-checklist" aria-hidden="true"></i> Best practices</div>
    <div class="bp-list">
      ${s.bestPractices.map(b=>`
        <div class="bp-item">
          <div class="bp-icon ${b.ok?'ok':'warn'}">${b.ok?'✓':'!'}</div>
          <span>${b.text}</span>
        </div>`).join('')}
    </div>
  </div>

  <div class="section">
    <div class="section-label"><i class="ti ti-help-circle" aria-hidden="true"></i> Interview Q&A (SDET style)</div>
    <div class="qa-list">
      ${s.qa.map((q,i)=>`
        <div class="qa-item">
          <div class="qa-q" onclick="toggleQA(this)">${q.q} <i class="ti ti-chevron-down" aria-hidden="true"></i></div>
          <div class="qa-a">${q.a}</div>
        </div>`).join('')}
    </div>
  </div>

  <div class="nav-row">
    <button class="nav-btn" onclick="goTo(${s.id-1})" ${s.id===0?'disabled':''}>
      <i class="ti ti-arrow-left" aria-hidden="true"></i> Previous
    </button>
    <button class="nav-btn primary" onclick="goTo(${s.id+1})" ${s.id===sessions.length-1?'disabled':''}>
      Next <i class="ti ti-arrow-right" aria-hidden="true"></i>
    </button>
  </div>
</div>`;
}

function toggleQA(el){
  const ans = el.nextElementSibling;
  ans.classList.toggle('open');
}

function goTo(id){
  if(id<0||id>=sessions.length) return;
  seen.add(current);
  current=id;
  seen.add(current);
  document.getElementById('sessionContent').innerHTML = renderSession(sessions[current]);
  renderTabs();
  renderPhaseBar();
  renderProgress();
  document.querySelector('.hub').scrollIntoView({behavior:'smooth'});
}

goTo(0);
</script>
