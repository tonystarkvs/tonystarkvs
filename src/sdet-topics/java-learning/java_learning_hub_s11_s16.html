{q:"Q1. What is the difference between ArrayList and LinkedList?",a:"ArrayList uses a dynamic array — O(1) random access by index, O(n) insert/delete in middle. LinkedList uses doubly-linked nodes — O(n) random access, O(1) insert/delete at known position. Use ArrayList for frequent reads; LinkedList for frequent insertions."},
{q:"Q2. How does HashSet guarantee uniqueness?",a:"HashSet uses a HashMap internally. When you add an element, it calls hashCode() to find the bucket, then equals() to check for duplicates. If equals() returns true for an existing element, the add is ignored."},
{q:"Q3. What is the difference between HashMap and TreeMap?",a:"HashMap stores entries in a hash table — unordered, O(1) average get/put. TreeMap stores entries in a Red-Black tree — sorted by key, O(log n) get/put. Use HashMap for performance; TreeMap when sorted iteration is needed."},
{q:"Q4. Can a Map have duplicate values?",a:"Yes. Map keys must be unique, but values can repeat. Multiple keys can map to the same value. Example: {A→1, B→1, C→2} — 1 appears twice as a value."},
{q:"Q5. What is fail-fast vs fail-safe iterator?",a:"Fail-fast (ArrayList, HashMap iterators) throws ConcurrentModificationException if the collection is modified during iteration. Fail-safe (CopyOnWriteArrayList, ConcurrentHashMap) iterates on a snapshot copy and doesn't throw, but may not reflect the latest changes."}

{id:2,num:13,title:"Interface vs Abstract Class",phase:"Intermediate",badge:"inter",
tags:["interface","abstract","default method","IS-A","CAN-DO","Java 8"],
overview:{def:"Both interface and abstract class support abstraction, but they serve different purposes. Abstract class = partial blueprint for related classes (IS-A). Interface = capability contract for unrelated classes (CAN-DO).",
what:"Two mechanisms for achieving abstraction and defining contracts in Java.",
why:"To design flexible, loosely coupled systems where implementation details are hidden.",
when:"Abstract class when sharing code+state among related classes; Interface for capabilities across unrelated classes.",
where:"Declared with abstract class or interface keyword; used via extends/implements.",
how:"Extend abstract class with extends; implement interface with implements (multiple allowed)."},
oneliners:[
"<strong>Abstract class</strong> — Can have constructors, fields, concrete methods + abstract methods.",
"<strong>Interface</strong> — Pure contract; all fields are public static final; no constructors.",
"<strong>Multiple inheritance</strong> — A class implements multiple interfaces but extends only one class.",
"<strong>Java 8 default methods</strong> — Interfaces can now have method bodies via default keyword.",
"<strong>Rule of thumb</strong> — IS-A relationship → abstract class; CAN-DO capability → interface."
],
concepts:[
{title:"Side-by-side comparison",body:"",arch:`Feature              Abstract Class       Interface
Instantiate          ❌ No                ❌ No
Constructor          ✅ Yes               ❌ No
Instance fields      ✅ Yes               ❌ No (only static final)
Concrete methods     ✅ Yes               ✅ (default, Java 8+)
Abstract methods     ✅ Yes               ✅ Yes (implicit)
Multiple inherit     ❌ extends one       ✅ implements many
Access modifiers     Any                  Public only
Use for              Shared behavior      Capability contract`},
{title:"When to choose which",body:"",arch:`Should subclasses SHARE STATE (fields)?  → Abstract class
Do unrelated classes need same BEHAVIOR? → Interface
Need to model IS-A (Dog IS-A Animal)?    → Abstract class
Need CAN-DO (Dog CAN-DO Swimmable)?      → Interface
Java 8+ — small APIs with defaults?      → Interface (preferred)`}
],
codes:[
{title:"Example 1 — Abstract class (IS-A, shared state)",code:`<span class='kw'>abstract class</span> <span class='cls'>Vehicle</span> {
    <span class='kw'>String</span> brand;   <span class='cm'>// shared field</span>
    <span class='kw'>int</span> speed;

    <span class='cls'>Vehicle</span>(<span class='kw'>String</span> brand) { <span class='kw'>this</span>.brand = brand; }

    <span class='kw'>abstract void</span> fuelType();  <span class='cm'>// each subclass differs</span>

    <span class='kw'>void</span> start() { <span class='cm'>// shared concrete method</span>
        System.out.println(brand + <span class='str'>" started"</span>);
    }
}

<span class='kw'>class</span> <span class='cls'>Car</span> <span class='kw'>extends</span> <span class='cls'>Vehicle</span> {
    <span class='cls'>Car</span>(<span class='kw'>String</span> b) { <span class='kw'>super</span>(b); }
    <span class='ann'>@Override</span>
    <span class='kw'>void</span> fuelType() { System.out.println(<span class='str'>"Petrol"</span>); }
}`},
{title:"Example 2 — Interface (CAN-DO capability)",code:`<span class='kw'>interface</span> <span class='cls'>Printable</span> {
    <span class='kw'>void</span> print();
}
<span class='kw'>interface</span> <span class='cls'>Saveable</span> {
    <span class='kw'>void</span> save();
}

<span class='cm'>// Document can Print AND Save — unrelated capabilities</span>
<span class='kw'>class</span> <span class='cls'>Document</span> <span class='kw'>implements</span> <span class='cls'>Printable</span>, <span class='cls'>Saveable</span> {
    <span class='ann'>@Override</span>
    <span class='kw'>public void</span> print() { System.out.println(<span class='str'>"Printing..."</span>); }
    <span class='ann'>@Override</span>
    <span class='kw'>public void</span> save()  { System.out.println(<span class='str'>"Saving..."</span>); }
}`},
{title:"Example 3 — Combining both (common pattern)",code:`<span class='kw'>interface</span> <span class='cls'>Flyable</span> { <span class='kw'>void</span> fly(); }

<span class='kw'>abstract class</span> <span class='cls'>Bird</span> {           <span class='cm'>// IS-A: all birds share</span>
    <span class='kw'>String</span> name;
    <span class='kw'>abstract void</span> sound();
    <span class='kw'>void</span> eat() { System.out.println(<span class='str'>"Bird eats"</span>); }
}

<span class='cm'>// Eagle IS-A Bird AND CAN-DO Fly</span>
<span class='kw'>class</span> <span class='cls'>Eagle</span> <span class='kw'>extends</span> <span class='cls'>Bird</span> <span class='kw'>implements</span> <span class='cls'>Flyable</span> {
    <span class='ann'>@Override</span>
    <span class='kw'>void</span> sound() { System.out.println(<span class='str'>"Screech"</span>); }
    <span class='ann'>@Override</span>
    <span class='kw'>public void</span> fly()   { System.out.println(<span class='str'>"Eagle soars"</span>); }
}`},
{title:"Example 4 — Java 8 default method in interface",code:`<span class='kw'>interface</span> <span class='cls'>Greeter</span> {
    <span class='kw'>void</span> greet(<span class='kw'>String</span> name); <span class='cm'>// abstract</span>

    <span class='kw'>default void</span> greetAll(<span class='cls'>List</span>&lt;<span class='cls'>String</span>&gt; names) {
        names.forEach(<span class='kw'>this</span>::greet); <span class='cm'>// uses abstract method</span>
    }
}

<span class='kw'>class</span> <span class='cls'>FormalGreeter</span> <span class='kw'>implements</span> <span class='cls'>Greeter</span> {
    <span class='ann'>@Override</span>
    <span class='kw'>public void</span> greet(<span class='kw'>String</span> name) {
        System.out.println(<span class='str'>"Good morning, "</span> + name);
    }
    <span class='cm'>// greetAll() inherited from interface</span>
}`},
{title:"Example 5 — Interface in automation (Page Object)",code:`<span class='cm'>// Interface — every page CAN-DO these</span>
<span class='kw'>interface</span> <span class='cls'>PageActions</span> {
    <span class='kw'>boolean</span> isLoaded();
    <span class='kw'>void</span> waitForLoad();
}

<span class='cm'>// Abstract class — shared driver setup</span>
<span class='kw'>abstract class</span> <span class='cls'>BasePage</span> <span class='kw'>implements</span> <span class='cls'>PageActions</span> {
    <span class='kw'>protected</span> <span class='cls'>WebDriver</span> driver;
    <span class='cls'>BasePage</span>(<span class='cls'>WebDriver</span> d) { <span class='kw'>this</span>.driver = d; }
    <span class='kw'>public void</span> waitForLoad() {
        <span class='kw'>new</span> <span class='cls'>WebDriverWait</span>(driver, <span class='num'>10</span>)
            .until(d -> isLoaded());
    }
}

<span class='kw'>class</span> <span class='cls'>LoginPage</span> <span class='kw'>extends</span> <span class='cls'>BasePage</span> {
    <span class='cls'>LoginPage</span>(<span class='cls'>WebDriver</span> d) { <span class='kw'>super</span>(d); }
    <span class='kw'>public boolean</span> isLoaded() {
        <span class='kw'>return</span> driver.getTitle().contains(<span class='str'>"Login"</span>);
    }
}`}
],
bestPractices:[
{ok:true,text:"Start with interfaces; refactor to abstract class only if multiple implementations share state/code."},
{ok:true,text:"In automation frameworks, use interface for page contracts (PageActions) and abstract class for shared driver/wait logic (BasePage)."},
{ok:false,text:"Don't add instance variables to an interface — all interface fields are public static final (constants)."},
{ok:false,text:"Don't use abstract class just to prevent instantiation — use interface or private constructor instead."},
{ok:true,text:"Favor Interface Segregation (ISP from SOLID) — many small specific interfaces over one large interface."}
],
qa:[
{q:"Q1. Can abstract class implement an interface?",a:"Yes. An abstract class can implement an interface without providing implementations for all its methods — the responsibility cascades to the first concrete subclass. This is a common pattern in frameworks."},
{q:"Q2. What changed with interfaces in Java 8?",a:"Java 8 added default methods (method with body, keyword default) and static methods to interfaces. Java 9 added private methods. This narrowed the gap with abstract classes, but interfaces still can't have constructors or instance state."},
{q:"Q3. Why can't we instantiate an interface?",a:"Interfaces have no constructors and potentially no implementation. There's nothing to instantiate. You must provide a concrete implementing class. Anonymous class or lambda (for functional interfaces) are workarounds for one-off use."},
{q:"Q4. Abstract class vs Interface — which is preferred in Java 8+?",a:"In Java 8+, interfaces with default methods are often preferred because they allow multiple inheritance of behavior. Abstract class is still needed when you require constructors, instance fields, or non-public methods. Effective Java (Bloch) recommends interfaces for defining types."},
{q:"Q5. How are abstract class and interface used in Selenium framework design?",a:"Interface defines the contract (what pages/tests must do): PageActions, TestLifecycle. Abstract class provides shared infrastructure (how things work): BasePage with driver, waits, and screenshot logic. Concrete page classes extend BasePage and satisfy interface contracts."}
]
},

{ok:true,text:"Always use equals() or equalsIgnoreCase() to compare Strings — never == (compares references)."},
{ok:true,text:"Use trim() or strip() before comparisons to avoid whitespace-caused test failures."},
{ok:false,text:"Don't concatenate Strings in loops with + — it creates many garbage String objects; use StringBuilder."},

qa:[
{q:"Q1. Why should we use equals() instead of == for String comparison?",a:"== compares references (memory addresses). String literals share the String pool, so == may return true coincidentally. But new String('abc') == new String('abc') returns false because they're different objects. equals() always compares the actual character content — use it always."},
{q:"Q2. What is the difference between replace() and replaceAll()?",a:"replace(old, new) replaces a literal CharSequence — no regex. replaceAll(regex, replacement) uses regex pattern matching. replaceAll('[0-9]', '#') replaces all digits; replace('[0-9]', '#') looks for the literal string '[0-9]'."},
{q:"Q3. What is the difference between trim() and strip()?",a:"trim() removes characters with ASCII value ≤ 32 (standard whitespace). strip() (Java 11+) uses Unicode whitespace definition — handles non-breaking spaces and other Unicode whitespace. strip() is the modern preferred method."},
{q:"Q4. What does substring(a, b) return?",a:"Characters from index a (inclusive) to index b (exclusive). 'HelloWorld'.substring(0,5) returns 'Hello'. 'HelloWorld'.substring(5) returns 'World'. If indices are out of range, StringIndexOutOfBoundsException is thrown."},
{q:"Q5. How to check if a String is null or empty safely?",a:"Never call str.isEmpty() on a potentially null String — NullPointerException. Use: str == null || str.isEmpty() — for null or empty. str == null || str.isBlank() — for null, empty, or only whitespace (Java 11). Or use Apache Commons: StringUtils.isBlank(str)."}
]
},

{title:"Comparison table",body:"",arch:`Feature         String        StringBuffer    StringBuilder

Thread-safe     ✅ Yes*       ✅ Yes          ❌ No
Performance     Slowest       Medium          Fastest
Storage         String pool   Heap            Heap
Methods         50+           append,insert   append,insert
                              delete,reverse  delete,reverse
*immutable = inherently thread-safe`},
{title:"Memory: literal vs new keyword",body:"",arch:`<span class='kw'>String</span> s1 = <span class='str'>"Hello"</span>;  <span class='cm'>// String pool (SCP)</span>
<span class='kw'>String</span> s2 = <span class='str'>"Hello"</span>;  <span class='cm'>// reuses same pool object</span>
s1 == s2 → <span class='kw'>true</span>     <span class='cm'>// same reference</span>

<span class='kw'>String</span> s3 = <span class='kw'>new</span> <span class='cls'>String</span>(<span class='str'>"Hello"</span>); <span class='cm'>// forces new heap object</span>
s1 == s3 → <span class='kw'>false</span>   <span class='cm'>// different references</span>
s1.equals(s3) → <span class='kw'>true</span>  <span class='cm'>// same content</span>

<span class='cls'>StringBuilder</span> sb = <span class='kw'>new</span> <span class='cls'>StringBuilder</span>(<span class='str'>"Hello"</span>);
sb.append(<span class='str'>" World"</span>); <span class='cm'>// modifies SAME object</span>`}
],
codes:[
{title:"Example 1 — String immutability proof",code:`<span class='kw'>String</span> s = <span class='str'>"Hello"</span>;
System.out.println(s.hashCode()); <span class='cm'>// e.g. 69609650</span>

s = s + <span class='str'>" World"</span>; <span class='cm'>// creates NEW String object</span>
System.out.println(s.hashCode()); <span class='cm'>// DIFFERENT hash</span>
<span class='cm'>// Original "Hello" object still in pool — just unreferenced</span>

<span class='cm'>// concat also creates new object</span>
<span class='kw'>String</span> s2 = <span class='str'>"Java"</span>;
<span class='kw'>String</span> s3 = s2.concat(<span class='str'>" Programming"</span>);
System.out.println(s2); <span class='cm'>// still "Java" — unchanged</span>`},
{title:"Example 2 — StringBuilder (single-thread building)",code:`<span class='cls'>StringBuilder</span> sb = <span class='kw'>new</span> <span class='cls'>StringBuilder</span>();

sb.append(<span class='str'>"Hello"</span>);    <span class='cm'>// "Hello"</span>
sb.append(<span class='str'>" World"</span>);   <span class='cm'>// "Hello World"</span>
sb.insert(<span class='num'>5</span>, <span class='str'>","</span>);    <span class='cm'>// "Hello, World"</span>
sb.delete(<span class='num'>5</span>, <span class='num'>6</span>);     <span class='cm'>// "Hello World"</span>
sb.reverse();          <span class='cm'>// "dlroW olleH"</span>
sb.replace(<span class='num'>0</span>,<span class='num'>5</span>,<span class='str'>"Java"</span>); <span class='cm'>// "Java olleH"</span>

System.out.println(sb.toString());
System.out.println(<span class='str'>"Length: "</span> + sb.length());`},
{title:"Example 3 — StringBuffer (thread-safe)",code:`<span class='cls'>StringBuffer</span> sbf = <span class='kw'>new</span> <span class='cls'>StringBuffer</span>(<span class='str'>"Thread"</span>);

<span class='cm'>// All methods are synchronized</span>
sbf.append(<span class='str'>"-Safe"</span>);
sbf.insert(<span class='num'>0</span>, <span class='str'>"[START] "</span>);
System.out.println(sbf); <span class='cm'>// [START] Thread-Safe</span>

<span class='cm'>// Shared StringBuffer in multi-threaded context</span>
<span class='cls'>StringBuffer</span> shared = <span class='kw'>new</span> <span class='cls'>StringBuffer</span>();
<span class='cls'>Runnable</span> task = () -> shared.append(<span class='str'>"X"</span>); <span class='cm'>// safe</span>
<span class='kw'>new</span> <span class='cls'>Thread</span>(task).start();
<span class='kw'>new</span> <span class='cls'>Thread</span>(task).start();`},
{title:"Example 4 — Performance comparison",code:`<span class='kw'>int</span> N = <span class='num'>100000</span>;

<span class='cm'>// String — creates 100000 objects (slow!)</span>
<span class='kw'>long</span> t1 = <span class='cls'>System</span>.currentTimeMillis();
<span class='kw'>String</span> s = <span class='str'>""</span>;
<span class='kw'>for</span> (<span class='kw'>int</span> i=<span class='num'>0</span>; i&lt;N; i++) s += <span class='str'>"a"</span>;
System.out.println(<span class='str'>"String: "</span> + (<span class='cls'>System</span>.currentTimeMillis()-t1) + <span class='str'>"ms"</span>);

<span class='cm'>// StringBuilder — modifies ONE object (fast!)</span>
<span class='kw'>long</span> t2 = <span class='cls'>System</span>.currentTimeMillis();
<span class='cls'>StringBuilder</span> sb = <span class='kw'>new</span> <span class='cls'>StringBuilder</span>();
<span class='kw'>for</span> (<span class='kw'>int</span> i=<span class='num'>0</span>; i&lt;N; i++) sb.append(<span class='str'>"a"</span>);
System.out.println(<span class='str'>"StringBuilder: "</span> + (<span class='cls'>System</span>.currentTimeMillis()-t2) + <span class='str'>"ms"</span>);
<span class='cm'>// StringBuilder is ~100x faster for large loops</span>`},
{title:"Example 5 — String pool vs heap (literal vs new)",code:`<span class='kw'>String</span> a = <span class='str'>"Java"</span>;           <span class='cm'>// pool</span>
<span class='kw'>String</span> b = <span class='str'>"Java"</span>;           <span class='cm'>// same pool object</span>
<span class='kw'>String</span> c = <span class='kw'>new</span> <span class='cls'>String</span>(<span class='str'>"Java"</span>); <span class='cm'>// heap</span>

System.out.println(a == b);           <span class='cm'>// true  (pool)</span>
System.out.println(a == c);           <span class='cm'>// false (heap)</span>
System.out.println(a.equals(c));      <span class='cm'>// true  (content)</span>

<span class='cm'>// intern() moves heap string to pool</span>
<span class='kw'>String</span> d = c.intern();
System.out.println(a == d);           <span class='cm'>// true</span>`}
],
bestPractices:[
{ok:true,text:"Use StringBuilder for string building in loops and local methods — fastest and garbage-friendly."},
{ok:true,text:"Use StringBuffer only when a mutable string object is shared across multiple threads."},
{ok:false,text:"Don't use String concatenation (+) in loops with large iterations — massive garbage generation."},
{ok:false,text:"Don't use StringBuffer where StringBuilder suffices — synchronization overhead is unnecessary."},
{ok:true,text:"Use String for constants, configuration values, and method parameters — immutability makes them safe to share."}
],
qa:[
{q:"Q1. Why is String immutable in Java?",a:"Security (class names, network URLs can't be tampered), String pool efficiency (shared safely because no one can change the value), thread safety (immutable objects are inherently safe), and hashCode caching (HashMap key hash computed once). The designers made this fundamental decision for the language."},
{q:"Q2. What is the String Constant Pool (SCP)?",a:"The String pool is a special area in the heap (Java 7+ moved from PermGen to heap) where String literals are stored and reused. When you write String s = 'Java', JVM checks the pool first. If 'Java' exists, it returns that reference. If not, it creates one and adds it. This avoids duplicate String objects."},
{q:"Q3. What does intern() do?",a:"str.intern() returns the canonical representation from the String pool. If the pool already contains a string equal to str, it returns that pool reference. Otherwise, it adds str to the pool and returns it. Useful for memory optimization when working with many identical strings."},
{q:"Q4. When would you use StringBuffer over StringBuilder?",a:"Only when the mutable string object is accessed by multiple threads concurrently. StringBuffer's methods are synchronized, making them thread-safe at the cost of performance. In 99% of cases (single-threaded code), StringBuilder is the right choice."},
{q:"Q5. What happens behind the scenes when you use + to concatenate Strings?",a:"The Java compiler converts String s = 'a' + 'b' + 'c' into new StringBuilder().append('a').append('b').append('c').toString(). However, inside a loop, the compiler creates a new StringBuilder on EVERY iteration, defeating the purpose — which is why you must create the StringBuilder yourself outside the loop."}
]
},

{id:5,num:16,title:"Types of Constructors & Automation Use",phase:"Automation",badge:"auto",
tags:["default","parameterized","copy","private","chained","POM","PageFactory","automation"],
overview:{def:"Java constructors initialize objects. In automation frameworks, constructors are critical for setting up WebDriver, initializing page elements via PageFactory, and injecting dependencies into page objects.",
what:"All constructor types and their real-world application in Selenium/TestNG automation.",
why:"To build robust, reusable Page Object Models where objects are properly initialized before use.",
when:"Every time a Page Object, test class, or utility is instantiated — the constructor runs setup.",
where:"Page classes, base test classes, data model classes, test helper utilities.",
how:"Use parameterized constructors to pass WebDriver; use PageFactory.initElements() inside them."},
oneliners:[
"<strong>Default constructor</strong> — No-arg; JVM provides it if none written; often overridden in test base classes.",
"<strong>Parameterized constructor</strong> — Takes WebDriver as arg; used in every POM page class.",
"<strong>Copy constructor</strong> — Clones a test data object; useful in data-driven tests.",
"<strong>Private constructor</strong> — Used in utility classes (DriverManager) and singleton patterns.",
"<strong>Constructor chaining</strong> — this() or super() delegates setup; avoids code duplication in base/child pages."
],
concepts:[
{title:"Constructor types at a glance",body:"",arch:`<span class='cls'>Constructor Type</span>    <span class='cls'>Automation Use</span>
Default             BaseTest with default browser config
Parameterized       POM pages receive WebDriver
Copy                Clone TestData objects for isolation
Private + static    DriverFactory singleton pattern
Chained (this/super) BasePage → LoginPage → extends setup`},
{title:"POM constructor pattern",body:"",arch:`<span class='kw'>class</span> <span class='cls'>LoginPage</span> <span class='kw'>extends</span> <span class='cls'>BasePage</span> {
    LoginPage(<span class='cls'>WebDriver</span> driver) {
        <span class='kw'>super</span>(driver);               <span class='cm'>// chain to BasePage</span>
        <span class='cls'>PageFactory</span>.initElements(    <span class='cm'>// init @FindBy fields</span>
            driver, <span class='kw'>this</span>);
    }
}`}
],
codes:[
{title:"Example 1 — Default and parameterized in POM",code:`<span class='cm'>// BasePage — parameterized receives WebDriver</span>
<span class='kw'>abstract class</span> <span class='cls'>BasePage</span> {
    <span class='kw'>protected</span> <span class='cls'>WebDriver</span> driver;
    <span class='kw'>protected</span> <span class='cls'>WebDriverWait</span> wait;

    <span class='cls'>BasePage</span>(<span class='cls'>WebDriver</span> driver) {
        <span class='kw'>this</span>.driver = driver;
        <span class='kw'>this</span>.wait = <span class='kw'>new</span> <span class='cls'>WebDriverWait</span>(driver, <span class='cls'>Duration</span>.ofSeconds(<span class='num'>10</span>));
    }
}

<span class='cm'>// LoginPage — chains to BasePage + PageFactory init</span>
<span class='kw'>class</span> <span class='cls'>LoginPage</span> <span class='kw'>extends</span> <span class='cls'>BasePage</span> {
    <span class='ann'>@FindBy</span>(id=<span class='str'>"username"</span>) <span class='cls'>WebElement</span> usernameField;
    <span class='ann'>@FindBy</span>(id=<span class='str'>"password"</span>) <span class='cls'>WebElement</span> passwordField;

    <span class='cls'>LoginPage</span>(<span class='cls'>WebDriver</span> driver) {
        <span class='kw'>super</span>(driver); <span class='cm'>// chain to BasePage</span>
        <span class='cls'>PageFactory</span>.initElements(driver, <span class='kw'>this</span>);
    }
}`},
{title:"Example 2 — Copy constructor for test data isolation",code:`<span class='kw'>class</span> <span class='cls'>TestData</span> {
    <span class='kw'>String</span> username, password, role;
    <span class='kw'>boolean</span> isActive;

    <span class='cls'>TestData</span>(<span class='kw'>String</span> user, <span class='kw'>String</span> pass, <span class='kw'>String</span> role, <span class='kw'>boolean</span> active) {
        <span class='kw'>this</span>.username = user; <span class='kw'>this</span>.password = pass;
        <span class='kw'>this</span>.role = role; <span class='kw'>this</span>.isActive = active;
    }

    <span class='cm'>// Copy constructor — independent copy for each test</span>
    <span class='cls'>TestData</span>(<span class='cls'>TestData</span> other) {
        <span class='kw'>this</span>.username = other.username;
        <span class='kw'>this</span>.password = other.password;
        <span class='kw'>this</span>.role     = other.role;
        <span class='kw'>this</span>.isActive = other.isActive;
    }
}

<span class='cm'>// Each test gets its OWN copy — no shared-state bugs</span>
<span class='cls'>TestData</span> base = <span class='kw'>new</span> <span class='cls'>TestData</span>(<span class='str'>"admin"</span>,<span class='str'>"pass"</span>,<span class='str'>"ADMIN"</span>,<span class='kw'>true</span>);
<span class='cls'>TestData</span> t1   = <span class='kw'>new</span> <span class='cls'>TestData</span>(base); <span class='cm'>// isolated copy</span>`},
{title:"Example 3 — Private constructor (DriverManager singleton)",code:`<span class='kw'>class</span> <span class='cls'>DriverManager</span> {
    <span class='kw'>private static</span> <span class='cls'>WebDriver</span> driver;

    <span class='kw'>private</span> <span class='cls'>DriverManager</span>() { <span class='cm'>// no external instantiation</span> }

    <span class='kw'>public static</span> <span class='cls'>WebDriver</span> getDriver() {
        <span class='kw'>if</span> (driver == <span class='kw'>null</span>) {
            driver = <span class='kw'>new</span> <span class='cls'>ChromeDriver</span>();
            driver.manage().window().maximize();
        }
        <span class='kw'>return</span> driver;
    }

    <span class='kw'>public static void</span> quitDriver() {
        <span class='kw'>if</span> (driver != <span class='kw'>null</span>) {
            driver.quit(); driver = <span class='kw'>null</span>;
        }
    }
}
<span class='cm'>// Usage: DriverManager.getDriver().get("https://...")</span>`},
{title:"Example 4 — Constructor chaining in BaseTest",code:`<span class='kw'>class</span> <span class='cls'>BaseTest</span> {
    <span class='kw'>protected</span> <span class='cls'>WebDriver</span> driver;
    <span class='kw'>protected</span> <span class='kw'>String</span> baseUrl;

    <span class='cm'>// Default — chrome + production</span>
    <span class='cls'>BaseTest</span>() {
        <span class='kw'>this</span>(<span class='str'>"chrome"</span>, <span class='str'>"https://prod.example.com"</span>);
    }

    <span class='cm'>// Browser only — default url</span>
    <span class='cls'>BaseTest</span>(<span class='kw'>String</span> browser) {
        <span class='kw'>this</span>(browser, <span class='str'>"https://prod.example.com"</span>);
    }

    <span class='cm'>// Full parameterized — sets everything up</span>
    <span class='cls'>BaseTest</span>(<span class='kw'>String</span> browser, <span class='kw'>String</span> url) {
        <span class='kw'>this</span>.baseUrl = url;
        <span class='kw'>this</span>.driver  = <span class='str'>"firefox"</span>.equals(browser)
            ? <span class='kw'>new</span> <span class='cls'>FirefoxDriver</span>()
            : <span class='kw'>new</span> <span class='cls'>ChromeDriver</span>();
    }
}`},
{title:"Example 5 — Full POM with constructor + @FindBy",code:`<span class='kw'>class</span> <span class='cls'>DashboardPage</span> <span class='kw'>extends</span> <span class='cls'>BasePage</span> {
    <span class='ann'>@FindBy</span>(css = <span class='str'>".welcome-msg"</span>)
    <span class='kw'>private</span> <span class='cls'>WebElement</span> welcomeMsg;

    <span class='ann'>@FindBy</span>(id = <span class='str'>"logout-btn"</span>)
    <span class='kw'>private</span> <span class='cls'>WebElement</span> logoutBtn;

    <span class='ann'>@FindBy</span>(css = <span class='str'>".menu-item"</span>)
    <span class='kw'>private</span> <span class='cls'>List</span>&lt;<span class='cls'>WebElement</span>&gt; menuItems;

    <span class='cls'>DashboardPage</span>(<span class='cls'>WebDriver</span> driver) {
        <span class='kw'>super</span>(driver);
        <span class='cls'>PageFactory</span>.initElements(driver, <span class='kw'>this</span>); <span class='cm'>// wires @FindBy</span>
    }

    <span class='kw'>public</span> <span class='cls'>String</span> getWelcomeMessage() {
        <span class='kw'>return</span> welcomeMsg.getText();
    }

    <span class='kw'>public</span> <span class='cls'>LoginPage</span> logout() {
        logoutBtn.click();
        <span class='kw'>return new</span> <span class='cls'>LoginPage</span>(driver); <span class='cm'>// returns next page</span>
    }
}`}
],
bestPractices:[
{ok:true,text:"Always call super(driver) in page class constructors to initialize BasePage fields before PageFactory."},
{ok:true,text:"Use PageFactory.initElements(driver, this) inside the page constructor — not in a setup method — to guarantee element wiring at construction time."},
{ok:false,text:"Don't create WebDriver in every page class constructor — create it once in BaseTest and pass as parameter."},
{ok:false,text:"Don't use no-arg constructors in page objects — forces null WebDriver which fails at runtime."},
{ok:true,text:"Use private constructor + static getInstance() in DriverManager to prevent multiple browser instances."}
],
qa:[
{q:"Q1. Why do all POM page classes take WebDriver in their constructor?",a:"The constructor receives the already-running WebDriver instance from the test. This is Dependency Injection — the page doesn't create the driver, the test does. This way all pages in a test share the same browser session, and the test controls the browser lifecycle (quit in @AfterTest)."},
{q:"Q2. What does PageFactory.initElements(driver, this) do?",a:"It wires up all @FindBy annotated WebElement fields in the page class. Without it, those fields remain null and throw NullPointerException when used. The 'this' passes the current page object so PageFactory knows which class to scan for @FindBy annotations."},
{q:"Q3. What is the DriverManager singleton pattern and why is it used?",a:"A private constructor with a static getDriver() method that creates the WebDriver only once. In automation, it prevents accidentally opening multiple browser instances. Tests call DriverManager.getDriver() to get the shared instance, and DriverManager.quitDriver() in teardown to close it cleanly."},
{q:"Q4. Why use constructor chaining (this()) in BaseTest?",a:"To support multiple test configurations (browser, URL, environment) without duplicating setup code. The default constructor delegates to the full parameterized one. Tests can choose: new BaseTest() for defaults, or new BaseTest('firefox', 'https://staging.com') for specific configs."},
{q:"Q5. How is copy constructor useful in data-driven automation?",a:"When running the same test with different data, each iteration needs its own independent TestData object. If one test modifies the data (e.g., changes username), it shouldn't affect other tests. Copy constructor creates a deep copy so each test has isolated data — preventing shared-state test pollution."}
]
}

const phases=["Intermediate","Automation"];
let cur=0;
const seen=new Set();

function renderPhaseBar(){
  document.getElementById('phaseBar').innerHTML=phases.map(p=>{
    const active=SS[cur].phase===p;
    return `<span class="phase-pill ${active?'active':''}">${p}</span>`;
  }).join('');
}

function renderTabs(){
  const bar=document.getElementById('tabBar');
  bar.innerHTML=SS.map(s=>`
    <button class="tab-btn ${s.id===cur?'active':''} ${seen.has(s.id)&&s.id!==cur?'done':''}"
      onclick="goTo(${s.id})">
      S${s.num}. ${s.title}
    </button>`).join('');
  bar.children[cur].scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
}

function renderProg(){
  document.getElementById('progFill').style.width=((seen.size/SS.length)*100)+'%';
}

function renderSession(s){
  const o=s.overview;
  return `
<div class="session">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
    <span class="badge ${s.badge}">${s.phase}</span>
    <h2 style="font-size:18px;font-weight:500;color:var(--color-text-primary)">Session ${s.num}: ${s.title}</h2>
  </div>
  <div class="tag-row">${s.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>

  <div class="sec">
    <div class="sec-label"><i class="ti ti-info-circle" aria-hidden="true"></i> Overview</div>
    <div class="ov-card">
      <div class="ov-title">${s.title}</div>
      <p>${o.def}</p>
      <div class="meta-grid">
        <div class="meta-item"><strong>What</strong><span>${o.what}</span></div>
        <div class="meta-item"><strong>Why</strong><span>${o.why}</span></div>
        <div class="meta-item"><strong>When</strong><span>${o.when}</span></div>
        <div class="meta-item"><strong>How</strong><span>${o.how}</span></div>
      </div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-label"><i class="ti ti-message-2" aria-hidden="true"></i> Interview one-liners</div>
    <div class="ol-list">${s.oneliners.map(l=>`<div class="ol-item">${l}</div>`).join('')}</div>
  </div>

  <div class="sec">
    <div class="sec-label"><i class="ti ti-topology-star" aria-hidden="true"></i> Concepts & architecture</div>
    ${s.concepts.map(c=>`
      <div class="con-block">
        <h4><i class="ti ti-bulb" aria-hidden="true"></i> ${c.title}</h4>
        ${c.body?`<p>${c.body}</p>`:''}
        ${c.arch?`<div class="arch">${c.arch}</div>`:''}
      </div>`).join('')}
  </div>

  <div class="sec">
    <div class="sec-label"><i class="ti ti-code" aria-hidden="true"></i> Code examples</div>
    ${s.codes.map(c=>`
      <div class="code-block">
        <div class="ct"><i class="ti ti-file-code" aria-hidden="true"></i> ${c.title}</div>
        <pre><code class="language-java">${c.code}</code></pre>
      </div>`).join('')}
  </div>

  <div class="sec">
    <div class="sec-label"><i class="ti ti-checklist" aria-hidden="true"></i> Best practices</div>
    <div class="bp-list">
      ${s.bestPractices.map(b=>`
        <div class="bp-item">
          <div class="bp-icon ${b.ok?'ok':'warn'}">${b.ok?'✓':'!'}</div>
          <span>${b.text}</span>
        </div>`).join('')}
    </div>
  </div>

  <div class="sec">
    <div class="sec-label"><i class="ti ti-help-circle" aria-hidden="true"></i> Interview Q&A (SDET style)</div>
    <div class="qa-list">
      ${s.qa.map(q=>`
        <div class="qa-item">
          <div class="qa-q" onclick="this.nextElementSibling.classList.toggle('open')">${q.q} <i class="ti ti-chevron-down" aria-hidden="true"></i></div>
          <div class="qa-a">${q.a}</div>
        </div>`).join('')}
    </div>
  </div>

  <div class="nav-row">
    <button class="nav-btn" onclick="goTo(${s.id-1})" ${s.id===0?'disabled':''}>
      <i class="ti ti-arrow-left" aria-hidden="true"></i> Previous
    </button>
    <button class="nav-btn primary" onclick="goTo(${s.id+1})" ${s.id===SS.length-1?'disabled':''}>
      Next <i class="ti ti-arrow-right" aria-hidden="true"></i>
    </button>
  </div>
</div>`;
}

function goTo(id){
  if(id<0||id>=SS.length) return;
  seen.add(cur); cur=id; seen.add(cur);
  document.getElementById('content').innerHTML=renderSession(SS[cur]);
  renderTabs(); renderPhaseBar(); renderProg();
  document.querySelector('.hub').scrollIntoView({behavior:'smooth'});
}

goTo(0);
</script>

    <!-- PRISM DYNAMIC HIGHLIGHT FIX -->
    <script>
    if (window.Prism) {
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new MutationObserver((mutations) => {
                let needsHighlight = false;
                mutations.forEach(m => {
                    if (m.addedNodes.length) {
                        m.addedNodes.forEach(n => {
                            if (n.nodeName === 'PRE' || n.nodeName === 'CODE') needsHighlight = true;
                            if (n.querySelector && n.querySelector('pre')) needsHighlight = true;
                        });
                    }
                });
                if (needsHighlight) {
                    Prism.highlightAll();
                }
            });
            observer.observe(document.body, { childList: true, subtree: true });
        });
    }
    </script>


    <script src="../portal-enhance.js"></script>
