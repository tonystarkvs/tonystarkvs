secs:[
{ico:"📖",bg:"#E8F5E9",title:"SOLID Enables CI/CD Excellence",body:`
<p style="margin-bottom:12px">Every CI/CD optimization in a Selenium framework traces back to a SOLID principle. Test parallelism, environment stratification, fast feedback — all require SOLID-compliant architecture.</p>
<div class="diag">
<svg viewBox="0 0 680 290" xmlns="http://www.w3.org/2000/svg" role="img">
<title>SOLID Principles Enabling CI/CD Pipeline Stages</title>
<defs><marker id="a14" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text x="340" y="18" text-anchor="middle" fill="var(--color-text-primary)" font-size="13" font-weight="500" font-family="Anthropic Sans,sans-serif">SOLID → CI/CD Pipeline Stages</text>
<rect x="20" y="30" width="640" height="50" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.5"/>
<text x="340" y="52" text-anchor="middle" fill="#0c3d7a" font-size="12" font-weight="500" font-family="Anthropic Sans,sans-serif">Stage 1: Unit Tests (DIP: mock driver) — 30 seconds</text>
<text x="340" y="70" text-anchor="middle" fill="#1565C0" font-size="10" font-family="Anthropic Sans,sans-serif">MockDriverFactory injected — no browser — tests page logic, helper classes, data providers</text>

<rect x="20" y="100" width="640" height="50" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.5"/>
<text x="340" y="122" text-anchor="middle" fill="#1b5e20" font-size="12" font-weight="500" font-family="Anthropic Sans,sans-serif">Stage 2: Smoke Tests (OCP: ChromeFactory) — 5 minutes</text>
<text x="340" y="140" text-anchor="middle" fill="#2E7D32" font-size="10" font-family="Anthropic Sans,sans-serif">ChromeDriverFactory injected — headless — critical path tests only — same test code as Stage 1</text>

<rect x="20" y="170" width="640" height="50" rx="8" fill="#F3E5F5" stroke="#7B3FA0" stroke-width="0.5"/>
<text x="340" y="192" text-anchor="middle" fill="#4a1775" font-size="12" font-weight="500" font-family="Anthropic Sans,sans-serif">Stage 3: Cross-Browser (OCP: RemoteFactory grid) — 15 minutes</text>
<text x="340" y="210" text-anchor="middle" fill="#7B3FA0" font-size="10" font-family="Anthropic Sans,sans-serif">RemoteDriverFactory + Selenium Grid — Chrome/Firefox/Edge parallel — same test code</text>

<rect x="20" y="240" width="640" height="40" rx="8" fill="#FFF8E1" stroke="#F57F17" stroke-width="0.5"/>
<text x="340" y="256" text-anchor="middle" fill="#7a3d0c" font-size="11" font-weight="500" font-family="Anthropic Sans,sans-serif">Stage 4: Mobile (OCP: AppiumFactory) — 20 minutes</text>
<text x="340" y="272" text-anchor="middle" fill="#F57F17" font-size="10" font-family="Anthropic Sans,sans-serif">AppiumDriverFactory — iOS/Android — same page objects where applicable</text>

<text x="20" y="300" text-anchor="start" fill="var(--color-text-secondary)" font-size="10" font-family="Anthropic Sans,sans-serif">All stages use identical test classes — only injected factories differ (DIP+OCP). Zero test code duplication across stages.</text>
</svg>
</div>
<pre>
// CI/CD: Maven profile-driven factory selection
// pom.xml
// &lt;profile id="smoke"&gt; -Ddriver.factory=chrome -Denv=staging &lt;/profile&gt;
// &lt;profile id="grid"&gt;  -Ddriver.factory=remote -DgridUrl=http://hub:4444 &lt;/profile&gt;

public class FrameworkConfig {
    private static final String FACTORY = System.getProperty("driver.factory","chrome");
    
    public static IDriverFactory driverFactory() {
        return switch(FACTORY) {
            case "firefox" -> new FirefoxDriverFactory();
            case "remote"  -> new RemoteDriverFactory(
                                URI.create(System.getProperty("gridUrl")).toURL(),
                                new ChromeOptions());
            case "mock"    -> new MockDriverFactory();  // unit tests
            default        -> new ChromeDriverFactory(true); // headless
        };
    }
    // All other factories resolved similarly — DIP+OCP
}

// GitHub Actions (.yml) — multi-stage pipeline
// stage-unit:   mvn test -Punit -Ddriver.factory=mock
// stage-smoke:  mvn test -Psmoke -Ddriver.factory=chrome
// stage-grid:   mvn test -Pregression -Ddriver.factory=remote -DgridUrl=$GRID_URL
</pre>

<ul class="cklist">

  <li><div class="ck">✓</div><div>Use TestNG parallel="methods" with ThreadLocal DriverManager — SOLID DIP enables thread-safe parallel execution</div></li>

</ul>

{ico:"🎯",bg:"#F3E5F5",title:"Q&A — CI/CD + SOLID",body:`
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q1: How do you implement parallel test execution using SOLID principles?</span><span class="qa-tag">Parallel</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Thread-safe driver management using DIP: class DriverManager { private static final ThreadLocal&lt;WebDriver&gt; drivers = new ThreadLocal&lt;&gt;(); public static void init(IDriverFactory f) { drivers.set(f.create()); } public static WebDriver get() { return drivers.get(); } public static void quit() { if(get()!=null){ get().quit(); drivers.remove(); } } }. TestBase @BeforeEach: DriverManager.init(factory). Page Objects call DriverManager.get(). Each thread gets its own driver (SRP: DriverManager owns driver lifecycle). DIP: factory interface determines which driver. OCP: add new factories without changing DriverManager. Configured via testng.xml parallel="methods" thread-count="4".</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q2: How does Docker + Selenium Grid interact with your SOLID framework?</span><span class="qa-tag">Docker</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Docker Compose: selenium/hub + selenium/node-chrome + selenium/node-firefox. SOLID framework: RemoteDriverFactory(hubUrl, caps) is the only change needed to use Grid. Tests are identical — DIP ensures they don't know or care about local vs remote. CI: docker-compose up, wait for Grid healthy, run mvn test -Ddriver.factory=remote. Teardown: docker-compose down. The SOLID principle that enables this: DIP. Without it, switching to Grid would require editing test classes. With it, it's a CI configuration concern only.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q3: How do you handle environment-specific test data with SOLID?</span><span class="qa-tag">Environments</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">IDataProvider interface (DIP) with environment-aware implementation: class EnvironmentDataProvider implements IDataProvider { private final String env = System.getProperty("env","local"); public &lt;T&gt; T load(String key, Class&lt;T&gt; type) { String path = "testdata/" + env + "/" + key + ".json"; return JsonUtil.parse(path, type); } }. Tests call data.load("login.admin", LoginData.class) — the env folder is selected transparently. Add staging/prod folders without changing test code (OCP). Local dev uses local/ folder. CI staging uses staging/ folder. DIP + OCP = environment-agnostic tests.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q4: How does ISP help with test tagging and selective test execution?</span><span class="qa-tag">TestNG</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">ISP-compliant interfaces make @Tag/@Groups meaningful. Tests implementing ISmokeTestable are tagged @Tag("smoke"). Tests implementing IRegressionTestable are @Tag("regression"). ISP ensures smoke tests only depend on minimal interfaces (IGetApiClient, not IDeleteApiClient). CI Stage 1: mvn test -Dgroups=smoke — runs only smoke-tagged tests with minimal mock setup. Stage 2: -Dgroups=regression. Because of ISP, smoke tests have fewer dependencies = faster setup = faster CI feedback. Fat interfaces blur these boundaries — every test looks equally heavy to the scheduler.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q5: How do you measure SOLID compliance in CI over time?</span><span class="qa-tag">Metrics</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">SonarQube metrics tracked per build: (1) Avg class complexity — spikes indicate God class growth (SRP); (2) TestBase line count — enforce &lt;150 lines; (3) Dependency count per class — more than 6 = DIP+ISP smell; (4) "By.*" usage in test packages — should be 0 (SRP); (5) Static method count in test helpers — should be 0 (DIP); (6) ArchUnit test pass rate — 100% required. Store these in Grafana dashboards. Track trends, not just snapshots. A rising "avg test class complexity" metric weeks before a release is an early warning sign of SOLID erosion under deadline pressure.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q6: How do you implement retry logic for flaky tests using OCP?</span><span class="qa-tag">Resilience</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">OCP-compliant retry: create IRetryAnalyzer interface (TestNG) or custom @RetryTest annotation (JUnit 5 extension). Implementation: RetryOnFlaky implements IRetryAnalyzer, tracks attempt count, returns true to retry. Adding retry to a test: @Test(retryAnalyzer=RetryOnFlaky.class) — zero changes to test logic or TestBase (OCP). For smarter retry: RetryIfNetworkError (retry on StaleElementException), RetryIfGridBusy (retry on RemoteDriverException). Each retry strategy is a new class implementing IRetryAnalyzer. Tests choose their retry strategy via annotation. Framework core never changes. OCP applied to resilience.</div></div>
`}
]},

<text x="40" y="50" fill="#0c3d7a" font-size="12" font-weight="500" font-family="Anthropic Sans,sans-serif">S — Single Responsibility in Selenium</text>
<text x="40" y="70" fill="#1565C0" font-size="10" font-family="Anthropic Sans,sans-serif">One Page Object per page. TestBase=lifecycle, Reporter=reporting, DataProvider=data. No locators in tests. Smell: By.id() in @Test class.</text>
<rect x="20" y="98" width="640" height="58" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.5"/>
<text x="40" y="120" fill="#1b5e20" font-size="12" font-weight="500" font-family="Anthropic Sans,sans-serif">O — Open/Closed in Selenium</text>
<text x="40" y="140" fill="#2E7D32" font-size="10" font-family="Anthropic Sans,sans-serif">IDriverFactory for browsers. ITestReporter for reporters. IWaitStrategy for waits. Add new browser = 1 class. Smell: switch(browser) in TestBase.</text>
<rect x="20" y="168" width="640" height="58" rx="8" fill="#F3E5F5" stroke="#7B3FA0" stroke-width="0.5"/>
<text x="40" y="190" fill="#4a1775" font-size="12" font-weight="500" font-family="Anthropic Sans,sans-serif">L — Liskov Substitution in Selenium</text>
<text x="40" y="210" fill="#7B3FA0" font-size="10" font-family="Anthropic Sans,sans-serif">Every page honors BasePage contract. MockDriver honors WebDriver contract. Smell: instanceof in page flow, UnsupportedOp in overrides.</text>
<rect x="20" y="238" width="640" height="58" rx="8" fill="#FFF8E1" stroke="#F57F17" stroke-width="0.5"/>
<text x="40" y="260" fill="#7a3d0c" font-size="12" font-weight="500" font-family="Anthropic Sans,sans-serif">I — Interface Segregation in Selenium</text>
<text x="40" y="280" fill="#F57F17" font-size="10" font-family="Anthropic Sans,sans-serif">IClickable, ITypeable, IScrollable — focused roles. API clients split by HTTP verb. Max 4 methods per interface. Smell: 15 mocked stubs for 2 used methods.</text>
<rect x="20" y="308" width="640" height="52" rx="8" fill="#FCEAE8" stroke="#C0392B" stroke-width="0.5"/>
<text x="40" y="330" fill="#922b21" font-size="12" font-weight="500" font-family="Anthropic Sans,sans-serif">D — Dependency Inversion in Selenium</text>
<text x="40" y="348" fill="#C0392B" font-size="10" font-family="Anthropic Sans,sans-serif">TestBase constructor takes IDriverFactory/IDataProvider/IReporter. Page Objects take WebDriver via ctor. Smell: new ChromeDriver() in TestBase/Tests.</text>
</svg>
</div>
<div class="tip">🏆 <strong>The SDET Validation Test:</strong> Can you run ANY test class with Mockito mocks and zero browser in under 100ms? If yes — your SOLID framework is production-grade.</div>

{ico:"🎯",bg:"#F3E5F5",title:"Final 6 Senior SDET Boss Questions",body:`
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q1: Design a complete SOLID Selenium framework from scratch — live</span><span class="qa-tag">System Design</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a"><pre>
// Live design — 5 minutes on whiteboard
// Step 1: Interfaces first (DIP)
interface IDriverFactory  { WebDriver create(); }
interface IDataProvider   { &lt;T&gt; T load(String key, Class&lt;T&gt; t); }
interface ITestReporter   { void pass(String m); void fail(String m); }
interface IWaitStrategy   { WebElement waitFor(By b, WebDriver d); } // ISP: small

// Step 2: TestBase (SRP: lifecycle)
abstract class TestBase {
    protected WebDriver driver;
    protected IDataProvider data;
    protected ITestReporter reporter;
    protected TestBase(IDriverFactory df, IDataProvider dp, ITestReporter r) {
        driver=df.create(); data=dp; reporter=r;
    }
    @AfterEach void tearDown() { if(driver!=null) driver.quit(); }
}

// Step 3: BasePage (SRP: page utilities, LSP: contract)
abstract class BasePage {
    protected final WebDriver driver;
    protected final IWaitStrategy wait;
    BasePage(WebDriver d, IWaitStrategy w) { driver=d; wait=w; }
    public String getTitle() { return driver.getTitle(); }
}

// Step 4: Page Objects (SRP, LSP)
class LoginPage extends BasePage {
    private final By user=By.id("u"), pass=By.id("p"), btn=By.id("login");
    LoginPage(WebDriver d, IWaitStrategy w) { super(d,w); }
    public LoginPage enterUser(String u) { wait.waitFor(user,driver).sendKeys(u); return this; }
    public DashboardPage submit()        { wait.waitFor(btn,driver).click(); return new DashboardPage(driver,wait); }
}

// Step 5: Implementations (OCP)
class ChromeDriverFactory implements IDriverFactory {
    public WebDriver create() { return new ChromeDriver(); }
}
// Add Safari, Remote, Mock as new classes — zero edits to above
</pre></div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q2: How would you mentor a junior SDET who keeps violating SOLID?</span><span class="qa-tag">Leadership</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Three-step mentoring approach: (1) Show, don't tell: take their actual code, point to the violation, show the impact ("if the login page UI changes, how many files change?"). (2) Pair on the fix: don't just review and reject — sit with them and refactor together. Show the extract-class, apply DI, create the interface. Let them drive. (3) Build muscle memory: give them a SOLID checklist to self-review before every PR. After 3–4 reviews, the habits form. In parallel: add ArchUnit tests so CI catches violations automatically — reduces my review burden and gives immediate, objective feedback. Never shame; always teach.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q3: How does SOLID apply to REST API test automation (not just UI)?</span><span class="qa-tag">API Testing</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">SRP: separate OrderApiClient, UserApiClient, ProductApiClient — each handles one API domain. OCP: add new API versions (V2OrderApiClient) without touching V1 tests. LSP: all API client implementations honor the same contract (same response type, same exceptions). ISP: separate IOrderReader, IOrderWriter, IOrderDeleter — smoke tests use only IOrderReader. DIP: tests inject IOrderApiClient — mock it for unit tests, use RestAssured implementation for integration. This framework handles hundreds of API endpoints cleanly, is testable without network calls, and scales to new API domains without touching existing tests.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q4: How do you balance SOLID purity with pragmatism in a deadline?</span><span class="qa-tag">Pragmatism</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Conscious trade-offs: (1) Prototype/spike: relax SOLID, use hardcoded drivers and flat test methods — mark with TODO:SOLID and a tech-debt ticket. Never let it merge to main unaddressed. (2) One-time scripts: migration test that runs once — SOLID overhead not worth it for a 20-line script. (3) Tight deadline: apply SRP (Page Objects) first — highest ROI, easiest to apply. DIP can wait one sprint. What never gets a pass: core framework infrastructure (TestBase, factories) — tech debt there compounds fastest. Keep the framework clean; allow pragmatic shortcuts only in leaf-node test classes.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q5: Describe your most complex Selenium SOLID refactoring experience</span><span class="qa-tag">Behavioral</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Model answer structure: "At [company], we had a 600-line TestBase with hardcoded ChromeDriver, 80+ static utility methods in one class, and locators scattered across test files. Tests took 45 minutes CI with 60% flakiness. Over 3 sprints: Sprint 1: extracted Page Objects (SRP) — locators to pages, tests to 20-line callers. Flakiness dropped to 30%. Sprint 2: created IDriverFactory + ITestReporter interfaces (OCP+DIP) — added Grid support in 2 hours, not 2 days. Sprint 3: split God TestBase into DriverManager, ReportManager, ConfigManager (SRP). CI went from 45 minutes to 12 minutes with parallel execution. Flakiness: 8%. Zero regression in production during refactoring. Used Strangler Fig — never big bang." Then state metrics: maintenance time halved, onboarding time for new SDETs cut by 60%, CI pass rate from 65% to 93%.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q6: What's next after SOLID — what advanced concepts build on it?</span><span class="qa-tag">Growth</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">SOLID is the foundation for: (1) Clean Architecture: apply SOLID at system level — domain entities, use cases, adapters, infrastructure each has one reason to change. (2) Hexagonal Architecture: ports (interfaces, ISP) and adapters (implementations, OCP) — perfect for API+UI hybrid frameworks. (3) Domain-Driven Design: bounded contexts = SRP at domain level. (4) Reactive/Async testing: SOLID-compliant async test helpers use DIP to inject ExecutorService, enabling parallel async test orchestration. (5) AI-assisted testing: SOLID page objects are AI-readable — structured, focused, predictable — making LLM-generated tests more reliable. SOLID isn't a destination, it's the launch pad for every advanced architectural pattern in professional software engineering.</div></div>
`}

/* ──── STATE ──── */
let cur=0;
const done=new Set();

function phaseOf(i){ for(let p=0;p<PHASES.length;p++){ const[a,b]=PHASES[p].range; if(i>=a&&i<b)return p; } return 0; }
function pc(i){ return PHASES[phaseOf(i)].color; }

function buildStrip(){
  const strip=document.getElementById('sess-strip');
  strip.innerHTML='';
  const pi=phaseOf(cur);
  const[a,b]=PHASES[pi].range;
  strip.style.setProperty('--pc',PHASES[pi].color);
  for(let i=a;i<b;i++){
    const btn=document.createElement('button');
    btn.className='sess-btn'+(i===cur?' active':'')+(done.has(i)&&i!==cur?' done':'');
    const words=S[i].title.split(' ').slice(0,3).join(' ');
    btn.textContent=`S${S[i].num}: ${words}...`;
    btn.onclick=()=>goS(i);
    strip.appendChild(btn);
  }
}

function buildPhases(){
  document.querySelectorAll('.phase-btn').forEach((b,i)=>{
    b.classList.toggle('active',i===phaseOf(cur));
  });
}

function updateProg(){
  const total=S.length, idx=cur;
  const overall=idx+10; // sessions 11-20
  const pct=Math.round(((overall)/20)*100);
  document.getElementById('prog-txt').textContent=`S${S[idx].num} of 20`;
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
}

function render(){
  const s=S[cur];
  const color=pc(cur);
  const pname=PHASES[phaseOf(cur)].name;
  let html=`
  <div class="sess-header" style="--pc:${color}">
    <div class="phase-tag" style="background:${color}">${pname}</div>
    <div class="sess-title">Session ${s.num}: ${s.title}</div>
    <div class="sess-sub">${s.sub}</div>
  </div>`;
  s.secs.forEach((sec,idx)=>{
    const id=`s${cur}x${idx}`;
    html+=`
    <div class="sec-card">
      <div class="sec-head" onclick="tsec('${id}')">
        <div class="sec-icon" style="background:${sec.bg}">${sec.ico}</div>
        <div class="sec-label">${sec.title}</div>
        <div class="chev open" id="cv-${id}">▾</div>
      </div>
      <div class="sec-body open" id="${id}">${sec.body}</div>
    </div>`;
  });
  html+=`
  <div class="nav-row">
    <button class="nav-btn" onclick="prev()" ${cur===0?'disabled':''}>← Previous</button>
    <button class="nav-btn pri" onclick="next()" ${cur===S.length-1?'disabled':''}>
      ${cur===S.length-1?'🎉 Course Complete!':'Next Session →'}
    </button>
  </div>`;
  const m=document.getElementById('main-content');
  m.style.setProperty('--pc',color);
  m.innerHTML=html;
  buildStrip();
  buildPhases();
  updateProg();
  window.scrollTo(0,0);
}

function goS(i){ done.add(cur); cur=i; render(); }
function goPhase(pi){ goS(PHASES[pi].range[0]); }
function next(){ if(cur<S.length-1){ done.add(cur); cur++; render(); } }
function prev(){ if(cur>0){ cur--; render(); } }
function tsec(id){ const b=document.getElementById(id),c=document.getElementById('cv-'+id); b.classList.toggle('open'); c.classList.toggle('open'); }
function tqa(el){ const a=el.nextElementSibling; a.classList.toggle('open'); const arr=el.lastElementChild; if(arr) arr.textContent=a.classList.contains('open')?'▴':'▾'; }

render();
</script>
</body>
