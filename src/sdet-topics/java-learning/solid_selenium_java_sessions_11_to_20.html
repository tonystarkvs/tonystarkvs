<p style="margin-bottom:12px">SRP in Selenium means: <em>each class has exactly one job</em>. The Page Object Model (POM) is SRP applied to test automation — each page of the application gets its own class that handles <strong>only</strong> that page's elements and actions.</p>

// ✅ SRP Applied in Selenium POM

// One job: manage LoginPage UI interactions only
public class LoginPage {
    private final WebDriver driver;
    
    // Locators owned by THIS page only
    private final By usernameField = By.id("username");
    private final By passwordField = By.id("password");
    private final By loginButton   = By.cssSelector("[data-test='login-btn']");
    
    public LoginPage(WebDriver driver) { this.driver = driver; }
    
    public LoginPage enterUsername(String user) {
        driver.findElement(usernameField).sendKeys(user);
        return this;  // fluent API
    }
    public LoginPage enterPassword(String pass) {
        driver.findElement(passwordField).sendKeys(pass);
        return this;
    }
    public DashboardPage clickLogin() {
        driver.findElement(loginButton).click();
        return new DashboardPage(driver);  // returns next page (SRP: not this page)
    }
}

// One job: manage test lifecycle only
public class TestBase {
    protected WebDriver driver;
    @BeforeEach void setUp()    { driver = new ChromeDriver(); }
    @AfterEach  void tearDown() { if(driver!=null) driver.quit(); }
}

// Test class: coordinates only — no locators, no driver setup
public class LoginTest extends TestBase {
    @Test void validLogin() {
        new LoginPage(driver)
            .enterUsername("admin")
            .enterPassword("secret")
            .clickLogin()
            .assertWelcomeDisplayed();
    }
}
</pre>
<div class="tip">🎯 <strong>SRP in POM Rule:</strong> If your test class contains <code>By.id()</code> locators or <code>driver.findElement()</code> calls — SRP is violated. Move them to the Page Object.</div>

{ico:"🎤",bg:"#FFF3E0",title:"Interview One-Liners — SRP in Selenium",body:`
<div class="liner"><strong>"SRP in Selenium means my LoginPage class only knows how to interact with the login page — it never handles test data loading or driver setup."</strong></div>
<div class="liner"><strong>"Page Object Model IS SRP — one class per page, one responsibility per class, and test classes contain zero locators."</strong></div>
<div class="liner"><strong>"When the login page UI changes, only LoginPage.java changes — nothing else. That's SRP delivering zero ripple-effect maintenance."</strong></div>
<div class="liner"><strong>"A test class with 50 lines of findElement() calls is an SRP violation — all those locators belong in Page Objects."</strong></div>
<div class="liner"><strong>"I split my framework into: PageObjects (UI), TestData (data), TestBase (setup), Helpers (utilities) — each folder has one reason to change."</strong></div>
<div class="liner"><strong>"The fluent API pattern in POM — where each method returns the page or next page — is SRP in action: each method does one UI action."</strong></div>
`},

{ico:"✅",bg:"#E8F5E9",title:"Best Practices — SRP in Selenium",body:`
<ul class="cklist">
  <li><div class="ck">✓</div><div>Page Objects contain ONLY locators + interaction methods — zero assertions, zero test data, zero reporting code</div></li>
  <li><div class="ck">✓</div><div>Test classes call Page Object methods — never call <code>driver.findElement()</code> directly in test classes</div></li>
  <li><div class="ck">✓</div><div>Base page class owns shared waits/utilities — each page extends BasePage, not TestBase</div></li>
  <li><div class="ck">✓</div><div>One Java file per page — <code>LoginPage.java</code>, not <code>LoginAndRegisterAndForgotPasswordPage.java</code></div></li>
  <li><div class="ck">✓</div><div>Keep page objects under 150 lines — if longer, split into components (LoginForm, NavigationBar, Footer)</div></li>
  <li><div class="ck">✓</div><div>Locators are private — tests never access <code>By</code> objects directly; only call public action methods</div></li>
</ul>
`},
{ico:"🎯",bg:"#F3E5F5",title:"Q&A — SRP in Selenium (SDET Style)",body:`
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q1: What is the biggest SRP violation you've seen in Selenium frameworks?</span><span class="qa-tag">Common</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">The most common: a single "TestHelper" or "Utils" class with 80 methods — driver setup, screenshots, Excel reading, API calls, date formatting, DB queries all in one file. Any change anywhere touches this class. Fix: split into DriverFactory, ScreenshotHelper, ExcelDataReader, ApiClient, DateUtil, DatabaseHelper. Each has one reason to change, each is independently testable.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q2: Should assertions be in Page Objects or Test classes?</span><span class="qa-tag">Design</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Assertions belong in Test classes, not Page Objects. Page Objects have one responsibility: UI interactions. Adding assertions gives them a second responsibility (verification). Page Objects should return data (getErrorMessage(), isLoginButtonEnabled()) and tests should assert on that data. Exception: Page Objects can have boolean helper methods (isDisplayed(), hasError()) but the assert call itself stays in the test.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q3: How do you handle shared components (header nav, footer) with SRP?</span><span class="qa-tag">Architecture</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Create component classes: HeaderComponent, FooterComponent, NavigationBar. Pages that contain these components compose them as fields: class DashboardPage { private final HeaderComponent header; private final ContentArea content; }. This is SRP + composition — DashboardPage doesn't handle header logic, it delegates. Component classes have their own single responsibility. Pages are composed of components, not inheriting from them.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q4: How does BasePage relate to SRP?</span><span class="qa-tag">Design</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">BasePage should have ONE responsibility: provide shared WebDriver utilities that all pages need — waitForElement(), scrollTo(), getTitle(). It must NOT contain: test data, assertions, reporting logic, or specific page locators. If BasePage grows beyond 50 lines of utilities, split it — WaitHelper (waiting strategies), ElementHelper (interaction utilities), and BasePage extends neither but uses both via composition. BasePage should be thin — a foundation, not a dumping ground.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q5: How would you fix a test class with 200 lines and 30 locators?</span><span class="qa-tag">Refactoring</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Step 1: Identify which page each locator belongs to. Step 2: Create Page Object classes for each page. Step 3: Move locators + interactions into those Page Objects. Step 4: Replace direct findElement calls in tests with Page Object method calls. Step 5: Move @BeforeEach driver setup to TestBase. After: test is 20–30 lines of readable Page Object method calls with clear assertions. Each class has one reason to change.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q6: Write a SRP-compliant Page Object for a search page</span><span class="qa-tag">Coding</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a"><pre>
public class SearchPage {
    private final WebDriver driver;
    private final By searchBox    = By.id("search-input");
    private final By searchBtn    = By.cssSelector("[data-test='search']");
    private final By resultList   = By.className("result-item");
    private final By noResultsMsg = By.id("no-results");

    public SearchPage(WebDriver d) { this.driver = d; }

    // Action methods — one action each (SRP)
    public SearchPage enterQuery(String q) {
        driver.findElement(searchBox).clear();
        driver.findElement(searchBox).sendKeys(q);
        return this;
    }
    public SearchPage clickSearch() {
        driver.findElement(searchBtn).click();
        return this;
    }
    // Query methods — return data, no assertions
    public int getResultCount() {
        return driver.findElements(resultList).size();
    }
    public boolean isNoResultsDisplayed() {
        return driver.findElements(noResultsMsg).size() > 0;
    }
}
</pre></div></div>
`}

{ico:"📖",bg:"#E3F2FD",title:"Overview — OCP in Test Automation",body:`
<p style="margin-bottom:12px">OCP in Selenium: <em>add new browsers, environments, wait strategies, or report types by writing new classes — never editing the existing, tested ones.</em> The classic case: your DriverFactory should never need editing just because you add a new browser.</p>

// ✅ OCP: IDriverFactory interface
public interface IDriverFactory { WebDriver create(); }

// Existing implementations — never touched when adding new browser
public class ChromeDriverFactory implements IDriverFactory {
    public WebDriver create() {
        ChromeOptions opts = new ChromeOptions();
        opts.addArguments("--headless");
        return new ChromeDriver(opts);
    }
}
public class FirefoxDriverFactory implements IDriverFactory {
    public WebDriver create() { return new FirefoxDriver(); }
}

// 🆕 NEW browser — zero changes to existing code (OCP!)
public class SafariDriverFactory implements IDriverFactory {
    public WebDriver create() { return new SafariDriver(); }
}

// TestBase: depends on abstraction — never changes for new browsers
public class TestBase {
    protected WebDriver driver;
    private final IDriverFactory factory;

    public TestBase(IDriverFactory f) { this.factory = f; }

    @BeforeEach public void setUp() { driver = factory.create(); }
    @AfterEach  public void tearDown() { if(driver!=null) driver.quit(); }
}

// Config-driven — OCP at runtime
public class DriverFactoryProvider {
    public static IDriverFactory get(String browser) {
        return switch(browser.toLowerCase()) {
            case "firefox" -> new FirefoxDriverFactory();
            case "safari"  -> new SafariDriverFactory();
            default        -> new ChromeDriverFactory();
        };
    }
}

{ico:"🎤",bg:"#FFF3E0",title:"Interview One-Liners — OCP in Selenium",body:`
<div class="liner"><strong>"OCP in my framework means adding a new browser is one new factory class — TestBase and all 300 tests never need a single edit."</strong></div>
<div class="liner"><strong>"When I see a DriverFactory with a 10-case if-else for browsers, I refactor to an IDriverFactory interface — that's OCP saving future maintenance."</strong></div>
<div class="liner"><strong>"My wait strategies, screenshot helpers, and report listeners all implement interfaces — adding Allure alongside ExtentReports is one new class."</strong></div>
<div class="liner"><strong>"OCP protects the 300 existing tests from regression when I add new test capabilities — closed for modification, open for extension."</strong></div>
<div class="liner"><strong>"The Strategy Pattern in Selenium: IWaitStrategy (FluentWait, ExplicitWait, PollingWait) — switch wait behavior without touching any Page Object."</strong></div>
<div class="liner"><strong>"In CI/CD, OCP means spinning up a Dockerized grid doesn't require editing a single test — just swap the RemoteDriverFactory via config."</strong></div>
`},

<ul class="cklist">
  <li><div class="ck">✓</div><div>Create <code>IDriverFactory</code>, <code>IWaitStrategy</code>, <code>ITestReporter</code> interfaces — every new capability = a new implementation class</div></li>
  <li><div class="ck">✓</div><div>Use config file (properties/YAML) to select implementations at runtime — no code change for different browser/environment</div></li>
  <li><div class="ck">✓</div><div>Never hardcode <code>new ChromeDriver()</code> in TestBase — always go through a factory interface</div></li>
  <li><div class="ck">✓</div><div>Parameterize tests for cross-browser: inject <code>IDriverFactory</code> via TestNG <code>@Parameters</code> or JUnit 5 <code>@MethodSource</code></div></li>
  <li><div class="ck">✓</div><div>For Selenium Grid: add <code>RemoteDriverFactory</code> — existing local driver factories unchanged (OCP)</div></li>

{ico:"🎯",bg:"#F3E5F5",title:"Q&A — OCP in Selenium",body:`
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q1: How do you add Selenium Grid support without editing existing test code?</span><span class="qa-tag">Grid</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Create RemoteDriverFactory implementing IDriverFactory: it reads Hub URL from config and creates RemoteWebDriver with DesiredCapabilities. TestBase uses IDriverFactory interface — never knows if it's local or remote. Switch from local to Grid = change one config property (driver.mode=remote). All 300 tests run on Grid without a single code change. That's OCP enabling Grid migration.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q2: Show OCP applied to a screenshot strategy</span><span class="qa-tag">Coding</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a"><pre>
interface IScreenshotStrategy {
    byte[] capture(WebDriver driver);
}
class FullPageScreenshot implements IScreenshotStrategy {
    public byte[] capture(WebDriver d) { return ((TakesScreenshot)d).getScreenshotAs(OutputType.BYTES); }
}
class ViewportScreenshot implements IScreenshotStrategy {
    public byte[] capture(WebDriver d) { /* viewport only */ return null; }
}
// NEW: never touches above code
class ElementScreenshot implements IScreenshotStrategy {
    private final WebElement element;
    public ElementScreenshot(WebElement e) { this.element = e; }
    public byte[] capture(WebDriver d) { return element.getScreenshotAs(OutputType.BYTES); }
}
</pre></div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q3: How does OCP apply to test data strategies?</span><span class="qa-tag">Data</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Define IDataProvider interface: T load(String key, Class&lt;T&gt; type). Implement ExcelDataProvider, JsonDataProvider, DatabaseDataProvider, ApiDataProvider. Tests inject IDataProvider — switching from Excel to JSON means changing one DI binding. New data source = new class. No test edits. In CI/CD this lets different environments use different data sources (local=JSON, staging=API, prod-smoke=DB) via config, all without modifying the tests themselves.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q4: What's the risk of NOT applying OCP in a large Selenium framework?</span><span class="qa-tag">Risk</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Without OCP, the DriverFactory has a 15-case switch for browsers. Adding Edge requires editing it and retesting all 300 tests for regression. The Reporter class has if-else for Extent vs Allure — adding Slack notifications risks breaking both existing reporters. TestBase becomes a 400-line class everyone fears to touch. Every new feature = risk to existing features. In a team of 5 SDETs, merge conflicts on TestBase become daily. OCP prevents this by making each new feature a new, isolated file.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q5: How do you apply OCP to cross-browser testing in TestNG?</span><span class="qa-tag">TestNG</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Use TestNG @DataProvider with IDriverFactory: each DataProvider entry is a different factory instance (ChromeFactory, FirefoxFactory). Tests receive IDriverFactory, call factory.create() — completely unaware of which browser. Adding Edge: add EdgeDriverFactory + one entry in DataProvider. Zero test method changes. Alternatively, use TestNG testng.xml parameters + DriverFactoryProvider.get(browser) — config-driven, OCP-compliant.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q6: Is factory pattern always the right OCP tool in Selenium?</span><span class="qa-tag">Judgment</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">No — use the right tool. Factory: when you need to create objects of different types based on config (driver selection). Strategy: when the algorithm varies (wait strategies, screenshot strategies). Decorator: when adding behavior to existing objects (logging decorator around WebDriver). Template Method: when the skeleton is fixed but steps vary (base test flow with customizable setup/teardown). OCP is the goal; the pattern is the mechanism. Choose the pattern that best models the extension point you're protecting.</div></div>
`}
]},

{ico:"📖",bg:"#F3E5F5",title:"Overview — DIP in Selenium Framework",body:`
<p style="margin-bottom:12px">DIP in Selenium: <em>test classes should depend on interfaces (IDriverFactory, IDataProvider, IReporter), not on concrete implementations (ChromeDriver, ExcelReader, ExtentReport).</em> This makes tests mockable, portable, and CI/CD-friendly.</p>

// ✅ DIP in Selenium — TestBase with constructor injection

public abstract class TestBase {
    protected WebDriver driver;
    protected IDataProvider dataProvider;
    protected ITestReporter reporter;

    // DIP: receive abstractions, not concrete classes
    protected TestBase(IDriverFactory driverFactory,
                       IDataProvider dataProvider,
                       ITestReporter reporter) {
        this.dataProvider = dataProvider;
        this.reporter     = reporter;
        this.driver       = driverFactory.create();  // DIP!
    }

    @AfterEach void tearDown() {
        if(driver != null) driver.quit();
    }
}

// Test: depends on interfaces, testable with mocks
public class LoginTest extends TestBase {
    public LoginTest() {
        super(
            new ChromeDriverFactory(),  // swap for Mock in unit test
            new JsonDataProvider("testdata/login.json"),
            new ExtentReporter()
        );
    }
    @Test void validLoginRedirectsToDashboard() {
        LoginData data = dataProvider.load("validUser", LoginData.class);
        DashboardPage dashboard = new LoginPage(driver)
            .enterUsername(data.getUser())
            .enterPassword(data.getPass())
            .clickLogin();
        assertTrue(dashboard.isWelcomeDisplayed());
        reporter.pass("Login success verified");
    }
}

{ico:"🎤",bg:"#FFF3E0",title:"Interview One-Liners — DIP in Selenium",body:`
<div class="liner"><strong>"DIP in my test framework means TestBase never imports ChromeDriver — it imports IDriverFactory and whatever factory is injected runs the browser."</strong></div>
<div class="liner"><strong>"Without DIP every test has new ChromeDriver() hardcoded — switching to Selenium Grid means editing 200 test files. With DIP it's one config change."</strong></div>
<div class="liner"><strong>"I inject WebDriver, DataProvider, and Reporter into TestBase — tests run on any browser, with any data source, writing to any report system."</strong></div>
<div class="liner"><strong>"DIP enables Mockito-style unit testing of test helper classes — inject a mock driver, verify interactions without a real browser."</strong></div>
<div class="liner"><strong>"Guice or Spring DI in a Selenium framework automates the wiring — @Inject IDriverFactory and the container provides the right implementation."</strong></div>
<div class="liner"><strong>"The Hollywood Principle in Selenium: 'Don't call new ChromeDriver() — the framework will inject the right driver for you.'"</strong></div>
`},

<ul class="cklist">
  <li><div class="ck">✓</div><div>Declare all framework dependencies as interface types in TestBase constructor — never <code>new ConcreteClass()</code> in setUp()</div></li>

  <li><div class="ck">✓</div><div>For large teams, use Guice (<code>@Inject</code>) or Spring (<code>@Autowired</code>) to automate dependency wiring in the test framework</div></li>

{ico:"🎯",bg:"#F3E5F5",title:"Q&A — DIP in Selenium",body:`
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q1: How do you use Google Guice for DI in a Selenium framework?</span><span class="qa-tag">Guice</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Create a Guice Module: bind(IDriverFactory.class).to(ChromeDriverFactory.class). In TestBase: @Inject IDriverFactory factory. Run with GuiceJUnitRunner or create injector in @BeforeEach. Switch to remote: change one binding in the Module. All tests auto-injected. This is the cleanest DIP implementation — all wiring is centralized, tests are pure logic, and changing the entire infrastructure (browser, reporter, data) is one module swap.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q2: How do ThreadLocal WebDriver and DIP interact?</span><span class="qa-tag">Parallel</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">For parallel test execution, DriverManager uses ThreadLocal&lt;WebDriver&gt;. DIP still applies: DriverManager.createDriver(IDriverFactory factory) accepts the factory interface. Each thread gets its own driver instance from the injected factory. Tests call DriverManager.getDriver() — they never create drivers. DIP ensures the parallel setup is cleanly separated from test logic: change parallelism strategy in DriverManager only, never in tests.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q3: How do you unit-test a Page Object without a real browser?</span><span class="qa-tag">SDET</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">DIP makes this possible. LoginPage accepts WebDriver via constructor. In unit test: WebDriver mockDriver = mock(WebDriver.class); WebElement mockInput = mock(WebElement.class); when(mockDriver.findElement(By.id("username"))).thenReturn(mockInput). new LoginPage(mockDriver).enterUsername("test"). verify(mockInput).sendKeys("test"). This proves DIP is correctly applied — tests run in milliseconds without a browser. Without constructor injection, this is impossible.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q4: Explain the difference between service locator and DI in test frameworks</span><span class="qa-tag">Architecture</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Service Locator: tests call a static DriverManager.getDriver() or Context.get("driver") to retrieve dependencies. Still decoupled from concrete classes but dependencies are hidden — you can't tell from the constructor what a test needs. Dependency Injection: dependencies are declared in the constructor and provided externally. Explicit, visible, testable. DI is preferred in SOLID frameworks because it makes the dependency contract obvious and enables direct Mockito injection without a running service locator.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q5: How does DIP help with CI/CD pipeline optimization?</span><span class="qa-tag">CI/CD</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">With DIP: CI job 1 runs unit tests (mock drivers, no browser needed — milliseconds). CI job 2 runs integration tests with ChromeFactory on a local node. CI job 3 runs cross-browser on Grid with RemoteDriverFactory. CI job 4 runs mobile with AppiumFactory. All test classes are identical — only the injected factory differs. This allows parallel CI stages that finish in 5 minutes instead of 45. DIP is what enables the test parallelization and environment stratification that makes fast CI pipelines possible.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q6: What does "constructor injection over field injection" mean in test frameworks?</span><span class="qa-tag">Best Practice</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Constructor injection: class LoginTest(IDriverFactory f, IDataProvider d) — dependencies are explicit, visible, required at creation time, and work with Mockito @InjectMocks. Field injection: @Autowired WebDriver driver (Spring) or @Inject (Guice) — convenient but hides dependencies. In test frameworks, constructor injection is strongly preferred because: 1) you can create the test with mocks directly without a DI container; 2) NullPointerException-proof (can't forget to wire); 3) Immutable final fields; 4) Works with TestNG factory pattern cleanly.</div></div>
`}
]},

{ph:1,num:14,
title:"I — ISP in Selenium: Focused Test Utility Interfaces",
sub:"No test helper should expose methods it doesn't actually need",
secs:[
{ico:"📖",bg:"#FFF8E1",title:"Overview — ISP in Test Framework Design",body:`
<p style="margin-bottom:12px">ISP in Selenium: <em>don't force test helpers to implement methods they don't use.</em> A SearchPage shouldn't need to implement login methods. A read-only API client shouldn't expose write methods. Split interfaces by what each client actually needs.</p>
<div class="diag">
<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
<title>ISP: Fat vs Segregated Test Helper Interfaces</title>
<defs><marker id="a9" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text x="150" y="18" text-anchor="middle" fill="#C0392B" font-size="12" font-weight="500" font-family="Anthropic Sans,sans-serif">❌ Fat Interface</text>
<rect x="20" y="28" width="260" height="155" rx="8" fill="#FCEAE8" stroke="#C0392B" stroke-width="1"/>
<text x="150" y="50" text-anchor="middle" fill="#922b21" font-size="12" font-weight="500" font-family="Anthropic Sans,sans-serif">IPageActions (bloated)</text>
<text x="150" y="68" text-anchor="middle" fill="#C0392B" font-size="10" font-family="Anthropic Sans,sans-serif">click(By by)</text>
<text x="150" y="84" text-anchor="middle" fill="#C0392B" font-size="10" font-family="Anthropic Sans,sans-serif">sendKeys(By by, String txt)</text>
<text x="150" y="100" text-anchor="middle" fill="#C0392B" font-size="10" font-family="Anthropic Sans,sans-serif">scrollTo(By by)</text>
<text x="150" y="116" text-anchor="middle" fill="#C0392B" font-size="10" font-family="Anthropic Sans,sans-serif">uploadFile(By by, String path)</text>
<text x="150" y="132" text-anchor="middle" fill="#C0392B" font-size="10" font-family="Anthropic Sans,sans-serif">dragAndDrop(By src, By tgt)</text>
<text x="150" y="148" text-anchor="middle" fill="#C0392B" font-size="10" font-family="Anthropic Sans,sans-serif">hover(By by)</text>
<text x="150" y="164" text-anchor="middle" fill="#C0392B" font-size="10" font-family="Anthropic Sans,sans-serif">switchToFrame(String name)</text>
<text x="50" y="204" text-anchor="start" fill="#C0392B" font-size="10" font-family="Anthropic Sans,sans-serif">SearchPage must implement ALL ❌</text>
<text x="50" y="220" text-anchor="start" fill="#C0392B" font-size="10" font-family="Anthropic Sans,sans-serif">even dragAndDrop it never uses ❌</text>

<text x="425" y="50" text-anchor="middle" fill="#0c3d7a" font-size="11" font-weight="500" font-family="Anthropic Sans,sans-serif">IClickable</text>
<text x="425" y="65" text-anchor="middle" fill="#1565C0" font-size="10" font-family="Anthropic Sans,sans-serif">click(By by)</text>
<rect x="510" y="28" width="150" height="56" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.5"/>
<text x="585" y="50" text-anchor="middle" fill="#1b5e20" font-size="11" font-weight="500" font-family="Anthropic Sans,sans-serif">ITypeable</text>
<text x="585" y="65" text-anchor="middle" fill="#2E7D32" font-size="10" font-family="Anthropic Sans,sans-serif">sendKeys(By, String)</text>
<rect x="360" y="100" width="130" height="56" rx="6" fill="#F3E5F5" stroke="#7B3FA0" stroke-width="0.5"/>
<text x="425" y="122" text-anchor="middle" fill="#4a1775" font-size="11" font-weight="500" font-family="Anthropic Sans,sans-serif">IDraggable</text>
<text x="425" y="137" text-anchor="middle" fill="#7B3FA0" font-size="10" font-family="Anthropic Sans,sans-serif">dragAndDrop()</text>
<rect x="510" y="100" width="150" height="56" rx="6" fill="#FFF8E1" stroke="#F57F17" stroke-width="0.5"/>
<text x="585" y="122" text-anchor="middle" fill="#7a3d0c" font-size="11" font-weight="500" font-family="Anthropic Sans,sans-serif">IFileUploadable</text>
<text x="585" y="137" text-anchor="middle" fill="#F57F17" font-size="10" font-family="Anthropic Sans,sans-serif">uploadFile()</text>
<!-- SearchPage: only IClickable + ITypeable -->
<rect x="380" y="210" width="240" height="56" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.5"/>
<text x="500" y="233" text-anchor="middle" fill="#0c3d7a" font-size="12" font-weight="500" font-family="Anthropic Sans,sans-serif">SearchPage</text>
<text x="500" y="251" text-anchor="middle" fill="#1565C0" font-size="10" font-family="Anthropic Sans,sans-serif">implements IClickable, ITypeable only ✓</text>
<line x1="415" y1="84" x2="440" y2="210" stroke="#1565C0" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#a9)"/>
<line x1="550" y1="84" x2="520" y2="210" stroke="#2E7D32" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#a9)"/>
</svg>
</div>
<pre>
// ✅ ISP: Focused interfaces for page capabilities

interface IClickable      { void click(By locator); }
interface ITypeable       { void type(By locator, String text); }
interface IScrollable     { void scrollTo(By locator); }
interface IDraggable      { void dragAndDrop(By source, By target); }
interface IFileUploadable { void uploadFile(By locator, String path); }
interface IHoverable      { void hoverOver(By locator); }

// SearchPage: only needs click + type
public class SearchPage implements IClickable, ITypeable {
    private final WebDriver driver;
    public SearchPage(WebDriver d) { this.driver = d; }
    public void click(By b)             { driver.findElement(b).click(); }
    public void type(By b, String txt)  { driver.findElement(b).sendKeys(txt); }
    // NO empty dragAndDrop() or uploadFile() needed!
}

// UploadPage: needs click + upload only
public class UploadPage implements IClickable, IFileUploadable {
    private final WebDriver driver;
    public UploadPage(WebDriver d) { this.driver = d; }
    public void click(By b) { driver.findElement(b).click(); }
    public void uploadFile(By b, String p) { driver.findElement(b).sendKeys(p); }
}
</pre>

{ico:"🎤",bg:"#FFF3E0",title:"Interview One-Liners — ISP in Selenium",body:`
<div class="liner"><strong>"ISP in my framework: SearchPage implements only IClickable and ITypeable — it never has empty dragAndDrop() methods just to satisfy a fat interface."</strong></div>
<div class="liner"><strong>"I split my API client into IReadableApiClient and IWritableApiClient — read-only tests never accidentally call mutating endpoints."</strong></div>
<div class="liner"><strong>"When a Selenium mock needs 15 stubbed methods but the test uses 2, that's an ISP violation — the interface is too fat."</strong></div>
<div class="liner"><strong>"ISP in Page Objects: each page implements only the capability interfaces it actually uses — no empty throws or {} bodies."</strong></div>
<div class="liner"><strong>"Java 8 default methods help ISP in Selenium: add scrollIntoView() as a default method so existing pages don't need to implement it unless they override."</strong></div>
`},

{ico:"✅",bg:"#E8F5E9",title:"Best Practices — ISP in Selenium",body:`
<ul class="cklist">
  <li><div class="ck">✓</div><div>Keep capability interfaces to 1–3 methods each: <code>IClickable</code>, <code>ITypeable</code>, <code>IScrollable</code> — not one giant <code>IPageActions</code></div></li>
  <li><div class="ck">✓</div><div>API test client interfaces: separate GET, POST, PUT, DELETE — read-only tests never import mutation methods</div></li>
  <li><div class="ck">✓</div><div>Use Java 8 <code>default</code> methods for optional behaviors (scrollIntoView, highlight) — pages opt-in by overriding, not forced to implement</div></li>
  <li><div class="ck">✓</div><div>Count mock stubs in tests: &gt;5 stubs for one test = ISP violation, interface is too wide</div></li>
  <li><div class="ck">✓</div><div>For data providers: separate <code>ITestDataReader</code> (load) from <code>ITestDataWriter</code> (save results) — most tests only need reader</div></li>
</ul>
`},
{ico:"🎯",bg:"#F3E5F5",title:"Q&A — ISP in Selenium",body:`
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q1: How do you apply ISP to a BasePage with many shared utilities?</span><span class="qa-tag">Design</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Instead of one giant BasePage with 30 methods, use composition with focused helper interfaces: WaitHelper implements IWaitable (waitForVisible, waitForClickable), ScreenshotHelper implements ICaptureable (captureScreen, captureElement), ScrollHelper implements IScrollable (scrollToElement, scrollToTop). Pages compose only the helpers they need. SearchPage: new SearchPage(driver, waitHelper) — no ScreenshotHelper dependency. ISP achieved through composition rather than inheritance.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q2: How do Java 8 functional interfaces demonstrate ISP in tests?</span><span class="qa-tag">Java 8</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Java's Predicate&lt;T&gt;, Function&lt;T,R&gt;, Consumer&lt;T&gt;, Supplier&lt;T&gt; are all ISP-compliant: each has exactly one method. In Selenium: waitUntil(Predicate&lt;WebDriver&gt; condition) — callers pass exactly the condition they need without depending on a fat waiting interface. FluentWait.until(Function&lt;WebDriver,T&gt;) is Java's ISP in the Selenium API itself. Custom: executeWithRetry(Supplier&lt;T&gt; action) — callers supply one thing, the retry logic surrounds it.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q3: What's the "Header Interface" anti-pattern in Selenium frameworks?</span><span class="qa-tag">Anti-pattern</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">The Header Interface anti-pattern: creating an interface that mirrors all public methods of a class — ILoginPage with every single method from LoginPage. This ISP violation forces mocks to stub 15 methods when tests only need 2. The fix: create role-specific interfaces (ILoginSubmittable for submit action, ILoginVerifiable for checking results) that reflect how different callers actually use the object. Tests declare only the role interface they need. Mocks then only need to stub relevant methods.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q4: How does ISP improve test parallelization?</span><span class="qa-tag">Performance</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">With ISP-compliant interfaces, each test class has minimal dependencies — only the interfaces it actually uses. This means: less contention (read-only tests never lock write resources), smaller mock setup (faster test initialization), cleaner parallel scope definition (tests with only IGetApiClient can run in any order; tests with IPostApiClient need ordering consideration). Fat interfaces hide these distinctions — all callers look the same to the scheduler. ISP makes parallelization intent explicit in the code.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q5: Show ISP applied to a REST-assured API test framework</span><span class="qa-tag">Coding</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a"><pre>
// ISP: focused REST client interfaces
interface IOrderReader  { Response getOrder(String id); List&lt;Response&gt; getAllOrders(); }
interface IOrderWriter  { Response createOrder(OrderRequest r); Response updateOrder(String id, OrderRequest r); }
interface IOrderDeleter { Response deleteOrder(String id); }

// Smoke tests: only read
class OrderSmokeTest {
    private final IOrderReader client;
    OrderSmokeTest(IOrderReader c) { this.client = c; }
    @Test void orderExists() { assertEquals(200, client.getOrder("o1").statusCode()); }
}
// Cleanup: only delete
class TestCleanup {
    private final IOrderDeleter cleaner;
    TestCleanup(IOrderDeleter c) { this.cleaner = c; }
    void cleanup(String id) { cleaner.deleteOrder(id); }
}
</pre></div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q6: How do you refactor a 30-method ITestHelper interface?</span><span class="qa-tag">Refactoring</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Step 1: List all 30 methods and group by usage: waiting (5 methods), screenshot (3), data (8), API (10), reporting (4). Step 2: Create IWaitHelper, IScreenshotHelper, IDataHelper, IApiClient, IReporter. Step 3: Have original ITestHelper extend all of them (backward compatible). Step 4: Refactor test classes to declare only the interfaces they use. Step 5: After full migration, deprecate ITestHelper. Tests that previously imported the 30-method interface now only see and stub the 2–5 methods they actually use.</div></div>
`}
]},

{ph:1,num:15,
title:"L — LSP in Selenium: Page Hierarchies",
sub:"Any page subtype must be substitutable for its base type without breaking tests",
secs:[
{ico:"📖",bg:"#E8F5E9",title:"Overview — LSP in Page Object Hierarchies",body:`
<p style="margin-bottom:12px">LSP in Selenium: <em>if BasePage is the parent, every page class extending it must honor BasePage's behavioral contract — same inputs produce same kind of outputs, same exceptions thrown, no surprises.</em></p>
<div class="diag">
<svg viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" role="img">
<title>LSP in Page Object Hierarchy</title>
<defs><marker id="a11" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<!-- BasePage -->
<rect x="220" y="20" width="240" height="60" rx="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
<text x="340" y="45" text-anchor="middle" fill="#1b5e20" font-size="13" font-weight="500" font-family="Anthropic Sans,sans-serif">BasePage</text>
<text x="340" y="65" text-anchor="middle" fill="#2E7D32" font-size="10" font-family="Anthropic Sans,sans-serif">waitForLoad():void  getTitle():String  isLoaded():boolean</text>
<!-- Good subtypes -->
<rect x="30" y="148" width="175" height="56" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.5"/>
<text x="117" y="170" text-anchor="middle" fill="#0c3d7a" font-size="12" font-weight="500" font-family="Anthropic Sans,sans-serif">LoginPage ✓</text>
<text x="117" y="188" text-anchor="middle" fill="#1565C0" font-size="10" font-family="Anthropic Sans,sans-serif">honors all contracts</text>
<rect x="225" y="148" width="175" height="56" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.5"/>
<text x="312" y="170" text-anchor="middle" fill="#0c3d7a" font-size="12" font-weight="500" font-family="Anthropic Sans,sans-serif">CartPage ✓</text>
<text x="312" y="188" text-anchor="middle" fill="#1565C0" font-size="10" font-family="Anthropic Sans,sans-serif">honors all contracts</text>
<!-- Bad subtype — LSP violation -->
<rect x="420" y="148" width="240" height="76" rx="8" fill="#FCEAE8" stroke="#C0392B" stroke-width="1.5"/>
<text x="540" y="170" text-anchor="middle" fill="#922b21" font-size="12" font-weight="500" font-family="Anthropic Sans,sans-serif">ModalPage ❌ LSP Violation</text>
<text x="540" y="188" text-anchor="middle" fill="#C0392B" font-size="10" font-family="Anthropic Sans,sans-serif">getTitle() throws ModalNotSupportedException</text>
<text x="540" y="204" text-anchor="middle" fill="#C0392B" font-size="10" font-family="Anthropic Sans,sans-serif">isLoaded() always false — breaks contract!</text>
<!-- Arrows -->
<line x1="300" y1="80" x2="175" y2="148" stroke="#2E7D32" stroke-width="0.5" marker-end="url(#a11)"/>
<line x1="340" y1="80" x2="312" y2="148" stroke="#2E7D32" stroke-width="0.5" marker-end="url(#a11)"/>
<line x1="400" y1="80" x2="500" y2="148" stroke="#C0392B" stroke-width="0.5" marker-end="url(#a11)"/>
<!-- Fix -->
<rect x="160" y="256" width="360" height="16" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.5"/>
<text x="340" y="268" text-anchor="middle" fill="#2E7D32" font-size="10" font-family="Anthropic Sans,sans-serif">Fix: ModalPage implements IModal interface — separate hierarchy, no BasePage violation</text>
</svg>
</div>
<pre>
// ❌ LSP Violation — ModalPage breaks BasePage contract
class ModalPage extends BasePage {
    @Override
    public String getTitle() {
        throw new UnsupportedOperationException("Modals have no title!"); // LSP broken!
    }
}
// Code that worked for BasePage now crashes for ModalPage

// ✅ LSP Fix — separate hierarchy via interface
interface IModal {
    void clickConfirm();
    void clickCancel();
    String getModalMessage();
}
class ModalHelper implements IModal {  // doesn't extend BasePage
    private final WebDriver driver;
    public ModalHelper(WebDriver d) { this.driver = d; }
    public void clickConfirm()          { driver.switchTo().alert().accept(); }
    public void clickCancel()           { driver.switchTo().alert().dismiss(); }
    public String getModalMessage()     { return driver.switchTo().alert().getText(); }
}
// BasePage hierarchy stays clean — no broken contracts
// Pages that encounter modals compose ModalHelper, not inherit from ModalPage
</pre>
`},
{ico:"🎤",bg:"#FFF3E0",title:"Interview One-Liners — LSP in Selenium",body:`
<div class="liner"><strong>"LSP means any page object that extends BasePage must work wherever BasePage is expected — same methods, same contracts, no surprise exceptions."</strong></div>
<div class="liner"><strong>"The classic Selenium LSP violation: ModalPage extending BasePage but throwing UnsupportedOperationException for getTitle() — that breaks every test using BasePage.getTitle()."</strong></div>
<div class="liner"><strong>"I use the Liskov test: write a generic test that iterates all Page Objects and calls basepage methods — if any fail, LSP is violated."</strong></div>
<div class="liner"><strong>"Driver mock LSP: my MockWebDriver must behave exactly like a real WebDriver for the same inputs — return types, exception types, all contracts honored."</strong></div>
<div class="liner"><strong>"If a page can't honor BasePage's contract, it shouldn't extend BasePage — create a separate interface hierarchy instead."</strong></div>
`},
{ico:"📐",bg:"#E3F2FD",title:"LSP Diagrams — Driver Substitutability",body:`
<div class="diag">
<svg viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg" role="img">
<title>LSP: WebDriver Implementations Must Honor Contract</title>
<defs><marker id="a12" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text x="340" y="18" text-anchor="middle" fill="var(--color-text-primary)" font-size="12" font-weight="500" font-family="Anthropic Sans,sans-serif">LSP: All WebDriver Implementations Honor the Same Contract</text>

{ico:"✅",bg:"#E8F5E9",title:"Best Practices — LSP in Selenium",body:`
<ul class="cklist">
  <li><div class="ck">✓</div><div>Every Page Object extending BasePage must implement all BasePage methods without exceptions or empty bodies</div></li>
  <li><div class="ck">✓</div><div>Run a "Liskov test suite" — call all BasePage methods on every page class instance; any failure reveals an LSP violation</div></li>
  <li><div class="ck">✓</div><div>Mock WebDriver in unit tests must honor the same contract as real WebDriver — same return types and exception behavior</div></li>
  <li><div class="ck">✓</div><div>When a page can't honor BasePage contract (dialogs, iframes, popups), create a separate class that does NOT extend BasePage</div></li>
  <li><div class="ck">✓</div><div>Driver wrappers (logging, retry) must be transparent — same inputs, same outputs, just with added behavior (Decorator pattern, LSP-safe)</div></li>
</ul>
`},
{ico:"🎯",bg:"#F3E5F5",title:"Q&A — LSP in Selenium",body:`
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q1: How does the Decorator pattern preserve LSP in Selenium?</span><span class="qa-tag">Pattern</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">A LoggingWebDriver wraps a real WebDriver: it implements WebDriver, delegates all calls to the wrapped driver, and adds logging. This is LSP-safe: LoggingWebDriver can substitute any WebDriver reference transparently. Tests using WebDriver type work identically — they don't know or care about the logging wrapper. Same inputs, same outputs, same exceptions. Adding a RetryWebDriver: same pattern. This is how you add cross-cutting behaviors to WebDriver without breaking the LSP contract.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q2: How do you apply the Liskov test in practice?</span><span class="qa-tag">Testing</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Write an abstract test class for BasePage: abstract class BasePageTest { abstract BasePage createPage(); @Test void titleIsNotNull() { assertNotNull(createPage().getTitle()); } @Test void waitForLoadDoesNotThrow() { assertDoesNotThrow(() -> createPage().waitForLoad()); } }. Then LoginPageTest extends BasePageTest { BasePage createPage() { return new LoginPage(mockDriver); } }. Every page class gets this test suite automatically. Any page that breaks it has an LSP violation. This is the Liskov compliance test written as JUnit.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q3: Is it ever acceptable to override a BasePage method with different behavior?</span><span class="qa-tag">Nuance</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Yes — override is acceptable if it honors the same contract: same input-output relationship, same exceptions, same post-conditions. For example, overriding waitForLoad() in a SPA-heavy page to wait for Angular to finish — the contract (page is loaded after this call) is still honored, just implemented differently. What's NOT acceptable: throwing different exceptions, returning null where non-null was guaranteed, or changing the semantic meaning of the method. Override the implementation, not the contract.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q4: How do iframe-handling pages violate LSP and how do you fix it?</span><span class="qa-tag">Iframe</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">IframePage extending BasePage violates LSP if its getTitle() calls driver.switchTo().defaultContent() first — the BasePage contract says getTitle() returns the current page title, not "first switch contexts then get title." The fix: create IFrameContext interface with switchToFrame()/switchToDefault() methods. IframePage implements both BasePage AND IFrameContext. Tests that need iframe context explicitly call switchToFrame() first, then use page methods normally. The BasePage hierarchy stays uncontaminated.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q5: Describe a real LSP violation in a production Selenium framework</span><span class="qa-tag">Real World</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Common production case: MobileAppPage extends WebBasePage. MobileAppPage overrides clickElement() to use TouchActions instead of click(). For standard elements it works. But for standard anchor tags, TouchActions doesn't trigger href navigation — behavior differs from WebBasePage.clickElement(). Tests written assuming the click() contract navigate correctly for web, crash silently for mobile (page doesn't change). Fix: separate MobilePage and WebPage from a common IPage interface, each with their own click semantics. Don't force one to substitute for the other.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q6: How do AppiumDriver and ChromeDriver both work in the same Selenium tests?</span><span class="qa-tag">Mobile</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Selenium's WebDriver interface contract is honored by both ChromeDriver (desktop) and AppiumDriver (mobile). Both implement get(), findElement(), quit(), etc. Page Objects that use only the WebDriver interface work for both drivers without modification — that's LSP. Tests: for mobile, inject AppiumDriver factory; for web, inject ChromeDriver factory. The Page Objects are identical. Where AppiumDriver extends WebDriver with mobile-specific methods (swipe, pinch), those are handled by mobile-specific page objects (MobileLoginPage), not by the shared hierarchy. LSP boundary: shared web actions in common pages, mobile-specific actions in mobile pages.</div></div>
`}
]},

{ico:"📖",bg:"#E3F2FD",title:"Complete SOLID Selenium Framework Architecture",body:`
<p style="margin-bottom:12px">Here's the complete picture — how all 5 SOLID principles work in harmony in a production Selenium Java framework.</p>
<div class="diag">
<svg viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Complete SOLID Selenium Framework Architecture</title>
<defs><marker id="a13" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<!-- Layer labels -->
<text x="340" y="18" text-anchor="middle" fill="var(--color-text-primary)" font-size="13" font-weight="500" font-family="Anthropic Sans,sans-serif">Complete SOLID Selenium Architecture</text>
<!-- Interfaces layer — D -->
<rect x="20" y="28" width="640" height="68" rx="10" fill="#F3E5F5" stroke="#7B3FA0" stroke-width="0.5"/>
<text x="340" y="48" text-anchor="middle" fill="#4a1775" font-size="11" font-weight="500" font-family="Anthropic Sans,sans-serif">Abstractions Layer (D — Dependency Inversion)</text>
<rect x="32" y="56" width="140" height="30" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.5"/>
<text x="102" y="75" text-anchor="middle" fill="#0c3d7a" font-size="10" font-weight="500" font-family="Anthropic Sans,sans-serif">IDriverFactory</text>
<rect x="184" y="56" width="140" height="30" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.5"/>
<text x="254" y="75" text-anchor="middle" fill="#1b5e20" font-size="10" font-weight="500" font-family="Anthropic Sans,sans-serif">IDataProvider</text>
<rect x="336" y="56" width="140" height="30" rx="5" fill="#FFF8E1" stroke="#F57F17" stroke-width="0.5"/>
<text x="406" y="75" text-anchor="middle" fill="#7a3d0c" font-size="10" font-weight="500" font-family="Anthropic Sans,sans-serif">ITestReporter</text>
<rect x="488" y="56" width="160" height="30" rx="5" fill="#FCEAE8" stroke="#C0392B" stroke-width="0.5"/>
<text x="568" y="75" text-anchor="middle" fill="#922b21" font-size="10" font-weight="500" font-family="Anthropic Sans,sans-serif">IWaitStrategy (ISP: small)</text>

<!-- TestBase — S+D -->
<rect x="180" y="120" width="320" height="56" rx="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
<text x="340" y="143" text-anchor="middle" fill="#1b5e20" font-size="12" font-weight="500" font-family="Anthropic Sans,sans-serif">TestBase (S: driver lifecycle only, D: all injected)</text>
<text x="340" y="161" text-anchor="middle" fill="#2E7D32" font-size="10" font-family="Anthropic Sans,sans-serif">IDriverFactory, IDataProvider, ITestReporter, IWaitStrategy</text>
<line x1="102" y1="86" x2="238" y2="120" stroke="#1565C0" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#a13)"/>
<line x1="254" y1="86" x2="290" y2="120" stroke="#2E7D32" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#a13)"/>
<line x1="406" y1="86" x2="370" y2="120" stroke="#F57F17" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#a13)"/>
<line x1="568" y1="86" x2="440" y2="120" stroke="#C0392B" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#a13)"/>

<!-- Page Objects — S -->
<rect x="20" y="216" width="640" height="56" rx="10" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.5"/>
<text x="340" y="237" text-anchor="middle" fill="#0c3d7a" font-size="11" font-weight="500" font-family="Anthropic Sans,sans-serif">Page Objects Layer (S: one page = one class, L: honor BasePage contract)</text>
<text x="340" y="255" text-anchor="middle" fill="#1565C0" font-size="10" font-family="Anthropic Sans,sans-serif">LoginPage  CartPage  CheckoutPage  DashboardPage  SearchPage  — each one responsibility</text>

<!-- Implementations — O -->
<rect x="20" y="310" width="640" height="56" rx="10" fill="#FFF8E1" stroke="#F57F17" stroke-width="0.5"/>
<text x="340" y="330" text-anchor="middle" fill="#7a3d0c" font-size="11" font-weight="500" font-family="Anthropic Sans,sans-serif">Implementations Layer (O: add new impls without modifying above)</text>
<text x="340" y="348" text-anchor="middle" fill="#F57F17" font-size="10" font-family="Anthropic Sans,sans-serif">ChromeFactory  FirefoxFactory  RemoteFactory  ExcelData  JsonData  ExtentReport  AllureReport</text>

<line x1="340" y1="176" x2="340" y2="216" stroke="#2E7D32" stroke-width="0.5" marker-end="url(#a13)"/>
<line x1="340" y1="272" x2="340" y2="310" stroke="#F57F17" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#a13)"/>
</svg>
</div>
<pre>
// THE FULL SOLID SELENIUM FRAMEWORK

// D: All interfaces (abstractions) defined first
interface IDriverFactory  { WebDriver create(); }          // DIP
interface IDataProvider   { &lt;T&gt; T load(String k, Class&lt;T&gt; t); } // DIP
interface ITestReporter   { void pass(String m); void fail(String m, byte[] s); } // DIP + ISP
interface IWaitStrategy   { WebElement waitFor(By b); }    // DIP + ISP (small!)

// S: TestBase — ONE job: setup/teardown test lifecycle
abstract class TestBase {
    protected WebDriver driver;
    protected IDataProvider data;
    protected ITestReporter reporter;
    protected IWaitStrategy wait;

    protected TestBase(IDriverFactory df, IDataProvider dp,
                       ITestReporter r, IWaitStrategy w) { // D: injected
        this.driver   = df.create();  // D
        this.data     = dp;           // D
        this.reporter = r;            // D
        this.wait     = w;            // D
    }
    @AfterEach void tearDown() { if(driver!=null) driver.quit(); }
}

// S: BasePage — ONE job: shared page utilities
abstract class BasePage {
    protected final WebDriver driver;
    protected final IWaitStrategy wait;
    protected BasePage(WebDriver d, IWaitStrategy w) { driver=d; wait=w; }
    public String getTitle() { return driver.getTitle(); }  // L: honored by all subpages
}

// S+L: LoginPage — ONE job, honors BasePage contract
class LoginPage extends BasePage {
    private final By user = By.id("user"), pass = By.id("pass"), btn = By.id("login");
    LoginPage(WebDriver d, IWaitStrategy w) { super(d,w); }
    public LoginPage enterUser(String u) { wait.waitFor(user).sendKeys(u); return this; }
    public LoginPage enterPass(String p) { wait.waitFor(pass).sendKeys(p); return this; }
    public DashboardPage submit()        { wait.waitFor(btn).click(); return new DashboardPage(driver,wait); }
    // LSP: getTitle() inherited from BasePage — NOT overridden to throw
}

// O: New browser = new class only — TestBase NEVER changes
class RemoteDriverFactory implements IDriverFactory {
    private final URL gridUrl;
    private final Capabilities caps;
    RemoteDriverFactory(URL url, Capabilities c) { gridUrl=url; caps=c; }
    public WebDriver create() { return new RemoteWebDriver(gridUrl, caps); }
}
</pre>

{ico:"🎤",bg:"#FFF3E0",title:"Interview One-Liners — All SOLID in Selenium",body:`
<div class="liner"><strong>"My Selenium framework applies S by separating pages/tests/base/utils, O by factory interfaces for browsers, L by honoring BasePage contracts, I by small helper interfaces, D by injecting all dependencies — that's SOLID end-to-end."</strong></div>
<div class="liner"><strong>"I can add a new browser, a new reporter, and a new wait strategy in my framework by writing 3 new classes — zero edits to existing code. That's OCP powered by DIP."</strong></div>
<div class="liner"><strong>"The test cases in my SOLID framework read like sentences: new LoginPage(driver).enterUser('a').enterPass('b').submit().assertWelcomeShown(). Clear, readable, maintainable."</strong></div>
<div class="liner"><strong>"When a new SDET joins the team, they can write tests without understanding the framework internals — that's the maintainability dividend of SOLID."</strong></div>
<div class="liner"><strong>"Every principle solves a real pain: S stops God Classes, O stops regressions from new features, L stops broken inheritance, I stops mock bloat, D enables testing and CI portability."</strong></div>
`},
{ico:"✅",bg:"#E8F5E9",title:"Complete SOLID Selenium Checklist",body:`
<ul class="cklist">
  <li><div class="ck">S</div><div>Each Page Object has one page's locators and actions only. TestBase has setup/teardown only. Reporter has reporting only.</div></li>
  <li><div class="ck">O</div><div>New browser/reporter/data-source = new class. No existing class needs editing to add a new capability.</div></li>
  <li><div class="ck">L</div><div>Every page extending BasePage passes the Liskov test suite — all BasePage methods work without exceptions.</div></li>
  <li><div class="ck">I</div><div>No test helper interface has more than 4 methods. Mock setup never needs more than 3 stubs per test.</div></li>
  <li><div class="ck">D</div><div>TestBase constructor takes only interface types. Zero <code>new ConcreteClass()</code> in TestBase or any Page Object.</div></li>
  <li><div class="ck">✓</div><div>Any test class runs with Mockito mocks in under 100ms — proves framework DIP compliance.</div></li>
  <li><div class="ck">✓</div><div>CI pipeline has 3 separate stages: unit (mocks), integration (local browser), regression (Grid) — enabled by DIP.</div></li>
</ul>
`},
{ico:"🎯",bg:"#F3E5F5",title:"Q&A — Full SOLID Selenium Architecture",body:`
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q1: Walk me through your Selenium framework architecture</span><span class="qa-tag">Architecture</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">My framework has 4 layers applying SOLID throughout: (1) Interfaces layer (DIP): IDriverFactory, IDataProvider, ITestReporter, IWaitStrategy — all abstractions. (2) Base layer (SRP): TestBase handles lifecycle, BasePage provides shared page utilities. (3) Page Objects (SRP+LSP): one class per page, all extending BasePage and honoring its contract. (4) Implementations (OCP): Chrome/Firefox/RemoteDriverFactory, Excel/JsonDataProvider, Extent/AllureReporter — add new ones without touching upper layers. Configuration selects implementations at runtime via properties file. All 5 SOLID principles have a clear home in this architecture.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q2: How does your framework handle test data with SOLID principles?</span><span class="qa-tag">Data</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">IDataProvider interface (ISP: just load method, DIP: injected into TestBase). ExcelDataProvider reads from xlsx, JsonDataProvider reads JSON, ApiDataProvider fetches from a test-data API. Tests call: data.load("login.validUser", LoginData.class). The data source is transparent to tests — switch from Excel (local dev) to API (CI) via one config property. Adding a DatabaseDataProvider: new class, zero changes to tests or TestBase (OCP). No test ever imports poi.apache or jackson directly — all through the IDataProvider interface (DIP).</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q3: How do you handle test parallelism while keeping SOLID compliance?</span><span class="qa-tag">Parallel</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">DriverManager class uses ThreadLocal&lt;WebDriver&gt; to give each thread its own driver. DIP: DriverManager.init(IDriverFactory factory) takes the factory interface. BasePage gets its driver from DriverManager.getDriver() rather than from the constructor (for simplicity in parallel mode). ISP: DriverManager exposes only init(), getDriver(), quit() — three focused methods. OCP: switching from local parallel to Selenium Grid parallel = one new RemoteDriverFactory + config change. Tests are thread-safe because SRP keeps shared state out of test classes.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q4: How do you onboard a junior SDET into your SOLID framework?</span><span class="qa-tag">Mentoring</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Three-step onboarding: (1) Show the package structure — pages/, tests/, base/, utils/ — and explain SRP: each folder has one reason to exist. (2) Show an existing test: it reads like English, calls Page Object methods, has no locators. Let them write a new test before understanding the framework. (3) Then show BasePage, IDriverFactory, TestBase — explain DIP: "you never create a driver, it's given to you." Junior SDETs are productive in Day 1 (writing tests) because SRP and DIP keep test code clean even without understanding the framework internals.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q5: How does your SOLID framework integrate with Jenkins/GitHub Actions?</span><span class="qa-tag">CI/CD</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Three pipeline stages enabled by DIP: Stage 1 (unit) — mvn test -Dtest=*Unit* — uses MockDriverFactory, no browser, runs in 30 seconds. Stage 2 (smoke) — mvn test -Psmoke -Dbrowser=chrome -Denv=staging — ChromeDriverFactory, headless, 5 minutes. Stage 3 (regression) — mvn test -Pregression -Dbrowser=remote -DgridUrl=http://hub:4444 — RemoteDriverFactory, full grid, parallel, 15 minutes. All three stages use identical test code — only the injected factories differ. This CI stratification is only possible because the framework is DIP-compliant.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q6: What metrics show your SOLID framework is working well?</span><span class="qa-tag">Metrics</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Key SOLID health metrics: (1) Avg test class length &lt;50 lines — SRP; (2) Avg Page Object length &lt;100 lines — SRP; (3) New feature addition: 1 new class + 1 new test, zero existing class edits — OCP; (4) Browser switch: 0 test file edits — DIP+OCP; (5) Unit test coverage of helpers &gt;90% without browser — DIP; (6) Mock setup per test &lt;3 stubs — ISP; (7) TestBase constructor parameters &lt;5 — SRP; (8) Zero instanceof in test code — LSP. Track these in SonarQube quality gates. Degradation in any metric signals a SOLID violation creeping in.</div></div>
`}
]},

{ph:2,num:17,
title:"Advanced Patterns: Builder, Fluent API & Composition",
sub:"SOLID-powered design patterns that make test code production-grade",
secs:[
{ico:"📖",bg:"#E3F2FD",title:"Overview — Advanced SOLID Patterns in Selenium",body:`
<p style="margin-bottom:12px">With SOLID foundations in place, these patterns emerge naturally: <strong>Builder</strong> (SRP+OCP for test data), <strong>Fluent API</strong> (SRP per method), <strong>Composition</strong> (over inheritance for page components), <strong>Decorator</strong> (OCP+LSP for WebDriver enhancements).</p>
<div class="diag">
<svg viewBox="0 0 680 250" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Advanced SOLID Patterns Overview</title>
<text x="340" y="18" text-anchor="middle" fill="var(--color-text-primary)" font-size="13" font-weight="500" font-family="Anthropic Sans,sans-serif">SOLID Design Patterns in Selenium</text>
<rect x="20" y="28" width="145" height="100" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.5"/>
<text x="92" y="50" text-anchor="middle" fill="#0c3d7a" font-size="11" font-weight="500" font-family="Anthropic Sans,sans-serif">Builder Pattern</text>
<text x="92" y="68" text-anchor="middle" fill="#1565C0" font-size="10" font-family="Anthropic Sans,sans-serif">SRP: each builder</text>
<text x="92" y="82" text-anchor="middle" fill="#1565C0" font-size="10" font-family="Anthropic Sans,sans-serif">builds one object</text>
<text x="92" y="96" text-anchor="middle" fill="#1565C0" font-size="10" font-family="Anthropic Sans,sans-serif">OCP: new builders</text>
<text x="92" y="110" text-anchor="middle" fill="#1565C0" font-size="10" font-family="Anthropic Sans,sans-serif">without editing model</text>

// ✅ Builder Pattern (SRP+OCP) — test data building
public class UserBuilder {
    private String name="Test User", email="test@test.com";
    private String role="customer", address="123 Main St";

    public UserBuilder withName(String n)    { this.name=n;    return this; }
    public UserBuilder withEmail(String e)   { this.email=e;   return this; }
    public UserBuilder withRole(String r)    { this.role=r;    return this; }
    public UserBuilder withAddress(String a) { this.address=a; return this; }
    public User build() { return new User(name, email, role, address); }

    // Factory methods for common users (OCP: add new ones without modifying above)
    public static UserBuilder admin()    { return new UserBuilder().withRole("admin"); }
    public static UserBuilder guest()    { return new UserBuilder().withRole("guest"); }
}

// Usage: readable, SOLID
User premiumUser = new UserBuilder()
    .withName("Alice")
    .withEmail("alice@vip.com")
    .withRole("premium")
    .build();

// ✅ Decorator Pattern (OCP+LSP) — LoggingWebDriver
public class LoggingWebDriver implements WebDriver {  // LSP: same contract
    private final WebDriver delegate;
    private final Logger log = LoggerFactory.getLogger(LoggingWebDriver.class);

    public LoggingWebDriver(WebDriver d) { this.delegate = d; }

    @Override public void get(String url) {
        log.info("Navigating to: {}", url);
        delegate.get(url);  // OCP: original driver untouched
    }
    @Override public WebElement findElement(By by) {
        log.debug("Finding element: {}", by);
        return delegate.findElement(by);
    }
    // All other WebDriver methods delegate transparently (LSP honored)
    @Override public void quit()          { delegate.quit(); }
    @Override public String getTitle()    { return delegate.getTitle(); }
    @Override public String getCurrentUrl(){ return delegate.getCurrentUrl(); }
}
</pre>

{ico:"🎯",bg:"#F3E5F5",title:"Q&A — Advanced Patterns",body:`
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q1: How does the Page Component Object Pattern apply SOLID?</span><span class="qa-tag">Pattern</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">PCOP uses composition (SRP): a NavigationBar component owns nav element interactions. A LoginForm component owns form fields. DashboardPage composes both: class DashboardPage { private final NavigationBar nav; private final UserGreeting greeting; }. Each component = one responsibility (SRP). Adding new components doesn't change existing ones (OCP). Components can be tested independently (DIP via WebDriver injection). No deep inheritance needed (LSP preserved). This is SOLID applied to page decomposition.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q2: How do you implement screenshot-on-failure using Decorator + OCP?</span><span class="qa-tag">Practical</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Two OCP-compliant approaches: (1) TestWatcher JUnit 5 extension: implements TestWatcher.testFailed() — captures screenshot and attaches to report. Add to any test class with @ExtendWith(ScreenshotExtension.class). Zero test code changes (OCP). (2) WebDriver Decorator: ScreenshotDriver wraps WebDriver, overrides click/sendKeys to catch exceptions and take screenshots. Tests using WebDriver interface automatically get screenshots (LSP: transparent substitution). Option 1 is simpler; Option 2 captures more granular failures. Both are OCP-compliant — no test editing required to add this capability.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q3: How does the Page Factory pattern in Selenium relate to SOLID?</span><span class="qa-tag">Selenium API</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">PageFactory.initElements(driver, this) initializes @FindBy annotated fields — a form of DIP (driver injected) and SRP (page object manages its own element initialization). However, it has SOLID weaknesses: @FindBy annotations couple the page to Selenium annotations (weakens DIP); PageFactory's static method is not easily mockable; lazy element initialization can hide stale element issues. Modern recommendation: use explicit By locators (private final By x = By.id("x")) over @FindBy for better testability and clearer DIP compliance. PageFactory convenience trades some SOLID purity.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q4: How do you apply the Builder pattern to API request bodies in REST tests?</span><span class="qa-tag">API Testing</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">OrderRequestBuilder: withItem(Item i), withShippingAddress(Address a), withPaymentMethod(PaymentMethod p), build(). Each builder method has one responsibility (SRP). Static factory methods: OrderRequestBuilder.minimalValid() provides defaults for smoke tests; OrderRequestBuilder.withAllFields() for regression. OCP: add new request fields as new builder methods — existing tests using minimalValid() are unaffected. ISP: separate builders for different request types (CreateOrderRequest vs UpdateOrderRequest) — never one giant RequestBuilder for all endpoints.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q5: How does RetryDriver implement OCP and LSP together?</span><span class="qa-tag">Resilience</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a"><pre>
public class RetryDriver implements WebDriver { // LSP: same contract
    private final WebDriver delegate;
    private final int maxRetries;
    RetryDriver(WebDriver d, int retries) { delegate=d; maxRetries=retries; }
    
    @Override
    public WebElement findElement(By by) {
        for(int i=0; i&lt;maxRetries; i++) {
            try { return delegate.findElement(by); }
            catch(StaleElementReferenceException e) {
                if(i==maxRetries-1) throw e; // rethrow same exception type (LSP!)
            }
        }
        throw new RuntimeException("unreachable");
    }
    @Override public void get(String url) { delegate.get(url); }
    @Override public void quit() { delegate.quit(); }
    // all methods delegate (LSP honored)
}
// Usage: wrap any driver (OCP: no driver change needed)
WebDriver driver = new RetryDriver(new ChromeDriver(), 3);
</pre></div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q6: How do you avoid "test helper God class" anti-pattern?</span><span class="qa-tag">Architecture</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">The God Helper anti-pattern: one TestHelper.java with 50 static methods for everything. Violates SRP (50 reasons to change), DIP (static = impossible to mock), ISP (test imports all 50 for 3). Fix: (1) Identify clusters of methods by purpose; (2) Create focused classes: WaitHelper (5 methods), AssertionHelper (6), DataHelper (8), ScreenshotHelper (3); (3) Make methods instance-based, not static; (4) Inject via constructor (DIP); (5) Test helpers get their own unit tests. Result: 50-method God Helper → 4 focused, testable, SOLID classes of 5–10 methods each.</div></div>
`}
]},

{ico:"🎯",bg:"#F3E5F5",title:"Q&A — Anti-Patterns",body:`
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q1: How do you refactor a 400-line God TestBase?</span><span class="qa-tag">Refactoring</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Strangle it gradually: (1) Extract DriverManager (ThreadLocal driver, create/quit) — move all driver code there. (2) Extract ReportManager (ExtentReports setup, pass/fail/skip) — move all reporting code. (3) Extract ConfigManager (properties loading, env variables). (4) Extract ApiAuthHelper (login tokens for test preconditions). Now TestBase is 30 lines: @BeforeEach calls DriverManager.init(factory), @AfterEach calls DriverManager.quit(). Each extracted class is independently testable. Run full regression after each extraction to catch issues early.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q2: How do you eliminate static WebDriver from a legacy framework?</span><span class="qa-tag">Legacy</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Incremental approach: (1) Create IDriverFactory interface alongside existing code. (2) Wrap existing static driver in a DefaultDriverFactory implementing IDriverFactory. (3) Refactor TestBase to accept IDriverFactory in a new constructor; keep old constructor calling super(new DefaultDriverFactory()). (4) Migrate one test class at a time to use the new constructor with injected factory. (5) Once all test classes use injection, remove the static driver and old constructor. (6) Tests are now mockable. Total migration: 2–4 sprints for large frameworks, with zero regression thanks to parallel approaches.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q3: How do you handle framework design debt in a team?</span><span class="qa-tag">Team</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Establish quality gates: SonarQube rule — TestBase max 150 lines, Page Object max 200 lines, no By.* in test packages. Code review checklist: locators in right place? Factories used for drivers? Constructor injection used? Schedule "framework health" sprints quarterly. Track these metrics in a dashboard. When violations are found in PR: comment with the SOLID principle violated and the fix pattern. Never merge code that regresses framework SOLID compliance. Over 2–3 quarters, the framework health improves measurably.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q4: What's the "Fragile Test" smell and how does SOLID fix it?</span><span class="qa-tag">Test Quality</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Fragile tests fail for unrelated reasons: test A fails because test B's driver setup leaked state (no SRP in TestBase), test C fails because a new browser was added and the switch-case broke (no OCP), test D fails on Grid because driver is hardcoded as local (no DIP). SOLID fixes each: SRP ensures test isolation. OCP ensures new capabilities don't break existing tests. DIP ensures tests are environment-agnostic. LSP ensures driver substitution is transparent. A SOLID framework has tests that fail only when the application under test has a bug — not when the framework or environment changes.</div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q5: How do you use ArchUnit to enforce SOLID in a Selenium framework?</span><span class="qa-tag">ArchUnit</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a"><pre>
@AnalyzeClasses(packages="com.myframework")
class SolidArchTest {
    @ArchTest static final ArchRule noByCalls =
        noClasses().that().resideInAPackage("..tests..")
        .should().accessClassesThat().haveSimpleName("By")
        .because("Locators belong in Page Objects (SRP)");

    @ArchTest static final ArchRule noConcreteDriverInTests =
        noClasses().that().resideInAPackage("..tests..")
        .should().dependOnClassesThat().haveNameMatching(".*Driver")
        .because("Tests should use IDriverFactory, not concrete drivers (DIP)");

    @ArchTest static final ArchRule pageObjectsExtendBasePage =
        classes().that().resideInAPackage("..pages..")
        .and().areNotInterfaces()
        .should().beAssignableTo(BasePage.class)
        .because("All page objects must extend BasePage (LSP)");
}
</pre></div></div>
<div class="qa"><div class="qa-q" onclick="tqa(this)"><span>Q6: How do you present a SOLID-based framework proposal to a manager?</span><span class="qa-tag">Leadership</span><span style="margin-left:auto;font-size:16px">▾</span></div><div class="qa-a">Frame it in business value, not principles: (1) Current problem: adding a new browser requires editing 50 files and retesting everything — 3 days. With SOLID (OCP+DIP): 1 new class, 30 minutes. (2) Current problem: one SDET's framework change breaks another's tests — daily. With SRP: isolated classes, no cascading breaks. (3) Current problem: can't run tests without a real browser in CI — tests take 45 minutes. With DIP: unit tests with mocks run in 30 seconds. Present before/after metrics. No manager says no to "add new browser in 30 minutes instead of 3 days."</div></div>
`}
]},

title:"SOLID + CI/CD: Production-Grade Selenium Framework",
