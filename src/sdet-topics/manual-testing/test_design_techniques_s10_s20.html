.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:10px;margin-right:4px}
.bd-b{background:#EEEDFE;color:#3C3489}.bd-g{background:#E1F5EE;color:#085041}.bd-o{background:#FAECE7;color:#712B13}
.stitle{font-size:15px;font-weight:500;margin:1.25rem 0 0.6rem;padding-bottom:4px;border-bottom:0.5px solid var(--color-border-tertiary)}
.dbox{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px;font-size:13px;line-height:1.7;margin-bottom:10px}

{id:0,code:"S10",title:"Equivalence Partitioning",phase:"b",
overview:`<strong>Equivalence Partitioning (EP)</strong> is a black-box test design technique where you divide input data into <em>partitions (classes)</em> that are expected to be treated the same way by the system. You test one representative value from each partition instead of testing every possible value.<br><br>
<strong>What:</strong> Dividing inputs into valid and invalid classes/groups.<br>
<strong>Why:</strong> Reduces the number of test cases while maintaining coverage — you don't need to test 1000 inputs when they all behave identically.<br>
<strong>When:</strong> Any time inputs have a range or set of valid values.<br>
<strong>How:</strong> Identify partitions → pick one representative value per partition → write test cases.`,
oneliners:[
"Equivalence Partitioning divides input data into groups where any value from the group is expected to produce the same result.",
"EP reduces test cases from thousands to a handful — test one representative value per partition, not all values.",
"In EP, partitions are either valid (accepted by system) or invalid (rejected by system) — both must be tested.",
"The rule is: if one value in a partition fails, all others in that partition are also expected to fail.",
"EP is always combined with Boundary Value Analysis — together they give maximum coverage with minimum test cases.",
"EP applies to both input fields (age, salary) and output conditions (discount tiers, shipping zones)."
],

<g class="c-teal"><rect x="210" y="55" width="260" height="60" rx="8" stroke-width="0.5"/><text class="th" x="340" y="78" text-anchor="middle" dominant-baseline="central">Valid partition</text><text class="ts" x="340" y="98" text-anchor="middle" dominant-baseline="central">18 ≤ Age ≤ 60 → Test: 35</text></g>
<g class="c-coral"><rect x="490" y="55" width="170" height="60" rx="8" stroke-width="0.5"/><text class="th" x="575" y="78" text-anchor="middle" dominant-baseline="central">Invalid partition 2</text><text class="ts" x="575" y="98" text-anchor="middle" dominant-baseline="central">Age &gt; 60 → Test: 75</text></g>

<text class="ts" x="340" y="235" text-anchor="middle">3 test cases cover the entire age spectrum — not 100+ individual values</text></svg>`,
svg2:`<svg width="100%" viewBox="0 0 680 220" role="img"><title>EP process steps</title><desc>Four steps to apply equivalence partitioning</desc>
<defs><marker id="ar2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-gray"><rect x="20" y="60" width="130" height="70" rx="8" stroke-width="0.5"/><text class="th" x="85" y="85" text-anchor="middle" dominant-baseline="central">1. Identify</text><text class="ts" x="85" y="108" text-anchor="middle" dominant-baseline="central">Input field range</text></g>
<line x1="150" y1="95" x2="180" y2="95" stroke="var(--color-text-tertiary)" stroke-width="0.5" marker-end="url(#ar2)"/>

<line x1="310" y1="95" x2="340" y2="95" stroke="var(--color-text-tertiary)" stroke-width="0.5" marker-end="url(#ar2)"/>
<g class="c-teal"><rect x="340" y="60" width="130" height="70" rx="8" stroke-width="0.5"/><text class="th" x="405" y="85" text-anchor="middle" dominant-baseline="central">3. Pick rep.</text><text class="ts" x="405" y="108" text-anchor="middle" dominant-baseline="central">One value per class</text></g>
<line x1="470" y1="95" x2="500" y2="95" stroke="var(--color-text-tertiary)" stroke-width="0.5" marker-end="url(#ar2)"/>
<g class="c-amber"><rect x="500" y="60" width="160" height="70" rx="8" stroke-width="0.5"/><text class="th" x="580" y="85" text-anchor="middle" dominant-baseline="central">4. Write TCs</text><text class="ts" x="580" y="108" text-anchor="middle" dominant-baseline="central">One TC per partition</text></g>
<text class="ts" x="340" y="175" text-anchor="middle">Rule: if one value in a class behaves correctly, all others should too</text>
<text class="ts" x="340" y="198" text-anchor="middle">EP reduces test count while maintaining logical coverage of all conditions</text></svg>`,
bp:["Always identify BOTH valid and invalid partitions — testing only valid inputs misses half the bugs.","Pick a middle value from each partition as the representative — not the boundary value (that's BVA).","Apply EP to every input field, not just numeric ranges — it works for strings, dropdowns, dates too.","For string fields: valid length, too short, too long are three separate partitions.","Document each partition clearly with its range, representative value, and expected result.","Combine EP with BVA — EP gives you partition representatives; BVA tests the edges.","Apply EP to output conditions too — e.g., three discount tiers = three output partitions.","In reviews, verify that no partition overlaps and no gap exists between partitions."],
qa:[
{q:"What is equivalence partitioning?",a:"EP is a black-box technique that divides input data into partitions (equivalence classes) where all values behave identically. One representative value per class is tested instead of every possible value."},
{q:"Why do we test only one value per partition in EP?",a:"Because all values in a partition are expected to produce the same result. Testing more values from the same class adds no additional coverage — it just wastes time."},
{q:"How many partitions does a numeric field 1-100 have?",a:"Three: Invalid partition 1 (< 1), Valid partition (1-100), Invalid partition 2 (> 100). At minimum 3 test cases are needed."},
{q:"Does EP apply to non-numeric inputs?",a:"Yes. EP applies to any input: strings (empty, valid length, too long), dropdowns (valid option, invalid option), dates (past, valid range, future), etc."},
{q:"What is the difference between EP and BVA?",a:"EP picks one middle representative from each partition. BVA specifically tests the boundary values — the edges between partitions. They are used together for complete coverage."},
{q:"Can EP be applied to outputs as well as inputs?",a:"Yes — output EP divides expected output into classes. Example: discount tiers (0%, 5%, 10%) are output partitions — each maps to different input ranges that must be tested."}
]},

{id:1,code:"S11",title:"Boundary Value Analysis",phase:"b",
overview:`<strong>Boundary Value Analysis (BVA)</strong> is a black-box technique that focuses on testing at the <em>exact boundaries</em> of input partitions — the minimum, maximum, just inside, and just outside valid ranges.<br><br>
<strong>Why:</strong> Most software defects occur at boundaries — off-by-one errors, fence-post errors. Developers often code 'less than' instead of 'less than or equal to'.<br>
<strong>When:</strong> Any input with a numeric or ordered range.<br>
<strong>How:</strong> For each boundary, test: min, min-1, min+1, max, max-1, max+1.`,
oneliners:[
"BVA tests the exact boundary values of input ranges — minimum, maximum, just below, and just above.",
"Most bugs hide at boundaries: off-by-one errors, '>' vs '>=' mistakes are caught only by BVA.",
"For a valid range 1-100: BVA test values are 0, 1, 2, 99, 100, 101 — six test cases per boundary pair.",
"BVA is always applied after EP — EP finds the partitions, BVA tests their edges.",
"2-value BVA tests just the boundary itself (min and max); 3-value BVA adds just inside and just outside.",
"BVA is the most effective single technique for catching developer coding errors near boundaries."
],

<g class="c-gray"><rect x="290" y="60" width="100" height="36" rx="6" stroke-width="0.5"/><text class="th" x="340" y="78" text-anchor="middle" dominant-baseline="central">... 50 ...</text></g>

<g class="c-coral"><rect x="604" y="60" width="44" height="36" rx="6" stroke-width="0.5"/><text class="th" x="626" y="78" text-anchor="middle" dominant-baseline="central">101</text></g>

svg2:`<svg width="100%" viewBox="0 0 680 200" role="img"><title>2-value vs 3-value BVA</title><desc>Comparison of two BVA approaches</desc>
<g class="c-purple"><rect x="20" y="30" width="300" height="140" rx="8" stroke-width="0.5"/>

<text class="ts" x="510" y="132" text-anchor="middle" dominant-baseline="central">Used in: ISTQB Advanced level</text>
<text class="ts" x="510" y="154" text-anchor="middle" dominant-baseline="central">Industry standard — preferred</text>
</g></svg>`,
bp:["Always apply BVA after EP — EP defines partitions, BVA tests their edges.","Use 3-value BVA (min-1, min, min+1 and max-1, max, max+1) — it catches more off-by-one errors.","Test decimal boundaries carefully: for range 1.0–10.0, test 0.9, 1.0, 1.1, 9.9, 10.0, 10.1.","Apply BVA to dates: last day of month, first day of month, end of year, leap year boundaries.","BVA applies to string length: 0 chars, 1 char, max chars, max+1 chars.","Never skip the just-outside-boundary tests (min-1, max+1) — these catch the most common off-by-one bugs.","Include both boundary AND partition representative tests in your test suite.","Document the exact boundary values in your test case test data column — never approximate."],
qa:[
{q:"What is Boundary Value Analysis?",a:"BVA is a black-box technique that tests input values at the exact boundaries of valid ranges — specifically min-1, min, min+1, max-1, max, max+1. Most bugs occur at boundaries."},
{q:"Why do most bugs occur at boundaries?",a:"Developers commonly make off-by-one errors — writing '>' instead of '>=' or '<' instead of '<='. These mistakes only manifest when testing exactly at the boundary value, not at midpoint values."},
{q:"For a valid input range of 18–65, list all BVA test values.",a:"17 (min-1, invalid), 18 (min, valid), 19 (min+1, valid), 64 (max-1, valid), 65 (max, valid), 66 (max+1, invalid). Six test cases total."},
{q:"What is the difference between 2-value and 3-value BVA?",a:"2-value BVA tests only min and max. 3-value BVA tests min-1, min, min+1 and max-1, max, max+1. 3-value is the industry standard and catches more defects."},
{q:"Can BVA be applied to non-numeric inputs?",a:"Yes — BVA applies to string length (0, 1, min, max, max+1 characters), dates (first/last day of month, year boundaries), and any ordered input with a defined range."},
{q:"What is an 'off-by-one error' and how does BVA catch it?",a:"An off-by-one error is when a developer uses strict '>' instead of '>=' (or vice versa), making the boundary itself incorrectly included or excluded. BVA catches it by explicitly testing the exact boundary value."}
]},

{id:2,code:"S12",title:"Decision Table Testing",phase:"b",
overview:`<strong>Decision Table Testing</strong> is a black-box technique for testing systems with <em>complex business rules</em> involving multiple conditions and combinations. It uses a table where each column is a test case.<br><br>
<strong>What:</strong> A grid of conditions and their resulting actions for every combination.<br>
<strong>Why:</strong> Ensures all combinations of inputs and business rules are tested — prevents missed combinations.<br>
<strong>When:</strong> Used for complex logic with multiple conditions (login rules, discount rules, access control).<br>
<strong>How:</strong> List all conditions, list all actions, fill every combination column.`,
oneliners:[
"Decision tables ensure every combination of business conditions is tested — not just the obvious happy paths.",
"A decision table has conditions as rows and test cases as columns — each column is one unique combination.",
"With N binary conditions, a decision table has 2^N columns — 3 conditions = 8 test case columns.",
"Decision table testing is ideal for complex business rules: insurance premiums, discount calculations, access control.",
"Each column in a decision table is a distinct, independent test case — they do not share data.",
"Decision table testing is the most systematic way to test boolean logic and if-then-else business rules."
],

svg2:`<svg width="100%" viewBox="0 0 680 180" role="img"><title>Decision table formula</title><desc>How to calculate number of test cases in a decision table</desc>
<g class="c-amber"><rect x="20" y="20" width="300" height="140" rx="8" stroke-width="0.5"/>

<text class="ts" x="170" y="80" text-anchor="middle" dominant-baseline="central">N = number of binary conditions</text>
<text class="ts" x="170" y="104" text-anchor="middle" dominant-baseline="central">1 condition → 2 TCs</text>
<text class="ts" x="170" y="124" text-anchor="middle" dominant-baseline="central">2 conditions → 4 TCs</text>

</g>
<g class="c-teal"><rect x="360" y="20" width="300" height="140" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="50" text-anchor="middle" dominant-baseline="central">When to use decision tables</text>
<text class="ts" x="510" y="78" text-anchor="middle" dominant-baseline="central">Multiple conditions + actions</text>
<text class="ts" x="510" y="100" text-anchor="middle" dominant-baseline="central">Insurance / discount rules</text>
<text class="ts" x="510" y="122" text-anchor="middle" dominant-baseline="central">Access control policies</text>
<text class="ts" x="510" y="144" text-anchor="middle" dominant-baseline="central">Complex if-then-else logic</text>
</g></svg>`,
bp:["Start by listing ALL conditions and ALL possible actions before building the table.","With more than 4 conditions (16+ columns), collapse identical-outcome columns to reduce test cases.","Each column in the table must be a unique combination — no duplicate columns.","Review the table with business analysts to confirm every combination maps to the correct action.","Decision tables are excellent for regulatory compliance testing — they document every business rule combination.","Use T/F notation for binary conditions; use ranges (Low/Med/High) for multi-value conditions.","Collapsed decision tables must not lose any unique business logic — verify before collapsing.","Decision table test cases are independent — execute them in any order."],
qa:[
{q:"What is decision table testing?",a:"A black-box technique that tests all combinations of conditions and their corresponding actions using a structured table. Each column in the table represents one unique test case."},
{q:"How many test cases does a decision table with 3 binary conditions produce?",a:"2³ = 8 test cases (columns). Each represents a unique combination of true/false values for the 3 conditions."},
{q:"When is decision table testing most appropriate?",a:"When the system has complex business rules with multiple conditions — insurance premium calculations, discount eligibility, access control rules with multiple factors."},
{q:"What is 'collapsed decision table'?",a:"When multiple columns produce the same action (outcome), they can be merged into one column using a don't-care symbol (—) for the irrelevant condition. This reduces the number of test cases while maintaining coverage."},
{q:"What is the difference between decision table testing and state transition testing?",a:"Decision tables test all condition combinations at one point in time. State transition testing tests how the system moves between different states over time in response to events/inputs."},
{q:"What are the rows in a decision table?",a:"Rows represent: (1) Conditions — the inputs or rules (T/F), and (2) Actions/Outcomes — what the system does for each combination. Conditions are listed first, then actions below a dividing line."}
]},

{id:3,code:"S13",title:"State Transition Testing",phase:"b",
overview:`<strong>State Transition Testing</strong> is a black-box technique for testing systems that exhibit different behaviors depending on their current <em>state</em> — and that change state in response to events or inputs.<br><br>
<strong>What:</strong> Testing all valid state changes and invalid state transitions.<br>
<strong>Why:</strong> Many systems have state-dependent behavior — ATMs, login systems, order workflows. Missing an invalid transition = security bug.<br>
<strong>When:</strong> Any system with defined states: login sessions, order management, traffic lights, ATM flows.<br>
<strong>How:</strong> Draw a state diagram → create a state table → write test cases for every transition.`,
oneliners:[
"State transition testing verifies that a system transitions correctly between states in response to events.",
"A state diagram shows all possible states, events that trigger transitions, and resulting actions.",
"State transition testing must cover both valid transitions (allowed) and invalid transitions (must be blocked).",
"A state table lists every state, every event, and the resulting next state — it is derived from the state diagram.",
"Order management systems, login sessions, and ATM flows are perfect candidates for state transition testing.",
"N-switch coverage means testing sequences of N consecutive transitions — 0-switch covers all states, 1-switch all transitions."
],

bp:["Always draw the state diagram before creating the state table — visual mapping reveals missing transitions.","Test both valid transitions AND invalid transitions — invalid transitions must be blocked.","Aim for 0-switch coverage at minimum: all states visited at least once.","1-switch coverage tests all individual transitions — this is the industry standard.","2-switch coverage tests all pairs of consecutive transitions — required for critical systems.","Identify the final/terminal states — tests must verify the system cannot transition out of them.","Review the state diagram with developers and BAs — many state diagrams have undocumented transitions.","Test the 'impossible' transitions — attempting to jump states should be explicitly blocked."],
qa:[
{q:"What is state transition testing?",a:"A black-box technique that tests systems with state-dependent behavior. It verifies that the system transitions correctly between states in response to events, and blocks invalid transitions."},
{q:"What are the components of a state diagram?",a:"States (circles/rounded boxes), Events/Triggers (arrow labels), Transitions (arrows between states), Actions (what happens during transition), and Initial/Final states."},
{q:"What is 0-switch, 1-switch, and 2-switch coverage?",a:"0-switch: all states visited at least once. 1-switch: all valid transitions tested (every arrow in the diagram). 2-switch: all pairs of consecutive transitions tested. Coverage increases with N."},
{q:"What is an invalid transition test?",a:"Testing that the system correctly blocks a transition that should not be allowed. Example: testing that a 'Logged out' user cannot directly jump to 'Logged in' without credentials."},
{q:"Give a real-world example of state transition testing.",a:"ATM: States = Idle, Card inserted, PIN entered, Transaction, Dispensing cash, Card ejected. Events = Insert card, enter PIN, select transaction, press confirm, eject card."},
{q:"What is a state table and how is it different from a state diagram?",a:"A state diagram is visual — shows states as shapes and transitions as arrows. A state table is tabular — rows are current states, columns are events, cells are next states. Both convey the same information."}
]},

{id:4,code:"S14",title:"Use Case Testing",phase:"b",
overview:`<strong>Use Case Testing</strong> derives test cases from <em>use cases</em> — descriptions of how actors (users or systems) interact with the software to achieve a goal. It tests complete end-to-end user journeys.<br><br>
<strong>What:</strong> Testing the main flow, alternate flows, and exception flows of each use case.<br>
<strong>Why:</strong> Ensures real user scenarios work end-to-end — not just individual functions in isolation.<br>
<strong>When:</strong> When use cases or user stories are available as requirements.<br>
<strong>How:</strong> Identify main success path → alternate paths → exception paths → write one TC per path.`,
oneliners:[
"Use case testing validates entire user journeys — from initial trigger to final outcome — not just individual functions.",
"Every use case has a main flow (happy path), alternate flows (variations), and exception flows (error conditions).",
"Use case testing is integration-level testing — it tests how multiple components work together for a user goal.",
"A use case test case covers one complete path through the use case — main, alternate, or exception.",
"Use case testing is derived from UML use case diagrams or Agile user stories.",
"Use case testing catches integration defects that unit testing and component testing miss entirely."
],

svg2:`<svg width="100%" viewBox="0 0 680 180" role="img"><title>Use case test case structure</title><desc>Structure of a use case test case</desc>
<g class="c-purple"><rect x="20" y="20" width="640" height="140" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="50" text-anchor="middle" dominant-baseline="central">Use case test case structure</text>
<text class="ts" x="50" y="80" text-anchor="start">Actor: Registered user</text>
<text class="ts" x="50" y="100" text-anchor="start">Precondition: User is logged in, cart has at least 1 item</text>

</g></svg>`,
bp:["Map one test case to each unique path: one for main flow, one per alternate flow, one per exception flow.","Always test the exception flows — 'payment declined', 'session expired mid-checkout' are critical paths.","Include pre-conditions clearly — use case tests depend on system state.","Trace each use case test back to the original use case number for RTM compliance.","Test each actor role separately — admin checkout and guest checkout are different use cases.","Include negative use case tests: unauthorised users attempting privileged actions.","Use case tests are integration tests — ensure test environment has all integrated components available.","Review use case diagrams with UX/BA team — many alternate flows are undocumented."],
qa:[
{q:"What is use case testing?",a:"A black-box technique that derives test cases from use cases — descriptions of actor-system interactions to achieve a goal. Tests the main flow, alternate flows, and exception flows of each use case."},
{q:"What is the difference between main flow and alternate flow?",a:"Main flow (basic path) is the successful, expected journey. Alternate flow is a valid variation (guest checkout, promo code). Exception flow is an error condition (payment failed, session expired)."},
{q:"What is the relationship between use case testing and integration testing?",a:"Use case testing is integration-level — it tests how multiple components work together end-to-end for a user goal, catching defects that unit testing cannot."},
{q:"How do you derive test cases from user stories in Agile?",a:"Each acceptance criterion in a user story becomes a test case. The 'Given-When-Then' format maps directly: Given (precondition) → When (action) → Then (expected result)."},
{q:"What is an actor in use case testing?",a:"An actor is any entity that interacts with the system — a human user (admin, guest, customer), another system (payment gateway, email service), or an automated timer/scheduler."},
{q:"How many test cases does one use case typically generate?",a:"At minimum: 1 for main flow + 1 per alternate flow + 1 per exception flow. A checkout use case might generate 8-15 test cases depending on the number of alternate and exception paths."}
]},

{id:5,code:"S15",title:"Statement Coverage",phase:"g",
overview:`<strong>Statement Coverage</strong> is a white-box testing technique that measures the percentage of <em>executable statements</em> in the code that have been executed at least once by test cases.<br><br>
<strong>What:</strong> Ensuring every line/statement of code runs at least once.<br>
<strong>Why:</strong> Dead code (never-executed statements) often contains latent bugs.<br>
<strong>When:</strong> During unit testing and component testing where source code is accessible.<br>
<strong>Formula:</strong> (Statements executed / Total statements) × 100<br>
<strong>Target:</strong> 100% statement coverage — all code lines must be executed.`,
oneliners:[
"Statement coverage measures what percentage of code statements have been executed by test cases.",
"100% statement coverage means every line of code has run at least once — but it does NOT mean all branches are tested.",
"Statement coverage is the weakest white-box coverage metric — it is necessary but not sufficient.",
"A statement that is never executed may contain a bug that will never be caught — dead code is dangerous.",
"Formula: Statement Coverage = (Number of statements executed / Total statements) × 100%",
"Statement coverage is the entry-level white-box metric — branches, conditions, and paths are stronger metrics."
],

svg2:`<svg width="100%" viewBox="0 0 680 180" role="img"><title>Statement coverage strengths and weaknesses</title><desc>Pros and cons of statement coverage</desc>
<g class="c-teal"><rect x="20" y="20" width="300" height="140" rx="8" stroke-width="0.5"/>
<text class="th" x="170" y="50" text-anchor="middle" dominant-baseline="central">Strengths</text>
<text class="ts" x="170" y="80" text-anchor="middle" dominant-baseline="central">Easy to understand and measure</text>
<text class="ts" x="170" y="100" text-anchor="middle" dominant-baseline="central">Detects dead code immediately</text>
<text class="ts" x="170" y="120" text-anchor="middle" dominant-baseline="central">Good starting point for any project</text>
<text class="ts" x="170" y="140" text-anchor="middle" dominant-baseline="central">Required for basic code audit</text>
</g>
<g class="c-coral"><rect x="360" y="20" width="300" height="140" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="50" text-anchor="middle" dominant-baseline="central">Weaknesses</text>
<text class="ts" x="510" y="80" text-anchor="middle" dominant-baseline="central">Does NOT test all branches</text>
<text class="ts" x="510" y="100" text-anchor="middle" dominant-baseline="central">Misses false-branch conditions</text>
<text class="ts" x="510" y="120" text-anchor="middle" dominant-baseline="central">Cannot detect all logical errors</text>
<text class="ts" x="510" y="140" text-anchor="middle" dominant-baseline="central">Weakest white-box metric</text>
</g></svg>`,
bp:["Aim for 100% statement coverage — any uncovered statement is a potential untested bug.","Use code coverage tools: Istanbul (JS), JaCoCo (Java), Coverage.py (Python) to measure automatically.","Statement coverage alone is not enough — always combine with branch/decision coverage.","Uncovered statements often indicate dead code or missing test scenarios — investigate each one.","Include statement coverage reports in your CI/CD pipeline — fail the build below threshold (e.g., 80%).","Statement coverage does not verify correctness — a test that executes a statement but checks nothing is useless.","When a statement is impossible to cover, document why — it may need to be removed from the code.","Statement coverage is the prerequisite for higher coverage metrics — achieve it first, then aim higher."],
qa:[
{q:"What is statement coverage?",a:"A white-box metric measuring what percentage of executable code statements have been executed by test cases. Formula: (Statements executed / Total statements) × 100%."},
{q:"If statement coverage is 100%, does it mean all bugs are found?",a:"No. 100% statement coverage means every line ran at least once, but it does NOT test all branches (true/false conditions), all paths, or all input combinations. It is necessary but not sufficient."},
{q:"What is dead code and why is it a risk?",a:"Dead code is code that can never be reached/executed. It is a risk because it may contain latent bugs, cause confusion, and increase maintenance costs. Statement coverage reveals it immediately."},
{q:"Name three code coverage tools used in industry.",a:"Istanbul/nyc (JavaScript/Node.js), JaCoCo (Java), Coverage.py (Python), Cobertura (Java/.NET), gcov (C/C++), Clover (Java)."},
{q:"What is the minimum acceptable statement coverage in most projects?",a:"Industry standard: 80% minimum for most applications. For safety-critical systems (medical, aviation), 100% statement coverage is mandatory. Enterprise projects typically target 85-90%."},
{q:"What is the difference between statement coverage and line coverage?",a:"They are nearly identical. Statement coverage counts each executable statement. Line coverage counts code lines. A single line may contain multiple statements (e.g., chained calls) — statement coverage is more precise."}
]},

{id:6,code:"S16",title:"Decision Coverage",phase:"g",
overview:`<strong>Decision Coverage</strong> (also called Branch Coverage) is a white-box technique that ensures every <em>decision point</em> (if/else, switch, loop) in the code has been evaluated to both <strong>TRUE</strong> and <strong>FALSE</strong> at least once.<br><br>
<strong>What:</strong> Every branch (true and false) of every decision must be executed.<br>
<strong>Why:</strong> Statement coverage can miss the false branch of an if statement. Decision coverage guarantees both branches run.<br>
<strong>Formula:</strong> (Decision outcomes exercised / Total decision outcomes) × 100<br>
<strong>Strength:</strong> Stronger than statement coverage — 100% decision coverage implies 100% statement coverage.`,
oneliners:[
"Decision coverage ensures every if/else branch (both true AND false outcomes) is tested at least once.",
"100% decision coverage automatically guarantees 100% statement coverage — not vice versa.",
"Decision coverage catches bugs in the false branch that statement coverage completely misses.",
"Formula: Decision Coverage = (Decision outcomes covered / Total decision outcomes) × 100%",
"An 'if' with no 'else' still has a false branch — when the condition is false, the if block is skipped.",
"Decision coverage is the most commonly required white-box metric in industry — it is the practical standard."
],
svg1:`<svg width="100%" viewBox="0 0 680 310" role="img"><title>Decision coverage diagram</title><desc>Flowchart showing true and false branches that must both be covered</desc>
<defs><marker id="ar5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="th" x="340" y="26" text-anchor="middle" dominant-baseline="central">Decision coverage: age eligibility check</text>

<line x1="230" y1="145" x2="120" y2="210" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#ar5)"/>
<text class="ts" x="155" y="185" text-anchor="middle" fill="#0F6E56">TRUE</text>
<line x1="450" y1="145" x2="560" y2="210" stroke="#993C1D" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#ar5)"/>

<g class="c-teal"><rect x="30" y="210" width="180" height="50" rx="8" stroke-width="0.5"/><text class="th" x="120" y="230" text-anchor="middle" dominant-baseline="central">Grant access</text><text class="ts" x="120" y="248" text-anchor="middle" dominant-baseline="central">TC: age = 25</text></g>
<g class="c-coral"><rect x="470" y="210" width="180" height="50" rx="8" stroke-width="0.5"/><text class="th" x="560" y="230" text-anchor="middle" dominant-baseline="central">Deny access</text><text class="ts" x="560" y="248" text-anchor="middle" dominant-baseline="central">TC: age = 15</text></g>
<text class="ts" x="340" y="290" text-anchor="middle">2 test cases cover both branches = 100% decision coverage</text></svg>`,
svg2:`<svg width="100%" viewBox="0 0 680 180" role="img"><title>Statement vs decision coverage comparison</title><desc>Why decision coverage is stronger than statement coverage</desc>
<g class="c-amber"><rect x="20" y="20" width="300" height="140" rx="8" stroke-width="0.5"/>
<text class="th" x="170" y="50" text-anchor="middle" dominant-baseline="central">Statement coverage only</text>
<text class="ts" x="170" y="78" text-anchor="middle" dominant-baseline="central">if (age &gt;= 18) { grantAccess(); }</text>
<text class="ts" x="170" y="100" text-anchor="middle" dominant-baseline="central">Test: age=25 → executes line</text>
<text class="ts" x="170" y="122" text-anchor="middle" dominant-baseline="central">Coverage = 100%</text>
<text class="ts" x="170" y="144" text-anchor="middle" dominant-baseline="central">BUT false branch NEVER tested!</text>
</g>
<g class="c-teal"><rect x="360" y="20" width="300" height="140" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="50" text-anchor="middle" dominant-baseline="central">Decision coverage</text>
<text class="ts" x="510" y="78" text-anchor="middle" dominant-baseline="central">Test 1: age=25 → TRUE branch</text>
<text class="ts" x="510" y="100" text-anchor="middle" dominant-baseline="central">Test 2: age=15 → FALSE branch</text>
<text class="ts" x="510" y="122" text-anchor="middle" dominant-baseline="central">Both outcomes exercised</text>
<text class="ts" x="510" y="144" text-anchor="middle" dominant-baseline="central">Stronger: finds false-branch bugs</text>
</g></svg>`,
bp:["Every if/else, switch case, and loop condition must have both TRUE and FALSE test cases.","An if without an else still has a false branch — when the condition is false, the block is skipped.","100% decision coverage implies 100% statement coverage — but the reverse is NOT true.","Use decision coverage as the minimum white-box target for all production code.","Include loop boundary tests: loop executes zero times (false) and at least once (true).","Switch statements: each case is a branch — write a test case for every case including default.","Review uncovered branches after running coverage tools — each may indicate a missing test scenario.","In CI/CD pipelines, enforce 100% decision coverage as a quality gate for critical modules."],
qa:[
{q:"What is decision coverage and how is it different from statement coverage?",a:"Decision coverage tests both TRUE and FALSE outcomes of every decision point. Statement coverage only requires each statement to execute once. Decision coverage is stronger — it can find false-branch bugs that statement coverage misses."},
{q:"Does 100% decision coverage guarantee 100% statement coverage?",a:"Yes. If both branches of every decision are covered, every statement will be executed. But 100% statement coverage does NOT guarantee decision coverage."},
{q:"What is a branch in the context of decision coverage?",a:"A branch is one outcome of a decision point — either the TRUE path or the FALSE path. An if-else has 2 branches. A switch with 5 cases has 5+ branches. Each must be tested."},
{q:"How many test cases does a function with 3 if-else statements need for 100% decision coverage?",a:"Each if-else has 2 branches. 3 if-else statements = 6 branch outcomes minimum. However, some test cases may cover multiple branches — typically 2-4 well-designed TCs achieve 100%."},
{q:"What tools measure decision/branch coverage?",a:"Istanbul/nyc for JavaScript, JaCoCo for Java, Coverage.py for Python, gcov for C/C++, Clover for Java. Most modern IDEs also have built-in coverage displays."},
{q:"Is decision coverage always sufficient for safety-critical systems?",a:"No. Safety-critical systems (medical devices, aviation, automotive) require Condition Coverage or Modified Condition/Decision Coverage (MC/DC) — which is stronger than decision coverage."}
]},

{id:7,code:"S17",title:"Condition Coverage",phase:"g",
overview:`<strong>Condition Coverage</strong> ensures that every <em>individual boolean sub-expression</em> within a compound condition has been evaluated to both TRUE and FALSE independently.<br><br>
<strong>What:</strong> Each condition (sub-expression) in a compound decision must independently take both TRUE and FALSE values.<br>
<strong>Why:</strong> A compound condition like <code>if (A && B)</code> can have decision coverage with only 2 tests, but condition coverage requires testing A=T/F independently of B=T/F.<br>
<strong>Stronger than:</strong> Decision coverage — but can still miss some compound outcomes.<br>
<strong>Strongest form:</strong> MC/DC (Modified Condition/Decision Coverage) used in safety-critical systems.`,
oneliners:[
"Condition coverage tests every individual boolean sub-expression independently — both TRUE and FALSE outcomes.",
"For 'if (A && B)', condition coverage requires: A is true, A is false, B is true, B is false — independently.",
"Condition coverage is stronger than decision coverage but does not guarantee decision coverage by itself.",
"MC/DC (Modified Condition/Decision Coverage) is the strongest form — required in aviation (DO-178C standard).",
"Condition coverage catches bugs in individual sub-conditions that decision coverage masks.",
"A compound condition with 3 sub-conditions needs at least 6 test cases for full condition coverage."
],

svg2:`<svg width="100%" viewBox="0 0 680 180" role="img"><title>Coverage hierarchy</title><desc>Hierarchy from weakest to strongest white-box coverage</desc>
<defs><marker id="ar6" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-gray"><rect x="20" y="60" width="130" height="50" rx="8" stroke-width="0.5"/><text class="th" x="85" y="80" text-anchor="middle" dominant-baseline="central">Statement</text><text class="ts" x="85" y="98" text-anchor="middle" dominant-baseline="central">Weakest</text></g>
<line x1="150" y1="85" x2="185" y2="85" stroke="var(--color-text-tertiary)" stroke-width="0.5" marker-end="url(#ar6)"/>
<g class="c-purple"><rect x="185" y="60" width="130" height="50" rx="8" stroke-width="0.5"/><text class="th" x="250" y="80" text-anchor="middle" dominant-baseline="central">Decision</text><text class="ts" x="250" y="98" text-anchor="middle" dominant-baseline="central">Industry std.</text></g>
<line x1="315" y1="85" x2="350" y2="85" stroke="var(--color-text-tertiary)" stroke-width="0.5" marker-end="url(#ar6)"/>
<g class="c-teal"><rect x="350" y="60" width="130" height="50" rx="8" stroke-width="0.5"/><text class="th" x="415" y="80" text-anchor="middle" dominant-baseline="central">Condition</text><text class="ts" x="415" y="98" text-anchor="middle" dominant-baseline="central">Stronger</text></g>
<line x1="480" y1="85" x2="515" y2="85" stroke="var(--color-text-tertiary)" stroke-width="0.5" marker-end="url(#ar6)"/>
<g class="c-amber"><rect x="515" y="60" width="145" height="50" rx="8" stroke-width="0.5"/><text class="th" x="587" y="80" text-anchor="middle" dominant-baseline="central">MC/DC</text><text class="ts" x="587" y="98" text-anchor="middle" dominant-baseline="central">Aviation / safety</text></g>
<text class="ts" x="340" y="148" text-anchor="middle">Path coverage is theoretically strongest but infeasible for complex code (exponential paths)</text>
<text class="ts" x="340" y="168" text-anchor="middle">MC/DC is the practical strongest standard — required by DO-178C (aviation software)</text></svg>`,
bp:["For condition coverage, identify every sub-expression in compound conditions and test each independently.","Condition coverage does NOT imply decision coverage — a compound condition may still not test both decision outcomes.","Use Multiple Condition Coverage (all combinations of sub-conditions) for the highest confidence.","MC/DC (Modified Condition/Decision Coverage) is the industry gold standard for safety-critical software.","For each compound condition with N sub-conditions, MC/DC requires N+1 test cases minimum.","Document which sub-conditions are covered by each test case in a coverage matrix.","Use static analysis tools to identify compound conditions that need condition coverage.","In regulated projects (medical, avionics), condition coverage level must be stated in the test plan."],
qa:[
{q:"What is condition coverage?",a:"A white-box technique where every individual boolean sub-expression (condition) within compound decisions must evaluate to both TRUE and FALSE independently."},
{q:"What is the difference between decision coverage and condition coverage?",a:"Decision coverage tests the overall outcome (T/F) of each decision. Condition coverage tests each sub-condition independently. For 'if (A && B)', decision coverage needs 2 tests; condition coverage needs at least 3."},
{q:"What is MC/DC coverage?",a:"Modified Condition/Decision Coverage — each condition independently affects the overall decision outcome. Required by DO-178C for aviation software (Level A). It is the strongest practical coverage criterion."},
{q:"For 'if (A || B || C)', how many test cases are needed for condition coverage?",a:"Each condition (A, B, C) must be TRUE and FALSE independently. Minimum 3-4 carefully designed test cases — but all possible combinations would be 2³ = 8."},
{q:"Does 100% condition coverage guarantee 100% decision coverage?",a:"Not necessarily. You can achieve condition coverage without testing all decision outcomes in some edge cases. This is why MC/DC (which combines both) is the preferred standard."},
{q:"Where is MC/DC coverage mandated?",a:"Aviation (DO-178C Level A), automotive (ISO 26262), nuclear, and medical device (IEC 62304) software standards mandate MC/DC for the highest safety integrity levels."}
]},

{id:8,code:"S18",title:"Path Coverage",phase:"g",
overview:`<strong>Path Coverage</strong> is the strongest white-box technique — it requires that every possible <em>independent path</em> through the code is executed at least once. This includes every combination of branches from entry to exit.<br><br>
<strong>What:</strong> Every unique execution path through a function is tested.<br>
<strong>Why:</strong> Maximum defect detection — no execution path is left untested.<br>
<strong>Challenge:</strong> For complex code, the number of paths grows exponentially — 10 decisions = 1024 paths. Practically infeasible for large modules.<br>
<strong>Practical alternative:</strong> Basis Path Testing (McCabe's Cyclomatic Complexity) — tests the minimum set of independent paths.`,
oneliners:[
"Path coverage requires every unique execution path from function entry to exit to be tested at least once.",
"Path coverage is the strongest but most expensive white-box technique — paths grow exponentially with branches.",
"Cyclomatic Complexity (CC) = number of linearly independent paths — it tells you the minimum test cases needed.",
"Formula: CC = E - N + 2P where E=edges, N=nodes, P=connected components (usually 1).",
"Basis Path Testing uses cyclomatic complexity to define the minimum set of paths that achieve full branch coverage.",
"In practice, 100% path coverage is only feasible for small functions — basis path testing is the industry compromise."
],
svg1:`<svg width="100%" viewBox="0 0 680 300" role="img"><title>Path coverage flow diagram</title><desc>Control flow graph showing multiple paths through a function</desc>

<text class="ts" x="340" y="295" text-anchor="middle">Path 1: T→T, Path 2: T→F, Path 3: F. CC=3 → minimum 3 independent path tests</text></svg>`,
svg2:`<svg width="100%" viewBox="0 0 680 180" role="img"><title>Cyclomatic complexity formula</title><desc>Formula and coverage comparison for path coverage</desc>
<g class="c-purple"><rect x="20" y="20" width="300" height="140" rx="8" stroke-width="0.5"/>
<text class="th" x="170" y="50" text-anchor="middle" dominant-baseline="central">Cyclomatic complexity</text>
<text class="ts" x="170" y="80" text-anchor="middle" dominant-baseline="central">CC = E − N + 2</text>
<text class="ts" x="170" y="100" text-anchor="middle" dominant-baseline="central">E = edges (arrows)</text>
<text class="ts" x="170" y="120" text-anchor="middle" dominant-baseline="central">N = nodes (statements)</text>
<text class="ts" x="170" y="140" text-anchor="middle" dominant-baseline="central">Result = min. test cases needed</text>
</g>
<g class="c-amber"><rect x="360" y="20" width="300" height="140" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="50" text-anchor="middle" dominant-baseline="central">CC interpretation</text>
<text class="ts" x="510" y="78" text-anchor="middle" dominant-baseline="central">1–10: Simple, low risk</text>
<text class="ts" x="510" y="100" text-anchor="middle" dominant-baseline="central">11–20: Moderate, needs review</text>
<text class="ts" x="510" y="122" text-anchor="middle" dominant-baseline="central">21–50: Complex, refactor</text>
<text class="ts" x="510" y="144" text-anchor="middle" dominant-baseline="central">50+: Untestable, redesign</text>
</g></svg>`,
bp:["Calculate Cyclomatic Complexity before writing test cases — it tells you the minimum number of test cases needed.","Target basis path testing (CC paths) as the minimum — exhaustive path coverage is usually infeasible.","If CC > 10, refactor the function before testing — complexity is the enemy of testability.","Document the control flow graph (CFG) for complex functions to visualize all paths.","Basis path testing guarantees decision coverage — it is a practical minimum standard for unit testing.","Each independent path in basis path testing exercises at least one unique statement not covered by others.","Path coverage tools: PATHfinder, McCabe IQ, Understand (SciTools) visualize and count paths.","For loops: test zero iterations (loop not entered), one iteration, and typical/maximum iterations."],
qa:[
{q:"What is path coverage?",a:"A white-box technique requiring every distinct execution path from entry to exit of a function to be tested. It is the strongest coverage criterion but grows exponentially with the number of decisions."},
{q:"What is Cyclomatic Complexity and how is it used in testing?",a:"CC = E - N + 2 (edges minus nodes plus 2). It equals the number of linearly independent paths. CC tells you the minimum number of test cases needed for basis path testing."},
{q:"Why is 100% path coverage usually impractical?",a:"For a function with N decisions, there are up to 2^N paths. With 10 decisions = 1024 paths. With loops, paths can be infinite. Basis path testing (CC paths) is the practical compromise."},
{q:"What is basis path testing?",a:"A structured form of path testing that uses Cyclomatic Complexity to identify the minimum set of independent paths that cover all branches. Developed by Thomas McCabe."},
{q:"What Cyclomatic Complexity value indicates a function needs refactoring?",a:"CC > 10 is a warning sign. CC > 20 is generally considered too complex for reliable testing. Most coding standards limit CC to 10-15 per function."},
{q:"How does path coverage relate to decision and condition coverage?",a:"Path coverage subsumes decision and condition coverage — 100% path coverage implies 100% decision and statement coverage. But path coverage is the strongest and most expensive to achieve."}
]},

{id:9,code:"S19",title:"Error Guessing",phase:"o",
overview:`<strong>Error Guessing</strong> is an experience-based test design technique where the tester uses their <em>knowledge, intuition, and past experience</em> to identify and test likely error-prone areas without following a formal method.<br><br>
<strong>What:</strong> Guessing where defects are likely to be based on experience.<br>
<strong>Why:</strong> Systematic techniques miss 'obvious' bugs that experienced testers know intuitively.<br>
<strong>When:</strong> Used as a supplement to formal techniques — especially for exploratory sessions and sanity checks.<br>
<strong>How:</strong> Create an 'error list' of common developer mistakes, then write test cases targeting each.`,
oneliners:[

"Error guessing is NOT random testing — it is structured intuition based on defect history and common mistakes.",
"A fault attack model formalises error guessing by maintaining an organisation-wide list of common error types.",
"Error guessing catches the 'obvious' bugs that formal techniques sometimes overlook.",
"Senior testers are valuable specifically because of their error guessing ability — it is experience made systematic."
],

bp:["Maintain a 'common error list' as a team resource — update it after every project retrospective.","Always test NULL/empty inputs for every mandatory and optional field.","Test double-click on submit buttons — a common concurrency bug in web applications.","Test browser back button after completing a transaction — state management bugs are common here.","Test copy-paste of data that includes hidden characters or formatting.","Test with maximum data volume — performance boundaries are a common defect area.","Error guessing is NOT a replacement for formal techniques — use it as a supplement.","Combine error guessing with exploratory testing — they are natural partners."],

{q:"What is error guessing?",a:"An experience-based technique where testers use intuition and past defect knowledge to identify likely bug-prone areas and write targeted test cases without a formal methodology."},
{q:"Is error guessing the same as random testing?",a:"No. Error guessing is structured intuition — based on defect history, common developer mistakes, and known problem areas. Random testing has no structure or experience base."},

{id:10,code:"S20",title:"Exploratory Testing",phase:"o",
overview:`<strong>Exploratory Testing</strong> is a simultaneous learning, test design, and test execution process where the tester <em>freely explores the application</em> guided by intuition, curiosity, and real-time learning — without pre-written test cases.<br><br>
<strong>What:</strong> Unscripted, adaptive testing where the tester designs and executes tests in real-time.<br>
<strong>Why:</strong> Scripted tests only find what you anticipated. Exploratory testing finds what you did NOT anticipate.<br>
<strong>When:</strong> New feature discovery, end-of-sprint sanity, new build smoke testing, complex UX flows.<br>
<strong>How:</strong> Time-boxed sessions (30-90 min) using test charters — structured freedom.`,
oneliners:[
"Exploratory testing is simultaneous learning, design, and execution — the tester's mind is the test case.",
"A test charter guides exploratory sessions: 'Explore [feature] with [data/tools] to discover [risks]'.",
"Exploratory testing finds defects that scripted testing misses — because it follows the bug, not the script.",
"Session-Based Test Management (SBTM) structures exploratory testing into time-boxed, chartered sessions.",
"Exploratory testing is NOT unstructured or random — it is structured freedom with accountability.",
"Documented session notes and bug reports are the deliverables of every exploratory testing session."
],

bp:["Always write a charter before each exploratory session — 'free exploration' without a charter is just playing.","Time-box sessions to 45-90 minutes — beyond that, focus drops and defect detection rate falls.","Take real-time notes during the session — don't rely on memory, bugs get forgotten.","Log session output in a session sheet: charter, area tested, bugs found, time spent, open risks.","Pair exploratory testing — two testers find more bugs than two separate testers working alone.","Use test heuristics (SFDPOT, CRUD, HICCUPPS) as structured prompts during exploration.","Debrief after each session: share findings with the team and update the test coverage map.","Exploratory testing is most effective when the tester has deep domain knowledge of the application."],

{q:"What is exploratory testing?",a:"An approach where learning, test design, and test execution happen simultaneously. The tester explores the application in real time, adapting their tests based on what they observe."},
{q:"What is a test charter in exploratory testing?",a:"A mission statement for an exploratory session: 'Explore [feature/area] with [tools/data/conditions] to discover [risks/issues]'. It provides direction without over-constraining the tester."},
{q:"What is Session-Based Test Management (SBTM)?",a:"A structured approach to exploratory testing that organises work into time-boxed sessions with charters, session notes, and debriefs. It makes exploratory testing accountable and measurable."},
{q:"What is the difference between exploratory and ad-hoc testing?",a:"Exploratory testing is structured — it uses charters, time-boxes, session notes, and debriefs. Ad-hoc testing is completely unstructured with no plan or documentation. Exploratory is far superior."},
{q:"What are SFDPOT test heuristics?",a:"Structure, Function, Data, Platform, Operations, Time — a checklist of areas to explore during an exploratory session. It helps testers systematically cover different risk dimensions."},
{q:"When should exploratory testing be used in a project?",a:"1) New feature discovery before formal test cases are written. 2) End-of-sprint sanity on new builds. 3) After a defect cluster is found — explore that area further. 4) When time is short and scripted testing isn't feasible."}
]}

let cur=0;const vis=new Set([0]);

function renderDots(){
  const c=document.getElementById('pdots');c.innerHTML='';
  S.forEach((_,i)=>{
    const d=document.createElement('span');
    d.className='pdot '+(i===cur?'active':vis.has(i)?'done':'todo');
    d.title='S'+(i+10)+': '+S[i].title;
    d.onclick=()=>goTo(i);c.appendChild(d);
  });
  document.getElementById('plabel').textContent='Session '+(cur+10)+' of 20';
}

function goTo(i){
  cur=i;vis.add(i);
  document.querySelectorAll('.tb').forEach((b,j)=>b.classList.toggle('active',j===i));
  document.querySelectorAll('.sess').forEach((s,j)=>s.classList.toggle('active',j===i));
  renderDots();
}

function nextTab(){if(cur<S.length-1)goTo(cur+1);}

const tabbar=document.getElementById('tabbar');
const scont=document.getElementById('scont');

S.forEach((s,i)=>{
  const btn=document.createElement('button');
  btn.className='tb'+(i===0?' active':'');
  const bc=s.phase==='b'?'bd-b':s.phase==='g'?'bd-g':'bd-o';
  btn.innerHTML=`<span class="badge ${bc}">${s.code}</span>${s.title}`;
  btn.onclick=()=>goTo(i);
  tabbar.appendChild(btn);

  const div=document.createElement('div');
  div.className='sess'+(i===0?' active':'');
  const pc=s.phase==='b'?'bd-b':s.phase==='g'?'bd-g':'bd-o';
  div.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <span class="badge ${pc}">${s.code}</span>
      <span style="font-size:16px;font-weight:500">${s.title}</span>
    </div>
    <div class="stitle">Overview — What / Why / When / How</div>
    <div class="dbox">${s.overview}</div>
    <div class="stitle">Interview one-liners (say these with confidence)</div>

    <div class="stitle">Architecture / Visual Diagrams</div>
    <div class="dg">${s.svg1}</div>
    <div class="dg" style="margin-top:8px">${s.svg2}</div>

    <ul class="ck">${s.bp.map(p=>'<li>'+p+'</li>').join('')}</ul>
    <div class="stitle">Interview Prep — 6 SDET Q&amp;A</div>

  `;
  scont.appendChild(div);
});

renderDots();
</script>
