def:"Priority is the urgency with which a defect should be fixed, based on business needs, release schedule, and stakeholder impact. It answers: 'How soon must this be fixed?' — not 'How badly does it break the system?'",
wwwh:[
{l:"What",t:"The business urgency assigned to fixing a defect"},
{l:"Why",t:"Not all bugs need immediate fixing — priority guides the dev team's queue"},
{l:"When",t:"Assigned at bug triage — by product owner, lead, or project manager"},
{l:"Where",t:"Bug tracker (Jira, Azure DevOps) — Priority field on every defect"},
{l:"How",t:"Based on: business impact, SLA, release date, customer visibility, legal risk"}]},
oneliners:[
"Priority is about urgency — how soon must this bug be fixed?",
"Priority is set by the business or product owner, not by the QA engineer.",
"P1 priority means fix it today — before any other development work.",
"A typo on the CEO's name on the homepage is P1 priority despite being S4 trivial severity.",
"Low priority does not mean the bug is acceptable — it means fix it later, not never."
],
concept:"Priority has four standard levels: P1 (Critical/Immediate), P2 (High), P3 (Medium), P4 (Low). P1 means fix before the next build. P2 means fix in the current sprint/cycle. P3 means fix in the next sprint. P4 means fix when time allows or in backlog. Priority is driven by business context — a bug on the payment page is higher priority than the same bug on the help page.",

practices:["Priority is set in bug triage — a scheduled meeting between QA lead, dev lead, and product owner","P1 bugs must have a resolution SLA — typically within 4–24 hours depending on org policy","Never let a P1 bug sit in 'Assigned' state for more than one business day","When setting priority, ask: what is the financial or reputational impact if this ships?","Re-triage priority when release dates change — a P3 today may become P1 before go-live","P4 bugs with no fix in 3+ sprints should be reviewed: accept as known issue or close as won't fix","Priority does not change the severity — document both accurately and independently","Track first-response time and mean time to resolve (MTTR) per priority level as QA metrics"],
qa:[
{q:"What is priority in software testing?",a:"Priority is the urgency with which a defect must be fixed, based on business need, release schedule, and customer impact. P1 = fix immediately / hotfix, P2 = fix this sprint, P3 = next sprint, P4 = backlog / when time allows."},
{q:"Who sets the priority of a defect?",a:"Priority is set by the product owner, project manager, or QA lead — based on business context. QA engineers set severity (technical impact). The product owner/manager sets priority (business urgency). Both fields are set independently."},
{q:"Give three examples of P1 priority bugs.",a:"1. 'Pay Now' button on live checkout crashes — revenue loss, P1. 2. CEO name misspelled on company homepage — brand emergency, P1 even if S4 severity. 3. GDPR consent banner missing for EU users — legal/compliance risk, P1."},
{q:"Can a P4 priority bug be S1 severity?",a:"In theory yes, but this is rare and controversial. Example: a critical crash in a retired feature that zero users access — technically Critical severity (crashes the app) but P4 priority (no business impact, feature to be removed). Teams should document the reason carefully."},
{q:"What happens if priority and severity are not tracked separately?",a:"Without separate tracking: critical severity bugs get delayed because they look low priority, trivial severity bugs get rushed because they're high priority, developers work on the wrong issues, and QA metrics are meaningless. Both fields are essential."},
{q:"What is a 'hotfix' and what priority triggers it?",a:"A hotfix is an emergency fix deployed directly to production outside the normal release cycle. Triggered by P1 bugs found in production — especially payment failures, security breaches, data loss, or compliance violations. Hotfixes bypass full regression and go through expedited testing."}
]},

{id:33,phase:"Intermediate",color:"i",
title:"Severity vs Priority — the difference with 12 examples",
overview:{
def:"Severity and priority are independent dimensions of a defect. Severity = how badly it breaks the system (technical). Priority = how urgently it must be fixed (business). They can be high/low in any combination — understanding all four combinations is essential for every QA engineer.",
wwwh:[
{l:"What",t:"Two independent bug attributes that must always be set separately"},
{l:"Why",t:"Confusing them leads to wrong triage decisions and missed releases"},
{l:"When",t:"Both assigned at time of bug reporting and reviewed at triage"},
{l:"Where",t:"Every bug report — the Severity field and the Priority field"},
{l:"How",t:"4 quadrants: High-High, High-Low, Low-High, Low-Low"}]},
oneliners:[
"High severity + low priority: a crash in a feature used by 2 users per year.",
"Low severity + high priority: a typo on the CEO homepage — embarrassing, not breaking.",
"Never assume high severity = high priority — always check the business context.",
"A QA engineer's most important skill: correctly assigning both severity AND priority.",
"The 2x2 matrix of severity vs priority is the single most tested concept in QA interviews."
],

practices:["Always set both severity AND priority on every defect — never leave either blank","Run a triage meeting for every sprint to review severity/priority assignments","Challenge any developer who tries to lower a severity rating — QA owns that field","Use example tables in your team wiki to align everyone on classification standards","In interviews: always demonstrate all four S×P combinations with concrete examples","Never mark a bug Critical severity just to get faster attention — it erodes trust","Review severity/priority at re-test: a fixed Critical bug should be verified at the same level","Include severity and priority in your sprint metrics report — track distribution over time"],
qa:[
{q:"What is the difference between severity and priority?",a:"Severity = technical impact on the system (set by QA, based on what breaks). Priority = urgency to fix based on business need (set by product owner/manager). They are independent — high severity can have low priority and vice versa."},
{q:"Give an example of High Severity + Low Priority.",a:"A crash that occurs only when a user navigates to a deprecated feature being removed in the next release. Technically Critical severity (crashes the app) but Low priority (the feature is going away, no users access it, not worth fixing now)."},
{q:"Give an example of Low Severity + High Priority.",a:"The CEO's name is spelled 'Jhon Smith' instead of 'John Smith' on the corporate homepage. Technically Trivial severity (no functional impact) but P1 priority (brand/reputational risk — visible to all visitors, must be fixed before next board meeting)."},
{q:"Give an example of High Severity + High Priority.",a:"The payment 'Confirm Order' button crashes the app on the live checkout page. Both Critical severity (crashes the app, potential data loss) and P1 priority (directly kills revenue, must be hotfixed immediately)."},
{q:"Give an example of Low Severity + Low Priority.",a:"The hover color on a dropdown in the admin user management settings page is slightly too dark. Trivial severity (cosmetic, no functional impact) and P4 priority (admin-only, few users, no business urgency — goes to backlog)."},
{q:"What happens if a QA engineer marks every bug as Critical severity?",a:"The 'cry wolf' effect: developers stop trusting the QA team's severity ratings, genuine Critical bugs get no special treatment, sprint planning becomes impossible (all bugs appear equally urgent), and the triage process breaks down. Accurate classification is a core QA professionalism standard."}
]},

{id:34,phase:"Intermediate",color:"i",
title:"Defect lifecycle — from New to Closed",
overview:{
def:"The defect lifecycle (also called the bug lifecycle) is the complete journey a defect travels from the moment it is reported until it is formally closed. Every status transition has a defined meaning, responsible party, and action required.",
wwwh:[
{l:"What",t:"The workflow a bug follows from discovery to resolution and closure"},
{l:"Why",t:"Without a defined lifecycle, bugs get lost, ignored, or closed without verification"},
{l:"When",t:"Every time a defect is logged, touched, or re-evaluated"},

practices:["Never close a bug yourself as the person who reported it — another QA must verify","Always run regression tests after retesting a fixed bug — fixes cause new breaks","Deferred bugs must have a target release version set — not indefinitely parked","Rejected bugs should have a clear reason: 'Not a defect: works as designed'","Track reopened rate as a metric: high reopen rate = low dev fix quality","Bug closure requires: retest passed + regression clean + QA sign-off","Duplicate bugs should reference the original bug ID in comments","Review all Deferred and Won't Fix bugs before each release — context may have changed"],
qa:[
{q:"What are the stages of the defect lifecycle?",a:"New (QA logs) → Assigned (lead assigns to dev) → Open (dev working) → Fixed (dev returns to QA) → Retesting (QA verifies) → Closed (verified). Alternate paths: Rejected (not a defect), Duplicate (already logged), Deferred (future release), Reopened (fix failed)."},
{q:"What is the 'Reopened' status and when is it used?",a:"Reopened means the fix provided by the developer did not solve the problem — QA has retested and the defect still occurs, or the fix introduced a new regression. The bug goes back to the developer for investigation. A high reopen rate is a dev quality metric."},
{q:"What is the difference between Deferred and Won't Fix?",a:"Deferred: the defect is real and will be fixed in a future release — it's valid but not prioritized for this sprint/release. Won't Fix: the defect is acknowledged but the team has decided it will never be fixed — due to cost, low impact, or being outside scope."},
{q:"Who has the authority to close a defect?",a:"Only QA can close a defect — after successfully retesting the fix and running regression. A developer must never close their own defect. The QA engineer who retests (ideally not the same one who logged it) performs the close."},
{q:"What should you document when closing a defect?",a:"Retest result (passed), regression test results (no new issues found), build number tested, test environment, date of verification, and QA engineer name. This creates an audit trail for quality records."},
{q:"What metrics are derived from the defect lifecycle?",a:"Defect detection rate (bugs found per sprint), reopen rate (dev fix quality), average age (time from New to Closed), mean time to resolve (MTTR per priority), defect closure rate (resolved vs total), and deferred bug carry-over rate across releases."}
]},

{q:"What should you do if a Critical severity bug is marked Won't Fix?",a:"Never allow a Critical bug to be Won't Fix without a formal risk acceptance process. The product owner or senior stakeholder must sign a risk acceptance document acknowledging the known risk, its potential impact, and the business decision to accept it. QA must retain this as evidence."},
{q:"How do you handle a bug that crashes the app in production but cannot be reproduced in the test environment?",a:"Always treat it as S1 Critical + P1 priority until proven otherwise. Production-only crashes can be caused by production data, load, or configuration — none of which excuse delayed action. Assign immediately, add detailed production logs, and escalate to the DevOps/infrastructure team to replicate conditions."},
{q:"What is SLA-driven priority escalation?",a:"When a bug's SLA (Service Level Agreement) fix deadline is approaching and it hasn't been resolved, its priority must be escalated — often from P2 to P1 — to ensure the commitment is met. QA leads and project managers should track approaching SLA windows daily in the 48 hours before deadlines."},
{q:"A developer fixes Bug A. Your retest passes, but you notice Bug B appears — caused by the fix. How do you handle this?",a:"Log Bug B as a brand new, separate defect with its own severity and priority assessment. Do NOT attach it to Bug A or mark Bug A as Reopened (the original issue was fixed). In the new Bug B report, reference Bug A as the trigger. This keeps the lifecycle clean and metrics accurate."},
{q:"Two stakeholders disagree on priority — business says P1, engineering says P3. What does QA do?",a:"QA's role is to document both positions objectively, present the impact evidence (affected users, revenue risk, SLA, legal obligation), and escalate to the product owner for final decision. QA must not unilaterally resolve the conflict but must ensure it is resolved — undecided bugs become P3 by default (biggest risk)."},
{q:"What advanced metrics should a QA lead track around severity and priority?",a:"P1 bug MTTR (mean time to resolve), reopen rate by severity, production defect escape rate (how many Critical bugs reached production), deferred bug carry-over rate, SLA breach rate (P1/P2 bugs exceeding fix windows), and severity inflation rate (are testers over-marking everything Critical?)."}
]}
];

const visited=new Set([31]);
let current=31;

function buildTabs(){
  const bar=document.getElementById("tabBar");
  SD.forEach(s=>{
    const btn=document.createElement("button");
    btn.className="tb"+(s.id===31?" active":"");
    btn.id="t"+s.id;
    btn.textContent="S"+s.id;
    btn.onclick=()=>goTo(s.id);
    bar.appendChild(btn);
  });
}

function renderSess(s){
  const pc=s.color;
  return `
<div class="sess-hdr">
  <div class="snum sn${pc}">S${s.id}</div>
  <div><div class="stitle">${s.title}</div><div class="sphase">Phase: ${s.phase}</div></div>
</div>
<div class="slabel">Overview</div>
<div class="ocard">
  <p>${s.overview.def}</p>
  <div class="wwwh">${s.overview.wwwh.map(w=>`<div class="wi"><div class="wl">${w.l}</div><div class="wt">${w.t}</div></div>`).join("")}</div>
</div>
<div class="slabel">Interview one-liners</div>
<div class="ol-list">${s.oneliners.map((o,i)=>`<div class="ol"><span class="on">${i+1}</span><span class="ot">${o}</span></div>`).join("")}</div>
<div class="slabel">Concept explanation</div>
<div class="ct">${s.concept}</div>
<div class="slabel">Diagrams & flows (3 per session)</div>
${s.diagrams.map(d=>`<div class="dbox">${d}</div>`).join("")}
<div class="slabel">Best practices checklist</div>
<div class="clist">${s.practices.map(p=>`<div class="ci"><span class="ck"><i class="ti ti-check" aria-hidden="true"></i></span><span>${p}</span></div>`).join("")}</div>
<div class="slabel">SDET interview Q&A (tap to reveal)</div>
<div class="qa-list">${s.qa.map((q,i)=>`<div class="qa-item" id="qa${s.id}x${i}">
  <div class="qa-q" onclick="tQA('qa${s.id}x${i}')">
    <span class="ql">Q${i+1}</span><span class="qt">${q.q}</span>
    <i class="ti ti-chevron-down qtog" aria-hidden="true"></i>
  </div>
  <div class="qa-ans">${q.a}</div>
</div>`).join("")}</div>
<div class="nav-row">
  <button class="nb" onclick="goTo(${s.id-1})" ${s.id===31?"disabled style='opacity:.4'":""}>← Previous</button>
  <span class="sc">Session ${s.id} of 35 (S31–S35)</span>
  <button class="nb pr" onclick="goTo(${s.id+1})" ${s.id===35?"disabled style='opacity:.4'":""}>Next →</button>
</div>`;
}

function buildSessions(){
  const cont=document.getElementById("sessions");
  SD.forEach(s=>{
    const div=document.createElement("div");
    div.className="sess"+(s.id===31?" active":"");
    div.id="ss"+s.id;
    div.innerHTML=renderSess(s);
    cont.appendChild(div);
  });
}

function goTo(id){
  if(id<31||id>35)return;
  document.getElementById("ss"+current).classList.remove("active");
  document.getElementById("t"+current).classList.remove("active");
  visited.add(id);
  current=id;
  document.getElementById("ss"+id).classList.add("active");
  document.getElementById("t"+id).classList.add("active");
  SD.forEach(s=>{if(visited.has(s.id))document.getElementById("t"+s.id).classList.add("done");});
  document.getElementById("pFill").style.width=(((current-30)/5)*100)+"%";
  window.scrollTo(0,0);
}

function tQA(id){document.getElementById(id).classList.toggle("open");}

buildTabs();
buildSessions();
</script>

    <!-- PRISM DYNAMIC HIGHLIGHT FIX -->
    <script>
    if (window.Prism) {
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new MutationObserver((mutations) => {
                let needsHighlight = false;
                mutations.forEach(m => {
                    if (m.addedNodes.length) {
                        m.addedNodes.forEach(n => {
                            if (n.nodeName === 'PRE' || n.nodeName === 'CODE') needsHighlight = true;
                            if (n.querySelector && n.querySelector('pre')) needsHighlight = true;
                        });
                    }
                });
                if (needsHighlight) {
                    Prism.highlightAll();
                }
            });
            observer.observe(document.body, { childList: true, subtree: true });
        });
    }
    </script>
