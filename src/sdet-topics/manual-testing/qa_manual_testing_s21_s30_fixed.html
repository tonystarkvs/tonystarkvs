<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --border-radius-lg:12px;
  --border-radius-md:8px;
  --color-background-primary:#ffffff;
  --color-background-secondary:#f4f4f8;
  --color-border-primary:#534AB7;
  --color-border-secondary:#d1d1db;
  --color-border-tertiary:#e4e4eb;
  --color-text-primary:#1a1a2e;
  --color-text-secondary:#555770;
  --color-text-tertiary:#8e90a6;
  --font-sans:'Segoe UI',system-ui,-apple-system,sans-serif;
}

body{font-family:var(--font-sans);background:transparent;color:var(--color-text-primary)}
.wrap{max-width:680px}
.phase-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.ph{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;letter-spacing:.4px}
.pf{background:#EEEDFE;color:#3C3489}.pi{background:#E1F5EE;color:#085041}.pa{background:#FAECE7;color:#712B13}
.tab-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.tb{font-size:12px;padding:5px 10px;border-radius:6px;border:.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;transition:all .18s;font-family:var(--font-sans);white-space:nowrap}
.tb:hover{background:var(--color-background-primary);color:var(--color-text-primary)}
.tb.active{background:var(--color-background-primary);color:var(--color-text-primary);border-color:var(--color-border-primary);font-weight:500}
.tb.done::after{content:"✓";margin-left:4px;color:#1D9E75;font-size:10px}
.prog-bar{height:4px;background:var(--color-border-tertiary);border-radius:2px;margin-bottom:16px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#534AB7,#1D9E75);border-radius:2px;transition:width .4s}
.sess{display:none}.sess.active{display:block}
.sess-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:.5px solid var(--color-border-tertiary)}
.snum{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.snf{background:#EEEDFE;color:#534AB7}.sni{background:#E1F5EE;color:#0F6E56}.sna{background:#FAECE7;color:#993C1D}
.stitle{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.sphase{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
.slabel{font-size:10px;font-weight:500;letter-spacing:.8px;color:var(--color-text-tertiary);text-transform:uppercase;margin:14px 0 7px}
.ocard{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:11px 13px;border:.5px solid var(--color-border-tertiary)}
.ocard p{font-size:13px;line-height:1.7;color:var(--color-text-primary);margin-bottom:7px}
.ocard p:last-child{margin-bottom:0}
.wwwh{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:7px}
.wi{background:var(--color-background-primary);border-radius:var(--border-radius-md);padding:7px 9px;border:.5px solid var(--color-border-tertiary)}
.wl{font-size:10px;font-weight:500;letter-spacing:.5px;color:var(--color-text-tertiary);margin-bottom:2px;text-transform:uppercase}
.wt{font-size:12px;color:var(--color-text-primary);line-height:1.4}
.ol-list{display:flex;flex-direction:column;gap:4px}
.ol{display:flex;align-items:flex-start;gap:8px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px;border:.5px solid var(--color-border-tertiary)}
.on{font-size:11px;font-weight:500;color:#534AB7;min-width:16px;margin-top:1px}
.ot{font-size:13px;color:var(--color-text-primary);line-height:1.5}
.dbox{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:10px;border:.5px solid var(--color-border-tertiary);overflow-x:auto;margin-bottom:7px}
.clist{display:flex;flex-direction:column;gap:4px}
.ci{display:flex;align-items:flex-start;gap:7px;font-size:13px;color:var(--color-text-primary);padding:6px 9px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);line-height:1.5}
.ck{color:#1D9E75;font-size:13px;flex-shrink:0;margin-top:1px}
.qa-list{display:flex;flex-direction:column;gap:5px}
.qa-item{border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden}
.qa-q{display:flex;align-items:flex-start;gap:7px;padding:8px 10px;cursor:pointer;background:var(--color-background-secondary)}
.qa-q:hover{background:var(--color-background-primary)}
.ql{font-size:11px;font-weight:500;color:#993C1D;min-width:14px;margin-top:1px}
.qt{font-size:13px;font-weight:500;color:var(--color-text-primary);flex:1;line-height:1.5}
.qtog{font-size:13px;color:var(--color-text-tertiary);transition:transform .2s}
.qa-ans{display:none;padding:8px 10px;font-size:13px;color:var(--color-text-secondary);line-height:1.6;border-top:.5px solid var(--color-border-tertiary);background:var(--color-background-primary)}
.qa-item.open .qa-ans{display:block}
.qa-item.open .qtog{transform:rotate(180deg)}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:12px;border-top:.5px solid var(--color-border-tertiary)}
.nb{font-size:13px;padding:6px 13px;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer;font-family:var(--font-sans)}
.nb:hover{background:var(--color-background-primary)}
.nb.pr{background:#534AB7;color:#fff;border-color:#534AB7}
.nb.pr:hover{background:#3C3489}
.sc{font-size:12px;color:var(--color-text-tertiary)}
.ct{font-size:13px;line-height:1.7;color:var(--color-text-primary);margin-bottom:7px}
svg text{font-family:var(--font-sans)!important}

.c-amber rect{fill:#FAEEDA;stroke:#EF9F27;stroke-width:1.5}
.c-coral rect{fill:#FAECE7;stroke:#F0997B;stroke-width:1.5}
.c-gray rect{fill:#f4f4f8;stroke:#d1d1db;stroke-width:1.5}
.c-green rect{fill:#EAF3DE;stroke:#97C459;stroke-width:1.5}
.c-purple rect{fill:#EEEDFE;stroke:#AFA9EC;stroke-width:1.5}
.c-teal rect{fill:#E1F5EE;stroke:#5DCAA5;stroke-width:1.5}
svg .th{font-weight:600;fill:var(--color-text-primary);font-family:var(--font-sans);font-size:13px}
svg .ts{font-size:11px;fill:var(--color-text-secondary);font-family:var(--font-sans)}
</style>

<div class="wrap">

qa:[
{q:"What is SDLC and what are its phases?",a:"SDLC (Software Development Life Cycle) is a structured process for developing software. Phases: Planning → Requirements → System Design → Implementation (Coding) → Testing → Deployment → Maintenance. Each phase has defined deliverables and exit criteria."},
{q:"What is the difference between Waterfall and Agile SDLC?",a:"Waterfall: sequential — each phase must finish before the next begins; best for stable requirements. Agile: iterative — work in short sprints with continuous feedback; best for evolving requirements. Agile allows QA to test every sprint; Waterfall tests at the end."},
{q:"What is the V-Model and why do testers love it?",a:"The V-Model maps each development phase to a corresponding test phase: Requirements → UAT, System Design → System Testing, Module Design → Integration Testing, Coding → Unit Testing. Testing is planned early and traces to development work — testers love the traceability."},
{q:"When does QA get involved in SDLC?",a:"QA should be involved from the Requirements phase — reviewing specs for testability and clarity. Not just at the Testing phase. Early QA involvement (shift-left) reduces defect costs dramatically."},
{q:"What is a Requirements Traceability Matrix (RTM)?",a:"An RTM is a document that links each requirement to its corresponding test cases. It ensures every requirement is tested and provides traceability from business need to test evidence. Used in audits and during test sign-off."},
{q:"What SDLC model is best for a safety-critical system?",a:"The V-Model is preferred for safety-critical systems (medical devices, aviation, automotive — ISO 26262, DO-178C standards) because of its rigorous phase gates, verification at each level, and full traceability from requirements to test evidence."}
]},

practices:["Always produce a formal Test Plan before execution begins — no plan = no accountability","Define entry criteria for test execution: build deployed, smoke test passed, test data ready","Write test cases from requirements — every requirement needs at least one test case","Set clear exit criteria: 95% execution, 0 critical open bugs, defect density below threshold","The test closure report must include: defect metrics, coverage, lessons learned","In Agile: STLC phases run within each sprint — compressed but still present","Review test cases before execution — peer review catches bad test logic early","Track STLC metrics: test execution rate, pass/fail ratio, defect detection efficiency"],
qa:[
{q:"What is STLC and how does it differ from SDLC?",a:"STLC (Software Testing Life Cycle) is the sequence of activities performed specifically for testing. SDLC covers the full development process. STLC is a subset of SDLC that runs within the testing phase (and overlaps other phases in Agile)."},
{q:"What are the 6 phases of STLC?",a:"1. Requirements Analysis (study requirements, RTM), 2. Test Planning (strategy, scope, resources), 3. Test Case Design (write cases, prepare data), 4. Environment Setup (configure infra), 5. Test Execution (run cases, log bugs), 6. Test Closure (metrics, report, lessons)."},
{q:"What are entry and exit criteria in STLC?",a:"Entry criteria: conditions that must be true before a phase begins (e.g., requirements signed off before test planning starts). Exit criteria: conditions that must be met to move to the next phase (e.g., 95% test cases executed, 0 P1 bugs before closure)."},
{q:"What is a test plan and what does it contain?",a:"A test plan is the master document for a testing effort. It contains: scope, objectives, test approach, resources, schedule, risk & mitigation, entry/exit criteria, tools, and environment details. Created during the Test Planning phase."},
{q:"What is test closure?",a:"The final STLC phase — it evaluates whether testing objectives were met. Produces the Test Closure Report: metrics (total cases, passed, failed, blocked), defect summary, coverage achieved, lessons learned, and formal sign-off."},
{q:"How does STLC run in an Agile project?",a:"In Agile, STLC phases compress to fit within each 2-week sprint: requirements are reviewed at sprint start, test cases designed during the sprint, execution runs in the same sprint as dev, and closure metrics are captured at sprint retrospective."}
]},

{id:23,phase:"Fundamentals",color:"f",title:"ETL Testing",
overview:{def:"ETL (Extract, Transform, Load) testing validates the process of moving data from source systems to a data warehouse — ensuring data is extracted correctly, transformed according to business rules, and loaded completely and accurately.",
wwwh:[
{l:"What",t:"Testing the data pipeline: extraction accuracy, transformation logic, load completeness"},
{l:"Why",t:"Bad ETL = bad analytics = wrong business decisions — data quality is mission-critical"},
{l:"When",t:"After each ETL pipeline build or change — before reports are trusted"},
{l:"Where",t:"Between source systems (CRM, ERP, APIs) and data warehouse (Snowflake, Redshift)"},
{l:"How",t:"SQL queries, row counts, data profiling, reconciliation, transformation validation"}]},
oneliners:[
"ETL testing validates that data moved from source to warehouse is complete, correct, and consistent.",
"In ETL testing, a row count mismatch between source and target is a critical defect.",
"ETL bugs don't show in the UI — they hide in the data warehouse until someone questions a report.",
"ETL testing is 80% SQL — if you can write good SQL, you can test most ETL pipelines.",
"Data quality issues found late in a BI project cost 10x more than those found at the pipeline stage."
],
concept:"ETL has three stages: Extract (pull data from source systems like Oracle, SAP, REST APIs), Transform (apply business rules: calculate, aggregate, clean, filter, join, deduplicate), Load (push transformed data into the target data warehouse). ETL testing verifies each stage separately and end-to-end. Key tests: completeness (all rows moved?), accuracy (values correct?), transformation logic (rules applied correctly?), data type check, null/duplicate check, referential integrity.",

practices:["Always validate row counts between source and target after every ETL run","Write SQL-based reconciliation scripts — automate them as part of pipeline CI/CD","Test null handling explicitly — ETL often silently drops rows with null PKs","Validate transformation logic against the ETL specification document, not assumptions","Test incremental loads separately from full loads — they have different failure modes","Check that duplicate records from source are properly deduplicated in the target","Verify data type mapping: source NVARCHAR → target VARCHAR(255) can cause truncation","Test ETL performance: the load must complete within the batch window (e.g., 4-hour nightly batch)"],
qa:[
{q:"What is ETL testing?",a:"ETL testing validates the Extract, Transform, Load pipeline — ensuring data is completely extracted from source systems, correctly transformed per business rules, and fully and accurately loaded into the target data warehouse."},
{q:"What are the key checks in ETL testing?",a:"1. Completeness (row count match), 2. Accuracy (value match), 3. Transformation validation (business rules applied), 4. Data quality (nulls, duplicates, type mismatches), 5. Referential integrity (FK valid), 6. Performance (ETL within batch window)."},
{q:"What is the reconciliation check in ETL testing?",a:"Reconciliation is comparing aggregate values (COUNT, SUM, MAX date) between source and target. If source has 50,000 rows and target has 49,998, 2 rows were lost — a critical completeness defect that must be investigated."},
{q:"What tools are used for ETL testing?",a:"QuerySurge (automated ETL testing), Informatica Data Validation, SSDT for SQL Server, Talend Data Quality, Apache Spark for big data validation. Most ETL testing is done with custom SQL scripts comparing source and target queries."},
{q:"What is the difference between full load and incremental load testing?",a:"Full load: all source data loaded fresh into an empty target — test complete data movement. Incremental load: only new/changed records since last run — test delta capture accuracy, update logic, and duplicate prevention."},
{q:"What is a critical defect in ETL testing?",a:"Row count mismatch (data loss), incorrect transformation result (wrong business logic), data truncation (source value 'ABCDEFGHIJ' → target 'ABCDE' because of column size mismatch), null key violation, or referential integrity failure (orphaned records)."}
]},

{id:24,phase:"Intermediate",color:"i",title:"Exploratory & Ad-Hoc Testing",
overview:{def:"Exploratory testing is structured, charter-driven investigation — simultaneous design and execution. Ad-hoc testing is completely unstructured, informal testing with no documentation, test cases, or plan — pure instinct.",
wwwh:[
{l:"What",t:"Two unscripted testing approaches that find defects scripted tests miss"},
{l:"Why",t:"Scripted tests only verify what was anticipated — unscripted finds the unknown"},
{l:"When",t:"Exploratory: time-boxed sessions alongside scripted. Ad-hoc: early builds, quick checks"},
{l:"Where",t:"New features, complex flows, high-risk areas, after major changes"},
{l:"How",t:"Exploratory: charter + 60-min session + debrief. Ad-hoc: just test freely"}]},
oneliners:[
"Exploratory testing is intelligent investigation — not random clicking with a mission statement.",
"Ad-hoc testing is the tester saying: let me just try this and see what breaks.",
"Exploratory finds bugs because it thinks like an attacker; scripted tests think like a developer.",
"The best bugs in any project came from someone going off-script — exploratory or ad-hoc.",
"Exploratory is repeatable and documented; ad-hoc is not — that's the core difference."
],
concept:"Exploratory testing (ET) uses time-boxed, charter-driven sessions: 'Explore the checkout flow to find session and validation defects — 60 min.' The tester designs tests in real time based on what they observe. Ad-hoc testing has no structure: no charter, no notes, no debrief. It's the most informal type of testing — often done by testers exploring a new build for the first time. Buddy testing and pair testing are structured variations of ad-hoc.",
diagrams:[
`<svg width="100%" viewBox="0 0 680 170" role="img"><title>Exploratory vs ad-hoc comparison</title><desc>Side by side comparison of exploratory and ad-hoc testing characteristics</desc><defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

`<svg width="100%" viewBox="0 0 680 135" role="img"><title>Exploratory session charter format</title><desc>Template showing the structure of an exploratory testing charter</desc><defs><marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-purple"><rect x="20" y="16" width="640" height="106" rx="10" stroke-width="0.5"/><text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">Exploratory session charter template</text><text class="ts" x="340" y="62" text-anchor="middle">Explore: [target area]  |  Using: [tools, data, environment]</text><text class="ts" x="340" y="82" text-anchor="middle">To discover: [type of information / defects sought]</text><text class="ts" x="340" y="102" text-anchor="middle">Time box: 60 min  |  Tester: [name]  |  Debrief: [with lead]</text></g></svg>`,
`<svg width="100%" viewBox="0 0 680 150" role="img"><title>Ad-hoc testing variations</title><desc>Three types of ad-hoc testing: pure ad-hoc, buddy testing, and pair testing</desc><defs><marker id="arr3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="ts" x="340" y="16" text-anchor="middle">Ad-hoc testing variations</text>
<g class="c-coral"><rect x="20" y="28" width="194" height="108" rx="10" stroke-width="0.5"/><text class="th" x="117" y="52" text-anchor="middle" dominant-baseline="central">Pure ad-hoc</text><text class="ts" x="117" y="72" text-anchor="middle">Solo, no docs</text><text class="ts" x="117" y="92" text-anchor="middle">Fastest possible</text><text class="ts" x="117" y="112" text-anchor="middle">Not reproducible</text></g>

<g class="c-teal"><rect x="466" y="28" width="194" height="108" rx="10" stroke-width="0.5"/><text class="th" x="563" y="52" text-anchor="middle" dominant-baseline="central">Pair testing</text><text class="ts" x="563" y="72" text-anchor="middle">Two testers together</text><text class="ts" x="563" y="92" text-anchor="middle">One tests, one observes</text><text class="ts" x="563" y="112" text-anchor="middle">Richer coverage</text></g></svg>`
],
practices:["Always write a one-line charter before starting exploratory testing — no open-ended fishing","Time-box exploratory sessions: 60 min max, with a 15-min debrief afterward","Take screenshots/screen recordings during exploratory sessions — memory fades fast","Ad-hoc bugs must be logged formally even if the test can't be reproduced exactly","Use exploratory testing after every major feature build — it's the first smart look at new code","For buddy testing: dev should not guide the QA — let the QA explore naturally","Track exploratory testing coverage with a mind map or session sheet","Rotate testers for exploratory sessions — same tester on same module = familiarity bias"],
qa:[
{q:"What is exploratory testing?",a:"Exploratory testing is simultaneous test design, execution, and learning in charter-driven, time-boxed sessions. The tester investigates the application adaptively, using skill and intuition to find defects that scripted tests don't anticipate."},
{q:"What is ad-hoc testing?",a:"Ad-hoc testing is completely unstructured, informal testing with no test cases, no plan, and no documentation. The tester randomly explores the application based on intuition — fastest but least accountable and not reproducible."},
{q:"What is the difference between exploratory and ad-hoc testing?",a:"Exploratory: semi-structured with a charter, time-box, and debrief — accountable and partially reproducible. Ad-hoc: fully unstructured, no charter, no notes — maximum freedom but minimal accountability or repeatability."},
{q:"What is buddy testing?",a:"A variation of ad-hoc where a developer and tester work together — the developer explains the feature they built and the tester immediately tests it. Provides fast feedback and shared understanding of the feature."},
{q:"What is a test charter?",a:"A charter defines the mission for an exploratory session: 'Explore [target] using [resources] to discover [information]'. It provides focus without scripting, making exploratory testing accountable while preserving creative freedom."},
{q:"When should you use exploratory testing instead of scripted?",a:"When the feature is new and test cases don't yet exist, when you want to find unexpected bugs beyond scripted coverage, after a major refactor, when time is limited and only one pass is possible, or when the scripted test suite shows the pesticide paradox."}
]},

{id:25,phase:"Intermediate",color:"i",title:"Database Testing",
overview:{def:"Database testing validates the database layer: data integrity, stored procedures, triggers, views, indexes, data types, security, and performance — ensuring the backend data store is reliable, accurate, and secure.",
wwwh:[
{l:"What",t:"Testing everything below the UI: tables, queries, SPs, constraints, security"},
{l:"Why",t:"A beautiful UI on top of corrupt data is worthless — the DB is the source of truth"},
{l:"When",t:"After DB schema changes, data migrations, backend changes, every release"},
{l:"Where",t:"DB server: tables, views, stored procedures, triggers, indexes, permissions"},
{l:"How",t:"SQL queries, data profiling, schema comparison, constraint validation, SP testing"}]},
oneliners:[
"Database testing is black box from the UI and white box at the SQL level.",
"A constraint violation in the DB is cheaper to find than corrupt data in production.",
"Every stored procedure is a testable unit — treat it like code, not infrastructure.",
"Database testing without SQL skills is like API testing without HTTP knowledge.",
"Data integrity is the contract between the application and reality — test it rigorously."
],
concept:"Database testing has multiple layers: structural (schema, tables, columns, data types, constraints), functional (CRUD operations, stored procedures, triggers, views), data integrity (primary/foreign keys, unique constraints, not-null rules), performance (query execution plans, index usage, slow queries), and security (user privileges, SQL injection resistance, encryption). Tools: SQL Server Management Studio, DBeaver, Toad, QuerySurge.",

practices:["Always test primary key, foreign key, and unique constraints explicitly with SQL","Write SQL to check for orphaned records: orders with no matching customer","Test stored procedures with valid, invalid, boundary, and NULL parameter values","Validate that triggers fire correctly and produce expected side effects","Run EXPLAIN/EXECUTION PLAN on critical queries — catch missing indexes early","Test DB security: verify that application DB user cannot DROP tables or access forbidden schemas","After any migration, run a row count and sum reconciliation between old and new DB","Check data type mismatches: source DATETIME vs target DATE can silently drop time component"],
qa:[
{q:"What is database testing?",a:"Database testing validates the database layer: data integrity, stored procedures, triggers, views, indexes, security, and performance. It goes below the UI to verify the backend data store is accurate, consistent, and secure."},
{q:"What are the main types of database testing?",a:"1. Structural (schema, columns, data types, constraints), 2. Functional (CRUD, stored procedures, triggers, views), 3. Data integrity (PK, FK, unique, not null), 4. Performance (query plans, index usage), 5. Security (privileges, SQL injection resistance)."},
{q:"What SQL checks are essential in database testing?",a:"Row count (source=target), NULL check on required columns, duplicate check on unique columns, FK integrity (orphan records), value range check, data type validation, and aggregate reconciliation (SUM, AVG, MAX match)."},
{q:"How do you test a stored procedure?",a:"Prepare test data, execute the SP with valid parameters, assert the output/result set matches expected. Then test with invalid params (null, boundary, wrong type), verify error handling and rollback behavior on failure."},
{q:"What is referential integrity testing?",a:"Verifying that foreign key relationships are enforced: every child record's FK value must exist in the parent table. Example: every order.customer_id must exist in customers.id. Test by attempting to insert an order with a non-existent customer_id."},
{q:"What tools are commonly used for database testing?",a:"SQL clients: SSMS, DBeaver, Toad, MySQL Workbench. ETL validation: QuerySurge, Informatica DVO. Performance: SQL Profiler, EXPLAIN PLAN. Automated DB testing: dbUnit (Java), pytest with SQLAlchemy (Python), tSQLt (SQL Server unit testing)."}
]},

{id:26,phase:"Intermediate",color:"i",title:"Compatibility vs Compliance Testing",
overview:{def:"Compatibility testing checks that software works correctly in different environments (browsers, OS, devices, networks). Compliance testing verifies that software adheres to regulatory standards, laws, and industry specifications.",
wwwh:[
{l:"What",t:"Two distinct non-functional tests: environment fit vs regulatory adherence"},
{l:"Why",t:"Compatibility: users on different devices. Compliance: legal and regulatory risk"},
{l:"When",t:"Compatibility: every release. Compliance: before product launch, audits"},
{l:"Where",t:"Compat: browsers/OS/devices. Compliance: regulated industries (health, finance)"},
{l:"How",t:"Compat: browser farms. Compliance: audit checklists, certification bodies"}]},
oneliners:[
"Compatibility testing asks: does it work everywhere? Compliance asks: is it legal everywhere?",
"Failing compatibility testing loses users; failing compliance testing loses your license.",
"GDPR, HIPAA, PCI-DSS — these are compliance standards, not optional guidelines.",
"Cross-browser compatibility is the most common compatibility testing in web development.",
"Compliance testing requires external auditors; compatibility testing is done by your QA team."
],
concept:"Compatibility testing covers hardware (device, screen size, RAM), software (OS, browser, database version), network (bandwidth, latency, protocol), and backward/forward compatibility. Compliance testing covers regulatory standards: GDPR (EU data privacy), HIPAA (US healthcare), PCI-DSS (payment card industry), ISO 27001 (information security), WCAG (accessibility), FDA 21 CFR Part 11 (clinical software).",

practices:["Build a browser-OS compatibility matrix at project start and test every combination","Use BrowserStack or Sauce Labs for automated cross-browser regression","Never assume Chrome behavior matches Safari — WebKit renders differently","For compliance: map every requirement to the standard it satisfies in the RTM","Engage a qualified auditor for HIPAA, PCI-DSS, or ISO 27001 — internal QA alone is insufficient","Test backward compatibility: new release must support data from previous versions","Test forward compatibility: older clients must gracefully handle new API responses","Compliance test evidence (screenshots, test results, logs) must be audit-ready and retained"],
qa:[
{q:"What is compatibility testing?",a:"Compatibility testing verifies that software works correctly across different environments: browsers, operating systems, devices, screen resolutions, database versions, and network conditions. Goal: consistent behavior for all users."},
{q:"What is compliance testing?",a:"Compliance testing verifies that software adheres to external standards, regulations, or legal requirements — GDPR, HIPAA, PCI-DSS, ISO 27001, WCAG 2.1. Non-compliance can result in fines, legal action, or loss of business."},
{q:"What is backward compatibility testing?",a:"Testing that a new version of software still works correctly with data, configurations, or clients from older versions. Example: a new API v2 must still correctly process requests formatted for API v1."},
{q:"What is forward compatibility testing?",a:"Testing that older versions of a system can work with newer versions of another component. Example: an older mobile app client must gracefully handle new response fields added to the API it calls."},
{q:"Name three compliance standards and their domains.",a:"GDPR (EU data privacy — user consent, data rights), HIPAA (US healthcare — PHI protection), PCI-DSS (payment card — cardholder data security), ISO 27001 (information security management), WCAG 2.1 (web accessibility for disabled users)."},
{q:"What evidence is needed for compliance testing?",a:"Compliance audits require: test execution logs with timestamps, screenshots or screen recordings of test execution, test case documents mapped to standard requirements, defect reports and resolution evidence, and QA sign-off signatures."}
]},

{id:27,phase:"Intermediate",color:"i",title:"Globalization vs Localization Testing",
overview:{def:"Globalization (G11N) testing verifies software is designed to support multiple languages and locales. Localization (L10N) testing verifies the software is correctly adapted for a specific target locale — language, date formats, currency, cultural content.",
wwwh:[
{l:"What",t:"Testing software's ability to support and adapt to different world locales"},
{l:"Why",t:"A product that can't handle Japanese characters or Indian date formats loses global markets"},
{l:"When",t:"G11N: early design/dev. L10N: for each target locale before release"},
{l:"Where",t:"Every UI string, date, currency, number, error message, and image"},
{l:"How",t:"G11N: pseudo-localization. L10N: native speaker review + automated tools"}]},
oneliners:[
"G11N tests the blueprint for going global; L10N tests the actual translation and adaptation.",
"Globalization is baking a multilingual engine; localization is putting it in a specific car.",
"A string hardcoded in English is a globalization defect — it cannot be localized.",
"Date 11/05/2025 means May 11 in the US and November 5 in Europe — localization defect.",
"If your app can't handle right-to-left text (Arabic, Hebrew), it fails globalization testing."
],
concept:"G11N (also called Internationalization or I18N) testing ensures the code architecture supports multiple languages — no hardcoded strings, proper Unicode support, flexible layouts for text expansion, locale-aware date/number/currency formatting. L10N testing verifies a specific locale implementation: translations are accurate, culturally appropriate, and technically correct (date format DD/MM/YYYY vs MM/DD/YYYY, currency ¥ vs €, right-to-left layout for Arabic).",

practices:["Test G11N early — hardcoded strings found in design cost pennies; in production, thousands","Use pseudo-localization to find layout and encoding issues before real translation starts","Always test Arabic and Hebrew layouts — RTL is the most commonly missed G11N requirement","Test text expansion: German text is 30% longer than English — check for UI truncation","For L10N: use native speakers for translation review, not just automated tools","Test all date, time, number, and currency formats for every supported locale","Check that error messages, email templates, and PDFs are also localized — not just UI","Validate that locale-specific images and icons are culturally appropriate for each market"],
qa:[
{q:"What is the difference between G11N and L10N testing?",a:"G11N (Globalization) testing verifies the architecture supports multiple languages and locales — Unicode, locale-aware formatting, flexible layouts. L10N (Localization) testing verifies a specific locale implementation — translations, date/currency formats, cultural content."},
{q:"What is I18N (Internationalization)?",a:"I18N is often used interchangeably with G11N — it refers to designing and developing software so it can be adapted to various languages and regions without engineering changes. '18' = 18 letters between 'i' and 'n' in 'internationalization'."},
{q:"What is pseudo-localization?",a:"A technique where English text is replaced with extended characters (e.g., 'Submit' → '[Šüßmíţ !!!]') to test G11N issues — layout breaks, encoding errors, truncation — without needing actual translations. Done early in development."},
{q:"What are common L10N defects?",a:"Wrong date format (11/05 = May 11 in US vs Nov 5 in EU), wrong currency symbol, incorrect translation (different meaning in target language), culturally offensive images, missing translations (English fallback displayed), wrong number separator (1,000.00 vs 1.000,00)."},
{q:"What is RTL testing?",a:"Right-to-Left layout testing — verifying that the application correctly mirrors its layout for Arabic, Hebrew, Persian, and Urdu locales. Text, navigation, and UI elements must flow right-to-left. One of the most commonly missed G11N requirements."},
{q:"What tools are used for L10N testing?",a:"Translation management: Phrase, Transifex, Lokalise. L10N testing: Appium (mobile locale switching), Selenium with locale browser settings. String extraction: i18next, gettext. Pseudo-localization: generators like 'pseudo-l10n' npm packages."}
]},

practices:["Use GPS mocking in Android Studio / Xcode Simulator to test location features without travel","Test IP geolocation with VPN to simulate users from each key country","Verify GDPR consent banner appears for EU IPs — this is a compliance + geo combined test","Test what happens when GPS is denied — app must gracefully degrade, not crash","Test geolocation accuracy thresholds: delivery zone boundaries must be exact to the meter","For I18N: scan codebase for hardcoded strings using static analysis tools (i18n-lint)","Test date/currency formatting with locale switching at runtime — not just on fresh install","Test geolocation edge cases: GPS signal lost mid-session, timezone change during use"],
qa:[
{q:"What is geolocation testing?",a:"Geolocation testing verifies location-based features work correctly — GPS-based delivery zones, store finders, location-aware content. Uses GPS coordinate mocking (Xcode Simulator, Android Studio) to simulate different locations without physical travel."},
{q:"What is IP geolocation testing?",a:"Testing that the system correctly detects a user's country/region from their IP address and applies appropriate rules: language redirect, geo-restricted content, GDPR consent banner, regional pricing. Tested using VPN tools to spoof IP addresses."},
{q:"What is I18N testing?",a:"Internationalization testing verifies the code architecture supports multiple locales — all strings externalized to resource files, UTF-8 encoding, locale-aware date/number/currency APIs, RTL layout support. It ensures adding a new language requires only a resource file, not code changes."},
{q:"How do you test geolocation without physically being in a location?",a:"Mobile: mock GPS coordinates in Xcode Simulator (iOS) or Android Studio (Android). Web: use browser developer tools to override geolocation. IP-based: use a VPN to simulate IPs from specific countries. API-based: pass test coordinate parameters directly to the location API."},
{q:"What is a geolocation boundary test?",a:"Testing the exact edge of a geographic zone — e.g., a delivery zone boundary at lat/lng coordinate. Test with coordinates just inside the boundary (should qualify), exactly on the boundary, and just outside (should not qualify). Boundary defects cause wrong delivery eligibility."},
{q:"What are common IP geolocation defects?",a:"Wrong country detected (MaxMind DB out of date), GDPR banner not shown for EU IPs, geo-restricted content accessible via VPN, wrong language shown for detected locale, price not adjusted for region, same content shown regardless of user's location."}
]},

practices:["A/B tests need statistical significance — run for minimum 2 weeks to avoid false positives","Never A/B test more than one variable at a time — isolate the change","Set success metrics before running an A/B test — not after seeing the data","Use feature flags for A/B test implementation — easy rollback if B performs worse","For crowdsourced testing: define a clear test scope — exploratory or scripted","Triage crowdsourced defects carefully — quality varies; duplicate and invalid reports are common","Use crowdsourced testing for device fragmentation coverage — internal labs can't match real-world device variety","Reward quality bug reports in crowdsourced programs — incentivize deep investigation, not volume"],
qa:[
{q:"What is A/B testing?",a:"A/B testing is a controlled experiment where two versions of a feature (A = control, B = variant) are shown to different user groups simultaneously. Metrics (conversion, click-through, engagement) determine which version performs better. It's a product decision tool, not defect-finding."},
{q:"What is crowdsourced testing?",a:"Crowdsourced testing distributes test cases to a large, diverse group of external testers worldwide through platforms like uTest, Testlio, or Global App Testing. It provides coverage across real devices, locales, and network conditions at a scale impossible internally."},
{q:"What is a feature flag and how does it relate to A/B testing?",a:"A feature flag is a code toggle that enables/disables a feature for specific users. A/B tests use feature flags to serve variant B to 50% of users while the other 50% see the current version. Flags allow instant rollback if the variant performs worse."},
{q:"What is statistical significance in A/B testing?",a:"A result is statistically significant when the measured difference between A and B is unlikely to be due to chance — typically p < 0.05 (95% confidence). Running an A/B test too briefly or on too small a sample produces inconclusive or misleading results."},
{q:"What are the risks of crowdsourced testing?",a:"Variable tester quality (experience varies widely), high volume of duplicate or invalid bug reports, potential NDA risk (external testers see unreleased code), inconsistent test execution (not all testers follow instructions), and coordination overhead in triage."},
{q:"When would you use crowdsourced testing over internal QA?",a:"When you need wide device/OS/locale coverage that internal labs can't provide, for pre-launch real-world validation, to find bugs under real-world network conditions, or when a fast turnaround on broad test coverage is required for an urgent release."}
]},

{id:30,phase:"Advanced",color:"a",title:"Mobile Testing",
overview:{def:"Mobile testing validates applications on smartphones and tablets — covering native apps (iOS/Android), mobile web, and hybrid apps — across diverse devices, OS versions, screen sizes, and real-world mobile conditions.",

qa:[
{q:"What is mobile testing and what makes it unique?",a:"Mobile testing validates apps on smartphones/tablets covering unique mobile concerns: device fragmentation (hundreds of Android devices), OS versions, screen sizes, touch gestures, network conditions (2G–5G/offline), device sensors (GPS/camera), interruptions (calls/notifications), and app lifecycle management."},
{q:"What is the difference between a native, hybrid, and mobile web app?",a:"Native: built specifically for iOS (Swift/ObjC) or Android (Kotlin/Java) — best performance. Hybrid: web tech wrapped in native shell (React Native, Flutter) — cross-platform, one codebase. Mobile web: runs in mobile browser — no install, responsive design, lowest performance ceiling."},
{q:"What tools are used for mobile test automation?",a:"Native iOS: XCUITest. Native Android: Espresso, UIAutomator. Cross-platform: Appium (industry standard), Detox (React Native). Cloud device farms: BrowserStack App Automate, Sauce Labs, AWS Device Farm. Performance: Firebase Performance Monitoring."},
{q:"What is interruption testing in mobile?",a:"Testing app behavior when interrupted mid-use: incoming phone call during checkout (should resume), SMS notification tapped (should return correctly), low battery alert, OS killing the app in background (state should restore), or a system update prompt appearing."},
{q:"When should you use a real device vs an emulator?",a:"Real device: GPS/camera/NFC testing, battery/performance validation, final pre-release check, testing specific OEM hardware behavior. Emulator/simulator: fast functional regression, OS version matrix coverage, CI/CD pipeline automation, early development testing where hardware is irrelevant."},
{q:"What is device fragmentation and why does it matter for testing?",a:"Android has thousands of device models from different manufacturers (Samsung, Xiaomi, OnePlus) with different OS versions, screen sizes, custom UIs, and hardware specs. A feature working on Samsung Galaxy S24 may fail on Xiaomi Redmi due to OEM customization — QA must test a representative device matrix."}
]}

const visited=new Set([21]);
let current=21;

function buildTabs(){
  const bar=document.getElementById("tabBar");
  SD.forEach(s=>{
    const btn=document.createElement("button");
    btn.className="tb"+(s.id===21?" active":"");
    btn.id="t"+s.id;
    btn.textContent="S"+s.id;
    btn.onclick=()=>goTo(s.id);
    bar.appendChild(btn);
  });
}

function renderSession(s){
  const pc=s.color;
  return `
<div class="sess-hdr">
  <div class="snum sn${pc}">S${s.id}</div>
  <div><div class="stitle">${s.title}</div><div class="sphase">Phase: ${s.phase}</div></div>
</div>
<div class="slabel">Overview</div>
<div class="ocard">
  <p>${s.overview.def}</p>
  <div class="wwwh">${s.overview.wwwh.map(w=>`<div class="wi"><div class="wl">${w.l}</div><div class="wt">${w.t}</div></div>`).join("")}</div>
</div>
<div class="slabel">Interview one-liners</div>
<div class="ol-list">${s.oneliners.map((o,i)=>`<div class="ol"><span class="on">${i+1}</span><span class="ot">${o}</span></div>`).join("")}</div>
<div class="slabel">Concept explanation</div>
<div class="ct">${s.concept}</div>
<div class="slabel">Visual diagrams (3 diagrams)</div>
${s.diagrams.map(d=>`<div class="dbox">${d}</div>`).join("")}
<div class="slabel">Best practices checklist</div>
<div class="clist">${s.practices.map(p=>`<div class="ci"><span class="ck"><i class="ti ti-check" aria-hidden="true"></i></span><span>${p}</span></div>`).join("")}</div>
<div class="slabel">Interview Q&A — SDET style (tap to reveal)</div>
<div class="qa-list">${s.qa.map((q,i)=>`<div class="qa-item" id="qa${s.id}x${i}">
  <div class="qa-q" onclick="toggleQA('qa${s.id}x${i}')">
    <span class="ql">Q${i+1}</span><span class="qt">${q.q}</span>
    <i class="ti ti-chevron-down qtog" aria-hidden="true"></i>
  </div>
  <div class="qa-ans">${q.a}</div>
</div>`).join("")}</div>
<div class="nav-row">
  <button class="nb" onclick="goTo(${s.id-1})" ${s.id===21?"disabled style='opacity:.4'":""}>← Previous</button>
  <span class="sc">Session ${s.id} of 30 (S21–S30)</span>
  <button class="nb pr" onclick="goTo(${s.id+1})" ${s.id===30?"disabled style='opacity:.4'":""}>Next →</button>
</div>`;
}

function buildSessions(){
  const cont=document.getElementById("sessions");
  SD.forEach(s=>{
    const div=document.createElement("div");
    div.className="sess"+(s.id===21?" active":"");
    div.id="s"+s.id;
    div.innerHTML=renderSession(s);
    cont.appendChild(div);
  });
}

function goTo(id){
  if(id<21||id>30)return;
  document.getElementById("s"+current).classList.remove("active");
  document.getElementById("t"+current).classList.remove("active");
  visited.add(id);
  current=id;
  document.getElementById("s"+id).classList.add("active");
  document.getElementById("t"+id).classList.add("active");
  SD.forEach(s=>{if(visited.has(s.id))document.getElementById("t"+s.id).classList.add("done");});
  document.getElementById("pFill").style.width=((current-20)/10*100)+"%";
  window.scrollTo(0,0);
}

function toggleQA(id){document.getElementById(id).classList.toggle("open");}

buildTabs();
buildSessions();
</script>
