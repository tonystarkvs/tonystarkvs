<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --border-radius-md:8px;
  --color-background-secondary:#f4f4f8;
  --color-border-secondary:#d1d1db;
  --color-border-tertiary:#e4e4eb;
  --color-text-primary:#1a1a2e;
  --color-text-secondary:#555770;
  --color-text-tertiary:#8e90a6;
  --font-sans:'Segoe UI',system-ui,-apple-system,sans-serif;
}

body{font-family:var(--font-sans);color:var(--color-text-primary);background:transparent}
.wrap{max-width:100%;padding:0 0 2rem}
.header{padding:1.25rem 1.5rem 1rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.header h1{font-size:18px;font-weight:500;margin-bottom:4px}
.header p{font-size:13px;color:var(--color-text-secondary)}
.phase-bar{display:flex;gap:8px;padding:12px 1.5rem;border-bottom:0.5px solid var(--color-border-tertiary);overflow-x:auto}
.phase-pill{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;white-space:nowrap}
.phase-f{background:#EEEDFE;color:#3C3489}.phase-i{background:#E1F5EE;color:#085041}.phase-a{background:#FAECE7;color:#712B13}
.tab-bar{display:flex;overflow-x:auto;border-bottom:0.5px solid var(--color-border-tertiary);padding:0 1rem;gap:2px;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:10px 12px;font-size:12px;font-weight:400;color:var(--color-text-secondary);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s}
.tab-btn.active{color:var(--color-text-primary);font-weight:500;border-bottom-color:var(--color-text-primary)}
.tab-btn:hover:not(.active){color:var(--color-text-primary)}
.session{display:none;padding:1.25rem 1.5rem;animation:fadeIn .2s}
.session.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:10px;margin-right:4px}
.badge-f{background:#EEEDFE;color:#3C3489}.badge-i{background:#E1F5EE;color:#085041}.badge-a{background:#FAECE7;color:#712B13}
.section-title{font-size:15px;font-weight:500;margin:1.25rem 0 0.6rem;padding-bottom:4px;border-bottom:0.5px solid var(--color-border-tertiary)}
.def-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px;font-size:13px;line-height:1.7;margin-bottom:10px}
.def-box strong{font-weight:500}
.oneliner-list{list-style:none;padding:0;margin:0}
.oneliner-list li{font-size:13px;line-height:1.6;padding:6px 0 6px 12px;border-left:2px solid var(--color-border-secondary);margin-bottom:6px;color:var(--color-text-secondary)}
.oneliner-list li em{font-style:normal;color:var(--color-text-primary);font-weight:500}
.diagram-wrap{border-radius:var(--border-radius-md);overflow:hidden;margin:10px 0;border:0.5px solid var(--color-border-tertiary)}
.diagram-wrap svg{display:block;width:100%}
.checklist{list-style:none;padding:0}
.checklist li{font-size:13px;padding:5px 0 5px 22px;position:relative;color:var(--color-text-secondary);line-height:1.5}
.checklist li::before{content:"✓";position:absolute;left:0;color:#0F6E56;font-weight:500}
.qa-grid{display:grid;gap:10px;margin-top:6px}
.qa-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px}
.qa-card .q{font-size:13px;font-weight:500;margin-bottom:6px;color:var(--color-text-primary)}
.qa-card .a{font-size:12px;color:var(--color-text-secondary);line-height:1.6}
.progress-bar{display:flex;align-items:center;gap:8px;padding:10px 1.5rem;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary)}
.prog-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;cursor:pointer;transition:transform .15s}
.prog-dot:hover{transform:scale(1.3)}
.prog-dot.done{background:#0F6E56}.prog-dot.active{background:#534AB7}.prog-dot.todo{background:var(--color-border-secondary)}
.prog-label{font-size:11px;color:var(--color-text-secondary);flex:1}
.next-btn{font-size:12px;padding:5px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;color:var(--color-text-secondary)}
.next-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.compare-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px}
.compare-card h4{font-size:13px;font-weight:500;margin-bottom:6px}
.compare-card p{font-size:12px;color:var(--color-text-secondary);line-height:1.5}
table.comp{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
table.comp th{font-weight:500;text-align:left;padding:7px 10px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary)}
table.comp td{padding:6px 10px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);vertical-align:top}
table.comp tr:last-child td{border-bottom:none}
.tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;margin-right:3px;margin-bottom:3px}
.tag-p{background:#EEEDFE;color:#3C3489}.tag-g{background:#EAF3DE;color:#27500A}.tag-o{background:#FAEEDA;color:#633806}.tag-r{background:#FCEBEB;color:#791F1F}

.c-amber rect{fill:#FAEEDA;stroke:#EF9F27;stroke-width:1.5}
.c-coral rect{fill:#FAECE7;stroke:#F0997B;stroke-width:1.5}
.c-gray rect{fill:#f4f4f8;stroke:#d1d1db;stroke-width:1.5}
.c-purple rect{fill:#EEEDFE;stroke:#AFA9EC;stroke-width:1.5}
.c-teal rect{fill:#E1F5EE;stroke:#5DCAA5;stroke-width:1.5}
svg .th{font-weight:600;fill:var(--color-text-primary);font-family:var(--font-sans);font-size:13px}
svg .ts{font-size:11px;fill:var(--color-text-secondary);font-family:var(--font-sans)}
</style>

{id:0,code:"S1",title:"Test Plan",phase:"f",
overview:`A <strong>Test Plan</strong> is a formal document that outlines the <em>scope, approach, resources, schedule</em>, and <em>objectives</em> of testing activities for a software project.<br><br>
<strong>What:</strong> Blueprint/master document guiding the entire testing process.<br>
<strong>Why:</strong> Ensures all stakeholders agree on what, how, and when testing happens.<br>
<strong>When:</strong> Created during the planning phase, before test design begins.<br>
<strong>Where:</strong> Maintained in project management tools (Confluence, JIRA, SharePoint).<br>
<strong>How:</strong> QA Lead creates it based on SRS, BRD, and project scope.`,
oneliners:[
"A test plan is a living document that defines the testing scope, strategy, resources, schedule, and deliverables for a project.",
"It answers three critical questions: What will be tested, How it will be tested, and Who will test it.",
"A test plan is the QA team's contract with the project — it sets expectations for all stakeholders.",
"Without a test plan, testing becomes ad-hoc and uncontrolled, leading to missed bugs and deadline failures.",
"A test plan is derived from the Software Requirements Specification (SRS) and approved before testing begins.",
"IEEE 829 is the international standard that defines the structure and content of a test plan."
],

<g class="c-coral"><rect x="580" y="116" width="80" height="44" rx="8" stroke-width="0.5"/><text class="th" x="620" y="138" text-anchor="middle" dominant-baseline="central">Execution</text></g>

bestPractices:["Always baseline the test plan against the SRS/BRD before writing a single test case.","Include a clearly defined scope section — list both what WILL and WILL NOT be tested.","Define measurable entry and exit criteria, not vague ones like 'testing complete'.","Review and update the test plan when requirements change — treat it as a living document.","Get written sign-off from QA Manager, Project Manager, and Business Analyst.","Identify risks and mitigation strategies upfront — don't wait for blockers to appear.","Specify test environments, tools, and data requirements explicitly.","Assign roles and responsibilities clearly — who tests what and when."],
qa:[
{q:"What is a test plan and who creates it?",a:"A test plan is a formal document that defines the scope, approach, resources, and schedule for testing. It is typically created by the QA Lead or QA Manager during the planning phase of the SDLC."},
{q:"What is the IEEE 829 standard for test plans?",a:"IEEE 829 (now IEEE 29119) defines the structure of software test documentation, including test plans, test design specs, test cases, and test summary reports."},
{q:"What are the key components of a test plan?",a:"Scope, test approach/strategy, resources, schedule, entry/exit criteria, deliverables, risks and mitigation, environment requirements, and sign-off/approval."},
{q:"What is the difference between test plan scope and test approach?",a:"Scope defines WHAT will be tested (features in/out of scope). Test approach defines HOW it will be tested — manual vs automation, techniques like equivalence partitioning, boundary analysis, etc."},
{q:"When is the test plan updated during a project?",a:"The test plan is updated whenever there is a scope change, requirement change, schedule change, or resource change. It's a living document."},
{q:"What happens if there is no test plan in a project?",a:"Without a test plan, testing becomes ad-hoc and unpredictable — coverage gaps, missed deadlines, undefined responsibilities, and no measurable quality gates."}
]},

{id:1,code:"S2",title:"Test Strategy",phase:"f",
overview:`A <strong>Test Strategy</strong> is a high-level organizational document that defines the <em>overall testing approach</em>, methodologies, and standards to be followed across all projects in an organization.<br><br>
<strong>What:</strong> Organization-wide or project-level document defining HOW testing is done.<br>
<strong>Why:</strong> Provides consistency, standardization, and direction across multiple projects.<br>
<strong>When:</strong> Created at the organization level (rarely changes) or at project start.<br>
<strong>Where:</strong> Maintained by QA Head/Director, referenced across all test plans.<br>
<strong>How:</strong> Derived from business goals, regulatory requirements, and quality standards.`,
oneliners:[
"A test strategy defines the overall testing approach at a high level — it is the 'north star' for all testing activities.",
"While a test plan is project-specific, a test strategy is often organization-wide and covers multiple projects.",
"Test strategy answers: which testing types will be used, which tools, which environments, and which standards.",
"A test strategy is static — it changes rarely, while a test plan changes frequently per project.",
"Test strategy is created by QA leadership and approved by senior management, not the testing team.",
"Without a defined test strategy, different projects in the same company end up using inconsistent testing approaches."
],

<text class="ts" x="340" y="210" text-anchor="middle">All pillars converge into one master strategy document</text></svg>`,
bestPractices:["Keep the test strategy at a high level — avoid project-specific details (those belong in the test plan).","Define which testing types are mandatory vs optional for different project risk levels.","Include defect management standards — how bugs are raised, prioritized, and closed.","Specify mandatory tools and environments across all projects.","Review and update the strategy annually or when major regulatory changes occur.","Align the test strategy with business goals and quality standards (ISO, CMMI).","Include communication and escalation protocols for critical defects.","Document the test metrics and KPIs that all projects must track."],
qa:[
{q:"What is the main difference between a test strategy and a test plan?",a:"Test strategy is organization-wide, high-level, and rarely changes. Test plan is project-specific, detailed, and created per project. Strategy is the parent; plan is the child."},
{q:"Who creates the test strategy?",a:"The QA Head, QA Director, or Senior QA Manager creates the test strategy. It is approved by senior management."},
{q:"Can a test plan exist without a test strategy?",a:"Yes, but it is not best practice. Without a strategy, each QA team may use different approaches and tools, leading to inconsistency."},
{q:"Name 5 components of a test strategy.",a:"1) Test objectives 2) Test scope 3) Testing types and levels 4) Tool and environment standards 5) Defect management process."},
{q:"Is a test strategy static or dynamic?",a:"A test strategy is relatively static — it changes rarely (annually, or when standards/regulations change). A test plan is dynamic and updated per project."},
{q:"What is a test strategy derived from?",a:"A test strategy is derived from the organization's quality policy, business objectives, regulatory requirements, and industry standards like IEEE 29119."}
]},

{id:2,code:"S3",title:"Test Scenario",phase:"f",
overview:`A <strong>Test Scenario</strong> is a high-level description of a <em>possible user or system situation</em> that needs to be tested. It represents a <em>single testable condition</em> derived from requirements.<br><br>
<strong>What:</strong> A 'What to test' statement — a user flow or business scenario.<br>
<strong>Why:</strong> Helps identify coverage areas and serves as a bridge between requirements and test cases.<br>
<strong>When:</strong> Created after requirements analysis, before writing detailed test cases.<br>
<strong>Where:</strong> Documented in test management tools (TestRail, JIRA, Excel).<br>
<strong>How:</strong> Derived by reading requirements and asking "What can a user do / what can go wrong?"`,
oneliners:[
"A test scenario is a high-level statement of what needs to be tested, written from an end-user's perspective.",
"One test scenario can have multiple test cases — scenario is the 'what', test case is the 'how'.",
"Test scenarios are derived from requirements or user stories and represent real-world user journeys.",
"A good test scenario uses the format: 'Verify that [feature] works when [condition]'.",
"Test scenarios help estimate test effort and ensure complete functional coverage.",
"Writing test scenarios before test cases prevents the team from skipping edge cases and business flows."
],

<text class="ts" x="340" y="155" text-anchor="middle">Golden rule: "Verify that [feature] works when [condition/user action]"</text>
<text class="ts" x="340" y="175" text-anchor="middle">Example: Verify that the login button is disabled when the email field is empty</text></svg>`,
bestPractices:["Always write test scenarios before writing test cases — scenarios define coverage, cases define steps.","Use the format: 'Verify that [feature/function] when [condition]'.","Cover both positive scenarios (happy path) and negative scenarios (error paths).","Include boundary conditions, edge cases, and out-of-scope validations.","Review scenarios with BAs and developers to catch missing requirements early.","Traceability: each scenario must trace back to at least one requirement or user story.","Aim for 100% requirement coverage at the scenario level before writing test cases.","Number scenarios sequentially (TS-001, TS-002) for easy tracking."],
qa:[
{q:"What is the difference between a test scenario and a test case?",a:"Test scenario is high-level (what to test), test case is detailed (steps, data, expected result). One scenario spawns many test cases."},
{q:"How do you derive test scenarios from requirements?",a:"Read the requirement, identify user actions and system behaviors, list positive and negative flows, then write each as 'Verify that [feature] when [condition]'."},
{q:"Give an example of a test scenario for a login feature.",a:"1) Verify login with valid credentials. 2) Verify login with invalid password. 3) Verify account locks after 3 failed attempts. 4) Verify 'Forgot Password' link works."},
{q:"Can a test scenario have no test cases?",a:"No — a test scenario must result in at least one test case. A scenario with no test cases provides zero actual testing value."},
{q:"What is the relationship between requirements and test scenarios?",a:"One requirement can have multiple test scenarios. Each test scenario covers one testable condition of that requirement. This ensures traceability."},
{q:"Who creates test scenarios?",a:"QA Engineers/Analysts create test scenarios, usually with input from Business Analysts. Developers may review for technical feasibility."}
]},

{id:3,code:"S4",title:"Test Case & Components",phase:"f",
overview:`A <strong>Test Case</strong> is a <em>detailed, step-by-step procedure</em> that specifies the inputs, execution conditions, testing procedure, and expected results to validate a specific feature or function.<br><br>
<strong>What:</strong> The atomic unit of testing — the most granular level of test documentation.<br>
<strong>Why:</strong> Provides reproducible, documented evidence of testing and expected behavior.<br>
<strong>When:</strong> Created after test scenarios are reviewed and approved.<br>
<strong>Where:</strong> Stored in TestRail, Zephyr, JIRA, or Excel sheets.<br>
<strong>How:</strong> Written by QA Engineer using equivalence partitioning, boundary value analysis, etc.`,
oneliners:[
"A test case is a set of conditions, inputs, and expected results to verify a specific software function.",
"Every test case must have a unique ID, clear steps, specific test data, and a defined expected result.",
"A test case without an expected result is not a test case — it's just a checklist.",
"Test cases are the primary deliverable of a QA Engineer and the foundation of any test execution.",
"A good test case is atomic, independent, repeatable, and traceable to a requirement.",
"Test cases must be written so that any person — even someone unfamiliar with the system — can execute them."
],

diagram2SVG:`<svg width="100%" viewBox="0 0 680 180" role="img"><title>Test case types</title><desc>Positive, negative, and edge case test types</desc>
<g class="c-teal"><rect x="30" y="30" width="185" height="110" rx="8" stroke-width="0.5"/><text class="th" x="122" y="60" text-anchor="middle" dominant-baseline="central">Positive Test Cases</text><text class="ts" x="122" y="85" text-anchor="middle" dominant-baseline="central">Happy path — valid inputs</text><text class="ts" x="122" y="105" text-anchor="middle" dominant-baseline="central">Expected: success</text><text class="ts" x="122" y="125" text-anchor="middle" dominant-baseline="central">Example: Valid login</text></g>
<g class="c-coral"><rect x="248" y="30" width="185" height="110" rx="8" stroke-width="0.5"/><text class="th" x="340" y="60" text-anchor="middle" dominant-baseline="central">Negative Test Cases</text><text class="ts" x="340" y="85" text-anchor="middle" dominant-baseline="central">Invalid inputs/errors</text><text class="ts" x="340" y="105" text-anchor="middle" dominant-baseline="central">Expected: error message</text><text class="ts" x="340" y="125" text-anchor="middle" dominant-baseline="central">Example: Wrong password</text></g>
<g class="c-amber"><rect x="466" y="30" width="185" height="110" rx="8" stroke-width="0.5"/><text class="th" x="558" y="60" text-anchor="middle" dominant-baseline="central">Edge / Boundary Cases</text><text class="ts" x="558" y="85" text-anchor="middle" dominant-baseline="central">Limit values tested</text><text class="ts" x="558" y="105" text-anchor="middle" dominant-baseline="central">Expected: defined behavior</text><text class="ts" x="558" y="125" text-anchor="middle" dominant-baseline="central">Example: 0 or max chars</text></g>
<text class="ts" x="340" y="165" text-anchor="middle">All three types must be written for complete test coverage</text></svg>`,
bestPractices:["Write one expected result per test step — never combine multiple validations in one step.","Make test cases independent — each should run without depending on another test case.","Use specific test data, never 'any valid user' — state exact values.","Write expected results in testable, measurable terms — not 'it should work'.","Include screenshots or attachments in the test case for visual validation steps.","Review test cases with both developers and BAs before execution.","Version control test cases — track changes with author and date.","Tag test cases as Smoke, Regression, or Functional for easy suite creation."],
qa:[
{q:"What are the mandatory components of a test case?",a:"Test Case ID, Title, Description, Preconditions, Test Steps, Test Data, Expected Result, Actual Result, Status, Priority, Traceability, and Author/Date."},
{q:"What is the difference between expected result and actual result?",a:"Expected result is written BEFORE execution — what should happen. Actual result is filled AFTER execution — what actually happened. A mismatch = bug/defect."},
{q:"What makes a test case a 'good' test case?",a:"A good test case is atomic (tests one thing), independent, repeatable, traceable to a requirement, and executable by any team member without extra explanation."},
{q:"What is precondition in a test case?",a:"Precondition is the state the system must be in BEFORE executing the test. Example: 'User must be registered. Browser must be Chrome. Test data must be loaded.'"},
{q:"What is the difference between test case priority and severity?",a:"Priority defines the order of execution (High/Medium/Low based on business impact). Severity defines the impact of a bug (Critical/Major/Minor/Trivial based on technical impact)."},
{q:"How many test cases can one test scenario generate?",a:"A single test scenario can generate 3–20+ test cases depending on the number of inputs, conditions, and edge cases. There is no fixed number."}
]},

{id:4,code:"S5",title:"RTM · Test Matrix · Summary Report · Metrics",phase:"i",
overview:`Four critical documents used to <em>track, measure, and communicate</em> testing progress and quality.<br><br>
<strong>RTM (Requirements Traceability Matrix):</strong> Maps requirements ↔ test cases.<br>
<strong>Test Matrix:</strong> Shows the test execution status across browsers/devices/environments.<br>
<strong>Test Summary Report:</strong> End-of-cycle document summarizing testing outcomes.<br>
<strong>Metrics Dashboard:</strong> Real-time visual showing test and defect KPIs.<br>
Each serves a distinct purpose and audience — RTM for compliance, Matrix for coverage, Summary for history, Dashboard for real-time visibility.`,
oneliners:[
"RTM ensures every requirement has at least one test case — it is the primary traceability tool in QA.",
"A test matrix shows which features work on which platforms — critical for cross-browser and cross-device projects.",
"Test Summary Report is the final quality document delivered to stakeholders at the end of a test cycle.",
"A metrics dashboard gives management real-time visibility into test execution and defect trends.",
"Without RTM, you cannot prove 100% requirement coverage — it is mandatory in regulated industries.",
"RTM is bidirectional — it maps requirements to test cases AND test cases back to requirements."
],

bestPractices:["Maintain RTM from day 1 — add test cases as they are created, not at the end.","RTM must be bidirectional — requirement to test case AND test case to requirement.","Test Matrix must include all target browsers, OS, devices defined in the test plan.","Test Summary Report must include: total TCs written, executed, pass/fail, defect count, open bugs.","Update Metrics Dashboard daily during execution — weekly during planning phase.","RTM is mandatory for regulated projects (healthcare, banking, government).","Never report 'testing done' without a complete Test Summary Report signed off.","Include defect density metrics (bugs per feature) in your metrics dashboard for risk analysis."],
qa:[
{q:"What is RTM and why is it important?",a:"RTM (Requirements Traceability Matrix) maps requirements to test cases bidirectionally. It proves 100% requirement coverage and is mandatory for audits in regulated industries."},
{q:"What is the difference between RTM and Test Matrix?",a:"RTM maps Requirements ↔ Test Cases (traceability). Test Matrix maps Features/Test Cases × Browsers/Devices (cross-platform coverage). They serve different purposes."},
{q:"What does a Test Summary Report contain?",a:"Total test cases written, executed, passed, failed, blocked, defect count by severity, test coverage %, open defects, and a go/no-go recommendation."},
{q:"What KPIs are typically shown in a metrics dashboard?",a:"Test execution rate, pass rate, defect discovery rate, defect closure rate, test coverage %, blocked TCs, and sprint-over-sprint defect trend."},
{q:"What does 'bidirectional traceability' mean in RTM?",a:"It means you can trace: (1) Requirement → Test Case (are all requirements tested?) AND (2) Test Case → Requirement (does every test case have a requirement justification?)."},
{q:"Who is the audience for a Test Summary Report?",a:"Project Manager, Business Analyst, Product Owner, and senior stakeholders. It is used to make the go/no-go release decision."}
]},

{id:5,code:"S6",title:"Test Plan vs Test Strategy",phase:"i",
overview:`This session focuses on the <em>critical differences</em> between Test Plan and Test Strategy — one of the most frequently asked interview topics.<br><br>
The key distinction: <strong>Test Strategy</strong> = organization-wide, high-level, HOW we test in general. <strong>Test Plan</strong> = project-specific, detailed, HOW we test THIS project.<br><br>
Think of it this way: Strategy is the restaurant's cuisine philosophy. Plan is today's menu.`,
oneliners:[
"Test Strategy is the 'what and how' of testing across the organization; Test Plan is the 'who, when, and where' for a specific project.",
"Test Strategy is created by QA leadership; Test Plan is created by the QA Lead for a specific project.",
"Test Strategy is static and rarely changes; Test Plan is dynamic and updated throughout the project lifecycle.",
"Test Strategy defines the testing approach, tools, and standards; Test Plan applies those to a specific scope.",
"A Test Plan is derived from the Test Strategy — you cannot write a plan without a strategy.",
"In smaller organizations, Test Strategy and Test Plan are sometimes combined into one document."
],

bestPractices:["Always clarify in interviews which document you're referring to — don't use them interchangeably.","A test plan section called 'Test Approach' IS the strategy portion of the plan for smaller projects.","In startups, both documents are often combined — know both structures.","Strategy defines tool standards; the plan specifies which tool is used for what in the project.","If asked to 'write a test plan', first check if a strategy exists and reference it.","Always include a 'derived from' reference in the test plan pointing to the test strategy document.","Review strategy annually as part of QA process improvement (retrospective).","Map each test plan section back to its strategy counterpart during peer review."],
qa:[
{q:"What is the primary difference between test plan and test strategy?",a:"Test Strategy is high-level, organization-wide, and rarely changes. Test Plan is project-specific, detailed, and updated frequently. Strategy is the parent document; Plan is derived from it."},
{q:"Can a project have a test plan without a test strategy?",a:"Yes, technically. But the plan would then need to define its own approach and standards, essentially embedding a mini-strategy within it."},
{q:"Who approves the test strategy vs. test plan?",a:"Test strategy is approved by QA Head and senior management. Test plan is approved by QA Manager and Project Manager."},
{q:"In an Agile project, what happens to the test plan?",a:"In Agile, test plans are often lightweight (1-2 pages per sprint) and called 'test charter' or 'sprint test plan'. The strategy remains the same."},
{q:"What is a 'test approach' and where does it fit?",a:"Test approach defines the specific techniques used (boundary value analysis, etc.). It is a section within the test plan, and it aligns with the test strategy."},
{q:"Name three things that go in a strategy but NOT in a plan.",a:"1) Organization-wide tool standards 2) Regulatory compliance standards (ISO, FDA) 3) Global defect management process applicable to all projects."}
]},

{id:6,code:"S7",title:"Test Case vs Scenario vs Test Script",phase:"i",
overview:`Three terms often confused by beginners — each represents a <em>different level of detail and purpose</em>.<br><br>
<strong>Test Scenario:</strong> What to test (high-level, 1 line).<br>
<strong>Test Case:</strong> How to test (detailed steps, data, expected result).<br>
<strong>Test Script:</strong> Automated code or manual script with exact commands/clicks.<br><br>
Think of it as: Scenario = idea, Test Case = plan, Test Script = execution.`,
oneliners:[
"Test Scenario is the 'what', Test Case is the 'how', and Test Script is the 'do it' — three levels of testing detail.",
"A test script is an automated test case — it is code that executes the test steps automatically.",
"One test scenario can generate multiple test cases; one test case can become one test script.",
"In manual testing, 'test script' often refers to a step-by-step execution guide — not code.",
"Test scenarios are written first, test cases are written next, and test scripts are written last.",
"A test case is the bridge between human-readable scenario and machine-executable test script."
],

bestPractices:["Never use 'test case' and 'test scenario' interchangeably in interviews — they test your understanding.","In manual testing, 'test script' means the execution procedure; in automation, it means code.","Always create test scenarios → get them reviewed → then expand into test cases.","A test script (automated) must mirror its source test case exactly — same steps, same data.","Document the test case ID in the automated test script as a comment for traceability.","Test scenarios are written in plain English; test cases use step-by-step format; scripts use code syntax.","In Agile, test scenarios map to acceptance criteria; test cases map to done criteria.","Keep test scenarios in a separate sheet/column from test cases in your test management tool."],
qa:[
{q:"What is the key difference between a test case and a test scenario?",a:"Test scenario is what to test (1 high-level statement). Test case is how to test (detailed steps, inputs, expected output). One scenario → many test cases."},
{q:"What is a test script in manual testing?",a:"In manual testing, a test script is a detailed step-by-step guide with exact inputs and actions. It is essentially a formalized test case written for direct execution."},
{q:"What is a test script in automation testing?",a:"In automation, a test script is code (Python, Java, JavaScript) written using frameworks like Selenium, Cypress, or Playwright that automatically executes test steps."},
{q:"Can a test scenario have zero test cases?",a:"No. A scenario with no test cases provides zero testing value. Every scenario must result in at least one test case before it can be executed."},
{q:"Who is responsible for creating test scripts in a project?",a:"SDET (Software Development Engineer in Test) or QA Automation Engineers create automated test scripts. Manual QA Engineers create manual test scripts (execution guides)."},
{q:"In Agile, how do user stories relate to test scenarios and test cases?",a:"User stories define the functionality. Test scenarios define the testable conditions of that functionality. Test cases provide the detailed steps to validate each condition."}
]},

{id:7,code:"S8",title:"Entry & Exit Criteria",phase:"i",
overview:`<strong>Entry Criteria</strong> = conditions that MUST be met before testing can BEGIN.<br>
<strong>Exit Criteria</strong> = conditions that MUST be met before testing can END.<br><br>
<strong>Why critical:</strong> Without entry criteria, you test on an unstable build. Without exit criteria, testing never officially ends — causing scope creep and missed deadlines.<br><br>
Entry criteria are like boarding pass checks before a flight. Exit criteria are like landing criteria — conditions that must be met before you declare the flight (testing) complete.`,
oneliners:[
"Entry criteria prevent testing from starting on an incomplete or broken build — they are the 'go' checklist.",
"Exit criteria define when testing is officially done — preventing endless testing and scope creep.",
"Both entry and exit criteria must be defined in the Test Plan before testing begins.",
"A typical entry criterion: 'Build must pass smoke testing before regression begins.'",
"A typical exit criterion: '95% test cases passed and zero critical/high defects open.'",
"Entry and exit criteria are agreed upon by QA Lead, Project Manager, and Product Owner upfront."
],

<text class="ts" x="340" y="292" text-anchor="middle">Entry criteria protect QA; Exit criteria protect the release</text></svg>`,
diagram2SVG:`<svg width="100%" viewBox="0 0 680 200" role="img"><title>Common entry and exit criteria examples</title><desc>Practical examples of entry and exit criteria used in industry</desc>
<g class="c-teal"><rect x="20" y="20" width="300" height="160" rx="8" stroke-width="0.5"/>
<text class="th" x="170" y="50" text-anchor="middle" dominant-baseline="central">Common Entry Criteria</text>
<text class="ts" x="170" y="78" text-anchor="middle" dominant-baseline="central">Build is deployed to test environment</text>
<text class="ts" x="170" y="98" text-anchor="middle" dominant-baseline="central">Smoke test passed (≥80% basic flows)</text>
<text class="ts" x="170" y="118" text-anchor="middle" dominant-baseline="central">Test cases reviewed and approved</text>
<text class="ts" x="170" y="138" text-anchor="middle" dominant-baseline="central">Test data created and loaded</text>
<text class="ts" x="170" y="158" text-anchor="middle" dominant-baseline="central">All blockers from prev. cycle closed</text>
</g>
<g class="c-coral"><rect x="360" y="20" width="300" height="160" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="50" text-anchor="middle" dominant-baseline="central">Common Exit Criteria</text>
<text class="ts" x="510" y="78" text-anchor="middle" dominant-baseline="central">95%+ test cases executed</text>
<text class="ts" x="510" y="98" text-anchor="middle" dominant-baseline="central">Zero open Critical or High defects</text>
<text class="ts" x="510" y="118" text-anchor="middle" dominant-baseline="central">All requirements covered (RTM)</text>
<text class="ts" x="510" y="138" text-anchor="middle" dominant-baseline="central">Test Summary Report completed</text>
<text class="ts" x="510" y="158" text-anchor="middle" dominant-baseline="central">Stakeholder sign-off obtained</text>
</g></svg>`,
bestPractices:["Define entry and exit criteria in the Test Plan — they must be agreed upon before testing starts.","Never begin testing without checking entry criteria — you will waste time on a broken build.","Exit criteria must be measurable — avoid vague statements like 'testing is done'.","Include a deferred bug agreement in exit criteria — which open bugs are acceptable for release.","Document waived criteria clearly — if a criterion is bypassed, explain why in writing.","Use separate entry/exit criteria for Smoke, Regression, UAT, and Performance testing cycles.","Automate smoke testing to quickly validate entry criteria for each new build.","Review and update criteria at each project phase — criteria for development testing differ from UAT."],
qa:[
{q:"What are entry criteria and why are they important?",a:"Entry criteria are conditions that must be satisfied before testing begins. They prevent wasting QA effort on incomplete/broken builds. Example: Build deployed, smoke test passed, test data ready."},
{q:"What happens if a build fails entry criteria?",a:"The build is rejected and returned to the development team. Testing does NOT begin. A defect or build failure report is raised."},
{q:"What is the difference between exit criteria and done criteria?",a:"Exit criteria are formal conditions for ending a testing phase (QA document). Done criteria are Agile-specific conditions for a user story to be considered complete."},
{q:"Give 3 real exit criteria you would use in a sprint.",a:"1) 95% of test cases executed. 2) Zero open Critical or High defects. 3) Test Summary Report submitted and reviewed by Project Manager."},
{q:"Can testing begin if some entry criteria are not met?",a:"Ideally no. But if a waiver is approved by PM and QA Lead (with documented risk acknowledgment), testing may begin. This should be an exception, not the norm."},
{q:"What is a 'deferred defect' in the context of exit criteria?",a:"A deferred defect is a known bug that is accepted for the current release (with stakeholder approval) and scheduled to be fixed in a future sprint/release."}
]},

{id:8,code:"S9",title:"Test Coverage vs Test Artifacts",phase:"a",
overview:`<strong>Test Coverage:</strong> The percentage of requirements, code, or functionality exercised by test cases. It's a measurement of completeness.<br><br>
<strong>Test Artifacts:</strong> All documents, reports, and deliverables produced during the testing lifecycle — the physical evidence of testing work.<br><br>
Coverage answers "How much did we test?" Artifacts answer "What did we produce as evidence of testing?"`,
oneliners:[
"Test coverage measures how much of the application has been tested relative to the total scope.",
"100% requirement coverage means every requirement has at least one test case — not that all tests pass.",
"Test artifacts are the tangible outputs of testing — plans, cases, reports, logs, and defect records.",
"High test coverage with poor-quality test cases is worse than moderate coverage with thorough cases.",
"Code coverage and requirement coverage are different — code coverage needs automation; requirement coverage is manual.",
"Test artifacts serve as the audit trail — they prove testing was done systematically, not randomly."
],

<text class="ts" x="340" y="278" text-anchor="middle">Coverage = measurement; Artifacts = evidence. Both required for quality assurance.</text></svg>`,
diagram2SVG:`<svg width="100%" viewBox="0 0 680 180" role="img"><title>Coverage formula and artifact lifecycle</title><desc>How to calculate coverage and when artifacts are produced</desc><defs><marker id="arr9" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-amber"><rect x="20" y="20" width="300" height="140" rx="8" stroke-width="0.5"/>
<text class="th" x="170" y="50" text-anchor="middle" dominant-baseline="central">Coverage Formula</text>
<text class="ts" x="170" y="80" text-anchor="middle" dominant-baseline="central">Req Coverage = (TCs written / Total reqs) × 100</text>
<text class="ts" x="170" y="104" text-anchor="middle" dominant-baseline="central">Exec Coverage = (TCs executed / TCs written) × 100</text>
<text class="ts" x="170" y="128" text-anchor="middle" dominant-baseline="central">Pass Rate = (TCs passed / TCs executed) × 100</text>
<text class="ts" x="170" y="152" text-anchor="middle" dominant-baseline="central">Target: ≥95% for release</text>
</g>
<g class="c-coral"><rect x="360" y="20" width="300" height="140" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="50" text-anchor="middle" dominant-baseline="central">Artifact Timeline</text>
<text class="ts" x="510" y="78" text-anchor="middle" dominant-baseline="central">Planning → Test Plan, Strategy</text>
<text class="ts" x="510" y="100" text-anchor="middle" dominant-baseline="central">Design → Scenarios, Test Cases, RTM</text>
<text class="ts" x="510" y="122" text-anchor="middle" dominant-baseline="central">Execution → Reports, Defect Logs</text>
<text class="ts" x="510" y="144" text-anchor="middle" dominant-baseline="central">Closure → Summary, Metrics</text>
</g></svg>`,
bestPractices:["Aim for 100% requirement coverage at the scenario level, then expand test cases.","Track coverage in the RTM — it's your primary coverage measurement tool.","Don't confuse code coverage (automation metric) with functional coverage (manual testing metric).","All test artifacts must be version-controlled and stored in a centralized repository.","Test artifacts are mandatory for regulated projects — they form the audit trail.","Never delete old test artifacts — archive them for regression and audit purposes.","Produce a Test Closure Report at project end — it summarizes coverage and lessons learned.","Coverage without quality is meaningless — ensure test cases actually validate the requirement."],
qa:[
{q:"What is test coverage and how do you measure it?",a:"Test coverage measures how much of the application is tested. Formula: (Test cases written / Total requirements) × 100. Aim for ≥95%."},
{q:"What is the difference between requirement coverage and code coverage?",a:"Requirement coverage measures if all requirements have test cases (manual testing focus). Code coverage measures which lines/branches of code are executed by tests (automation focus)."},
{q:"Name 5 test artifacts produced during a project.",a:"Test Plan, Test Scenarios, Test Cases, RTM, Defect Reports, Test Execution Reports, Test Summary Report, Test Closure Report."},
{q:"What is a test closure report?",a:"A test closure report is produced at the end of the project. It contains final coverage metrics, lessons learned, defect statistics, and formal acknowledgment that testing is complete."},
{q:"Why is 100% code coverage not enough to guarantee quality?",a:"100% code coverage means all code lines are executed, but it doesn't verify that the right thing is being tested or that the output is correct. You can have 100% code coverage and still miss functional bugs."},
{q:"Which artifact links requirements to test cases?",a:"The RTM (Requirements Traceability Matrix) links requirements to test cases bidirectionally. It is the primary coverage and traceability artifact."}
]},

{id:9,code:"S10",title:"Effort Estimation",phase:"a",
overview:`<strong>Effort Estimation</strong> is the process of calculating the time, resources, and cost required to complete all testing activities in a project.<br><br>
<strong>Why critical:</strong> Without accurate estimation, projects miss deadlines, QA teams are understaffed, and quality suffers.<br><br>
Key activities to estimate: Test planning, test case design, test environment setup, test execution, defect reporting, regression testing, test reporting, and meetings.`,
oneliners:[
"Effort estimation prevents under-resourcing the QA team — it is the foundation of project planning.",
"Common estimation techniques: Expert Judgment, Work Breakdown Structure (WBS), and Three-Point Estimation.",
"Always add 20-30% buffer to your estimates to account for defect retesting and scope changes.",
"Testing effort is typically 20-30% of total project effort in waterfall; 15-20% in Agile.",
"Effort is measured in Person-Days or Person-Hours — always specify which unit you are using.",
"The most common cause of missed deadlines is underestimated regression testing effort."
],
diagramSVG:`<svg width="100%" viewBox="0 0 680 320" role="img"><title>Testing effort breakdown</title><desc>Pie-chart style breakdown of effort across testing activities</desc>
<g class="c-purple"><rect x="20" y="20" width="300" height="280" rx="8" stroke-width="0.5"/>
<text class="th" x="170" y="50" text-anchor="middle" dominant-baseline="central">Effort Distribution</text>

<text class="ts" x="170" y="104" text-anchor="middle" dominant-baseline="central">Test Case Design</text><text class="ts" x="280" y="104" text-anchor="middle" dominant-baseline="central">20%</text>
<text class="ts" x="170" y="128" text-anchor="middle" dominant-baseline="central">Test Environment Setup</text><text class="ts" x="280" y="128" text-anchor="middle" dominant-baseline="central">5%</text>
<text class="ts" x="170" y="152" text-anchor="middle" dominant-baseline="central">Test Execution (first pass)</text><text class="ts" x="280" y="152" text-anchor="middle" dominant-baseline="central">30%</text>
<text class="ts" x="170" y="176" text-anchor="middle" dominant-baseline="central">Defect Reporting &amp; Retesting</text><text class="ts" x="280" y="176" text-anchor="middle" dominant-baseline="central">15%</text>
<text class="ts" x="170" y="200" text-anchor="middle" dominant-baseline="central">Regression Testing</text><text class="ts" x="280" y="200" text-anchor="middle" dominant-baseline="central">10%</text>
<text class="ts" x="170" y="224" text-anchor="middle" dominant-baseline="central">Test Reporting &amp; Closure</text><text class="ts" x="280" y="224" text-anchor="middle" dominant-baseline="central">5%</text>
<text class="ts" x="170" y="248" text-anchor="middle" dominant-baseline="central">Meetings &amp; Reviews</text><text class="ts" x="280" y="248" text-anchor="middle" dominant-baseline="central">5%</text>
<text class="ts" x="170" y="280" text-anchor="middle" dominant-baseline="central">Total: 100% · + 20% buffer</text>
</g>
<g class="c-teal"><rect x="360" y="20" width="300" height="130" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="50" text-anchor="middle" dominant-baseline="central">Three-Point Estimation</text>
<text class="ts" x="510" y="78" text-anchor="middle" dominant-baseline="central">O = Optimistic (best case)</text>
<text class="ts" x="510" y="98" text-anchor="middle" dominant-baseline="central">M = Most likely (realistic)</text>
<text class="ts" x="510" y="118" text-anchor="middle" dominant-baseline="central">P = Pessimistic (worst case)</text>
<text class="ts" x="510" y="138" text-anchor="middle" dominant-baseline="central">E = (O + 4M + P) / 6</text>
</g>
<g class="c-amber"><rect x="360" y="165" width="300" height="135" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="193" text-anchor="middle" dominant-baseline="central">WBS Estimation Steps</text>
<text class="ts" x="510" y="220" text-anchor="middle" dominant-baseline="central">1. Break work into tasks</text>
<text class="ts" x="510" y="240" text-anchor="middle" dominant-baseline="central">2. Estimate each task separately</text>
<text class="ts" x="510" y="260" text-anchor="middle" dominant-baseline="central">3. Sum all task estimates</text>
<text class="ts" x="510" y="280" text-anchor="middle" dominant-baseline="central">4. Add 20% risk buffer</text>
</g>
<text class="ts" x="340" y="310" text-anchor="middle">Never estimate the whole project at once — break down, then sum up</text></svg>`,

bestPractices:["Always break the testing work into individual tasks before estimating — never estimate the whole project at once.","Use historical data from similar past projects to benchmark your estimates.","Add 20-30% buffer for defect retesting, scope changes, and environment issues.","Get input from senior QA engineers or SMEs — use expert judgment alongside formulas.","Communicate your assumptions when presenting estimates — state what is included and excluded.","Review and revise estimates when requirements change — estimates are not fixed contracts.","Track actuals vs estimates — this data improves future estimation accuracy.","Include meeting time, reviews, documentation time in estimates — these are often forgotten."],
qa:[
{q:"What is effort estimation in testing?",a:"Effort estimation is calculating the time and resources needed to complete all testing activities — planning, design, execution, reporting, and closure."},
{q:"What is the Three-Point Estimation formula?",a:"E = (O + 4M + P) / 6 where O = Optimistic, M = Most Likely, P = Pessimistic. It gives a weighted average that accounts for best and worst case scenarios."},
{q:"What percentage of project effort is typically allocated to testing?",a:"In Waterfall: 20-30% of total project effort. In Agile: 15-20% per sprint. These vary by project risk level and domain."},
{q:"How do you estimate test cases for a new feature?",a:"Count the requirements/user stories, estimate 3-5 test cases per requirement, multiply by average test case writing time (15-30 min each), add review and execution time."},
{q:"What is a person-day in testing effort estimation?",a:"One person-day = 8 hours of work by one tester. If a task takes 16 hours, it is 2 person-days (one person for 2 days, or two people for 1 day)."},
{q:"What factors affect testing effort?",a:"Requirement complexity, number of test cases, team skill level, tool availability, environment stability, number of regression cycles, and defect density from previous builds."}
]},

{id:10,code:"S11",title:"Bug vs Defect vs Issue vs Error vs Failure",phase:"a",
overview:`Five terms that appear identical to beginners but have precise meanings in the software quality domain. Mixing them up in interviews is a red flag.<br><br>
<strong>Error:</strong> Human mistake (developer wrote wrong code).<br>
<strong>Defect/Bug:</strong> The flaw in code caused by the error.<br>
<strong>Failure:</strong> What the end user experiences when the defect executes.<br>
<strong>Issue:</strong> A broad term for any problem (may or may not be a defect).<br><br>
Memory trick: Error → Defect → Failure (cause → code problem → user impact).`,
oneliners:[
"An error is a human mistake; a defect is the result of that mistake in the code; a failure is what the user experiences.",
"Bug and defect are synonymous in most industry contexts — both mean a flaw in the software product.",
"An issue is broader than a defect — it can include environment problems, test data problems, or unclear requirements.",
"Failure is the visible symptom; defect is the root cause hidden in the code.",
"A defect found in the development phase is 10x cheaper to fix than one found by the end user.",
"An error that is never triggered does not cause a failure — defects only become failures during execution."
],

bestPractices:["Always use the correct term in defect reports — 'defect' is more professional than 'bug' in formal documents.","Defect reports must include: ID, title, severity, priority, steps to reproduce, expected vs actual, screenshots, build version.","Never close a defect without retesting — retest must be done by the same tester who raised it.","Use defect aging reports to track open bugs that are not being fixed promptly.","Categorize defects by type: UI, Functional, Performance, Security — this enables root cause analysis.","Track defect density per module — high defect density modules need extra attention.","Differentiate between Not a Bug, Cannot Reproduce, Duplicate, and Deferred in defect status — each means something different.","The cost of fixing a bug increases 10× at each stage: Dev → QA → UAT → Production."],

{q:"What is the difference between bug and defect?",a:"In common usage, bug and defect are synonymous — both mean a flaw in the software. Formally, an error (human mistake) causes a defect (code flaw) which causes a failure (user-visible problem)."},
{q:"What is the difference between severity and priority?",a:"Severity = technical impact of the bug (Critical/Major/Minor/Trivial). Priority = business urgency to fix it (High/Medium/Low). A cosmetic bug on the homepage can be Low Severity but High Priority."},
{q:"Walk me through the defect lifecycle.",a:"New → Assigned (to developer) → Open (being fixed) → Fixed → Retest (by QA) → Closed. Other statuses: Rejected (not a bug), Duplicate, Deferred (fix in future), Cannot Reproduce."},
{q:"What is a 'showstopper' defect?",a:"A showstopper (Critical) defect completely blocks testing or a core business function. Example: Login is broken — no further testing can proceed. Must be fixed before testing continues."},
{q:"What is meant by 'Not a Bug' status?",a:"'Not a Bug' means the reported behavior is working as designed/per requirements. The QA engineer may have misunderstood the requirement or the business decided to accept the behavior."},
{q:"What is defect density and why does it matter?",a:"Defect Density = Total defects / Size of module (in lines of code or features). High defect density in a module indicates poor code quality and signals that more testing is needed in that area."}
]}

let current=0;
const visited=new Set([0]);

function renderDots(){
  const c=document.getElementById('prog-dots');
  c.innerHTML='';
  sessions.forEach((s,i)=>{
    const d=document.createElement('span');
    d.className='prog-dot '+(i===current?'active':visited.has(i)?'done':'todo');
    d.title='S'+(i+1)+': '+s.title;
    d.onclick=()=>goTo(i);
    c.appendChild(d);
  });
  document.getElementById('prog-label').textContent='Session '+(current+1)+' of '+sessions.length;
}

function goTo(i){
  current=i;visited.add(i);
  document.querySelectorAll('.tab-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  document.querySelectorAll('.session').forEach((s,j)=>s.classList.toggle('active',j===i));
  renderDots();
}

function nextTab(){
  if(current<sessions.length-1)goTo(current+1);
}

const tabBar=document.getElementById('tab-bar');
const container=document.getElementById('sessions-container');

sessions.forEach((s,i)=>{
  const btn=document.createElement('button');
  btn.className='tab-btn'+(i===0?' active':'');
  btn.innerHTML='<span class="badge badge-'+s.phase+'">'+s.code+'</span>'+s.title;
  btn.onclick=()=>goTo(i);
  tabBar.appendChild(btn);

  const div=document.createElement('div');
  div.className='session'+(i===0?' active':'');
  div.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <span class="badge badge-${s.phase}">${s.code}</span>
      <span style="font-size:16px;font-weight:500">${s.title}</span>
    </div>
    <div class="section-title">Overview — What / Why / When / Where / How</div>
    <div class="def-box">${s.overview}</div>
    <div class="section-title">Interview one-liners (say these confidently)</div>
    <ul class="oneliner-list">${s.oneliners.map(l=>'<li><em>→</em> '+l+'</li>').join('')}</ul>
    <div class="section-title">Architecture / Visual Diagrams</div>
    <div class="diagram-wrap">${s.diagramSVG}</div>
    <div class="diagram-wrap" style="margin-top:8px">${s.diagram2SVG}</div>
    <div class="section-title">Best Practices — Industry Checklist</div>
    <ul class="checklist">${s.bestPractices.map(p=>'<li>'+p+'</li>').join('')}</ul>
    <div class="section-title">Interview Prep — 6 SDET Q&amp;A</div>
    <div class="qa-grid">${s.qa.map(q=>'<div class="qa-card"><div class="q">Q: '+q.q+'</div><div class="a">A: '+q.a+'</div></div>').join('')}</div>
  `;
  container.appendChild(div);
});

renderDots();
</script>

    <!-- PRISM DYNAMIC HIGHLIGHT FIX -->
    <script>
    if (window.Prism) {
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new MutationObserver((mutations) => {
                let needsHighlight = false;
                mutations.forEach(m => {
                    if (m.addedNodes.length) {
                        m.addedNodes.forEach(n => {
                            if (n.nodeName === 'PRE' || n.nodeName === 'CODE') needsHighlight = true;
                            if (n.querySelector && n.querySelector('pre')) needsHighlight = true;
                        });
                    }
                });
                if (needsHighlight) {
                    Prism.highlightAll();
                }
            });
            observer.observe(document.body, { childList: true, subtree: true });
        });
    }
    </script>
