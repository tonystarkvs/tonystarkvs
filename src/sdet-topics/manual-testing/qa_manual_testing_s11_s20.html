<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --border-radius-lg:12px;
  --border-radius-md:8px;
  --color-background-primary:#ffffff;
  --color-background-secondary:#f4f4f8;
  --color-border-primary:#534AB7;
  --color-border-secondary:#d1d1db;
  --color-border-tertiary:#e4e4eb;
  --color-text-primary:#1a1a2e;
  --color-text-secondary:#555770;
  --color-text-tertiary:#8e90a6;
  --font-sans:'Segoe UI',system-ui,-apple-system,sans-serif;

body{font-family:var(--font-sans);background:transparent;color:var(--color-text-primary)}
.container{max-width:680px;padding:0}
.phase-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.phase-label{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;letter-spacing:.4px}
.phase-f{background:#EEEDFE;color:#3C3489}
.phase-i{background:#E1F5EE;color:#085041}
.phase-a{background:#FAECE7;color:#712B13}
.tab-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px}
.tab-btn{font-size:12px;padding:5px 10px;border-radius:6px;border:.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;transition:all .18s;font-family:var(--font-sans);white-space:nowrap}
.tab-btn:hover{background:var(--color-background-primary);color:var(--color-text-primary)}
.tab-btn.active{background:var(--color-background-primary);color:var(--color-text-primary);border-color:var(--color-border-primary);font-weight:500}
.tab-btn.done::after{content:"✓";margin-left:4px;color:#1D9E75;font-size:10px}
.progress-bar{height:4px;background:var(--color-border-tertiary);border-radius:2px;margin-bottom:18px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#534AB7,#1D9E75);border-radius:2px;transition:width .4s}
.session{display:none}
.session.active{display:block}
.session-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:.5px solid var(--color-border-tertiary)}
.session-number{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.sn-f{background:#EEEDFE;color:#534AB7}
.sn-i{background:#E1F5EE;color:#0F6E56}
.sn-a{background:#FAECE7;color:#993C1D}
.session-title{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.session-phase{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
.section-label{font-size:11px;font-weight:500;letter-spacing:.8px;color:var(--color-text-tertiary);text-transform:uppercase;margin:16px 0 8px}
.overview-card{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:12px 14px;border:.5px solid var(--color-border-tertiary);margin-bottom:4px}
.overview-card p{font-size:13px;line-height:1.7;color:var(--color-text-primary);margin-bottom:8px}
.overview-card p:last-child{margin-bottom:0}
.wwwh{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.wwwh-item{background:var(--color-background-primary);border-radius:var(--border-radius-md);padding:8px 10px;border:.5px solid var(--color-border-tertiary)}
.wwwh-label{font-size:10px;font-weight:500;letter-spacing:.6px;color:var(--color-text-tertiary);margin-bottom:3px;text-transform:uppercase}
.wwwh-text{font-size:12px;color:var(--color-text-primary);line-height:1.5}
.oneliner-list{display:flex;flex-direction:column;gap:5px}
.oneliner{display:flex;align-items:flex-start;gap:8px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:9px 11px;border:.5px solid var(--color-border-tertiary)}
.ol-num{font-size:11px;font-weight:500;color:#534AB7;min-width:16px;margin-top:1px}
.ol-text{font-size:13px;color:var(--color-text-primary);line-height:1.5}
.diagram-box{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:12px;border:.5px solid var(--color-border-tertiary);overflow-x:auto;margin-bottom:8px}
.checklist{display:flex;flex-direction:column;gap:4px}
.check-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--color-text-primary);padding:7px 10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);line-height:1.5}
.check-icon{color:#1D9E75;font-size:14px;flex-shrink:0;margin-top:1px}
.qa-list{display:flex;flex-direction:column;gap:6px}
.qa-item{border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden}
.qa-q{display:flex;align-items:flex-start;gap:8px;padding:9px 11px;cursor:pointer;background:var(--color-background-secondary)}
.qa-q:hover{background:var(--color-background-primary)}
.qa-label{font-size:11px;font-weight:500;color:#993C1D;min-width:14px;margin-top:1px}
.qa-q-text{font-size:13px;font-weight:500;color:var(--color-text-primary);flex:1;line-height:1.5}
.qa-toggle{font-size:14px;color:var(--color-text-tertiary);transition:transform .2s}
.qa-answer{display:none;padding:9px 11px;font-size:13px;color:var(--color-text-secondary);line-height:1.6;border-top:.5px solid var(--color-border-tertiary);background:var(--color-background-primary)}
.qa-item.open .qa-answer{display:block}
.qa-item.open .qa-toggle{transform:rotate(180deg)}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:12px;border-top:.5px solid var(--color-border-tertiary)}
.nav-btn{font-size:13px;padding:6px 14px;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer;font-family:var(--font-sans)}
.nav-btn:hover{background:var(--color-background-primary)}
.nav-btn.primary{background:#534AB7;color:#fff;border-color:#534AB7}
.nav-btn.primary:hover{background:#3C3489}
.session-counter{font-size:12px;color:var(--color-text-tertiary)}
.concept-text{font-size:13px;line-height:1.7;color:var(--color-text-primary);margin-bottom:8px}
svg text{font-family:var(--font-sans)!important}

.c-amber rect{fill:#FAEEDA;stroke:#EF9F27;stroke-width:1.5}
.c-coral rect{fill:#FAECE7;stroke:#F0997B;stroke-width:1.5}
.c-gray rect{fill:#f4f4f8;stroke:#d1d1db;stroke-width:1.5}
.c-green rect{fill:#EAF3DE;stroke:#97C459;stroke-width:1.5}
.c-purple rect{fill:#EEEDFE;stroke:#AFA9EC;stroke-width:1.5}
.c-red rect{fill:#FDE8E8;stroke:#DC3545;stroke-width:1.5}
.c-teal rect{fill:#E1F5EE;stroke:#5DCAA5;stroke-width:1.5}
svg .th{font-weight:600;fill:var(--color-text-primary);font-family:var(--font-sans);font-size:13px}
svg .ts{font-size:11px;fill:var(--color-text-secondary);font-family:var(--font-sans)}

const sessions=[
{id:11,phase:"Fundamentals",color:"f",title:"Manual vs Automation Testing",
overview:{def:"Manual testing is executed by a human tester without tools. Automation testing uses scripts and tools (Selenium, Cypress, etc.) to run tests automatically. Both are essential — they complement, not replace, each other.",
wwwh:[
{l:"What",t:"Two modes of executing test cases: human-driven vs tool-driven"},
{l:"Why",t:"Manual for judgment/usability; Automation for speed/repetition"},
{l:"When",t:"Manual: exploratory, adhoc, UAT. Automation: regression, CI/CD"},
{l:"Where",t:"Manual: UI/UX testing. Automation: API, DB, performance, regression"},
{l:"How",t:"Manual: tester follows steps. Auto: script runs cases via tool"}]},
oneliners:[
"Automate what is repetitive; manually test what requires human judgment.",
"Automation is fast but dumb — it only tests what you programmed it to test.",
"Manual testing finds what automation misses; automation scales what manual can't.",
"ROI of automation = (manual test time saved × runs) minus automation build cost.",
"Never automate a test you don't understand manually first."
],
concept:"Manual testing relies on human observation, intuition, and creativity. Automation testing uses coded scripts to simulate user actions and verify outcomes at speed. The decision matrix: if a test runs > 3 times, automate it. If it needs human perception (look & feel, accessibility judgment), keep it manual. The best teams use both in a pyramid: lots of automated unit tests at base, manual exploratory at top.",
diagrams:[
`<svg width="100%" viewBox="0 0 680 200" role="img"><title>Manual vs Automation comparison</title><desc>Side-by-side comparison of manual and automation testing characteristics</desc><defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-purple"><rect x="20" y="20" width="300" height="165" rx="12" stroke-width="0.5"/><text class="th" x="170" y="46" text-anchor="middle" dominant-baseline="central">Manual testing</text><text class="ts" x="170" y="70" text-anchor="middle">Human executes test cases</text><text class="ts" x="170" y="90" text-anchor="middle">Best for: exploratory, usability, UAT</text><text class="ts" x="170" y="110" text-anchor="middle">Slow but flexible &amp; creative</text><text class="ts" x="170" y="130" text-anchor="middle">Tools: Jira, TestRail, Excel</text><text class="ts" x="170" y="152" text-anchor="middle">No scripting required</text></g>
<g class="c-teal"><rect x="360" y="20" width="300" height="165" rx="12" stroke-width="0.5"/><text class="th" x="510" y="46" text-anchor="middle" dominant-baseline="central">Automation testing</text><text class="ts" x="510" y="70" text-anchor="middle">Script executes test cases</text><text class="ts" x="510" y="90" text-anchor="middle">Best for: regression, smoke, API</text><text class="ts" x="510" y="110" text-anchor="middle">Fast, consistent, scalable</text><text class="ts" x="510" y="130" text-anchor="middle">Tools: Selenium, Cypress, JUnit</text><text class="ts" x="510" y="152" text-anchor="middle">High initial investment</text></g>
<text class="ts" x="340" y="108" text-anchor="middle">vs</text></svg>`,
`<svg width="100%" viewBox="0 0 680 240" role="img"><title>Test automation pyramid</title><desc>Pyramid showing unit tests at base, integration in middle, UI manual at top</desc><defs><marker id="ar2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-purple"><polygon points="340,20 200,80 480,80" stroke-width="0.5"/><text class="th" x="340" y="56" text-anchor="middle" dominant-baseline="central">Manual/UI</text></g>
<g class="c-teal"><polygon points="200,82 140,140 540,140 480,82" stroke-width="0.5"/><text class="th" x="340" y="114" text-anchor="middle" dominant-baseline="central">Integration tests</text></g>
<g class="c-amber"><polygon points="140,142 80,200 600,200 540,142" stroke-width="0.5"/><text class="th" x="340" y="174" text-anchor="middle" dominant-baseline="central">Unit tests (most automated, cheapest)</text></g>
<text class="ts" x="340" y="220" text-anchor="middle">Automation pyramid: automate more at bottom, less at top</text></svg>`
],
practices:["Automate regression suites first — they run every sprint","Never automate an unstable feature — wait for it to stabilize","Manual exploratory sessions should be time-boxed: 30–60 min charter-based","Maintain automation scripts as code — version control them in Git","Calculate automation ROI before investing: (time saved × runs) > build cost","Use Page Object Model (POM) for UI automation to reduce maintenance","Manual test cases should exist before automation scripts are written","Always have a manual fallback for critical paths in case automation infra fails"],
qa:[
{q:"What is the difference between manual and automation testing?",a:"Manual: a human executes test cases without tools, relying on judgment. Automation: scripts execute test cases using tools like Selenium or Cypress. Manual is flexible; automation is fast and repeatable."},
{q:"When should you NOT automate a test?",a:"When the test runs rarely (one-time), when UI changes frequently, when human judgment is essential (usability), when the ROI is negative, or when the feature is still unstable/changing."},
{q:"What is the automation testing pyramid?",a:"Unit tests (base — most automated, cheapest, fastest) → Integration tests (middle) → UI/Manual tests (top — fewest, most expensive). More automation at the bottom reduces the cost of quality."},
{q:"What tools are used for test automation?",a:"UI: Selenium, Cypress, Playwright. API: Postman, RestAssured. Performance: JMeter, Gatling. Mobile: Appium. Unit: JUnit, TestNG, pytest. CI/CD integration: Jenkins, GitHub Actions."},
{q:"What is the ROI formula for test automation?",a:"ROI = (Time saved per run × Number of runs − Automation development cost) / Automation development cost × 100%. Positive ROI = automation is worth it."},
{q:"What is the Page Object Model (POM)?",a:"A design pattern for UI automation where each page has a class representing it, with locators and methods as properties. Reduces duplication, improves maintainability when the UI changes."}
]},

{id:12,phase:"Fundamentals",color:"f",title:"Black Box vs White Box vs Gray Box",
overview:{def:"Black box tests behavior without knowing the internal code. White box tests internal logic with full code access. Gray box is a hybrid — partial knowledge of internals used to design better tests.",
wwwh:[
{l:"What",t:"Three testing approaches based on tester's knowledge of code internals"},
{l:"Why",t:"Different perspectives catch different defects — all three are needed"},
{l:"When",t:"Black: system/UAT. White: unit/integration. Gray: integration/security"},
{l:"Where",t:"Black: QA testers. White: developers. Gray: senior QA/security testers"},
{l:"How",t:"Black: I/O only. White: code paths, branches. Gray: partial code insight"}]},
oneliners:[
"Black box: test the what, not the how — behavior only, no code access.",
"White box: test the how — every code path, branch, and condition must be covered.",
"Gray box: the best of both — behavioral tests informed by internal knowledge.",
"Black box finds missing features; white box finds logic errors in existing code.",
"In an interview: black = functional tester; white = developer testing; gray = SDET."
],
concept:"Black box = you see inputs and outputs only, like a user. White box = you see inside the code — you can test every branch, loop, and condition. Gray box sits between — a QA engineer with access to DB schemas or API internals uses that knowledge to design better black-box tests. Security testing and integration testing heavily use gray box.",
diagrams:[
`<svg width="100%" viewBox="0 0 680 190" role="img"><title>Black white gray box testing comparison</title><desc>Three boxes showing tester visibility for each testing type</desc><defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-gray"><rect x="20" y="30" width="190" height="140" rx="10" stroke-width="0.5"/><text class="th" x="115" y="56" text-anchor="middle" dominant-baseline="central">Black box</text><text class="ts" x="115" y="76" text-anchor="middle">No code access</text><text class="ts" x="115" y="96" text-anchor="middle">Input → Output only</text><text class="ts" x="115" y="116" text-anchor="middle">Tester: QA/user</text><text class="ts" x="115" y="136" text-anchor="middle">Techniques: BVA, EP</text><text class="ts" x="115" y="156" text-anchor="middle">Level: System, UAT</text></g>
<g class="c-teal"><rect x="245" y="30" width="190" height="140" rx="10" stroke-width="0.5"/><text class="th" x="340" y="56" text-anchor="middle" dominant-baseline="central">White box</text><text class="ts" x="340" y="76" text-anchor="middle">Full code access</text><text class="ts" x="340" y="96" text-anchor="middle">Tests code paths/branches</text><text class="ts" x="340" y="116" text-anchor="middle">Tester: developer/SDET</text><text class="ts" x="340" y="136" text-anchor="middle">Techniques: coverage</text><text class="ts" x="340" y="156" text-anchor="middle">Level: Unit, Integration</text></g>
<g class="c-purple"><rect x="470" y="30" width="190" height="140" rx="10" stroke-width="0.5"/><text class="th" x="565" y="56" text-anchor="middle" dominant-baseline="central">Gray box</text><text class="ts" x="565" y="76" text-anchor="middle">Partial code access</text><text class="ts" x="565" y="96" text-anchor="middle">DB/API schema known</text><text class="ts" x="565" y="116" text-anchor="middle">Tester: senior QA/SDET</text><text class="ts" x="565" y="136" text-anchor="middle">Techniques: hybrid</text><text class="ts" x="565" y="156" text-anchor="middle">Level: Integration, security</text></g></svg>`,
`<svg width="100%" viewBox="0 0 680 160" role="img"><title>White box coverage types</title><desc>Diagram showing statement, branch, and path coverage in white box testing</desc><defs><marker id="ar2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="ts" x="340" y="18" text-anchor="middle">White box coverage hierarchy</text>
<g class="c-amber"><rect x="270" y="28" width="140" height="36" rx="6" stroke-width="0.5"/><text class="th" x="340" y="46" text-anchor="middle" dominant-baseline="central">Statement coverage</text></g>
<line x1="340" y1="64" x2="340" y2="80" stroke="var(--color-border-secondary)" stroke-width="0.5" marker-end="url(#ar2)"/>
<g class="c-teal"><rect x="240" y="80" width="200" height="36" rx="6" stroke-width="0.5"/><text class="th" x="340" y="98" text-anchor="middle" dominant-baseline="central">Branch / decision coverage</text></g>
<line x1="340" y1="116" x2="340" y2="132" stroke="var(--color-border-secondary)" stroke-width="0.5" marker-end="url(#ar2)"/>
<g class="c-purple"><rect x="230" y="132" width="220" height="22" rx="6" stroke-width="0.5"/><text class="th" x="340" y="143" text-anchor="middle" dominant-baseline="central">Path / condition coverage (strongest)</text></g></svg>`
],
practices:["Always start with black box testing — match user perspective first","Use equivalence partitioning and boundary value analysis in black box","For white box: aim for minimum 80% branch coverage in critical modules","Gray box is ideal for API testing — know the schema, test like a user","Combine all three: black box for requirements coverage, white for code coverage","Never skip white box on security-critical code paths","Document which coverage type each test suite targets","Use SonarQube or Jacoco for automated white box coverage measurement"],
qa:[
{q:"What is black box testing?",a:"Testing where the tester has no knowledge of internal code. Tests are based only on inputs and expected outputs — simulating end-user behavior. Techniques: BVA, equivalence partitioning, decision table testing."},
{q:"What is white box testing?",a:"Testing where the tester has full access to source code and tests internal logic — all statements, branches, loops, and conditions. Also called structural or glass box testing. Done by developers or SDETs."},
{q:"What is gray box testing?",a:"A hybrid approach where the tester has partial internal knowledge (e.g., database schema, API contracts, architecture docs) and uses it to design more effective tests. Common in integration and security testing."},
{q:"What are white box coverage techniques?",a:"Statement coverage (every line executed), Branch coverage (every true/false branch), Condition coverage (every boolean sub-expression), Path coverage (every unique execution path — most thorough)."},
{q:"Which box approach does a QA engineer typically use?",a:"Primarily black box — testing behavior against requirements without code access. Gray box is used by senior QAs and SDETs who have architectural knowledge. White box is primarily developer-driven."},
{q:"What is the difference between BVA and equivalence partitioning?",a:"Equivalence Partitioning divides inputs into valid/invalid groups and tests one value per group. Boundary Value Analysis tests at the edges of partitions (min, min+1, max-1, max). Both are black box design techniques."}
]},

{id:13,phase:"Fundamentals",color:"f",title:"Functional vs Non-Functional Testing",

wwwh:[
{l:"What",t:"Two fundamental dimensions of software quality testing"},
{l:"Why",t:"A product can function correctly but fail in production under load"},
{l:"When",t:"Functional: throughout SDLC. Non-functional: after functional stability"},
{l:"Where",t:"Functional: all features. Non-functional: performance, security, UX"},
{l:"How",t:"Functional: test cases vs requirements. Non-functional: benchmarks/metrics"}]},
oneliners:[
"Functional testing verifies 'does it work?' — non-functional asks 'does it work well?'",
"A login feature can be functionally correct but too slow to be usable — that's non-functional failure.",
"Non-functional defects kill products in production; functional defects kill them in testing.",
"Performance, security, and usability are not afterthoughts — test them early.",
"Functional = what. Non-functional = how well, how fast, how safe, how usable."
],
concept:"Functional testing maps directly to requirements: does the login button log me in? Non-functional testing measures quality attributes (ISO 25010): performance (how fast?), reliability (how often does it fail?), security (can it be hacked?), usability (can a user figure it out?), compatibility (does it work on all browsers/devices?). Both are essential before release.",
diagrams:[

practices:["Always define non-functional requirements (NFRs) before sprint starts — not as afterthoughts","Set measurable NFR thresholds: 'page load < 2 seconds under 1000 concurrent users'","Run performance testing in a production-like environment, not dev boxes","Automate functional regression; use tools like JMeter for non-functional load tests","Never release without at least a basic security scan (OWASP ZAP, SonarQube)","Track non-functional test results as metrics — not just pass/fail","Involve UX designers in usability test planning","Add non-functional test gates to CI/CD pipelines — fail the build on NFR breach"],
qa:[
{q:"What is functional testing?",a:"Testing that verifies the software performs its intended functions correctly — login works, payment processes, data saves. It validates behavior against business requirements and functional specifications."},
{q:"What is non-functional testing?",a:"Testing that measures how well the system performs its functions — speed, security, usability, reliability, scalability. It evaluates quality attributes beyond just 'does it work.'"},
{q:"Give 5 examples of non-functional testing types.",a:"1. Performance testing (load, stress, spike), 2. Security testing (pen testing, SAST, DAST), 3. Usability testing (user experience), 4. Compatibility/cross-browser testing, 5. Accessibility testing (WCAG compliance)."},
{q:"What is a non-functional requirement (NFR)?",a:"A requirement that specifies how a system should behave rather than what it should do. Examples: 'The system shall respond within 2 seconds for 95% of requests under 500 concurrent users.'"},
{q:"Which comes first — functional or non-functional testing?",a:"Functional testing comes first. Non-functional testing is performed once the system is functionally stable. Testing performance on a broken feature wastes time and produces meaningless results."},
{q:"What ISO standard defines non-functional quality characteristics?",a:"ISO/IEC 25010 (SQuaRE model) defines 8 product quality characteristics: Functional suitability, Performance efficiency, Compatibility, Usability, Reliability, Security, Maintainability, Portability."}
]},

{id:14,phase:"Intermediate",color:"i",title:"Unit vs Integration vs System vs UAT",
overview:{def:"Four levels of testing that form the testing hierarchy — each level has a different scope, owner, and purpose. Together they provide complete coverage of the software from individual functions to business acceptance.",
wwwh:[
{l:"What",t:"4 hierarchical test levels covering code to business acceptance"},
{l:"Why",t:"Each level catches different types of defects at the right cost"},
{l:"When",t:"Unit → Integration → System → UAT — sequential in the V-Model"},
{l:"Where",t:"Unit: dev machine. Integration: test env. System: staging. UAT: prod-like"},
{l:"How",t:"Unit: isolated functions. Integration: combined modules. System: end-to-end. UAT: real users"}]},
oneliners:[
"Unit tests: test one function in isolation — fast, cheap, developer-owned.",
"Integration tests: test how modules talk to each other — catch interface defects.",
"System testing: test the full application end-to-end — QA-owned.",
"UAT: 'Does this solve the business problem?' — business/user-owned.",
"The earlier the test level, the cheaper to fix defects found there."
],
concept:"Unit testing tests the smallest piece of code (a function or method) in isolation. Integration testing tests how two or more modules interact — does the payment module talk correctly to the order module? System testing tests the entire integrated application against requirements. UAT (User Acceptance Testing) is where the business validates the software solves their problem before go-live.",
diagrams:[
`<svg width="100%" viewBox="0 0 680 180" role="img"><title>Four test levels hierarchy</title><desc>Pyramid showing unit tests at base rising to UAT at top</desc><defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-purple"><polygon points="340,15 270,48 410,48" stroke-width="0.5"/><text class="th" x="340" y="36" text-anchor="middle" dominant-baseline="central">UAT</text></g>
<g class="c-teal"><polygon points="270,50 220,84 460,84 410,50" stroke-width="0.5"/><text class="th" x="340" y="68" text-anchor="middle" dominant-baseline="central">System testing</text></g>
<g class="c-coral"><polygon points="220,86 155,120 525,120 460,86" stroke-width="0.5"/><text class="th" x="340" y="104" text-anchor="middle" dominant-baseline="central">Integration testing</text></g>
<g class="c-amber"><polygon points="155,122 80,158 600,158 525,122" stroke-width="0.5"/><text class="th" x="340" y="142" text-anchor="middle" dominant-baseline="central">Unit testing (most, fastest, cheapest)</text></g>
<text class="ts" x="340" y="174" text-anchor="middle">Broader scope and cost as you go up</text></svg>`,
`<svg width="100%" viewBox="0 0 680 200" role="img"><title>Integration testing types</title><desc>Showing big bang, top-down, and bottom-up integration approaches</desc><defs><marker id="ar2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="ts" x="340" y="16" text-anchor="middle">Integration testing approaches</text>
<g class="c-gray"><rect x="20" y="28" width="195" height="155" rx="10" stroke-width="0.5"/><text class="th" x="117" y="52" text-anchor="middle" dominant-baseline="central">Big bang</text><text class="ts" x="117" y="72" text-anchor="middle">All modules combined at once</text><text class="ts" x="117" y="92" text-anchor="middle">Defects hard to isolate</text><text class="ts" x="117" y="112" text-anchor="middle">Simple, risky</text><text class="ts" x="117" y="132" text-anchor="middle">Used: small systems</text><text class="ts" x="117" y="152" text-anchor="middle">No stubs/drivers needed</text></g>
<g class="c-teal"><rect x="243" y="28" width="195" height="155" rx="10" stroke-width="0.5"/><text class="th" x="340" y="52" text-anchor="middle" dominant-baseline="central">Top-down</text><text class="ts" x="340" y="72" text-anchor="middle">High modules first, stubs below</text><text class="ts" x="340" y="92" text-anchor="middle">UI testable early</text><text class="ts" x="340" y="112" text-anchor="middle">Needs stubs for lower modules</text><text class="ts" x="340" y="132" text-anchor="middle">Used: UI-first projects</text><text class="ts" x="340" y="152" text-anchor="middle">Defects found top first</text></g>
<g class="c-purple"><rect x="466" y="28" width="194" height="155" rx="10" stroke-width="0.5"/><text class="th" x="563" y="52" text-anchor="middle" dominant-baseline="central">Bottom-up</text><text class="ts" x="563" y="72" text-anchor="middle">Low modules first, drivers above</text><text class="ts" x="563" y="92" text-anchor="middle">Core logic testable early</text><text class="ts" x="563" y="112" text-anchor="middle">Needs drivers for upper modules</text><text class="ts" x="563" y="132" text-anchor="middle">Used: API-first projects</text><text class="ts" x="563" y="152" text-anchor="middle">Defects found bottom first</text></g></svg>`
],
practices:["Write unit tests during development (TDD) — not after the fact","Unit tests must be independent — no shared state between tests","For integration testing: test happy path AND error responses between modules","Use stubs for top-down and drivers for bottom-up integration","System testing must use production-equivalent test data and environment","UAT must be run by actual business users — not QA simulating users","Define UAT acceptance criteria before development begins (Definition of Done)","Never skip integration testing between third-party service integrations"],
qa:[
{q:"What is unit testing?",a:"Testing the smallest testable unit of code (a function or method) in isolation from other code. Uses mocks/stubs to isolate dependencies. Fast, cheap, developer-written (JUnit, pytest, NUnit)."},
{q:"What is integration testing?",a:"Testing the interaction between two or more modules/components to ensure they work correctly together. Finds interface defects (wrong data format between modules, API contract mismatch)."},
{q:"What is the difference between a stub and a driver?",a:"Stub: a dummy module that replaces a lower-level component (used in top-down integration — simulates the module below). Driver: a dummy that calls the module under test (used in bottom-up — simulates the module above)."},
{q:"What is system testing?",a:"End-to-end testing of the complete integrated system against specified requirements. Done by QA in a staging environment. Covers functional and non-functional aspects of the entire application."},
{q:"What is UAT and who conducts it?",a:"User Acceptance Testing — the final validation by business stakeholders/end users to confirm the software meets business needs. Conducted by business users, product owners, or clients — not QA or developers."},
{q:"What is the difference between system testing and UAT?",a:"System testing: QA team tests the full system against technical/functional specs. UAT: business users test to confirm the system meets business requirements and is fit for purpose. UAT is the final gate before production."}
]},

{id:15,phase:"Intermediate",color:"i",title:"Incremental vs Non-Incremental Testing",
overview:{def:"Incremental integration testing adds and tests one module at a time. Non-incremental (Big Bang) combines all modules at once then tests. Incremental finds defects earlier and is easier to isolate; Big Bang is simpler but riskier.",
wwwh:[
{l:"What",t:"Two strategies for integrating and testing modules in a system"},
{l:"Why",t:"Incremental isolates defects; Big Bang is faster to set up but riskier"},
{l:"When",t:"Incremental: complex systems. Big Bang: small/simple systems"},
{l:"Where",t:"Integration testing phase — between unit and system testing"},
{l:"How",t:"Incremental: add 1 module at a time, test after each. Big Bang: add all, test once"}]},
oneliners:[
"Incremental testing: test one piece at a time — like building a puzzle one piece at a time.",
"Big Bang integration: all at once — great if nothing breaks, terrible if something does.",
"Incremental testing reduces defect isolation time dramatically.",
"Top-down and bottom-up are both incremental strategies with different starting points.",
"Sandwich testing combines top-down and bottom-up — the most practical for large systems."
],
concept:"Non-incremental (Big Bang) integration is simple: combine all modules, run tests. If something fails, finding which module caused it is hard. Incremental integration tests one module at a time: you always know which new addition caused a failure. Top-down (start from the top, add lower modules progressively) and bottom-up (start from bottom, add upward) are the two main incremental strategies. Sandwich/hybrid combines both.",
diagrams:[
`<svg width="100%" viewBox="0 0 680 190" role="img"><title>Big bang vs incremental integration</title><desc>Comparison of big bang and incremental approaches to integration testing</desc><defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-gray"><rect x="20" y="20" width="290" height="155" rx="10" stroke-width="0.5"/><text class="th" x="165" y="46" text-anchor="middle" dominant-baseline="central">Non-incremental (Big Bang)</text><text class="ts" x="165" y="68" text-anchor="middle">All modules integrated at once</text><text class="ts" x="165" y="88" text-anchor="middle">Test runs after all are combined</text><text class="ts" x="165" y="108" text-anchor="middle">Defects hard to isolate</text><text class="ts" x="165" y="128" text-anchor="middle">No stubs or drivers needed</text><text class="ts" x="165" y="150" text-anchor="middle">Risk: high. Used for tiny systems</text></g>
<g class="c-teal"><rect x="370" y="20" width="290" height="155" rx="10" stroke-width="0.5"/><text class="th" x="515" y="46" text-anchor="middle" dominant-baseline="central">Incremental</text><text class="ts" x="515" y="68" text-anchor="middle">One module added &amp; tested at a time</text><text class="ts" x="515" y="88" text-anchor="middle">Defects isolated easily</text><text class="ts" x="515" y="108" text-anchor="middle">Stubs/drivers required</text><text class="ts" x="515" y="128" text-anchor="middle">More planning needed</text><text class="ts" x="515" y="150" text-anchor="middle">Risk: low. Industry standard</text></g></svg>`,

<text class="ts" x="70" y="200" text-anchor="middle">uses stubs</text>

<line x1="250" y1="132" x2="250" y2="116" stroke="#1D9E75" stroke-width="1" marker-end="url(#ar2)"/>
<g class="c-teal"><rect x="200" y="80" width="100" height="36" rx="6" stroke-width="0.5"/><text class="th" x="250" y="98" text-anchor="middle" dominant-baseline="central">+ Module B</text></g>
<line x1="250" y1="80" x2="250" y2="64" stroke="#1D9E75" stroke-width="1" marker-end="url(#ar2)"/>
<g class="c-teal"><rect x="200" y="28" width="100" height="36" rx="6" stroke-width="0.5"/><text class="th" x="250" y="46" text-anchor="middle" dominant-baseline="central">+ Module A</text></g>
<text class="ts" x="250" y="186" text-anchor="middle">Bottom-up</text>
<text class="ts" x="250" y="200" text-anchor="middle">uses drivers</text>

<line x1="440" y1="64" x2="440" y2="80" stroke="#BA7517" stroke-width="1" marker-end="url(#ar2)"/>
<g class="c-gray"><rect x="390" y="80" width="100" height="36" rx="6" stroke-width="0.5"/><text class="th" x="440" y="98" text-anchor="middle" dominant-baseline="central">Middle</text></g>

practices:["Prefer incremental integration for any system with more than 3 modules","Choose top-down when the UI must be demonstrated early to stakeholders","Choose bottom-up when the database/core logic is the riskiest component","Use sandwich/hybrid for large systems where both ends are being built simultaneously","Document which modules require stubs and which require drivers before integration begins","Test each module integration point immediately after each module is added","Define interface contracts between modules before integration testing begins","Maintain integration test results per module addition for traceability"],
qa:[
{q:"What is incremental integration testing?",a:"An approach where modules are integrated and tested one at a time. After each addition, tests are run. Defects are easier to isolate because you always know which new module caused a failure."},
{q:"What is Big Bang (non-incremental) integration?",a:"All modules are combined at once and then tested. No stubs or drivers are needed, but defect isolation is very difficult because any module could be the cause of failure. Used only for small, simple systems."},
{q:"What is top-down integration?",a:"Start from the highest-level module and progressively add lower-level modules. Lower modules not yet built are replaced by stubs. Allows early UI demonstration but requires many stubs."},
{q:"What is bottom-up integration?",a:"Start from the lowest-level module (e.g., database) and progressively add higher-level modules. Modules above not yet built are replaced by drivers. Allows early testing of core logic."},
{q:"What is sandwich (hybrid) integration?",a:"A combination of top-down and bottom-up. The top and bottom layers are tested simultaneously and move toward the middle. Practical for large systems where both UI and core logic need early validation."},
{q:"What is the difference between a stub and a driver in integration testing?",a:"Stub: dummy module replacing a lower-level component not yet built (used in top-down). Driver: dummy module that calls the component under test, replacing the upper module not yet built (used in bottom-up)."}
]},

{id:16,phase:"Intermediate",color:"i",title:"Happy Path vs Negative vs Monkey Testing",
overview:{def:"Happy path tests the expected, successful user flow. Negative testing tests invalid inputs and error handling. Monkey testing is random, undirected input to find crashes — the user is replaced by a monkey hitting keys randomly.",
wwwh:[
{l:"What",t:"Three test strategies covering expected, invalid, and random scenarios"},
{l:"Why",t:"Real users don't always follow instructions — test all three to be safe"},
{l:"When",t:"Happy path: first. Negative: after happy path passes. Monkey: stress/chaos"},
{l:"Where",t:"Happy path: all features. Negative: input validation. Monkey: stability testing"},
{l:"How",t:"Happy: valid inputs. Negative: invalid/boundary. Monkey: random actions"}]},
oneliners:[
"Happy path is what the developer tested — negative testing is what QA adds.",
"If you only test the happy path, you're testing that it works when it works.",
"Negative testing finds defects the developer never imagined a user would trigger.",
"Monkey testing: give a chimp the keyboard — if nothing crashes, you've got a stable app.",
"Happy path, negative path, and random path together = complete behavioral coverage."
],
concept:"Happy path testing follows the ideal, expected user journey: fill in all correct fields, click submit, see success. Negative testing deliberately provides wrong data: empty fields, SQL injection strings, out-of-range numbers, wrong data types. Monkey testing is completely random — automated or manual — generating random inputs to find unexpected crashes or hangs. All three together produce robust test coverage.",
diagrams:[
`<svg width="100%" viewBox="0 0 680 170" role="img"><title>Three testing strategies comparison</title><desc>Three columns comparing happy path, negative, and monkey testing</desc><defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-teal"><rect x="20" y="20" width="194" height="135" rx="10" stroke-width="0.5"/><text class="th" x="117" y="44" text-anchor="middle" dominant-baseline="central">Happy path</text><text class="ts" x="117" y="64" text-anchor="middle">Valid inputs, ideal flow</text><text class="ts" x="117" y="84" text-anchor="middle">Tests success scenarios</text><text class="ts" x="117" y="104" text-anchor="middle">Tester follows happy flow</text><text class="ts" x="117" y="124" text-anchor="middle">Done first, always</text></g>
<g class="c-coral"><rect x="243" y="20" width="194" height="135" rx="10" stroke-width="0.5"/><text class="th" x="340" y="44" text-anchor="middle" dominant-baseline="central">Negative testing</text><text class="ts" x="340" y="64" text-anchor="middle">Invalid, boundary, error data</text><text class="ts" x="340" y="84" text-anchor="middle">Tests error handling</text><text class="ts" x="340" y="104" text-anchor="middle">BVA, EP, injection tests</text><text class="ts" x="340" y="124" text-anchor="middle">Done after happy path</text></g>
<g class="c-amber"><rect x="466" y="20" width="194" height="135" rx="10" stroke-width="0.5"/><text class="th" x="563" y="44" text-anchor="middle" dominant-baseline="central">Monkey testing</text><text class="ts" x="563" y="64" text-anchor="middle">Random, undirected input</text><text class="ts" x="563" y="84" text-anchor="middle">Finds unknown unknowns</text><text class="ts" x="563" y="104" text-anchor="middle">Automated or manual</text><text class="ts" x="563" y="124" text-anchor="middle">Stability/chaos testing</text></g></svg>`,
`<svg width="100%" viewBox="0 0 680 160" role="img"><title>Login form test scenarios for all three strategies</title><desc>Shows how all three strategies apply to a login form</desc><defs><marker id="ar2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="ts" x="340" y="16" text-anchor="middle">Login form — all 3 strategies applied</text>
<g class="c-teal"><rect x="20" y="28" width="195" height="115" rx="8" stroke-width="0.5"/><text class="th" x="117" y="50" text-anchor="middle" dominant-baseline="central">Happy path</text><text class="ts" x="117" y="70" text-anchor="middle">Enter valid username</text><text class="ts" x="117" y="88" text-anchor="middle">Enter valid password</text><text class="ts" x="117" y="106" text-anchor="middle">Click Login</text><text class="ts" x="117" y="124" text-anchor="middle">Expect: dashboard loads</text></g>
<g class="c-coral"><rect x="243" y="28" width="195" height="115" rx="8" stroke-width="0.5"/><text class="th" x="340" y="50" text-anchor="middle" dominant-baseline="central">Negative</text><text class="ts" x="340" y="70" text-anchor="middle">Empty password field</text><text class="ts" x="340" y="88" text-anchor="middle">Wrong password 5 times</text><text class="ts" x="340" y="106" text-anchor="middle">SQL injection in username</text><text class="ts" x="340" y="124" text-anchor="middle">Expect: error messages</text></g>
<g class="c-amber"><rect x="466" y="28" width="194" height="115" rx="8" stroke-width="0.5"/><text class="th" x="563" y="50" text-anchor="middle" dominant-baseline="central">Monkey</text><text class="ts" x="563" y="70" text-anchor="middle">Random chars in all fields</text><text class="ts" x="563" y="88" text-anchor="middle">Click random UI areas</text><text class="ts" x="563" y="106" text-anchor="middle">Rapid form submits</text><text class="ts" x="563" y="124" text-anchor="middle">Expect: no crash/hang</text></g></svg>`
],
practices:["Always complete happy path tests before writing negative tests","Negative test every input field: empty, null, max length+1, special chars, wrong type","For password fields: test empty, <8 chars, no special char, SQL injection, Unicode","Monkey testing is excellent for finding memory leaks and race conditions","Use automated monkey testing tools: Android Monkey, Chaos Monkey (for systems)","Document what 'no crash' means clearly — define the expected behavior for invalid inputs","Negative testing is especially critical for financial and healthcare applications","Never assume the system handles bad input gracefully — always verify"],
qa:[
{q:"What is happy path testing?",a:"Testing the most expected, successful use case — the scenario where everything goes right. Valid inputs, ideal user flow, expected outputs. It's the first test to write and run for any feature."},
{q:"What is negative testing?",a:"Deliberately testing with invalid, unexpected, or boundary inputs to verify the system handles errors gracefully — shows correct error messages, doesn't crash, doesn't corrupt data."},
{q:"What is monkey testing?",a:"Testing by providing random, undirected inputs to the system without a test plan. Named after the idea of a monkey randomly hitting keys. Finds crashes, freezes, and unexpected behavior in edge cases."},
{q:"What is the difference between negative testing and monkey testing?",a:"Negative testing is structured — you deliberately design test cases with invalid inputs targeting specific fields and conditions. Monkey testing is unstructured — completely random actions with no specific intent."},
{q:"Give 5 examples of negative test cases for a registration form.",a:"1. Submit with blank email, 2. Enter email without @ symbol, 3. Password less than minimum length, 4. Age field with negative number, 5. Name field with SQL injection string like ' OR 1=1 --"},
{q:"What tools are used for monkey testing?",a:"Mobile: Android Monkey (adb monkey command). Web: Gremlins.js. Systems/distributed: Chaos Monkey (Netflix). Game testing: custom random input scripts. Manual monkey testing needs no tools — just act randomly."}
]},

{id:17,phase:"Intermediate",color:"i",title:"Alpha vs Beta vs Gamma Testing",
overview:{def:"Alpha: internal testing by the developer/QA team before external release. Beta: external testing by real users in a real environment. Gamma: final verification that the product is ready for release with no further changes.",
wwwh:[
{l:"What",t:"Three pre-release testing phases with different audiences and environments"},
{l:"Why",t:"Each phase catches different issues — internal bugs vs real-world feedback"},
{l:"When",t:"Alpha → Beta → Gamma — sequential, close to product launch"},
{l:"Where",t:"Alpha: developer site. Beta: user environment. Gamma: release candidate check"},
{l:"How",t:"Alpha: controlled lab. Beta: real users, real env. Gamma: final sign-off"}]},
oneliners:[
"Alpha is QA testing inside the house; beta is users testing in the wild.",
"Beta testing collects real-world feedback that no internal test can simulate.",
"Gamma testing is the final 'no more changes' sign-off before shipping.",
"Alpha finds technical bugs; beta finds usability and real-world environment bugs.",
"Think: Alpha = family tries the food, Beta = restaurant opens to public, Gamma = health inspector passes it."
],
concept:"Alpha testing is done by internal employees — developers, QA, product owners — in a controlled environment. It's the last internal quality gate before external release. Beta testing is done by actual end users in their own environment — real devices, real data, real workflows. It finds issues the dev team couldn't simulate. Gamma testing (less common as a formal phase) is a final regression check on the release candidate to confirm it's ready — no new features, just verification.",
diagrams:[
`<svg width="100%" viewBox="0 0 680 160" role="img"><title>Alpha beta gamma testing flow</title><desc>Sequential flow showing alpha to beta to gamma to release</desc><defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-purple"><rect x="30" y="50" width="130" height="60" rx="8" stroke-width="0.5"/><text class="th" x="95" y="72" text-anchor="middle" dominant-baseline="central">Alpha</text><text class="ts" x="95" y="90" text-anchor="middle">Internal team</text></g>
<line x1="160" y1="80" x2="185" y2="80" class="arr" marker-end="url(#ar)"/>
<g class="c-teal"><rect x="185" y="50" width="130" height="60" rx="8" stroke-width="0.5"/><text class="th" x="250" y="72" text-anchor="middle" dominant-baseline="central">Beta</text><text class="ts" x="250" y="90" text-anchor="middle">Real users</text></g>
<line x1="315" y1="80" x2="340" y2="80" class="arr" marker-end="url(#ar)"/>
<g class="c-amber"><rect x="340" y="50" width="130" height="60" rx="8" stroke-width="0.5"/><text class="th" x="405" y="72" text-anchor="middle" dominant-baseline="central">Gamma</text><text class="ts" x="405" y="90" text-anchor="middle">Final sign-off</text></g>
<line x1="470" y1="80" x2="495" y2="80" class="arr" marker-end="url(#ar)"/>
<g class="c-green"><rect x="495" y="50" width="155" height="60" rx="8" stroke-width="0.5"/><text class="th" x="572" y="72" text-anchor="middle" dominant-baseline="central">Production</text><text class="ts" x="572" y="90" text-anchor="middle">Release to all users</text></g>
<text class="ts" x="340" y="130" text-anchor="middle">Pre-release testing phases: internal → external → release candidate</text></svg>`,
`<svg width="100%" viewBox="0 0 680 190" role="img"><title>Alpha vs Beta comparison table</title><desc>Detailed comparison of alpha and beta testing characteristics</desc><defs><marker id="ar2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-purple"><rect x="20" y="20" width="295" height="155" rx="10" stroke-width="0.5"/><text class="th" x="167" y="44" text-anchor="middle" dominant-baseline="central">Alpha testing</text><text class="ts" x="167" y="64" text-anchor="middle">Who: internal dev/QA team</text><text class="ts" x="167" y="84" text-anchor="middle">Where: developer site (lab)</text><text class="ts" x="167" y="104" text-anchor="middle">Environment: controlled</text><text class="ts" x="167" y="124" text-anchor="middle">Feedback: immediate, detailed</text><text class="ts" x="167" y="144" text-anchor="middle">Goal: find critical bugs pre-beta</text><text class="ts" x="167" y="162" text-anchor="middle">Software: may be incomplete</text></g>
<g class="c-teal"><rect x="365" y="20" width="295" height="155" rx="10" stroke-width="0.5"/><text class="th" x="512" y="44" text-anchor="middle" dominant-baseline="central">Beta testing</text><text class="ts" x="512" y="64" text-anchor="middle">Who: real external users</text><text class="ts" x="512" y="84" text-anchor="middle">Where: user's own environment</text><text class="ts" x="512" y="104" text-anchor="middle">Environment: real-world</text><text class="ts" x="512" y="124" text-anchor="middle">Feedback: surveys, bug reports</text><text class="ts" x="512" y="144" text-anchor="middle">Goal: real-world validation</text><text class="ts" x="512" y="162" text-anchor="middle">Software: feature-complete</text></g></svg>`
],
practices:["Alpha testing should complete before ANY external user sees the software","Create a separate beta environment — never beta test in production","Define a beta tester NDA and feedback collection process before launch","Set a fixed beta duration with a clear feedback cutoff date","Gamma testing must be regression-only — no new features, no config changes","Track and triage all beta feedback before final release decision","Use beta testing for A/B experiments on new features","Document alpha → beta → gamma entry/exit criteria formally"],
qa:[
{q:"What is alpha testing?",a:"Alpha testing is performed by the internal team (developers, QA, product owners) at the developer's site in a controlled environment. It's the last internal testing phase before the product goes to external users."},
{q:"What is beta testing?",a:"Beta testing is performed by actual end users in their own real-world environment. The software is feature-complete but may have minor issues. The goal is to gather real-world usage feedback and find environment-specific bugs."},
{q:"What is gamma testing?",a:"Gamma testing is the final pre-release regression check on the release candidate. It verifies no new bugs were introduced in final fixes and that all critical issues are resolved. After gamma sign-off, the software ships."},
{q:"What is the difference between alpha and beta testing?",a:"Alpha: internal, controlled, developer site, incomplete software acceptable. Beta: external, real users, real environment, feature-complete software. Alpha precedes beta."},
{q:"Can a product go to beta without passing alpha?",a:"No — alpha is the prerequisite. Releasing to external users (beta) without internal validation wastes users' time and damages brand trust. Alpha clears major bugs before real users encounter them."},
{q:"What is open beta vs closed beta?",a:"Closed beta: selected/invited users only — controlled, feedback is curated. Open beta: anyone can join — maximum feedback volume, less control. Open beta is common for consumer apps (e.g., new game releases)."}
]},

{id:18,phase:"Advanced",color:"a",title:"Penetration vs Security vs Compatibility Testing",
overview:{def:"Security testing checks overall security posture. Penetration testing (pen testing) simulates a real attacker to find exploitable vulnerabilities. Compatibility testing ensures the software works correctly across different OS, browsers, devices, and environments.",
wwwh:[
{l:"What",t:"Three specialized non-functional testing types for safety and reach"},
{l:"Why",t:"Security breaches and compatibility failures are major production risks"},
{l:"When",t:"Security/pen: before release. Compatibility: throughout dev, before launch"},
{l:"Where",t:"Security: APIs, auth, DB, network. Compatibility: all supported platforms"},
{l:"How",t:"Pen test: ethical hacking. Security: SAST/DAST. Compat: cross-device testing"}]},
oneliners:[
"Security testing asks: is it secure? Penetration testing asks: can I break in?",
"Pen testing is ethical hacking — find the hole before the attacker does.",
"Compatibility testing ensures your app works for everyone, not just your dev machine.",
"OWASP Top 10 is the security testing bible — know it by heart.",
"Cross-browser testing is compatibility testing for the web — Chrome, Firefox, Safari, Edge."
],
concept:"Security testing verifies that the system protects data and resources against threats — using tools like SAST (static analysis), DAST (dynamic scanning), and manual review. Penetration testing goes further — a trained ethical hacker actively tries to exploit the system using real attacker techniques (network, application, social engineering). Compatibility testing ensures the software runs correctly on every supported combination of OS, browser, device, and screen resolution.",
diagrams:[
`<svg width="100%" viewBox="0 0 680 190" role="img"><title>Security vs penetration vs compatibility</title><desc>Three-column comparison of security, penetration, and compatibility testing</desc><defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-coral"><rect x="20" y="20" width="194" height="155" rx="10" stroke-width="0.5"/><text class="th" x="117" y="44" text-anchor="middle" dominant-baseline="central">Security testing</text><text class="ts" x="117" y="64" text-anchor="middle">Broad security posture check</text><text class="ts" x="117" y="84" text-anchor="middle">Tools: OWASP ZAP, SonarQube</text><text class="ts" x="117" y="104" text-anchor="middle">Methods: SAST, DAST</text><text class="ts" x="117" y="124" text-anchor="middle">Done by: QA / security team</text><text class="ts" x="117" y="144" text-anchor="middle">Focus: vulnerabilities found</text><text class="ts" x="117" y="162" text-anchor="middle">Continuous in CI/CD</text></g>
<g class="c-red"><rect x="243" y="20" width="194" height="155" rx="10" stroke-width="0.5"/><text class="th" x="340" y="44" text-anchor="middle" dominant-baseline="central">Penetration testing</text><text class="ts" x="340" y="64" text-anchor="middle">Active exploitation attempt</text><text class="ts" x="340" y="84" text-anchor="middle">Tools: Metasploit, Burp Suite</text><text class="ts" x="340" y="104" text-anchor="middle">Methods: ethical hacking</text><text class="ts" x="340" y="124" text-anchor="middle">Done by: certified pen tester</text><text class="ts" x="340" y="144" text-anchor="middle">Focus: exploitable vulns</text><text class="ts" x="340" y="162" text-anchor="middle">Periodic, not continuous</text></g>
<g class="c-teal"><rect x="466" y="20" width="194" height="155" rx="10" stroke-width="0.5"/><text class="th" x="563" y="44" text-anchor="middle" dominant-baseline="central">Compatibility testing</text><text class="ts" x="563" y="64" text-anchor="middle">Cross-platform verification</text><text class="ts" x="563" y="84" text-anchor="middle">Tools: BrowserStack, Sauce Labs</text><text class="ts" x="563" y="104" text-anchor="middle">Methods: cross-browser/device</text><text class="ts" x="563" y="124" text-anchor="middle">Done by: QA team</text><text class="ts" x="563" y="144" text-anchor="middle">Focus: rendering, function</text><text class="ts" x="563" y="162" text-anchor="middle">Every sprint for web apps</text></g></svg>`,
`<svg width="100%" viewBox="0 0 680 160" role="img"><title>OWASP Top 10 categories</title><desc>Row showing OWASP Top 10 security vulnerability categories</desc><defs><marker id="ar2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text class="ts" x="340" y="16" text-anchor="middle">OWASP Top 10 — core security test areas</text>
<g class="c-red"><rect x="20" y="28" width="140" height="46" rx="6" stroke-width="0.5"/><text class="th" x="90" y="48" text-anchor="middle" dominant-baseline="central">Injection</text><text class="ts" x="90" y="64" text-anchor="middle">SQL, NoSQL, OS</text></g>
<g class="c-coral"><rect x="170" y="28" width="140" height="46" rx="6" stroke-width="0.5"/><text class="th" x="240" y="48" text-anchor="middle" dominant-baseline="central">Broken Auth</text><text class="ts" x="240" y="64" text-anchor="middle">Session, token</text></g>
<g class="c-amber"><rect x="320" y="28" width="140" height="46" rx="6" stroke-width="0.5"/><text class="th" x="390" y="48" text-anchor="middle" dominant-baseline="central">XSS</text><text class="ts" x="390" y="64" text-anchor="middle">Script injection</text></g>
<g class="c-purple"><rect x="470" y="28" width="190" height="46" rx="6" stroke-width="0.5"/><text class="th" x="565" y="48" text-anchor="middle" dominant-baseline="central">Sensitive Data</text><text class="ts" x="565" y="64" text-anchor="middle">Encryption failures</text></g>
<g class="c-red"><rect x="20" y="90" width="140" height="46" rx="6" stroke-width="0.5"/><text class="th" x="90" y="110" text-anchor="middle" dominant-baseline="central">IDOR</text><text class="ts" x="90" y="126" text-anchor="middle">Access control</text></g>
<g class="c-coral"><rect x="170" y="90" width="140" height="46" rx="6" stroke-width="0.5"/><text class="th" x="240" y="110" text-anchor="middle" dominant-baseline="central">Security Misconfig</text><text class="ts" x="240" y="126" text-anchor="middle">Default settings</text></g>
<g class="c-amber"><rect x="320" y="90" width="140" height="46" rx="6" stroke-width="0.5"/><text class="th" x="390" y="110" text-anchor="middle" dominant-baseline="central">CSRF</text><text class="ts" x="390" y="126" text-anchor="middle">Cross-site request</text></g>
<g class="c-purple"><rect x="470" y="90" width="190" height="46" rx="6" stroke-width="0.5"/><text class="th" x="565" y="110" text-anchor="middle" dominant-baseline="central">Logging failures</text><text class="ts" x="565" y="126" text-anchor="middle">Audit trail gaps</text></g></svg>`
],
practices:["Run OWASP ZAP or Burp Suite on every API before production release","Include SAST (SonarQube) in CI/CD pipeline — fail build on critical vulnerabilities","Conduct annual pen tests by a certified professional (OSCP, CEH certified tester)","For compatibility: define a supported browser/OS matrix at project start — test all of it","Use BrowserStack or Sauce Labs for cross-browser automation — not just manual spot-checks","Never store passwords in plain text — verify hashing (bcrypt, Argon2) in security tests","Test for SQL injection on every input field connected to a database","Document all pen test findings in a formal report with CVSS severity scores"],
qa:[
{q:"What is security testing?",a:"Security testing evaluates whether the system protects its data, resources, and users from unauthorized access, breaches, and vulnerabilities. It includes SAST, DAST, code review, and vulnerability scanning."},
{q:"What is penetration testing?",a:"Penetration testing is authorized ethical hacking — a security professional actively tries to exploit vulnerabilities in the system using real attacker techniques. It produces a report of exploitable vulnerabilities with remediation advice."},
{q:"What is the OWASP Top 10?",a:"A community-maintained list of the 10 most critical web application security risks: Injection, Broken Authentication, Sensitive Data Exposure, XSS, Broken Access Control, Security Misconfiguration, CSRF, Insecure Deserialization, Vulnerable Components, Logging Failures."},
{q:"What is the difference between SAST and DAST?",a:"SAST (Static Application Security Testing): analyzes source code without executing it — catches vulnerabilities at code level. DAST (Dynamic Application Security Testing): tests the running application — finds runtime vulnerabilities like XSS, CSRF, injection."},
{q:"What is compatibility testing?",a:"Testing that verifies the software functions correctly across different operating systems, browsers, devices, screen resolutions, and network conditions. Ensures the product reaches all intended users without degradation."},
{q:"What tools are used for compatibility testing?",a:"BrowserStack, Sauce Labs, LambdaTest (cross-browser cloud). For mobile: Appium on real device farms. For desktop: VMs with different OS versions. Selenium Grid for running automation across browsers simultaneously."}
]},

{id:19,phase:"Advanced",color:"a",title:"Usability vs Accessibility vs Cross-Browser Testing",
overview:{def:"Usability testing measures how easily users accomplish goals. Accessibility testing ensures disabled users can use the software (WCAG compliance). Cross-browser testing verifies consistent behavior across different browsers.",
wwwh:[
{l:"What",t:"Three user-centric quality testing types for inclusivity and experience"},
{l:"Why",t:"A usable but inaccessible app excludes millions. A beautiful app that breaks in Safari loses users."},
{l:"When",t:"Usability: design phase. Accessibility: throughout. Cross-browser: each release"},
{l:"Where",t:"Usability: user sessions. Accessibility: UI components. Cross-browser: all browsers"},
{l:"How",t:"Usability: user observation. Accessibility: WCAG audit tools. Cross-browser: browser farm"}]},
oneliners:[
"Usability testing watches real users struggle — so developers can stop assuming they won't.",
"Accessibility testing is not optional — it's a legal requirement in many countries (ADA, EN 301 549).",
"Cross-browser testing ensures 'works on my machine' never reaches the user.",
"WCAG 2.1 AA is the global accessibility standard — test to it, not around it.",
"Good UX + full accessibility + cross-browser consistency = a product for everyone."
],
concept:"Usability testing observes real users attempting tasks — finding confusing UI, unclear labels, broken workflows. Accessibility testing ensures compliance with WCAG 2.1 (Web Content Accessibility Guidelines): screen reader compatibility, keyboard navigation, color contrast, captions. Cross-browser testing verifies that the CSS, JS, and HTML behave identically in Chrome, Firefox, Safari, Edge, and on mobile browsers — because each browser engine (Blink, Gecko, WebKit) renders differently.",

practices:["Define usability test tasks based on real user goals — not QA-invented scenarios","Recruit at least 5 users for usability sessions — Nielsen's law: 5 users find 85% of issues","Run accessibility tests with actual screen readers (NVDA, JAWS, VoiceOver) — not just axe tool","Test color contrast ratio: minimum 4.5:1 for normal text (WCAG AA level)","Cross-browser test matrix: document supported browsers/versions at project start","Automate WCAG checks with axe-core integrated into your CI/CD pipeline","Never rely on color alone to convey information — accessibility requirement","Usability findings are qualitative — record sessions and share clips with the dev team"],
qa:[
{q:"What is usability testing?",a:"Usability testing observes real users attempting specific tasks to evaluate how easy and intuitive the software is. It measures task success rate, time-on-task, error rate, and user satisfaction."},
{q:"What is accessibility testing?",a:"Testing that verifies the software can be used by people with disabilities — visual, motor, hearing, or cognitive. It ensures compliance with WCAG 2.1 and legal standards like ADA and EN 301 549."},
{q:"What is WCAG and what are its levels?",a:"Web Content Accessibility Guidelines (WCAG) is the international accessibility standard. It has three levels: A (minimum), AA (recommended for most — legally required in many regions), and AAA (enhanced, highest). WCAG 2.1 AA is the target."},
{q:"What are the 4 POUR principles of WCAG?",a:"Perceivable (content can be seen/heard by all), Operable (navigable by keyboard/assistive tech), Understandable (clear language, predictable behavior), Robust (works with current and future assistive technologies)."},
{q:"What tools are used for accessibility testing?",a:"Automated: axe (browser extension + CI integration), WAVE, Lighthouse. Screen readers: NVDA (Windows, free), JAWS (Windows, paid), VoiceOver (Mac/iOS, built-in), TalkBack (Android). Color: Colour Contrast Analyser."},
{q:"Why does cross-browser testing matter?",a:"Different browsers use different rendering engines (Chrome/Edge: Blink, Firefox: Gecko, Safari: WebKit). CSS properties, JS APIs, and HTML features may behave differently. Without cross-browser testing, a feature that looks perfect in Chrome may be broken in Safari."}
]},

practices:["Always write a charter before starting — 'Explore X to find Y' — no open-ended wandering","Time-box all exploratory sessions: 60 minutes max with a 15-min debrief","Take notes in real time — screenshots, screen recordings, test ideas explored","Log all bugs found during the session before the debrief — memory fades","Rotate testers across modules — fresh perspective = more bugs found","Use mind maps to track explored areas and identify gaps","Combine exploratory testing with scripted — they are complementary, not competing","Measure exploratory sessions with metrics: bugs per session, coverage areas explored, time spent"],

{q:"Who coined the term 'exploratory testing'?",a:"Cem Kaner coined the term in 1984. He defined it as 'a style of software testing that emphasizes the personal freedom and responsibility of the individual tester to continually optimize the quality of their work.'"},
{q:"What is a test charter in exploratory testing?",a:"A charter defines the mission for an exploratory session: 'Explore [target] using [resources] to discover [information].' Example: 'Explore the checkout flow on mobile to find usability and validation defects.' It provides focus without scripting."},
{q:"What is session-based test management (SBTM)?",a:"SBTM structures exploratory testing into time-boxed sessions (60–90 min) with: a charter (mission), a session sheet (notes + bugs), and a debrief. It makes exploratory testing measurable and accountable."},
{q:"How does exploratory testing complement scripted testing?",a:"Scripted testing verifies known requirements — it's systematic but limited to what was anticipated. Exploratory testing finds unexpected bugs, usability issues, and edge cases that scripted tests never thought to cover. Together they give fuller coverage."},

const visited=new Set([11]);
let current=11;

function phaseClass(p){return p==="Fundamentals"?"f":p==="Intermediate"?"i":"a"}

function buildTabs(){
  const bar=document.getElementById("tabBar");
  sessions.forEach(s=>{
    const btn=document.createElement("button");
    btn.className="tab-btn"+(s.id===11?" active":"");
    btn.id="tab"+s.id;
    btn.textContent="S"+s.id;
    btn.onclick=()=>goTo(s.id);
    bar.appendChild(btn);
  });
}

function renderDiagrams(diagrams){
  return diagrams.map(d=>`<div class="diagram-box">${d}</div>`).join("");
}

function buildSessions(){
  const cont=document.getElementById("sessions");
  sessions.forEach(s=>{
    const div=document.createElement("div");
    div.className="session"+(s.id===11?" active":"");
    div.id="sess"+s.id;
    div.innerHTML=renderSession(s);
    cont.appendChild(div);
  });
}

function renderSession(s){
  const pc=phaseClass(s.phase);
  return `
<div class="session-header">
  <div class="session-number sn-${pc}">S${s.id}</div>
  <div><div class="session-title">${s.title}</div><div class="session-phase">Phase: ${s.phase}</div></div>
</div>
<div class="section-label">Overview</div>
<div class="overview-card">
  <p>${s.overview.def}</p>
  <div class="wwwh">${s.overview.wwwh.map(w=>`<div class="wwwh-item"><div class="wwwh-label">${w.l}</div><div class="wwwh-text">${w.t}</div></div>`).join("")}</div>
</div>
<div class="section-label">Interview one-liners</div>
<div class="oneliner-list">${s.oneliners.map((o,i)=>`<div class="oneliner"><span class="ol-num">${i+1}</span><span class="ol-text">${o}</span></div>`).join("")}</div>
<div class="section-label">Concept explanation</div>
<div class="concept-text">${s.concept}</div>
<div class="section-label">Visual diagrams (${s.diagrams.length} diagrams)</div>
${renderDiagrams(s.diagrams)}
<div class="section-label">Best practices checklist</div>
<div class="checklist">${s.practices.map(p=>`<div class="check-item"><span class="check-icon"><i class="ti ti-check" aria-hidden="true"></i></span><span>${p}</span></div>`).join("")}</div>
<div class="section-label">Interview Q&A — SDET style (tap to reveal)</div>
<div class="qa-list">${s.qa.map((q,i)=>`<div class="qa-item" id="qa-${s.id}-${i}">
  <div class="qa-q" onclick="toggleQA('qa-${s.id}-${i}')">
    <span class="qa-label">Q${i+1}</span>
    <span class="qa-q-text">${q.q}</span>
    <i class="ti ti-chevron-down qa-toggle" aria-hidden="true"></i>
  </div>
  <div class="qa-answer">${q.a}</div>
</div>`).join("")}</div>
<div class="nav-row">
  <button class="nav-btn" onclick="goTo(${s.id-1})" ${s.id===11?"disabled style='opacity:.4'":""}>← Previous</button>
  <span class="session-counter">Session ${s.id} of 20 (S11–S20)</span>
  <button class="nav-btn primary" onclick="goTo(${s.id+1})" ${s.id===20?"disabled style='opacity:.4'":""}>Next →</button>
</div>`;
}

function goTo(id){
  if(id<11||id>20)return;
  document.getElementById("sess"+current).classList.remove("active");
  document.getElementById("tab"+current).classList.remove("active");
  visited.add(id);
  current=id;
  document.getElementById("sess"+id).classList.add("active");
  document.getElementById("tab"+id).classList.add("active");
  sessions.forEach(s=>{if(visited.has(s.id))document.getElementById("tab"+s.id).classList.add("done");});
  const pct=((current-10)/10*100);
  document.getElementById("progFill").style.width=pct+"%";
  window.scrollTo(0,0);
}

function toggleQA(id){
  document.getElementById(id).classList.toggle("open");
}

buildTabs();
buildSessions();
</script>

                let needsHighlight = false;
                mutations.forEach(m => {
                    if (m.addedNodes.length) {
                        m.addedNodes.forEach(n => {
                            if (n.nodeName === 'PRE' || n.nodeName === 'CODE') needsHighlight = true;
                            if (n.querySelector && n.querySelector('pre')) needsHighlight = true;
                        });
                    }
                });
                if (needsHighlight) {
                    Prism.highlightAll();
                }
            });
            observer.observe(document.body, { childList: true, subtree: true });
        });
    }
