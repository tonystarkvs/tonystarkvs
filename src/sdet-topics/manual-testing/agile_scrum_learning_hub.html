<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --border-radius-lg:12px;
  --border-radius-md:8px;
  --color-background-primary:#ffffff;
  --color-background-secondary:#f4f4f8;
  --color-border-primary:#534AB7;
  --color-border-secondary:#d1d1db;
  --color-border-tertiary:#e4e4eb;
  --color-text-primary:#1a1a2e;
  --color-text-secondary:#555770;
  --color-text-tertiary:#8e90a6;
  --font-sans:'Segoe UI',system-ui,-apple-system,sans-serif;
}

body{font-family:var(--font-sans);color:var(--color-text-primary);background:transparent}
.hub{padding:1.5rem 0}
.phase-strip{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.phase-badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;border:0.5px solid}
.phase-f{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC}
.phase-i{background:#E1F5EE;color:#085041;border-color:#5DCAA5}
.phase-a{background:#FAECE7;color:#4A1B0C;border-color:#F0997B}
.tab-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1.5rem}
.tab-btn{font-size:12px;padding:6px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn:hover{background:var(--color-background-primary);color:var(--color-text-primary)}
.tab-btn.active{background:var(--color-background-primary);color:var(--color-text-primary);border-color:var(--color-border-primary);font-weight:500}
.tab-btn.done::after{content:" ✓";color:#1D9E75}
.progress-bar{height:4px;background:var(--color-background-secondary);border-radius:2px;margin-bottom:1.5rem;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#7F77DD,#1D9E75);border-radius:2px;transition:width .4s}
.session{display:none}
.session.active{display:block}
.s-header{margin-bottom:1.25rem}
.s-tag{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;margin-bottom:6px;display:inline-block}
.tag-f{background:#EEEDFE;color:#3C3489}
.tag-i{background:#E1F5EE;color:#085041}
.tag-a{background:#FAECE7;color:#993C1D}
.s-title{font-size:20px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.s-sub{font-size:14px;color:var(--color-text-secondary)}
.section{margin-bottom:1.5rem}
.section-hdr{font-size:13px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem;padding-bottom:4px;border-bottom:0.5px solid var(--color-border-tertiary)}
.def-card{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:.75rem}
.def-card p{font-size:14px;line-height:1.7;color:var(--color-text-primary)}
.def-card .kw{color:#534AB7;font-weight:500}
.pillars{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:.75rem}
.pillar{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:.75rem 1rem;text-align:center}
.pillar .icon{font-size:20px;margin-bottom:4px}
.pillar .pl-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.pillar .pl-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.interview-grid{display:grid;gap:8px}
.i-line{display:flex;gap:8px;align-items:flex-start;padding:.6rem .75rem;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-size:13px;line-height:1.5}
.i-bullet{width:18px;height:18px;border-radius:50%;background:#EEEDFE;color:#534AB7;font-size:10px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.qa-stack{display:grid;gap:8px}
.qa-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden}
.qa-q{padding:.6rem .9rem;background:var(--color-background-secondary);font-size:13px;font-weight:500;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.qa-q:hover{background:var(--color-background-primary)}
.qa-a{display:none;padding:.6rem .9rem;font-size:13px;line-height:1.7;color:var(--color-text-secondary);border-top:0.5px solid var(--color-border-tertiary)}
.qa-a.open{display:block}
.chk-list{display:grid;gap:6px}
.chk-item{display:flex;gap:8px;align-items:flex-start;font-size:13px;line-height:1.5}
.chk-box{width:16px;height:16px;border:0.5px solid var(--color-border-primary);border-radius:3px;flex-shrink:0;cursor:pointer;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:all .15s}
.chk-box.checked{background:#1D9E75;border-color:#1D9E75;color:#fff}
.flow-wrap{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1rem;overflow-x:auto}
.flow-wrap svg{display:block;min-width:560px}
.nav-row{display:flex;justify-content:space-between;margin-top:1.5rem;gap:8px}
.nav-btn{padding:8px 18px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer}
.nav-btn:hover{background:var(--color-background-primary)}
.nav-btn.primary{background:#534AB7;color:#fff;border-color:#534AB7}
.nav-btn.primary:hover{background:#3C3489}

.c-amber rect{fill:#FAEEDA;stroke:#EF9F27;stroke-width:1.5}
.c-blue rect{fill:#E6F1FB;stroke:#85B7EB;stroke-width:1.5}
.c-coral rect{fill:#FAECE7;stroke:#F0997B;stroke-width:1.5}
.c-gray rect{fill:#f4f4f8;stroke:#d1d1db;stroke-width:1.5}
.c-green rect{fill:#EAF3DE;stroke:#97C459;stroke-width:1.5}
.c-purple rect{fill:#EEEDFE;stroke:#AFA9EC;stroke-width:1.5}
.c-teal rect{fill:#E1F5EE;stroke:#5DCAA5;stroke-width:1.5}
svg .th{font-weight:600;fill:var(--color-text-primary);font-family:var(--font-sans);font-size:13px}
svg .ts{font-size:11px;fill:var(--color-text-secondary);font-family:var(--font-sans)}
</style>

{q:"What are the 3 pillars of Scrum?",a:"Transparency (everyone sees the true state of work), Inspection (frequent check of artifacts and progress), and Adaptation (adjusting when deviations are found). These are known as TIA."},
{q:"What is the difference between a Scrum Master and a Project Manager?",a:"A Project Manager assigns tasks, tracks timelines, and has authority. A Scrum Master is a servant-leader who coaches the team on Scrum, removes impediments, and facilitates events — they do NOT manage people or assign work."},
{q:"What is the Definition of Done (DoD)?",a:"A shared understanding of what 'done' means for a Product Backlog Item — typically includes: coded, code reviewed, unit tested, integration tested, documentation updated, and deployed to staging. If it's not done per DoD, it cannot be part of the Increment."},
{q:"How does Scrum relate to Agile?",a:"Agile is the mindset/philosophy. Scrum is one of many frameworks that implement Agile values. All Scrum is Agile, but not all Agile is Scrum (Kanban, XP, SAFe are also Agile)."},
{q:"What is a Sprint Goal?",a:"A Sprint Goal is a single, concise objective set during Sprint Planning that gives the team a shared purpose for the Sprint. It provides focus and flexibility — the team may adjust their plan as long as the Sprint Goal is met."}
]},

{id:3,phase:"f",phaseLabel:"Fundamentals",title:"Scrum Roles in Detail",sub:"Product Owner, Scrum Master & Developers — who does what",
def:`The <span class='kw'>Scrum Team</span> has three distinct roles, each with clear accountability. The <span class='kw'>Product Owner</span> decides <em>what</em> to build, the <span class='kw'>Scrum Master</span> ensures Scrum is followed <em>correctly</em>, and the <span class='kw'>Developers</span> decide <em>how</em> to build it. No role has authority over the other — they are peers.`,
keywords:[
{t:"Product Owner (PO)",d:"Accountable for maximizing product value. Manages and orders the Product Backlog."},
{t:"Scrum Master (SM)",d:"Accountable for Scrum adoption. Coaches team, removes impediments, facilitates events."},
{t:"Developers",d:"Everyone who does the work in a Sprint — engineers, testers, designers. Cross-functional."},
{t:"Servant Leader",d:"Scrum Master's leadership style — serving the team's needs rather than directing them."},
{t:"Impediment",d:"Anything blocking the team from progressing — the Scrum Master removes these."},
{t:"Cross-functional",d:"The Developer team collectively has all skills needed to deliver a sprint Increment."},
{t:"Accountability",d:"Scrum uses 'accountability' not 'responsibility' — it means owning the outcome, not micromanaging."}
],

{q:"Can a Scrum Master also be a Developer in the same team?",a:"Yes, but it is discouraged for large teams. In small teams (≤4 people), one person may wear both hats. The risk is conflict of interest — a SM-Developer may prioritize their own tasks over removing team impediments."},
{q:"What happens if the Product Owner is unavailable during a Sprint?",a:"This is an impediment that the Scrum Master must escalate. An unavailable PO leads to unanswered questions, incorrect assumptions, and wasted sprint effort. A proxy PO may be designated temporarily."},
{q:"Who is responsible for quality in a Scrum team?",a:"All Developers are collectively responsible for quality. Testing is not a separate phase — it is embedded in the sprint. SDETs/QA engineers are part of the Developer role and own test automation, CI pipelines, and quality gates."},
{q:"What is the role of a manager in Scrum?",a:"Scrum does not define a Manager role. Organizational managers should work with the Scrum Master to remove organizational impediments and support team development. They should not attend Daily Scrums or direct sprint work."},
{q:"How does an SDET fit into a Scrum team?",a:"An SDET (Software Development Engineer in Test) is a Developer in Scrum. They participate in Sprint Planning (estimating test effort), Daily Scrum (sharing testing blockers), Sprint Review (demonstrating tested features), and Retrospectives (improving quality processes)."}
]},

{id:4,phase:"i",phaseLabel:"Intermediate",title:"Sprint Planning — Session Deep Dive",sub:"How a Sprint starts: What, Why, and How",
def:`<span class='kw'>Sprint Planning</span> is the first event in every Sprint. The whole Scrum Team attends. In this meeting, the team decides: <span class='kw'>Why</span> this Sprint matters (Sprint Goal), <span class='kw'>What</span> to build (selected backlog items), and <span class='kw'>How</span> they'll build it (tasks). Timebox: max 8 hours for a 4-week sprint (proportionally less for shorter sprints).`,
keywords:[
{t:"Sprint Planning",d:"Timeboxed ceremony to define what will be done in the Sprint and how."},
{t:"Sprint Goal",d:"A single objective that gives the Sprint purpose and provides team focus."},
{t:"Sprint Backlog",d:"Selected Product Backlog Items + plan for delivering them (tasks)."},
{t:"Story Points",d:"A unit for estimating relative effort/complexity — not hours! (e.g. 1=trivial, 8=complex)."},
{t:"Planning Poker",d:"Estimation technique: each person reveals their estimate simultaneously to avoid anchoring."},
{t:"Velocity",d:"Average story points a team completes per sprint — used to forecast how much fits in a sprint."},
{t:"Acceptance Criteria",d:"Conditions that must be met for a User Story to be accepted by the Product Owner."}
],

qa:[
{q:"What is the timebox for Sprint Planning?",a:"For a 4-week Sprint, Sprint Planning is timeboxed at 8 hours maximum. For shorter sprints, it is proportionally less (e.g., 4 hours for a 2-week sprint, 2 hours for a 1-week sprint)."},
{q:"What is the INVEST criteria for a good User Story?",a:"INVEST = Independent (can be built alone), Negotiable (not a fixed contract), Valuable (delivers user value), Estimable (team can size it), Small (fits in one sprint), Testable (has clear acceptance criteria)."},
{q:"How does an SDET contribute to Sprint Planning?",a:"An SDET estimates the test effort for each story (story points include test time), identifies testability risks, flags stories with missing acceptance criteria, and may suggest breaking complex stories into smaller testable slices."},
{q:"What happens if the team can't finish all Sprint Backlog items?",a:"Unfinished items return to the Product Backlog (they are NOT automatically included in the next sprint). The Retrospective should address why — was it over-commitment, hidden complexity, or impediments?"},
{q:"What is velocity and how is it calculated?",a:"Velocity is the average number of story points completed per Sprint, calculated over the last 3–5 sprints. Example: if a team completed 20, 22, and 18 points in the last three sprints, velocity = (20+22+18)/3 = 20 points per sprint."}
]},

{id:5,phase:"i",phaseLabel:"Intermediate",title:"Daily Scrum — The 15-Minute Sync",sub:"The daily inspection ceremony that keeps the team aligned",
def:`The <span class='kw'>Daily Scrum</span> (also called <span class='kw'>Daily Standup</span>) is a 15-minute timeboxed event for the Developers to inspect progress toward the Sprint Goal and adapt their plan. It happens <span class='kw'>every day, same time, same place</span>. It is NOT a status report to management — it's a peer-to-peer sync for the team.`,
keywords:[
{t:"Daily Scrum",d:"A 15-min daily event where Developers sync on Sprint progress and plan the next 24 hours."},
{t:"Standup",d:"Informal name for Daily Scrum — called standup because people traditionally stand (to keep it short)."},
{t:"Three Questions",d:"Classic format: What did I do yesterday? What will I do today? Any impediments?"},
{t:"Impediment",d:"A blocker that prevents a developer from completing their work. SM helps remove it."},
{t:"Parking Lot",d:"A way to defer detailed discussions that arise in Daily Scrum to after the meeting ends."},
{t:"Walking the Board",d:"Alternative to 3 questions: team walks through each active story on the board instead."},
{t:"Timeboxed",d:"Hard stop at 15 minutes — not a suggestion. Prevents it from becoming a long meeting."}
],

qa:[
{q:"Who runs the Daily Scrum?",a:"The Developers own and run the Daily Scrum — it is their event. The Scrum Master facilitates only if needed, ensuring it stays within the timebox. The PO does not run it."},
{q:"What if a developer misses the Daily Scrum?",a:"The team proceeds without them. The absent developer catches up asynchronously (e.g., written update in the team channel). Scrum does not mandate 100% attendance, but consistent absence is an impediment the SM should address."},
{q:"What is the difference between a Daily Scrum and a status meeting?",a:"A status meeting reports individual progress to a manager for tracking. A Daily Scrum is peer-to-peer collaboration to inspect Sprint Goal progress and coordinate the next 24 hours. There is no manager receiving reports."},
{q:"How should an SDET update in a Daily Scrum?",a:"An SDET says: 'Yesterday I completed regression tests for Story X and found 2 defects (logged). Today I'll automate the acceptance tests for Story Y. Blocker: I need API documentation for Story Z from Dev.' This is specific, relevant, and actionable."},
{q:"Can the Product Owner cancel the Daily Scrum?",a:"No. The Daily Scrum is owned by Developers. A PO has no authority to cancel it. Only the development team can decide to skip it (though this is poor practice and should be raised in Retrospective)."}
]},

{id:6,phase:"i",phaseLabel:"Intermediate",title:"Sprint Review — Inspect the Increment",sub:"Demonstrating working software and collecting stakeholder feedback",
def:`The <span class='kw'>Sprint Review</span> happens at the end of every Sprint. The Scrum Team demonstrates the <span class='kw'>Increment</span> (working software!) to <span class='kw'>stakeholders</span>. It is an informal <span class='kw'>working session</span>, NOT a presentation. The Product Backlog is updated based on feedback. Timebox: max 4 hours for a 4-week sprint.`,
keywords:[
{t:"Sprint Review",d:"End-of-sprint event to inspect the Increment and adapt the Product Backlog based on feedback."},
{t:"Increment",d:"The sum of all completed, usable PBIs in the sprint — must meet the Definition of Done."},
{t:"Stakeholders",d:"Customers, users, sponsors, managers — anyone invited by the PO to give feedback."},
{t:"Demo",d:"Live demonstration of working software — not slides, not screenshots, not videos ideally."},
{t:"Product Backlog Update",d:"After feedback, PO adjusts priorities, adds new items, or removes obsolete ones."},
{t:"Done vs Undone",d:"Only Done items (meeting DoD) are demoed. Undone items return to Product Backlog."},
{t:"Empirical",d:"Sprint Review is an empirical event — real working software drives decisions, not plans or promises."}
],

qa:[
{q:"What is the difference between Sprint Review and Sprint Retrospective?",a:"Sprint Review inspects the Product (what was built) with stakeholders present. Sprint Retrospective inspects the Process (how the team worked) — stakeholders are NOT invited. Review = product feedback. Retro = team improvement."},
{q:"Can stakeholders add new requirements during Sprint Review?",a:"Yes, but they go into the Product Backlog — they cannot change the current or just-completed sprint. PO prioritizes these new items for future sprints based on business value."},
{q:"What if the Sprint Goal was not met?",a:"The team transparently communicates this in the Sprint Review. Incomplete items return to the Product Backlog. The root cause is explored in the Retrospective. The Scrum Master ensures no blame is assigned."},
{q:"What should an SDET demo in a Sprint Review?",a:"An SDET may demo: automated test dashboards showing coverage, a CI/CD pipeline running green, or specific test scenarios for new features. Quality evidence (no critical bugs, full regression pass) adds credibility to the Increment."},
{q:"Can the Sprint Review be skipped?",a:"No — skipping Sprint Review means losing stakeholder feedback, making the PO's backlog decisions less informed. It violates Scrum. The Scrum Master must ensure all five events occur every Sprint."}
]},

{id:7,phase:"i",phaseLabel:"Intermediate",title:"Sprint Retrospective — Continuous Improvement",sub:"The team's engine for getting better, sprint after sprint",
def:`The <span class='kw'>Sprint Retrospective</span> (Retro) is the final event in a Sprint. It's a private team meeting where Developers, Scrum Master, and PO reflect on <em>how they worked together</em> and identify improvements. Timebox: 3h max for 4-week sprint. The output is an <span class='kw'>Actionable Improvement Plan</span> — not just a feelings session.`,

qa:[
{q:"What is the Sprint Retrospective's primary output?",a:"A concrete, prioritized list of improvement actions (2–3 max) that are specific, owned by named team members, and added to the next Sprint Backlog for implementation. Not just observations — actionable changes."},
{q:"What is psychological safety and why does it matter in Retros?",a:"Psychological safety is the belief that you won't be punished for speaking up. Without it, team members hide real problems, the Retrospective becomes shallow, and nothing improves. The Scrum Master's #1 job in a Retro is to create this safety."},
{q:"How is the Retrospective different from the Review?",a:"Review = inspect the Product (done with stakeholders). Retrospective = inspect the Process (done privately with the Scrum Team only). Different purpose, different audience."},
{q:"What metrics should an SDET bring to a Retrospective?",a:"(1) Test automation coverage % for the sprint, (2) Number of defects found vs. escaped to production, (3) CI/CD pipeline failure rate, (4) Average time to fix a failed automated test. These turn quality conversations from opinions into data."},
{q:"What is the 'Prime Directive' in Retrospectives?",a:"'Regardless of what we discover, we understand and truly believe that everyone did the best job they could, given what they knew at the time, their skills and abilities, the resources available, and the situation at hand.' It prevents blame and sets a safe tone."}
]},

qa:[
{q:"What is the difference between a Product Backlog and a Sprint Backlog?",a:"Product Backlog is the full ordered list of everything the product needs — owned by the PO, spans the entire product lifecycle. Sprint Backlog is the subset selected for one Sprint plus the implementation plan — owned by Developers, exists for one sprint only."},
{q:"What makes a User Story 'Ready' for Sprint Planning?",a:"A story is Ready when it meets INVEST: Independent, Negotiable, Valuable, Estimable, Small (fits in one sprint), Testable (has clear acceptance criteria). The team should have a 'Definition of Ready' that formalizes these criteria."},
{q:"What is a Spike story and when should it be used?",a:"A Spike is a research or investigation story used to reduce uncertainty. Example: 'Investigate OAuth2 library options for mobile login — 4 hours'. Spikes are timeboxed and produce knowledge (a decision, a proof of concept) not working software."},
{q:"How should an SDET contribute to Backlog Refinement?",a:"SDETs identify: (1) Missing acceptance criteria, (2) Stories that can't be automated, (3) Test data requirements, (4) Dependencies on other stories for integration testing, (5) Performance/security test scenarios. This prevents undone stories from entering sprints."},
{q:"What is the MoSCoW prioritization method?",a:"MoSCoW = Must Have (critical for release), Should Have (important but not vital), Could Have (nice-to-have if time permits), Won't Have (explicitly excluded from this release). PO uses this to order the Product Backlog."}
]},

{id:9,phase:"a",phaseLabel:"Advanced",title:"Definition of Done & Acceptance Criteria",sub:"Quality gates that define when work is truly finished",
def:`<span class='kw'>Definition of Done (DoD)</span> is a shared team agreement on the quality standards every <span class='kw'>Increment</span> must meet. <span class='kw'>Acceptance Criteria (AC)</span> are story-specific conditions written by the PO that define what a specific feature must do. DoD applies to ALL stories; AC applies to ONE story. Both together ensure quality.`,
keywords:[
{t:"Definition of Done",d:"Team-wide quality checklist that every PBI must pass before being 'done'."},
{t:"Acceptance Criteria",d:"Story-specific conditions from the PO that define functional correctness for that story."},
{t:"Gherkin / BDD",d:"Acceptance Criteria format: Given [context] When [action] Then [expected result]."},
{t:"Quality Gate",d:"A checkpoint in CI/CD that blocks deployment if quality standards aren't met."},
{t:"Technical Debt",d:"Shortcuts taken that will need fixing later — a weak DoD accumulates tech debt fast."},
{t:"Done Done",d:"Informal term meaning truly finished per DoD — not just coded but also tested, reviewed, documented."},
{t:"Non-functional Requirements",d:"Quality attributes: performance, security, accessibility — often forgotten in AC but critical."}
],

"Acceptance Criteria are story-specific and functional; DoD is team-wide and technical.",
"A weak DoD accumulates technical debt rapidly — quality shortcuts compound into failures.",
"BDD (Behaviour Driven Development) uses Gherkin Given/When/Then for testable AC.",
"An SDET automates Acceptance Criteria — each AC becomes an automated test case.",
"The DoD should be created by the team, not imposed by management.",
"DoD evolves over time — teams should strengthen it each sprint as their maturity grows."
],
bp:[
"Write DoD on a physical or digital wall — everyone must see it every day.",
"Include non-functional requirements in DoD: performance, security, accessibility.",
"SDETs should automate every AC as a BDD scenario (Cucumber/SpecFlow/Behave).",
"Add 'no unresolved blockers' to DoD — prevent carrying open issues across sprints.",
"Review and update DoD in every Retrospective — strengthen it incrementally.",
"PO writes AC; SDETs review AC for testability before the story enters Sprint Planning.",
"CI/CD pipeline should enforce DoD automatically — failing tests block the build."
],
qa:[
{q:"What is the difference between Definition of Done and Acceptance Criteria?",a:"DoD is a team-wide checklist applied to every story (code review, tests, deployment, etc.). Acceptance Criteria are story-specific conditions that define what the feature must do functionally. A story must pass BOTH to be complete."},
{q:"Who owns the Definition of Done?",a:"The Developers collectively own and define the DoD, with input from the Scrum Master and PO. The organization may set a minimum DoD (e.g., security scans mandatory), and the team strengthens it further."},
{q:"How does BDD relate to Acceptance Criteria?",a:"BDD (Behaviour Driven Development) uses Gherkin syntax (Given/When/Then) to write AC in a structured, testable format. This allows SDETs to directly automate AC as executable test scenarios using tools like Cucumber, SpecFlow, or Behave."},
{q:"What happens when a story meets AC but not DoD?",a:"It is NOT done. Example: a story meets all functional AC but the code review wasn't done. The DoD takes precedence — all conditions must pass. It returns to the Sprint Backlog or Product Backlog."},
{q:"How should an SDET use Acceptance Criteria?",a:"An SDET should: (1) Review AC in Refinement for testability, (2) Map each AC to a test case (happy path + edge cases), (3) Automate AC as BDD scenarios, (4) Use AC as the baseline for regression suite, (5) Flag missing AC before Sprint Planning."}
]},

lines:[
"Velocity is a planning tool — it should never be used as a performance metric to compare teams.",
"A Sprint Burndown chart that goes up (not down) signals scope creep or poor estimation.",
"Cycle Time and Lead Time are flow metrics — shorter cycle time means faster value delivery.",
"SAFe is the most widely adopted scaling framework in large enterprises.",
"LeSS is the simplest scaling approach — it extends Scrum with minimal additional roles.",
"Nexus adds a Nexus Integration Team to coordinate dependency resolution between Scrum teams.",

],
bp:[
"Never use velocity to compare two different teams — context is always different.",
"Use cumulative flow diagrams (CFD) to identify WIP bottlenecks across the sprint.",
"Track cycle time per story size category — large stories often hide estimation errors.",
"Introduce scaling frameworks gradually — don't jump to SAFe day one.",

qa:[
{q:"What is the difference between SAFe, LeSS, and Nexus?",a:"SAFe = most structured, for large enterprises (100+ people), adds Program Increments, Agile Release Trains, and many roles. LeSS = minimal rules, multiple teams share one PO and one Product Backlog. Nexus = from Scrum.org, 3–9 teams with a Nexus Integration Team focusing on dependency management."},
{q:"What is a Burndown Chart and how do you read it?",a:"A Burndown Chart shows remaining story points (Y-axis) vs. sprint days (X-axis). The ideal line goes from total sprint points on Day 1 to zero on the last day. If the actual line is above the ideal, the team is behind. If below, they're ahead."},
{q:"Why should velocity NOT be used as a performance metric?",a:"Velocity measures story points completed — teams can inflate velocity by overestimating. Using velocity to compare teams or evaluate performance creates gaming behavior. It's only useful as a self-calibration tool for forecasting a team's own future capacity."},
{q:"What is the Scrum of Scrums?",a:"An optional coordination meeting where one representative from each Scrum team meets daily or weekly to synchronize across teams. They answer: What did my team do that might affect others? What will we do? Any cross-team blockers? It is not in the Scrum Guide but is a widely used practice."},
{q:"What SDET-specific metrics matter in scaled Agile?",a:"(1) Cross-team defect escape rate — bugs found after integration, (2) Shared test environment uptime %, (3) Shared automation framework adoption rate, (4) End-to-end regression suite duration, (5) Integration test failure rate before release. These metrics are unique to scaled environments where multiple teams' code merges."}
]}

const phaseMap={f:"Fundamentals",i:"Intermediate",a:"Advanced"};
const tagClass={f:"tag-f",i:"tag-i",a:"tag-a"};
let current=0;
const visited=new Set([0]);

function renderTabBar(){
  const bar=document.getElementById('tabBar');
  bar.innerHTML='';
  sessions.forEach((s,i)=>{
    const b=document.createElement('button');
    b.className='tab-btn'+(i===current?' active':'')+(visited.has(i)&&i!==current?' done':'');
    b.textContent=`${s.id}. ${s.title.split('—')[0].trim().substring(0,18)}`;
    b.onclick=()=>goTo(i);
    bar.appendChild(b);
  });
  document.getElementById('progressFill').style.width=((visited.size/sessions.length)*100)+'%';
}

function renderSession(i){
  const s=sessions[i];
  const container=document.getElementById('sessions');
  if(document.getElementById('sess-'+s.id)) return;
  const div=document.createElement('div');
  div.className='session';
  div.id='sess-'+s.id;
  div.innerHTML=`
<div class="s-header">
  <span class="s-tag ${tagClass[s.phase]}">Phase: ${phaseMap[s.phase]} · Session ${s.id} of 10</span>
  <div class="s-title">${s.title}</div>
  <div class="s-sub">${s.sub}</div>
</div>

<div class="section">
  <div class="section-hdr">Overview — Definition</div>
  <div class="def-card"><p>${s.def}</p></div>
</div>

<div class="section">
  <div class="section-hdr">Keywords explained</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px">
    ${s.keywords.map(k=>`<div class="def-card" style="padding:.6rem .9rem"><p style="font-size:13px"><span class="kw">${k.t}</span><br>${k.d}</p></div>`).join('')}
  </div>
</div>

<div class="section">
  <div class="section-hdr">Concept diagram</div>
  <div class="flow-wrap">${s.svgCode}</div>
</div>

<div class="section">
  <div class="section-hdr">Core pillars at a glance</div>
  <div class="pillars">${s.pillars.map(p=>`<div class="pillar"><div class="icon">${p.icon}</div><div class="pl-title">${p.t}</div><div class="pl-sub">${p.s}</div></div>`).join('')}</div>
</div>

<div class="section">
  <div class="section-hdr">Interview one-liners (say these out loud!)</div>
  <div class="interview-grid">${s.lines.map((l,j)=>`<div class="i-line"><span class="i-bullet">${j+1}</span><span>${l}</span></div>`).join('')}</div>
</div>

<div class="section">
  <div class="section-hdr">Best practices — industry checklist</div>
  <div class="chk-list">${s.bp.map((b,j)=>`<div class="chk-item"><div class="chk-box" id="chk-${s.id}-${j}" onclick="toggleChk('chk-${s.id}-${j}')"></div><span>${b}</span></div>`).join('')}</div>
</div>

<div class="section">
  <div class="section-hdr">Interview Q&amp;A — click to reveal answers</div>
  <div class="qa-stack">${s.qa.map((q,j)=>`<div class="qa-card"><div class="qa-q" onclick="toggleQA(this)"><span>Q${j+1}: ${q.q}</span><i class="ti ti-chevron-down" aria-hidden="true"></i></div><div class="qa-a">${q.a}</div></div>`).join('')}</div>
</div>

<div class="nav-row">
  ${i>0?`<button class="nav-btn" onclick="goTo(${i-1})">← Session ${i}</button>`:'<span></span>'}
  ${i<sessions.length-1?`<button class="nav-btn primary" onclick="goTo(${i+1})">Session ${i+2} →</button>`:'<button class="nav-btn primary" onclick="sendPrompt(\'I have completed all 10 sessions. Please quiz me with a comprehensive Agile + Scrum mock interview!\')">🎓 Take Final Quiz ↗</button>'}
</div>`;
  container.appendChild(div);
}

function goTo(i){
  document.querySelectorAll('.session').forEach(s=>s.classList.remove('active'));
  current=i;
  visited.add(i);
  renderSession(i);
  document.getElementById('sess-'+sessions[i].id).classList.add('active');
  renderTabBar();
}

function toggleQA(el){
  const ans=el.nextElementSibling;
  ans.classList.toggle('open');
}

function toggleChk(id){
  document.getElementById(id).classList.toggle('checked');
  const el=document.getElementById(id);
  el.textContent=el.classList.contains('checked')?"✓":"";
}

renderSession(0);
document.getElementById('sess-'+sessions[0].id).classList.add('active');
renderTabBar();
</script>

    <!-- PRISM DYNAMIC HIGHLIGHT FIX -->
    <script>
    if (window.Prism) {
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new MutationObserver((mutations) => {
                let needsHighlight = false;
                mutations.forEach(m => {
                    if (m.addedNodes.length) {
                        m.addedNodes.forEach(n => {
                            if (n.nodeName === 'PRE' || n.nodeName === 'CODE') needsHighlight = true;
                            if (n.querySelector && n.querySelector('pre')) needsHighlight = true;
                        });
                    }
                });
                if (needsHighlight) {
                    Prism.highlightAll();
                }
            });
            observer.observe(document.body, { childList: true, subtree: true });
        });
    }
    </script>
