<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --font-sans:'Segoe UI',system-ui,-apple-system,sans-serif;
  --font-mono:'Cascadia Code','Fira Code','Consolas',monospace;
  --color-text-primary:#1a1a2e;
  --color-text-secondary:#555770;
  --color-text-tertiary:#8e90a6;
  --color-text-info:#3B82F6;
  --color-text-warning:#D97706;
  --color-text-success:#059669;
  --color-text-danger:#DC2626;
  --color-background-primary:#ffffff;
  --color-background-secondary:#f4f4f8;
  --color-background-tertiary:#eaeaef;
  --color-background-info:#EFF6FF;
  --color-background-warning:#FFFBEB;
  --color-background-success:#ECFDF5;
  --color-background-danger:#FEF2F2;
  --color-border-primary:#534AB7;
  --color-border-secondary:#d1d1db;
  --color-border-tertiary:#e4e4eb;
  --color-border-info:#93C5FD;
  --color-border-success:#6EE7B7;
  --color-border-warning:#FBCF33;
  --color-border-danger:#FCA5A5;
  --border-radius-md:8px;
  --border-radius-lg:12px;
}

body{font-family:var(--font-sans);color:var(--color-text-primary);background:transparent}
.hub{width:100%;padding:0 0 2rem}
.top-bar{background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary);padding:12px 16px;position:sticky;top:0;z-index:10}
.top-bar h2{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px}
.tab-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.tab-scroll::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:5px 11px;font-size:12px;font-weight:400;border:0.5px solid var(--color-border-tertiary);border-radius:20px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);transition:all .15s;white-space:nowrap}
.tab-btn.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.tab-btn:hover:not(.active){background:var(--color-background-secondary);color:var(--color-text-primary)}
.content{padding:16px}
.session{display:none}
.session.active{display:block}
.session-header{margin-bottom:16px;padding-bottom:12px;border-bottom:0.5px solid var(--color-border-tertiary)}
.session-header h3{font-size:18px;font-weight:500;margin-bottom:4px}
.session-header .meta{font-size:12px;color:var(--color-text-secondary);display:flex;gap:12px}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:400}
.badge.fund{background:var(--color-background-info);color:var(--color-text-info)}
.badge.inter{background:var(--color-background-success);color:var(--color-text-success)}
.badge.adv{background:var(--color-background-warning);color:var(--color-text-warning)}
.badge.real{background:var(--color-background-danger);color:var(--color-text-danger)}
.section{margin-bottom:20px}
.section-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.section-title i{font-size:14px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;margin-bottom:10px}
.card p{font-size:14px;line-height:1.6;color:var(--color-text-primary)}
.card p+p{margin-top:6px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:10px}
.mini-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.mini-card .label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.mini-card .val{font-size:13px;font-weight:500;color:var(--color-text-primary);line-height:1.4}
.oneliner{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);margin-bottom:6px}
.oneliner .num{font-size:11px;font-weight:500;color:var(--color-text-secondary);min-width:16px;margin-top:1px}
.oneliner p{font-size:13px;line-height:1.5;color:var(--color-text-primary)}
.oneliner strong{font-weight:500}
pre{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px;font-size:12px;font-family:var(--font-mono);overflow-x:auto;line-height:1.6;border:0.5px solid var(--color-border-tertiary);margin-bottom:8px}
.ex-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px;padding-left:2px}
.mistake{border-left:2px solid var(--color-border-danger);background:var(--color-background-danger);border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;padding:10px 12px;margin-bottom:6px}
.fix{border-left:2px solid var(--color-border-success);background:var(--color-background-success);border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;padding:10px 12px;margin-bottom:10px}
.mistake p,.fix p{font-size:13px;line-height:1.5}
.mistake strong,.fix strong{font-weight:500}
.checklist{list-style:none;padding:0}
.checklist li{font-size:13px;line-height:1.5;padding:5px 0;display:flex;align-items:flex-start;gap:8px;border-bottom:0.5px solid var(--color-border-tertiary)}
.checklist li:last-child{border-bottom:none}
.checklist li i{color:var(--color-text-success);margin-top:2px;font-size:14px;flex-shrink:0}
.diagram-wrap{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:12px;margin-bottom:10px;overflow-x:auto}
.ask-btn{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:7px 14px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;background:transparent;color:var(--color-text-primary)}
.ask-btn:hover{background:var(--color-background-secondary)}
.progress-bar{height:3px;background:var(--color-border-tertiary);border-radius:2px;margin-bottom:12px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:var(--color-text-primary);transition:width .3s}
</style>

if status_code == 200:

attempt = 0
max_retries = 3
success = False

    print(f"Attempt {attempt}...")

        continue       # jump to next iteration

 {label:"Example 1 — Basic test helper function",code:`def verify_status_code(actual, expected=200):
    """Verify HTTP status code matches expected."""
    if actual == expected:
        print(f"PASS: Status {actual}")
        return True
    else:
        print(f"FAIL: Expected {expected}, got {actual}")
        return False

# Usage
verify_status_code(200)        # PASS: Status 200
verify_status_code(404, 404)   # PASS: Status 404
verify_status_code(500)`},

    """Reusable login action for UI tests."""
    driver.find_element("id", "username").send_keys(username)
    driver.find_element("id", "password").send_keys(password)
    driver.find_element("id", "loginBtn").click()
    print(f"Logged in as: {username}")

# Every test just calls: login(driver, "admin", "pass123")`},

test_multiple_urls(

{id:5,title:"OOP — Classes & Objects",badge:"fund",badgeText:"Fundamentals",
what:"OOP (Object-Oriented Programming) organizes code into classes (blueprints) and objects (instances).",
why:"Page Object Model (POM) — the industry-standard Selenium pattern — is built entirely on OOP classes.",
when:"Building Page Object classes, API client wrappers, test base classes.",
how:"class keyword → __init__ constructor → methods → instantiate with ClassName().",
where:"Page Objects, Base Test class, API clients, Data Model classes.",
oneliners:[
 {n:"Q1",t:"<strong>What is a class?</strong> A blueprint that defines attributes (data) and methods (behavior) — e.g., LoginPage class holds locators and actions."},
 {n:"Q2",t:"<strong>What is self?</strong> self refers to the current instance of the class — it's how methods access the object's own data."},
 {n:"Q3",t:"<strong>What is inheritance?</strong> A child class reuses the parent's code — e.g., LoginPage(BasePage) inherits common browser methods from BasePage."},
],
examples:[
 {label:"Example 1 — Basic class structure",code:`class TestConfig:
    """Stores test environment configuration."""
    
    def __init__(self, env="staging"):
        self.env = env
        self.base_url = f"https://{env}.app.com"
        self.timeout = 30
    
    def get_url(self, path):
        return f"{self.base_url}/{path}"

config = TestConfig("production")
print(config.base_url)             # https://production.app.com
print(config.get_url("api/users")) # https://production.app.com/api/users`},
 {label:"Example 2 — Page Object Model (LoginPage)",code:`class LoginPage:
    """Page Object for Login screen."""
    
    # Locators as class attributes
    USERNAME_INPUT = ("id", "username")
    PASSWORD_INPUT = ("id", "password")
    LOGIN_BUTTON   = ("id", "loginBtn")
    
    def __init__(self, driver):
        self.driver = driver
    
    def login(self, user, pwd):
        self.driver.find_element(*self.USERNAME_INPUT).send_keys(user)
        self.driver.find_element(*self.PASSWORD_INPUT).send_keys(pwd)
        self.driver.find_element(*self.LOGIN_BUTTON).click()`},
 {label:"Example 3 — Inheritance (BasePage → LoginPage)",code:`class BasePage:
    def __init__(self, driver):
        self.driver = driver
    
    def wait_for_element(self, locator, timeout=10):
        # Shared wait logic for all pages
        print(f"Waiting for {locator} up to {timeout}s")

class DashboardPage(BasePage):  # inherits BasePage
    def get_title(self):
        return self.driver.title

# DashboardPage gets wait_for_element for free`},
 {label:"Example 4 — Class method vs static method",code:`class APIHelper:
    BASE_URL = "https://api.app.com"
    
    @classmethod
    def build_url(cls, endpoint):
        # classmethod: uses cls (class itself)
        return f"{cls.BASE_URL}/{endpoint}"
    
    @staticmethod
    def is_success(code):
        # staticmethod: no access to cls or self
        return 200 <= code < 300

print(APIHelper.build_url("users"))  # https://api.app.com/users
print(APIHelper.is_success(201))     # True`},
 {label:"Example 5 — __str__ and __repr__ for debugging",code:`class TestResult:
    def __init__(self, name, status, duration):
        self.name = name
        self.status = status
        self.duration = duration
    
    def __str__(self):
        return f"[{self.status}] {self.name} ({self.duration}ms)"
    
    def __repr__(self):
        return f"TestResult('{self.name}','{self.status}',{self.duration})"

r = TestResult("login_test", "PASS", 1250)
print(r)     # [PASS] login_test (1250ms)
print(repr(r))`},
],

{id:7,title:"Exception Handling",badge:"inter",badgeText:"Intermediate",
what:"Exception handling (try/except/finally) manages errors gracefully so tests fail with meaningful messages.",
why:"Network timeouts, element not found, assertion errors — QA scripts must handle all without crashing the entire suite.",
when:"API calls, browser interactions, file reads, DB queries — any I/O that can fail.",
how:"try block → risky code; except block → handle error; finally → cleanup code.",
where:"API request wrappers, browser action helpers, test teardown.",
oneliners:[
 {n:"Q1",t:"<strong>Why use finally in tests?</strong> finally always runs — use it for cleanup: close browser, logout, delete test data, even if the test crashes."},
 {n:"Q2",t:"<strong>What is a custom exception?</strong> A class extending Exception, used to raise domain-specific errors like TestDataError or PageLoadError in your framework."},
 {n:"Q3",t:"<strong>except Exception vs bare except?</strong> Use except Exception to catch all standard exceptions; never use bare 'except:' — it also catches SystemExit and KeyboardInterrupt."},
],
examples:[
 {label:"Example 1 — Basic try/except",code:`try:
    response = requests.get("https://api.example.com", timeout=5)
    response.raise_for_status()   # raises error for 4xx/5xx
    print("API OK")
except requests.exceptions.Timeout:
    print("FAIL: Request timed out")
except requests.exceptions.HTTPError as e:
    print(f"FAIL: HTTP error — {e}")`},
 {label:"Example 2 — Multiple except blocks",code:`def get_config(key):
    try:
        with open("config.json") as f:
            data = json.load(f)
        return data[key]
    except FileNotFoundError:
        print("Config file missing!")
    except KeyError:
        print(f"Key '{key}' not found in config")
    except json.JSONDecodeError:
        print("Invalid JSON in config file")`},
 {label:"Example 3 — finally for cleanup",code:`driver = None
try:
    driver = webdriver.Chrome()
    driver.get("https://app.com")
    # ... run test ...
    assert "Dashboard" in driver.title
except AssertionError as e:
    print(f"Test FAILED: {e}")
finally:
    if driver:
        driver.quit()   # always close browser!`},
 {label:"Example 4 — Custom exception class",code:`class ElementNotVisibleError(Exception):
    """Raised when element is present but not visible."""
    pass

def click_element(driver, locator):
    el = driver.find_element(*locator)
    if not el.is_displayed():
        raise ElementNotVisibleError(
            f"Element {locator} exists but is not visible"
        )
    el.click()`},
 {label:"Example 5 — Retry decorator pattern",code:`import time

def retry(max_attempts=3, delay=1):
    def decorator(func):
        def wrapper(*args, **kwargs):
            for attempt in range(1, max_attempts+1):
                try:
                    return func(*args, **kwargs)
                except Exception as e:
                    print(f"Attempt {attempt} failed: {e}")
                    time.sleep(delay)
            raise RuntimeError("Max retries reached")
        return wrapper
    return decorator

@retry(max_attempts=3, delay=2)
def flaky_api_call():
    response = requests.get("https://api.app.com")`},
],

 {m:"Using bare except: — catches everything including SystemExit",f:"Always specify the exception type: except requests.Timeout: or at minimum except Exception as e:"},
 {m:"Not logging the exception — swallowing errors silently",f:"Always log: print(f'Error: {e}') or use logging.error(str(e)) to trace failures."},
],

{id:9,title:"Pytest — Test Framework Basics",badge:"inter",badgeText:"Intermediate",
what:"Pytest is Python's most popular testing framework — discovers, runs, and reports tests automatically.",
why:"Industry standard for QA automation. Supports fixtures, parameterization, plugins, and Allure reports.",
when:"Writing and running all Python test cases — unit, integration, API, and UI tests.",
how:"Name files test_*.py, functions test_*, run with 'pytest' command.",
where:"Every Python automation project.",
oneliners:[
 {n:"Q1",t:"<strong>What is a pytest fixture?</strong> A function that provides setup/teardown for tests — e.g., browser driver, DB connection, test data. Injected via parameter name."},
 {n:"Q2",t:"<strong>What is @pytest.mark.parametrize?</strong> A decorator that runs the same test with multiple data sets — the foundation of data-driven testing in pytest."},
 {n:"Q3",t:"<strong>What is conftest.py?</strong> A shared configuration file where fixtures are defined and automatically available to all tests in the directory without importing."},
],
examples:[
 {label:"Example 1 — First pytest test",code:`# File: tests/test_math.py

def test_addition():
    assert 2 + 2 == 4   # assert is pytest's pass/fail mechanism

def test_string_check():
    result = "login successful"
    assert "login" in result

def test_list_length():
    items = [1, 2, 3]
    assert len(items) == 3
# Run: pytest tests/test_math.py -v`},
 {label:"Example 2 — Fixtures for setup/teardown",code:`import pytest

@pytest.fixture
def base_url():
    """Provides base URL to tests."""
    return "https://api.example.com"

@pytest.fixture
def headers():
    return {"Content-Type": "application/json"}

def test_api_health(base_url, headers):
    # fixtures injected by name
    response = requests.get(f"{base_url}/health", headers=headers)
    assert response.status_code == 200`},
 {label:"Example 3 — Parametrize (data-driven testing)",code:`import pytest

@pytest.mark.parametrize("username,password,expected", [
    ("admin",    "admin123", 200),
    ("user1",    "pass456",  200),
    ("invalid",  "wrong",    401),
    ("",         "",         400),
])
def test_login_api(username, password, expected):
    response = requests.post("/login", json={
        "username": username,
        "password": password
    })
    assert response.status_code == expected`},
 {label:"Example 4 — Browser fixture in conftest.py",code:`# File: conftest.py
import pytest
from selenium import webdriver

@pytest.fixture(scope="function")   # new browser per test
def driver():
    driver = webdriver.Chrome()
    driver.implicitly_wait(10)
    yield driver              # test runs here
    driver.quit()             # teardown after test

# File: tests/test_login.py
def test_login_page_title(driver):
    driver.get("https://app.com/login")
    assert "Login" in driver.title`},
 {label:"Example 5 — Marks and custom markers",code:`import pytest

@pytest.mark.smoke
def test_homepage_loads():
    assert True

@pytest.mark.regression
@pytest.mark.skip(reason="Feature under development")
def test_payment_flow():
    pass

@pytest.mark.xfail(reason="Known bug BUG-123")
def test_checkout_discount():
    assert 1 == 2   # expected to fail

# Run only smoke tests:
# pytest -m smoke -v`},
],

{id:10,title:"API Testing with Requests",badge:"inter",badgeText:"Intermediate",
what:"The requests library lets Python make HTTP calls — GET, POST, PUT, DELETE — and inspect responses.",
why:"REST API testing is a core QA skill. Faster than UI testing and required for microservices architectures.",
when:"Smoke tests, regression tests, contract tests, performance sanity checks.",
how:"pip install requests → import requests → call requests.get/post → assert status/body.",
where:"API test suites, health check scripts, contract validation tests.",
oneliners:[
 {n:"Q1",t:"<strong>What is response.json()?</strong> Parses the response body from JSON string to a Python dict — use it to access API response fields for assertions."},
 {n:"Q2",t:"<strong>What is raise_for_status()?</strong> Automatically raises an HTTPError exception for 4xx/5xx responses — cleaner than checking status_code manually."},
 {n:"Q3",t:"<strong>What are headers used for?</strong> Headers pass metadata like Authorization tokens, Content-Type, and API keys — required for authenticated API endpoints."},
],
examples:[
 {label:"Example 1 — GET request and assertions",code:`import requests

response = requests.get("https://jsonplaceholder.typicode.com/posts/1")

assert response.status_code == 200
data = response.json()
assert data["id"] == 1
assert "title" in data
print(f"Title: {data['title']}")
print(f"Response time: {response.elapsed.total_seconds()}s")`},
 {label:"Example 2 — POST request (create resource)",code:`import requests

payload = {
    "title":  "QA Automation Blog",
    "body":   "Python + Pytest + Selenium",
    "userId": 1
}
headers = {"Content-Type": "application/json"}

response = requests.post(
    "https://jsonplaceholder.typicode.com/posts",
    json=payload,
    headers=headers
)
assert response.status_code == 201   # 201 = Created
print(response.json()["id"])`},
 {label:"Example 3 — Auth headers",code:`TOKEN = "Bearer eyJhbGc..."

response = requests.get(
    "https://api.app.com/profile",
    headers={"Authorization": TOKEN}
)

if response.status_code == 401:
    print("FAIL: Token expired or invalid")
elif response.status_code == 200:
    user = response.json()
    assert user["role"] == "admin"`},
 {label:"Example 4 — PUT and DELETE",code:`# PUT — update resource
response = requests.put(
    "https://jsonplaceholder.typicode.com/posts/1",
    json={"title": "Updated Title", "body": "Updated body", "userId": 1}
)
assert response.status_code == 200

# DELETE — remove resource
response = requests.delete("https://jsonplaceholder.typicode.com/posts/1")
assert response.status_code == 200`},
 {label:"Example 5 — API test class (reusable)",code:`import requests

class APIClient:
    def __init__(self, base_url, token=None):
        self.base_url = base_url
        self.session  = requests.Session()
        if token:
            self.session.headers["Authorization"] = f"Bearer {token}"
    
    def get(self, endpoint):
        return self.session.get(f"{self.base_url}{endpoint}")
    
    def post(self, endpoint, data):
        return self.session.post(f"{self.base_url}{endpoint}", json=data)

client = APIClient("https://api.app.com", token="abc123")
r = client.get("/users")
assert r.status_code == 200`},
],
mistakes:[
 {m:"Hardcoding base URLs and tokens in test files",f:"Store in environment variables or config.json — use os.environ.get('API_TOKEN') for secrets."},
 {m:"Not using requests.Session() for multiple calls to the same server",f:"Session() reuses connections and headers — faster and more realistic for multi-step API tests."},
],
checklist:[
 "Use requests.Session() for test suites with multiple API calls",
 "Always assert status code AND response body — not just status code",
 "Use response.elapsed for performance assertions",
 "Store base URLs and credentials in environment variables or config files",
 "Add timeout parameter to every request: requests.get(url, timeout=10)",
],

{id:11,title:"Selenium WebDriver Basics",badge:"inter",badgeText:"Intermediate",
what:"Selenium WebDriver automates real browser interactions — clicking, typing, navigating, asserting UI state.",
why:"UI/E2E test automation is the foundation of QA engineering. Selenium is the most widely used browser automation tool.",
when:"Login flows, form submission, navigation, cross-browser testing.",
how:"pip install selenium → create WebDriver → find elements → interact → assert.",
where:"Functional UI tests, regression suites, smoke tests.",
oneliners:[
 {n:"Q1",t:"<strong>What is a locator?</strong> A strategy to find elements: By.ID, By.CSS_SELECTOR, By.XPATH — use ID first, then CSS, XPATH as last resort."},
 {n:"Q2",t:"<strong>What is implicit vs explicit wait?</strong> Implicit wait sets a global timeout; explicit wait waits for a specific condition (element visible, clickable) — always prefer explicit."},
 {n:"Q3",t:"<strong>What is WebDriverWait?</strong> A class that polls until an expected condition is met or times out — replaces unreliable time.sleep() in production tests."},
],
examples:[
 {label:"Example 1 — Launch browser and navigate",code:`from selenium import webdriver
from selenium.webdriver.chrome.options import Options

options = Options()
options.add_argument("--headless")   # no browser window (CI mode)

driver = webdriver.Chrome(options=options)
driver.maximize_window()
driver.get("https://the-internet.herokuapp.com/login")
print(driver.title)
driver.quit()`},
 {label:"Example 2 — Find elements and interact",code:`from selenium.webdriver.common.by import By

driver.find_element(By.ID, "username").send_keys("tomsmith")
driver.find_element(By.ID, "password").send_keys("SuperSecretPassword!")
driver.find_element(By.CSS_SELECTOR, "button[type='submit']").click()

# Verify success message
msg = driver.find_element(By.CSS_SELECTOR, ".flash.success").text
assert "You logged into a secure area!" in msg`},
 {label:"Example 3 — Explicit wait (best practice)",code:`from selenium.webdriver.support.ui import WebDriverWait
from selenium.webdriver.support import expected_conditions as EC

wait = WebDriverWait(driver, timeout=10)

# Wait until element is visible before interacting
element = wait.until(
    EC.visibility_of_element_located((By.ID, "username"))
)
element.send_keys("admin")

# Wait for URL to change
wait.until(EC.url_contains("dashboard"))`},
 {label:"Example 4 — Screenshot on failure",code:`import os

def take_screenshot(driver, test_name):
    folder = "screenshots"
    os.makedirs(folder, exist_ok=True)
    path = f"{folder}/{test_name}.png"
    driver.save_screenshot(path)
    print(f"Screenshot saved: {path}")

try:
    driver.find_element(By.ID, "nonexistent").click()
except Exception as e:
    take_screenshot(driver, "login_failure")
    raise`},
 {label:"Example 5 — Dropdown, checkbox, alert",code:`from selenium.webdriver.support.ui import Select

# Dropdown
select = Select(driver.find_element(By.ID, "dropdown"))
select.select_by_visible_text("Option 2")

# Checkbox
checkbox = driver.find_element(By.ID, "terms")
if not checkbox.is_selected():
    checkbox.click()

# Browser alert
alert = driver.switch_to.alert
print(alert.text)
alert.accept()`},
],
mistakes:[
 {m:"Using time.sleep() — brittle, slow, environment-dependent",f:"Replace with WebDriverWait and expected_conditions — waits only as long as needed."},
 {m:"Using XPATH everywhere — fragile, breaks on UI changes",f:"Prefer By.ID then By.CSS_SELECTOR. Only use XPATH for complex traversals."},
],
checklist:[
 "Use Page Object Model — never write locators in test functions directly",
 "Always use explicit waits — never time.sleep()",

{id:12,title:"Page Object Model (POM)",badge:"adv",badgeText:"Advanced",
what:"POM is a design pattern that creates one Python class per web page, encapsulating locators and actions.",
why:"Separates test logic from page structure — when the UI changes, only the Page Object changes, not every test.",
when:"Any UI automation project with more than 3 pages.",
how:"Create page classes with locators + action methods → tests call page methods only.",
where:"Entire Selenium/Playwright test frameworks.",
oneliners:[
 {n:"Q1",t:"<strong>What problem does POM solve?</strong> Locator duplication — without POM, changing one button's ID breaks dozens of tests. POM fixes it in one place."},
 {n:"Q2",t:"<strong>What is method chaining in POM?</strong> Page methods return the next Page Object — login_page.login() returns DashboardPage — enabling fluent test writing."},
 {n:"Q3",t:"<strong>Where should assertions go?</strong> In test functions, NOT in Page Objects — pages contain only actions; tests contain what to verify."},
],
examples:[
 {label:"Example 1 — BasePage class",code:`from selenium.webdriver.support.ui import WebDriverWait
from selenium.webdriver.support import expected_conditions as EC

class BasePage:
    def __init__(self, driver):
        self.driver = driver
        self.wait = WebDriverWait(driver, 10)
    
    def find(self, locator):
        return self.wait.until(EC.presence_of_element_located(locator))
    
    def click(self, locator):
        self.wait.until(EC.element_to_be_clickable(locator)).click()
    
    def type_text(self, locator, text):
        el = self.find(locator)
        el.clear()
        el.send_keys(text)`},
 {label:"Example 2 — LoginPage class",code:`from selenium.webdriver.common.by import By
from pages.base_page import BasePage
from pages.dashboard_page import DashboardPage

class LoginPage(BasePage):
    # Locators
    USERNAME = (By.ID, "username")
    PASSWORD = (By.ID, "password")
    LOGIN_BTN = (By.CSS_SELECTOR, "button[type='submit']")
    ERROR_MSG = (By.CSS_SELECTOR, ".flash.error")
    
    def login(self, username, password):
        self.type_text(self.USERNAME, username)
        self.type_text(self.PASSWORD, password)
        self.click(self.LOGIN_BTN)
        return DashboardPage(self.driver)   # method chaining`},
 {label:"Example 3 — Test using POM (clean test code)",code:`import pytest
from pages.login_page import LoginPage

def test_valid_login(driver):
    login_page = LoginPage(driver)
    driver.get("https://the-internet.herokuapp.com/login")
    
    dashboard = login_page.login("tomsmith", "SuperSecretPassword!")
    
    assert "Secure Area" in driver.title    # test contains assertions

def test_invalid_login(driver):
    login_page = LoginPage(driver)
    driver.get("https://the-internet.herokuapp.com/login")
    login_page.login("wrong", "wrong")
    assert login_page.get_error_text() != ""`},
 {label:"Example 4 — Page factory / component pattern",code:`class SearchBar:
    """Reusable component — appears on multiple pages."""
    SEARCH_INPUT = (By.NAME, "q")
    SEARCH_BTN   = (By.CSS_SELECTOR, "[type='search']")
    
    def __init__(self, driver):
        self.driver = driver
    
    def search(self, query):
        self.driver.find_element(*self.SEARCH_INPUT).send_keys(query)
        self.driver.find_element(*self.SEARCH_BTN).click()

class HomePage(BasePage):
    def __init__(self, driver):
        super().__init__(driver)
        self.search_bar = SearchBar(driver)   # component injection`},

examples:[
 {label:"Example 1 — Session-scoped API token fixture",code:`import pytest
import requests

@pytest.fixture(scope="session")
def auth_token():
    """Login once per test session, share token with all tests."""
    resp = requests.post("https://api.app.com/login", json={
        "username": "admin",
        "password": "secret"
    })
    return resp.json()["token"]

def test_get_users(auth_token):
    headers = {"Authorization": f"Bearer {auth_token}"}
    resp = requests.get("/users", headers=headers)
    assert resp.status_code == 200`},
 {label:"Example 2 — Screenshot on failure hook",code:`# conftest.py
import pytest

@pytest.hookimpl(tryfirst=True, hookwrapper=True)
def pytest_runtest_makereport(item, call):
    outcome = yield
    rep = outcome.get_result()
    
    if rep.failed and "driver" in item.funcargs:
        driver = item.funcargs["driver"]
        driver.save_screenshot(f"screenshots/{item.name}.png")
        print(f"Screenshot taken: {item.name}.png")`},

{id:15,title:"CI/CD Integration",badge:"adv",badgeText:"Advanced",
what:"CI/CD runs your test suite automatically on every code commit via GitHub Actions, Jenkins, or GitLab CI.",
why:"Automated tests only add value when they run continuously — catching bugs before they reach production.",
when:"After every pull request, before every deployment, on a scheduled nightly run.",
how:"Create a pipeline config file → install deps → run pytest → publish Allure report.",
where:"GitHub Actions (.github/workflows/), Jenkins Jenkinsfile, GitLab .gitlab-ci.yml.",
oneliners:[
 {n:"Q1",t:"<strong>What is CI/CD?</strong> Continuous Integration automates test runs on every commit; Continuous Delivery automates deployment after tests pass."},
 {n:"Q2",t:"<strong>What is a test pipeline stage?</strong> A distinct step in the CI pipeline — install, lint, test, report — each must pass before the next runs."},
 {n:"Q3",t:"<strong>Why use --headless in CI?</strong> CI servers have no display; headless Chrome runs without a GUI so Selenium tests work in any server environment."},
],
examples:[
 {label:"Example 1 — GitHub Actions workflow",code:`# .github/workflows/test.yml
name: QA Automation

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --html=report.html
      - uses: actions/upload-artifact@v4
        with: {name: test-report, path: report.html}`},
 {label:"Example 2 — Environment variables in CI",code:`import os

# In CI, set secrets via GitHub Secrets / Jenkins credentials
BASE_URL  = os.environ.get("BASE_URL",  "https://staging.app.com")
API_TOKEN = os.environ.get("API_TOKEN", "")
DB_URL    = os.environ.get("DB_URL",    "")

# Never hardcode credentials in test files
assert API_TOKEN, "API_TOKEN env var must be set in CI configuration"`},
 {label:"Example 3 — pytest exit codes for CI",code:`# pytest exit codes:
# 0 = all tests passed
# 1 = some tests failed
# 2 = test execution was interrupted
# 3 = internal error
# 4 = command line usage error
# 5 = no tests collected

# CI reads exit code — non-zero = pipeline fails
# Force pass even with failures (use carefully):
# pytest tests/ || true   ← never do this in production CI!`},
 {label:"Example 4 — Allure report in CI",code:`# Install allure pytest plugin
# pip install allure-pytest

# Run tests with allure data collection
# pytest tests/ --alluredir=allure-results

# GitHub Actions step to publish Allure report:
# - name: Generate Allure Report
#   run: |
#     npm install -g allure-commandline
#     allure generate allure-results --clean -o allure-report
# - uses: actions/upload-artifact@v4
#   with: {name: allure-report, path: allure-report}`},
 {label:"Example 5 — Parallel test execution",code:`# Install pytest-xdist
# pip install pytest-xdist

# Run tests in parallel (4 workers):
# pytest tests/ -n 4 -v

# In conftest.py — handle parallel-safe fixtures:
@pytest.fixture(scope="function")   # each worker gets its own
def driver():
    driver = webdriver.Chrome()
    yield driver
    driver.quit()

# Note: session-scoped fixtures are shared within one worker`},
],

{id:16,title:"Playwright with Python",badge:"adv",badgeText:"Advanced",
what:"Playwright is a modern browser automation library — faster and more reliable than Selenium with built-in waits.",
why:"Playwright auto-waits for elements, supports multiple browsers natively, and has excellent Python API.",
when:"New projects, or when Selenium tests are too flaky. Preferred for modern SPAs.",
how:"pip install playwright → playwright install → use sync_playwright or async.",
where:"E2E tests, visual regression, network interception.",
oneliners:[
 {n:"Q1",t:"<strong>Playwright vs Selenium?</strong> Playwright has auto-waiting (no explicit waits needed), network interception, and multi-tab support built in — more reliable for modern apps."},
 {n:"Q2",t:"<strong>What is page.expect_response()?</strong> Intercepts network calls — lets you assert on API responses triggered by UI actions without a separate API test."},
 {n:"Q3",t:"<strong>What are Playwright traces?</strong> A full recording of a test run (screenshots, DOM snapshots, network) — invaluable for debugging CI failures."},
],
examples:[
 {label:"Example 1 — Basic Playwright test",code:`from playwright.sync_api import sync_playwright

with sync_playwright() as p:
    browser = p.chromium.launch(headless=False)
    page = browser.new_page()
    page.goto("https://playwright.dev")
    print(page.title())
    browser.close()`},
 {label:"Example 2 — Playwright with Pytest",code:`import pytest
from playwright.sync_api import Page

def test_login(page: Page):
    page.goto("https://the-internet.herokuapp.com/login")
    page.fill("#username", "tomsmith")
    page.fill("#password", "SuperSecretPassword!")
    page.click("button[type='submit']")
    
    # Auto-waits for element to appear — no explicit wait needed!
    expect(page.locator(".flash.success")).to_be_visible()`},
 {label:"Example 3 — Network interception",code:`from playwright.sync_api import Page, Route

def test_api_mocking(page: Page):
    def mock_users(route: Route):
        route.fulfill(json=[{"id":1,"name":"Test User"}])
    
    page.route("**/api/users", mock_users)
    page.goto("https://app.com/users")
    
    # Page renders with mocked data
    expect(page.locator(".user-name")).to_contain_text("Test User")`},
 {label:"Example 4 — Screenshot and trace",code:`def test_with_trace(page: Page, browser_context):
    browser_context.tracing.start(screenshots=True, snapshots=True)
    
    page.goto("https://app.com")
    page.screenshot(path="screenshots/homepage.png")
    
    browser_context.tracing.stop(path="traces/test_trace.zip")
    # Open trace: playwright show-trace traces/test_trace.zip`},
 {label:"Example 5 — Mobile emulation",code:`from playwright.sync_api import sync_playwright

with sync_playwright() as p:
    iphone = p.devices["iPhone 13"]
    browser = p.webkit.launch()
    context = browser.new_context(**iphone)
    page = context.new_page()
    
    page.goto("https://app.com")
    assert page.viewport_size["width"] == 390
    page.screenshot(path="mobile_view.png")`},
],
mistakes:[
 {m:"Using time.sleep() in Playwright — unnecessary, breaks the auto-wait model",f:"Playwright auto-waits for elements. Use page.wait_for_selector() only for explicit cases."},
 {m:"Not using expect() assertions — using plain assert with .text_content()",f:"Use Playwright's expect(locator).to_have_text() — it retries automatically until timeout."},
],

{id:17,title:"Database Testing",badge:"adv",badgeText:"Advanced",
what:"Database testing verifies data is correctly stored, updated, and deleted by the application.",
why:"UI/API tests verify the surface — DB tests verify the truth. Data corruption bugs can only be found here.",
when:"After CRUD operations, after data migration, verifying background jobs.",
how:"Python's sqlite3 (built-in), psycopg2 (PostgreSQL), pymysql (MySQL) → connect → query → assert.",
where:"Backend validation tests, data integrity tests, ETL pipeline tests.",
oneliners:[
 {n:"Q1",t:"<strong>Why test the database?</strong> API may return 200 but store wrong data — DB tests catch silent data corruption bugs that UI/API tests miss."},
 {n:"Q2",t:"<strong>What is SQL injection testing?</strong> Testing that the app rejects malicious SQL inputs — e.g., passing ' OR 1=1-- as username — a critical security test."},
 {n:"Q3",t:"<strong>What is test data isolation?</strong> Each test creates its own data and cleans up after — prevents tests from affecting each other's DB state."},
],
examples:[
 {label:"Example 1 — SQLite connection (built-in, no install)",code:`import sqlite3

conn = sqlite3.connect("test.db")   # or :memory: for temp DB
cursor = conn.cursor()

cursor.execute("""
    CREATE TABLE IF NOT EXISTS users (
        id INTEGER PRIMARY KEY,
        username TEXT,
        email TEXT
    )
""")
conn.commit()
conn.close()`},
 {label:"Example 2 — Insert and verify with pytest",code:`import sqlite3, pytest

@pytest.fixture
def db():
    conn = sqlite3.connect(":memory:")   # fresh DB per test
    conn.execute("CREATE TABLE users (id INTEGER PRIMARY KEY, name TEXT)")
    yield conn
    conn.close()   # auto cleanup

def test_insert_user(db):
    db.execute("INSERT INTO users VALUES (1, 'Alice')")
    db.commit()
    
    cursor = db.execute("SELECT name FROM users WHERE id=1")
    row = cursor.fetchone()
    assert row[0] == "Alice"`},
 {label:"Example 3 — Verify API saved correct data",code:`import requests, sqlite3

def test_user_registration_saves_to_db():
    # Step 1: Call API
    payload = {"username": "bob", "email": "bob@test.com"}
    resp = requests.post("https://api.app.com/register", json=payload)
    assert resp.status_code == 201
    
    # Step 2: Verify in DB
    conn = sqlite3.connect("app_test.db")
    cur = conn.execute("SELECT email FROM users WHERE username='bob'")
    row = cur.fetchone()
    assert row is not None
    assert row[0] == "bob@test.com"`},
 {label:"Example 4 — PostgreSQL with psycopg2",code:`import psycopg2, os

def get_db_connection():
    return psycopg2.connect(
        host=os.environ["DB_HOST"],
        database=os.environ["DB_NAME"],
        user=os.environ["DB_USER"],
        password=os.environ["DB_PASS"]
    )

def test_order_count():
    with get_db_connection() as conn:
        with conn.cursor() as cur:
            cur.execute("SELECT COUNT(*) FROM orders WHERE status='pending'")
            count = cur.fetchone()[0]
    assert count >= 0`},
 {label:"Example 5 — SQL injection negative test",code:`import requests

def test_sql_injection_rejected():
    malicious_inputs = [
        "' OR '1'='1",
        "'; DROP TABLE users;--",
        "admin'--",
        "1 UNION SELECT * FROM users--"
    ]
    for payload in malicious_inputs:
        resp = requests.post("/login", json={
            "username": payload,
            "password": "anything"
        })
        # Should reject — never return 200
        assert resp.status_code in [400, 401, 422], \
            f"SQL injection not blocked for: {payload}"`},
],

{id:18,title:"Test Reporting & Allure",badge:"adv",badgeText:"Advanced",
what:"Test reports communicate results to stakeholders — Allure creates beautiful, interactive HTML reports.",
why:"Management and developers need clear pass/fail data with evidence (screenshots, logs) not just numbers.",
when:"Every test run, especially in CI/CD pipelines.",
how:"pip install allure-pytest → pytest --alluredir=results → allure serve results.",
where:"CI/CD artifact publishing, sprint review demos, bug reporting.",
oneliners:[
 {n:"Q1",t:"<strong>What is Allure?</strong> An open-source test reporting framework that generates interactive HTML reports with features, stories, steps, and screenshots."},
 {n:"Q2",t:"<strong>What are Allure features/stories?</strong> Hierarchical labels: @allure.feature('Login') groups tests by module; @allure.story('Valid user') organizes by scenario."},
 {n:"Q3",t:"<strong>What is pytest-html?</strong> A simpler, lightweight alternative to Allure — generates a single HTML report file without a server, great for quick CI artifacts."},
],
examples:[
 {label:"Example 1 — Basic Allure decorators",code:`import allure

@allure.feature("User Authentication")
@allure.story("Login with valid credentials")
@allure.severity(allure.severity_level.CRITICAL)
@allure.description("Verify user can log in with valid username and password")
def test_valid_login():
    with allure.step("Send login request"):
        resp = requests.post("/login", json={"user":"admin","pass":"123"})
    with allure.step("Verify 200 status"):
        assert resp.status_code == 200`},
 {label:"Example 2 — Attach screenshot to report",code:`import allure
from selenium import webdriver

def attach_screenshot(driver, name="screenshot"):
    screenshot = driver.get_screenshot_as_png()
    allure.attach(
        screenshot,
        name=name,
        attachment_type=allure.attachment_type.PNG
    )

def test_homepage(driver):
    driver.get("https://app.com")
    attach_screenshot(driver, "homepage_loaded")
    assert "App" in driver.title`},
 {label:"Example 3 — Attach API response to report",code:`import allure, json

def test_users_api():
    resp = requests.get("https://api.app.com/users")
    
    # Attach response body for debugging
    allure.attach(
        json.dumps(resp.json(), indent=2),
        name="API Response",
        attachment_type=allure.attachment_type.JSON

 {label:"Example 2 — Config management pattern",code:`import json, os

class Config:
    _instance = None
    
    def __new__(cls):         # Singleton pattern
        if not cls._instance:
            cls._instance = super().__new__(cls)
            env = os.environ.get("ENV", "staging")
            with open(f"config/{env}.json") as f:
                cls._instance._data = json.load(f)
        return cls._instance
    
    @property
    def base_url(self):
        return self._data["base_url"]
    
    @property
    def timeout(self):
        return self._data.get("timeout", 30)`},
 {label:"Example 3 — AAA pattern in tests",code:`def test_add_to_cart(driver, logged_in_user):

    product_page = ProductPage(driver)
    cart_page = CartPage(driver)
    
    # ACT — perform the action under test

    product_page.click_add_to_cart()
    
    # ASSERT — verify expected outcome
    assert cart_page.get_item_count() == 1
    assert cart_page.get_item_name(0) == "Laptop Pro X"`},
 {label:"Example 4 — Reusable API client with auth",code:`import requests, os

class QAApiClient:
    """Centralized API client with auth and retry."""
    
    def __init__(self):
        self.base = os.environ["API_BASE_URL"]
        self.session = requests.Session()
        self._authenticate()
    
    def _authenticate(self):
        resp = self.session.post(f"{self.base}/auth", json={
            "user": os.environ["API_USER"],
            "pass": os.environ["API_PASS"]
        })
        self.session.headers["Authorization"] = \
            f"Bearer {resp.json()['token']}"
    
    def get(self, path, **kwargs):
        return self.session.get(f"{self.base}{path}", **kwargs)`},

 {label:"Typical SDET interview question — live code",code:`# Q: Write a function to verify API response has required fields
import requests

def verify_api_response(url, required_fields, expected_status=200):
    """
    Reusable API response validator.
    Returns True if all checks pass, raises AssertionError otherwise.
    """
    response = requests.get(url, timeout=10)
    
    assert response.status_code == expected_status, \
        f"Expected {expected_status}, got {response.status_code}"
    
    data = response.json()
    for field in required_fields:
        assert field in data, f"Missing required field: {field}"
    
    return True

# Usage:
verify_api_response(
    "https://jsonplaceholder.typicode.com/posts/1",
    required_fields=["id", "title", "body", "userId"]
)`},

const tabsEl=document.getElementById("tabs");
const contentEl=document.getElementById("content");
const progressEl=document.getElementById("progress-fill");

function renderTabs(){
  sessions.forEach((s,i)=>{
    const btn=document.createElement("button");
    btn.className="tab-btn"+(i===0?" active":"");
    btn.textContent=`${s.id}. ${s.title}`;
    btn.onclick=()=>activateTab(i);
    tabsEl.appendChild(btn);
  });
}

function activateTab(idx){
  document.querySelectorAll(".tab-btn").forEach((b,i)=>b.classList.toggle("active",i===idx));
  document.querySelectorAll(".session").forEach((s,i)=>s.classList.toggle("active",i===idx));
  progressEl.style.width=Math.round(((idx+1)/sessions.length)*100)+"%";
  contentEl.scrollTop=0;
}

function buildSession(s){
  const div=document.createElement("div");
  div.className="session"+(s.id===1?" active":"");
  div.innerHTML=`
<div class="session-header">
  <h3>Session ${s.id}: ${s.title}</h3>
  <div class="meta"><span class="badge ${s.badge}">${s.badgeText}</span></div>
</div>
<div class="section">
  <div class="section-title"><i class="ti ti-bulb" aria-hidden="true"></i> What / Why / When / Where</div>
  <div class="grid3">
    <div class="mini-card"><div class="label">What</div><div class="val">${s.what}</div></div>
    <div class="mini-card"><div class="label">Why</div><div class="val">${s.why}</div></div>
    <div class="mini-card"><div class="label">When &amp; Where</div><div class="val">${s.when}</div></div>
  </div>
</div>
<div class="section">
  <div class="section-title"><i class="ti ti-message-circle" aria-hidden="true"></i> Interview one-liners</div>
  ${s.oneliners.map(o=>`<div class="oneliner"><span class="num">${o.n}</span><p>${o.t}</p></div>`).join("")}
</div>
<div class="section">
  <div class="section-title"><i class="ti ti-code" aria-hidden="true"></i> Hands-on examples (${s.examples.length} examples)</div>
  ${s.examples.map(e=>`<div class="ex-label">${e.label}</div><pre>${escHtml(e.code)}</pre>`).join("")}
</div>
<div class="section">
  <div class="section-title"><i class="ti ti-alert-triangle" aria-hidden="true"></i> Common mistakes &amp; fixes</div>
  ${s.mistakes.map(m=>`<div class="mistake"><p><strong>Mistake:</strong> ${m.m}</p></div><div class="fix"><p><strong>Fix:</strong> ${m.f}</p></div>`).join("")}
</div>
<div class="section">
  <div class="section-title"><i class="ti ti-circle-check" aria-hidden="true"></i> Best practices checklist</div>
  <ul class="checklist">${s.checklist.map(c=>`<li><i class="ti ti-check" aria-hidden="true"></i>${c}</li>`).join("")}</ul>
</div>
<div class="section">
  <div class="section-title"><i class="ti ti-chart-dots" aria-hidden="true"></i> Visual learning aid</div>
  <div class="diagram-wrap">${s.diagram}</div>
</div>
<button class="ask-btn" onclick="sendPrompt('In session ${s.id} (${s.title}), can you give me a quiz question to test my understanding?')">Quiz me on this session ↗</button>
`;
  return div;
}

function escHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

renderTabs();
sessions.forEach(s=>contentEl.appendChild(buildSession(s)));
</script>
