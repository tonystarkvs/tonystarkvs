  --color-text-info:#3B82F6;

body{font-family:var(--font-sans);color:var(--color-text-primary);background:transparent}

.top-bar{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:14px 16px 0;position:sticky;top:0;z-index:20}

.phase-fund{background:var(--color-background-info);color:var(--color-text-info)}
.phase-inter{background:var(--color-background-success);color:var(--color-text-success)}
.tab-scroll{display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.tab-scroll::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:6px 13px;font-size:12px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);transition:all .15s;white-space:nowrap;border-bottom:none;border-radius:6px 6px 0 0}
.tab-btn.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-bottom:2px solid var(--color-text-primary)}
.tab-btn:hover:not(.active){background:var(--color-background-secondary)}
.progress-track{height:3px;background:var(--color-border-tertiary)}
.progress-fill{height:3px;background:var(--color-text-primary);transition:width .3s}

.content{padding:0}
.session{display:none}
.session.active{display:block}

.s-hero{background:var(--color-background-secondary);padding:20px 20px 16px;border-bottom:0.5px solid var(--color-border-tertiary)}
.s-hero-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.s-num{width:32px;height:32px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.s-title{font-size:17px;font-weight:500}
.s-subtitle{font-size:13px;color:var(--color-text-secondary);line-height:1.5}
.wwww-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-top:12px}
.wwww-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:9px 11px}
.wwww-card .lbl{font-size:10px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.wwww-card .val{font-size:12px;color:var(--color-text-primary);line-height:1.5}

.s-body{padding:16px 20px}
.sec{margin-bottom:22px}
.sec-hd{font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px;padding-bottom:6px;border-bottom:0.5px solid var(--color-border-tertiary)}
.sec-hd i{font-size:15px}

.oneliners{display:flex;flex-direction:column;gap:6px}

.ol-text{font-size:13px;line-height:1.55;color:var(--color-text-primary)}

.diagram-wrap{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px;margin-bottom:10px;overflow:hidden}

.ex-tabs{display:flex;gap:0;margin-bottom:0;overflow-x:auto;scrollbar-width:none;border-bottom:0.5px solid var(--color-border-tertiary)}
.ex-tabs::-webkit-scrollbar{display:none}
.ex-tab-btn{flex-shrink:0;padding:8px 14px;font-size:12px;border:none;border-bottom:2px solid transparent;cursor:pointer;background:transparent;color:var(--color-text-secondary);font-weight:400;transition:all .15s;white-space:nowrap}
.ex-tab-btn.active{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary);font-weight:500}

.ex-panel{display:none}
.ex-panel.active{display:block}
.ex-file-label{font-size:11px;color:var(--color-text-secondary);padding:8px 14px 6px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.code-block{background:#1e1e2e;border-radius:0 0 var(--border-radius-lg) var(--border-radius-lg);padding:16px;overflow-x:auto;margin:0}
.code-block pre{margin:0;font-family:var(--font-mono);font-size:12.5px;line-height:1.7;color:#cdd6f4;white-space:pre}
.kw{color:#cba6f7}
.fn{color:#89b4fa}
.st{color:#a6e3a1}
.cm{color:#6c7086;font-style:italic}
.num{color:#fab387}
.op{color:#89dceb}
.bi{color:#f38ba8}
.ex-wrapper{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:10px}

.bp-list{list-style:none;padding:0;display:flex;flex-direction:column;gap:5px}
.bp-list li{font-size:13px;line-height:1.55;padding:7px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);display:flex;align-items:flex-start;gap:8px}
.bp-list li i{color:var(--color-text-success);font-size:14px;flex-shrink:0;margin-top:1px}

.qa-list{display:flex;flex-direction:column;gap:8px}
.qa-item{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.qa-q{padding:10px 14px;font-size:13px;font-weight:500;background:var(--color-background-secondary);cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.qa-q i{font-size:14px;color:var(--color-text-secondary);transition:transform .2s}
.qa-q.open i{transform:rotate(180deg)}
.qa-a{display:none;padding:10px 14px;font-size:13px;line-height:1.6;border-top:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary)}
.qa-a.open{display:block}

.ask-row{margin-top:6px;display:flex;gap:8px;flex-wrap:wrap}
.ask-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;background:transparent;color:var(--color-text-primary);transition:background .15s}
.ask-btn:hover{background:var(--color-background-secondary)}

.c-amber rect{fill:#FAEEDA;stroke:#EF9F27;stroke-width:1.5}
.c-coral rect{fill:#FAECE7;stroke:#F0997B;stroke-width:1.5}
.c-gray rect{fill:#f4f4f8;stroke:#d1d1db;stroke-width:1.5}
.c-green rect{fill:#EAF3DE;stroke:#97C459;stroke-width:1.5}
.c-purple rect{fill:#EEEDFE;stroke:#AFA9EC;stroke-width:1.5}
.c-red rect{fill:#FDE8E8;stroke:#DC3545;stroke-width:1.5}
.c-teal rect{fill:#E1F5EE;stroke:#5DCAA5;stroke-width:1.5}
svg .th{font-weight:600;fill:var(--color-text-primary);font-family:var(--font-sans);font-size:13px}
svg .ts{font-size:11px;fill:var(--color-text-secondary);font-family:var(--font-sans)}
</style>

<span class="fn">print</span>(<span class="st">f"Status: <span class="op">{status}</span>"</span>)              <span class="cm"># Status: 200</span>

  {tab:"5. type()",file:"types.py — checking data types",code:`<span class="cm"># type() — built-in function that tells you the data type of any value</span>

<span class="fn">print</span>(<span class="fn">type</span>(age))     <span class="cm"># &lt;class 'int'&gt;</span>
<span class="fn">print</span>(<span class="fn">type</span>(score))   <span class="cm"># &lt;class 'float'&gt;</span>

examples:[
  {tab:"1. Strings",file:"strings.py — working with str (text)",code:`<span class="cm"># str = string = text value, always wrapped in quotes</span>
<span class="cm"># Single quotes '' and double quotes "" both work</span>

test_url = <span class="st">"https://myapp.com/login"</span>
username = <span class="st">'admin'</span>
message  = <span class="st">"Test passed successfully"</span>

<span class="cm"># len() — counts how many characters are in the string</span>
<span class="fn">print</span>(<span class="fn">len</span>(test_url))          <span class="cm"># 24</span>

<span class="cm"># .upper() and .lower() — change case</span>
<span class="fn">print</span>(username.<span class="fn">upper</span>())        <span class="cm"># ADMIN</span>
<span class="fn">print</span>(message.<span class="fn">lower</span>())         <span class="cm"># test passed successfully</span>

<span class="cm"># 'in' operator — checks if text exists inside another string</span>
<span class="fn">print</span>(<span class="st">"login"</span> <span class="kw">in</span> test_url)      <span class="cm"># True</span>
<span class="fn">print</span>(<span class="st">"logout"</span> <span class="kw">in</span> test_url)     <span class="cm"># False</span>`},
  {tab:"2. Numbers",file:"numbers.py — int and float operations",code:`<span class="cm"># int = whole number (no decimal), float = decimal number</span>

status_code = <span class="num">200</span>            <span class="cm"># int</span>
response_ms = <span class="num">1234.56</span>         <span class="cm"># float — response time in milliseconds</span>
test_count  = <span class="num">50</span>              <span class="cm"># int</span>

<span class="cm"># Arithmetic operators: + - * / // % **</span>
<span class="fn">print</span>(status_code + <span class="num">4</span>)        <span class="cm"># 204  (+  addition)</span>
<span class="fn">print</span>(test_count * <span class="num">2</span>)          <span class="cm"># 100  (*  multiplication)</span>
<span class="fn">print</span>(test_count / <span class="num">5</span>)          <span class="cm"># 10.0 (/  division — always float)</span>
<span class="fn">print</span>(test_count // <span class="num">3</span>)         <span class="cm"># 16   (// floor division — drops decimal)</span>
<span class="fn">print</span>(test_count % <span class="num">3</span>)          <span class="cm"># 2    (%  modulus — remainder)</span>
<span class="fn">print</span>(<span class="num">2</span> ** <span class="num">10</span>)                  <span class="cm"># 1024 (** power / exponent)</span>`},
  {tab:"3. Booleans",file:"booleans.py — True/False values",code:`<span class="cm"># bool = boolean = only two values: True or False (capital T and F!)</span>
<span class="cm"># Used in conditions, test pass/fail flags, feature toggles</span>

is_logged_in = <span class="kw">True</span>
is_error     = <span class="kw">False</span>
test_passed  = <span class="kw">True</span>

<span class="cm"># Comparison operators produce booleans</span>
<span class="fn">print</span>(<span class="num">200</span> == <span class="num">200</span>)   <span class="cm"># True  (== equals?)</span>
<span class="fn">print</span>(<span class="num">200</span> != <span class="num">404</span>)   <span class="cm"># True  (!= not equals?)</span>
<span class="fn">print</span>(<span class="num">500</span> > <span class="num">400</span>)    <span class="cm"># True  (>  greater than)</span>
<span class="fn">print</span>(<span class="num">200</span> < <span class="num">100</span>)    <span class="cm"># False (&lt;  less than)</span>
<span class="fn">print</span>(<span class="num">200</span> >= <span class="num">200</span>)   <span class="cm"># True  (>= greater than or equal)</span>

<span class="cm"># bool() converts values — 0, "", None are False; everything else is True</span>
<span class="fn">print</span>(<span class="fn">bool</span>(<span class="num">0</span>))      <span class="cm"># False</span>
<span class="fn">print</span>(<span class="fn">bool</span>(<span class="num">1</span>))      <span class="cm"># True</span>`},
  {tab:"4. Type conversion",file:"conversion.py — converting between types",code:`<span class="cm"># Type conversion = changing a value from one type to another</span>
<span class="cm"># int(), str(), float(), bool() are the conversion functions</span>

<span class="cm"># String to Integer: MUST do this when input() gives you a string</span>
user_input = <span class="st">"200"</span>               <span class="cm"># this is a string!</span>
status_int = <span class="fn">int</span>(user_input)     <span class="cm"># convert to int: 200</span>
<span class="fn">print</span>(status_int + <span class="num">4</span>)            <span class="cm"># 204 — now math works</span>

<span class="cm"># Integer to String: needed when building messages</span>
code = <span class="num">404</span>
<span class="fn">print</span>(<span class="st">"Status: "</span> + <span class="fn">str</span>(code))     <span class="cm"># "Status: 404"</span>

<span class="cm"># String to Float</span>
time_str = <span class="st">"1.75"</span>
time_val = <span class="fn">float</span>(time_str)        <span class="cm"># 1.75</span>
<span class="fn">print</span>(time_val > <span class="num">1.0</span>)             <span class="cm"># True</span>

<span class="cm"># int to float is automatic in division</span>
<span class="fn">print</span>(<span class="fn">type</span>(<span class="num">10</span> / <span class="num">2</span>))               <span class="cm"># &lt;class 'float'&gt; → 5.0</span>`},
  {tab:"5. Logical ops",file:"logical.py — and / or / not operators",code:`<span class="cm"># Logical operators combine boolean conditions</span>
<span class="cm"># and — BOTH must be True for result to be True</span>
<span class="cm"># or  — at least ONE must be True for result to be True</span>
<span class="cm"># not — flips True to False and False to True</span>

status = <span class="num">200</span>
is_authenticated = <span class="kw">True</span>
response_time    = <span class="num">500</span>  <span class="cm"># milliseconds</span>

<span class="cm"># 'and' — both conditions must pass</span>
<span class="fn">print</span>(status == <span class="num">200</span> <span class="kw">and</span> is_authenticated)  <span class="cm"># True</span>

<span class="cm"># 'or' — either condition is enough</span>
<span class="fn">print</span>(status == <span class="num">404</span> <span class="kw">or</span> is_authenticated)   <span class="cm"># True</span>

<span class="cm"># 'not' — flip the result</span>
<span class="fn">print</span>(<span class="kw">not</span> is_authenticated)                <span class="cm"># False</span>
<span class="fn">print</span>(<span class="kw">not</span> (status == <span class="num">404</span>))                 <span class="cm"># True</span>

<span class="cm"># QA use case: pass only when status is ok AND response is fast</span>
test_pass = (status == <span class="num">200</span>) <span class="kw">and</span> (response_time < <span class="num">1000</span>)
<span class="fn">print</span>(<span class="st">f"Test PASS: <span class="op">{test_pass}</span>"</span>)              <span class="cm"># True</span>`},
  {tab:"6. None type",file:"none.py — the None value",code:`<span class="cm"># None is Python's way of saying "no value" or "empty"</span>
<span class="cm"># It is its own type: NoneType</span>
<span class="cm"># NOT the same as 0, False, or "" — it means "nothing assigned"</span>

result = <span class="kw">None</span>   <span class="cm"># no value yet — common when waiting for API response</span>

<span class="fn">print</span>(result)            <span class="cm"># None</span>
<span class="fn">print</span>(<span class="fn">type</span>(result))      <span class="cm"># &lt;class 'NoneType'&gt;</span>

<span class="cm"># Always check with 'is None', not == None</span>
<span class="fn">print</span>(result <span class="kw">is</span> <span class="kw">None</span>)    <span class="cm"># True  (correct way)</span>
<span class="fn">print</span>(result == <span class="kw">None</span>)    <span class="cm"># True  (works but not best practice)</span>

<span class="cm"># Function with no return gives None</span>
<span class="kw">def</span> <span class="fn">do_nothing</span>():
    <span class="kw">pass</span>   <span class="cm"># 'pass' = empty placeholder, does nothing</span>

val = <span class="fn">do_nothing</span>()
<span class="fn">print</span>(val)               <span class="cm"># None</span>`},
],
bp:["Use == to compare values, use is to compare identity (only for None, True, False)","Never use type() comparisons in conditions — use isinstance() instead","Always convert input() to the right type before doing math or comparisons","Use meaningful names: is_visible not flag, status_code not s","Store None in a variable when a value is not yet available — don't use empty string or 0 as placeholders"],
qa:[
  {q:"Q1: What is the difference between == and is?",a:"== compares values (200 == 200 is True). 'is' compares identity — whether both point to the exact same object in memory. Always use 'is' with None (result is None) and == for value comparisons."},
  {q:"Q2: Why does 10/2 give 5.0 instead of 5?",a:"In Python 3, / always returns a float. Use // (floor division) for integer results: 10//2 gives 5. This is a common bug when comparing with expected integer values."},
  {q:"Q3: What is dynamic typing?",a:"Python determines the type of a variable at runtime based on the value assigned — you don't declare types. x = 5 creates an int; x = '5' creates a str. The same variable can hold different types at different times."},
  {q:"Q4: What will int('abc') do?",a:"It raises a ValueError: invalid literal for int(). You should always wrap type conversions in try/except when handling user input or API data to prevent script crashes."},
  {q:"Q5: What is the difference between None, 0, False, and empty string?",a:"All are 'falsy' in Python (bool() returns False for all), but they mean different things. None = no value. 0 = number zero. False = boolean false. '' = empty text. Using the wrong one causes subtle test bugs."},
]},

examples:[
  {tab:"1. Create & access",file:"list_basics.py — creating lists and accessing items",code:`<span class="cm"># A list holds multiple items in ORDER, in square brackets []</span>
<span class="cm"># Items can be of any type: strings, numbers, booleans, mixed</span>

<span class="cm"># Creating lists</span>
browsers     = [<span class="st">"chrome"</span>, <span class="st">"firefox"</span>, <span class="st">"safari"</span>]   <span class="cm"># list of strings</span>
status_codes = [<span class="num">200</span>, <span class="num">201</span>, <span class="num">404</span>, <span class="num">500</span>]            <span class="cm"># list of integers</span>
empty_list   = []                               <span class="cm"># empty list — add items later</span>

<span class="cm"># Accessing items — index starts at 0!</span>
<span class="fn">print</span>(browsers[<span class="num">0</span>])      <span class="cm"># chrome  — first item</span>
<span class="fn">print</span>(browsers[<span class="num">2</span>])      <span class="cm"># safari  — third item</span>
<span class="fn">print</span>(browsers[-<span class="num">1</span>])     <span class="cm"># safari  — LAST item (negative index)</span>
<span class="fn">print</span>(browsers[-<span class="num">2</span>])     <span class="cm"># firefox — second from last</span>
<span class="fn">print</span>(<span class="fn">len</span>(browsers))     <span class="cm"># 3       — total item count</span>`},
  {tab:"2. Modify list",file:"list_modify.py — adding and removing items",code:`<span class="cm"># Lists are MUTABLE — you can change them after creation</span>

test_envs = [<span class="st">"dev"</span>, <span class="st">"staging"</span>]

<span class="cm"># .append(item) — adds ONE item to the END of the list</span>
test_envs.<span class="fn">append</span>(<span class="st">"production"</span>)
<span class="fn">print</span>(test_envs)     <span class="cm"># ['dev', 'staging', 'production']</span>

<span class="cm"># .insert(index, item) — adds item at a SPECIFIC position</span>
test_envs.<span class="fn">insert</span>(<span class="num">1</span>, <span class="st">"qa"</span>)
<span class="fn">print</span>(test_envs)     <span class="cm"># ['dev', 'qa', 'staging', 'production']</span>

<span class="cm"># .remove(value) — removes FIRST occurrence of the value</span>
test_envs.<span class="fn">remove</span>(<span class="st">"dev"</span>)
<span class="fn">print</span>(test_envs)     <span class="cm"># ['qa', 'staging', 'production']</span>

<span class="cm"># .pop(index) — removes and RETURNS item at index (default: last)</span>
removed = test_envs.<span class="fn">pop</span>()
<span class="fn">print</span>(removed)       <span class="cm"># production</span>
<span class="fn">print</span>(test_envs)     <span class="cm"># ['qa', 'staging']</span>`},
  {tab:"3. List methods",file:"list_methods.py — sort, reverse, count, index",code:`<span class="cm"># Python lists have many built-in methods</span>
scores = [<span class="num">85</span>, <span class="num">92</span>, <span class="num">78</span>, <span class="num">92</span>, <span class="num">100</span>, <span class="num">65</span>]

<span class="cm"># .sort() — sorts in-place (modifies original list), ascending by default</span>
scores.<span class="fn">sort</span>()
<span class="fn">print</span>(scores)                   <span class="cm"># [65, 78, 85, 92, 92, 100]</span>

<span class="cm"># .sort(reverse=True) — descending order</span>
scores.<span class="fn">sort</span>(reverse=<span class="kw">True</span>)
<span class="fn">print</span>(scores)                   <span class="cm"># [100, 92, 92, 85, 78, 65]</span>

<span class="cm"># .reverse() — reverses order in-place</span>
scores.<span class="fn">reverse</span>()
<span class="fn">print</span>(scores)                   <span class="cm"># [65, 78, 85, 92, 92, 100]</span>

<span class="cm"># .count(value) — how many times a value appears</span>
<span class="fn">print</span>(scores.<span class="fn">count</span>(<span class="num">92</span>))          <span class="cm"># 2</span>

<span class="cm"># .index(value) — position of first occurrence</span>
<span class="fn">print</span>(scores.<span class="fn">index</span>(<span class="num">85</span>))          <span class="cm"># 2</span>

<span class="cm"># min(), max(), sum() — useful for test metrics</span>
<span class="fn">print</span>(<span class="fn">min</span>(scores), <span class="fn">max</span>(scores), <span class="fn">sum</span>(scores))  <span class="cm"># 65 100 512</span>`},
  {tab:"4. Slicing",file:"slicing.py — extracting parts of a list",code:`<span class="cm"># Slicing extracts a PORTION of a list</span>
<span class="cm"># Syntax: list[start:stop:step]</span>
<span class="cm"># start = included, stop = NOT included, step = jump by</span>

urls = [<span class="st">"/home"</span>, <span class="st">"/login"</span>, <span class="st">"/dashboard"</span>, <span class="st">"/profile"</span>, <span class="st">"/logout"</span>]
<span class="cm">#        [0]       [1]         [2]           [3]         [4]</span>

<span class="fn">print</span>(urls[<span class="num">1</span>:<span class="num">3</span>])     <span class="cm"># ['/login', '/dashboard'] — index 1,2 (3 excluded!)</span>
<span class="fn">print</span>(urls[:<span class="num">2</span>])      <span class="cm"># ['/home', '/login']       — from start to index 1</span>
<span class="fn">print</span>(urls[<span class="num">3</span>:])      <span class="cm"># ['/profile', '/logout']   — from index 3 to end</span>
<span class="fn">print</span>(urls[:])       <span class="cm"># full copy of the list</span>
<span class="fn">print</span>(urls[::-<span class="num">1</span>])    <span class="cm"># reversed: step=-1 goes backwards</span>
<span class="fn">print</span>(urls[::<span class="num">2</span>])     <span class="cm"># every 2nd item: ['/home', '/dashboard', '/logout']</span>`},
  {tab:"5. Loops",file:"loops.py — iterating over lists",code:`<span class="cm"># for loop iterates over every item in the list</span>
<span class="cm"># Syntax: for variable in list:</span>
<span class="cm">#             do something with variable</span>

test_urls = [<span class="st">"https://app.com/home"</span>, <span class="st">"https://app.com/login"</span>]

<span class="cm"># Basic for loop</span>
<span class="kw">for</span> url <span class="kw">in</span> test_urls:
    <span class="fn">print</span>(<span class="st">f"Testing: <span class="op">{url}</span>"</span>)

<span class="cm"># enumerate() gives both INDEX and VALUE</span>
<span class="cm"># enumerate() returns (index, value) pairs</span>
browsers = [<span class="st">"chrome"</span>, <span class="st">"firefox"</span>, <span class="st">"edge"</span>]
<span class="kw">for</span> i, b <span class="kw">in</span> <span class="fn">enumerate</span>(browsers):
    <span class="fn">print</span>(<span class="st">f"Browser <span class="op">{i}</span>: <span class="op">{b}</span>"</span>)   <span class="cm"># Browser 0: chrome, etc.</span>

<span class="cm"># range() generates a sequence of numbers</span>
<span class="kw">for</span> n <span class="kw">in</span> <span class="fn">range</span>(<span class="num">3</span>):           <span class="cm"># 0, 1, 2</span>
    <span class="fn">print</span>(<span class="st">f"Run #{n+1}"</span>)      <span class="cm"># Run #1, Run #2, Run #3</span>`},
  {tab:"6. List comprehension",file:"comprehension.py — concise list creation",code:`<span class="cm"># List comprehension = a compact way to create a new list</span>
<span class="cm"># Syntax: [expression for item in iterable if condition]</span>
<span class="cm"># Replaces a for loop + append in ONE line</span>

<span class="cm"># Without comprehension (verbose)</span>
squares = []
<span class="kw">for</span> n <span class="kw">in</span> <span class="fn">range</span>(<span class="num">1</span>, <span class="num">6</span>):
    squares.<span class="fn">append</span>(n ** <span class="num">2</span>)
<span class="fn">print</span>(squares)    <span class="cm"># [1, 4, 9, 16, 25]</span>

<span class="cm"># With comprehension (compact, Pythonic)</span>
squares = [n ** <span class="num">2</span> <span class="kw">for</span> n <span class="kw">in</span> <span class="fn">range</span>(<span class="num">1</span>, <span class="num">6</span>)]
<span class="fn">print</span>(squares)    <span class="cm"># [1, 4, 9, 16, 25]</span>

<span class="cm"># With 'if' filter — only pass tests</span>
results  = [<span class="st">"PASS"</span>, <span class="st">"FAIL"</span>, <span class="st">"PASS"</span>, <span class="st">"FAIL"</span>, <span class="st">"PASS"</span>]
passed   = [r <span class="kw">for</span> r <span class="kw">in</span> results <span class="kw">if</span> r == <span class="st">"PASS"</span>]
<span class="fn">print</span>(passed)     <span class="cm"># ['PASS', 'PASS', 'PASS']</span>
<span class="fn">print</span>(<span class="fn">len</span>(passed)) <span class="cm"># 3</span>`},
],
bp:["Always check len() before accessing an index to avoid IndexError","Use append() to build lists dynamically — don't pre-allocate with zeros","Prefer list comprehension over for+append for simple transformations","Use 'in' operator to check membership: if 'chrome' in browsers","Use sorted() to get a sorted copy without modifying original: sorted(my_list)"],
qa:[
  {q:"Q1: What is the difference between append() and extend()?",a:"append(item) adds ONE item (even if it's a list, it becomes a nested item). extend(iterable) adds all items from another list one by one. Example: [1,2].append([3,4]) → [1,2,[3,4]] but [1,2].extend([3,4]) → [1,2,3,4]."},
  {q:"Q2: What is the difference between remove() and pop()?",a:"remove(value) finds and removes the FIRST item with that value — raises ValueError if not found. pop(index) removes and RETURNS the item at that index (default last). Use pop() when you need the removed value."},
  {q:"Q3: What will happen if you access list[10] on a 3-item list?",a:"It raises IndexError: list index out of range. Always check len(list) first or use try/except IndexError. In QA tests, this happens when an API returns fewer items than expected."},
  {q:"Q4: What is list slicing and when would you use it in QA?",a:"Slicing extracts a sublist: urls[0:3] gets first 3 items. In QA: grab the last N test results (results[-5:]), skip the header row of CSV data (data[1:]), or get every other test case (cases[::2])."},
  {q:"Q5: What is list comprehension and why is it preferred?",a:"List comprehension creates a new list in one line: [x*2 for x in nums if x > 0]. It's preferred because it's more readable and faster than a for+append loop. Use it for filtering, transforming, or building lists from existing data."},
]},

why:"Tuples protect data, sets remove duplicates, dicts store structured data like JSON API responses.",

oneliners:[
  {n:"1",t:"<strong>Tuple uses ()</strong> — (200, 404, 500) creates a tuple; once created, you cannot change its items (immutable)."},
  {n:"2",t:"<strong>Set uses {}</strong> — {1,2,2,3} becomes {1,2,3} automatically — sets discard duplicate values."},
  {n:"3",t:"<strong>Dict uses key:value</strong> — {'status':200, 'url':'/login'} stores named values, accessed by key not index."},
  {n:"4",t:"<strong>dict.get(key, default)</strong> — safe way to access dict values; returns default instead of raising KeyError if key missing."},
  {n:"5",t:"<strong>Tuple is faster than list</strong> — use tuples for fixed data like browser names or environment names that never change."},
  {n:"6",t:"<strong>Dict keys must be unique</strong> — if you assign the same key twice, the second value overwrites the first."},
],
examples:[
  {tab:"1. Tuples",file:"tuples.py — immutable ordered sequences",code:`<span class="cm"># tuple = ordered, IMMUTABLE collection. Created with ()</span>
<span class="cm"># Immutable = you CANNOT add, remove, or change items after creation</span>
<span class="cm"># Use for data that should NEVER change</span>

browsers = (<span class="st">"chrome"</span>, <span class="st">"firefox"</span>, <span class="st">"safari"</span>)
http_ok  = (<span class="num">200</span>, <span class="num">201</span>, <span class="num">204</span>)

<span class="cm"># Access same as list — indexing works</span>
<span class="fn">print</span>(browsers[<span class="num">0</span>])         <span class="cm"># chrome</span>
<span class="fn">print</span>(http_ok[-<span class="num">1</span>])          <span class="cm"># 204</span>
<span class="fn">print</span>(<span class="fn">len</span>(browsers))        <span class="cm"># 3</span>
<span class="fn">print</span>(<span class="num">404</span> <span class="kw">in</span> http_ok)        <span class="cm"># False</span>
<span class="fn">print</span>(<span class="num">200</span> <span class="kw">in</span> http_ok)        <span class="cm"># True</span>

<span class="cm"># Trying to modify raises TypeError</span>
<span class="cm"># browsers[0] = "edge"  ← This would crash! (TypeError: 'tuple' object does not support item assignment)</span>

<span class="cm"># Unpacking — assign each value to a variable at once</span>
a, b, c = browsers
<span class="fn">print</span>(a, b, c)               <span class="cm"># chrome firefox safari</span>`},
  {tab:"2. Sets",file:"sets.py — unique value collections",code:`<span class="cm"># set = UNORDERED collection with NO duplicates. Created with {}</span>
<span class="cm"># Perfect for: removing duplicates, membership testing</span>
<span class="cm"># WARNING: sets have no index — you CANNOT do set[0]</span>

<span class="cm"># Duplicate values are auto-removed!</span>
tags = {<span class="st">"smoke"</span>, <span class="st">"regression"</span>, <span class="st">"smoke"</span>, <span class="st">"api"</span>}
<span class="fn">print</span>(tags)         <span class="cm"># {'smoke', 'api', 'regression'} — order may vary</span>

<span class="cm"># .add() adds a single item</span>
tags.<span class="fn">add</span>(<span class="st">"ui"</span>)
<span class="fn">print</span>(tags)         <span class="cm"># {'smoke', 'api', 'regression', 'ui'}</span>

<span class="cm"># .discard() removes without error if not found (safe)</span>
tags.<span class="fn">discard</span>(<span class="st">"smoke"</span>)

<span class="cm"># Fast membership check — better than list for large collections</span>
<span class="fn">print</span>(<span class="st">"api"</span> <span class="kw">in</span> tags)   <span class="cm"># True</span>

<span class="cm"># Remove duplicates from a list using set()</span>
ids = [<span class="num">1</span>, <span class="num">2</span>, <span class="num">2</span>, <span class="num">3</span>, <span class="num">3</span>, <span class="num">3</span>]
unique = <span class="fn">list</span>(<span class="fn">set</span>(ids))
<span class="fn">print</span>(unique)         <span class="cm"># [1, 2, 3]</span>`},
  {tab:"3. Dicts basics",file:"dict_basics.py — key-value pairs",code:`<span class="cm"># dict = DICTIONARY = key:value pairs, like a real dictionary</span>
<span class="cm"># Created with {key: value, key: value}</span>
<span class="cm"># Keys must be unique; values can be anything</span>

test_result = {
    <span class="st">"name"</span>:     <span class="st">"login_test"</span>,   <span class="cm"># key: "name",  value: string</span>
    <span class="st">"status"</span>:   <span class="num">200</span>,            <span class="cm"># key: "status", value: int</span>
    <span class="st">"passed"</span>:   <span class="kw">True</span>,           <span class="cm"># key: "passed", value: bool</span>
    <span class="st">"duration"</span>: <span class="num">1.23</span>            <span class="cm"># key: "duration", value: float</span>
}

<span class="cm"># Access by KEY (not index!)</span>
<span class="fn">print</span>(test_result[<span class="st">"name"</span>])        <span class="cm"># login_test</span>
<span class="fn">print</span>(test_result[<span class="st">"status"</span>])      <span class="cm"># 200</span>

<span class="cm"># .get(key, default) — safe access — no KeyError if missing</span>
<span class="fn">print</span>(test_result.<span class="fn">get</span>(<span class="st">"env"</span>, <span class="st">"staging"</span>))  <span class="cm"># staging (key not there)</span>

<span class="cm"># Update a value</span>
test_result[<span class="st">"status"</span>] = <span class="num">201</span>
<span class="fn">print</span>(test_result[<span class="st">"status"</span>])      <span class="cm"># 201</span>`},
  {tab:"4. Dict methods",file:"dict_methods.py — keys, values, items",code:`<span class="cm"># Useful dictionary methods for QA test data handling</span>

config = {
    <span class="st">"base_url"</span>: <span class="st">"https://api.app.com"</span>,
    <span class="st">"timeout"</span>:  <span class="num">30</span>,
    <span class="st">"env"</span>:      <span class="st">"staging"</span>
}

<span class="cm"># .keys() — all keys as a view</span>
<span class="fn">print</span>(<span class="fn">list</span>(config.<span class="fn">keys</span>()))    <span class="cm"># ['base_url', 'timeout', 'env']</span>

<span class="cm"># .values() — all values as a view</span>
<span class="fn">print</span>(<span class="fn">list</span>(config.<span class="fn">values</span>()))  <span class="cm"># ['https://api.app.com', 30, 'staging']</span>

<span class="cm"># .items() — key-value PAIRS — perfect for looping</span>
<span class="kw">for</span> key, val <span class="kw">in</span> config.<span class="fn">items</span>():
    <span class="fn">print</span>(<span class="st">f"  <span class="op">{key}</span> = <span class="op">{val}</span>"</span>)

<span class="cm"># Check if key exists</span>
<span class="fn">print</span>(<span class="st">"timeout"</span> <span class="kw">in</span> config)     <span class="cm"># True</span>

<span class="cm"># .update() — merge another dict in</span>
config.<span class="fn">update</span>({<span class="st">"retries"</span>: <span class="num">3</span>, <span class="st">"env"</span>: <span class="st">"prod"</span>})
<span class="fn">print</span>(config[<span class="st">"retries"</span>])       <span class="cm"># 3</span>`},
  {tab:"5. Nested dict",file:"nested.py — dict inside dict (like JSON)",code:`<span class="cm"># A dict value can ITSELF be another dict — just like JSON!</span>
<span class="cm"># Very common when working with API responses</span>

api_response = {
    <span class="st">"status"</span>: <span class="num">200</span>,
    <span class="st">"data"</span>: {                       <span class="cm"># nested dict inside "data" key</span>
        <span class="st">"id"</span>:    <span class="num">1</span>,
        <span class="st">"name"</span>: <span class="st">"Alice"</span>,
        <span class="st">"roles"</span>: [<span class="st">"admin"</span>, <span class="st">"user"</span>]  <span class="cm"># list inside dict</span>
    }
}

<span class="cm"># Access nested values with multiple []</span>
<span class="fn">print</span>(api_response[<span class="st">"data"</span>][<span class="st">"name"</span>])      <span class="cm"># Alice</span>
<span class="fn">print</span>(api_response[<span class="st">"data"</span>][<span class="st">"roles"</span>][<span class="num">0</span>])   <span class="cm"># admin</span>

<span class="cm"># Safe nested access</span>
user = api_response.<span class="fn">get</span>(<span class="st">"data"</span>, {})
<span class="fn">print</span>(user.<span class="fn">get</span>(<span class="st">"email"</span>, <span class="st">"N/A"</span>))          <span class="cm"># N/A (no email key)</span>`},
  {tab:"6. Dict comprehension",file:"dict_comprehension.py — build dicts fast",code:`<span class="cm"># Dict comprehension = create a dict in one line</span>
<span class="cm"># Syntax: {key_expr: value_expr for item in iterable}</span>

<span class="cm"># Build a dict mapping status code to its meaning</span>
codes = [<span class="num">200</span>, <span class="num">201</span>, <span class="num">404</span>, <span class="num">500</span>]
labels = [<span class="st">"OK"</span>, <span class="st">"Created"</span>, <span class="st">"Not Found"</span>, <span class="st">"Server Error"</span>]

<span class="cm"># zip() pairs up two lists: [(200,'OK'), (201,'Created'), ...]</span>
status_map = {code: label <span class="kw">for</span> code, label <span class="kw">in</span> <span class="fn">zip</span>(codes, labels)}
<span class="fn">print</span>(status_map)        <span class="cm"># {200: 'OK', 201: 'Created', ...}</span>
<span class="fn">print</span>(status_map[<span class="num">404</span>])   <span class="cm"># Not Found</span>

<span class="cm"># Filter only error codes</span>
errors = {k: v <span class="kw">for</span> k, v <span class="kw">in</span> status_map.<span class="fn">items</span>() <span class="kw">if</span> k >= <span class="num">400</span>}
<span class="fn">print</span>(errors)            <span class="cm"># {404: 'Not Found', 500: 'Server Error'}</span>`},
],
bp:["Use dict.get(key, default) always — never bare dict[key] unless you're certain the key exists","Use tuple for constants and config values that should never change during a test run","Use set when you need fast 'in' checks on large collections — much faster than list","Use 'key in dict' to check existence — not try/except — cleaner and more Pythonic","When working with API JSON, map it directly to a Python dict — they're the same structure"],
qa:[
  {q:"Q1: When would you use a tuple instead of a list?",a:"When data should not change — browser types, environment names, HTTP success codes. Tuples signal intent: 'this is constant'. They're also faster and hashable (can be dict keys), unlike lists."},
  {q:"Q2: What is the key difference between a set and a list?",a:"Lists are ordered and allow duplicates. Sets are unordered and automatically remove duplicates. Use a set when you need unique values (e.g., unique test tag names) or fast membership checks."},
  {q:"Q3: What is the difference between dict[key] and dict.get(key)?",a:"dict[key] raises KeyError if the key doesn't exist — crashes your test. dict.get(key, default) returns None (or your default) safely. In QA, always use .get() when reading API responses where keys may be absent."},
  {q:"Q4: Can a dict have duplicate keys?",a:"No. If you assign the same key twice, the second assignment overwrites the first. Keys are unique — values are not. This is exactly how JSON objects work (dicts are the Python equivalent of JSON objects)."},
  {q:"Q5: How would you remove duplicates from a list?",a:"Convert to a set and back: unique = list(set(original)). Note: this loses the original order. To preserve order use: list(dict.fromkeys(original)) which maintains insertion order in Python 3.7+."},
]},
