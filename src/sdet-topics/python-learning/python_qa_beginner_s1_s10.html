oneliners:[
  {n:"1",t:"<strong>if checks a condition</strong> — if status == 200: only runs that block when status equals 200."},
  {n:"2",t:"<strong>elif means 'else if'</strong> — checked when the if condition is False; you can chain as many elif as needed."},
  {n:"3",t:"<strong>else is the fallback</strong> — runs when no if or elif condition was True; it's optional."},
  {n:"4",t:"<strong>for iterates a collection</strong> — for url in test_urls: runs the body once for every URL in the list."},
  {n:"5",t:"<strong>while loops until False</strong> — while retries < 3: keeps running while that condition is True."},
  {n:"6",t:"<strong>break and continue</strong> — break exits the whole loop; continue skips the rest of the current iteration and moves to the next."},
],
examples:[
  {tab:"1. if / else",file:"if_else.py — basic conditional branching",code:`<span class="cm"># if checks a condition — if True, runs the indented block below it</span>
<span class="cm"># else is the fallback if the condition is False</span>
<span class="cm"># Colon (:) at the end is REQUIRED — IndentationError if missing</span>

status_code = <span class="num">404</span>

<span class="kw">if</span> status_code == <span class="num">200</span>:
    <span class="fn">print</span>(<span class="st">"Test PASS — OK"</span>)         <span class="cm"># runs only if status == 200</span>
<span class="kw">else</span>:
    <span class="fn">print</span>(<span class="st">"Test FAIL"</span>)              <span class="cm"># runs when condition is False</span>
    <span class="fn">print</span>(<span class="st">f"Got status: <span class="op">{status_code}</span>"</span>)

<span class="cm"># Ternary expression — one-liner if/else</span>
<span class="cm"># Syntax: value_if_true if condition else value_if_false</span>
result = <span class="st">"PASS"</span> <span class="kw">if</span> status_code == <span class="num">200</span> <span class="kw">else</span> <span class="st">"FAIL"</span>
<span class="fn">print</span>(result)   <span class="cm"># FAIL</span>`},
  {tab:"2. elif chains",file:"elif.py — multiple condition branches",code:`<span class="cm"># elif = "else if" — checks another condition when the first was False</span>
<span class="cm"># Python checks conditions TOP to BOTTOM — stops at first True</span>

status = <span class="num">404</span>

<span class="kw">if</span> status == <span class="num">200</span>:
    <span class="fn">print</span>(<span class="st">"200 OK — request succeeded"</span>)
<span class="kw">elif</span> status == <span class="num">201</span>:
    <span class="fn">print</span>(<span class="st">"201 Created — resource created"</span>)
<span class="kw">elif</span> status == <span class="num">400</span>:
    <span class="fn">print</span>(<span class="st">"400 Bad Request — check payload"</span>)
<span class="kw">elif</span> status == <span class="num">404</span>:
    <span class="fn">print</span>(<span class="st">"404 Not Found — endpoint wrong"</span>)  <span class="cm"># ← this runs</span>
<span class="kw">elif</span> status == <span class="num">500</span>:
    <span class="fn">print</span>(<span class="st">"500 Server Error — backend crashed"</span>)
<span class="kw">else</span>:
    <span class="fn">print</span>(<span class="st">f"Unknown status: <span class="op">{status}</span>"</span>)`},
  {tab:"3. for loop",file:"for_loop.py — iterating over collections",code:`<span class="cm"># for iterates every item in a list/tuple/string/range</span>
<span class="cm"># Syntax: for variable_name in collection:</span>

test_urls = [
    <span class="st">"https://app.com/home"</span>,
    <span class="st">"https://app.com/login"</span>,
    <span class="st">"https://app.com/dashboard"</span>
]

<span class="kw">for</span> url <span class="kw">in</span> test_urls:
    <span class="fn">print</span>(<span class="st">f"Testing: <span class="op">{url}</span>"</span>)

<span class="cm"># range(start, stop, step) — generates numbers</span>
<span class="cm"># range(5) = 0,1,2,3,4  | range(1,4) = 1,2,3  | range(0,10,2) = 0,2,4,6,8</span>
<span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="num">1</span>, <span class="num">4</span>):
    <span class="fn">print</span>(<span class="st">f"Test run #{i}"</span>)   <span class="cm"># Test run #1, #2, #3</span>

<span class="cm"># Iterating a string character by character</span>
<span class="kw">for</span> ch <span class="kw">in</span> <span class="st">"QA"</span>:
    <span class="fn">print</span>(ch)               <span class="cm"># Q then A</span>`},
  {tab:"4. while loop",file:"while_loop.py — repeat until condition changes",code:`<span class="cm"># while keeps looping AS LONG AS the condition is True</span>
<span class="cm"># DANGER: if condition never becomes False → infinite loop!</span>
<span class="cm"># Always make sure something inside the loop will eventually stop it</span>

<span class="cm"># Retry pattern — common in QA test scripts</span>
attempt   = <span class="num">0</span>
max_tries = <span class="num">3</span>

<span class="kw">while</span> attempt < max_tries:
    attempt += <span class="num">1</span>        <span class="cm"># += means: attempt = attempt + 1</span>
    <span class="fn">print</span>(<span class="st">f"Attempt {attempt} of {max_tries}"</span>)
    <span class="cm"># in real code: response = requests.get(url)</span>
    <span class="cm"># if response.ok: break  ← exit loop on success</span>

<span class="fn">print</span>(<span class="st">"Done"</span>)

<span class="cm"># while True with break — loop until we decide to stop</span>
count = <span class="num">0</span>
<span class="kw">while</span> <span class="kw">True</span>:
    count += <span class="num">1</span>
    <span class="kw">if</span> count >= <span class="num">3</span>:
        <span class="kw">break</span>           <span class="cm"># break = exit loop immediately</span>
<span class="fn">print</span>(<span class="st">f"Stopped at count: <span class="op">{count}</span>"</span>)`},
  {tab:"5. break / continue",file:"break_continue.py — controlling loop flow",code:`<span class="cm"># break — exits the ENTIRE loop immediately</span>
<span class="cm"># continue — skips the REST of current iteration, jumps to next item</span>

tests = [<span class="st">"login"</span>, <span class="st">"SKIP_checkout"</span>, <span class="st">"profile"</span>, <span class="st">"STOP"</span>, <span class="st">"logout"</span>]

<span class="kw">for</span> test <span class="kw">in</span> tests:
    <span class="kw">if</span> test.<span class="fn">startswith</span>(<span class="st">"SKIP_"</span>):
        <span class="fn">print</span>(<span class="st">f"Skipping: <span class="op">{test}</span>"</span>)
        <span class="kw">continue</span>             <span class="cm"># skip this test, go to next item</span>

    <span class="kw">if</span> test == <span class="st">"STOP"</span>:
        <span class="fn">print</span>(<span class="st">"Stopping test run"</span>)
        <span class="kw">break</span>                <span class="cm"># exit loop completely</span>

    <span class="fn">print</span>(<span class="st">f"Running: <span class="op">{test}</span>"</span>)   <span class="cm"># login, profile</span>

<span class="cm"># Output:</span>
<span class="cm"># Running: login</span>
<span class="cm"># Skipping: SKIP_checkout</span>
<span class="cm"># Running: profile</span>
<span class="cm"># Stopping test run</span>`},
  {tab:"6. Nested if+for",file:"nested.py — combining conditions and loops",code:`<span class="cm"># Real QA scenario: loop over test cases + validate each one</span>

test_cases = [
    {<span class="st">"name"</span>: <span class="st">"home"</span>,      <span class="st">"status"</span>: <span class="num">200</span>, <span class="st">"time_ms"</span>: <span class="num">350</span>},
    {<span class="st">"name"</span>: <span class="st">"login"</span>,     <span class="st">"status"</span>: <span class="num">200</span>, <span class="st">"time_ms"</span>: <span class="num">1200</span>},
    {<span class="st">"name"</span>: <span class="st">"dashboard"</span>, <span class="st">"status"</span>: <span class="num">404</span>, <span class="st">"time_ms"</span>: <span class="num">200</span>},
]

<span class="kw">for</span> tc <span class="kw">in</span> test_cases:
    name   = tc[<span class="st">"name"</span>]
    status = tc[<span class="st">"status"</span>]
    time   = tc[<span class="st">"time_ms"</span>]

    <span class="kw">if</span> status == <span class="num">200</span> <span class="kw">and</span> time < <span class="num">1000</span>:
        <span class="fn">print</span>(<span class="st">f"[PASS] {name} — {status} in {time}ms"</span>)
    <span class="kw">elif</span> status == <span class="num">200</span> <span class="kw">and</span> time >= <span class="num">1000</span>:
        <span class="fn">print</span>(<span class="st">f"[SLOW] {name} — {status} but {time}ms"</span>)
    <span class="kw">else</span>:
        <span class="fn">print</span>(<span class="st">f"[FAIL] {name} — status {status}"</span>)`},
],
bp:["Always end if/for/while lines with a colon (:) — the most common beginner syntax error","Use 'elif' instead of multiple separate 'if' checks for mutually exclusive conditions","Never use while True without a break condition — always have an exit strategy","Use for loops over while when the number of iterations is known","Prefer 'if x in collection' over checking each item with == in a loop"],
qa:[
  {q:"Q1: What is the difference between a for loop and a while loop?",a:"for is used when you know the number of iterations — iterating a list, a range. while is used when you loop until a condition changes — retrying an API call until it succeeds or max retries is reached. In QA automation, for handles test data; while handles retry logic."},
  {q:"Q2: What is the purpose of break and continue?",a:"break immediately exits the entire loop — useful when you find what you're looking for. continue skips the rest of the current iteration and moves to the next item — useful for skipping invalid test cases. Both only affect the innermost loop they're in."},
  {q:"Q3: What happens if an if condition never evaluates to True?",a:"Python checks each condition in order. If none are True and there's no else, the entire if/elif block is skipped silently. This is a common QA bug — always add a default else to log unexpected values."},
  {q:"Q4: What is a ternary expression?",a:"A one-line if/else: result = 'PASS' if status == 200 else 'FAIL'. It's useful for simple assignments — but avoid nesting ternaries as they become unreadable. Use a regular if/else for anything complex."},
  {q:"Q5: How do you skip certain items in a for loop?",a:"Use continue with an if condition: for test in tests: if test.startswith('SKIP'): continue. This skips the rest of the loop body for that item and moves to the next. In QA, use this to skip disabled tests or ignored test cases."},
]},

{id:6,phase:"inter",title:"Functions — define, call, return",sub:"Functions are reusable code blocks — the single most important concept for writing clean QA automation.",
what:"A function is a named block of code defined with 'def' that runs when called by name.",
why:"Functions eliminate repeated code — write login logic once, call it from 50 tests.",
when:"Any code you write more than once should be in a function.",
how:"def function_name(params): body, return value — call with function_name(args).",
diagram:`<svg width="100%" viewBox="0 0 680 190" role="img"><title>Function anatomy</title><desc>def keyword names the function, parameters are inputs, body has logic, return sends output back</desc><defs><marker id="ar6" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="c-purple"><rect x="40" y="40" width="100" height="44" rx="8" stroke-width="0.5"/><text class="th" x="90" y="62" text-anchor="middle" dominant-baseline="central">def keyword</text></g>
<g class="c-teal"><rect x="160" y="40" width="140" height="44" rx="8" stroke-width="0.5"/><text class="th" x="230" y="62" text-anchor="middle" dominant-baseline="central">function name</text></g>
<g class="c-amber"><rect x="320" y="40" width="160" height="44" rx="8" stroke-width="0.5"/><text class="th" x="400" y="62" text-anchor="middle" dominant-baseline="central">parameters</text></g>
<g class="c-gray"><rect x="40" y="110" width="560" height="44" rx="8" stroke-width="0.5"/><text class="th" x="320" y="132" text-anchor="middle" dominant-baseline="central">function body (indented 4 spaces)</text></g>
<line x1="90" y1="84" x2="90" y2="110" stroke="var(--color-text-secondary)" stroke-width="1"/>
<line x1="90" y1="154" x2="90" y2="175" stroke="var(--color-text-secondary)" stroke-width="1"/>
<g class="c-green"><rect x="520" y="40" width="120" height="44" rx="8" stroke-width="0.5"/><text class="th" x="580" y="62" text-anchor="middle" dominant-baseline="central">return value</text></g>
<text class="ts" x="340" y="178" text-anchor="middle" fill="var(--color-text-secondary)">def greet(name): return "Hello " + name — then call: greet("Alice")</text>
</svg>`,
oneliners:[
  {n:"1",t:"<strong>def</strong> is the keyword to define a function — 'def' stands for define, always followed by the function name."},
  {n:"2",t:"<strong>Parameters</strong> are the inputs listed inside () — they act as local variables inside the function body."},
  {n:"3",t:"<strong>return</strong> sends a value back to the caller — without return, a function returns None automatically."},
  {n:"4",t:"<strong>Default parameter</strong> — def login(url, timeout=30) means timeout is 30 if caller doesn't provide it."},
  {n:"5",t:"<strong>*args</strong> accepts any number of positional arguments as a tuple — def test(*urls) takes 1, 2 or 10 URLs."},
  {n:"6",t:"<strong>**kwargs</strong> accepts any number of keyword arguments as a dict — def build(**fields) takes any key=value pairs."},
],
examples:[
  {tab:"1. Basic function",file:"func_basic.py — define and call a function",code:`<span class="cm"># def = keyword to DEFINE a function</span>
<span class="cm"># Syntax: def function_name(parameter1, parameter2):</span>
<span class="cm">#             indented body (4 spaces)</span>
<span class="cm">#             return value  (optional)</span>

<span class="kw">def</span> <span class="fn">greet</span>(name):                    <span class="cm"># 'name' is the parameter</span>
    message = <span class="st">f"Hello, <span class="op">{name}</span>!"</span>       <span class="cm"># body: create message string</span>
    <span class="kw">return</span> message                   <span class="cm"># return: sends value back to caller</span>

<span class="cm"># Calling the function — pass 'Alice' as the argument for 'name'</span>
result = <span class="fn">greet</span>(<span class="st">"Alice"</span>)
<span class="fn">print</span>(result)       <span class="cm"># Hello, Alice!</span>
<span class="fn">print</span>(<span class="fn">greet</span>(<span class="st">"QA Team"</span>))  <span class="cm"># Hello, QA Team!</span>

<span class="cm"># Function with no return — returns None</span>
<span class="kw">def</span> <span class="fn">log_result</span>(test, status):
    <span class="fn">print</span>(<span class="st">f"[<span class="op">{status}</span>] <span class="op">{test}</span>"</span>)    <span class="cm"># just prints, no return</span>

<span class="fn">log_result</span>(<span class="st">"login_test"</span>, <span class="st">"PASS"</span>)   <span class="cm"># [PASS] login_test</span>`},
  {tab:"2. Default params",file:"defaults.py — parameters with default values",code:`<span class="cm"># Default parameter = a parameter with a pre-set fallback value</span>
<span class="cm"># Used when the caller often uses the same value — saves typing</span>
<span class="cm"># Syntax: def func(param=default_value):</span>
<span class="cm"># Default params MUST come AFTER non-default params</span>

<span class="kw">def</span> <span class="fn">check_status</span>(status, expected=<span class="num">200</span>):   <span class="cm"># expected defaults to 200</span>
    <span class="kw">if</span> status == expected:
        <span class="fn">print</span>(<span class="st">f"PASS: got <span class="op">{status}</span>"</span>)
    <span class="kw">else</span>:
        <span class="fn">print</span>(<span class="st">f"FAIL: expected <span class="op">{expected}</span>, got <span class="op">{status}</span>"</span>)

<span class="fn">check_status</span>(<span class="num">200</span>)          <span class="cm"># PASS: got 200  (uses default expected=200)</span>
<span class="fn">check_status</span>(<span class="num">201</span>)          <span class="cm"># FAIL: expected 200, got 201</span>
<span class="fn">check_status</span>(<span class="num">201</span>, <span class="num">201</span>)     <span class="cm"># PASS: got 201  (override default)</span>
<span class="fn">check_status</span>(<span class="num">404</span>, <span class="num">404</span>)     <span class="cm"># PASS: got 404</span>`},
  {tab:"3. Return value",file:"return.py — using return in functions",code:`<span class="cm"># return sends a value from inside the function to the caller</span>
<span class="cm"># You can return any type: string, int, list, dict, bool</span>
<span class="cm"># return also STOPS the function — code after return doesn't run</span>

<span class="kw">def</span> <span class="fn">is_success</span>(status_code):
    <span class="cm"># Returns True if status is 2xx, False otherwise</span>
    <span class="kw">return</span> <span class="num">200</span> <= status_code <= <span class="num">299</span>   <span class="cm"># returns a bool</span>

<span class="fn">print</span>(<span class="fn">is_success</span>(<span class="num">200</span>))   <span class="cm"># True</span>
<span class="fn">print</span>(<span class="fn">is_success</span>(<span class="num">404</span>))   <span class="cm"># False</span>

<span class="kw">def</span> <span class="fn">get_test_summary</span>(tests):
    <span class="cm"># Returns a dictionary with counts — return can send a dict!</span>
    passed  = tests.<span class="fn">count</span>(<span class="st">"PASS"</span>)
    failed  = tests.<span class="fn">count</span>(<span class="st">"FAIL"</span>)
    <span class="kw">return</span> {<span class="st">"passed"</span>: passed, <span class="st">"failed"</span>: failed, <span class="st">"total"</span>: <span class="fn">len</span>(tests)}

results  = [<span class="st">"PASS"</span>, <span class="st">"FAIL"</span>, <span class="st">"PASS"</span>]
summary  = <span class="fn">get_test_summary</span>(results)
<span class="fn">print</span>(summary)   <span class="cm"># {'passed': 2, 'failed': 1, 'total': 3}</span>`},
  {tab:"4. *args",file:"args.py — variable positional arguments",code:`<span class="cm"># *args lets a function accept ANY NUMBER of positional arguments</span>
<span class="cm"># *args collects them all into a TUPLE inside the function</span>
<span class="cm"># The * before 'args' is the syntax — name can be anything but 'args' is convention</span>

<span class="kw">def</span> <span class="fn">test_all_urls</span>(*urls):      <span class="cm"># *urls = any number of URL arguments</span>
    <span class="fn">print</span>(<span class="st">f"Testing <span class="op">{<span class="fn">len</span>(urls)}</span> URLs:"</span>)
    <span class="kw">for</span> url <span class="kw">in</span> urls:           <span class="cm"># urls is a tuple — iterate it</span>
        <span class="fn">print</span>(<span class="st">f"  - <span class="op">{url}</span>"</span>)

<span class="cm"># Call with 1 URL</span>
<span class="fn">test_all_urls</span>(<span class="st">"https://app.com/home"</span>)

<span class="cm"># Call with 3 URLs — function handles both!</span>
<span class="fn">test_all_urls</span>(
    <span class="st">"https://app.com/login"</span>,
    <span class="st">"https://app.com/profile"</span>,
    <span class="st">"https://app.com/api/health"</span>
)`},
  {tab:"5. **kwargs",file:"kwargs.py — variable keyword arguments",code:`<span class="cm"># **kwargs lets a function accept ANY NUMBER of keyword arguments</span>
<span class="cm"># **kwargs collects them all into a DICTIONARY inside the function</span>
<span class="cm"># ** before name is the syntax — 'kwargs' is the convention</span>

<span class="kw">def</span> <span class="fn">build_payload</span>(**fields):    <span class="cm"># **fields = any key=value arguments</span>
    <span class="fn">print</span>(<span class="st">"Building payload:"</span>)
    <span class="kw">for</span> key, val <span class="kw">in</span> fields.<span class="fn">items</span>():
        <span class="fn">print</span>(<span class="st">f"  {key}: {val}"</span>)
    <span class="kw">return</span> <span class="fn">dict</span>(fields)         <span class="cm"># return as a regular dict</span>

<span class="cm"># Call with any keyword arguments you want</span>
payload = <span class="fn">build_payload</span>(username=<span class="st">"admin"</span>, password=<span class="st">"pass123"</span>, role=<span class="st">"tester"</span>)
<span class="fn">print</span>(payload)
<span class="cm"># {'username': 'admin', 'password': 'pass123', 'role': 'tester'}</span>

<span class="cm"># Can combine: def func(required, *args, **kwargs)</span>`},
  {tab:"6. Docstrings",file:"docstrings.py — documenting functions",code:`<span class="cm"># A docstring is a string at the start of a function body</span>
<span class="cm"># It documents what the function does, its parameters, and what it returns</span>
<span class="cm"># Written in triple quotes """ """</span>
<span class="cm"># Best practice in ALL production QA frameworks</span>

<span class="kw">def</span> <span class="fn">verify_status</span>(actual, expected=<span class="num">200</span>):
    <span class="st">"""
    Verify HTTP response status code matches the expected value.

    Parameters:
        actual   (int): The status code returned by the API.
        expected (int): The expected status code. Defaults to 200.

    Returns:
        bool: True if they match, False otherwise.
    """</span>
    result = actual == expected
    status = <span class="st">"PASS"</span> <span class="kw">if</span> result <span class="kw">else</span> <span class="st">"FAIL"</span>
    <span class="fn">print</span>(<span class="st">f"[<span class="op">{status}</span>] Expected <span class="op">{expected}</span>, Got <span class="op">{actual}</span>"</span>)
    <span class="kw">return</span> result

<span class="fn">print</span>(<span class="fn">verify_status</span>(<span class="num">200</span>))      <span class="cm"># [PASS] Expected 200, Got 200 → True</span>
<span class="fn">print</span>(<span class="fn">verify_status</span>(<span class="num">404</span>))      <span class="cm"># [FAIL] Expected 200, Got 404 → False</span>`},
],
bp:["Every function should do ONE thing — if it does two things, split it into two functions","Add a docstring (triple quotes) to every function — document params and return value","Use default parameters for optional settings: def request(url, timeout=30)","Name functions with action verbs: get_, verify_, build_, check_, send_","Always return a value from functions used in conditions — None is falsy and causes silent bugs"],
qa:[
  {q:"Q1: What is the difference between a parameter and an argument?",a:"A parameter is the variable name in the function definition: def greet(name) — 'name' is a parameter. An argument is the actual value passed when calling: greet('Alice') — 'Alice' is the argument. Same concept, different timing."},
  {q:"Q2: What does a function return when there is no return statement?",a:"Python automatically returns None. This is a common bug when you forget to return a value and then try to use the result: result = my_func() — result will be None and any comparison will behave unexpectedly."},
  {q:"Q3: What is the difference between *args and **kwargs?",a:"*args collects unlimited positional arguments into a tuple. **kwargs collects unlimited keyword arguments into a dict. Example: func(1, 2, 3) uses *args; func(a=1, b=2) uses **kwargs. You can combine them: def f(req, *args, **kwargs)."},
  {q:"Q4: What is a default parameter and why use it in QA?",a:"A default parameter has a preset fallback value: def check(url, timeout=30). If timeout is not provided, it defaults to 30. In QA frameworks this is essential for functions like login(driver, timeout=10) where most tests use the same timeout."},
  {q:"Q5: What is DRY and how do functions help?",a:"DRY = Don't Repeat Yourself. Without functions, the same 5-line login logic would be copy-pasted in 50 test files. When the login button ID changes, you'd fix 50 files. With a login() function, you fix one. Functions are how you apply DRY in Python QA automation."},
]},

{id:7,phase:"inter",title:"Nested lists & data structures",sub:"Work with lists inside lists, dicts inside lists, and lists inside dicts — the real shape of test data.",
what:"Nested data structures are collections that contain other collections as their items.",
why:"API responses, test data files, and configuration data are almost always nested structures.",
when:"Parsing JSON API responses, storing tabular test data, building test report structures.",
how:"Access with multiple [] operators, loop with nested for loops.",
diagram:`<svg width="100%" viewBox="0 0 680 220" role="img"><title>Nested data structure shapes</title><desc>Three shapes: list of lists for matrix, list of dicts for records, dict of lists for grouped data</desc>
<g class="c-purple"><rect x="30" y="20" width="195" height="170" rx="10" stroke-width="0.5"/><text class="th" x="127" y="45" text-anchor="middle" dominant-baseline="central">list of lists</text><text class="ts" x="127" y="65" text-anchor="middle" dominant-baseline="central">[[1,2],[3,4]]</text><rect x="50" y="80" width="155" height="26" rx="4" stroke-width="0.5"/><text class="ts" x="127" y="93" text-anchor="middle" dominant-baseline="central">row 0: [200, "/home", True]</text><rect x="50" y="112" width="155" height="26" rx="4" stroke-width="0.5"/><text class="ts" x="127" y="125" text-anchor="middle" dominant-baseline="central">row 1: [404, "/oops", False]</text><text class="ts" x="127" y="165" text-anchor="middle" dominant-baseline="central">access: data[0][1]</text></g>
<g class="c-teal"><rect x="243" y="20" width="195" height="170" rx="10" stroke-width="0.5"/><text class="th" x="340" y="45" text-anchor="middle" dominant-baseline="central">list of dicts</text><text class="ts" x="340" y="65" text-anchor="middle" dominant-baseline="central">[{"id":1},{"id":2}]</text><rect x="263" y="80" width="155" height="26" rx="4" stroke-width="0.5"/><text class="ts" x="340" y="93" text-anchor="middle" dominant-baseline="central">{"name":"login","pass":True}</text><rect x="263" y="112" width="155" height="26" rx="4" stroke-width="0.5"/><text class="ts" x="340" y="125" text-anchor="middle" dominant-baseline="central">{"name":"home","pass":True}</text><text class="ts" x="340" y="165" text-anchor="middle" dominant-baseline="central">access: data[0]["name"]</text></g>
<g class="c-amber"><rect x="456" y="20" width="195" height="170" rx="10" stroke-width="0.5"/><text class="th" x="553" y="45" text-anchor="middle" dominant-baseline="central">dict of lists</text><text class="ts" x="553" y="65" text-anchor="middle" dominant-baseline="central">{"urls":[...]}</text><rect x="476" y="80" width="155" height="26" rx="4" stroke-width="0.5"/><text class="ts" x="553" y="93" text-anchor="middle" dominant-baseline="central">"browsers":["chrome","ff"]</text><rect x="476" y="112" width="155" height="26" rx="4" stroke-width="0.5"/><text class="ts" x="553" y="125" text-anchor="middle" dominant-baseline="central">"envs":["dev","staging"]</text><text class="ts" x="553" y="165" text-anchor="middle" dominant-baseline="central">access: data["browsers"][0]</text></g>
</svg>`,
oneliners:[
  {n:"1",t:"<strong>List of lists</strong> — data[0][1] gets row 0, column 1; used for tabular data like CSV test sheets."},
  {n:"2",t:"<strong>List of dicts</strong> — the most common API response shape; each dict is a record with named fields."},
  {n:"3",t:"<strong>Dict of lists</strong> — a config structure; {'browsers':['chrome','ff']} groups related items under a key."},
  {n:"4",t:"<strong>Nested for loops</strong> — outer loop picks the row, inner loop picks each item in that row."},
  {n:"5",t:"<strong>JSON maps to dict</strong> — Python's json.loads() converts JSON text directly into a nested dict/list structure."},
  {n:"6",t:"<strong>Deep access</strong> — response['data']['user']['roles'][0] accesses four levels deep; each [] goes one level deeper."},
],
examples:[
  {tab:"1. List of lists",file:"list_of_lists.py — 2D data like a spreadsheet",code:`<span class="cm"># A list of lists = a 2D structure, like a table or spreadsheet</span>
<span class="cm"># Outer list = rows, inner lists = columns</span>
<span class="cm"># Access: data[row_index][col_index]</span>

test_data = [
    [<span class="st">"login"</span>,     <span class="num">200</span>, <span class="kw">True</span>],    <span class="cm"># row 0 — test name, status, passed</span>
    [<span class="st">"checkout"</span>,  <span class="num">404</span>, <span class="kw">False</span>],   <span class="cm"># row 1</span>
    [<span class="st">"dashboard"</span>, <span class="num">200</span>, <span class="kw">True</span>],    <span class="cm"># row 2</span>
]

<span class="cm"># Access specific cell</span>
<span class="fn">print</span>(test_data[<span class="num">0</span>][<span class="num">0</span>])    <span class="cm"># login   (row 0, col 0)</span>
<span class="fn">print</span>(test_data[<span class="num">1</span>][<span class="num">1</span>])    <span class="cm"># 404     (row 1, col 1)</span>
<span class="fn">print</span>(test_data[-<span class="num">1</span>][-<span class="num">1</span>]) <span class="cm"># True    (last row, last col)</span>

<span class="cm"># Loop through all rows</span>
<span class="kw">for</span> row <span class="kw">in</span> test_data:
    name, status, passed = row     <span class="cm"># unpack tuple-style</span>
    <span class="fn">print</span>(<span class="st">f"{name}: {status} → {'PASS' if passed else 'FAIL'}"</span>)`},
  {tab:"2. List of dicts",file:"list_of_dicts.py — records with named fields",code:`<span class="cm"># List of dicts = the most common API response shape</span>
<span class="cm"># Each dict is one "record" — like a row in a database</span>
<span class="cm"># Access: records[index]["key"]</span>

test_cases = [
    {<span class="st">"name"</span>: <span class="st">"login"</span>,   <span class="st">"status"</span>: <span class="num">200</span>, <span class="st">"passed"</span>: <span class="kw">True</span>},
    {<span class="st">"name"</span>: <span class="st">"signup"</span>,  <span class="st">"status"</span>: <span class="num">201</span>, <span class="st">"passed"</span>: <span class="kw">True</span>},
    {<span class="st">"name"</span>: <span class="st">"profile"</span>, <span class="st">"status"</span>: <span class="num">404</span>, <span class="st">"passed"</span>: <span class="kw">False</span>},
]

<span class="cm"># Access by index then key</span>
<span class="fn">print</span>(test_cases[<span class="num">0</span>][<span class="st">"name"</span>])     <span class="cm"># login</span>
<span class="fn">print</span>(test_cases[<span class="num">2</span>][<span class="st">"status"</span>])   <span class="cm"># 404</span>

<span class="cm"># Loop — each 'tc' is a dict</span>
<span class="kw">for</span> tc <span class="kw">in</span> test_cases:
    icon = <span class="st">"✓"</span> <span class="kw">if</span> tc[<span class="st">"passed"</span>] <span class="kw">else</span> <span class="st">"✗"</span>
    <span class="fn">print</span>(<span class="st">f"{icon} {tc['name']}: {tc['status']}"</span>)`},
  {tab:"3. Dict of lists",file:"dict_of_lists.py — grouped configuration",code:`<span class="cm"># Dict of lists = grouped collections under named keys</span>
<span class="cm"># Perfect for: test configuration, grouped test data</span>
<span class="cm"># Access: config["key"][index]</span>

config = {
    <span class="st">"browsers"</span>:    [<span class="st">"chrome"</span>, <span class="st">"firefox"</span>, <span class="st">"safari"</span>],
    <span class="st">"environments"</span>: [<span class="st">"dev"</span>, <span class="st">"staging"</span>, <span class="st">"production"</span>],
    <span class="st">"test_tags"</span>:    [<span class="st">"smoke"</span>, <span class="st">"regression"</span>, <span class="st">"api"</span>]
}

<span class="cm"># Access first browser</span>
<span class="fn">print</span>(config[<span class="st">"browsers"</span>][<span class="num">0</span>])     <span class="cm"># chrome</span>

<span class="cm"># Loop all environments</span>
<span class="kw">for</span> env <span class="kw">in</span> config[<span class="st">"environments"</span>]:
    <span class="fn">print</span>(<span class="st">f"Running on: <span class="op">{env}</span>"</span>)

<span class="cm"># Add a new browser dynamically</span>
config[<span class="st">"browsers"</span>].<span class="fn">append</span>(<span class="st">"edge"</span>)
<span class="fn">print</span>(config[<span class="st">"browsers"</span>])         <span class="cm"># ['chrome', 'firefox', 'safari', 'edge']</span>`},
  {tab:"4. Nested loops",file:"nested_loops.py — iterating nested structures",code:`<span class="cm"># When data is nested, loops are also nested</span>
<span class="cm"># Outer loop handles the outer level, inner loop handles inner level</span>

matrix = [[<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>], [<span class="num">4</span>, <span class="num">5</span>, <span class="num">6</span>], [<span class="num">7</span>, <span class="num">8</span>, <span class="num">9</span>]]

<span class="cm"># Nested loop — outer=rows, inner=columns</span>
<span class="kw">for</span> row <span class="kw">in</span> matrix:                    <span class="cm"># row = [1,2,3] then [4,5,6] etc</span>
    <span class="kw">for</span> num <span class="kw">in</span> row:                  <span class="cm"># num = 1, then 2, then 3, etc</span>
        <span class="fn">print</span>(num, end=<span class="st">" "</span>)          <span class="cm"># end=" " avoids newline</span>
    <span class="fn">print</span>()                          <span class="cm"># newline after each row</span>

<span class="cm"># Practical: run each test on each browser</span>
tests    = [<span class="st">"login"</span>, <span class="st">"checkout"</span>]
browsers = [<span class="st">"chrome"</span>, <span class="st">"firefox"</span>]

<span class="kw">for</span> test <span class="kw">in</span> tests:
    <span class="kw">for</span> browser <span class="kw">in</span> browsers:
        <span class="fn">print</span>(<span class="st">f"Run [{test}] on [{browser}]"</span>)`},
  {tab:"5. API response",file:"api_response.py — parsing nested JSON-like data",code:`<span class="cm"># Real API responses often look like nested dicts and lists</span>
<span class="cm"># This simulates what requests.get().json() returns</span>

api_response = {
    <span class="st">"status"</span>: <span class="num">200</span>,
    <span class="st">"data"</span>: {
        <span class="st">"users"</span>: [
            {<span class="st">"id"</span>: <span class="num">1</span>, <span class="st">"name"</span>: <span class="st">"Alice"</span>, <span class="st">"active"</span>: <span class="kw">True</span>},
            {<span class="st">"id"</span>: <span class="num">2</span>, <span class="st">"name"</span>: <span class="st">"Bob"</span>,   <span class="st">"active"</span>: <span class="kw">False</span>},
        ]
    }
}

<span class="cm"># Deep access: dict → dict → list → dict → value</span>
users = api_response[<span class="st">"data"</span>][<span class="st">"users"</span>]    <span class="cm"># the list of user dicts</span>
<span class="fn">print</span>(users[<span class="num">0</span>][<span class="st">"name"</span>])                  <span class="cm"># Alice</span>

<span class="cm"># Get all active users using list comprehension</span>
active = [u <span class="kw">for</span> u <span class="kw">in</span> users <span class="kw">if</span> u[<span class="st">"active"</span>]]
<span class="fn">print</span>(<span class="st">f"Active users: <span class="op">{<span class="fn">len</span>(active)}</span>"</span>)      <span class="cm"># 1</span>
<span class="fn">print</span>(active[<span class="num">0</span>][<span class="st">"name"</span>])                  <span class="cm"># Alice</span>`},
  {tab:"6. Flatten & transform",file:"flatten.py — flattening and transforming nested data",code:`<span class="cm"># Sometimes you need to flatten a nested list into a simple one</span>
<span class="cm"># Or transform nested data into a simpler structure</span>

nested = [[<span class="st">"login"</span>, <span class="st">"signup"</span>], [<span class="st">"checkout"</span>], [<span class="st">"profile"</span>, <span class="st">"settings"</span>]]

<span class="cm"># Flatten using list comprehension with 2 for clauses</span>
<span class="cm"># 'item' = each inner list, 'test' = each element in that inner list</span>
flat = [test <span class="kw">for</span> item <span class="kw">in</span> nested <span class="kw">for</span> test <span class="kw">in</span> item]
<span class="fn">print</span>(flat)    <span class="cm"># ['login', 'signup', 'checkout', 'profile', 'settings']</span>

<span class="cm"># Extract just names from list of dicts</span>
records = [{<span class="st">"name"</span>: <span class="st">"login"</span>, <span class="st">"pass"</span>: <span class="kw">True</span>},
           {<span class="st">"name"</span>: <span class="st">"checkout"</span>, <span class="st">"pass"</span>: <span class="kw">False</span>}]

names    = [r[<span class="st">"name"</span>] <span class="kw">for</span> r <span class="kw">in</span> records]
failures = [r[<span class="st">"name"</span>] <span class="kw">for</span> r <span class="kw">in</span> records <span class="kw">if</span> <span class="kw">not</span> r[<span class="st">"pass"</span>]]
<span class="fn">print</span>(names)     <span class="cm"># ['login', 'checkout']</span>
<span class="fn">print</span>(failures)  <span class="cm"># ['checkout']</span>`},
],
bp:["Use .get() at every level of nested access — API responses often have optional nested fields","Extract nested values into named variables first — don't chain more than 3 [] in one expression","Use list comprehensions to filter list-of-dicts — much cleaner than nested for+append","Write a helper function for deep access: def get_deep(d, *keys) — reduces duplication","Always assert the outer structure exists before drilling in — check 'data' key before 'data']['users']"],
qa:[
  {q:"Q1: How do you access a value three levels deep in a nested dict?",a:"Use chained key access: response['data']['user']['email']. But first check each level exists using .get(): user = response.get('data',{}).get('user',{}); email = user.get('email','N/A'). This prevents KeyError crashes on missing keys in API responses."},
  {q:"Q2: What is the most common real-world nested structure in API testing?",a:"A list of dicts: [{'id':1,'name':'Alice'},{'id':2,'name':'Bob'}]. This is how REST APIs return collections — a list where each item is a dict (JSON object). You loop over the list and access fields by key."},
  {q:"Q3: How would you get all failed tests from a list of test result dicts?",a:"Use list comprehension with a filter: failures = [t for t in results if not t['passed']]. This is the most Pythonic way — one line, readable, returns a new list without modifying the original."},
  {q:"Q4: What is the difference between a nested loop and a flat loop?",a:"A flat loop iterates one level: for item in list. A nested loop iterates two levels: for row in grid: for cell in row. Use nested loops when data has rows+columns structure, or when running each test against each browser/environment."},
  {q:"Q5: How do you flatten a list of lists into a single list?",a:"Use a two-clause comprehension: flat = [item for sublist in nested for item in sublist]. Or use itertools.chain.from_iterable(nested) for very large lists. In QA, flattening is useful when test cases are organized in groups but you need to run them all in sequence."},
]},

{id:8,phase:"inter",title:"Error handling & debugging",sub:"Make your code resilient — handle errors gracefully and find bugs with confidence.",
what:"Error handling uses try/except to catch exceptions so your program doesn't crash unexpectedly.",
why:"Test scripts talk to networks, files, browsers — all can fail. Graceful handling keeps your suite running.",
when:"Any I/O operation: API calls, file reads, browser actions, database queries.",
how:"try: risky code — except ExceptionType: handle it — finally: cleanup always.",

oneliners:[
  {n:"1",t:"<strong>try block</strong> — put risky code inside try; Python attempts to run it and watches for errors."},
  {n:"2",t:"<strong>except block</strong> — runs only when an error (exception) occurs in the try block; handles it gracefully."},
  {n:"3",t:"<strong>finally block</strong> — always runs, even if an exception occurred; used for cleanup like closing files or browsers."},
  {n:"4",t:"<strong>Exception types</strong> — ValueError (wrong type), KeyError (missing dict key), IndexError (list out of range), FileNotFoundError, TypeError."},
  {n:"5",t:"<strong>'as e' captures the error</strong> — 'except ValueError as e: print(e)' lets you see and log the exact error message."},
  {n:"6",t:"<strong>raise re-throws</strong> — 'raise' inside an except block re-raises the exception after you've logged it, so the test still fails correctly."},
],
examples:[
  {tab:"1. Basic try/except",file:"try_except.py — catch your first error",code:`<span class="cm"># try: put risky code here — Python watches for errors</span>
<span class="cm"># except: runs ONLY when an error happens in try block</span>
<span class="cm"># Without try/except, an error CRASHES the entire program!</span>

<span class="cm"># WITHOUT try/except — this would crash:</span>
<span class="cm"># result = int("abc")  ← ValueError: invalid literal</span>

<span class="cm"># WITH try/except — handles it gracefully:</span>
<span class="kw">try</span>:
    result = <span class="fn">int</span>(<span class="st">"abc"</span>)    <span class="cm"># 'abc' can't be converted to int</span>
    <span class="fn">print</span>(result)          <span class="cm"># this line is SKIPPED if error occurs</span>
<span class="kw">except</span> <span class="bi">ValueError</span>:
    <span class="fn">print</span>(<span class="st">"Error: could not convert to int"</span>)  <span class="cm"># this runs instead</span>

<span class="fn">print</span>(<span class="st">"Program continues after error"</span>)   <span class="cm"># program keeps running!</span>`},
  {tab:"2. Capture error msg",file:"except_as.py — reading the error message",code:`<span class="cm"># 'as e' captures the exception OBJECT into variable 'e'</span>
<span class="cm"># You can then print or log 'e' to see the exact error message</span>
<span class="cm"># 'e' is the exception object — str(e) gives readable message</span>

<span class="kw">try</span>:
    data = {<span class="st">"name"</span>: <span class="st">"Alice"</span>}
    <span class="fn">print</span>(data[<span class="st">"email"</span>])    <span class="cm"># KeyError — key 'email' not in dict</span>
<span class="kw">except</span> <span class="bi">KeyError</span> <span class="kw">as</span> e:
    <span class="fn">print</span>(<span class="st">f"Missing key: <span class="op">{e}</span>"</span>)        <span class="cm"># Missing key: 'email'</span>
    <span class="fn">print</span>(<span class="st">f"Error type: <span class="op">{<span class="fn">type</span>(e).__name__}</span>"</span>)  <span class="cm"># Error type: KeyError</span>

<span class="cm"># Multiple except blocks — catch different error types differently</span>
<span class="kw">try</span>:
    nums = [<span class="num">1</span>, <span class="num">2</span>]
    <span class="fn">print</span>(nums[<span class="num">99</span>])         <span class="cm"># IndexError</span>
<span class="kw">except</span> <span class="bi">IndexError</span> <span class="kw">as</span> e:
    <span class="fn">print</span>(<span class="st">f"IndexError: <span class="op">{e}</span>"</span>)       <span class="cm"># list index out of range</span>
<span class="kw">except</span> <span class="bi">Exception</span> <span class="kw">as</span> e:
    <span class="fn">print</span>(<span class="st">f"Other error: <span class="op">{e}</span>"</span>)       <span class="cm"># catches any other error</span>`},
  {tab:"3. finally block",file:"finally.py — code that always runs",code:`<span class="cm"># finally block ALWAYS runs — whether error happened or not</span>
<span class="cm"># Use it for cleanup: close files, close browsers, logout</span>
<span class="cm"># Even if the test fails, you MUST clean up after yourself</span>

<span class="kw">def</span> <span class="fn">run_test</span>(browser_name):
    browser = <span class="kw">None</span>
    <span class="kw">try</span>:
        <span class="fn">print</span>(<span class="st">f"Opening {browser_name}"</span>)
        browser = <span class="st">"opened"</span>          <span class="cm"># simulate: browser = webdriver.Chrome()</span>
        <span class="cm"># Simulate a test that might fail</span>
        <span class="kw">if</span> browser_name == <span class="st">"edge"</span>:
            <span class="kw">raise</span> <span class="bi">ValueError</span>(<span class="st">"Edge not configured"</span>)
        <span class="fn">print</span>(<span class="st">"Test PASSED"</span>)
    <span class="kw">except</span> <span class="bi">ValueError</span> <span class="kw">as</span> e:
        <span class="fn">print</span>(<span class="st">f"Test FAILED: <span class="op">{e}</span>"</span>)
    <span class="kw">finally</span>:
        <span class="fn">print</span>(<span class="st">f"Closing {browser_name}"</span>)  <span class="cm"># ALWAYS closes browser!</span>

<span class="fn">run_test</span>(<span class="st">"chrome"</span>)
<span class="fn">run_test</span>(<span class="st">"edge"</span>)</code>`},
  {tab:"4. Common errors",file:"common_errors.py — errors you'll see every day",code:`<span class="cm"># Most common Python errors and how to handle each one</span>

<span class="cm"># 1. ValueError — wrong value type (e.g. int("hello"))</span>
<span class="kw">try</span>:
    x = <span class="fn">int</span>(<span class="st">"not a number"</span>)
<span class="kw">except</span> <span class="bi">ValueError</span> <span class="kw">as</span> e:
    <span class="fn">print</span>(<span class="st">f"ValueError: <span class="op">{e}</span>"</span>)

<span class="cm"># 2. KeyError — accessing a dict key that doesn't exist</span>
<span class="kw">try</span>:
    d = {<span class="st">"a"</span>: <span class="num">1</span>}
    <span class="fn">print</span>(d[<span class="st">"b"</span>])
<span class="kw">except</span> <span class="bi">KeyError</span> <span class="kw">as</span> e:
    <span class="fn">print</span>(<span class="st">f"KeyError: <span class="op">{e}</span>"</span>)

<span class="cm"># 3. IndexError — list index out of range</span>
<span class="kw">try</span>:
    lst = [<span class="num">1</span>, <span class="num">2</span>]
    <span class="fn">print</span>(lst[<span class="num">10</span>])
<span class="kw">except</span> <span class="bi">IndexError</span> <span class="kw">as</span> e:
    <span class="fn">print</span>(<span class="st">f"IndexError: <span class="op">{e}</span>"</span>)

<span class="cm"># 4. TypeError — wrong type for an operation</span>
<span class="kw">try</span>:
    result = <span class="st">"5"</span> + <span class="num">5</span>            <span class="cm"># can't add str + int</span>
<span class="kw">except</span> <span class="bi">TypeError</span> <span class="kw">as</span> e:
    <span class="fn">print</span>(<span class="st">f"TypeError: <span class="op">{e}</span>"</span>)`},
  {tab:"5. raise",file:"raise.py — raising your own exceptions",code:`<span class="cm"># raise = manually trigger an exception</span>
<span class="cm"># Use when you want to SIGNAL an error condition to the caller</span>
<span class="cm"># raise ExceptionType("message") — creates and raises the exception</span>

<span class="kw">def</span> <span class="fn">divide</span>(a, b):
    <span class="st">"""Divide a by b, raising ZeroDivisionError if b is 0."""</span>
    <span class="kw">if</span> b == <span class="num">0</span>:
        <span class="kw">raise</span> <span class="bi">ValueError</span>(<span class="st">"Cannot divide by zero!"</span>)   <span class="cm"># raise manually</span>
    <span class="kw">return</span> a / b

<span class="kw">try</span>:
    result = <span class="fn">divide</span>(<span class="num">10</span>, <span class="num">0</span>)
<span class="kw">except</span> <span class="bi">ValueError</span> <span class="kw">as</span> e:
    <span class="fn">print</span>(<span class="st">f"Caught: <span class="op">{e}</span>"</span>)    <span class="cm"># Caught: Cannot divide by zero!</span>

<span class="cm"># In QA: raise AssertionError when a test condition fails</span>
<span class="kw">def</span> <span class="fn">assert_status</span>(status, expected=<span class="num">200</span>):
    <span class="kw">if</span> status != expected:
        <span class="kw">raise</span> <span class="bi">AssertionError</span>(<span class="st">f"Expected {expected}, got {status}"</span>)
    <span class="fn">print</span>(<span class="st">"PASS"</span>)`},
  {tab:"6. Debugging tips",file:"debugging.py — finding and fixing bugs",code:`<span class="cm"># Debugging = finding WHY code is not working as expected</span>
<span class="cm"># Technique 1: print() statements — simplest way</span>

<span class="kw">def</span> <span class="fn">calculate_average</span>(numbers):
    <span class="fn">print</span>(<span class="st">f"DEBUG: input = <span class="op">{numbers}</span>"</span>)     <span class="cm"># print what you receive</span>
    <span class="fn">print</span>(<span class="st">f"DEBUG: len = <span class="op">{<span class="fn">len</span>(numbers)}</span>"</span>)   <span class="cm"># print intermediate values</span>
    total = <span class="fn">sum</span>(numbers)
    <span class="fn">print</span>(<span class="st">f"DEBUG: sum = <span class="op">{total}</span>"</span>)
    result = total / <span class="fn">len</span>(numbers)
    <span class="kw">return</span> result

<span class="cm"># Technique 2: assert statements — check your assumptions</span>
scores = [<span class="num">80</span>, <span class="num">90</span>, <span class="num">100</span>]
<span class="cm"># assert condition, "message if False" — crashes with helpful message</span>
<span class="kw">assert</span> <span class="fn">len</span>(scores) > <span class="num">0</span>, <span class="st">"scores list cannot be empty!"</span>
<span class="kw">assert</span> <span class="fn">isinstance</span>(scores, <span class="bi">list</span>), <span class="st">"scores must be a list!"</span>

avg = <span class="fn">calculate_average</span>(scores)
<span class="fn">print</span>(<span class="st">f"Average: <span class="op">{avg}</span>"</span>)   <span class="cm"># 90.0</span>`},
],
bp:["Never use bare 'except:' — always name the exception type to avoid swallowing unexpected errors","Always use 'finally' to close browsers, files, or connections — clean up regardless of outcome","Use 'except Exception as e' as a catch-all only at the top level — be specific in helpers","Add print(f'DEBUG: {var}') liberally when debugging — remove them before committing code","Use assert statements for internal consistency checks during development — they document assumptions"],
qa:[
  {q:"Q1: What is the difference between SyntaxError and RuntimeError?",a:"SyntaxError is detected before the code runs — Python can't even parse it (missing colon, wrong indentation). RuntimeError happens while the code is running — the syntax is valid but something goes wrong at execution time (like dividing by zero or accessing a missing key)."},
  {q:"Q2: What is the difference between except: and except Exception:?",a:"Bare 'except:' catches absolutely everything including SystemExit and KeyboardInterrupt — you lose the ability to Ctrl+C stop your program. 'except Exception:' catches all standard errors but lets system signals through. Always use at least 'except Exception'."},
  {q:"Q3: When would you use raise inside an except block?",a:"When you want to log or handle the error AND still let it propagate. Example: except Exception as e: logger.error(str(e)); raise. This logs the error for your team's visibility but still marks the test as failed by re-raising the exception."},
  {q:"Q4: What is an AssertionError and how is it used in QA?",a:"AssertionError is raised when an 'assert' statement's condition is False. In Pytest, every test assertion uses assert: assert response.status_code == 200. When it fails, Pytest catches the AssertionError and marks the test as FAILED with a helpful message."},
  {q:"Q5: What are the most common exceptions you'll encounter in automation?",a:"ConnectionError/Timeout (network issue), NoSuchElementException (element not found in Selenium), KeyError (missing JSON field in API response), AssertionError (test assertion failed), FileNotFoundError (config/test data file missing). Each should have a specific except block."},
]},

oneliners:[
  {n:"1",t:"<strong>.split()</strong> — 'a,b,c'.split(',') breaks a string into a list by a separator — essential for parsing CSV or URL paths."},
  {n:"2",t:"<strong>.strip()</strong> — removes whitespace from both ends of a string; use before comparing any string from user input or file."},
  {n:"3",t:"<strong>.replace()</strong> — 'http'.replace('http','https') swaps every occurrence of old with new in the string."},
  {n:"4",t:"<strong>.startswith() and .endswith()</strong> — check if a string begins or ends with a given prefix/suffix — no indexing needed."},
  {n:"5",t:"<strong>.find()</strong> — returns the index of first match or -1 if not found; safer than .index() which raises ValueError if missing."},
  {n:"6",t:"<strong>'in' operator</strong> — 'login' in url checks if 'login' appears anywhere in url — the simplest substring check in Python."},
],
examples:[
  {tab:"1. Case methods",file:"case.py — upper lower title",code:`<span class="cm"># Case conversion methods — all return a NEW string, original unchanged</span>

url = <span class="st">"HTTPS://API.App.Com/Login"</span>

<span class="fn">print</span>(url.<span class="fn">lower</span>())       <span class="cm"># https://api.app.com/login — normalize for comparison</span>
<span class="fn">print</span>(url.<span class="fn">upper</span>())       <span class="cm"># HTTPS://API.APP.COM/LOGIN</span>
<span class="fn">print</span>(url.<span class="fn">title</span>())       <span class="cm"># Https://Api.App.Com/Login</span>

<span class="cm"># Why .lower() matters in QA assertions:</span>
actual   = <span class="st">"PASS"</span>
expected = <span class="st">"pass"</span>

<span class="cm"># Wrong comparison — case sensitive by default</span>
<span class="fn">print</span>(actual == expected)           <span class="cm"># False — they don't match!</span>

<span class="cm"># Correct — normalize first</span>
<span class="fn">print</span>(actual.<span class="fn">lower</span>() == expected)   <span class="cm"># True — now they match</span>`},
  {tab:"2. Search methods",file:"search.py — find, count, startswith",code:`<span class="cm"># Searching inside strings</span>

response_body = <span class="st">"Error: Invalid credentials for user admin@test.com"</span>

<span class="cm"># 'in' operator — True/False membership check</span>
<span class="fn">print</span>(<span class="st">"Error"</span> <span class="kw">in</span> response_body)          <span class="cm"># True</span>
<span class="fn">print</span>(<span class="st">"Success"</span> <span class="kw">in</span> response_body)        <span class="cm"># False</span>

<span class="cm"># .find(sub) — returns index of first match, or -1 if not found</span>
<span class="fn">print</span>(response_body.<span class="fn">find</span>(<span class="st">"admin"</span>))      <span class="cm"># 36  (index position)</span>
<span class="fn">print</span>(response_body.<span class="fn">find</span>(<span class="st">"missing"</span>))    <span class="cm"># -1  (not found — safe!)</span>

<span class="cm"># .count(sub) — how many times sub appears</span>
<span class="fn">print</span>(response_body.<span class="fn">count</span>(<span class="st">"a"</span>))         <span class="cm"># 4</span>

<span class="cm"># .startswith() and .endswith() — prefix/suffix checks</span>
url = <span class="st">"https://api.example.com/users"</span>
<span class="fn">print</span>(url.<span class="fn">startswith</span>(<span class="st">"https"</span>))          <span class="cm"># True</span>
<span class="fn">print</span>(url.<span class="fn">endswith</span>(<span class="st">".json"</span>))             <span class="cm"># False</span>`},
  {tab:"3. Split & join",file:"split_join.py — breaking and building strings",code:`<span class="cm"># .split(sep) — breaks string into a LIST at each separator</span>
<span class="cm"># .join(list) — joins a LIST into a string with separator between items</span>

<span class="cm"># Split CSV line into fields</span>
csv_line = <span class="st">"admin,password123,staging"</span>
parts = csv_line.<span class="fn">split</span>(<span class="st">","</span>)            <span class="cm"># ['admin', 'password123', 'staging']</span>
<span class="fn">print</span>(parts[<span class="num">0</span>])                         <span class="cm"># admin</span>

<span class="cm"># Split URL path into segments</span>
path  = <span class="st">"/api/v2/users/123"</span>
segs  = path.<span class="fn">split</span>(<span class="st">"/"</span>)                <span class="cm"># ['', 'api', 'v2', 'users', '123']</span>
<span class="fn">print</span>(segs[-<span class="num">1</span>])                         <span class="cm"># 123  — user ID</span>

<span class="cm"># .split() with no arg splits on whitespace</span>
words = <span class="st">"login test passed"</span>.<span class="fn">split</span>()    <span class="cm"># ['login', 'test', 'passed']</span>

<span class="cm"># .join() — rebuild from a list</span>
tags  = [<span class="st">"smoke"</span>, <span class="st">"regression"</span>, <span class="st">"api"</span>]
<span class="fn">print</span>(<span class="st">", "</span>.<span class="fn">join</span>(tags))                  <span class="cm"># smoke, regression, api</span>
<span class="fn">print</span>(<span class="st">"|"</span>.<span class="fn">join</span>(tags))                   <span class="cm"># smoke|regression|api</span>`},
  {tab:"4. strip & replace",file:"strip_replace.py — cleaning strings",code:`<span class="cm"># .strip() removes WHITESPACE from both ends (spaces, tabs, newlines)</span>
<span class="cm"># .lstrip() removes from left only, .rstrip() from right only</span>

dirty_url = <span class="st">"   https://app.com/login   \n"</span>
clean_url = dirty_url.<span class="fn">strip</span>()          <span class="cm"># "https://app.com/login"</span>
<span class="fn">print</span>(<span class="st">f"'{clean_url}'"</span>)

<span class="cm"># Always strip before comparing test values!</span>
actual   = <span class="st">"  PASS  "</span>
expected = <span class="st">"PASS"</span>
<span class="fn">print</span>(actual == expected)                  <span class="cm"># False — whitespace!</span>
<span class="fn">print</span>(actual.<span class="fn">strip</span>() == expected)          <span class="cm"># True</span>

<span class="cm"># .replace(old, new) — swap every occurrence</span>
url = <span class="st">"http://staging.app.com"</span>
<span class="fn">print</span>(url.<span class="fn">replace</span>(<span class="st">"http://"</span>, <span class="st">"https://"</span>))  <span class="cm"># https://staging.app.com</span>
<span class="fn">print</span>(url.<span class="fn">replace</span>(<span class="st">"staging"</span>, <span class="st">"production"</span>)) <span class="cm"># http://production.app.com</span>`},
  {tab:"5. is* methods",file:"is_methods.py — validating string content",code:`<span class="cm"># is* methods return True/False about the string's content</span>
<span class="cm"># Very useful for input validation in QA test setup</span>

<span class="cm"># .isdigit() — all characters are digits (0-9)</span>
<span class="fn">print</span>(<span class="st">"200"</span>.<span class="fn">isdigit</span>())      <span class="cm"># True</span>
<span class="fn">print</span>(<span class="st">"20x"</span>.<span class="fn">isdigit</span>())      <span class="cm"># False</span>
<span class="fn">print</span>(<span class="st">"3.14"</span>.<span class="fn">isdigit</span>())     <span class="cm"># False — dot is not a digit</span>

<span class="cm"># .isalpha() — all characters are letters (no numbers, no spaces)</span>
<span class="fn">print</span>(<span class="st">"admin"</span>.<span class="fn">isalpha</span>())     <span class="cm"># True</span>
<span class="fn">print</span>(<span class="st">"admin1"</span>.<span class="fn">isalpha</span>())    <span class="cm"># False — has a digit</span>

<span class="cm"># .isalnum() — all characters are letters OR digits</span>
<span class="fn">print</span>(<span class="st">"admin123"</span>.<span class="fn">isalnum</span>())  <span class="cm"># True</span>
<span class="fn">print</span>(<span class="st">"user@mail"</span>.<span class="fn">isalnum</span>()) <span class="cm"># False — @ is not alphanumeric</span>

<span class="cm"># .isspace() — all whitespace characters</span>
<span class="fn">print</span>(<span class="st">"   "</span>.<span class="fn">isspace</span>())        <span class="cm"># True</span>
<span class="fn">print</span>(<span class="st">""</span>.<span class="fn">isspace</span>())          <span class="cm"># False — empty string is not space!</span>`},
  {tab:"6. f-string format",file:"fstring_format.py — advanced string formatting",code:`<span class="cm"># Advanced f-string formatting — control alignment, decimal places, width</span>
<span class="cm"># Syntax inside {}: {value:format_spec}</span>

name         = <span class="st">"login_test"</span>
duration_ms  = <span class="num">1234.5678</span>
status_code  = <span class="num">200</span>
passed_count = <span class="num">47</span>
total_count  = <span class="num">50</span>

<span class="cm"># :.2f = 2 decimal places (f = float)</span>
<span class="fn">print</span>(<span class="st">f"Duration: <span class="op">{duration_ms:.2f}</span>ms"</span>)          <span class="cm"># Duration: 1234.57ms</span>

<span class="cm"># :&gt;20 = right-align in 20 chars wide field</span>
<span class="fn">print</span>(<span class="st">f"{'Test name':&lt;20} {'Status':&gt;8}"</span>)         <span class="cm"># left / right align</span>
<span class="fn">print</span>(<span class="st">f"{name:&lt;20} {status_code:&gt;8}"</span>)            <span class="cm"># login_test          200</span>

<span class="cm"># :05d = pad with zeros to width 5</span>
test_id = <span class="num">7</span>
<span class="fn">print</span>(<span class="st">f"Test ID: TC<span class="op">{test_id:04d}</span>"</span>)               <span class="cm"># Test ID: TC0007</span>

<span class="cm"># % formatting for percentages</span>
pass_rate = passed_count / total_count
<span class="fn">print</span>(<span class="st">f"Pass rate: <span class="op">{pass_rate:.1%}</span>"</span>)             <span class="cm"># Pass rate: 94.0%</span>`},
],
bp:["Always .strip() strings from user input, files, or API responses before comparing","Use .lower() for case-insensitive comparisons — never assume casing is consistent","Prefer .find() over .index() — find returns -1 for missing, index raises ValueError","Use f-strings with format specs for clean, aligned test reports","Use .split() and .join() together for transforming data formats"],
qa:[
  {q:"Q1: What is the difference between .find() and .index()?",a:".find() returns -1 if the substring is not found — safe to use in conditions. .index() raises ValueError if not found — will crash your test. In QA, prefer .find() and check for -1, or use 'in' operator for simple membership testing."},
  {q:"Q2: Why should you always .strip() before comparing strings?",a:"Files, API responses, and user inputs often have invisible whitespace: trailing spaces, newlines (\\n), tabs (\\t). '   PASS   ' == 'PASS' is False! .strip() removes all whitespace from both ends so your assertions don't fail due to invisible characters."},
  {q:"Q3: How is .split() used in test automation?",a:"Parsing CSV test data: row.split(',') gives ['url','user','pass']. Extracting URL segments: url.split('/') gets ['', 'api', 'users', '123']. Parsing error messages: msg.split(':')[1].strip() gets the value after a colon. It's one of the most useful string methods in QA."},
  {q:"Q4: What is the difference between .replace() and re.sub()?",a:".replace(old, new) does a literal fixed-string swap — fast and simple. re.sub(pattern, repl, string) uses regex patterns — handles wildcards, character classes, groups. Use .replace() for simple swaps; re.sub() for complex pattern-based transformations."},
  {q:"Q5: How would you verify that a URL uses HTTPS in a test?",a:"Three ways: url.startswith('https://') — most readable. url[:8] == 'https://' — indexing. 'https' in url — simplest but also matches 'http://something/https-path'. Use .startswith() — it's explicit about the prefix position and reads like English."},
]},

oneliners:[
  {n:"1",t:"<strong>A test runner</strong> is any code that loops through test cases, executes each, and records pass/fail — you just built one."},
  {n:"2",t:"<strong>Separation of concerns</strong> — keep data separate from logic; functions separate from the main flow — easier to maintain."},
  {n:"3",t:"<strong>A test report</strong> is just a dict or list collecting results as you go — count passes, failures, and print a summary at the end."},
  {n:"4",t:"<strong>Error handling in tests</strong> — wrap each test in try/except so one failing test doesn't stop the rest of the suite."},

  {n:"6",t:"<strong>Every Pytest framework</strong> is a sophisticated version of exactly this — a loop, assertions, a reporter. Now you know the foundation."},
],
examples:[
  {tab:"1. Test data setup",file:"test_data.py — defining test cases as a list of dicts",code:`<span class="cm"># SESSION CAPSTONE — combining S1-S9 into a mini framework</span>
<span class="cm"># Step 1: Define test data as a list of dicts (S4 + S7)</span>
<span class="cm"># Each dict = one test case with all needed information</span>

<span class="cm"># Config dict (S4 — dict) — one place for all settings</span>
CONFIG = {
    <span class="st">"base_url"</span>:     <span class="st">"https://api.jsonplaceholder.typicode.com"</span>,
    <span class="st">"timeout"</span>:      <span class="num">30</span>,
    <span class="st">"pass_threshold"</span>: <span class="num">80</span>   <span class="cm"># % pass rate required</span>
}

<span class="cm"># Test cases (S4 — list of dicts, S7 — nested structure)</span>
TEST_CASES = [
    {<span class="st">"id"</span>: <span class="num">1</span>, <span class="st">"name"</span>: <span class="st">"get_post_1"</span>,   <span class="st">"endpoint"</span>: <span class="st">"/posts/1"</span>,  <span class="st">"expected"</span>: <span class="num">200</span>},
    {<span class="st">"id"</span>: <span class="num">2</span>, <span class="st">"name"</span>: <span class="st">"get_user_1"</span>,   <span class="st">"endpoint"</span>: <span class="st">"/users/1"</span>,  <span class="st">"expected"</span>: <span class="num">200</span>},
    {<span class="st">"id"</span>: <span class="num">3</span>, <span class="st">"name"</span>: <span class="st">"bad_endpoint"</span>, <span class="st">"endpoint"</span>: <span class="st">"/invalid"</span>,  <span class="st">"expected"</span>: <span class="num">404</span>},
    {<span class="st">"id"</span>: <span class="num">4</span>, <span class="st">"name"</span>: <span class="st">"get_todos"</span>,    <span class="st">"endpoint"</span>: <span class="st">"/todos/1"</span>,  <span class="st">"expected"</span>: <span class="num">200</span>},
]
<span class="fn">print</span>(<span class="st">f"Loaded {<span class="fn">len</span>(TEST_CASES)} test cases"</span>)</code>`},
  {tab:"2. Helper functions",file:"helpers.py — reusable helper functions (S6)",code:`<span class="cm"># Step 2: Define helper functions (S6 — functions)</span>
<span class="cm"># Each function does ONE thing — follows Single Responsibility</span>

<span class="kw">def</span> <span class="fn">build_url</span>(base_url, endpoint):
    <span class="st">"""Build full URL from base and endpoint strings."""</span>
    <span class="cm"># .rstrip("/") removes trailing slash from base (S9 — strings)</span>
    <span class="kw">return</span> base_url.<span class="fn">rstrip</span>(<span class="st">"/"</span>) + endpoint

<span class="kw">def</span> <span class="fn">verify_status</span>(actual, expected):
    <span class="st">"""Return True if status matches expected, False otherwise."""</span>
    <span class="kw">return</span> actual == expected    <span class="cm"># returns bool (S2)</span>

<span class="kw">def</span> <span class="fn">format_result</span>(tc, passed):
    <span class="st">"""Return a formatted result string for reporting."""</span>
    <span class="cm"># f-string (S1), ternary expression (S5)</span>
    icon   = <span class="st">"PASS"</span> <span class="kw">if</span> passed <span class="kw">else</span> <span class="st">"FAIL"</span>
    <span class="kw">return</span> <span class="st">f"[{icon}] TC{tc['id']:03d} {tc['name']}"</span>

<span class="cm"># Test the helpers</span>
<span class="fn">print</span>(<span class="fn">build_url</span>(<span class="st">"https://api.app.com"</span>, <span class="st">"/users"</span>))   <span class="cm"># https://api.app.com/users</span>
<span class="fn">print</span>(<span class="fn">verify_status</span>(<span class="num">200</span>, <span class="num">200</span>))                     <span class="cm"># True</span>`},
  {tab:"3. Test runner",file:"runner.py — running all tests with error handling",code:`<span class="cm"># Step 3: The test runner loop (S5 — loops, S8 — error handling)</span>
<span class="cm"># Simulates running each test case and collecting results</span>

<span class="fn">generate_report</span>(results, CONFIG[<span class="st">"pass_threshold"</span>])`},

<span class="cm"># Always validate test data before running — fail fast with clear messages</span>

<span class="kw">def</span> <span class="fn">validate_url</span>(url):
    <span class="st">"""Validate URL format before running tests against it."""</span>
    url = url.<span class="fn">strip</span>()                          <span class="cm"># S9: strip whitespace</span>

    <span class="kw">if</span> <span class="kw">not</span> url:                                  <span class="cm"># S2: check not empty</span>
        <span class="kw">raise</span> <span class="bi">ValueError</span>(<span class="st">"URL cannot be empty"</span>)  <span class="cm"># S8: raise error</span>

    <span class="kw">if</span> <span class="kw">not</span> url.<span class="fn">startswith</span>((<span class="st">"http://"</span>, <span class="st">"https://"</span>)):  <span class="cm"># S9: startswith</span>
        <span class="kw">raise</span> <span class="bi">ValueError</span>(<span class="st">f"URL must start with http:// or https://"</span>)

    <span class="kw">if</span> <span class="st">" "</span> <span class="kw">in</span> url:                             <span class="cm"># S9: 'in' operator</span>
        <span class="kw">raise</span> <span class="bi">ValueError</span>(<span class="st">"URL cannot contain spaces"</span>)

    <span class="kw">return</span> url.<span class="fn">lower</span>()                          <span class="cm"># S9: normalize to lowercase</span>

<span class="kw">for</span> tc <span class="kw">in</span> TEST_CASES:                          <span class="cm"># S5: loop</span>
    url = CONFIG[<span class="st">"base_url"</span>] + tc[<span class="st">"endpoint"</span>]

    <span class="kw">except</span> <span class="bi">ValueError</span> <span class="kw">as</span> e:                   <span class="cm"># S8: handle</span>
        <span class="fn">print</span>(<span class="st">f"Invalid: <span class="op">{e}</span>"</span>)`},

  {q:"Q1: How does a 'for loop + dict' pattern simulate a test data table?",a:"Each dict in the list represents one row in a test table: {'name':'login','input':'admin','expected':200}. The for loop iterates each row. This is identical to how Pytest's @parametrize works — it loops test data and runs the same function for each row."},
  {q:"Q2: Why wrap each test in its own try/except instead of one outer try?",a:"If one outer try/except wraps all tests, the first failure stops every test after it. With a per-test try/except, each test runs independently — like Pytest's default behavior where test_login.py failure doesn't stop test_checkout.py from running."},

function buildTabs(){
  const el=document.getElementById("tabs");
  S.forEach((s,i)=>{
    const b=document.createElement("button");
    b.className="tab-btn"+(i===0?" active":"");
    b.textContent=`S${s.id}`;
    b.title=s.title;
    b.onclick=()=>activate(i);
    el.appendChild(b);
  });
}

function activate(idx){
  document.querySelectorAll(".tab-btn").forEach((b,i)=>b.classList.toggle("active",i===idx));
  document.querySelectorAll(".session").forEach((s,i)=>s.classList.toggle("active",i===idx));
  document.getElementById("prog").style.width=Math.round(((idx+1)/S.length)*100)+"%";
  document.getElementById("content").scrollTop=0;
}

function toggleQA(btn){
  btn.classList.toggle("open");
  const a=btn.nextElementSibling;
  a.classList.toggle("open");
}

function buildSessions(){
  const c=document.getElementById("content");
  S.forEach((s,si)=>{
    const div=document.createElement("div");
    div.className="session"+(si===0?" active":"");

    const exTabsHTML=s.examples.map((e,i)=>
      `<button class="ex-tab-btn${i===0?" active":""}" onclick="switchEx(this,${si})">${e.tab}</button>`
    ).join("");

    const exPanelsHTML=s.examples.map((e,i)=>
      `<div class="ex-panel${i===0?" active":""}">
        <div class="ex-file-label">${e.file}</div>
        <div class="code-block"><pre><code class="language-python">${e.code}</code></pre></div>
      </div>`
    ).join("");

    const qaHTML=s.qa.map((q,qi)=>
      `<div class="qa-item">
        <div class="qa-q" onclick="toggleQA(this)"><span>${q.q}</span><i class="ti ti-chevron-down" aria-hidden="true"></i></div>
        <div class="qa-a">${q.a}</div>
      </div>`
    ).join("");

    div.innerHTML=`
<div class="s-hero">
  <div class="s-hero-top">
    <div class="s-num">${s.id}</div>
    <span class="s-title">${s.title}</span>
    <span style="margin-left:6px"><span class="phase-badge ${s.phase==='fund'?'phase-fund':'phase-inter'}">${s.phase==='fund'?'Fundamentals':'Intermediate'}</span></span>
  </div>
  <div class="s-subtitle">${s.sub}</div>
  <div class="wwww-row">
    <div class="wwww-card"><div class="lbl">What</div><div class="val">${s.what}</div></div>
    <div class="wwww-card"><div class="lbl">Why</div><div class="val">${s.why}</div></div>
    <div class="wwww-card"><div class="lbl">When</div><div class="val">${s.when}</div></div>
    <div class="wwww-card"><div class="lbl">How</div><div class="val">${s.how}</div></div>
  </div>
</div>
<div class="s-body">
  <div class="sec">
    <div class="sec-hd"><i class="ti ti-bulb" aria-hidden="true"></i> Concept diagram</div>
    <div class="diagram-wrap">${s.diagram}</div>
  </div>
  <div class="sec">
    <div class="sec-hd"><i class="ti ti-message-circle" aria-hidden="true"></i> Interview one-liners</div>
    <div class="oneliners">${s.oneliners.map(o=>`<div class="ol-item"><span class="ol-num">${o.n}</span><p class="ol-text">${o.t}</p></div>`).join("")}</div>
  </div>
  <div class="sec">
    <div class="sec-hd"><i class="ti ti-code" aria-hidden="true"></i> Code examples</div>
    <div class="ex-wrapper">
      <div class="ex-tabs" id="extabs-${si}">${exTabsHTML}</div>
      ${exPanelsHTML}
    </div>
  </div>
  <div class="sec">
    <div class="sec-hd"><i class="ti ti-circle-check" aria-hidden="true"></i> Best practices</div>
    <ul class="bp-list">${s.bp.map(b=>`<li><i class="ti ti-check" aria-hidden="true"></i>${b}</li>`).join("")}</ul>
  </div>
  <div class="sec">
    <div class="sec-hd"><i class="ti ti-help" aria-hidden="true"></i> Interview Q&A (SDET style)</div>
    <div class="qa-list">${qaHTML}</div>
  </div>
  <div class="ask-row">
    <button class="ask-btn" onclick="sendPrompt('For Session ${s.id} (${s.title}), give me a coding challenge to test my understanding.')">Practice challenge ↗</button>
    <button class="ask-btn" onclick="sendPrompt('Quiz me with 3 multiple choice questions on Session ${s.id}: ${s.title}')">Quick quiz ↗</button>
  </div>
</div>`;
    c.appendChild(div);
  });
}

function switchEx(btn,si){
  const wrap=btn.closest(".ex-wrapper");
  wrap.querySelectorAll(".ex-tab-btn").forEach(b=>b.classList.remove("active"));
  wrap.querySelectorAll(".ex-panel").forEach(p=>p.classList.remove("active"));
  btn.classList.add("active");
  const idx=Array.from(btn.parentElement.children).indexOf(btn);
  wrap.querySelectorAll(".ex-panel")[idx].classList.add("active");
}

buildTabs();
buildSessions();
</script>
